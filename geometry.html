<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Swing-arc simulator</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2052%2052'%20fill='none'%3E%3Cpath%20d='M11%2045%20C%2016%2026,%2024%2018,%2035%2015%20M21%2039%20L%2030%2024%20L%2043%2045'%20stroke='%23FF8A4D'%20stroke-width='4.2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3Ccircle%20cx='37'%20cy='15'%20r='5.2'%20fill='%23FF8A4D'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="./sa.css" />
<link rel="stylesheet" href="./sa-paywall.css" />
<script>
// ØKT 2a — the 2D↔3D pair navigates cross-document; a skipped view transition
// (only the 2D side opts in, or rotation navigates mid-reflow) rejects a
// UA-internal promise BEFORE the deferred modules run. Expected non-error;
// registered inline+early so the console stays clean.
addEventListener('unhandledrejection', function(e){
  if (String((e.reason && e.reason.message) || e.reason).indexOf('Transition was skipped') !== -1) e.preventDefault();
});
</script>
<style>
  /* ── THE OBSERVATORY BROADCAST — per-page vendored fonts (showcase-spec §1/§4).
     Fraunces (display, variable, single woff2 <300KB) is the engraved-instrument
     plaque voice; scoped HERE, deliberately NOT added to sa-p3.css. IBM Plex Mono
     carries every data value (tabular-nums + U+2212), per the unchanged mono law. */
  @font-face{
    font-family:'Fraunces';font-style:normal;font-weight:100 900;font-display:swap;
    src:url('./vendor/fonts/Fraunces-Variable.woff2') format('woff2');
  }
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:400;font-display:swap;src:url('./vendor/fonts/IBMPlexMono-Regular.woff2') format('woff2');}
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:500;font-display:swap;src:url('./vendor/fonts/IBMPlexMono-Medium.woff2') format('woff2');}
  @font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:600;font-display:swap;src:url('./vendor/fonts/IBMPlexMono-SemiBold.woff2') format('woff2');}
  :root{
    /* P3 Ultraviolet Ember (sa-p3.css tokens, mirrored locally — this page does
       not link sa-p3.css; §1 deviations are documented at each use). */
    --accent:#FF8A4D; --accent-soft:rgba(255,138,77,.16); --accent-line:rgba(255,138,77,.55);
    --secondary:#9D8BFF; --secondary-soft:rgba(157,139,255,.14); --secondary-line:rgba(157,139,255,.45);
    --ink:#F5F2FF; --muted:#A79FC7;
    --bg:#07060C; --bg-top:#140E24;                    /* violet-shifted scene grade */
    --panel:rgba(17,13,28,.72); --line:rgba(255,255,255,.30);  /* line ≥3:1 */
    /* etched-instrument brass (deviation-by-promotion) + SYS-11 param hues */
    /* tokens: geometry-palett (P1, kontrakt §7) — mirrors sa-p3.css @ HEAD:
       mock values minted as OKLCH; --strike claims the mock gold (flagg 1),
       --launch re-tuned to citron in its own sa-p3.css commit. */
    --launch:oklch(80% 0.10 105); --plane:oklch(70.06% 0.1494 288.55); --depth:#C98AE6;
    --strike:oklch(78.73% 0.1178 78.12);      /* mock #e3b05c — 9.90:1 on plate */
    --focal-warm:oklch(75.14% 0.1610 46.76);  /* mock #ff8a4c — ONE per screen, never decorative */
    --zone-pure:oklch(77.99% 0.1648 157.13);  /* mock #3fd68c — tickstrip zone @18% */
    --q-path:oklch(78.68% 0.1179 228.25); --q-attack:oklch(72.34% 0.1793 348.62);
    --q-plane:var(--plane); --q-strike:var(--strike); --celebrate:#FF5CE1;
    /* ORDRE 2 P2 — verdict/status trio + measure gold (sa-p3.css tokens,
       mirrored locally like the rest of this block). --gold = measures/
       annotations; --warn/--bad = negative states (never ember). */
    --gold:#D9B36A; --good:#58E6A8; --warn:#FFD056; --bad:#FF7B8A;
    --line-strong:rgba(255,255,255,.30);
    /* GEOMETRY P1 (ordre §Layoutsoner) — mikropanel 27 % | scene 73 %;
       the 3D scene region starts at exactly this x (scene.js setMainRegionLeft). */
    --sd-w:27vw;
    --radius-pill:999px; --radius-card:16px; --radius-control:12px;
    --blur-surface:10px; --blur-overlay:18px;
    /* type roles (showcase deviation): serif display = Fraunces; data = mono */
    --font-serif:'Fraunces',Georgia,'Times New Roman',serif;
    --font-mono:'IBM Plex Mono',ui-monospace,"SF Mono",Menlo,monospace;
  }
  /* ── Fraunces plaque voice — engraved observatory nameplate. Two optical
     instances: soft-display for plaques/titles; WONKY axis on for the wordmark. */
  .fr-plaque{font-family:var(--font-serif);font-variation-settings:'opsz' 40,'wght' 560,'SOFT' 40,'WONK' 0;}
  .fr-wonk{font-variation-settings:'opsz' 96,'wght' 600,'SOFT' 30,'WONK' 1;}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    background:radial-gradient(130% 120% at 50% -10%, var(--bg-top), var(--bg));
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .stage{position:fixed;inset:0;overflow:hidden}
  /* 3D scene canvas — the default (and only) Geometry scene */
  #scene3d{position:fixed;inset:0;width:100%;height:100%;z-index:0}
  /* GEOMETRY P1 (krav 12) — the old floating scene chips (#lp3dLabel «N cm
     ahead/behind» + #lpy3dLabel «y +1.6 cm») are REMOVED: their job is
     carried by the LOW POINT X / ARC HEIGHT cell values. Canvas law
     (ordre §Layoutsoner): nothing overlays the scene zone. */
  .gc3d-label{
    position:fixed;z-index:2;pointer-events:none;white-space:nowrap;
    font-size:12px;font-weight:500;letter-spacing:.01em;color:var(--ink);
    background:rgba(10,7,18,.72);border:1px solid rgba(138,90,43,.55);border-radius:8px;
    padding:3px 9px;font-family:var(--font-mono);font-variant-numeric:tabular-nums;
  }
  .gc3d-label[hidden]{display:none}
  /* ØKT 2.3 — the hinge plane-angle plaque was removed. OWNER ORDER 2026-07-12
     (#1/#2): the ring's gold aim-sector + single numeral are DRAG-TIME aiming
     aids now (geo3d/plane.js aimFade) — the dial rests as quiet ticks only. */
  /* §2.5 — transient pose-name slate (Fraunces): names the view the moment it
     settles (FACE / DTL), then fades — a broadcast angle caption, not chrome.
     A cheap ≤4° tilt-to-camera parallax rides --pn-tilt under orbit drag. */
  .pose-name{
    /* centred over the SCENE region (right of the permanent panel), not the window */
    position:fixed;left:calc(var(--sd-w) + (100% - var(--sd-w))/2);top:20%;z-index:4;
    transform:translateX(-50%) translateY(-6px) rotate(var(--pn-tilt,0deg));
    font-family:var(--font-serif);font-variation-settings:'opsz' 96,'wght' 560,'SOFT' 40,'WONK' 0;
    font-size:14px;letter-spacing:.2em;color:#D9D2F0;text-transform:uppercase;
    white-space:nowrap;pointer-events:none;opacity:0;
    background:rgba(9,6,16,.62);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    border:1px solid rgba(157,139,255,.28);border-radius:8px;padding:5px 14px 6px;
    box-shadow:0 10px 30px -16px rgba(0,0,0,.85);
    transition:opacity .5s ease,transform .5s ease;
  }
  .pose-name.is-visible{opacity:.92;transform:translateX(-50%) translateY(0) rotate(var(--pn-tilt,0deg))}
  @media (prefers-reduced-motion:reduce){.pose-name{transition:none}}
  /* GROUND-STRIKE cue (2026-07-02, owner: "see the club hit the ground BEFORE
     the ball on a duff"): brief "turf first" emphasis pulse on the existing
     FIX J turf label at the moment the early ground-strike FX fires — a
     quick border/scale pop, not a new label, so it reads as "this is what
     just happened" rather than introducing new UI. Reduced-motion: no
     animation (rule at the bottom of this stylesheet already kills all
     transitions/animations under prefers-reduced-motion). */
  .gc3d-label.is-struck{
    border-color:rgba(255,150,80,.9);
    box-shadow:0 0 0 3px rgba(255,150,80,.28);
    animation:gc3dStrike .5s ease-out;
  }
  @keyframes gc3dStrike{
    0%{transform:scale(1.22)}
    100%{transform:scale(1)}
  }
  .label{font-size:12px;fill:var(--muted);font-family:inherit;font-variant-numeric:tabular-nums}

  /* FACE-ZOOM band-label chip: dark plate, fades in during the zoom
     detour (reuses the app's panel/blur/radius tokens; see .tune). */
  /* §2.4/§2.5 — the Impact-Replay verdict plaque (a broadcast lower-third):
     band word in Fraunces, percent in mono, typed-on at the freeze, holding
     past release until the next input. */
  .facezoom-chip{
    position:fixed;left:calc(var(--sd-w) + (100% - var(--sd-w))/2);bottom:max(18px,env(safe-area-inset-bottom));z-index:6;
    transform:translateX(-50%) translateY(6px);
    display:inline-flex;align-items:baseline;
    background:rgba(9,6,16,.9);-webkit-backdrop-filter:blur(var(--blur-surface));backdrop-filter:blur(var(--blur-surface));
    border:1px solid var(--line);border-radius:12px;
    padding:9px 20px 10px;white-space:nowrap;pointer-events:none;
    opacity:0;transition:opacity .22s ease,transform .22s ease;
    box-shadow:0 16px 44px -18px rgba(0,0,0,.9);
  }
  .facezoom-chip .fzc-txt{display:inline-block;line-height:1}
  .facezoom-chip .fzc-band{
    font-family:var(--font-serif);font-variation-settings:'opsz' 64,'wght' 600,'SOFT' 30,'WONK' 0;
    font-size:20px;letter-spacing:.005em;
  }
  .facezoom-chip .fzc-sep{opacity:.45;margin:0 9px;font-size:16px}
  .facezoom-chip .fzc-pct{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:15px;font-weight:600}
  .facezoom-chip.is-visible{opacity:1;transform:translateX(-50%) translateY(0)}
  /* typed-on lower-third: a sharp left→right reveal (no blur), ~240ms */
  .facezoom-chip.is-typing .fzc-txt{animation:fzcType .24s steps(16,end) both}
  @keyframes fzcType{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
  @media (prefers-reduced-motion:reduce){
    .facezoom-chip{transition:none}
    .facezoom-chip.is-typing .fzc-txt{animation:none;clip-path:none}
  }

  /* FACE-ZOOM "tap to continue" hint: small, muted, sits just below the
     band-label chip during the indefinite hold. Fades in ~600ms after the
     hold starts (see facezoom.js HINT_DELAY_MS) so it doesn't flash on
     screen for people who tap through immediately. */
  .facezoom-hint{
    position:fixed;left:calc(var(--sd-w) + (100% - var(--sd-w))/2);bottom:max(58px,calc(env(safe-area-inset-bottom) + 58px));z-index:6;
    transform:translateX(-50%) translateY(4px);
    background:rgba(7,12,18,.7);-webkit-backdrop-filter:blur(var(--blur-surface));backdrop-filter:blur(var(--blur-surface));
    border:1px solid rgba(255,255,255,.18);border-radius:var(--radius-pill);
    /* Pass-1 (Fable): the dismiss affordance was near-invisible over the dark
       freeze — ink, not muted. */
    padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:.03em;color:var(--ink);
    white-space:nowrap;pointer-events:none;
    opacity:0;transition:opacity .3s ease,transform .3s ease;
  }
  .facezoom-hint.is-visible{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){.facezoom-hint{transition:none}}

  /* GEOMETRY P1 (ordre §Layoutsoner sone 1) — CHIPS-RAD: three dashed outcome
     chips ATTACK (pink) / PATH (blue) / STRIKE (gold) across the top of the
     scene zone. Dashed 1.5px = readout grammar, tabular-nums, min-widths so a
     sign flip never causes a layout hop (krav 3/11). Lens-dimming (krav 6):
     untouched chips 25 %, touched 100 % via .off. Values live via
     renderReadout(); announced through the single #sceneData live region. */
  #chipsRow{
    position:fixed;left:calc(var(--sd-w) + 14px);top:max(8px,env(safe-area-inset-top));z-index:3;
    display:flex;gap:8px;align-items:center;pointer-events:none;
  }
  .dchip{
    border:1.5px dashed;border-radius:10px;height:33px;padding:0 11px;
    background:rgba(10,7,18,.6);
    font-family:var(--font-mono);font-variant-numeric:tabular-nums;
    display:flex;align-items:center;gap:7px;transition:opacity .3s,transform .3s;
  }
  .dchip .lbl{font-size:8.5px;letter-spacing:.16em;color:var(--muted)}
  .dchip .val{font-size:14px;font-weight:700;white-space:nowrap}
  .dchip.pink{border-color:color-mix(in srgb,var(--q-attack) 35%,transparent);min-width:98px}
  .dchip.pink .val{color:var(--q-attack)}
  .dchip.blue{border-color:color-mix(in srgb,var(--q-path) 35%,transparent);min-width:90px}
  .dchip.blue .val{color:var(--q-path)}
  .dchip.gold{border-color:color-mix(in srgb,var(--q-strike) 35%,transparent);min-width:112px}
  .dchip.gold .val{color:var(--q-strike)}
  .dchip.off{opacity:.25;transform:scale(.92)}
  .dchip.ping{animation:ping .4s}
  @keyframes ping{35%{transform:scale(1.07)}}
  .dchip.zero{animation:zeroFlash .5s}
  @keyframes zeroFlash{40%{background:rgba(255,255,255,.15)}}

  /* krav 10 device-evidens: fps-måler (debug, av som standard) */
  .fpsMeter{position:fixed;top:calc(max(8px,env(safe-area-inset-top)) + 46px);
    left:max(10px,env(safe-area-inset-left));z-index:6;pointer-events:none;
    font:11px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;color:#fff;
    background:rgba(10,8,20,.82);border:1px solid rgba(255,255,255,.25);
    border-radius:8px;padding:6px 9px;white-space:pre}

  /* freemium "N free shots left" nudge pill — discreet, top-centre, clear of
     the hud-chips row above it. Shown only in the tail (1-2) of the free
     window (saShots.shouldNudge()); a plain visible pill, not aria-live, so
     it never spams a screen reader on every play (see refreshNudge()). */
  .sa-nudge{
    position:fixed;left:calc(var(--sd-w) + (100% - var(--sd-w))/2);top:max(42px,calc(env(safe-area-inset-top) + 42px));z-index:3;
    transform:translateX(-50%);
    background:rgba(7,12,18,.86);-webkit-backdrop-filter:blur(var(--blur-surface));backdrop-filter:blur(var(--blur-surface));
    border:1px solid var(--accent-line);border-radius:var(--radius-pill);
    padding:5px 14px;font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--accent);
    white-space:nowrap;pointer-events:none;
  }
  .sa-nudge[hidden]{display:none}

  /* overlays */

  /* ── module nav (top-left, thin strip — shared with Impact) ──── */
  .modnav{position:fixed;top:max(8px,env(safe-area-inset-top));left:max(10px,env(safe-area-inset-left));z-index:5;
    display:flex;align-items:center;gap:4px;view-transition-name:sa-nav;
    background:linear-gradient(180deg, rgba(12,20,33,.55), rgba(10,14,18,.2));
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:3px}
  .modnav a{
    -webkit-tap-highlight-color:transparent;text-decoration:none;color:var(--muted);
    border:1px solid transparent;border-radius:8px;
    min-height:44px;display:inline-flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;line-height:1;padding:0 12px;
    transition:background .2s,border-color .2s,color .2s;
  }
  .modnav a.home{width:44px;padding:0;font-size:17px}
  .modnav a:hover{background:rgba(255,255,255,.08);color:var(--ink)}
  .modnav a:focus-visible{outline:2px solid var(--secondary);outline-offset:2px}

  .controls{position:fixed;top:max(10px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));z-index:4;display:flex;gap:8px}
  /* «View in 2D» — anchor twin of the control buttons (ØKT 2a §2.3) */
  .controls .ctl2d{
    background:rgba(10,18,30,.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    color:var(--ink);border:1px solid var(--line);width:44px;height:44px;border-radius:var(--radius-pill);
    display:flex;align-items:center;justify-content:center;text-decoration:none;
    -webkit-tap-highlight-color:transparent;transition:background .2s,border-color .2s,transform .1s;
  }
  .controls .ctl2d svg{width:20px;height:20px}
  .controls .ctl2d:active{transform:scale(.94)}
  button{
    background:rgba(10,18,30,.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    color:var(--ink);border:1px solid var(--line);width:44px;height:44px;border-radius:var(--radius-pill);
    font-size:17px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;
    transition:background .2s,border-color .2s,transform .1s;
  }
  button svg{width:20px;height:20px;display:block}
  button:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.3)}
  button:active{transform:translateY(1px)}
  button:focus-visible,.controls .ctl2d:focus-visible{outline:2px solid var(--secondary);outline-offset:2px}
  /* toggle chrome = violet secondary; the play button stays ember (it fires the live swing) */
  button[aria-pressed="true"]{background:var(--secondary-soft);border-color:var(--secondary);color:var(--secondary)}
  #hit{color:var(--accent);border-color:var(--accent-line)}
  #hit:hover{background:var(--accent-soft);border-color:var(--accent)}
  #hit:focus-visible{outline-color:var(--accent)}

  /* ── THE MICROSCOPE (ORDRE 2 P2 §4/§5) — the strike-detail card upgraded to
     a PERMANENT LEFT PANEL: var(--sd-w) wide, full height. The real 3D club/
     ball/low-point close-up still renders via the second scissored viewport
     (geo3d/scene.js + geo3d/insetview.js) with the DOM annotation SVG on top;
     the main scene renders to the right of the panel edge (zero overlap —
     scene.js setMainRegionLeft). */
  /* NOTE: the panel container has NO background of its own — the .viewport
     strip in the middle must show the WebGL inset render straight through to
     the shared #scene3d canvas underneath (z-index 0, below this panel's
     z-index 3). A transparent child still reveals its PARENT's background,
     so only the sections above/below the viewport (.sd-head / .sd-verdict)
     carry solid dark plates. */
  .strike-detail{
    position:fixed;left:0;top:0;bottom:0;z-index:3;
    width:var(--sd-w);
    display:flex;flex-direction:column;
    border-right:1px solid var(--line);
    box-shadow:18px 0 50px -24px rgba(0,0,0,.85);
  }
  .strike-detail .sd-head{
    /* padding-top clears the fixed module nav that floats over the panel */
    padding:calc(max(8px,env(safe-area-inset-top)) + 52px) 14px 11px max(14px,env(safe-area-inset-left));
    /* violet-dark plate (matches the page grade — not Impact's blue-grey) so
       the panel reads as ONE pane with the GL viewport strip between plates */
    background:linear-gradient(180deg, rgba(19,14,31,.98), rgba(15,11,25,.95));
  }
  /* GEOMETRY P1 (ordre §Layoutsoner, mikropanel): eyebrow «Club» (serif,
     letterspaced) — the club toggle is HIDDEN in P1 (kontrakt §6: driver
     behind the clubContext flag; only the flag-hiding is removed when the
     asset lands). The old gold x/y readout (#sdLpX/#sdLpY, «y +1.6 cm») is
     REMOVED per kontrakt §8 — the cell values carry those numbers now. */
  .strike-detail .ttl{display:block;font-family:var(--font-serif);font-variation-settings:'opsz' 28,'wght' 560,'SOFT' 40,'WONK' 0;font-size:10.5px;font-weight:560;letter-spacing:.24em;color:var(--muted);text-transform:uppercase}
  .strike-detail .chip{
    display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
    padding:2px 8px;border-radius:999px;white-space:nowrap;align-self:flex-start;
    background:rgba(88,230,168,.12);color:var(--good);border:1px solid rgba(88,230,168,.3);
  }
  .strike-detail .chip .pct{opacity:.75;font-weight:600}
  .strike-detail .viewport{
    position:relative;flex:1;min-height:0;width:100%;
    border-top:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);
  }
  .strike-detail .viewport svg{position:absolute;inset:0;width:100%;height:100%;display:block;pointer-events:none}
  /* §7 — panel annotations are MEASURES → gold (verdicts live in the chip/foot) */
  .sd-lb{font-family:var(--font-mono);font-weight:500;font-size:11.5px;fill:var(--gold);font-variant-numeric:tabular-nums;paint-order:stroke;stroke:#07060C;stroke-width:2.5px;stroke-linejoin:round}
  .sd-lb-soil{fill:#c9a878}
  .strike-detail .sd-verdict{
    display:flex;flex-direction:column;gap:6px;
    padding:10px 14px max(10px,env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left));
    background:linear-gradient(0deg, rgba(13,10,22,.98), rgba(15,11,25,.95));
  }
  .strike-detail .foot{font-size:11px;color:var(--muted);line-height:1.35;margin:0;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden} /* maks 2 linjer (ordre §Layoutsoner) */
  .strike-detail .foot b{color:var(--ink)}
  /* §7 — negative-state values (behind / deep-dig words) → verdict amber, never ember */
  .strike-detail .foot .neg{color:var(--warn)}
  .strike-detail .foot .sd-turf{color:#c9a878;font-weight:700}

  /* ── GEOMETRY P1 KONTROLLBAR (ordre §Layoutsoner sone 3) — PERMANENT
     bottom bar over the SCENE region only (never covers the panel):
     segmentkontroll → tickstrip → slider. No hint text. The bar carries the
     active lens hue on --lens (set by applyLens); slider accent follows. */
  #controlBar{
    position:fixed;left:var(--sd-w);right:0;bottom:0;z-index:3;

  }

  .cell{

  .cell .cl{display:block;font-size:8px;letter-spacing:.13em;color:var(--muted);white-space:nowrap}

  /* EIERORDRE 2026-07-18: tick-stripen er fjernet — én midtstrek (nullpunkt /
     midten av tallene) + pure-sonen flyttet inn i selve slider-sporet. */

  #slider{

  #slider::-webkit-slider-runnable-track{

  }
  #slider::-moz-range-track{height:5px;border-radius:999px;background:rgba(255,255,255,.14)}
  #slider::-moz-range-progress{height:5px;border-radius:999px;background:var(--lens)}
  #slider::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:23px;height:23px;border-radius:50%;
    margin-top:-9px;background:var(--lens);border:3px solid #0d0918;

  #slider:focus-visible::-moz-range-thumb{box-shadow:0 0 0 3px var(--ink), 0 0 12px var(--lens)}

  /* rotate hint */
  .rotate{position:fixed;inset:0;z-index:9;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;background:var(--bg);text-align:center;padding:24px}

  @media (orientation:portrait){.rotate{display:flex}}

<body>

  <!-- GEOMETRY P1 (ordre §Layoutsoner sone 1) — CHIPS-RAD: ATTACK / PATH /

       depth/height + ball-strike on the blade. Real 3D club/ball close-up via

       Header: FIXED gold mono low-point x/y readout — always visible. -->
  <div class="strike-detail" id="strikeDetail" role="group" aria-label="Strike detail">
    <div class="sd-head">
      <!-- GEOMETRY P1: eyebrow «Club». The JERN/DRIVER toggle is NOT rendered
           in P1 (kontrakt §6 — clubContext flag; asset lands in a parallel
           track). The old gold x/y readout is removed (kontrakt §8). -->
      <span class="ttl" id="sdTtl">Club</span>

  <div id="controlBar">
    <div id="seg">
      <button class="cell" data-c="plane" aria-pressed="false"><span class="cl">PLANE</span><span class="cv" id="tvPlane"></span></button>
      <button class="cell" data-c="dir" aria-pressed="false"><span class="cl">DIRECTION</span><span class="cv" id="tvDir"></span></button>
      <button class="cell" data-c="low" aria-pressed="true"><span class="cl">LOW POINT X</span><span class="cv" id="tvLow"></span></button>

      <input type="range" id="slider" aria-label="Low point X, ahead or behind the ball">

  <div class="rotate">

<script src="./vendor/gsap/gsap.min.js"></script>
<script src="./sa-firstrun.js" defer></script>
<script type="module">
// NOTE: relative imports (not a bare 'three' + import map) — the import map
// is not honoured in the native Capacitor WKWebView, which crashed the whole
// 3D module and left Geometry blank. Every geo3d module + the vendored three
// addons were rewired to relative paths to match. Do NOT reintroduce a bare
// specifier here or in geo3d/*.js.
import * as THREE from './vendor/three/build/three.module.js';
import {
  RADIUS, deg2rad, arcPosition, tangentAt, thetaAtImpact,
  strikeQuality, deriveImpact, clubBallContact, BALL_RADIUS_M,
  lpWorld, effectiveLpx,
} from './swing-parameters-and-impact.js';
// GEOMETRY P1 — controller plane (kontrakt §3): uiLow ≡ effectiveLpx-semantikk,
// rail-clamp, 0-detent, clubContext-oppslag, tidsbasert fjær-alpha. The
// direction→low-point coupling lives in the MOTOR; this only mirrors/inverts.
import {
  uiLowCm, lowXForUiLow, clampUiLow, detentSnap, DETENT, CLUBS,
  springAlpha, UI_LOW_MAX_CM,
} from './geometry-controller.js';
import saHaptics from './sa-haptics.js';
window.saHaptics = saHaptics;   // expose for non-module scripts / tests
import { createScene } from './geo3d/scene.js';
import { createArc } from './geo3d/arc.js';
import { createPlane } from './geo3d/plane.js';
import { createLowpoint } from './geo3d/lowpoint.js';
// ORDRE 2 P2 §6 — the turf strip/bracket (createGroundContact) and the ember
// delivery arrow (createDelivery) are UNWIRED from this scene (modules kept on
// disk). Only the pure ground-crossing solve is still imported — it feeds the
// panel's turf sentence.
import { groundCrossingTheta0, restTheta } from './geo3d/groundcontact.js';
import { createClub } from './geo3d/club.js';
import { createTimeline3d } from './geo3d/timeline.js';
import { createInsetView } from './geo3d/insetview.js';
// Freemium gate: relative imports only (never a bare specifier / import map —
// see the NOTE above, same rule applies to these modules).
import * as saShots from './sa-shots.js';
import * as saIap from './sa-iap.js';
import { openPaywall } from './sa-paywall.js';

const $ = id => document.getElementById(id);

// live swing state
const state = {
  view: 'face', radius: RADIUS, planeAngle: 60, swingDirection: 0,
  lowPoint: { x: 0.04, y: 0, z: 0.016 },   // starts ~Pure
};
// ── shared 2D↔3D swing state (ØKT 2a §2.3) — the 2D Strike Window writes
//    sa.geo.shared on settle; apply it here so 2D→3D lands on the same swing.
//    Guarded + clamped to this screen's slider ranges; defaults if absent.
try {
  const shared = JSON.parse(localStorage.getItem('sa.geo.shared') || 'null');
  if (shared) {
    const cl = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    // GEOMETRY P1 ranges (ordre §Segmentkontroll): plane 45–75, dir ±15,
    // uiLow ±15 cm (clamped in the UI domain — the stance lowPoint.x may
    // legitimately exceed ±15 cm when swingDirection ≠ 0), arc ±5 cm.
    if (Number.isFinite(shared.planeAngle))     state.planeAngle     = cl(shared.planeAngle, 45, 75);
    if (Number.isFinite(shared.swingDirection)) state.swingDirection = cl(shared.swingDirection, -15, 15);
    if (Number.isFinite(shared.lowPointX))      state.lowPoint.x     = shared.lowPointX;
    if (Number.isFinite(shared.lowPointZ))      state.lowPoint.z     = cl(shared.lowPointZ, -0.05, 0.05);
    // EIERORDRE 2026-07-18: ingen stance-omskriving ved rail — den delte
    // stancen bevares eksakt; visningen viser sann uiLow også forbi ±15.
  }
} catch (e) { /* storage unavailable / bad JSON → keep defaults */ }

// ── 3D scene — the default (and only) Geometry scene ──────────────────────
const reduceMotion3d = matchMedia('(prefers-reduced-motion: reduce)').matches;
// FACE-ZOOM PARKED (RE-HERO 2026-07-11): the impact face-zoom / 3D-detail
// choreography is kept in code but no UI trigger fires it. The ?facezoom=1 dev
// flag restores the old grammar (▶ plays the dramatic one-shot with the cut-in)
// for later revival. Default (no flag): the calm continuous loop is the grammar.
const FACEZOOM_ENABLED = new URLSearchParams(location.search).has('facezoom');
let sa3d = null;   // { scene, camera, rig, POSES, applyRig, renderer, invalidate, startTicking, stopTicking }
// gc3d stays declared-but-null (ORDRE 2 P2 §6 — turf strip unwired): every
// existing `if (gc3d)` guard simply no-ops, and the verify hooks return null.
let arc3d = null, plane3d = null, lp3d = null, gc3d = null, club3d = null, timeline3d = null;
let ballTick = null; // FIX J — contact-height ring on the 3D ball (microscope contact marker; hidden from the MAIN pass, see setMainPassHide)
let inset3d = null;  // THE MICROSCOPE — second scissored viewport (geo3d/insetview.js)

function makeBallTick() {
  // short horizontal tick on the ball's camera-facing side (a thin flattened
  // torus arc approximated with a plane strip is overkill — use a slim box
  // "tick" that always faces +Y-ish/camera side, positioned at contact height).
  // OWNER ORDER 2026-07-12 (#5b) — the marker is the microscope's VERDICT
  // carrier now: wider/thicker band (inner 0.60 vs 0.78, sweep 0.7π vs 0.55π,
  // opacity 1) so WHICH strike it is reads instantly by colour in the close-up.
  const geo = new THREE.RingGeometry(BALL_RADIUS_M * 0.60, BALL_RADIUS_M * 0.95, 32, 1, 0, Math.PI * 0.7);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xffffff, toneMapped: false, transparent: true, opacity: 1,
    side: THREE.DoubleSide, depthWrite: false, depthTest: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 9;
  mesh.visible = false;
  return mesh;
}

function init3d() {
  const canvas3d = $('scene3d');
  sa3d = createScene(canvas3d);
  updateSceneRegion(); // ORDRE 2 P2 §4 — main camera renders right of the panel from frame one
  arc3d = createArc(state);
  plane3d = createPlane(state);
  // GEOMETRY P1 (krav 12): no DOM labels — the floating «N cm ahead/behind» /
  // «y +1.6 cm» scene chips are gone; cell values carry the numbers. The 3D
  // bracket geometry itself stays (scene content, not an overlay chip).
  lp3d = createLowpoint(state, null, null);
  club3d = createClub(state);
  ballTick = makeBallTick();
  sa3d.scene.add(arc3d.group, plane3d.group, lp3d.group, club3d.group, ballTick);
  // §6 — the contact ring is the MICROSCOPE's contact marker: visible in the
  // panel close-up (inset pass), hidden from the main scene where it is
  // sub-legible noise on a ~2 cm ball.
  sa3d.setMainPassHide(() => [ballTick]);
  arc3d.group.__invalidate = sa3d.invalidate;
  plane3d.group.__invalidate = sa3d.invalidate;
  club3d.loadPromise.then(() => sa3d.invalidate());

  // THE MICROSCOPE — second scissored viewport, same scene/renderer.
  // Hidden for this pass: the plane/dial group + target line (they'd swamp a
  // close-up) and — ORDRE 2 P2 — the gold measure bracket (lp3d.group): the
  // panel draws its OWN dimension line in the annotation SVG, so the scene
  // bracket crossing the close-up frame was double ink.
  inset3d = createInsetView({ hideNodes: () => [plane3d.group, sa3d.targetLine, lp3d.group] });
  // Pass-1 (Fable): the inset follows the control chrome. When controlsVisible(false)
  // fades the card for the replay/freeze, the scissored GL region kept painting a
  // frameless second closeup (half-state). Suppressing the pass lets the main scene
  // show through — the inset returns whole with the chrome at release.
  sa3d.setInsetPass((renderer, scene, canvas) => { if (!insetSuppressed) inset3d.renderPass(renderer, scene, canvas); });
  updateInsetRect();

  // 3D swing timeline (trail/divot/flash + club/arc placement).
  // controlsVisible is a hoisted function declared later in this module —
  // safe to reference here since it's only ever CALLED after full parse.
  timeline3d = createTimeline3d({
    state, sa3d, arc3d, club3d,
    getReduced: () => matchMedia('(prefers-reduced-motion: reduce)').matches,
    controlsVisible: (show) => controlsVisible(show),
    // FACE-ZOOM band-label chip + one-shot announcement (routed into the single
    // #sceneData live region — a11y guardrail: exactly one polite live region).
    faceZoomChipEl: $('faceZoomChip'),
    faceZoomLiveEl: $('sceneData'),
    // FACE-ZOOM indefinite-hold "tap to continue" hint + dismiss surface
    faceZoomHintEl: $('faceZoomHint'),
    faceZoomDismissEl: canvas3d,
    // FIX K — nodes to hide during the closeup (only club+ball+contact marker+
    // band chip+hint stay visible); DOM labels are hidden separately below.
    // Lazy getter (not a static array) so it can safely reference fx.trail.mesh,
    // which only exists once createTimeline3d's own fx object is constructed —
    // by the time cutIn() actually calls this, timeline3d is fully assigned.
    faceZoomHideNodes: () => [
      arc3d.group, plane3d.group, lp3d.group,
      sa3d.targetLine, timeline3d ? timeline3d.fx.trail.mesh : null,
    ].filter(Boolean),
    faceZoomHideLabels: [$('gc3dLabel')], // P1: the lp scene chips are removed
    // GROUND-STRIKE-BEFORE-BALL — "turf first" cue reuses the existing FIX J
    // turf label (gc3dLabel) for a brief emphasis pulse at the moment the
    // early ground-strike FX fires (see timeline.js pulseGroundStrikeLabel()).
    groundStrikeLabelEl: $('gc3dLabel'),
    facezoomEnabled: FACEZOOM_ENABLED,   // parked unless the ?facezoom=1 dev flag is set
  });

  applyRailOffset(); // P1: control bar is permanent — camera makes room from frame one
  rebuild3d();
  sa3d.invalidate();

  // RE-HERO — the calm continuous loop is the default resting grammar. Under
  // the ?facezoom=1 dev flag we leave the old one-shot on ▶ instead (no auto
  // loop) so the parked face-zoom choreography is reachable for revival work.
  // Reduced-motion: startLoop() no-ops the motion and just poses at address.
  if (!FACEZOOM_ENABLED) timeline3d.startLoop();

  // resize keeps the canvas in sync with the viewport (render-on-demand: just invalidate)
  addEventListener('resize', () => { updateSceneRegion(); updateInsetRect(); sa3d.invalidate(); });

  // The inset's scissor rect mirrors the PANEL's on-screen geometry, which can
  // shift after the initial measure without a window resize: web fonts landing
  // (the foot sentence re-wraps → section heights change) or the panel's own
  // content growing (e.g. the turf line appearing). Re-measure on BOTH — a
  // stale rect draws the zoomed club offset from the panel frame (2026-07-08).
  // The main-scene region follows the panel's measured width the same way.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => { updateSceneRegion(); updateInsetRect(); sa3d.invalidate(); });
  }
  if (typeof ResizeObserver === 'function') {
    const sdCard = $('strikeDetail');
    if (sdCard) new ResizeObserver(() => { updateSceneRegion(); updateInsetRect(); sa3d.invalidate(); }).observe(sdCard);
  }

  // context-loss recovery already wired inside createScene(); force one more
  // render once restored so the scene isn't left blank.
  canvas3d.addEventListener('webglcontextrestored', () => sa3d.invalidate());
}

// ORDRE 2 P2 §4 — the MAIN camera's region starts at the panel's right edge
// (zero overlap): measure the permanent panel's width and hand it to
// scene.js, which scissors the main pass and re-fits aspect/fov to the
// remaining ~65%.
function updateSceneRegion() {
  if (!sa3d) return;
  const card = $('strikeDetail');
  sa3d.setMainRegionLeft(card ? card.getBoundingClientRect().width : 0);
}

// THE MICROSCOPE — measures the #sdViewport panel strip's on-screen rect
// (CSS px) relative to the full-bleed #scene3d canvas, converts to the
// gl viewport/scissor convention (origin bottom-left), and keeps the
// annotation SVG's viewBox in lockstep (1 unit = 1 CSS px) so projectToInset()
// values can be used directly as SVG coordinates with no further offset math.
function updateInsetRect() {
  if (!inset3d) return;
  const vp = $('sdViewport'), canvas3d = $('scene3d');
  if (!vp || !canvas3d) return;
  const vr = vp.getBoundingClientRect(), cr = canvas3d.getBoundingClientRect();
  if (vr.width < 2 || vr.height < 2) return;
  const x = vr.left - cr.left;
  const y = cr.bottom - vr.bottom; // gl viewport/scissor measure y from the BOTTOM
  inset3d.setRect({ x, y, w: vr.width, h: vr.height });
  const svg = $('sdAnnot');
  if (svg) svg.setAttribute('viewBox', `0 0 ${vr.width.toFixed(1)} ${vr.height.toFixed(1)}`);
}

function rebuild3d() {
  if (!sa3d) return;
  arc3d.rewrite();
  const lowestTheta = lp3d.update(state, sa3d.camera, $('scene3d'));
  arc3d.setLowestSegmentGlow(lowestTheta);
  plane3d.update(state, sa3d.camera, $('scene3d'));
  if (club3d) club3d.updateAddress(state);   // address pose follows the sliders live
  updateBallTick(state);
  if (inset3d) { inset3d.updatePose(state); updateStrikeDetail(state); }
  // keep the arc fully inked while idle (only the swing timeline draws it in
  // progressively); avoids a stale partial-ink look if sliders are dragged
  // after a swing without pressing Hit again.
  if (arc3d && (!timeline3d || !timeline3d.isPlaying())) {
    arc3d.coreMat.uniforms.uProgress.value = 1;
    arc3d.glowMat.uniforms.uProgress.value = 1;
  }
  sa3d.invalidate();
}

// FIX J — ball-strike tick/ring: sits on the ball's camera-facing side at the
// contact height (clubBallContact(state).offset, metres, + = high). Hidden
// when the band is Whiff (no ball contact at all).
function updateBallTick(stateRef) {
  if (!ballTick) return;
  const sq = strikeQuality(stateRef);
  if (sq.band === 'Whiff') { ballTick.visible = false; return; }
  const ct = clubBallContact(stateRef);
  const clampedOffset = Math.max(-BALL_RADIUS_M * 0.95, Math.min(BALL_RADIUS_M * 0.95, ct.offset));
  const contactZ = BALL_RADIUS_M + clampedOffset; // world Z of the contact point on the ball
  // ring sits in a plane facing -Y (camera side in FACE view): rotate the ring
  // (built in local XY) so its normal points along -Y, then move it to the
  // ball's front hemisphere at the contact height.
  ballTick.position.set(0, -BALL_RADIUS_M * 0.985, contactZ);
  ballTick.rotation.set(Math.PI / 2, 0, -Math.PI * 0.35); // face -Y, centre the wider arc slice
  // OWNER ORDER 2026-07-12 (#5b) — the marker wears the VERDICT BAND colour
  // (the same §7 token trio as the panel chip: Pure green / Thin·Fat amber /
  // Duff red), not the engine's FX hex — so close-up marker and verdict chip
  // can never disagree. (Whiff never reaches here — hidden above.)
  ballTick.material.color.set((BAND_TOKEN[sq.band] || BAND_TOKEN.Whiff).txt);
  ballTick.visible = true;
}

// ── THE MICROSCOPE panel — verdict chip + footer caption + live SVG
// annotations (hero ball->low-point dimension line, strike-height tick/label,
// optional turf label). All values are read straight from the same
// swing-parameters-and-impact.js functions the rest of the readout already
// uses (strikeQuality/clubBallContact/effectiveLpx), so nothing here can
// disagree with the readout/ball-closeup numbers. ───────────────────────────
// ORDRE 2 P2 §7 — verdict/status colours come from the token trio (--good/
// --warn/--bad), mirroring the 2D Strike Window's BAND_P3 map. The engine's
// own sq.color hexes keep driving 3D FX tints (engine untouched); the PANEL
// text/chip use tokens so negative states are never ember/orange.
const BAND_TOKEN = {
  Pure:  { txt: '#58E6A8', rgb: '88,230,168' },   // --good
  Thin:  { txt: '#FFD056', rgb: '255,208,86' },   // --warn
  Fat:   { txt: '#FFD056', rgb: '255,208,86' },   // --warn
  Top:   { txt: '#FF7B8A', rgb: '255,123,138' },  // --bad
  Duff:  { txt: '#FF7B8A', rgb: '255,123,138' },  // --bad
  Whiff: { txt: '#FF7B8A', rgb: '255,123,138' },  // --bad
};

// Chooses a text-anchor so a label near the LEFT/RIGHT edge of the inset
// grows INWARD instead of clipping past the SVG viewBox (which clips by
// default) — matters at extreme slider values where the low-point/turf
// points can sit close to the frame edge. `preferred` is the anchor used
// everywhere else (away from the edges).
function sdAnchorFor(x, rectW, preferred = 'middle') {
  // thresholds widened 0.16→0.25 (ORDRE 2 P2): the panel viewport is narrower
  // than the old card was wide, and the long turf sentence clipped at the
  // frame edge when centred in the outer band.
  if (x < rectW * 0.25) return 'start';
  if (x > rectW * 0.75) return 'end';
  return preferred;
}

// Long labels (the turf sentence) can still overrun the frame in the middle
// band where sdAnchorFor keeps 'middle'/'start' — this clamps the anchor x by
// the string's measured pixel width so the WHOLE label stays inside the inset
// [pad, rectW-pad], centred as near the target point as it fits. charW ≈ the
// mono advance at the .sd-lb size (11.5px). Only the Fat/Duff turf label is
// long enough to need it today (owner 2026-07-12: "tekst innenfor bildet").
function sdFitLabelX(x, text, rectW, pad = 6) {
  const w = text.length * 7.0;
  if (w >= rectW - 2 * pad) return { x: pad, anchor: 'start' };
  const half = w / 2;
  return { x: Math.max(pad + half, Math.min(rectW - pad - half, x)), anchor: 'middle' };
}

const _sdBall = new THREE.Vector3();
const _sdLp = new THREE.Vector3();
const _sdContact = new THREE.Vector3();
const _sdEntry = new THREE.Vector3();

function updateStrikeDetail(stateRef) {
  const card = $('strikeDetail');
  if (!card || !inset3d) return;
  const sq = strikeQuality(stateRef);
  const ct = clubBallContact(stateRef);
  const cmVal = Math.round(effectiveLpx(stateRef) * 100);
  const mmVal = Math.round(ct.offset * 1000);

  // verdict chip: band + pct, coloured per band from the §7 token trio.
  $('sdChipBand').textContent = sq.band;
  $('sdChipPct').textContent = sq.pct + '%';
  const tok = BAND_TOKEN[sq.band] || BAND_TOKEN.Whiff;
  const chipEl = $('sdChip');
  chipEl.style.color = tok.txt;
  chipEl.style.background = `rgba(${tok.rgb},0.12)`;
  chipEl.style.borderColor = `rgba(${tok.rgb},0.38)`;

  // footer caption + optional turf line (FIX J — only when the low point
  // dips below ground, i.e. Fat/Duff). §7 — the band word carries its verdict
  // token; a "behind" low point is a negative state → --warn, never ember.
  // GEOMETRY P1 — verdict sentence in the mock's grammar (max 2 lines, CSS
  // line-clamp): band — low point N cm ahead/behind, arc ±N.N cm, strike
  // N mm high/low. All numbers straight from the motor (uiLow/clubBallContact).
  const cmText = cmVal === 0 ? 'at the ball' : (cmVal > 0 ? `${cmVal} cm ahead` : `${Math.abs(cmVal)} cm behind`);
  const arcCm = stateRef.lowPoint.z * 100;
  const arcText = (arcCm >= 0 ? '+' : '−') + Math.abs(arcCm).toFixed(1) + ' cm';
  const mmText = Math.abs(mmVal) < 1.5 ? 'centered' : (mmVal > 0 ? `${mmVal} mm high` : `${Math.abs(mmVal)} mm low`);
  const theta0 = groundCrossingTheta0(stateRef);
  let turfText = null;
  if (theta0 != null) {
    const entry = arcPosition(-theta0, stateRef);
    const turfCm = Math.round(entry.x * 100);
    turfText = turfCm <= 0 ? `turf ${Math.abs(turfCm)} cm before ball` : `turf ${turfCm} cm after ball`;
  }
  $('sdFoot').innerHTML = `<b style="color:${tok.txt}">${sq.band}</b> — low point <b${cmVal < 0 ? ' class="neg"' : ''}>${cmText}</b>, arc <b>${arcText}</b>${sq.band === 'Whiff' ? '' : `, strike <b>${mmText}</b>`}.`
    + (turfText ? ` <span class="sd-turf">${turfText}</span>` : '');

  // a11y [a11y-lead]: the group keeps a STATIC aria-label ("Strike detail");
  // the live readout is the visible #sdFoot sentence (announced when the SR
  // user browses into the group). We deliberately do NOT push to an aria-live
  // region (it spammed the SR on every slider tick) nor mutate the group name
  // (which would double-announce against the footer). The "at the ball of the
  // ball" 0cm bug + missing pct in the old summary are moot now.

  // ── live SVG annotations, projected via the inset's own camera ──────────
  const rect = inset3d.getRect();
  const svg = $('sdAnnot');
  if (!svg || rect.w < 4 || rect.h < 4) return;

  _sdBall.set(0, 0, BALL_RADIUS_M);
  const lp = lpWorld(stateRef);
  _sdLp.set(lp.x, lp.y, lp.z);
  const clampedOffset = Math.max(-BALL_RADIUS_M * 0.95, Math.min(BALL_RADIUS_M * 0.95, ct.offset));
  _sdContact.set(0, -BALL_RADIUS_M, BALL_RADIUS_M + clampedOffset);

  const pBall = inset3d.projectToInset(_sdBall);
  const pLp = inset3d.projectToInset(_sdLp);
  const pContact = inset3d.projectToInset(_sdContact);

  const accent = '#D9B36A'; // §7 — --gold: panel annotations are MEASURES (gold), verdicts live in the chip/foot
  const parts = [];

  // (a) hero dimension line: ball -> low point, labelled with the cm value
  // (SAME number effectiveLpx(state) already gives the readout/tip). Pinned
  // near the TOP of the frame (with a floor for very-small separations) so it
  // clears the club/ball cluster rather than sitting right on top of it.
  if (!pBall.behind && !pLp.behind) {
    const topY = Math.max(20, Math.min(pBall.y, pLp.y) - 36);
    const leftX = Math.min(pBall.x, pLp.x), rightX = Math.max(pBall.x, pLp.x);
    const midX = (pBall.x + pLp.x) / 2;
    const cmLabel = cmVal === 0 ? '0 cm' : `${Math.abs(cmVal)} cm`;
    parts.push(
      `<line x1="${pBall.x.toFixed(1)}" y1="${pBall.y.toFixed(1)}" x2="${pBall.x.toFixed(1)}" y2="${topY.toFixed(1)}" stroke="${accent}" stroke-width="1" stroke-dasharray="2 3" opacity=".55"/>`,
      `<line x1="${pLp.x.toFixed(1)}" y1="${pLp.y.toFixed(1)}" x2="${pLp.x.toFixed(1)}" y2="${topY.toFixed(1)}" stroke="${accent}" stroke-width="1" stroke-dasharray="2 3" opacity=".55"/>`,
      `<line x1="${leftX.toFixed(1)}" y1="${topY.toFixed(1)}" x2="${rightX.toFixed(1)}" y2="${topY.toFixed(1)}" stroke="${accent}" stroke-width="1.4"/>`,
      `<path d="M${(leftX - 7).toFixed(1)} ${topY.toFixed(1)} L${leftX.toFixed(1)} ${(topY - 3.5).toFixed(1)} L${leftX.toFixed(1)} ${(topY + 3.5).toFixed(1)} Z" fill="${accent}"/>`,
      `<path d="M${(rightX + 7).toFixed(1)} ${topY.toFixed(1)} L${rightX.toFixed(1)} ${(topY - 3.5).toFixed(1)} L${rightX.toFixed(1)} ${(topY + 3.5).toFixed(1)} Z" fill="${accent}"/>`,
      `<rect x="${(midX - 24).toFixed(1)}" y="${(topY - 21).toFixed(1)}" width="48" height="17" rx="4" fill="#0B0913" stroke="rgba(217,179,106,.38)"/>`,
      `<text x="${midX.toFixed(1)}" y="${(topY - 9).toFixed(1)}" text-anchor="middle" class="sd-lb">${cmLabel}</text>`
    );
  }

  // (LOW POINT text label removed in the density-diet: the arc's warm-white
  // valley hotspot marks the position, the cm number on the dimension line
  // above names the distance, and the gold panel header carries the exact
  // x/y readout — a "LOW POINT" glyph would just clutter the cluster.)

  // (c) strike-height label — the 3D ball already carries a contact-height
  // ring (geometry.html's ballTick); this adds the exact "N mm high/low"
  // callout (hidden on Whiff — no ball contact to mark) with a short leader
  // out to the side so it doesn't sit on top of the LOW POINT label.
  if (sq.band !== 'Whiff' && !pContact.behind) {
    const mx = pContact.x + 20, my = pContact.y - 14;
    parts.push(
      `<line x1="${pContact.x.toFixed(1)}" y1="${pContact.y.toFixed(1)}" x2="${(mx - 3).toFixed(1)}" y2="${(my + 3).toFixed(1)}" stroke="${accent}" stroke-width="1" opacity=".75"/>`,
      `<circle cx="${pContact.x.toFixed(1)}" cy="${pContact.y.toFixed(1)}" r="2" fill="${accent}"/>`,
      `<text x="${mx.toFixed(1)}" y="${my.toFixed(1)}" text-anchor="${sdAnchorFor(mx, rect.w, 'start')}" class="sd-lb">${mmText === 'centered' ? 'center' : mmText}</text>`
    );
  }

  // (d) optional turf entry marker/label (Fat/Duff only)
  if (theta0 != null && turfText) {
    const entry = arcPosition(-theta0, stateRef);
    _sdEntry.set(entry.x, entry.y, 0);
    const pEntry = inset3d.projectToInset(_sdEntry);
    if (!pEntry.behind) {
      const tf = sdFitLabelX(pEntry.x, turfText, rect.w);
      parts.push(
        `<circle cx="${pEntry.x.toFixed(1)}" cy="${pEntry.y.toFixed(1)}" r="3" fill="#9a7b52"/>`,
        `<text x="${tf.x.toFixed(1)}" y="${(pEntry.y - 8).toFixed(1)}" text-anchor="${tf.anchor}" class="sd-lb sd-lb-soil">${turfText}</text>`
      );
    }
  }

  svg.innerHTML = parts.join('');
}

const els = {
  chipAtkTx: $('chipAtkTx'), chipPathTx: $('chipPathTx'), chipStrikeTx: $('chipStrikeTx'),
  tvPlane: $('tvPlane'), tvDir: $('tvDir'), tvLow: $('tvLow'), tvArc: $('tvArc'),
};
const sgn = (v, dec) => (v >= 0 ? '+' : '−') + Math.abs(v).toFixed(dec);

// ── strike readout ──────────────────────────────────────────────────────
// GEOMETRY P1: the visible readout = the chips-rad (ATTACK/PATH/STRIKE, motor
// output exactly — krav 4) + the four cell values + the microscope panel
// (#sdChip/#sdFoot). renderReadout() runs every smoothing frame while values
// chase their targets, so it must stay cheap and silent. The verbose sr-only
// #sceneData sentence is emitted separately by announceSceneData(), debounced
// to drag-end (a11y M1). Sign flips flash the chip (krav 11 — values roll
// smoothly through 0 via the spring; the flash marks the crossing).
let lastSign = { attack: null, path: null, strike: null };
function renderReadout() {
  const di = deriveImpact(state);
  const sq = strikeQuality(state);
  const ct = clubBallContact(state);
  els.chipAtkTx.textContent = sgn(di.attackAngle, 1) + '°';
  els.chipPathTx.textContent = sgn(di.clubPath, 1) + '°';
  const mmVal = ct.offset * 1000;
  els.chipStrikeTx.textContent = sq.band === 'Whiff'
    ? '—'
    : Math.abs(mmVal).toFixed(0) + ' mm ' + (mmVal >= 0 ? 'high' : 'low');
  // cell values (LOW POINT X = uiLow ≡ effectiveLpx — kontrakt §3.1)
  els.tvPlane.textContent = state.planeAngle.toFixed(0) + '°';
  els.tvDir.textContent = sgn(state.swingDirection, 1) + '°';
  els.tvLow.textContent = sgn(uiLowCm(state), 0) + ' cm';
  els.tvArc.textContent = sgn(state.lowPoint.z * 100, 1) + ' cm';
  // zero-flash on sign change (mock choreography)
  const signs = { attack: Math.sign(di.attackAngle), path: Math.sign(di.clubPath), strike: sq.band === 'Whiff' ? 0 : Math.sign(mmVal) };
  const chipEls = { attack: $('chipAttack'), path: $('chipPath'), strike: $('chipStrike') };
  for (const k of ['attack', 'path', 'strike']) {
    if (lastSign[k] !== null && signs[k] !== lastSign[k] && signs[k] !== 0 && !reduce) {
      const c = chipEls[k];
      c.classList.remove('zero'); void c.offsetWidth; c.classList.add('zero');
    }
    lastSign[k] = signs[k];
  }
}

// sr-only #sceneData — THE single polite live region for this view (a11y
// guardrail: exactly one). Fired on settle (drag-end / keyboard-step commit),
// never per animation frame, so a screen reader hears ONE tidy scene sentence
// per change instead of a flood. The face-zoom verdict is routed here too.
function announceSceneData() {
  const sq = strikeQuality(state);
  const di = deriveImpact(state);
  const lpx = uiLowCm(state); // uiLow — the same number the LOW POINT X cell shows (kontrakt §3.1)
  const lpDesc = Math.abs(lpx) < 0.1 ? 'at the ball'
    : (Math.abs(lpx).toFixed(0) + ' cm ' + (lpx >= 0 ? 'ahead of the ball' : 'behind the ball'));
  $('sceneData').textContent =
    `Strike ${sq.band}, ${sq.pct}%. Plane angle ${state.planeAngle} degrees. ` +
    `Attack angle ${di.attackAngle.toFixed(1)} degrees ${di.attackAngle >= 0 ? 'up' : 'down'}. ` +
    `Club path ${di.clubPath.toFixed(1)} degrees. Low point ${lpDesc}.`;
}

// ── init ──────────────────────────────────────────────────────────────────
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
renderReadout();
announceSceneData();

// ── fade the control surfaces during play for a clean ball-strike view ────
// The HUD chips stay visible during play (matches the old in-canvas chips).
const CONTROL_SEL = '.controls, #controlBar, #chipsRow, .modnav, .strike-detail';
let insetSuppressed = false; // Pass-1 (Fable): GL inset follows the chrome fade
function controlsVisible(show) {
  insetSuppressed = !show;
  if (sa3d) sa3d.invalidate();
  const nodes = document.querySelectorAll(CONTROL_SEL);
  if (reduce) { nodes.forEach(n => { n.style.opacity = show ? '' : '0'; n.style.pointerEvents = show ? '' : 'none'; }); return; }
  nodes.forEach(n => {
    gsap.to(n, { opacity: show ? 1 : 0, duration: show ? 0.4 : 0.3, ease: show ? 'power2.out' : 'power1.in',
      onStart: () => { if (!show) n.style.pointerEvents = 'none'; },
      onComplete: () => { if (show) { n.style.pointerEvents = ''; n.style.opacity = ''; } } });
  });
  // (ORDRE 2 P2 §6 — the delivery arrow is unwired from this scene entirely;
  // geo3d/delivery.js stays on disk for possible revival.)
}

// ── §2.5 transient pose-name slate: names the view the moment it settles,
// then fades. A subtle per-view tilt gives it the aligned-to-camera character
// (the tilt-to-camera parallax; ≤4°, a cheap 2D transform, not 3D text).
let poseNameTimer = null;
function showPoseName(view) {
  const el = $('poseName');
  if (!el) return;
  el.textContent = view === 'dtl' ? 'Down the line' : 'Face-on';
  el.style.setProperty('--pn-tilt', (view === 'dtl' ? 1.6 : -1.6) + 'deg');
  el.classList.add('is-visible');
  clearTimeout(poseNameTimer);
  poseNameTimer = setTimeout(() => el.classList.remove('is-visible'), 1700);
}

// ── 3D: camera orbit between FACE/DTL poses ────────────────────────────────
let viewTween3d = null;
function animate3dView(toView) {
  if (!sa3d) return;
  const pose = sa3d.POSES[toView];
  if (reduceMotion3d) {
    Object.assign(sa3d.rig, pose);
    sa3d.applyRig();
    sa3d.invalidate();
    return;
  }
  if (viewTween3d) viewTween3d.kill();
  sa3d.startTicking();
  viewTween3d = gsap.to(sa3d.rig, {
    ...pose, duration: 0.7, ease: 'power2.inOut',
    onUpdate: () => { sa3d.applyRig(); lp3d && lp3d.placeLabel(sa3d.camera, $('scene3d')); },
    onComplete: () => { viewTween3d = null; sa3d.stopTicking(); },
  });
}

// ── GEOMETRY P1 — the control bar is PERMANENT, so the camera-makes-room
// offset (old FIX M tween) is applied once at init: the look-at target drops
// so the scene (arc/ball/contact) composes fully above the bar (krav 2).
const RAIL_OFFSET_Z = -0.5; // metres the look-at target drops (FIX M calibration kept)
function applyRailOffset() {
  if (!sa3d) return;
  sa3d.setTargetOffset({ z: RAIL_OFFSET_Z });
  sa3d.applyRig();
  sa3d.invalidate();
}

// ── §2.3 Free orbit + idle telescope drift ────────────────────────────────
// One-finger drag orbits the rig (clamped azimuth/elevation, inertia, magnetic
// pose snap); two-finger pinch dollies within ±18% of the pose distance; [ / ]
// step azimuth 15°. When idle >6s (motion allowed + page visible) the rig
// breathes a ±1.5° / 14s telescope drift via sa3d.camOffset (any input kills
// it). FACE/DTL buttons still tween the same rig (animate3dView, untouched).
function initCameraGestures() {
  const canvas = $('scene3d');
  const AZ_MIN = -160, AZ_MAX = -50, EL_MIN = 6, EL_MAX = 28;
  const SNAP_DEG = 12, DOLLY_FRAC = 0.18;
  const DRAG_AZ_GAIN = 0.34, DRAG_EL_GAIN = 0.24;
  const clampN = (v, a, b) => Math.max(a, Math.min(b, v));

  const pointers = new Map();
  let dragging = false, lastX = 0, lastY = 0;
  let velAz = 0, velEl = 0;
  let pinchStartGap = 0, pinchStartDist = 0;
  let snapTween = null;
  let lastDecision = null; // {kind:'snap'|'momentum', pose?, target} — verification hook

  function placeLabels() {
    if (lp3d) lp3d.placeLabel(sa3d.camera, canvas);
  }
  function applyAndPlace() { sa3d.applyRig(); placeLabels(); }
  function gestureBlocked() {
    return !!(timeline3d && (timeline3d.isPlaying() || timeline3d.faceZoom.isActive()));
  }
  function nearestPose() {
    let best = null, bestD = SNAP_DEG + 1;
    for (const v of ['face', 'dtl']) { const d = Math.abs(sa3d.rig.az - sa3d.POSES[v].az); if (d < bestD) { bestD = d; best = v; } }
    return bestD <= SNAP_DEG ? best : null;
  }
  function setViewState(v) {
    state.view = v;
    $('viewBtn').setAttribute('aria-pressed', String(v === 'dtl'));
    $('viewBtn').title = v === 'dtl' ? 'Down-the-line' : 'Front';
    showPoseName(v); // §2.5 — name the view as the magnetic snap lands it
  }
  // Glide the base rig into a named pose (gravitational ease). Assumes the
  // caller already startTicking()'d; the tween's onComplete stopTicking()s.
  function glideToPose(v) {
    const pose = sa3d.POSES[v];
    lastDecision = { kind: 'snap', pose: v, target: +pose.az.toFixed(3) };
    setViewState(v);
    if (reduceMotion3d) { sa3d.rig.az = pose.az; sa3d.rig.el = pose.el; applyAndPlace(); sa3d.invalidate(); sa3d.stopTicking(); return; }
    if (snapTween) snapTween.kill();
    // onComplete AND onInterrupt both settle the ticker so the one startTicking()
    // that preceded this glide is always balanced (never leaks a live ticker →
    // renderCount would otherwise keep climbing at idle).
    let settled = false;
    const settle = () => { if (settled) return; settled = true; snapTween = null; sa3d.stopTicking(); sa3d.invalidate(); };
    snapTween = gsap.to(sa3d.rig, { az: pose.az, el: pose.el, duration: 0.6, ease: 'power3.out',
      onUpdate: applyAndPlace, onComplete: settle, onInterrupt: settle });
  }
  // Release momentum: project a resting az/el from the exit velocity, then let
  // a magnetic pose (within SNAP_DEG of the projection) absorb it — a single
  // gsap glide (decelerating = inertia feel) rather than a hand-rolled rAF loop
  // (more robust to background rAF throttling, and it settles the ticker
  // deterministically via onComplete/onInterrupt). Assumes the caller already
  // startTicking()'d (onDown did).
  const MOMENTUM = 9;
  function releaseWithMomentum() {
    const projAz = clampN(sa3d.rig.az + velAz * MOMENTUM, AZ_MIN, AZ_MAX);
    const projEl = clampN(sa3d.rig.el + velEl * MOMENTUM, EL_MIN, EL_MAX);
    let snapV = null, bestD = SNAP_DEG + 1;
    for (const v of ['face', 'dtl']) { const d = Math.abs(projAz - sa3d.POSES[v].az); if (d < bestD) { bestD = d; snapV = d <= SNAP_DEG ? v : null; } }
    if (snapV) { glideToPose(snapV); return; }
    lastDecision = { kind: 'momentum', target: +projAz.toFixed(3) };
    if (snapTween) snapTween.kill();
    let settled = false;
    const settle = () => { if (settled) return; settled = true; snapTween = null; sa3d.stopTicking(); sa3d.invalidate(); };
    snapTween = gsap.to(sa3d.rig, { az: projAz, el: projEl, duration: 0.55, ease: 'power2.out',
      onUpdate: applyAndPlace, onComplete: settle, onInterrupt: settle });
  }

  function onDown(e) {
    // §2.4 — ANY pointer on the scene is a "next input": clear the held verdict
    // even when the gesture itself is blocked (e.g. during the finish tween).
    // Pass-2 (Fable): moved above the guard — the guard previously swallowed it.
    if (timeline3d && timeline3d.faceZoom) timeline3d.faceZoom.hideVerdict();
    if (gestureBlocked()) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size === 1) {
      dragging = true; lastX = e.clientX; lastY = e.clientY; velAz = 0; velEl = 0;
      if (snapTween) { snapTween.kill(); snapTween = null; }
      sa3d.startTicking();
      try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
    } else if (pointers.size === 2) {
      const pts = [...pointers.values()];
      pinchStartGap = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1;
      pinchStartDist = sa3d.rig.dist;
    }
  }
  function onMove(e) {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size >= 2) {
      const pts = [...pointers.values()];
      const gap = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1;
      const ref = sa3d.POSES[state.view].dist;
      sa3d.rig.dist = clampN(pinchStartDist * (pinchStartGap / gap), ref * (1 - DOLLY_FRAC), ref * (1 + DOLLY_FRAC));
      applyAndPlace(); sa3d.invalidate();
      return;
    }
    if (!dragging) return;
    const dAz = (e.clientX - lastX) * DRAG_AZ_GAIN;
    const dEl = -(e.clientY - lastY) * DRAG_EL_GAIN;
    lastX = e.clientX; lastY = e.clientY;
    sa3d.rig.az = clampN(sa3d.rig.az + dAz, AZ_MIN, AZ_MAX);
    sa3d.rig.el = clampN(sa3d.rig.el + dEl, EL_MIN, EL_MAX);
    velAz = clampN(dAz, -4, 4); velEl = clampN(dEl, -3, 3);
    applyAndPlace(); sa3d.invalidate();
  }
  function onUp(e) {
    if (!pointers.has(e.pointerId)) return;
    pointers.delete(e.pointerId);
    try { canvas.releasePointerCapture(e.pointerId); } catch (err) {}
    if (pointers.size >= 1) { const rem = [...pointers.values()][0]; lastX = rem.x; lastY = rem.y; dragging = pointers.size === 1; return; }
    if (!dragging) return;
    dragging = false;
    if (reduceMotion3d) { const p = nearestPose(); if (p) { sa3d.rig.az = sa3d.POSES[p].az; sa3d.rig.el = sa3d.POSES[p].el; setViewState(p); applyAndPlace(); sa3d.invalidate(); } sa3d.stopTicking(); return; }
    if (Math.abs(velAz) > 0.05 || Math.abs(velEl) > 0.05) releaseWithMomentum();
    else { const p = nearestPose(); if (p) glideToPose(p); else sa3d.stopTicking(); }
  }
  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointermove', onMove);
  canvas.addEventListener('pointerup', onUp);
  canvas.addEventListener('pointercancel', onUp);

  let keyTween = null, keyTargetAz = null;
  window.addEventListener('keydown', (e) => {
    if (e.key !== '[' && e.key !== ']') return;
    if (gestureBlocked()) return;
    // accumulate off the pending target (not the live mid-tween az) so rapid
    // presses actually step 15° EACH, not collapse into one step.
    const base = (keyTween && keyTargetAz != null) ? keyTargetAz : sa3d.rig.az;
    keyTargetAz = clampN(base + (e.key === ']' ? 15 : -15), AZ_MIN, AZ_MAX);
    if (reduceMotion3d) { sa3d.rig.az = keyTargetAz; keyTargetAz = null; applyAndPlace(); sa3d.invalidate(); return; }
    sa3d.startTicking();
    if (keyTween) keyTween.kill();
    let settled = false;
    const settle = () => { if (settled) return; settled = true; sa3d.stopTicking(); };
    keyTween = gsap.to(sa3d.rig, { az: keyTargetAz, duration: 0.3, ease: 'power2.out',
      onUpdate: applyAndPlace,
      onComplete: () => { keyTween = null; keyTargetAz = null; settle(); sa3d.invalidate(); },
      onInterrupt: settle });
  });

  // ── idle telescope drift (±1.5°, 14s period, ~30fps) ──
  let idleTimer = 0, driftRaf = 0, driftStart = 0, driftLastFrame = 0;
  function stopDrift() {
    if (driftRaf) { cancelAnimationFrame(driftRaf); driftRaf = 0; }
    if (sa3d.camOffset.az !== 0) { sa3d.setCamOffset({ az: 0 }); sa3d.applyRig(); placeLabels(); sa3d.invalidate(); }
  }
  function driftLoop(t) {
    if (document.hidden) { driftRaf = 0; return; }
    if (t - driftLastFrame >= 33) {
      driftLastFrame = t;
      sa3d.setCamOffset({ az: 1.5 * Math.sin(2 * Math.PI * (t - driftStart) / 14000) });
      sa3d.applyRig(); placeLabels(); sa3d.invalidate();
    }
    driftRaf = requestAnimationFrame(driftLoop);
  }
  function startDrift() {
    if (reduceMotion3d || document.hidden) return;
    // RE-HERO (2026-07-11): in the default loop grammar the continuous swing IS
    // the ambient motion, and the loop's idle-freeze must return to true
    // render-on-demand for battery. A second idle rAF (the telescope drift)
    // would keep rendering and defeat that freeze, so it only runs under the
    // ?facezoom=1 dev grammar (where the scene is otherwise static at address).
    if (!FACEZOOM_ENABLED) return;
    if (gestureBlocked()) { idleTimer = setTimeout(startDrift, 2000); return; }
    if (driftRaf) return;
    driftStart = performance.now(); driftLastFrame = 0;
    driftRaf = requestAnimationFrame(driftLoop);
  }
  // noteActivity also feeds the RE-HERO loop: any interaction resets the loop's
  // idle counter and resumes it if it had frozen at address (battery guard).
  function noteActivity() {
    stopDrift(); clearTimeout(idleTimer); idleTimer = setTimeout(startDrift, 6000);
    if (timeline3d) timeline3d.noteInteraction();
  }
  document.addEventListener('pointerdown', noteActivity, true);
  document.addEventListener('keydown', noteActivity, true);
  document.addEventListener('wheel', noteActivity, { capture: true, passive: true });
  document.addEventListener('visibilitychange', () => {
    if (timeline3d) timeline3d.setDocHidden(document.hidden); // battery — pause loop while hidden
    if (document.hidden) stopDrift(); else noteActivity();
  });
  const lensSlider = $('slider');
  if (lensSlider) lensSlider.addEventListener('input', noteActivity);
  noteActivity();

  // test/verify hooks
  window.__saOrbit = {
    clamps: { AZ_MIN, AZ_MAX, EL_MIN, EL_MAX, SNAP_DEG, DOLLY_FRAC },
    driftActive: () => !!driftRaf,
    camOffsetAz: () => sa3d.camOffset.az,
    stepKey: (k) => window.dispatchEvent(new KeyboardEvent('keydown', { key: k })),
    lastDecision: () => lastDecision,
    forceSettle: () => { if (window.gsap) window.gsap.globalTimeline.getChildren(true, true, false).forEach(t => { try { t.progress(1); } catch (e) {} }); },
  };
}

// ── shared swing-state → localStorage (consumed by impact.html) ───────────
function writeSwingState() {

// ── GEOMETRY P1 — lens control plane (kontrakt §3) ────────────────────────
// clubContext flag (kontrakt §6): P1 always 'iron'; ALL club-dependent logic
// reads the CLUBS lookup — when the driver asset lands, only the toggle's
// flag-hiding is removed.
const clubContext = 'iron';
const CLUB = CLUBS[clubContext];

const LENS = {
  plane: { min: 45, max: 75, step: 1, major: 5, token: 'var(--q-plane)', label: 'Plane angle', affects: ['attack', 'path'] },
  dir: { min: -15, max: 15, step: 0.1, major: 5, token: 'var(--q-path)', label: 'Swing direction', affects: ['attack', 'path', 'strike'] },
  low: { min: -15, max: 15, step: 0.5, major: 5, token: 'var(--q-attack)', label: 'Low point X, ahead or behind the ball', affects: ['attack', 'path', 'strike'] },
  arc: { min: -5, max: 5, step: 0.1, major: 1, token: 'var(--q-strike)', label: 'Arc height', affects: ['strike'] },
};
let lens = 'low';

// Targets vs displayed (kontrakt §5): the slider writes the TARGET immediately
// (input mapping uses raw values — smoothing sits between target and display,
// never between UI and motor input). The displayed values V chase T with the
// time-based spring (τ=84 ms; 120 Hz-safe), and the shared `state` object the
// 3D modules hold is refreshed from V each smoothing frame. lowX is the
// STANCE (motor input, metres) — it stands still under direction-drag; the
// shown uiLow is towed by the motor itself (effectiveLpx).
const T = { plane: state.planeAngle, dir: state.swingDirection, lowX: state.lowPoint.x, arc: state.lowPoint.z * 100 };
const V = { ...T };
const tState = () => ({ radius: state.radius, planeAngle: T.plane, swingDirection: T.dir, lowPoint: { x: T.lowX, y: 0, z: T.arc / 100 } });
const targetUiLow = () => uiLowCm(tState());

function applyV() {
  state.planeAngle = V.plane;
  state.swingDirection = V.dir;
  state.lowPoint.x = V.lowX;
  state.lowPoint.z = V.arc / 100;
}

let springRaf = 0, springLastT = 0;
function springStep(t) {
  // dt clamped to [0,100]: the first rAF timestamp can precede the
  // performance.now() taken in startSpring (frame-start timestamps) — a
  // negative dt would flip alpha's sign and kick V backwards one frame.
  const a = reduce ? 1 : springAlpha(Math.max(0, Math.min(t - springLastT, 100)));
  springLastT = t;
  let done = true;
  for (const k of ['plane', 'dir', 'lowX', 'arc']) {
    const dv = T[k] - V[k];
    const eps = k === 'lowX' ? 0.0002 : 0.02;
    if (Math.abs(dv) > eps) { V[k] += dv * a; done = false; } else { V[k] = T[k]; }
  }
  applyV();
  renderReadout();
  rebuild3d();
  if (done) { springRaf = 0; writeSwingState(); }
  else springRaf = requestAnimationFrame(springStep);
}
function startSpring() {
  if (springRaf) return;
  springLastT = performance.now();
  springRaf = requestAnimationFrame(springStep);
}

let sceneDataTimer = 0;
function applyLive() {
  // §2.4 — a slider change is a "next input": clear the held verdict plaque.
  if (timeline3d && timeline3d.faceZoom && !timeline3d.isPlaying()) timeline3d.faceZoom.hideVerdict();
  // a11y M1 — the verbose sr-only #sceneData sentence is debounced to drag-end
  // (fires ~350ms after the LAST input), so screen readers get one clean
  // announcement per change. VISIBLE marks update every smoothing frame.
  clearTimeout(sceneDataTimer);
  sceneDataTimer = setTimeout(announceSceneData, 350);
  startSpring();
}
// ── slider visuals: accent fill from min to thumb (ordre §Segmentkontroll) ──
const TRACK_BASE = 'rgba(255,255,255,.14)';
const slider = $('slider');
function updateSliderFill() {
  const pct = 100 * (slider.value - slider.min) / ((slider.max - slider.min) || 1);
  slider.style.setProperty('--track-bg',
    `linear-gradient(90deg, var(--lens) 0 ${pct.toFixed(2)}%, ${TRACK_BASE} ${pct.toFixed(2)}% 100%)`);
}

// ── track-referanser (eierordre 2026-07-18): tick-stripen er erstattet av én
// midtstrek (statisk CSS — 50 % = 0 for dir/low/arc, 60° for plane) + pure-
// sonen tegnet i selve slider-sporet i low-linsen (krav 8 bevart — fortsatt
// bundet til MOTOR-konstantene via CLUB.pureZoneCm, +2..+15 for jern).
function updateTrackRefs() {
  const c = LENS[lens], band = $('pureBand');
  if (lens !== 'low') { band.hidden = true; return; }
  const [z1, z2] = CLUB.pureZoneCm;
  const f = v => (v - c.min) / (c.max - c.min) * 100;
  band.style.left = f(z1).toFixed(2) + '%';
  band.style.width = (f(z2) - f(z1)).toFixed(2) + '%';
  band.hidden = false;
}

// ── lens switch: slider range/accent, cell states, chip dimming (krav 6) ───
function lensSliderValue() {
  if (lens === 'plane') return T.plane;
  if (lens === 'dir') return T.dir;
  if (lens === 'arc') return T.arc;
  return clampUiLow(targetUiLow()).uiLow;
}
function applyLens(next) {
  lens = next;
  const c = LENS[lens];
  $('controlBar').style.setProperty('--lens', c.token);
  slider.min = c.min; slider.max = c.max; slider.step = c.step;
  slider.value = lensSliderValue();
  slider.setAttribute('aria-label', c.label);
  slider.setAttribute('aria-valuetext', cellValueText());
  document.querySelectorAll('.cell').forEach(b => {
    const on = b.dataset.c === lens;
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', String(on));
  });
  ['attack', 'path', 'strike'].forEach(k => {
    $('chip' + k[0].toUpperCase() + k.slice(1)).classList.toggle('off', !c.affects.includes(k));
  });
  updateSliderFill();
  updateTrackRefs();
  snapped = Math.abs(+slider.value) < 1e-9;
}
function cellValueText() {
  if (lens === 'plane') return T.plane.toFixed(0) + '°';
  if (lens === 'dir') return sgn(T.dir, 1) + '°';
  if (lens === 'arc') return sgn(T.arc, 1) + ' cm';
  return sgn(clampUiLow(targetUiLow()).uiLow, 0) + ' cm';
}
document.querySelectorAll('.cell').forEach(b => b.addEventListener('click', () => applyLens(b.dataset.c)));

// ── ringeffekt (ordre §Ringeffekt, kontrakt §3.1): under direction/plane drag
// the STANCE (T.lowX) holds and the motor itself tows the shown uiLow; the
// controller only reflects the coupling (pulse) and clamps at ±15 (rail —
// stance recomputed so effectiveLpx sits exactly on the rail). No towing
// formula here — double-towing is an escalation condition, not a feature.
function reflectTow(uiLowBefore) {
  const raw = targetUiLow();
  if (Math.abs(raw - uiLowBefore) < 1e-6) return; // plane drag with dir=0 → no coupling
  // EIERORDRE 2026-07-18: stance-omskrivingen ved rail er FJERNET — den ga
  // hysterese (målt: low −10 → dir-rail-roundtrip → low −0). Cellen viser nå
  // den SANNE verdien også forbi ±15 (uiLow ≡ effectiveLpx holder overalt);
  // slideren forblir sette-instrument ±15, og rail-pulsen betyr «utenfor
  // slider-område». Full reversibilitet: stance røres aldri av dir/plane.
  const { railed } = clampUiLow(raw);
  const lc = document.querySelector('.cell[data-c="low"]');
  if (!reduce && lc) {
    const cls = railed ? 'rail' : 'towed';
    lc.classList.remove('rail', 'towed'); void lc.offsetWidth; lc.classList.add(cls);
  }
}

// ── slider input: detent-snap → target write → tow reflection → pings ──────
let lastPing = 0, snapped = false;
slider.addEventListener('input', () => {
  let v = parseFloat(slider.value);
  const win = DETENT[lens] || 0;
  const snappedV = detentSnap(v, win);
  if (snappedV !== v) {
    v = snappedV; slider.value = v;
    if (!snapped) { snapped = true; saHaptics.tick(lens); } // krav 7 — one tick at the detent
  } else if (win > 0) snapped = false;
  const uiLowBefore = targetUiLow();
  if (lens === 'plane') T.plane = v;
  else if (lens === 'dir') T.dir = v;
  else if (lens === 'arc') T.arc = v;
  else T.lowX = lowXForUiLow(v, tState()); // invers av effectiveLpx (kontrakt §3.1)
  if (lens === 'dir' || lens === 'plane') reflectTow(uiLowBefore);
  slider.setAttribute('aria-valuetext', cellValueText());
  updateSliderFill();
  // chip ping on the affected outcomes, throttled (mock: 260 ms)
  const now = performance.now();
  if (now - lastPing > 260 && !reduce) {
    lastPing = now;
    LENS[lens].affects.forEach(k => {
      const chip = $('chip' + k[0].toUpperCase() + k.slice(1));
      chip.classList.remove('ping'); void chip.offsetWidth; chip.classList.add('ping');
    });
  }
  applyLive();
});

// STAGE 4 — haptics on the single lens slider: whole-unit crossings (degree
// or cm — every lens uses whole units) → tick, strikeQuality band change →
// band (suppresses the coincident tick). Same grammar as before P1.
(function wireSliderHaptics() {
  let lastGrain = null, lastBand = null;
  slider.addEventListener('pointerdown', () => {
    lastGrain = Math.round(+slider.value);
    lastBand = strikeQuality(tState()).band;
    saHaptics.selectionStart();
  });
  slider.addEventListener('input', () => {
    const g = Math.round(+slider.value);
    if (lastGrain === null) lastGrain = g;
    const band = strikeQuality(tState()).band;
    if (lastBand === null) lastBand = band;
    if (band !== lastBand) {
      lastBand = band; lastGrain = g;
      saHaptics.band(lens);
    } else if (g !== lastGrain) {
      lastGrain = g;
      saHaptics.tick(lens);
    }
  });
  const end = () => saHaptics.selectionEnd();
  slider.addEventListener('pointerup', end);
  slider.addEventListener('pointercancel', end);
})();

// ── 3D: ghost arc (frozen snapshot on drag start) + shimmer on change ────────
// ── 3D: ghost arc (frozen snapshot on drag start) + plane aiming numerals ──
slider.addEventListener('pointerdown', () => {
  if (!arc3d) return;
  arc3d.snapshotGhost();
  sa3d.invalidate();
  if (lens === 'plane' && plane3d) plane3d.aimHold(window.gsap, reduceMotion3d);
});
const releaseGhost = () => {
  if (!arc3d) return;
  arc3d.fadeGhost(window.gsap, reduceMotion3d);
  if (plane3d) plane3d.aimRelease(window.gsap, reduceMotion3d);
};
slider.addEventListener('pointerup', releaseGhost);
slider.addEventListener('pointercancel', releaseGhost);
// ØKT 2.3 — aiming numerals: keyboard/AT adjustments fire `input` without any
// pointerdown, so pulse the fade-in from here too.
slider.addEventListener('input', () => { if (lens === 'plane' && plane3d) plane3d.aimPulse(window.gsap, reduceMotion3d); });
// FX-on-change (RE-HERO): a settle with a CHANGED value arms ONE band-correct
// impact response on the loop's next impact pass.
slider.addEventListener('change', () => { if (timeline3d) timeline3d.armImpactFx(); });

// initial lens + values from state; tickstrip is width-dependent
applyLens('low');
renderReadout();
addEventListener('resize', () => { updateSliderFill(); });
writeSwingState();   // seed shared state so Impact reflects the current swing immediately

// ── controls ──────────────────────────────────────────────────────────────
$('viewBtn').addEventListener('click', () => {
  const to = state.view === 'face' ? 'dtl' : 'face';
  $('viewBtn').setAttribute('aria-pressed', String(to === 'dtl'));
  $('viewBtn').title = to === 'dtl' ? 'Down-the-line' : 'Front';
  state.view = to;
  animate3dView(to);
  showPoseName(to);
});
// freemium "N free shots left" pill — visible only in the tail of the free
// window (saShots.shouldNudge()); toggled on load and after every counted play.
function refreshNudge() {
  const el = $('saNudge');
  if (!el) return;
  if (saShots.shouldNudge()) {
    const n = saShots.remaining();
    el.textContent = n === 1 ? '1 free shot left' : `${n} free shots left`;
    el.hidden = false;
  } else {
    el.hidden = true;
  }
}

// RE-HERO (2026-07-11): the continuous loop is the default grammar, so the ▶
// control now PAUSES / RESUMES that calm loop (icon swaps play/pause). It is no
// longer a "play one shot" trigger and no longer records a freemium shot — the
// loop is ambient, not a counted play. Under the ?facezoom=1 dev flag we keep
// the old one-shot grammar (with the parked face-zoom restored + shot gating).
const HIT_PLAY_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><path d="M8 5.5v13a1 1 0 0 0 1.5.87l11-6.5a1 1 0 0 0 0-1.74l-11-6.5A1 1 0 0 0 8 5.5z"/></svg>';
const HIT_PAUSE_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none" aria-hidden="true"><rect x="7" y="5" width="3.4" height="14" rx="1"/><rect x="13.6" y="5" width="3.4" height="14" rx="1"/></svg>';

  const b = $('hit');

  b.setAttribute('aria-label', paused ? 'Resume the looping swing' : 'Pause the looping swing');
  b.setAttribute('aria-pressed', String(paused));

$('hit').addEventListener('click', () => {
  if (FACEZOOM_ENABLED) {

// initial control icon: pause-glyph while the loop is the live default grammar;
// play-glyph under the dev flag / reduced-motion (where ▶ is a start trigger).
if (!FACEZOOM_ENABLED && !reduceMotion3d) setHitIcon(false);
// (ORDRE 2 P2 §4 — the strike show/hide toggle was removed with its button:
// the microscope panel is permanent.)

init3d();
initCameraGestures();   // §2.3 free orbit + idle telescope drift
// §2.4 — ghost-trail verification hook
window.__saGhosts = { count: () => (timeline3d && timeline3d.ghosts ? timeline3d.ghosts.count() : 0) };
saIap.init();     // no-op on web; wires RevenueCat entitlement on native
refreshNudge();   // reflect any shots already used this session on load

      const bbox = (pts) => { let a = Infinity, b = Infinity, c = -Infinity, d = -Infinity;

        return { left: a, top: b, right: c, bottom: d }; };
      const r = BALL_RADIUS_M;
      const ball = bbox([P(-r, 0, r), P(r, 0, r), P(0, 0, 0), P(0, 0, 2 * r), P(0, -r, r), P(0, r, r)]);
      const sweep = deg2rad(48), arcPts = [];
      for (let i = 0; i <= 48; i++) { const th = -sweep + 2 * sweep * (i / 48); const p = arcPosition(th, state); arcPts.push(P(p.x, p.y, p.z)); }
      const arc = bbox(arcPts);
      const low = arcPosition(0, state), lowPx = P(low.x, low.y, low.z);

      return { ball, arc, marker, chipX: chip('lp3dLabel'), chipY: chip('lpy3dLabel'),
        region: { left: rect.left + rl, top: rect.top, right: rect.right, bottom: rect.bottom } };

    view: () => (sa3d ? sa3d.rig : null),
    invalidate: () => sa3d && sa3d.invalidate(),
    // Aim-numeral verification hook — EIERORDRE 2026-07-17: gradereferansene

    // strikes) — theta + world point so headless rigs can assert
    // club().position ≈ restPose().world per band after rebuild3d.
    restPose: () => ({ theta: restTheta(state), world: arcPosition(restTheta(state), state) }),
