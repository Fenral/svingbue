<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07060C">
<meta name="robots" content="noindex">
<title>Flightglass — Night Ladder</title>
<link rel="icon" href="./assets/flightglass-mark-micro.svg" type="image/svg+xml">
<link rel="preload" as="image" href="./assets/range-night-3d-33.png">
<link rel="stylesheet" href="./sa-p3.css">
<style>
  @view-transition{navigation:auto}
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg)}
  body{min-width:320px;min-height:100dvh;color:var(--ink);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
  .scene{position:fixed;inset:0;overflow:hidden;background:var(--bg)}
  .scene__photo{position:absolute;inset:-2%;width:104%;height:104%;object-fit:cover;object-position:50% 48%;filter:saturate(.76) brightness(.62);transform:scale(1.01);transition:filter .72s var(--ease),transform .72s var(--ease)}
  .scene__wash{position:absolute;inset:0;background:rgba(7,6,12,.28)}
  .scene__lower{position:absolute;inset:40% 0 0;background:linear-gradient(180deg,transparent,rgba(7,6,12,.84))}
  .scene__horizon{position:absolute;left:0;right:0;top:37%;height:1px;background:var(--secondary-line);opacity:.32}
  .is-booting:not(.is-ready) .scene__photo{filter:saturate(.5) brightness(.40);transform:scale(1.035)}

  .masthead{position:fixed;z-index:20;left:max(20px,env(safe-area-inset-left));right:max(20px,env(safe-area-inset-right));top:max(16px,env(safe-area-inset-top));height:44px;display:flex;align-items:center;justify-content:space-between}
  .wordmark{display:block;width:132px;height:auto;view-transition-name:sa-logo}
  .help{display:grid;place-items:center;width:44px;height:44px;border:1px solid var(--line-strong);border-radius:50%;color:var(--muted);text-decoration:none;font:600 14px/1 var(--font-mono);background:rgba(7,6,12,.82)}
  .help:hover{color:var(--ink);border-color:var(--secondary-line)}

  main{position:fixed;z-index:3;inset:0;padding-top:max(74px,calc(env(safe-area-inset-top) + 64px));padding-bottom:max(24px,env(safe-area-inset-bottom))}
  .intro{position:absolute;z-index:3;left:max(20px,env(safe-area-inset-left));top:max(84px,calc(env(safe-area-inset-top) + 74px));width:min(240px,calc(100vw - 40px))}
  .intro__kicker{margin:0 0 8px;color:var(--secondary);font:700 10px/1 var(--font-ui);letter-spacing:.18em;text-transform:uppercase}
  .intro h1{margin:0;font:600 clamp(34px,10vw,46px)/.94 var(--font-display);letter-spacing:-.045em;text-wrap:balance}
  .intro__body{margin:12px 0 0;color:var(--muted);font-size:13px;line-height:1.45;max-width:220px}

  .flight{position:absolute;inset:70px 0 54px;pointer-events:none}
  .flight svg{width:100%;height:100%;overflow:visible}
  .flight--landscape{display:none}
  .trace-under{fill:none;stroke:rgba(255,138,77,.13);stroke-width:9;stroke-linecap:round}
  .trace{fill:none;stroke:var(--accent);stroke-width:2.4;stroke-linecap:round;stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.2s var(--ease) .12s forwards}
  .trace-structure{fill:none;stroke:var(--secondary-line);stroke-width:1;stroke-dasharray:4 8}
  .ball{fill:var(--accent);offset-distance:0%;animation:fly 1.2s var(--ease) .12s forwards}
  .ball--portrait{offset-path:path('M 212 780 C 150 650 287 522 212 214')}
  .ball--landscape{offset-path:path('M 188 374 C 390 118 642 238 850 74')}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes fly{to{offset-distance:100%}}

  .places{position:absolute;inset:0;list-style:none;margin:0;padding:0}
  .place{position:absolute;display:flex;min-height:56px;max-width:min(188px,calc(100vw - 36px));align-items:center;text-decoration:none;color:var(--ink);border:1px solid var(--line-strong);border-left:2px solid var(--secondary);background:rgba(7,6,12,.92);padding:10px 13px;border-radius:12px;transition:transform .16s var(--ease),border-color .16s var(--ease),opacity .48s var(--ease);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .is-booting:not(.is-ready) .place{opacity:.38}
  .place:hover{transform:translateY(-2px);border-color:var(--secondary-line)}
  .place--primary{border-left-color:var(--accent);background:rgba(7,6,12,.97)}
  .place__copy{display:grid;gap:4px;min-width:0}
  .place__label{color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;white-space:nowrap}
  .place__value{font:600 15px/1.15 var(--font-mono);font-variant-numeric:tabular-nums;white-space:nowrap}
  .place--primary .place__label,.place--primary .place__value{color:var(--accent)}
  .place--academy .place__value{color:var(--gold)}
  .p-range{left:max(18px,env(safe-area-inset-left));bottom:12%}
  .p-lab{right:max(18px,env(safe-area-inset-right));bottom:35%}
  .p-outcome{left:max(18px,env(safe-area-inset-left));top:35%}
  .p-academy{right:max(18px,env(safe-area-inset-right));top:20%}
  .footnote{position:absolute;left:max(20px,env(safe-area-inset-left));right:max(20px,env(safe-area-inset-right));bottom:max(14px,env(safe-area-inset-bottom));display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:10px;letter-spacing:.08em;text-transform:uppercase;pointer-events:none}
  .footnote__state{font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:var(--ink)}

  @media(max-width:390px){
    .intro{width:210px}.intro h1{font-size:35px}.intro__body{font-size:12px}
    .place{max-width:166px;padding-inline:11px}.place__value{font-size:13px}
    .p-academy{top:21%}.p-outcome{top:37%}.p-lab{bottom:34%}.p-range{bottom:11%}
  }
  @media(max-height:850px) and (orientation:portrait){
    .intro__body{display:none}.intro h1{font-size:34px}.intro{top:max(76px,calc(env(safe-area-inset-top) + 66px))}
    .p-academy{top:20%}.p-outcome{top:36%}.p-lab{bottom:32%}.p-range{bottom:10%}
  }
  @media(orientation:landscape){
    .masthead{left:max(18px,env(safe-area-inset-left));right:max(18px,env(safe-area-inset-right));top:max(8px,env(safe-area-inset-top))}
    .wordmark{width:120px}
    .intro{left:max(20px,env(safe-area-inset-left));top:max(62px,calc(env(safe-area-inset-top) + 54px));width:190px}
    .intro h1{font-size:clamp(34px,5vw,44px)}
    .intro__body{font-size:12px;max-width:180px}
    .flight--portrait{display:none}.flight--landscape{display:block;inset:18px 8px 14px 150px}
    .p-range{left:30%;bottom:7%}.p-lab{left:47%;right:auto;bottom:31%}.p-outcome{left:62%;top:29%}.p-academy{right:calc(max(18px,env(safe-area-inset-right)) + 52px);top:14%}
    .place{min-height:54px;max-width:180px;padding:8px 12px}
    .place__value{font-size:14px}
    .footnote{bottom:max(8px,env(safe-area-inset-bottom))}
  }
  @media(max-height:390px) and (orientation:landscape){
    .intro__body{display:none}.intro{top:max(58px,calc(env(safe-area-inset-top) + 50px))}
    .intro h1{font-size:34px}.p-range{left:31%;bottom:6%}.p-lab{bottom:29%}.p-outcome{left:62%;top:29%}.p-academy{top:10%}
    .place{min-height:50px}.place__label{font-size:8px}.place__value{font-size:13px}
  }
  @media(prefers-reduced-motion:reduce){
    @view-transition{navigation:none}
    .trace{stroke-dashoffset:0;animation:none}.ball{offset-distance:100%;animation:none}
    .scene__photo,.place{transition:none}.is-booting:not(.is-ready) .place{opacity:1}
  }
</style>
</head>
<body class="is-booting" data-home-direction="night-ladder">
<div class="scene shell" aria-hidden="true">
  <img class="scene__photo" src="./assets/range-night-3d-33.png" alt="">
  <div class="scene__wash"></div>
  <div class="scene__lower"></div>
  <div class="scene__horizon"></div>
</div>

<header class="masthead">
  <img class="wordmark" src="./assets/flightglass-lockup.svg" alt="Flightglass">
  <a class="help sa-focus" href="./academy.html" aria-label="Open Academy help">?</a>
</header>

<main>
  <section class="intro" aria-labelledby="homeTitle">
    <p class="intro__kicker">The range is live</p>
    <h1 id="homeTitle">Walk the<br>shot.</h1>
    <p class="intro__body">Every light downrange opens a different part of the explanation.</p>
  </section>

  <div class="flight flight--portrait" aria-hidden="true">
    <svg viewBox="0 0 430 860" preserveAspectRatio="none">
      <path class="trace-structure" d="M212 780 C150 650 287 522 212 214" pathLength="1"/>
      <path class="trace-under" d="M212 780 C150 650 287 522 212 214" pathLength="1"/>
      <path class="trace" d="M212 780 C150 650 287 522 212 214" pathLength="1"/>
      <circle class="ball ball--portrait" r="5" cx="0" cy="0"/>
    </svg>
  </div>
  <div class="flight flight--landscape" aria-hidden="true">
    <svg viewBox="0 0 932 430" preserveAspectRatio="none">
      <path class="trace-structure" d="M188 374 C390 118 642 238 850 74" pathLength="1"/>
      <path class="trace-under" d="M188 374 C390 118 642 238 850 74" pathLength="1"/>
      <path class="trace" d="M188 374 C390 118 642 238 850 74" pathLength="1"/>
      <circle class="ball ball--landscape" r="5" cx="0" cy="0"/>
    </svg>
  </div>

  <nav class="places" aria-label="Flightglass destinations">
    <a id="placeRange" class="place place--primary p-range sa-focus" data-key="flight" href="./impact.html" aria-label="Range — demo shot 154 metres, 12 metres right">
      <span class="place__copy"><span id="labelRange" class="place__label">Start here · Range</span><span id="valueRange" class="place__value">154 m · 12 m R</span></span>
    </a>
    <a id="placeLab" class="place p-lab sa-focus" data-key="geometry" href="./geometry.html" aria-label="Lab — inspect the strike">
      <span class="place__copy"><span id="labelLab" class="place__label">Lab</span><span id="valueLab" class="place__value">Inspect the strike</span></span>
    </a>
    <a id="placeOutcome" class="place p-outcome sa-focus" data-key="outcome" href="./impact.html?play=1" aria-label="Outcome — demo shot faded right">
      <span class="place__copy"><span id="labelOutcome" class="place__label">Outcome</span><span id="valueOutcome" class="place__value">Fade · demo shot</span></span>
    </a>
    <a id="placeAcademy" class="place place--academy p-academy sa-focus" data-key="academy" href="./academy.html" aria-label="Academy — open the physics path">
      <span class="place__copy"><span id="labelAcademy" class="place__label">Academy</span><span id="valueAcademy" class="place__value">Physics path</span></span>
    </a>
  </nav>

  <div class="footnote" aria-hidden="true"><span>Night Ladder</span><span id="sessionState" class="footnote__state">Demo shot</span></div>
</main>

<script>
(() => {
  const readJSON = key => {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
  };
  const readString = key => {
    try { return localStorage.getItem(key); } catch (_) { return null; }
  };
  const writeString = (key, value) => {
    try { localStorage.setItem(key, value); } catch (_) {}
  };
  const fresh = value => value && typeof value.ts === 'number' && Date.now() - value.ts < 30 * 864e5;
  const signed = value => `${value < 0 ? '−' : value > 0 ? '+' : ''}${Math.abs(value).toFixed(1)}`;
  const byId = id => document.getElementById(id);

  const flight = readJSON('sa.stat.flight');
  const geometry = readJSON('sa.stat.geometry');
  const outcome = readJSON('sa.stat.outcome');
  const academy = readJSON('strikearc.academy.v1');
  const hasFlight = fresh(flight);
  const hasGeometry = fresh(geometry);
  const hasOutcome = fresh(outcome);
  const xp = academy && Number.isFinite(academy.xp) ? Math.max(0, academy.xp) : 0;
  const hasSavedState = hasFlight || hasGeometry || hasOutcome || xp > 0;

  if (hasFlight) {
    const total = Math.round(Number(flight.total) || 0);
    const offline = Math.round(Math.abs(Number(flight.offlineM) || 0));
    const side = flight.offlineSide === 'L' ? 'L' : flight.offlineSide === 'R' ? 'R' : '';
    const sideWords = side === 'L' ? 'left' : side === 'R' ? 'right' : 'on line';
    byId('valueRange').textContent = `${total} m · ${offline} m ${side}`.trim();
    byId('placeRange').setAttribute('aria-label', `Range — last shot ${total} metres, ${offline} metres ${sideWords}`);
  }

  if (hasGeometry) {
    const band = String(geometry.band || 'Saved strike');
    const attack = signed(Number(geometry.attack) || 0);
    byId('valueLab').textContent = `${band} · ${attack}°`;
    byId('placeLab').setAttribute('aria-label', `Lab — ${band}, ${attack} degrees attack`);
  }

  if (hasOutcome) {
    const carry = Math.round(Number(outcome.carry) || 0);
    const shape = String(outcome.shape || 'Saved outcome');
    byId('valueOutcome').textContent = `${shape} · ${carry} m`;
    byId('placeOutcome').setAttribute('aria-label', `Outcome — ${shape}, ${carry} metres carry`);
  }

  if (xp > 0) {
    const thresholds = [0, 150, 350, 650, 1000, 1500];
    let level = 1;
    for (let index = 0; index < thresholds.length; index += 1) {
      if (xp >= thresholds[index]) level = index + 1;
    }
    if (xp >= 2100) level = 7 + Math.floor((xp - 2100) / 600);
    byId('valueAcademy').textContent = `Level ${level} · ${xp} XP`;
    byId('placeAcademy').setAttribute('aria-label', `Academy — level ${level}, ${xp} XP`);
  }

  const keyToIds = {
    flight:['placeRange','labelRange','Range'],
    geometry:['placeLab','labelLab','Lab'],
    outcome:['placeOutcome','labelOutcome','Outcome'],
    academy:['placeAcademy','labelAcademy','Academy']
  };
  let last = readString('sa.home.last');
  if (!hasSavedState || !keyToIds[last]) last = 'flight';
  document.querySelectorAll('.place').forEach(place => place.classList.remove('place--primary'));
  const [placeId, labelId, label] = keyToIds[last];
  byId(placeId).classList.add('place--primary');
  byId(labelId).textContent = `${hasSavedState ? 'Continue' : 'Start here'} · ${label}`;
  byId('sessionState').textContent = hasSavedState ? 'Latest saved session' : 'Demo shot';

  document.querySelectorAll('.place[data-key]').forEach(place => {
    place.addEventListener('click', () => writeString('sa.home.last', place.dataset.key));
  });

  let ready = false;
  const finishBoot = () => {
    if (ready) return;
    ready = true;
    document.body.classList.add('is-ready');
    try { sessionStorage.setItem('sa.home.night-ladder.ready', '1'); } catch (_) {}
  };
  let reduced = false;
  let seen = false;
  try {
    reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    seen = sessionStorage.getItem('sa.home.night-ladder.ready') === '1';
  } catch (_) {}
  if (reduced || seen) finishBoot();
  else setTimeout(finishBoot, 900);
  window.addEventListener('pointerdown', finishBoot, { once:true, passive:true });
  window.addEventListener('keydown', finishBoot, { once:true });
})();
</script>
</body>
</html>
