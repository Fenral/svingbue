<html lang="en">

<title>Swing-arc simulator — Geometry mock</title>
<!-- ═══════════════════════════════════════════════════════════════════════
     GEOMETRY MOCK (prototype, 2026-07-08) — a COPY of geometry.html exploring:
       1. Attack/Path HUD chips: sign-coloured numbers + per-chip tick-flash /
          sign-flip pulse animations (CSS/DOM only — never touches the 3D
          renderer, so render-on-demand stays intact).
       2. Low point: visual only (yellow marker + plumb + bracket tether to
          the ball) — the DOM cm label is dropped; the sr-only #sceneData
          live region still carries the number for AT.
       3. Strike height: the ballTick ring is now MAGNITUDE-coloured (green
          near Pure → amber → red toward Thin/Fat/Duff, via strikeQuality's
          pct) instead of band-colour-only.
       4. Sliders: the 4-across tune rail is replaced by a SLIM, always-
          visible one-slider-at-a-time carousel (tab buttons + one premium
          slider). The 3D canvas never shrinks (full-bleed, rail overlays);
          the FIX M camera "make room" TWEEN is retired in favour of a
          constant target offset applied once at init (rail is always open
          and slimmer than before — no open/close to animate).
       5. Ball position: a draggable (and keyboard-operable, role=slider)
          handle in the scene. ENGINE WIRING (sanctioned option (b) from the
          brief): the production engine swing-parameters-and-impact.js stays
          byte-identical; the mock feeds every engine/geo3d call a DERIVED
          state whose lowPoint.x = state.lowPoint.x − state.ballPosition —
          i.e. effectiveLpx() combines the ball position exactly where it
          already combines its inputs, with zero physics duplicated.
          VISUALS use the STANCE frame: all engine-driven 3D content lives in
          a wrapper group shifted +X by ballPosition and the ball mesh gets
          the same +X nudge — so on screen the BALL moves and the arc stays
          put (matching the golf-lesson mental model), while the engine still
          computes in its canonical ball-at-origin frame.
     ROUND 2 (2026-07-08, owner-testing feedback):
       6. STRIKE DETAIL inset: the second scissored 3D pass is GONE ("uover-
          siktlig og selve balltreff kommer bort") — #sdViewport is now a
          purpose-built 2D SVG SCHEMATIC (side view): stylized arc-bottom
          curve + ball + yellow low-point marker with cm dimension + turf
          strip when fat (left panel), and a revived .ballcloseup-style face
          panel (big ball circle + horizontal contact line + mm label in
          strikeQuality colour) on the right. Band chip + foot sentence stay.
          No renderPass is hooked (scene.js setInsetPass never called) — the
          card is pure DOM/SVG; geo3d-mock/insetview.js is deleted.
       7. CLUB VISUAL HONESTY: grounded cosmetic ADDRESS pose (sole parallel
          to ground, head next to the ball, for EVERY plane/direction/low-
          point/ballPosition — see geo3d-mock/club.js groundedAddressPose);
          playback blends grounded→arc-riding as the club leaves address
          (snap under reduced motion); the impact frame always rides the arc.
          Impact centring itself needs NO new compensation: the production
          engine's lpWorld() already carries the FIX L address translation
          (arcPosition(thetaAtImpact) lands horizontally AT the ball,
          exactly), and club.js's FIX K.3 already makes the blade's visual
          face centre the point that rides the arc. Verified per-cell by the
          __sa.mock.impactMetrics() acceptance-grid hook.
       8. Attack/path arrows demoted: the 3D delivery arrow is NOT added to
          the scene any more; instead a subtle ARC-EXIT PARTICLE STREAM
          (#arcStream, DOM/CSS only) flows out of the swing arc at the
          impact zone along the live resultant delivery direction. Replaces
          the old chip-trail. Reduced motion → static directional hint;
          document.hidden pauses the loop; renderer stays render-on-demand.
       9. Carousel tabs show LIVE VALUES at all times (two-line tabs:
          label + value, updated on every input, value ≥10px on the dark
          plate, folded into each tab's accessible name).
     ROUND 3 (2026-07-09, owner-testing feedback):
      10. STRIKE VERDICT HONESTY: every displayed band label now comes from
          geo3d-mock/strikedisplay.js (side layer; the engine stays byte-
          identical). Fixes two confirmed defects: a near-sole contact
          (clubZ≈0, "21 mm low") read PURE, and clubZ ∈ (1.4r, 2.0r] read
          "WHIFF · no contact" while the contact line was drawn ON the ball.
          Now: very-low → Thin, top-quarter → Topped, and "no contact" only
          when the face truly clears the ball (clubZ > 2r). The "· N%" is
          REMOVED from every band display (task 1; pct is still computed for
          the ball-tick colour ramp, never shown).
      11. Tabs are LABEL-ONLY (the round-2 live values + the row's persistent
          label/value duplicated the highlighted tab — removed); the numeric
          value now appears only on the slider bubble while adjusting (plus
          aria-valuetext). A 5th "Ball position" tab/slider replaces the
          draggable #ballHandle (removed entirely — the slider carries the
          keyboard path, so no a11y regression); the ball mesh still moves
          via the same stance-frame shift.
      12. ARC-EXIT stream split into TWO labelled particle streams from the
          impact point: PATH (ground-projected club-path direction, cyan,
          matches the PATH chip) and ATTACK (full delivery direction whose
          pitch IS the attack angle, orange, matches the ATTACK chip), each
          with a 10px "Path"/"Attack" cue on a dark plate. Reduced motion →
          two static directional streaks + the labels. Still DOM/CSS only.
     ROUND 4 (2026-07-09, owner direction: "trenger ikke chips … men STREKER
     som viser retningen attack og path har ut av svingbuen, akkurat ved
     balltreff, videre utover BILDET (ikke ut av bildet)"):
      13. The ATTACK/PATH value chips (hud-chips + wiring) and the round-3
          particle streams (#arcStream) are REMOVED — replaced by two clean
          DELIVERY LINES on a fixed full-viewport SVG overlay (#deliveryLines):
          ATTACK = the arc's TRUE 3D tangent at impact,
          normalize(tangentAt(thetaAtImpact(state))) — yaw = club path, pitch
          = attack angle, 1:1 honest, "the direction the swing arc has exactly
          at ball impact"; PATH = the same tangent GROUND-PROJECTED onto the
          turf (pure club-path heading). The angular gap between the two lines
          reads as the attack angle. Implemented in SCREEN SPACE: impact point
          + a near-plane-clamped far point are projected through the live
          camera and the segment is CLIPPED to the frame (small margin +
          carousel-rail clearance) — the lines run across the image but never
          off it, at any parameter setting. Values live ONLY in #sceneData
          (in words) + the slider bubbles; tiny 10px "Path"/"Attack" text tags
          (no plates, no read-outs). Re-projected on every slider input /
          camera orbit / resize; pure DOM writes (render-on-demand intact);
          fades with the controls during playback (CONTROL_SEL); reduced
          motion = the same static lines (nothing animates).
     3D modules are the geo3d-mock/ copies (production geo3d/ untouched).
     ═══════════════════════════════════════════════════════════════════════ -->

<link rel="stylesheet" href="./sa.css" />
<link rel="stylesheet" href="./sa-paywall.css" />
<style>
  :root{
    --accent:#22E3D6; --accent-soft:rgba(34,227,214,.16); --accent-line:rgba(34,227,214,.55);
    --ink:#e8f0fb; --muted:#9aabc6;                     /* unified ink + AAA-ish muted */
    --bg:#0A0E12; --bg-top:#0b1220;
    --panel:rgba(12,20,33,.72); --line:rgba(255,255,255,.30);  /* line raised to ≥3:1 */
    --radius-pill:999px; --radius-card:16px; --radius-control:12px;
    --blur-surface:10px; --blur-overlay:18px;
    --rail-h:56px;                  /* MOCK — slim always-visible carousel rail */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    background:radial-gradient(130% 120% at 50% -10%, var(--bg-top), var(--bg));
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .stage{position:fixed;inset:0;overflow:hidden}
  /* 3D scene canvas — full-bleed and NEVER resized by controls (the carousel
     rail overlays it; top priority per the mock brief). */
  #scene3d{position:fixed;inset:0;width:100%;height:100%;z-index:0}
  .gc3d-label{
    position:fixed;z-index:2;pointer-events:none;white-space:nowrap;
    font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--ink);
    background:rgba(10,14,18,.7);border:1px solid rgba(138,90,43,.55);border-radius:8px;
    padding:3px 9px;font-variant-numeric:tabular-nums;
  }
  .gc3d-label[hidden]{display:none}
  .gc3d-label.is-struck{
    border-color:rgba(255,150,80,.9);
    box-shadow:0 0 0 3px rgba(255,150,80,.28);
    animation:gc3dStrike .5s ease-out;
  }
  @keyframes gc3dStrike{
    0%{transform:scale(1.22)}
    100%{transform:scale(1)}
  }
  .label{font-size:12px;fill:var(--muted);font-family:inherit;font-variant-numeric:tabular-nums}

  /* FACE-ZOOM band-label chip: dark plate, fades in during the zoom detour. */
  .facezoom-chip{
    position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));z-index:6;
    transform:translateX(-50%) translateY(6px);
    background:rgba(7,12,18,.86);-webkit-backdrop-filter:blur(var(--blur-surface));backdrop-filter:blur(var(--blur-surface));
    border:1px solid var(--line);border-radius:var(--radius-pill);
    padding:8px 18px;font-size:14px;font-weight:700;letter-spacing:.02em;
    font-variant-numeric:tabular-nums;white-space:nowrap;pointer-events:none;
    opacity:0;transition:opacity .22s ease,transform .22s ease;
    box-shadow:0 14px 40px -18px rgba(0,0,0,.85);
  }
  .facezoom-chip.is-visible{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){.facezoom-chip{transition:none}}

  .facezoom-hint{
    position:fixed;left:50%;bottom:max(58px,calc(env(safe-area-inset-bottom) + 58px));z-index:6;
    transform:translateX(-50%) translateY(4px);
    background:rgba(7,12,18,.7);-webkit-backdrop-filter:blur(var(--blur-surface));backdrop-filter:blur(var(--blur-surface));
    border:1px solid rgba(255,255,255,.18);border-radius:var(--radius-pill);
    padding:5px 14px;font-size:11px;font-weight:600;letter-spacing:.03em;color:var(--muted);
    white-space:nowrap;pointer-events:none;
    opacity:0;transition:opacity .3s ease,transform .3s ease;
  }
  .facezoom-hint.is-visible{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){.facezoom-hint{transition:none}}

  /* MOCK round 4 — DELIVERY LINES ('streker', owner direction 2026-07-09).
     The ATTACK/PATH value chips + the round-3 particle streams are replaced
     by two clean lines on a fixed full-viewport SVG overlay (#deliveryLines):
       .ln.atk  — the arc's TRUE 3D tangent at impact (pitch = attack angle),
                  SOLID orange #ffb347 (the established attack hue; ≥3:1
                  non-text contrast on the #0A0E12 scene);
       .ln.path — its GROUND PROJECTION on the turf (pure club-path heading),
                  DASHED #4FA8FF — NOT cyan: the path line diverges from the
                  bright cyan target line by only a few degrees by
                  construction, so a cyan line would merge with it (the
                  documented FIX P3 failure mode); dashes additionally mark it
                  as the projected component (solid = the real club
                  direction), so colour is never the only carrier.
     Both lines are cased in a dark halo stroke so they stay legible across
     the bright cyan arc / white ball / floor grid. Tiny 10px "Path"/"Attack"
     text tags (halo-stroked text, NO plates, NO value read-outs — the owner
     asked the chips away; values live in #sceneData in words + the slider
     bubbles). Endpoints are set from JS in screen space (projected +
     frame-clipped); nothing here animates, so reduced motion needs no
     special case — the lines are shown statically either way (the global
     reduced-motion rule also kills the drag-emphasis transition). */
  .delivery-lines{position:fixed;inset:0;width:100%;height:100%;z-index:2;pointer-events:none}
  .delivery-lines line{stroke-linecap:round}
  .delivery-lines .halo{stroke:rgba(7,12,18,.7);stroke-width:5.5}
  .delivery-lines .halo.path{stroke-dasharray:7 5}
  .delivery-lines .ln{transition:opacity .18s ease}
  .delivery-lines .ln.path{stroke:#4FA8FF;stroke-width:2;stroke-dasharray:7 5;opacity:.9}
  .delivery-lines .ln.atk{stroke:#ffb347;stroke-width:2.5;opacity:.95}
  .delivery-lines.dragging .ln{opacity:1}
  .delivery-lines .tag{
    font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    paint-order:stroke;stroke:#0A0E12;stroke-width:3px;stroke-linejoin:round;
  }
  .delivery-lines .tag.path{fill:#A9CFFF}
  .delivery-lines .tag.atk{fill:#FFD9A3}

  /* freemium "N free shots left" nudge pill */
  .sa-nudge{
    position:fixed;left:50%;top:max(42px,calc(env(safe-area-inset-top) + 42px));z-index:3;
    transform:translateX(-50%);
    background:rgba(7,12,18,.86);-webkit-backdrop-filter:blur(var(--blur-surface));backdrop-filter:blur(var(--blur-surface));
    border:1px solid var(--accent-line);border-radius:var(--radius-pill);
    padding:5px 14px;font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--accent);
    white-space:nowrap;pointer-events:none;
  }
  .sa-nudge[hidden]{display:none}

  /* ── module nav (top-left, thin strip — shared with Impact) ──── */
  .modnav{position:fixed;top:max(8px,env(safe-area-inset-top));left:max(10px,env(safe-area-inset-left));z-index:5;
    display:flex;align-items:center;gap:4px;view-transition-name:sa-nav;
    background:linear-gradient(180deg, rgba(12,20,33,.55), rgba(10,14,18,.2));
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:3px}
  .modnav a{
    -webkit-tap-highlight-color:transparent;text-decoration:none;color:var(--muted);
    border:1px solid transparent;border-radius:8px;
    min-height:44px;display:inline-flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;line-height:1;padding:0 12px;
    transition:background .2s,border-color .2s,color .2s;
  }
  .modnav a.home{width:44px;padding:0;font-size:17px}
  .modnav a:hover{background:rgba(255,255,255,.08);color:var(--ink)}
  .modnav a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .modnav a[aria-current="page"]{
    color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft);
  }

  .controls{position:fixed;top:max(10px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));z-index:4;display:flex;gap:8px}
  button{
    background:rgba(10,18,30,.6);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    color:var(--ink);border:1px solid var(--line);width:44px;height:44px;border-radius:var(--radius-pill);
    font-size:17px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;
    transition:background .2s,border-color .2s,transform .1s;
  }
  button svg{width:20px;height:20px;display:block}
  button:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.3)}
  button:active{transform:translateY(1px)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  button[aria-pressed="true"]{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  #hit{color:var(--accent);border-color:var(--accent-line)}
  #hit:hover{background:var(--accent-soft);border-color:var(--accent)}

  /* ── STRIKE DETAIL inset — matches production geometry.html (bottom-LEFT
     per 2026-07-08: the club/ball impact zone composes centre-right, so the
     card lives on the emptier left) except it sits ABOVE the always-visible
     carousel rail (bottom raised by --rail-h). */
  .strike-detail{
    position:fixed;left:max(14px,env(safe-area-inset-left));
    bottom:calc(var(--rail-h) + 10px + env(safe-area-inset-bottom, 0px));z-index:3;
    width:clamp(220px,32vw,320px);
    border:1px solid rgba(34,227,214,.28);border-radius:var(--radius-card);
    box-shadow:0 18px 50px -20px rgba(0,0,0,.85);
    overflow:hidden;
  }
  .strike-detail .top{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:9px 11px 7px;
    background:linear-gradient(180deg, rgba(13,20,26,.98), rgba(13,20,26,.94));
  }
  .strike-detail .ttl{font-size:11px;font-weight:700;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
  .strike-detail .chip{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
    padding:3px 9px;border-radius:999px;white-space:nowrap;
    background:rgba(74,222,128,.12);color:#4ADE80;border:1px solid rgba(74,222,128,.3);
  }
  /* MOCK round 3 (task 1): the chip shows the band label ALONE — no % */
  /* MOCK round 2 (challenge 1a): the viewport no longer reveals a 3D pass —
     it is a self-contained 2D SVG schematic, so it now carries its OWN dark
     plate (previously it had to stay transparent for the scissored WebGL
     render underneath). */
  .strike-detail .viewport{
    position:relative;width:100%;aspect-ratio:340/196;
    background:linear-gradient(180deg, rgba(10,16,24,.96), rgba(9,13,19,.93));
  }
  .strike-detail .viewport svg{position:absolute;inset:0;width:100%;height:100%;display:block;pointer-events:none}
  .sd-lb{font:700 12px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:var(--accent);font-variant-numeric:tabular-nums;paint-order:stroke;stroke:#0A0E12;stroke-width:2.5px;stroke-linejoin:round}
  .sd-lb-soil{fill:#c9a878}
  .strike-detail .foot{
    padding:7px 11px 9px;font-size:11px;color:var(--muted);line-height:1.35;
    background:linear-gradient(0deg, rgba(10,14,18,.98), rgba(10,14,18,.94));
  }
  .strike-detail .foot b{color:var(--ink)}
  .strike-detail .foot .sd-turf{color:#c9a878;font-weight:700}
  @media (max-width:760px){.strike-detail{width:clamp(200px,40vw,280px)}}
  /* MOCK — short landscape phones: shrink the card a bit so the always-on
     rail + card don't swallow the scene at 390-430px heights. */
  @media (max-height:480px){.strike-detail{width:clamp(190px,26vw,260px)}}

  /* ── MOCK carousel rail — SLIM, ALWAYS-VISIBLE strip: tab buttons (real
     <button>s, aria-pressed, 44px targets) + ONE premium slider at a time.
     Fixed minimal height (--rail-h); the 3D canvas is full-bleed underneath
     and never resizes. ──────────────────────────────────────────────────── */
  .tune{
    position:fixed;left:0;right:0;bottom:0;z-index:3;height:calc(var(--rail-h) + env(safe-area-inset-bottom, 0px));
    padding:6px max(12px,env(safe-area-inset-right)) calc(6px + env(safe-area-inset-bottom, 0px)) max(12px,env(safe-area-inset-left));
    background:var(--panel);-webkit-backdrop-filter:blur(var(--blur-surface));backdrop-filter:blur(var(--blur-surface));
    border-top:1px solid var(--line);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 -14px 40px -22px rgba(0,0,0,.8);
    display:flex;gap:12px;align-items:center;
  }
  .ctabs{display:flex;gap:4px;flex:none}
  /* MOCK round 3 (task 3) — tabs are LABEL-ONLY: the round-2 live tab values
     PLUS the row's persistent label/value repeated the same number in two
     places; the aria-pressed highlight alone marks the active parameter and
     the numeric value now lives only on the slider bubble while adjusting
     (and in aria-valuetext). 44px targets preserved. */
  .ctab{
    width:auto;min-width:44px;height:44px;padding:0 10px;border-radius:10px;
    background:transparent;border:1px solid transparent;color:var(--muted);
    display:inline-flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    line-height:1;white-space:nowrap;
  }
  .ctab:hover{background:rgba(255,255,255,.08);color:var(--ink);border-color:transparent}
  .ctab[aria-pressed="true"]{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)}
  .crows{flex:1;min-width:0}
  .row{display:none}
  .row.active{display:flex;align-items:center;gap:10px}
  .row.active .slider{flex:1;min-width:0}
  @media (max-width:900px){
    .ctab{padding:0 7px;font-size:10px}
  }

  /* ── premium custom range slider (unchanged from geometry.html) ───────── */
  .slider{
    --rng:var(--accent);            /* per-param accent tone (overridable) */
    --p:50%;                        /* thumb position (computed on input) */
    --o:50%;                        /* fill origin: centre for signed, 0 for left-fill */
    --th:7%;                        /* half thumb width as % of track (for tick clamping) */
    position:relative;height:44px;display:flex;align-items:center;  /* ≥44px hit area */
  }
  .slider input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:44px;margin:0;
    background:transparent;cursor:pointer;display:block;
  }
  .slider input[type=range]::-webkit-slider-runnable-track{
    height:5px;border-radius:999px;
    background:var(--track-bg, rgba(255,255,255,.14));
  }
  .slider input[type=range]::-moz-range-track{
    height:5px;border-radius:999px;background:rgba(255,255,255,.14);
  }
  .slider input[type=range]::-moz-range-progress{height:5px;border-radius:999px;background:var(--rng)}
  .slider input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;
    margin-top:-7.5px;background:var(--rng);
    border:2px solid rgba(10,14,18,.9);
    box-shadow:0 0 0 1.5px var(--rng), 0 4px 10px -2px rgba(0,0,0,.7);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .slider input[type=range]::-moz-range-thumb{
    width:20px;height:20px;border-radius:50%;background:var(--rng);
    border:2px solid rgba(10,14,18,.9);
    box-shadow:0 0 0 1.5px var(--rng), 0 4px 10px -2px rgba(0,0,0,.7);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .slider input[type=range]:active::-webkit-slider-thumb{transform:scale(1.25)}
  .slider input[type=range]:active::-moz-range-thumb{transform:scale(1.25)}
  .slider input[type=range]:focus-visible::-webkit-slider-thumb{box-shadow:0 0 0 3px var(--rng), 0 4px 10px -2px rgba(0,0,0,.7)}

<script type="module">
// NOTE: relative imports only (no bare specifiers / import maps — the import
// map is not honoured in the native Capacitor WKWebView). 3D modules come
// from geo3d-mock/ (prototype copies); the PHYSICS ENGINE is the untouched
// production swing-parameters-and-impact.js — the ball-position parameter is
// wired in via a DERIVED state at the call boundary (option (b)), never by
// editing or duplicating the engine.
import * as THREE from './vendor/three/build/three.module.js';
import {
  RADIUS, deg2rad, arcPosition, tangentAt, thetaAtImpact,
  strikeQuality, deriveImpact, clubBallContact, BALL_RADIUS_M,
  lpWorld, effectiveLpx,
} from './swing-parameters-and-impact.js';
import saHaptics from './sa-haptics.js';
window.saHaptics = saHaptics;   // expose for non-module scripts / tests
import { strikeDisplay } from './geo3d-mock/strikedisplay.js';
import { createScene } from './geo3d-mock/scene.js';
import { createArc } from './geo3d-mock/arc.js';
import { createPlane } from './geo3d-mock/plane.js';
import { createLowpoint } from './geo3d-mock/lowpoint.js';
import { createGroundContact, groundCrossingTheta0 } from './geo3d-mock/groundcontact.js';
import { createClub } from './geo3d-mock/club.js';
import { createTimeline3d } from './geo3d-mock/timeline.js';
import { createDelivery } from './geo3d-mock/delivery.js';
// MOCK round 2: geo3d-mock/insetview.js is GONE — the strike-detail card is a
// pure 2D SVG schematic now (challenge 1a); no second scissored render pass.
import * as saShots from './sa-shots.js';
import * as saIap from './sa-iap.js';
import { openPaywall } from './sa-paywall.js';

const $ = id => document.getElementById(id);

// ── live swing state (RAW inputs) + derived ENGINE state ───────────────────
// state.ballPosition (metres, + = forward/toward target) is the MOCK's new
// direct-manipulation parameter. The production engine never sees it as a
// separate field: engineState is the derived state fed to EVERY engine and
// geo3d call, with lowPoint.x = state.lowPoint.x − state.ballPosition — so
// effectiveLpx() combines it exactly where it already combines its inputs
// (option (b) from the brief; the engine file stays byte-identical).
const state = {
  view: 'face', radius: RADIUS, planeAngle: 60, swingDirection: 0,
  lowPoint: { x: 0.04, y: 0, z: 0.016 },   // starts ~Pure
  ballPosition: 0,
};
const engineState = {
  view: state.view, radius: state.radius, planeAngle: state.planeAngle,
  swingDirection: state.swingDirection,
  lowPoint: { x: state.lowPoint.x - state.ballPosition, y: 0, z: state.lowPoint.z },
};
function syncEngine() {
  engineState.view = state.view;
  engineState.planeAngle = state.planeAngle;
  engineState.swingDirection = state.swingDirection;
  engineState.lowPoint.x = state.lowPoint.x - state.ballPosition;
  engineState.lowPoint.z = state.lowPoint.z;
}

const BALLPOS_MIN = -0.10, BALLPOS_MAX = 0.10, BALLPOS_STEP = 0.005;

// ── 3D scene ────────────────────────────────────────────────────────────────
const reduceMotion3d = matchMedia('(prefers-reduced-motion: reduce)').matches;
let sa3d = null;
let arc3d = null, plane3d = null, lp3d = null, gc3d = null, club3d = null, timeline3d = null, delivery3d = null;
let ballTick = null; // contact-height ring on the 3D ball (FIX J concept, mock recolour)
let shift3d = null;  // MOCK — stance-frame wrapper: all engine-driven content,
                     // shifted +X by state.ballPosition (ball moves, arc stays)

function makeBallTick() {
  // MOCK — slightly wider band than geometry.html's tick so it reads as a
  // "contact height band" on the ball; colour is applied per-update from a
  // MAGNITUDE ramp (see updateBallTick), not the band colour directly.
  const geo = new THREE.RingGeometry(BALL_RADIUS_M * 0.72, BALL_RADIUS_M * 0.94, 24, 1, 0, Math.PI * 0.7);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xffffff, toneMapped: false, transparent: true, opacity: 0.95,
    side: THREE.DoubleSide, depthWrite: false, depthTest: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 9;
  mesh.visible = false;
  return mesh;
}

// MOCK — camera "make room": the carousel rail is ALWAYS visible and slimmer
// than the old openable rail, so the FIX M open/close tween (animateRailOffset)
// is retired; a constant look-at offset applied once at init keeps the scene
// composed above the rail in both FACE and DTL.
const RAIL_OFFSET_Z = -0.42;

function init3d() {
  const canvas3d = $('scene3d');
  sa3d = createScene(canvas3d);
  sa3d.setTargetOffset({ z: RAIL_OFFSET_Z });
  sa3d.applyRig();
  arc3d = createArc(engineState);
  plane3d = createPlane(engineState);
  lp3d = createLowpoint(engineState, null); // MOCK — visual only, no cm label (sr text keeps the number)
  gc3d = createGroundContact(engineState, $('gc3dLabel'), () => state.ballPosition);
  club3d = createClub(engineState);
  delivery3d = createDelivery(engineState);
  ballTick = makeBallTick();

  // MOCK — stance-frame wrapper (see file header): engine content shifts +X
  // by ballPosition; the ball mesh (scene.js child) gets the same nudge.
  // ROUND 2 (challenge 2): delivery3d.group is DELIBERATELY NOT added — the
  // delivery arrow is demoted; the instance is kept alive purely for its
  // dir() math, which aims the DOM arc-exit particle stream.
  shift3d = new THREE.Group();
  shift3d.add(arc3d.group, plane3d.group, lp3d.group, gc3d.group, club3d.group, ballTick);
  sa3d.scene.add(shift3d);
  arc3d.group.__invalidate = sa3d.invalidate;
  plane3d.group.__invalidate = sa3d.invalidate;
  club3d.loadPromise.then(() => sa3d.invalidate());

  // STRIKE-DETAIL — ROUND 2 (challenge 1a): pure 2D SVG schematic; no
  // renderPass is hooked (sa3d.setInsetPass never called → stays null).
  refreshSchematic();

  timeline3d = createTimeline3d({
    state: engineState, sa3d, arc3d, club3d,
    getReduced: () => matchMedia('(prefers-reduced-motion: reduce)').matches,
    controlsVisible: (show) => controlsVisible(show),
    faceZoomChipEl: $('faceZoomChip'),
    faceZoomLiveEl: $('faceZoomLive'),
    faceZoomHintEl: $('faceZoomHint'),
    faceZoomDismissEl: canvas3d,
    // FIX Q2 (owner case: "Impact må vise køllen parallell til bakken", the
    // LOW ON FACE freeze) — the FLOOR disc + the whole fx group join the
    // hide-list. Diagnosis: on Fat/Duff strikes the club is genuinely dug
    // below z=0 at the impact frame, so the freeze camera used to dive BELOW
    // ground to keep the head visible past the opaque floor disc — and that
    // under-sole, grazing-light view is exactly what read as "klubbhodet
    // roterert" in the owner's screenshot (the projected toe–heel axis itself
    // measured level; see facezoom.js FIX Q2 doc). With the floor hidden for
    // the duration of the zoom the camera can stay at a sane height (see
    // facezoom.js FREEZE_CAM_MIN_Z) with the whole head visible against the
    // void — which is also what the freeze acceptance list ("only club +
    // ball + marker + chip visible") always described. fx.group (trail +
    // divot + flash + spray) replaces the old trail-only entry for the same
    // reason: a divot trench floating in the void without its floor reads
    // broken; everything is snapshot-restored by the hide-list mechanism on
    // endHold/reset, so the trench still shows on the turf after the swing.
    faceZoomHideNodes: () => [
      arc3d.group, plane3d.group, lp3d.group, gc3d.group, delivery3d.group,
      sa3d.targetLine, sa3d.floor, timeline3d ? timeline3d.fx.group : null,
    ].filter(Boolean),
    faceZoomHideLabels: [$('gc3dLabel')],
    groundStrikeLabelEl: $('gc3dLabel'),
  });
  // MOCK — timeline adds fx.group to the scene root; reparent it into the
  // stance-frame wrapper so trail/divot/flash line up with the shifted club/ball.
  shift3d.add(timeline3d.fx.group);

  rebuild3d();
  sa3d.invalidate();

  addEventListener('resize', () => { refreshSchematic(); sa3d.invalidate(); updateDeliveryLines(); restyleActiveSlider(); });

  // Re-measure the schematic when the CARD's geometry shifts without a
  // window resize (font load re-wrap, turf line appearing) — mirrors
  // production geometry.html (2026-07-08 fix).
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => refreshSchematic());
  }
  if (typeof ResizeObserver === 'function') {
    const sdCard = $('strikeDetail');
    if (sdCard) new ResizeObserver(() => refreshSchematic()).observe(sdCard);
  }

  canvas3d.addEventListener('webglcontextrestored', () => sa3d.invalidate());
}

// ── MOCK round 2 (challenge 1a) — schematic sizing: measure the viewport,
// match the SVG viewBox 1:1 to CSS px (crisp 1px strokes), redraw. ─────────
const sdLayout = { w: 0, h: 0, S: 0, bx: 0, gy: 0, divX: 0 };
function refreshSchematic() {
  const vp = $('sdViewport'), svg = $('sdAnnot');
  if (!vp || !svg) return;
  const vr = vp.getBoundingClientRect();
  if (vr.width < 2 || vr.height < 2) return;
  sdLayout.w = vr.width;
  sdLayout.h = vr.height;
  svg.setAttribute('viewBox', `0 0 ${vr.width.toFixed(1)} ${vr.height.toFixed(1)}`);
  updateStrikeDetail(engineState);
}

function rebuild3d() {
  if (!sa3d) return;
  // MOCK — stance-frame shift: ball + engine content both sit at +ballPosition
  shift3d.position.x = state.ballPosition;
  sa3d.ball.position.x = state.ballPosition;
  arc3d.rewrite();
  const lowestTheta = lp3d.update(engineState, sa3d.camera, $('scene3d'));
  arc3d.setLowestSegmentGlow(lowestTheta);
  plane3d.update(engineState);
  if (gc3d) gc3d.update(engineState, sa3d.camera, $('scene3d'));
  if (club3d) club3d.updateAddress(engineState);
  if (delivery3d) delivery3d.update(engineState);
  updateBallTick(engineState);
  updateStrikeDetail(engineState); // MOCK round 2 — 2D schematic redraw (no 3D pose)
  if (arc3d && (!timeline3d || !timeline3d.isPlaying())) {
    arc3d.coreMat.uniforms.uProgress.value = 1;
    arc3d.glowMat.uniforms.uProgress.value = 1;
  }
  updateDeliveryLines();
  sa3d.invalidate();
}

// ── MOCK strike-height band: MAGNITUDE-coloured (green near Pure, ambering/
// reddening as strike quality degrades toward Thin/Fat/Duff) via a two-stage
// colour ramp over strikeQuality().pct — not the sign of the offset, and not
// the raw band colour (Fat's soil-brown band colour would read as "dirt",
// not "bad-ness"). Hidden on Whiff (no ball contact at all).
const _tickGreen = new THREE.Color('#22C55E');
const _tickAmber = new THREE.Color('#EAB308');
const _tickRed = new THREE.Color('#DC2626');
const _tickCol = new THREE.Color();
function updateBallTick(stateRef) {
  if (!ballTick) return;
  // ROUND 3 (task 2): the DISPLAY classification decides visibility + band
  // floors — the ring hides only on a genuine miss (face clears the ball).
  const disp = strikeDisplay(stateRef);
  if (!disp.contact) { ballTick.visible = false; return; }
  const ct = clubBallContact(stateRef);
  const clampedOffset = Math.max(-BALL_RADIUS_M * 0.95, Math.min(BALL_RADIUS_M * 0.95, ct.offset));
  const contactZ = BALL_RADIUS_M + clampedOffset; // world Z of the contact point on the ball
  ballTick.position.set(0, -BALL_RADIUS_M * 0.985, contactZ);
  ballTick.rotation.set(Math.PI / 2, 0, -Math.PI * 0.35); // face -Y, centre the wider arc slice
  // severity 0..1 from pct (magnitude of "how far from Pure" — computed by
  // the engine, never displayed), with per-DISPLAY-band FLOORS so the ring
  // can never read pure-green while the verdict is a bad band.
  let t = Math.min(1, Math.max(0, 1 - disp.pct / 100)); // 0 = perfect, 1 = worst
  if (disp.band === 'Thin' || disp.band === 'Fat') t = Math.max(t, 0.45);
  else if (disp.band === 'Top') t = Math.max(t, 0.7);
  else if (disp.band === 'Duff') t = Math.max(t, 0.85);
  if (t < 0.5) _tickCol.copy(_tickGreen).lerp(_tickAmber, t * 2);
  else _tickCol.copy(_tickAmber).lerp(_tickRed, (t - 0.5) * 2);
  ballTick.material.color.copy(_tickCol);
  ballTick.visible = true;
}

// ── STRIKE DETAIL — MOCK round 2 (challenge 1a): purpose-built 2D SVG
// SCHEMATIC replacing the second scissored 3D pass ("uoversiktlig og selve
// balltreff kommer bort"). Crisp instrument-style SIDE VIEW (engine-frame
// X-Z plane, ball at the origin — the stance frame is irrelevant here since
// everything is drawn RELATIVE to the ball):
//   LEFT PANEL — (4) minimal stylized arc-bottom curve (true arcPosition
//   samples, face-on projection), ball on the ground line, (1) yellow
//   low-point marker + dashed plumb + cm dimension (ahead/behind reads from
//   the marker's side; the number matches effectiveLpx exactly — the same
//   convention as the foot sentence; lpWorld.x differs from it only by a
//   sub-mm direction-compensation term), (3) soil turf strip spanning the
//   ground crossing when fat/duff.
//   RIGHT PANEL — (2) revived pre-density-diet .ballcloseup: big ball circle
//   resting on the same ground line + horizontal contact line at the true
//   strike height + mm label in strikeQuality colour (textColor, ≥4.5:1).
// Vertical display SATURATES for extreme depths (the arc/marker never escape
// the card; all printed numbers stay true) and the horizontal scale only
// zooms out beyond ±17cm effective low point so the dimension always fits.
// Band chip + foot sentence unchanged from the production card.
function hexToRgba(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16), g = parseInt(h.substring(2, 4), 16), b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function sdAnchorFor(x, rectW, preferred = 'middle') {
  if (x < rectW * 0.16) return 'start';
  if (x > rectW * 0.84) return 'end';
  return preferred;
}

function updateStrikeDetail(stateRef) {
  const card = $('strikeDetail');
  if (!card) return;
  // ROUND 3 (tasks 1+2): band label + colours come from the side-layer
  // display classification (no % anywhere; "no contact" only on a real miss).
  const disp = strikeDisplay(stateRef);
  const ct = clubBallContact(stateRef);
  const cmVal = Math.round(effectiveLpx(stateRef) * 100);
  const mmVal = Math.round(ct.offset * 1000);

  $('sdChipBand').textContent = disp.label;
  const chipEl = $('sdChip');
  chipEl.style.color = disp.textColor;
  chipEl.style.background = hexToRgba(disp.color, 0.14);
  chipEl.style.borderColor = hexToRgba(disp.color, 0.4);

  const cmText = cmVal === 0 ? 'at the ball' : (cmVal > 0 ? `${cmVal} cm ahead` : `${Math.abs(cmVal)} cm behind`);
  const mmText = Math.abs(mmVal) < 1.5 ? 'centered' : (mmVal > 0 ? `${mmVal} mm high` : `${Math.abs(mmVal)} mm low`);
  const theta0 = groundCrossingTheta0(stateRef);
  let turfText = null;
  if (theta0 != null) {
    const entry = arcPosition(-theta0, stateRef);
    const turfCm = Math.round(entry.x * 100);
    turfText = turfCm <= 0 ? `turf ${Math.abs(turfCm)} cm before ball` : `turf ${turfCm} cm after ball`;
  }
  const strikePart = disp.contact
    ? `strike <b>${mmText}</b> on the face.`
    : `club passes <b>${Math.max(1, Math.round(disp.missMm))} mm above the ball</b> — no contact.`;
  $('sdFoot').innerHTML = `<b>${disp.label}</b> — low point <b>${cmText}</b>, ${strikePart}`
    + (turfText ? ` <span class="sd-turf">${turfText}</span>` : '');

  const draw = $('sdDraw');
  const w = sdLayout.w, h = sdLayout.h;
  if (!draw || w < 4 || h < 4) return;

  const accent = '#22E3D6';
  const yellow = '#ffd166';
  const lpxEff = effectiveLpx(stateRef);
  const lp = lpWorld(stateRef);

  // layout: left schematic panel | divider | right face close-up panel
  const divX = w * 0.60;
  const gy = h * 0.68;                 // shared ground line (both panels)
  const bx = divX * 0.56;              // ball x in the left panel
  // horizontal px-per-metre: fixed for |lpxEff| ≤ 17cm, zooms out beyond so
  // the dimension always fits (the marker never clamps at a panel edge).
  const S = (divX * 0.46) / Math.max(0.17, Math.abs(lpxEff) * 1.15);
  sdLayout.S = S; sdLayout.bx = bx; sdLayout.gy = gy; sdLayout.divX = divX;
  const ballR = Math.max(4.5, BALL_RADIUS_M * S);

  // vertical display saturation for the low-point depth (numbers stay true)
  const zRoomDn = (h - gy) - 7, zRoomUp = (gy - 14) * 0.35;
  const dispLpz = Math.max(-zRoomDn / S, Math.min(zRoomUp / S, lp.z));
  const zAdj = dispLpz - lp.z;

  const parts = [];

  // (4) arc-bottom curve — true arcPosition side view (x=world X, y=world Z),
  // drawn as glow + core with out-of-panel gaps
  let core = '', pen = false;
  for (let i = 0; i <= 44; i++) {
    const th = -0.55 + 1.1 * (i / 44);
    const p = arcPosition(th, stateRef);
    const x = bx + p.x * S, y = gy - (p.z + zAdj) * S;
    if (x < 7 || x > divX - 7 || y < 5 || y > h - 5) { pen = false; continue; }
    core += (pen ? 'L' : 'M') + x.toFixed(1) + ' ' + y.toFixed(1);
    pen = true;
  }
  if (core) {
    parts.push(
      `<path d="${core}" fill="none" stroke="${accent}" stroke-width="5" opacity=".10" stroke-linecap="round"/>`,
      `<path d="${core}" fill="none" stroke="${accent}" stroke-width="1.6" opacity=".8" stroke-linecap="round"/>`
    );
  }

  // (3) turf strip when fat/duff — soil band across the ground crossing
  if (theta0 != null) {
    const entry = arcPosition(-theta0, stateRef), exit = arcPosition(theta0, stateRef);
    const ex = bx + entry.x * S, xx = bx + exit.x * S;
    const xa = Math.max(7, Math.min(ex, xx)), xb = Math.min(divX - 7, Math.max(ex, xx));
    if (xb > xa) parts.push(`<rect x="${xa.toFixed(1)}" y="${(gy - 2).toFixed(1)}" width="${(xb - xa).toFixed(1)}" height="4.5" rx="2" fill="#8a5a2b" opacity=".7"/>`);
    const exC = Math.max(9, Math.min(divX - 9, ex));
    parts.push(
      `<circle cx="${exC.toFixed(1)}" cy="${gy.toFixed(1)}" r="2.6" fill="#9a7b52"/>`,
      `<text x="${exC.toFixed(1)}" y="${(gy + 13).toFixed(1)}" text-anchor="${sdAnchorFor(exC, divX)}" class="sd-lb sd-lb-soil" font-size="10">turf</text>`
    );
  }

  // shared ground line (drawn over the strip edge, under ball/markers)
  parts.push(`<line x1="7" y1="${gy.toFixed(1)}" x2="${(w - 7).toFixed(1)}" y2="${gy.toFixed(1)}" stroke="rgba(255,255,255,.28)" stroke-width="1.2"/>`);

  // ball (side view), resting on the ground line
  parts.push(`<circle cx="${bx.toFixed(1)}" cy="${(gy - ballR).toFixed(1)}" r="${ballR.toFixed(1)}" fill="url(#sdBallGrad)"/>`);

  // (1) low-point marker + dashed plumb + cm dimension (ball ↔ low point)
  const lpX = bx + lpxEff * S;
  const lpY = gy - dispLpz * S;
  if (Math.abs(lpY - gy) > 2.5) {
    parts.push(`<line x1="${lpX.toFixed(1)}" y1="${lpY.toFixed(1)}" x2="${lpX.toFixed(1)}" y2="${gy.toFixed(1)}" stroke="${yellow}" stroke-width="1" stroke-dasharray="2 3" opacity=".8"/>`);
  }
  parts.push(`<circle cx="${lpX.toFixed(1)}" cy="${lpY.toFixed(1)}" r="3" fill="${yellow}"/>`);
  {
    const topY = Math.max(24, Math.min(gy - ballR * 2, lpY) - 15);
    const leftX = Math.min(bx, lpX), rightX = Math.max(bx, lpX);
    const midX = (bx + lpX) / 2;
    const cmLabel = cmVal === 0 ? '0 cm' : `${Math.abs(cmVal)} cm`;
    parts.push(
      `<line x1="${bx.toFixed(1)}" y1="${(gy - ballR * 2 - 2).toFixed(1)}" x2="${bx.toFixed(1)}" y2="${topY.toFixed(1)}" stroke="${accent}" stroke-width="1" stroke-dasharray="2 3" opacity=".55"/>`,
      `<line x1="${lpX.toFixed(1)}" y1="${(lpY - 4).toFixed(1)}" x2="${lpX.toFixed(1)}" y2="${topY.toFixed(1)}" stroke="${accent}" stroke-width="1" stroke-dasharray="2 3" opacity=".55"/>`,
      `<line x1="${leftX.toFixed(1)}" y1="${topY.toFixed(1)}" x2="${rightX.toFixed(1)}" y2="${topY.toFixed(1)}" stroke="${accent}" stroke-width="1.4"/>`,
      `<path d="M${(leftX - 6).toFixed(1)} ${topY.toFixed(1)} L${leftX.toFixed(1)} ${(topY - 3).toFixed(1)} L${leftX.toFixed(1)} ${(topY + 3).toFixed(1)} Z" fill="${accent}"/>`,
      `<path d="M${(rightX + 6).toFixed(1)} ${topY.toFixed(1)} L${rightX.toFixed(1)} ${(topY - 3).toFixed(1)} L${rightX.toFixed(1)} ${(topY + 3).toFixed(1)} Z" fill="${accent}"/>`,
      `<rect x="${(midX - 22).toFixed(1)}" y="${(topY - 20).toFixed(1)}" width="44" height="16" rx="4" fill="#0A0E12" stroke="rgba(34,227,214,.4)"/>`,
      `<text x="${midX.toFixed(1)}" y="${(topY - 8).toFixed(1)}" text-anchor="middle" class="sd-lb">${cmLabel}</text>`
    );
  }

  // panel divider
  parts.push(`<line x1="${divX.toFixed(1)}" y1="8" x2="${divX.toFixed(1)}" y2="${(h - 8).toFixed(1)}" stroke="rgba(255,255,255,.10)" stroke-width="1"/>`);

  // (2) face close-up — .ballcloseup revival: big ball + contact line + mm
  const cR = Math.min((w - divX) * 0.27, h * 0.24);
  const cx = divX + (w - divX) / 2;
  const cy = gy - cR;
  parts.push(`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${cR.toFixed(1)}" fill="url(#sdBallGrad)"/>`);
  const ratio = Math.max(-1.45, Math.min(1.45, ct.offsetRatio));
  const cyLine = cy - ratio * cR;
  if (!disp.contact) {
    // real miss only: dashed line ABOVE the ball (ratio > 1 by construction)
    parts.push(`<line x1="${(cx - cR - 7).toFixed(1)}" y1="${cyLine.toFixed(1)}" x2="${(cx + cR + 7).toFixed(1)}" y2="${cyLine.toFixed(1)}" stroke="${disp.color}" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round"/>`);
  } else {
    parts.push(`<line x1="${(cx - cR - 7).toFixed(1)}" y1="${cyLine.toFixed(1)}" x2="${(cx + cR + 7).toFixed(1)}" y2="${cyLine.toFixed(1)}" stroke="${disp.color}" stroke-width="2.5" stroke-linecap="round"/>`);
  }
  const mmShort = !disp.contact ? 'no contact'
    : (Math.abs(mmVal) < 1.5 ? 'center' : (mmVal > 0 ? `+${mmVal} mm high` : `−${Math.abs(mmVal)} mm low`));
  parts.push(`<text x="${cx.toFixed(1)}" y="${(h - 7).toFixed(1)}" text-anchor="middle" class="sd-lb" style="fill:${disp.textColor}">${mmShort}</text>`);

  draw.innerHTML = parts.join('');
}

// ── strike readout: sr-only live region ───────────────────────────────────
// ROUND 4: the ATTACK/PATH value chips are GONE and the delivery lines are
// decorative (aria-hidden) — this region is now the ONLY carrier of the
// attack-angle and club-path VALUES, spelled out in words. Do not delete.
function renderReadout() {
  // ROUND 3 (tasks 1+2): the live region announces the corrected DISPLAY
  // band (no % — pct is computed but never shown).
  const disp = strikeDisplay(engineState);
  const di = deriveImpact(engineState);

  // live numeric alternative (a11y): the mock REMOVED the visible low-point
  // label, so the effective low point (incl. ball position) + ball position
  // itself must stay here for AT. Do not delete this region.
  const effCm = Math.round(effectiveLpx(engineState) * 100);
  const lpDesc = effCm === 0 ? 'at the ball'
    : (Math.abs(effCm) + ' cm ' + (effCm > 0 ? 'ahead of the ball' : 'behind the ball'));
  const bpCm = Math.round(state.ballPosition * 100);
  const bpDesc = bpCm === 0 ? 'centre' : (Math.abs(bpCm) + ' cm ' + (bpCm > 0 ? 'forward' : 'back'));
  // a11y (Minor 3): the strike height (mm on face) + turf entry are visible in
  // the inset (#sdFoot / ring position) — announce them here too so the live
  // region carries full visual parity.
  const mmVal2 = Math.round(clubBallContact(engineState).offset * 1000);
  const mmDesc = !disp.contact ? 'no contact, the club passes above the ball'
    : (Math.abs(mmVal2) < 1.5 ? 'centered on the face' : `${Math.abs(mmVal2)} mm ${mmVal2 > 0 ? 'high' : 'low'} on the face`);
  const theta0R = groundCrossingTheta0(engineState);
  let turfDesc = '';
  if (theta0R != null) {
    const entryR = arcPosition(-theta0R, engineState);
    const turfCmR = Math.round(entryR.x * 100);
    turfDesc = ` Turf contact ${Math.abs(turfCmR)} cm ${turfCmR <= 0 ? 'before' : 'after'} the ball.`;
  }
  // ROUND 4: direction words (up/down, in-to-out/out-to-in) instead of bare
  // signed numbers — the values must read unambiguously as speech.
  const atkDir = Math.abs(di.attackAngle) < 0.05 ? 'level' : (di.attackAngle > 0 ? 'up' : 'down');
  const pathDir = Math.abs(di.clubPath) < 0.05 ? 'neutral' : (di.clubPath > 0 ? 'in to out' : 'out to in');
  $('sceneData').textContent =
    `Strike ${disp.label}. Plane angle ${state.planeAngle} degrees. ` +
    `Attack angle ${Math.abs(di.attackAngle).toFixed(1)} degrees ${atkDir}. ` +
    `Club path ${Math.abs(di.clubPath).toFixed(1)} degrees ${pathDir}. Low point ${lpDesc}. Ball position ${bpDesc}. ` +
    `Strike ${mmDesc}.` + turfDesc;
}

// ── init ──────────────────────────────────────────────────────────────────
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
renderReadout();

// ── fade the control surfaces during play for a clean ball-strike view ────
// ROUND 4: .delivery-lines joins the hide-list (replacing .arc-stream +
// .hud-chips, both gone) — the lines fade out with the other overlays during
// playback/face-zoom and come back when the controls do.
const CONTROL_SEL = '.controls, .tune, .modnav, .strike-detail, .delivery-lines';
// a11y (Major 2): faded controls must leave the tab order — opacity:0 alone
// keeps them focusable/operable invisibly. On hide-complete we set
// visibility:hidden; if focus is inside a hidden control we stash it and park
// focus on <body>, restoring it when the controls come back.
let stashedFocus = null;
function controlsVisible(show) {
  const nodes = document.querySelectorAll(CONTROL_SEL);
  const hideDone = (n) => {
    n.style.visibility = 'hidden';
  };
  const preHide = () => {
    const ae = document.activeElement;
    if (ae && ae !== document.body && [...nodes].some(n => n.contains(ae))) {
      stashedFocus = ae;
      ae.blur();
    }
  };
  const postShow = () => {
    if (stashedFocus && stashedFocus.isConnected) {
      try { stashedFocus.focus({ preventScroll: true }); } catch (e) {}
    }
    stashedFocus = null;
  };
  if (show) nodes.forEach(n => { n.style.visibility = ''; });
  else preHide();
  if (reduce) {
    nodes.forEach(n => {
      n.style.opacity = show ? '' : '0';
      n.style.pointerEvents = show ? '' : 'none';
      if (!show) hideDone(n);
    });
    if (show) postShow();
    if (delivery3d) delivery3d.setVisible(show, gsap, reduceMotion3d);
    return;
  }
  let pending = nodes.length;
  nodes.forEach(n => {
    gsap.to(n, { opacity: show ? 1 : 0, duration: show ? 0.4 : 0.3, ease: show ? 'power2.out' : 'power1.in',
      onStart: () => { if (!show) n.style.pointerEvents = 'none'; },
      onComplete: () => {
        if (show) { n.style.pointerEvents = ''; n.style.opacity = ''; }
        else hideDone(n);
        if (show && --pending === 0) postShow();
      } });
  });
  if (delivery3d) delivery3d.setVisible(show, gsap, reduceMotion3d);
}

// ── 3D: camera orbit between FACE/DTL poses ────────────────────────────────
let viewTween3d = null;
function animate3dView(toView) {
  if (!sa3d) return;
  const pose = sa3d.POSES[toView];
  if (reduceMotion3d) {
    Object.assign(sa3d.rig, pose);
    sa3d.applyRig();
    sa3d.invalidate();
    updateDeliveryLines();
    if (gc3d) gc3d.update(engineState, sa3d.camera, $('scene3d'));
    return;
  }
  if (viewTween3d) viewTween3d.kill();
  sa3d.startTicking();
  viewTween3d = gsap.to(sa3d.rig, {
    ...pose, duration: 0.7, ease: 'power2.inOut',
    onUpdate: () => { sa3d.applyRig(); updateDeliveryLines(); },
    onComplete: () => {
      viewTween3d = null; sa3d.stopTicking();
      if (gc3d) gc3d.update(engineState, sa3d.camera, $('scene3d'));
    },
  });
}

// ── shared swing-state → localStorage (consumed by impact.html) ───────────
function writeSwingState() {
  try {
    const di = deriveImpact(engineState);
    localStorage.setItem('sa_swing', JSON.stringify({
      clubPath: di.clubPath,
      attackAngle: di.attackAngle,
    }));
  } catch (e) { /* storage unavailable → ignore */ }
}

// ── sliders (rAF-throttled) ───────────────────────────────────────────────
let pending = false;
function applyLive() {
  if (pending) return; pending = true;
  requestAnimationFrame(() => { pending = false; renderReadout(); writeSwingState(); rebuild3d(); });
}
const TRACK_BASE = 'rgba(255,255,255,.14)';
const THUMB_W = 20;
function styleSlider(el) {
  const box = el.closest('.slider'); if (!box) return;
  const min = +el.min, max = +el.max, val = +el.value;
  const span = (max - min) || 1;
  const pct = (val - min) / span;
  const w = el.clientWidth || box.clientWidth || 200;
  const inset = w > 0 ? (THUMB_W / w) : 0.1;
  const posFrac = pct * (1 - inset) + inset / 2;
  const posPct = +(posFrac * 100).toFixed(2);
  const centered = box.dataset.origin === 'center';
  const oFrac0 = centered ? (0 - min) / span : 0;
  const oFrac = centered ? (oFrac0 * (1 - inset) + inset / 2) : 0;
  const oPct = +(oFrac * 100).toFixed(2);
  let bg;
  if (centered) {
    const lo = Math.min(posPct, oPct), hi = Math.max(posPct, oPct);
    bg = `linear-gradient(90deg, ${TRACK_BASE} 0 ${lo}%, var(--rng) ${lo}% ${hi}%, ${TRACK_BASE} ${hi}% 100%)`;
  } else {
    bg = `linear-gradient(90deg, var(--rng) 0 ${posPct}%, ${TRACK_BASE} ${posPct}% 100%)`;
  }
  el.style.setProperty('--track-bg', bg);
  box.style.setProperty('--p', posPct + '%');
  box.style.setProperty('--o', oPct + '%');
}
// haptics: pointerdown→selectionStart, whole-degree/cm crossings→tick(key),
// pointerup→selectionEnd; DISPLAY band change→band(key) beats the tick
// (ROUND 3: the user feels the band the labels actually show).
const HAPTIC_GRAIN = { s_plane: v => Math.round(v), s_dir: v => Math.round(v),
  s_lpx: v => Math.round(v * 100), s_lpz: v => Math.round(v * 100),
  s_bp: v => Math.round(v * 100) };
function wireSliderHaptics(el, hapticKey) {
  let lastGrain = null, lastBand = null;
  const grain = HAPTIC_GRAIN[el.id];
  el.addEventListener('pointerdown', () => {
    lastGrain = grain(+el.value);
    lastBand = strikeDisplay(engineState).band;
    saHaptics.selectionStart();
  });
  el.addEventListener('input', () => {
    const g = grain(+el.value);
    if (lastGrain === null) lastGrain = g;
    const band = strikeDisplay(engineState).band;
    if (lastBand === null) lastBand = band;
    if (band !== lastBand) {
      lastBand = band;
      lastGrain = g;
      saHaptics.band(hapticKey);          // band change beats the coincident tick
    } else if (g !== lastGrain) {
      lastGrain = g;
      saHaptics.tick(hapticKey);
    }
  });
  const end = () => saHaptics.selectionEnd();
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
}

// ROUND 3 (task 3): tabs are label-only — no per-tab value formatters. The
// value surfaces are the slider BUBBLE (while adjusting) + aria-valuetext.
function bind(id, get, fmt) {
  const el = $(id);
  const box = el.closest('.slider');
  const bubble = box ? box.querySelector('.bubble') : null;
  const sync = () => {
    const txt = fmt(+el.value);
    el.setAttribute('aria-valuetext', txt);
    if (bubble) bubble.textContent = txt;
    styleSlider(el);
  };
  // NOTE (mock): syncEngine() runs SYNCHRONOUSLY here (not deferred to the
  // applyLive rAF) so the haptics listener below reads a fresh engineState.
  // a11y (Major 2): ignore input while a swing plays — the controls are faded
  // out then, and a state change under the running timeline desyncs the scene.
  el.addEventListener('input', () => {
    if (timeline3d && timeline3d.isPlaying()) return;
    get(+el.value); syncEngine(); sync(); applyLive();
  });
  if (box) {
    let bubbleT = null;
    const showBubble = () => { clearTimeout(bubbleT); box.classList.add('show-bubble'); };
    const hideBubble = () => { bubbleT = setTimeout(() => box.classList.remove('show-bubble'), 650); };
    el.addEventListener('pointerdown', showBubble);
    el.addEventListener('focus', showBubble);
    el.addEventListener('input', showBubble);
    el.addEventListener('pointerup', hideBubble);
    el.addEventListener('pointercancel', hideBubble);
    el.addEventListener('blur', () => box.classList.remove('show-bubble'));
  }
  wireSliderHaptics(el, id);
  return sync;
}
const syncers = [
  bind('s_plane', v => state.planeAngle = v, v => v.toFixed(0) + '°'),
  bind('s_dir', v => state.swingDirection = v, v => (v > 0 ? '+' : '') + v.toFixed(1) + '° ' + (Math.abs(v) < 0.1 ? '' : v > 0 ? 'in-out' : 'out-in')),
  bind('s_lpx', v => state.lowPoint.x = v, v => Math.abs(v * 100).toFixed(0) + ' cm ' + (v >= 0 ? 'ahead' : 'behind')),
  bind('s_lpz', v => state.lowPoint.z = v, v => v >= 0 ? (v * 100).toFixed(0) + ' cm above' : Math.abs(v * 100).toFixed(0) + ' cm below'),
  // ROUND 3 (task 3) — ball position joins the carousel; drives the same
  // stance-frame shift the removed drag handle did (rebuild3d reads
  // state.ballPosition for shift3d/ball mesh). 0 = centre of the stance.
  bind('s_bp', v => state.ballPosition = v, v => { const cm = Math.round(v * 100); return cm === 0 ? 'centre' : `${Math.abs(cm)} cm ${cm > 0 ? 'forward' : 'back'}`; }),
];

// ── ghost arc (frozen snapshot on drag start) + shimmer on release ─────────
// ROUND 4: while dragging, the delivery lines get a subtle emphasis
// (.dragging → full stroke opacity, CSS only; the global reduced-motion rule
// kills the transition so it snaps there).
const dlDragging = (on) => { const el = $('deliveryLines'); if (el) el.classList.toggle('dragging', on); };
['s_plane', 's_dir', 's_lpx', 's_lpz', 's_bp'].forEach(id => {
  const el = $(id);
  el.addEventListener('pointerdown', () => {
    if (!arc3d) return;
    arc3d.snapshotGhost();
    sa3d.invalidate();
    dlDragging(true);
    if (delivery3d) delivery3d.setDragging(true, window.gsap, reduceMotion3d);
  });
  el.addEventListener('pointerup', () => {
    if (!arc3d) return;
    arc3d.fadeGhost(window.gsap, reduceMotion3d);
    if (plane3d) plane3d.shimmer(window.gsap, reduceMotion3d);
    dlDragging(false);
    if (delivery3d) delivery3d.setDragging(false, window.gsap, reduceMotion3d);

        if (slopeDeg > 90) slopeDeg -= 180;
        if (slopeDeg < -90) slopeDeg += 180;
        return { slopeDeg: +slopeDeg.toFixed(3), a: aS, b: bS, aWorld: [aWorld.x, aWorld.y, aWorld.z], bWorld: [bWorld.x, bWorld.y, bWorld.z], halfWidthMm: +(halfWidth * 1000).toFixed(1) };
      },
      // debug-only (visual self-check, not part of the assert surface): drop
      // two small unshaded spheres at the exact world points soleSlope()
      // measures (red=+toeAxis side, blue=−toeAxis side, from faceCentreWorld)
      // so a screenshot can be eyeballed against the numeric slope. This is
      // what caught the two earlier rejected approaches (bbox corners, then
      // raw bottom-rim vertices) floating off the visible clubhead silhouette
      // — see soleSlope()'s doc comment. Idempotent — calling with on=false
      // removes them; safe to leave in the codebase (no-ops unless explicitly
      // invoked).
      _debugSoleDots: (() => {
        let dots = null;
        return (on) => {
          if (!sa3d) return null;
          if (dots) { sa3d.scene.remove(dots.a, dots.b); dots.a.geometry.dispose(); dots.a.material.dispose(); dots.b.geometry.dispose(); dots.b.material.dispose(); dots = null; }
          if (!on) { sa3d.invalidate(); return null; }
          const s = window.__sa.three.faceZoom.soleSlope();
          if (!s) return null;
          const geo = new THREE.SphereGeometry(0.006, 12, 12);
          const matA = new THREE.MeshBasicMaterial({ color: 0xff2d2d, depthTest: false, depthWrite: false, toneMapped: false });
          const matB = new THREE.MeshBasicMaterial({ color: 0x2d7bff, depthTest: false, depthWrite: false, toneMapped: false });
          const a = new THREE.Mesh(geo, matA); a.position.set(s.aWorld[0], s.aWorld[1], s.aWorld[2]); a.renderOrder = 999;
          const b = new THREE.Mesh(geo.clone(), matB); b.position.set(s.bWorld[0], s.bWorld[1], s.bWorld[2]); b.renderOrder = 999;
          sa3d.scene.add(a, b);
          dots = { a, b };
          sa3d.invalidate();
          return { aScreen: s.a, bScreen: s.b };
        };
      })(),
      // debug-only generic probes (diagnosis; not part of the assert surface):
      // projectWorldPoint — world (x,y,z) → CSS-px screen coords via the LIVE
      // camera (same projectToScreen the other hooks use). bladeLocalToWorld —
      // a point in the blade node's LOCAL frame → world, through the live
      // blade.matrixWorld (includes lie rotation + sole-height nudge + any
      // cosmetic freeze rotation). bladeMeshBBox — the bladeMesh local-geometry
      // bbox (min/max + mesh pos/scale) so probes can build feature lines
      // (leading edge, topline, groove rows) in blade-local terms.
      projectWorldPoint: (x, y, z) => (sa3d ? projectToScreen(x, y, z) : null),
      bladeLocalToWorld: (x, y, z) => {
        if (!club3d || !club3d.blade) return null;
        club3d.blade.updateWorldMatrix(true, false);
        const v = new THREE.Vector3(x, y, z).applyMatrix4(club3d.blade.matrixWorld);
        return [v.x, v.y, v.z];
      },
      bladeMeshBBox: () => {
        if (!club3d || !club3d.bladeMesh) return null;
        const mesh = club3d.bladeMesh;
        if (!mesh.geometry.boundingBox) mesh.geometry.computeBoundingBox();
        const bb = mesh.geometry.boundingBox;
        return { min: bb.min.toArray(), max: bb.max.toArray(), meshPos: mesh.position.toArray(), meshScale: mesh.scale.toArray() };
      },
      markerVsBall: () => {
        if (!sa3d || !timeline3d) return null;
        const fz = timeline3d.faceZoom;
        if (!fz.marker.visible) return { markerVisible: false };
        const mv = new THREE.Vector3(); fz.marker.getWorldPosition(mv);
        const markerS = projectToScreen(mv.x, mv.y, mv.z);
        let ballS = null, ballRadiusPx = null, distPx = null, marginPx = null;
        if (sa3d.ball) {
          const bv = new THREE.Vector3(); sa3d.ball.getWorldPosition(bv);
          ballS = projectToScreen(bv.x, bv.y, bv.z);
          const topS = projectToScreen(bv.x, bv.y, bv.z + BALL_RADIUS_M);
          ballRadiusPx = Math.hypot(topS.x - ballS.x, topS.y - ballS.y);
          distPx = Math.hypot(markerS.x - ballS.x, markerS.y - ballS.y);
          marginPx = distPx - ballRadiusPx;
        }
        return {
          markerVisible: true, markerScreen: markerS, ballScreen: ballS,
          ballRadiusPx: ballRadiusPx == null ? null : +ballRadiusPx.toFixed(2),
          distPx: distPx == null ? null : +distPx.toFixed(2),
          marginPx: marginPx == null ? null : +marginPx.toFixed(2),
        };
      },
    },
  },
  // MOCK-specific verification hooks
  mock: {
    ballPosition: () => state.ballPosition,
    setBallPosition: (v) => setBallPosition(v),
    engineLpx: () => engineState.lowPoint.x,
    effectiveLpx: () => effectiveLpx(engineState),
    thetaAtImpact: () => thetaAtImpact(engineState),
    activeTab: () => activeTabId,
    selectTab: (id) => selectTab(id),
    // ROUND 3 (task 3): handleRect/handleAria are GONE with the drag handle;
    // ball position is asserted through the s_bp slider + shiftX/ballMeshX.
    shiftX: () => (shift3d ? shift3d.position.x : null),
    ballMeshX: () => (sa3d && sa3d.ball ? sa3d.ball.position.x : null),
    // ── MOCK round 2 — acceptance-grid hooks (challenge 1b) ────────────────
    // setParams: drive the full state (sliders + tabs + scene) synchronously.
    setParams: ({ plane, dir, lpx, lpz, bp } = {}) => {
      if (plane != null) { state.planeAngle = plane; $('s_plane').value = plane; }
      if (dir != null) { state.swingDirection = dir; $('s_dir').value = dir; }
      if (lpx != null) { state.lowPoint.x = lpx; $('s_lpx').value = lpx; }
      if (lpz != null) { state.lowPoint.z = lpz; $('s_lpz').value = lpz; }
      if (bp != null) {
        state.ballPosition = Math.max(BALLPOS_MIN, Math.min(BALLPOS_MAX, bp));
        $('s_bp').value = state.ballPosition;
      }
      syncEngine();
      syncers.forEach(s => s());
      renderReadout(); writeSwingState(); rebuild3d();
    },
    // ROUND 3 (task 2) — acceptance hook: engine numbers vs the DISPLAY
    // classification vs what the inset actually shows, in one read.
    strike: () => {
      const disp = strikeDisplay(engineState);
      const ct = clubBallContact(engineState);
      return {
        clubZmm: +(ct.clubZ * 1000).toFixed(1),
        offsetMm: +(ct.offset * 1000).toFixed(1),
        offsetRatio: +ct.offsetRatio.toFixed(3),
        engineBand: strikeQuality(engineState).band,
        band: disp.band, label: disp.label, contact: disp.contact,
        chipText: $('sdChipBand') ? $('sdChipBand').textContent : null,
        chipHasPct: $('sdChip') ? /%/.test($('sdChip').textContent) : null,
        footText: $('sdFoot') ? $('sdFoot').textContent : null,
      };
    },
    // impactMetrics: place the club at the TRUE impact frame (pure arc pose —
    // exactly what playback shows at impact, blend=1) and measure:
    //   impactDxWidthPx — the blade visual face-centre's offset from the ball
    //                     centre ALONG THE TOE–HEEL AXIS ("midt i sweetspot i
    //                     bredden"), expressed in screen px — the centring
    //                     assert. The face-normal DEPTH component (the bbox
    //                     centre sits a few mm behind the face plane — real
    //                     blade thickness, not a miss) is excluded.
    //   impactDxRawPx   — raw screen-x difference bbox-centre vs ball centre
    //                     (includes that depth component; report-only)
    //   impactLieDeg    — toe–heel axis tilt out of the ground plane (the
    //                     owner's LIE-angle criterion)
    //   impactSoleFullDeg — full sole-plane residual incl. the REAL fore-aft
    //                     attack tilt of a descending strike (physics; report-
    //                     only, NOT the lie criterion)
    //   addressSoleDeg / addressLieDeg / addressSoleZmm — grounded address:
    //                     sole-plane angle, toe–heel angle, sole height (mm)
    // Restores the idle (grounded address) pose before returning.
    impactMetrics: () => {
      if (!club3d || !club3d.poseDebug || !club3d.loaded) return null;
      const th0 = thetaAtImpact(engineState);
      club3d.update(th0, engineState);
      const pd = club3d.poseDebug();
      if (!pd) { club3d.updateAddress(engineState); return null; }
      const fc = pd.faceCentreWorld; // world coords — includes the stance shift
      const bw = [state.ballPosition, 0, BALL_RADIUS_M];
      const v = [fc[0] - bw[0], fc[1] - bw[1], fc[2] - bw[2]];
      const toe = pd.toeAxis;
      const widthM = v[0] * toe[0] + v[1] * toe[1] + v[2] * toe[2];
      const pBall = projectToScreen(bw[0], bw[1], bw[2]);
      const pW = projectToScreen(bw[0] + toe[0] * widthM, bw[1] + toe[1] * widthM, bw[2] + toe[2] * widthM);
      const pClub = projectToScreen(fc[0], fc[1], fc[2]);
      const impact = {
        dxWidthPx: Math.hypot(pW.x - pBall.x, pW.y - pBall.y) * Math.sign(widthM || 1),
        dxRawPx: pClub.x - pBall.x,
        widthMm: widthM * 1000,
        lieDeg: pd.lieDeg, soleFullDeg: pd.soleFullDeg,
      };
      club3d.updateAddress(engineState); // restore idle grounded pose
      const ad = club3d.poseDebug();
      if (sa3d) sa3d.invalidate();
      return {
        impactDxWidthPx: +impact.dxWidthPx.toFixed(2),
        impactWidthMm: +impact.widthMm.toFixed(2),
        impactDxRawPx: +impact.dxRawPx.toFixed(2),
        impactLieDeg: +impact.lieDeg.toFixed(3),
        impactSoleFullDeg: +impact.soleFullDeg.toFixed(2),
        addressSoleDeg: +ad.soleFullDeg.toFixed(3),
        addressLieDeg: +ad.lieDeg.toFixed(3),
        addressSoleZmm: ad.soleZ == null ? null : +(ad.soleZ * 1000).toFixed(2),
      };
    },
    addressBlend: () => (timeline3d ? timeline3d._internal.addressBlend.b : null),
    // ROUND 4 — delivery-line verification hook: endpoints (CSS px), screen
    // angle, visible length, tag state per line + the clip frame used.
    deliveryLines: () => {
      const svg = $('deliveryLines');
      if (!svg) return null;
      const read = (lnId, tagId) => {
        const ln = $(lnId), tag = $(tagId);
        if (!ln) return null;
        const x1 = +ln.getAttribute('x1'), y1 = +ln.getAttribute('y1');
        const x2 = +ln.getAttribute('x2'), y2 = +ln.getAttribute('y2');
        return {
          visible: ln.getAttribute('visibility') !== 'hidden',
          x1, y1, x2, y2,
          angleDeg: +(Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI).toFixed(2),
          lengthPx: +Math.hypot(x2 - x1, y2 - y1).toFixed(1),
          tagVisible: tag ? tag.getAttribute('visibility') !== 'hidden' : null,
          tagText: tag ? tag.textContent : null,
          tagX: tag ? +tag.getAttribute('x') : null,
          tagY: tag ? +tag.getAttribute('y') : null,
        };
      };
      const tuneEl = $('tune');
      return {
        path: read('dlPath', 'dlPathTag'),
        attack: read('dlAtk', 'dlAtkTag'),
        dragging: svg.classList.contains('dragging'),
        frame: {
          w: innerWidth, h: innerHeight, margin: DL_MARGIN,
          railTop: tuneEl ? tuneEl.getBoundingClientRect().top : null,
        },
      };
    },
    // ROUND 3 (task 3): tabs are label-only; expose the labels for asserts.
    tabLabels: () => Array.from(document.querySelectorAll('.ctab')).map(b => b.textContent.trim()),
    // debug (freeze-pose diagnosis). floor + fx added for the FIX Q2
    // hide-list assert (both join faceZoomHideNodes — see its doc comment).
    nodeVis: () => ({
      arc: arc3d ? arc3d.group.visible : null,
      plane: plane3d ? plane3d.group.visible : null,
      lp: lp3d ? lp3d.group.visible : null,
      delivery: delivery3d ? delivery3d.group.visible : null,
      targetLine: sa3d ? sa3d.targetLine.visible : null,
      floor: sa3d ? sa3d.floor.visible : null,
      fx: timeline3d ? timeline3d.fx.group.visible : null,
    }),
    camPos: () => (sa3d ? sa3d.camera.position.toArray() : null),
    camFov: () => (sa3d ? sa3d.camera.fov : null),
  },
  checkAlign3d: (samples = 9) => {
    if (!club3d) return { pass: false, error: 'club3d not ready' };
    const savedPlane = engineState.planeAngle, savedDir = engineState.swingDirection, savedLpx = engineState.lowPoint.x;

    const posErrs = [], faceDots = [];
    for (let i = 0; i < samples; i++) {
      const p = samples === 1 ? 0.5 : i / (samples - 1);
      const SWEEP = deg2rad(90);
      const theta = -SWEEP + 2 * SWEEP * p;
      const { basis } = club3d.update(theta, engineState);
      const want = arcPosition(theta, engineState);
      const got = club3d.group.position;
      posErrs.push(Math.hypot(got.x - want.x, got.y - want.y, got.z - want.z));
      const tan = tangentAt(theta, engineState);
      const tl = Math.hypot(tan.x, tan.y, tan.z) || 1;
      const tanN = { x: tan.x / tl, y: tan.y / tl, z: tan.z / tl };
      const faceDir = { x: -basis.Z.x, y: -basis.Z.y, z: -basis.Z.z }; // local -Z = face normal
      faceDots.push(faceDir.x * tanN.x + faceDir.y * tanN.y + faceDir.z * tanN.z);
    }

    const soleErrAt = (planeDeg) => {
      engineState.planeAngle = planeDeg; engineState.swingDirection = 0; engineState.lowPoint.x = 0;
      const theta = thetaAtImpact(engineState);
      const { basis } = club3d.update(theta, engineState);
      const d = club3d.blade ? club3d.blade.rotation.z : club3d.computeLieDelta(basis);
      const Yp = {
        x: Math.cos(d) * basis.Y.x - Math.sin(d) * basis.X.x,
        y: Math.cos(d) * basis.Y.y - Math.sin(d) * basis.X.y,
        z: Math.cos(d) * basis.Y.z - Math.sin(d) * basis.X.z,
      };
      const c = Math.max(-1, Math.min(1, Math.abs(Yp.z)));
      return Math.acos(c) * 180 / Math.PI;
    };
    const soleErr45 = soleErrAt(45);
    const soleErr70 = soleErrAt(70);

    // restore (the saved values ARE the derived engine values — state itself
    // was never touched, so restoring them keeps state/engineState coherent)
    engineState.planeAngle = savedPlane; engineState.swingDirection = savedDir; engineState.lowPoint.x = savedLpx;
    club3d.updateAddress(engineState);
    sa3d && sa3d.invalidate();

    const maxPosErr = Math.max(...posErrs);
    const minFaceDot = Math.min(...faceDots);
    const pass = maxPosErr < 0.001 && minFaceDot > 0.999 && soleErr45 <= 1 && soleErr70 <= 1;
    return {
      maxPosErr: +maxPosErr.toFixed(6), minFaceDot: +minFaceDot.toFixed(6),
      soleErr45: +soleErr45.toFixed(3), soleErr70: +soleErr70.toFixed(3), pass,
    };
  },
});

// ── first-run coach marks — same gating as geometry.html; step 2/3 updated
// for the mock's carousel + ball handle (tuneBtn no longer exists). ────────
const COACH_STEPS = [
  { selector: '#viewBtn', title: 'Tilt the view', body: 'Switch between front-on and down-the-line to see the swing plane lean back.' },
  { selector: '#ctabs',   title: 'Adjust the swing', body: 'Pick a parameter — Plane, Direction, Low point, Depth or Ball position — and drag its slider.' },
  { selector: '#hit',     title: 'Watch the strike', body: 'Press play to run the swing in slow motion and see the club meet the ball at impact.' },
];
const COACH_SETTLE_MS = 600;

function isLandscape() {
  try {
    if (matchMedia('(orientation: landscape)').matches) return true;
  } catch (e) {}
  return innerWidth > innerHeight;
}
function sceneReady() {
  return !!(window.__sa3d && window.__sa3d.renderCount > 0);
}
function readyForCoach() {
  return isLandscape() && sceneReady();
}

let coachIdx = 0;
let activeCoach = null;
let coachArmed = false;
let coachSettleTimer = null;

function startCoachAt(startIndex) {
  if (activeCoach) return;
  const steps = COACH_STEPS.slice(startIndex);
  if (!steps.length) return;
  activeCoach = SA.coachMarks(steps, {
    storageKey: 'sa_coach_geo',
    onStep(i) { coachIdx = startIndex + i; },
    onDone() { activeCoach = null; coachArmed = false; coachIdx = 0; }
  });
}

function hideCoachForPortrait() {
  if (activeCoach) {
    try { activeCoach.close(); } catch (e) {}
    activeCoach = null;
  }
  if (coachSettleTimer) { clearTimeout(coachSettleTimer); coachSettleTimer = null; }
}

function tryShowCoach() {
  if (!coachArmed || activeCoach) return;
  if (!readyForCoach()) return;
  if (coachSettleTimer) return;
  coachSettleTimer = setTimeout(() => {
    coachSettleTimer = null;
    if (!coachArmed || activeCoach || !readyForCoach()) return;
    startCoachAt(coachIdx);
  }, COACH_SETTLE_MS);
}

function runCoach() {
  if (!(window.SA && SA.coachMarks)) return;
  coachIdx = 0;
  coachArmed = true;
  if (readyForCoach()) {
    startCoachAt(0);
  } else {
    tryShowCoach();
  }
}
$('helpBtn').addEventListener('click', runCoach);

function maybeFirstRun() {
  if (!(window.SA && SA.coachMarks)) { setTimeout(maybeFirstRun, 60); return; }
  if (SA.seen('sa_coach_geo')) return;
  coachIdx = 0;
  coachArmed = true;
  tryShowCoach();
}
maybeFirstRun();

addEventListener('orientationchange', () => {
  if (!isLandscape()) hideCoachForPortrait(); else tryShowCoach();
});
addEventListener('resize', () => {
  if (!isLandscape()) hideCoachForPortrait(); else tryShowCoach();
});
try {
  matchMedia('(orientation: landscape)').addEventListener('change', (e) => {
    if (!e.matches) hideCoachForPortrait(); else tryShowCoach();
  });
} catch (e) {}
(function pollSceneReady() {
  if (sceneReady()) { tryShowCoach(); return; }
  setTimeout(pollSceneReady, 80);
})();

window.__coachDebug = {
  isLandscape, sceneReady, readyForCoach,
  get idx() { return coachIdx; },
  get armed() { return coachArmed; },
  get active() { return !!activeCoach; },
};
</script>
</body>
