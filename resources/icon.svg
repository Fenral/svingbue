<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1218"/>
      <stop offset="100%" stop-color="#070A0D"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F8F8A"/>
      <stop offset="55%" stop-color="#22E3D6"/>
      <stop offset="100%" stop-color="#7CF5EC"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="35%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#EAFFFC"/>
      <stop offset="100%" stop-color="#BFE9E4"/>
    </radialGradient>
    <filter id="arcGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Near-black rounded field (iOS applies its own mask; extra corner
       rounding here is harmless and helps the icon read correctly in
       contexts like this raw PNG being previewed un-masked). -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>

  <!-- subtle inner vignette ring for depth -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="none"
        stroke="#12181F" stroke-width="2"/>

  <!-- The swing-arc: a single clean sweeping curve, thick at the base,
       tapering toward impact — evokes a golf swing plane / StrikeArc mark. -->
  <g filter="url(#arcGlow)">
    <path d="M 246 730
             C 246 520, 360 300, 620 246
             C 760 218, 838 268, 866 356"
          fill="none"
          stroke="url(#arcGrad)"
          stroke-width="46"
          stroke-linecap="round"/>
  </g>

  <!-- Impact ball at the tip of the arc -->
  <circle cx="866" cy="380" r="54" fill="url(#ballGrad)"/>
  <circle cx="866" cy="380" r="54" fill="none" stroke="#0A0E12" stroke-width="4" opacity="0.25"/>

  <!-- Small impact flash lines -->
  <g stroke="#7CF5EC" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="932" y1="330" x2="968" y2="304"/>
    <line x1="946" y1="380" x2="988" y2="378"/>
    <line x1="932" y1="430" x2="964" y2="454"/>
  </g>

  <!-- Base anchor dot (ground/address position) -->
  <circle cx="246" cy="730" r="22" fill="#22E3D6" opacity="0.9"/>
</svg>
