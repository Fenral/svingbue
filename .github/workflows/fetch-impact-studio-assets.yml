name: Fetch Impact Studio assets
# Engangsjobb: henter Higgsfield-genererte assets (eierens konto) fra CDN
# inn i repoet. Slettes når assetene er hentet.
on:
  workflow_dispatch:
  push:
    branches: [claude/golf-swing-viz-redesign-ctvj75]
    paths: ['assets/impact-studio/.trigger']

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/golf-swing-viz-redesign-ctvj75
      - name: Download assets
        run: |
          set -e
          B=https://d8j0ntlcm91z4.cloudfront.net/user_3GdzmhDdgaP9stT4ZuGgLhii3Jg
          curl -fsSL -o assets/impact-studio/iron-head.png   $B/hf_20260722_102347_df6637fe-fef5-4cb3-b76c-b507aa0cc3a2.png
          ls -la assets/impact-studio
      - name: Commit
        run: |
          git config user.name "impact-studio-assets[bot]"
          git config user.email "noreply@github.com"
          git add assets/impact-studio
          git commit -m "chore: køllehode-sprites (jern + driver) fra Higgsfield-CDN"
          git push
