name: Fetch Impact Studio assets
# Engangsjobb: henter de Higgsfield-genererte assetene (eierens konto) fra
# CDN inn i repoet, slik at mocken kan bruke lokale filer.
on:
  workflow_dispatch:
  push:
    branches: [claude/golf-swing-viz-redesign-ctvj75]
    paths: ['assets/impact-studio/.trigger']

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/golf-swing-viz-redesign-ctvj75
      - name: Download assets
        run: |
          set -e
          mkdir -p assets/impact-studio
          B=https://d8j0ntlcm91z4.cloudfront.net/user_3GdzmhDdgaP9stT4ZuGgLhii3Jg
          # 2K-oppskalert turf + DTL-bakgrunn; nedskaleres til 2048 bredde for repo-vekt
          curl -fsSL -o /tmp/turf-2k.png   $B/hf_20260722_031345_f29117c7-c517-4645-a86e-8d3b277eb304.png
          curl -fsSL -o /tmp/bg-dtl-2k.png $B/hf_20260722_031346_aee0c43f-e687-4c7a-a01f-8f8cba7b48d0.png
          pip install --quiet pillow
          python3 - <<'EOF'
          from PIL import Image
          for src, dst in [('/tmp/turf-2k.png','assets/impact-studio/turf.png'),
                           ('/tmp/bg-dtl-2k.png','assets/impact-studio/bg-dtl.png')]:
              im = Image.open(src)
              w, h = im.size
              im.resize((2048, round(h * 2048 / w)), Image.LANCZOS).save(dst)
          EOF
          # ny jordtekstur (divot-kavitet) + tee-cutout
          curl -fsSL -o assets/impact-studio/soil.png      $B/hf_20260722_031335_1ec247a2-bf21-4a20-b8b0-5c3d3a201e41.png
          curl -fsSL -o assets/impact-studio/soil-min.webp $B/hf_20260722_031335_1ec247a2-bf21-4a20-b8b0-5c3d3a201e41_min.webp
          curl -fsSL -o assets/impact-studio/tee.png       $B/hf_20260722_031609_e325711d-4dc8-4422-8981-87cf3af241b5.png
          curl -fsSL -o assets/impact-studio/tee-min.png   $B/hf_20260722_031609_e325711d-4dc8-4422-8981-87cf3af241b5_min.png
          # tørvflak-spriten er fjernet fra designet
          rm -f assets/impact-studio/divot.png assets/impact-studio/divot-min.png
          ls -la assets/impact-studio
      - name: Commit
        run: |
          git config user.name "impact-studio-assets[bot]"
          git config user.email "noreply@github.com"
          git add -A assets/impact-studio
          git commit -m "chore: 2K turf/bakgrunn + jordtekstur + tee-sprite fra Higgsfield-CDN"
          git push
