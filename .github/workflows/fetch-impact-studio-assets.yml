name: Fetch Impact Studio assets
# Engangsjobb: henter Higgsfield-genererte assets fra CDN inn i repoet.
on:
  push:
    branches: [claude/golf-swing-viz-redesign-ctvj75]
    paths: ['assets/impact-studio/.trigger']

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/golf-swing-viz-redesign-ctvj75
      - name: Download assets
        run: |
          set -e
          B=https://d8j0ntlcm91z4.cloudfront.net/user_3GdzmhDdgaP9stT4ZuGgLhii3Jg
          curl -fsSL -o assets/impact-studio/driver-head.png $B/hf_20260722_190825_d05d7724-794f-48ae-af76-cb860372a7ed.png
      - name: Commit
        run: |
          git config user.name "impact-studio-assets[bot]"
          git config user.email "noreply@github.com"
          git add assets/impact-studio
          git commit -m "chore: driverhode med taa mot leseren fra Higgsfield-CDN"
          git push
