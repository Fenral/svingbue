          <div class="xpbar" id="hdr-xpbar" role="progressbar" aria-valuemin="${li.curXp}" aria-valuemax="${li.nextXp}" aria-valuenow="${store.xp}" aria-label="Experience to next level"><div class="fill" id="hdr-xpfill" style="width:${(li.pct*100).toFixed(1)}%"></div></div>
        </div>
      </div>
      <div class="badgerail">${badges}</div>
    </header>`;
  }
  function wireBadges(root){
    root.querySelectorAll('[data-badge]').forEach(b => {
      b.addEventListener('click', () => { const bd = BADGE[b.dataset.badge]; announce(bd.label + (store.badges.includes(bd.id)?' — earned. ':' — locked. ') + bd.desc); });
    });
  }

  /* ══ ROUTER ══ */
  function go(hash){ if (location.hash === hash) route(); else location.hash = hash; }
  function focusMainHeading(){
    const h1 = app.querySelector('h1');
    if (!h1) return;
    if (!h1.hasAttribute('tabindex')) h1.setAttribute('tabindex', '-1');
    h1.focus({ preventScroll:true });
  }
  let hasRoutedOnce = false;
  function route(){
    const h = location.hash || '#/path';
    const m = h.match(/^#\/lesson\/(backspin|carry)$/);
    if (m) renderLesson(m[1]);
    else renderPath();
    window.scrollTo(0,0);
    // Move focus to the new view's heading on every SPA route change, but not on the very
    // first paint — that would rob keyboard users of the skip link as their first Tab stop.
    if (hasRoutedOnce) focusMainHeading();
    hasRoutedOnce = true;
  }
  window.addEventListener('hashchange', route);

  /* ══ PATH / MAP VIEW — VERTICAL CLIMB ══
     Tiers stack top→bottom (Fundamentals at the top, Environment at the bottom): the vertical
     scroll direction reads as foundations → derived → outcomes, matching the dependency flow.
     Within a tier, nodes flow down two lanes; a lone trailing node centres as a capstone.
     x is stored as the node CENTRE in PERCENT (0–100) so the map is fully width-responsive;
     y is a pixel offset. Edges + mini-map both consume these coordinates. */
  const NODE_H = 58;
  const LANE = [27, 73];        // lane centres, percent
  function computeLayout(){
    const headH = 38, rowH = 78, tierGap = 30, topPad = 10;
    const pos = {}, tierBands = [];
    let y = topPad;
    TIER_COLS.forEach(col => {
      const y0 = y;
      const rowStart = y + headH;
      const rows = Math.ceil(col.ids.length / 2);
      const n = col.ids.length;
      col.ids.forEach((id, ri) => {
        const loneLast = (ri === n - 1) && (n % 2 === 1);
        const lane = ri % 2, row = Math.floor(ri / 2);
        pos[id] = { x: loneLast ? 50 : LANE[lane], y: rowStart + row * rowH, lane, row };
      });
      y = rowStart + rows * rowH;
      tierBands.push({ label: col.label, y0, y1: y });
      y += tierGap;
    });
    return { pos, tierBands, width: 100, height: y };
  }

  function renderPath(){
    const L = computeLayout();
    const doneCount = Object.values(store.lessons).filter(l => l.completed).length;
    // edges svg — vertical S-curves flowing down between lanes (percent-x / pixel-y space)
    let edges = '';
    for (const e of GRAPH.edges){
      const A = L.pos[e.from], B = L.pos[e.to]; if (!A || !B) continue;
      const x1 = A.x, x2 = B.x;
      let y1, y2;
      if (A.y <= B.y){ y1 = A.y + NODE_H; y2 = B.y; }   // downward: source bottom → target top
      else { y1 = A.y; y2 = B.y + NODE_H; }             // upward (e.g. Environment → Outcomes)
      const dy = (y2 - y1) * 0.5;
      const hot = ['available','completed'].includes(nodeState(e.from)) || ['available','completed'].includes(nodeState(e.to));
      edges += `<path d="M${x1},${y1.toFixed(1)} C${x1},${(y1+dy).toFixed(1)} ${x2},${(y2-dy).toFixed(1)} ${x2},${y2.toFixed(1)}" fill="none" stroke="${hot?'rgba(34,227,214,.42)':'rgba(232,240,251,.10)'}" stroke-width="1" vector-effect="non-scaling-stroke"/>`;
    }
    // tier heads — full-width bands stacked down the climb
    let heads = '';
    L.tierBands.forEach(t => { heads += `<div class="col-head" style="top:${t.y0}px">${esc(t.label)}</div>`; });
    // nodes
    let nodes = '';
    TIER_COLS.forEach((col, ci) => {
      col.ids.forEach(id => {
        const n = NODE[id], st = nodeState(id), p = L.pos[id];
        const l = store.lessons[id];
        const cls = ['node','node--'+st];
        if (store.lastOpened === id) cls.push('node--current');
        let glyph = '';
        if (st === 'completed') glyph = '<span class="nglyph" aria-hidden="true">✓</span>';
        else if (st === 'available') glyph = '<span class="ring" aria-hidden="true"></span>';
        else glyph = '<span class="nglyph" aria-hidden="true">🔒</span>';
        const xpStamp = st === 'completed' ? `<span class="nxp mono">+${l.quizBest + (l.read?40:0)} XP</span>` : '';
        const tierTag = col.label.replace(/s$/,'');
        const aria = st === 'locked'
          ? `${n.label}, locked, coming soon`
          : `${n.label}, ${st}${st==='available'?', press Enter to start':''}. ${n.blurb}`;
        nodes += `<button class="${cls.join(' ')}" data-node="${id}" aria-disabled="${st==='locked'}"
          style="left:${(p.x-21).toFixed(2)}%;top:${p.y}px;height:${NODE_H}px" aria-label="${esc(aria)}">
          <span class="r1"><span class="ntier">${tierTag}</span>${glyph}</span>
          <span class="nlabel">${esc(n.label)}</span>${xpStamp}
        </button>`;
      });
    });

    document.title = 'StrikeArc Academy';
    app.innerHTML = `<div class="view">
      ${headerHTML()}
      <div class="path-intro">
        <div class="kicker">Mastery Path</div>
        <h1>Learn the Instrument</h1>
        <div class="slice">Vertical slice: <b>${doneCount}</b> of 21 modules live &middot; Backspin &amp; Carry are pre-unlocked so you can judge the format now.</div>
      </div>
      <div class="map-scroll">
        <div class="map-canvas" role="group" aria-label="Parameter mastery path" style="height:${L.height}px">
          <svg class="map-edges" viewBox="0 0 100 ${L.height}" preserveAspectRatio="none" width="100%" height="${L.height}" aria-hidden="true">${edges}</svg>
          ${heads}
          ${nodes}
        </div>
      </div>
    </div>`;

    wireBadges(app);
    wireMap();
  }

  function wireMap(){
    const canvas = $('.map-canvas');
    const btns = Array.from(canvas.querySelectorAll('[data-node]'));
    const byId = Object.fromEntries(btns.map(b => [b.dataset.node, b]));
    function openNode(id){
      const st = nodeState(id);
      if (st === 'locked'){ haptic('light'); announce(NODE[id].label + ', locked. Coming soon — this module is not built yet.'); return; }
      haptic('light'); store.lastOpened = id; save(); go('#/lesson/' + id);
    }
    btns.forEach(b => {
      const id = b.dataset.node;
      b.addEventListener('click', () => openNode(id));
      const tipHtml = () => nodeState(id)==='locked'
        ? `<b>${esc(NODE[id].label)}</b>Coming soon — module not yet built.`
        : `<b>${esc(NODE[id].label)}</b>${esc(NODE[id].blurb)}`;
      b.addEventListener('mouseenter', ev => showTip(tipHtml(), ev.clientX, ev.clientY));
      b.addEventListener('mousemove', ev => showTip(tipHtml(), ev.clientX, ev.clientY));
      b.addEventListener('mouseleave', hideTip);
      b.addEventListener('focus', () => { const r = b.getBoundingClientRect(); showTip(tipHtml(), r.left, r.bottom); });
      b.addEventListener('blur', hideTip);
    });
    // pulse the just-completed / last-opened node
    if (store.lastOpened && byId[store.lastOpened] && nodeState(store.lastOpened) === 'completed'){
      const b = byId[store.lastOpened];
      if (!reduced()){ b.classList.add('justdone'); setTimeout(() => b.classList.remove('justdone'), 1200); }
    }
  }

  /* ══ LESSON VIEW ══ */
  function parseMyth(s){
    s = String(s).trim();
    const q = s[0];
    const pair = { '"':'"', '“':'”', "'":"'", '‘':'’' };
    if (pair[q]){ const idx = s.indexOf(pair[q], 1); if (idx > 0) return { myth:s.slice(1, idx), truth:s.slice(idx+1).trim() }; }
    const m = s.match(/^(.+?[.!?])\s+(.+)$/s);
    if (m) return { myth:m[1], truth:m[2] };
    return { myth:s, truth:'' };
  }
  function isEnvDriver(d){ return /air|altitude|wind|temperature|humidity|conditions/i.test(d); }

  function miniMapSVG(currentId){
    const L = computeLayout();
    const VW = 110, VH = 150;                       // portrait mini-map, mirrors the vertical climb
    const sx = VW / L.width, sy = VH / L.height;
    let dots = '';
    for (const id of Object.keys(L.pos)){
      const p = L.pos[id], st = nodeState(id);
      const cx = p.x * sx, cy = (p.y + NODE_H/2) * sy;
      const cur = id === currentId;
      const fill = cur ? '#22E3D6' : (st==='completed' ? 'rgba(34,227,214,.55)' : st==='available' ? 'rgba(154,171,198,.7)' : 'rgba(93,110,135,.5)');
      dots += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${cur?4.5:2.4}" fill="${fill}"/>`;
      if (cur) dots += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="7" fill="none" stroke="#22E3D6" stroke-width="1"/>`;
    }
    return `<svg viewBox="0 0 ${VW} ${VH}" width="100%" height="${VH}" preserveAspectRatio="xMidYMid meet" style="display:block;max-width:150px;margin:0 auto" aria-hidden="true">${dots}</svg>`;
  }

  const SECTIONS = [
    { id:'sec-hook', label:'Hook' },
    { id:'sec-what', label:'What it is' },

    { id:'sec-connect', label:'How it connects' },

      const env = isEnvDriver(h.driver);

      </nav>
      <div class="lesson-body">

        <section class="sect in" id="sec-hook">
          <div class="hero">
            <div class="hero-main">
              <span class="htier">${esc(meta.tier)} · Parameter</span>

        </section>

        <section class="sect" id="sec-connect">
          <div class="sect-k">03 — How they connect</div>
          <h2>The chain of cause</h2>
          <div class="prose">${esc(d.howTheyConnect)}</div>
        </section>

        <section class="sect" id="sec-hier">
          <div class="sect-k">04 — Hierarchy</div>
          <h2>Ranked by influence</h2>
          <div class="hlegend">Bars show RELATIVE INFLUENCE (qualitative rank, not a measured value). Environment drivers wear an EST pill.</div>

        <section class="sect" id="sec-myth">

  function setupReveal(lessonId){
    const sects = Array.from(app.querySelectorAll('.sect'));
    const jprog = $('#jprog');
    const dots = Array.from(app.querySelectorAll('#secdots .d'));
    const jumps = Array.from(app.querySelectorAll('[data-jump]'));
    const idIndex = Object.fromEntries(SECTIONS.map((s,i)=>[s.id,i]));
    let seen = new Set(['sec-hook']);
    dots[0] && dots[0].classList.add('on');
    if (reduced()){ sects.forEach(s => s.classList.add('in')); }
    const io = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (en.isIntersecting){
          en.target.classList.add('in');
          const idx = idIndex[en.target.id];
          if (idx != null){ seen.add(en.target.id); dots[idx] && dots[idx].classList.add('on'); }
        }
      });
      // active jump
      const vis = sects.filter(s => { const r = s.getBoundingClientRect(); return r.top < window.innerHeight*0.5 && r.bottom > 80; });
      if (vis.length){ const cur = vis[0].id; jumps.forEach(j => j.classList.toggle('on', j.dataset.jump === cur)); }
      const count = SECTIONS.filter(s => seen.has(s.id)).length;
      jprog.textContent = count + ' / ' + SECTIONS.length;
    }, { rootMargin:'0px 0px -20% 0px', threshold:0.15 });
    sects.forEach(s => io.observe(s));
    // safety: reveal anything still hidden after 700ms
    setTimeout(() => sects.forEach(s => s.classList.add('in')), 700);
  }

          <div class="footnote">Engine carry depends on ball speed only; altitude / wind / temperature / humidity are a documented EST post-solve air layer (grounded by the Wolfram checks below). The drawn flight = engine carry × EST air. Every EST number wears a pill.</div>
          <button class="datatoggle" id="c-datatoggle" aria-expanded="false">Show data table</button>
          <div class="datatable" id="c-datatable"><table><caption class="sr-only">Carry ledger values</caption><tbody id="c-datarows"></tbody></table></div>
        </div>
        <div class="carry-ledger">
          <div class="ledger-k">The ledger — where the yards come from</div>
          <div id="c-ledger"></div>
          <div class="chips" style="margin-top:10px">
            <div class="chip"><div class="ck">Ball speed</div><div class="cv"><span class="mono" id="c-c-bs">0</span><span class="cu">mph</span></div></div>
            <div class="chip"><div class="ck">Launch</div><div class="cv"><span class="mono" id="c-c-la">0</span><span class="cu">°</span></div></div>
            <div class="chip"><div class="ck">Backspin</div><div class="cv"><span class="mono" id="c-c-sp">0</span><span class="cu">rpm</span></div></div>
            <div class="chip"><div class="ck">Spin loft</div><div class="cv"><span class="mono" id="c-c-sl">0</span><span class="cu">°</span></div></div>
            <div class="chip"><div class="ck">Smash</div><div class="cv"><span class="mono" id="c-c-sm">0</span></div></div>
          </div>
        </div>
      </div>`;

    const el = s => mount.querySelector(s);
    const sls = { cs:el('#sl-c-cs'), dl:el('#sl-c-dl'), aa:el('#sl-c-aa'), alt:el('#sl-c-alt'), wind:el('#sl-c-wind'), temp:el('#sl-c-temp'), hum:el('#sl-c-hum') };

    // yard ticks (static)
    let ticks = '';
    for (let yd=0; yd<=260; yd+=25){ const X = 40 + (yd/260)*(980-40); ticks += `<line x1="${X.toFixed(0)}" y1="256" x2="${X.toFixed(0)}" y2="264" stroke="rgba(232,240,251,.16)" stroke-width="1"/><text x="${X.toFixed(0)}" y="278" font-family="Azeret Mono" font-size="9" fill="#7e90ac" text-anchor="middle">${yd}</text>`; }
    el('#c-ticks').innerHTML = ticks;

    const SX = yd => 40 + (yd/260)*(980-40);
    const SY = h  => 260 - (h/52)*(260-24);

    function arcPath(carry, apex, f){
      const s = trajectorySamples(f, 64); let d = '';
      s.forEach((pt, i) => { d += (i===0?'M':'L') + SX(pt.d*carry).toFixed(1) + ',' + SY(pt.h*apex).toFixed(1); });
      return d;
    }

    function ledgerRow(name, val, kind, est){
      const base = 100; // width mapping done by caller via width; here just markup
      return { name, val, kind, est };
    }

    function render(){
      const f = solveFlight({ clubSpeed:state.cs, dynamicLoft:state.dl, attackAngle:state.aa, clubPath:0, faceAngle:0 });
      // EST air layer
      const fAlt  = 1 - 0.030*(state.alt/1000);
      const fTemp = 288.15/(273.15 + state.temp);
      const fHum  = 1 - 0.001*(state.hum/100);
      const densityRatio = fAlt*fTemp*fHum;
      const carryEnvMult = 1 + 0.70*(1 - densityRatio);
      const windMult = state.wind >= 0 ? (1 - 0.010*state.wind) : (1 + 0.005*(-state.wind));
      const carryFinal = f.carry * carryEnvMult * windMult;
      const apexFinal  = f.apex * carryEnvMult;

      // slider labels + valuetext
      sls.cs.setAttribute('aria-valuetext', state.cs + ' miles per hour');
      sls.dl.setAttribute('aria-valuetext', state.dl + ' degrees');
      sls.aa.setAttribute('aria-valuetext', state.aa + ' degrees');
      sls.alt.setAttribute('aria-valuetext', state.alt.toLocaleString('en-US') + ' feet, estimated');
      sls.wind.setAttribute('aria-valuetext', Math.abs(state.wind) + ' mph ' + (state.wind>0?'headwind':state.wind<0?'tailwind':'calm') + ', estimated');
      sls.temp.setAttribute('aria-valuetext', state.temp + ' degrees celsius, estimated');
      sls.hum.setAttribute('aria-valuetext', state.hum + ' percent, estimated');
      el('#v-c-cs').textContent = state.cs+' mph'; el('#v-c-dl').textContent = state.dl+'°';
      el('#v-c-aa').textContent = (state.aa>0?'+':'')+state.aa+'°'; el('#v-c-alt').textContent = state.alt.toLocaleString('en-US')+' ft';
      el('#v-c-wind').textContent = (state.wind>0?'+':'')+state.wind+' mph'; el('#v-c-temp').textContent = state.temp+'°C'; el('#v-c-hum').textContent = state.hum+'%';

      // arcs
      el('#c-ghost').setAttribute('d', arcPath(f.carry, f.apex, f));
      el('#c-live').setAttribute('d', arcPath(carryFinal, apexFinal, f));
      // ball at apex of live arc (d=0.52)
      const ballX = SX(0.52*carryFinal), ballY = SY(0.9985*apexFinal);
      el('#c-ball').setAttribute('cx', ballX.toFixed(1)); el('#c-ball').setAttribute('cy', ballY.toFixed(1));
      el('#c-shadow').setAttribute('cx', ballX.toFixed(1));
      el('#c-ghostlbl').setAttribute('x', SX(f.carry).toFixed(1)); el('#c-ghostlbl').setAttribute('y', '252');

      // carry readout + delta
      setNum(el('#c-carry'), carryFinal, { dp:0 });
      const delta = carryFinal - f.carry;
      const dchip = el('#c-delta');
      dchip.textContent = (delta>=0?'+':'−') + Math.abs(delta).toFixed(0) + ' yd air';
      dchip.className = 'deltachip mono ' + (delta>=0 ? 'gain' : 'loss');

      // ledger
      const base = f.carry;
      const windowBonus = base*0.06*Math.max(0, 1 - Math.abs(f.launchAngle-15)/12);
      const dAlt = base*0.70*(1-fAlt);
      const dTemp = base*0.70*(1-fTemp);
      const dHum = base*0.70*(1-fHum);
      const dWind = base*(windMult-1);
      const rows = [
        { name:'Ball speed', val:base, kind:'base', est:false },
        { name:'Launch + spin window', val:windowBonus, kind:'pos', est:true, illus:true },
        { name:'Altitude', val:dAlt, kind:dAlt>=0?'pos':'neg', est:true },
        { name:'Wind', val:dWind, kind:dWind>=0?'pos':'neg', est:true },
        { name:'Temperature', val:dTemp, kind:dTemp>=0?'pos':'neg', est:true },
        { name:'Humidity', val:dHum, kind:dHum>=0?'pos':'neg', est:true },
      ];
      el('#c-ledger').innerHTML = rows.map(r => {
        const w = clamp(Math.abs(r.val)/base*100, r.val!==0?4:0, 100);
        const sign = r.kind==='base' ? '' : (r.val>=0?'+':'−');
        return `<div class="lrow">
          <div class="ltop"><span class="ln">${r.name}${r.est?'<span class="est">EST</span>':''}</span><span class="lv mono">${sign}${Math.abs(r.val).toFixed(r.kind==='base'?0:1)} yd</span></div>
          <div class="lbar"><div class="lf ${r.kind}" style="width:${w.toFixed(1)}%"></div></div>
        </div>`;
      }).join('') + `<div class="footnote">Ball-speed base is engine-true; the window bonus is illustrative (EST) and not added to the drawn flight. Air deltas are marginal EST contributions.</div>`;

      // chips (engine-true)
      setNum(el('#c-c-bs'), f.ballSpeed, { dp:1 });
      setNum(el('#c-c-la'), f.launchAngle, { dp:1 });
      setNum(el('#c-c-sp'), f.backspin, { dp:0, commas:true });
      setNum(el('#c-c-sl'), f.spinLoft, { dp:0 });
      setNum(el('#c-c-sm'), f.smash, { dp:2 });

      // aria + data
      el('#c-svg').setAttribute('aria-label', `Carry ledger: club speed ${state.cs} mph, ball speed ${f.ballSpeed.toFixed(0)} mph, engine carry ${f.carry.toFixed(0)} yards, with estimated air layer ${carryFinal.toFixed(0)} yards (${delta>=0?'+':'−'}${Math.abs(delta).toFixed(0)} from air).`);
      el('#c-datarows').innerHTML = [
        ['Club speed', state.cs+' mph'], ['Ball speed', f.ballSpeed.toFixed(1)+' mph'], ['Smash', f.smash.toFixed(2)],
        ['Spin loft', f.spinLoft.toFixed(0)+'°'], ['Launch', f.launchAngle.toFixed(1)+'°'], ['Backspin', Math.round(f.backspin).toLocaleString('en-US')+' rpm'],
        ['Carry (engine)', f.carry.toFixed(0)+' yd'], ['Density ratio (EST)', densityRatio.toFixed(3)],
        ['Carry ×air (EST)', carryFinal.toFixed(0)+' yd'], ['Air delta (EST)', (delta>=0?'+':'−')+Math.abs(delta).toFixed(0)+' yd'],
      ].map(r => `<tr><th scope="row">${r[0]}</th><td>${r[1]}</td></tr>`).join('');
    }

    function onInput(){ markDiagramTouched(lessonId); haptic('select'); render(); }
    sls.cs.addEventListener('input', () => { state.cs = +sls.cs.value; onInput(); });
    sls.dl.addEventListener('input', () => { state.dl = +sls.dl.value; onInput(); });
    sls.aa.addEventListener('input', () => { state.aa = +sls.aa.value; onInput(); });
    sls.alt.addEventListener('input', () => { state.alt = +sls.alt.value; onInput(); });
    sls.wind.addEventListener('input', () => { state.wind = +sls.wind.value; onInput(); });
    sls.temp.addEventListener('input', () => { state.temp = +sls.temp.value; onInput(); });
    sls.hum.addEventListener('input', () => { state.hum = +sls.hum.value; onInput(); });
    el('#c-reset').addEventListener('click', () => {
      state.alt=0; state.wind=0; state.temp=15; state.hum=50;
      sls.alt.value=0; sls.wind.value=0; sls.temp.value=15; sls.hum.value=50;
      haptic('light'); render();
    });
    el('#c-datatoggle').addEventListener('click', () => {
      const t = el('#c-datatable'); const open = t.classList.toggle('show');
      el('#c-datatoggle').setAttribute('aria-expanded', open?'true':'false');
      el('#c-datatoggle').textContent = open ? 'Hide data table' : 'Show data table';
    });

    render();
  }

  /* ══ QUIZ ══ */
  function mountQuiz(lessonId, d){
    const mount = $('#quizMount');
    const quiz = d.quiz;
    const qs = quiz.map(() => ({ answered:false, firstTry:null, resolved:false }));

    mount.innerHTML = quiz.map((q, qi) => {
      const opts = q.options.map((o, oi) => `<button class="opt" role="radio" aria-checked="false" tabindex="${oi===0?0:-1}" data-q="${qi}" data-o="${oi}"><span class="mark" aria-hidden="true"></span><span>${esc(o)}</span></button>`).join('');
      return `<div class="q" data-qi="${qi}">
        <div class="qn mono">Question ${qi+1} of ${quiz.length}</div>
        <div class="qq" id="q-${qi}">${esc(q.q)}</div>
        <div class="opts" role="radiogroup" aria-labelledby="q-${qi}">${opts}</div>
        <div class="qfoot"><button class="retrybtn" data-retry="${qi}">Retry</button><span class="qscore mono" data-qscore="${qi}"></span></div>
        <div class="expl" id="expl-${qi}" role="status"><div class="el"></div><div class="et"></div></div>
      </div>`;
    }).join('') + `<button class="finishbtn" id="finishBtn" aria-disabled="true">Finish lesson</button>`;

    const optsOf = qi => Array.from(mount.querySelectorAll(`.opt[data-q="${qi}"]`));

    function awardRead(){
      const l = store.lessons[lessonId];
      if (!l.read){ l.read = true; store.xp += 40; save(); refreshHeaderLive(); bumpLessonXpDisplay(lessonId); announce('Lesson read — plus 40 XP.'); }
    }
    function updateFinish(){
      const all = qs.every(s => s.answered);
      const fb = $('#finishBtn'); fb.classList.toggle('ready', all); fb.setAttribute('aria-disabled', all?'false':'true');
    }
    function choose(qi, oi){
      const st = qs[qi]; if (st.resolved) return;
      awardRead();
      const q = quiz[qi]; const correct = oi === q.answerIndex;
      if (!st.answered){ st.firstTry = correct; st.answered = true; }
      const opts = optsOf(qi);
      opts.forEach(o => o.setAttribute('aria-checked', o.dataset.o === String(oi) ? 'true':'false'));
      const expl = $('#expl-'+qi);
      expl.querySelector('.et').textContent = q.explanation;
      expl.classList.add('show');
      if (correct){
        st.resolved = true;
        let correctEl = null;
        opts.forEach(o => { o.setAttribute('aria-disabled','true'); if (+o.dataset.o === oi){ o.classList.add('correct'); o.querySelector('.mark').textContent = '✓'; correctEl = o; } });
        expl.classList.add('ok'); expl.classList.remove('no'); expl.querySelector('.el').textContent = st.firstTry ? 'Correct — first try' : 'Correct';
        mount.querySelector(`[data-retry="${qi}"]`).classList.remove('show');
        mount.querySelector(`[data-qscore="${qi}"]`).textContent = '+' + (st.firstTry?20:10) + ' XP';
        haptic('success');
        if (correctEl) correctEl.focus({ preventScroll:true });
      } else {
        opts.forEach(o => { o.setAttribute('aria-disabled','true'); if (+o.dataset.o === oi){ o.classList.add('wrong'); o.querySelector('.mark').textContent = '✗'; } if (+o.dataset.o === q.answerIndex){ o.classList.add('correct'); o.querySelector('.mark').textContent = '✓'; } });
        expl.classList.add('no'); expl.classList.remove('ok'); expl.querySelector('.el').textContent = 'Not quite — see why';
        const retryBtn = mount.querySelector(`[data-retry="${qi}"]`);
        retryBtn.classList.add('show');
        mount.querySelector(`[data-qscore="${qi}"]`).textContent = '0 XP · retry for +10';
        haptic('error');
        retryBtn.focus({ preventScroll:true });
      }
      updateFinish();
    }
    function retry(qi){
      const st = qs[qi]; if (st.resolved) return;
      const opts = optsOf(qi);
      opts.forEach(o => { o.removeAttribute('aria-disabled'); o.classList.remove('wrong','correct'); o.setAttribute('aria-checked','false'); o.querySelector('.mark').textContent = ''; });
      $('#expl-'+qi).classList.remove('show');
      mount.querySelector(`[data-retry="${qi}"]`).classList.remove('show');
      mount.querySelector(`[data-qscore="${qi}"]`).textContent = '';
      opts[0].focus();
    }

    mount.querySelectorAll('.opt').forEach(o => {
      o.addEventListener('click', () => { if (o.getAttribute('aria-disabled') === 'true') return; choose(+o.dataset.q, +o.dataset.o); });
    });
    mount.querySelectorAll('[data-retry]').forEach(b => b.addEventListener('click', () => retry(+b.dataset.retry)));
    // radiogroup keyboard
    mount.querySelectorAll('.opts').forEach(group => {
      group.addEventListener('keydown', e => {
        const opts = Array.from(group.querySelectorAll('.opt')).filter(o => o.getAttribute('aria-disabled') !== 'true');
        if (!opts.length) return;
        let i = opts.indexOf(document.activeElement);
        if (['ArrowDown','ArrowRight'].includes(e.key)){ i = (i+1+opts.length)%opts.length; opts.forEach(o=>o.tabIndex=-1); opts[i].tabIndex=0; opts[i].focus(); e.preventDefault(); }
        else if (['ArrowUp','ArrowLeft'].includes(e.key)){ i = (i-1+opts.length)%opts.length; opts.forEach(o=>o.tabIndex=-1); opts[i].tabIndex=0; opts[i].focus(); e.preventDefault(); }
        else if (e.key===' '||e.key==='Enter'){ if (document.activeElement.classList.contains('opt')){ document.activeElement.click(); e.preventDefault(); } }
      });
    });

    $('#finishBtn').addEventListener('click', () => {
      if (!$('#finishBtn').classList.contains('ready')) return;
      haptic('light'); finishLesson(lessonId, d, qs);
    });
  }

  /* ══ COMPLETION ══ */
  function finishLesson(lessonId, d, qs){
    const l = store.lessons[lessonId];
    const quiz = d.quiz, meta = LESSON_META[lessonId];
    const perQ = qs.map(s => s.resolved ? (s.firstTry?20:10) : 0);
    const quizXP = perQ.reduce((a,b)=>a+b,0);
    const correct = qs.filter(s => s.resolved).length;
    const perfect = qs.every(s => s.resolved && s.firstTry);
    const lessonQuizXP = quizXP + (perfect?50:0);

    const beforeLevel = levelInfo(store.xp).lvl;
    l.quizAttempts += 1;
    const delta = Math.max(0, lessonQuizXP - l.quizBest);
    store.xp += delta;
    l.quizBest = Math.max(l.quizBest, lessonQuizXP);
    if (perfect) l.perfect = true;
    l.completed = true; l.completedAt = Date.now();
    store.lastOpened = lessonId;
    recomputeUnlocks();
    const earned = [];
    awardBadges(earned);
    save();
    const afterLevel = levelInfo(store.xp).lvl;
    const leveledUp = afterLevel > beforeLevel;
    refreshHeaderLive();
    bumpLessonXpDisplay(lessonId);

    const li = levelInfo(store.xp);
    const nextCta = meta.next ? `<button class="cta primary" id="c-next">Next: ${esc(meta.nextLabel)} →</button>` : '';
    const luBanner = leveledUp ? `<div class="levelup show">Level up! You reached Level ${afterLevel} — ${esc(li.title)}.</div>` : '';
    const badgeCards = earned.map(id => { const b = BADGE[id]; return `<div class="cbadge"><span class="g" aria-hidden="true">${b.glyph}</span><div><div class="n">${esc(b.label)}</div><div class="d">${esc(b.desc)}</div></div></div>`; }).join('');

    const cm = $('#completionMount');
    cm.innerHTML = `<div class="completion">
      <div class="ck">Module complete</div>
      <h2>${esc(d.parameter)} mastered</h2>
      <div class="cscore mono">${correct} / ${quiz.length} correct${perfect?' · <b>perfect run</b>':''} &middot; earned <b>+${delta} XP</b> this attempt</div>
      <div class="xptally"><span class="mono" id="c-xptally">${store.xp - delta}</span><span class="u">XP TOTAL</span></div>
      ${luBanner}
      ${badgeCards ? `<div class="cbadges">${badgeCards}</div>` : ''}
      <div class="cctas">${nextCta}<button class="cta ghost" id="c-back">Back to path</button></div>
    </div>`;

    setNum($('#c-xptally'), store.xp, { commas:true });
    announce(`Module complete. ${correct} of ${quiz.length} correct. Plus ${delta} XP. ${leveledUp?('Level '+afterLevel+', '+li.title+'. '):''}${earned.length?('Badge'+(earned.length>1?'s':'')+' earned: '+earned.map(id=>BADGE[id].label).join(', ')+'.'):''}`);

    const nb = $('#c-next'); if (nb) nb.addEventListener('click', () => { haptic('light'); store.lastOpened = meta.next; save(); go('#/lesson/'+meta.next); });
    $('#c-back').addEventListener('click', () => { haptic('light'); go('#/path'); });
    if (!reduced()) cm.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  /* ══ INIT ══ */
  recomputeUnlocks();
  route();
  </script>
</body>
