ly more than the same change in attack angle.","why":"These are the two sliders a user actually touches; launch angle itself is just their weighted sum, so this is where the launch-angle lever above gets its input in the diagram."},{"driver":"Spin loft, via the smash-factor self-limiter","weight":"Small and indirect — smashEff falls ~0.004 per degree of spin loft (1.36→1.30 across a 25°→40° spin-loft sweep, per the Carry lesson's own numbers), trimming a few mph of ball speed and so a small amount of apex.","why":"Spin loft = dynamic loft − attack angle. It is the same lever that (physically) creates the backspin responsible for lift, but in-engine it only reaches apex indirectly, by slightly discounting ball speed — a minor drag on the dominant ball-speed term, not a headline driver."},{"driver":"Altitude / air density (EST air layer)","weight":"App-level, not engine-level — a Denver-altitude default (5,280 ft, 15°C, 50% humidity) computes to a 1.140x multiplier, lifting the default 33.10-yd apex to ~37.7 yd (+14%).","why":"This is the identical carryEnvMult already used for carry (apexFinal = f.apex × carryEnvMult) — a documented simplification. Real thin air also weakens Magnus lift a little, which would partly offset the geometric apex gain, but the current build does not model that separately."},{"driver":"Backspin","weight":"Not a direct lever at all in this engine — solveFlight()'s apex formula never reads the backspin value.","why":"Backspin and apex are parallel outputs of the same upstream chain (spin loft, ball speed), not cause-and-effect in the code. Physically backspin's Magnus lift is exactly why real apex is 1.5x–2.9x higher than idealized no-lift ballistics (see wolframChecks) — but the model captures that lift implicitly inside the ball-speed/launch-angle curve rather than by computing it from spin."}],"misconceptions":["\"Higher apex always means more distance.\" False — apex and carry are linked through the same launch-angle/ball-speed inputs but they don't move in lockstep; a very high, ballooning trajectory can carry shorter than a moderate one at the same ball speed, the same optimal-window logic the Carry lesson covers.","\"Wedges fly way higher than a driver because their launch angle is so much bigger.\" Mostly false in absolute terms: commonly published TrackMan tour averages put a driver's apex (~10.9° launch, 167 mph ball) and a 7-iron's apex (~16.3° launch, 120 mph ball) within about a yard of each other (~32 yd each) — the driver's much higher ball speed compensates for its much lower launch angle.","\"In this app, more backspin directly makes the ball climb higher.\" Not in the code — solveFlight()'s apex formula takes only ballSpeed and launchAngle as inputs; backspin is a separate, parallel output of the same upstream levers (spin loft, ball speed). They correlate, but backspin is never read by the apex formula itself.","\"Hitting down harder makes the ball fly higher.\" Attack angle's only direct route to apex is the small 0.25-weight term inside launch angle, plus a tiny indirect nudge to ball speed via spin loft/smash. Dynamic loft (weight 0.62) and ball speed do almost all of the real work.","\"The environment effect on apex is a separate, more sophisticated model than the one for carry.\" In the current build it's the identical multiplier — apexFinal = f.apex × carryEnvMult, the exact same carryEnvMult computed for carry. Thinner air lifts both by the same percentage; there's no separate lift-based correction yet.","\"Apex is just a spectator number — only carry/total distance matters.\" False — apex is a direct input to landing angle (landingApexTerm = (apex−30)×1.0), which is a real physical link: a taller flight comes down steeper. That's the mechanism behind a high, soft wedge that stops near the pin versus a low runner that releases and rolls."],"wolframChecks":["44*(1-exp(-120/85))*(0.35+0.65*(17.85/18)) = 33.10 yd -- the engine's default 7-iron apex (120 mph ball, 17.85° launch), matching the app's live default.","Ball-speed sweep 106/120/133/146 mph -> apex 31.19 / 33.10 / 34.61 / 35.91 yd (+15% over the range) vs the Carry lesson's own carry values over the same sweep, 148.8 / 172.4 / 193.9 / 211.6 yd (+42%): apex saturates far harder than carry across identical inputs.","Isolating launch angle at a fixed 120 mph ball speed: base apex 44*(1-exp(-120/85)) = 33.28 yd; times apexLaunchFactor's floor 0.45 -> 14.98 yd; times its ceiling 1.35 -> 44.93 yd -- launch angle alone swings apex ~3x at constant ball speed.","Illustrative driver-style inputs (165 mph ball, 8.19° launch from dynLoft 12 / attack +3) in the same formula: 44*(1-exp(-165/85))*(0.35+0.65*(8.19/18)) = 24.33 yd -- well under the commonly cited ~32 yd TrackMan tour-average driver apex, confirming the engine's single 7-iron preset (clubs has no 'driver' entry yet) is not calibrated for low-loft/high-speed clubs.","167 mph = 74.66 m/s; idealized (no drag, no lift) ballistic apex at 10.9° launch: (74.66*sin(10.9deg))^2/(2*9.81) = 11.11 yd -- under a third of the ~32 yd real tour-average driver apex, showing how much height comes from Magnus lift rather than launch geometry alone.","102 mph = 45.6 m/s; idealized ballistic apex at 24.2° launch (PW-style): (45.6*sin(24.2deg))^2/(2*9.81) = 19.48 yd -- versus a ~29 yd real tour-average PW apex, only ~1.5x higher than the no-lift prediction (vs ~2.9x for the driver): lift matters relatively more for the driver's flatter, faster ball.","Diagram slider extremes: min inputs (60 mph club speed, 8° loft, -8° attack) -> 12.60 yd apex; max inputs (130 mph club speed, 45° loft, +6° attack) -> 51.31 yd apex -- the full achievable apex range in the interactive diagram.","Denver-altitude defaults (5,280 ft, 15C, 50% humidity) via the app's shared air multiplier: densityRatio = 0.8416*1.0*0.95 = 0.7995, carryEnvMult = 1+0.70*(1-0.7995) = 1.140 -> the default 33.10 yd apex becomes ~37.7 yd (+14%), the same percentage lift the app applies to carry, since apexFinal = apex * carryEnvMult reuses the identical multiplier.","landingApexTerm = (apex-30)*1.0: the default 33.10 yd apex contributes +3.10° to landing/descent angle; the 12.60 yd slider-extreme contributes -17.40° and the 51.31 yd extreme contributes +21.31° -- apex is a direct input to how steeply the ball comes down.","30 yd = 90 ft; a 32-yd (96-ft) apex free-falling with no air resistance would take sqrt(2*29.26/9.81) = 2.44 s just to descend from the peak -- a lower bound, since real hang time (up + down, with lift and drag) for a full 7-iron is documented around 4-5 s in launch-monitor data, longer than this idealized descent-only figure because lift keeps slowing the fall."],"quiz":[{"q":"In the engine, apex is computed directly from which two numbers?","options":["Backspin and spin axis","Ball speed and launch angle","Club path and face angle","Smash factor and offline"],"answerIndex":1,"explanation":"solveFlight()'s apex formula is apex = apex_max · (1 − e^(−ballSpeed/apex_TAU)) · apexLaunchFactor(launchAngle) — only ball speed and launch angle go in. Backspin, spin axis, and offline are all separate outputs computed elsewhere in the same function."},{"q":"Holding ball speed fixed at 120 mph, launch angle alone (via apexLaunchFactor, clamped 0.45x-1.35x) can swing apex across roughly what range?","options":["A tiny ±1 yd nudge","About a 3x range — roughly 15 yd to 45 yd","No effect at all — only ball speed matters","It doubles at most, from 20 to 40 yd"],"answerIndex":1,"explanation":"At the 120 mph base apex of 33.28 yd, the 0.45x floor gives 14.98 yd and the 1.35x ceiling gives 44.93 yd — nearly a 3x swing from launch angle alone, which is actually a bigger relative lever than pushing ball speed across its whole realistic range (which only moves apex by ~15% due to the saturating curve)."},{"q":"Commonly published TrackMan tour averages show a driver's apex (~32 yd, 10.9° launch, 167 mph ball) is roughly the same height as a 7-iron's apex (~32 yd, 16.3° launch, 120 mph ball), even though the 7-iron launches much higher. Why?","options":["TrackMan's driver numbers are usually a measurement error","The driver's much higher ball speed compensates for its lower launch angle","Apex is capped by the rules of golf at 32 yards","Drivers actually launch higher than 7-irons on tour"],"answerIndex":1,"explanation":"Apex depends on both ball speed and launch angle, in a saturating-times-multiplier relationship. The driver's ~167 mph ball speed feeds a much bigger base height than the 7-iron's ~120 mph, which offsets its lower launch-angle multiplier — so the two clubs converge on a similar apex despite very different trajectories."},{"q":"Does raising backspin, by itself, directly raise the apex number that solveFlight() returns?","options":["Yes, apex is calculated as a direct function of backspin","No — the apex formula only reads ball speed and launch angle; backspin is a separate, parallel output","Yes, but only for the driver preset","No, backspin only affects offline and curve, never apex"],"answerIndex":1,"explanation":"Backspin and apex are both derived from the same upstream levers (spin loft, ball speed) but neither is computed from the other. Physically, backspin's Magnus lift IS the real reason apex is so much higher than simple ballistics predict (an idealized driver launch without lift reaches only ~11 yd vs a real ~32 yd) — the model just captures that effect implicitly rather than by feeding backspin into the apex formula."},{"q":"How does apex connect forward to landing (descent) angle in the engine?","options":["It doesn't — they're computed independently","landingApexTerm = (apex − 30) × 1.0, so a taller flight computes a steeper landing angle","A higher apex always computes a shallower landing angle","Apex only affects curve and offline, not landing angle"],"answerIndex":1,"explanation":"landingAngle's formula includes landingApexTerm = (apex − 30) × 1.0 as one of its three terms (alongside spin loft and launch angle). A higher apex adds directly to the computed descent angle — physically correct, since a ball that flew higher also falls more steeply. This is why a towering wedge shot stops fast and a low runner releases."}],"realWorld":{"tourBenchmarks":["Commonly published TrackMan PGA Tour average figures (driver through wedge): Driver ~167 mph ball speed, ~10.9° launch, ~2,700 rpm spin, apex ~32 yd (96 ft), descent ~38°, carry ~275 yd.","7-iron tour average: ~120 mph ball speed, ~16.3° launch, ~7,100 rpm spin, apex ~32 yd (96 ft), descent ~50°, carry ~172 yd — essentially the same apex as the driver despite a much smaller, slower-arriving ball.","Pitching wedge tour average: ~102 mph ball speed, ~24.2° launch, ~9,300 rpm spin, apex ~29 yd (87 ft), descent ~54°, carry ~136 yd — the highest launch angle in the bag but not the highest apex, because ball speed is the lowest.","Grounded via Wolfram: an idealized (no-drag, no-lift) driver launch at 167 mph/10.9° reaches only ~11 yd — real tour apex (~32 yd) is nearly 3x higher, almost entirely from backspin's Magnus lift, not simple launch geometry.","Grounded via Wolfram: the same idealized calculation for a pitching-wedge launch (102 mph/24.2°) reaches ~19.5 yd versus a real ~29 yd tour apex — about 1.5x higher from lift, a smaller multiplier than the driver's ~2.9x because the wedge's forward speed (which drives the size of the lift force) is much lower even though its spin rate is much higher."],"scenarios":["A 'stinger' or low knockdown shot deliberately kept below wind height has a low apex by design — it releases hard and rolls a long way on landing, useful into a headwind on a links course.","A high, soft wedge shot — the one that 'lands like a butterfly with sore feet' — has a tall apex and a steep landing angle, so it stops near the pin instead of releasing past it.","Watching a PGA Tour drive on TV, the flight looks almost flat compared to a big recreational slice, yet its apex (~32 yd, roughly the height of a 9-story building) is about the same as a well-struck 7-iron's — because the driver's huge ball speed makes up for its low launch angle.","A mid-handicap golfer's low 'worm-burner' tee shot that never seems to get above head height off the tee box is usually a launch angle problem (too little dynamic loft, or a steep negative attack angle), not a swing-speed problem — the fix is a launch-monitor session on tee height, ball position, or loft, not just swinging harder.","A shot into a strong headwind visibly balloons and seems to climb far more than usual — the ball's forward speed bleeds off faster than its vertical motion, so its trajectory shape (and effective apex relative to remaining distance) looks taller and steeper than the same swing in calm air."],"whatItMeansForYou":"If you want a shot to hold a green or clear a hazard, don't just swing harder — ball speed's effect on apex saturates fast (a 40 mph ball-speed range only moves apex ~15%), while launch angle can swing apex nearly 3x on its own. That matches real fitting advice: for a driver, most amateurs gain more stopping/carry efficiency from optimizing launch angle and spin (often by teeing higher, moving ball position forward, or getting fit for lower dynamic loft with more speed-matched spin) than from chasing more clubhead speed alone. And because apex directly steepens landing angle in the physics here, a genuinely higher apex is also your most reliable lever for making a shot stop rather than release — the reason a flighted-down knockdown runs out and a full, high wedge grabs."}}
  </script>
  <script type="application/json" id="lesson-landing-angle">
{"parameter":"Landing Angle","oneLiner":"Landing angle is how steeply the ball is falling when it hits the ground - the difference between a shot that checks and stops near the pin and one that releases and rolls on.","whatItIs":"Landing angle (also called descent angle) is how steep the ball's flight path is relative to the ground at the instant it touches down - a shallow angle means the ball is still travelling mostly forward when it lands (so it releases and rolls), while a steep angle means it is falling almost straight down (so it lands soft and can even spin back). It isn't a number a golfer swings 'at' directly; it falls out of three things the swing and club choice set up: how glancing the strike was (spin loft), how high the ball took off (launch angle), and how high it actually flew (apex). In the app's engine, landingAngle = 45° + (spinLoft-25)*0.5 + (launchAngle-14)*0.6 + (apex-30)*1.0, clamped to a physically sane 32-60° window. All three terms push the same direction - a bigger, higher-flying, more-glancing shot always lands steeper - which is exactly why a low, flat driver runs out down the fairway while a high, spinny wedge sits down on the green.","components":[{"name":"Spin loft (dynamic loft minus attack angle)","role":"The first direct term in the formula. Landing angle rises +0.5° for every +1° of spin loft above a 25° reference (landingSpinTerm = (spinLoft-25)*0.5). A more glancing strike (bigger spin loft) tends to land steeper, all else equal.","typicalRange":"7-iron ~30-35°, driver ~5-15°, wedge ~55-65°"},{"name":"Launch angle","role":"The second direct term. Landing angle rises +0.6° for every +1° of launch angle above a 14° reference (landingLaunchTerm = (launchAngle-14)*0.6) - the smallest of the three per-unit weights, but launch angle itself swings a lot with club/loft.","typicalRange":"driver ~9-13°, 7-iron ~16-19°, wedge ~24-34°"},{"name":"Apex (peak height)","role":"The steepest per-unit term. Landing angle rises +1.0° for every extra yard of apex (landingApexTerm = (apex-30)*1.0) - a taller flight has fallen under gravity for longer by the time it lands, so it lands steeper. This is the channel through which ball/club speed reaches landing angle.","typicalRange":"~25-40 yd depending on club and speed"},{"name":"Dynamic loft (the real-world lever)","role":"Not in the formula directly, but the single biggest practical control: it feeds spin loft, launch angle and (via ball speed/apex) all three terms at once. Engine-measured: +1° of dynamic loft steepens landing by about +1.57° at the 7-iron baseline.","typicalRange":"wedge ~50-60°, 7-iron ~28-32°, driver ~9-13°"},{"name":"Ball speed / club speed (via apex)","role":"Indirect: faster ball speed raises apex, and apex steepens landing 1:1 per yard. Engine-measured: +1 mph of club speed steepens landing by about +0.17° at a fixed loft/attack.","typicalRange":"7-iron ball ~105-125 mph, driver ~150-185 mph"},{"name":"Attack angle","role":"Counter-intuitively near-zero net effect: it lowers spin loft (flattens landing) while raising launch angle and apex (steepens landing), and in the engine those two pulls almost exactly cancel (~0.00° net per degree of attack at baseline). It still matters hugely for backspin and smash - just not for landing angle.","typicalRange":"iron -4 to -2° (down), driver 0 to +5° (up)"},{"name":"Face angle & club path","role":"Not involved at all - there is no edge from face-angle or club-path to landing-angle in the app's dependency graph. They set start direction and curve/offline instead, never how steeply the ball comes down.","typicalRange":"n/a - zero weight on landing angle"}],"howTheyConnect":"Landing angle is the last thing the flight-solve computes, and it is built as three additive nudges on top of a neutral 45° base: landingAngle = 45 + (spinLoft-25)*0.5 + (launchAngle-14)*0.6 + (apex-30)*1.0, then clamped to a physically sane 32-60° window (source-verified: a plugged-in default 7-iron - spinLoft 33.00°, launchAngle 17.85°, apex 33.04 yd - computes to exactly 54.35°, matching solveFlight()'s live output). The 45° base is not arbitrary: tan(45°) = 1 exactly, the one angle where a ball's vertical and horizontal velocity are perfectly balanced; every term in the formula pushes away from that neutral point toward one extreme or the other. Physically, all three terms tell the same story from different angles: a more glancing strike (higher spin loft) launches the ball on a curvier, higher-lift path; a higher launch angle points more of the initial velocity upward; and a taller apex means the ball has literally been falling under gravity for longer by the time it reaches the ground - all three make the descent steeper. Because dynamic loft feeds spin loft and launch angle and (through ball speed) apex simultaneously, it ends up the dominant real-world lever (about +1.57° of landing angle per +1° of loft), while club/ball speed reaches landing angle only through the apex channel (about +0.17° per +1 mph), and attack angle's two opposing pulls (flattening via spin loft, steepening via launch+apex) very nearly cancel. Once the ball lands, the geometry keeps mattering: at a 50.5° landing the ratio of vertical to horizontal velocity (tan) is about 1.21, versus about 0.78 at 38° - roughly 55% steeper into the ground - and the vertical share of total speed (sin) is about 25% higher (0.77 vs 0.62, both Wolfram-verified). That is mechanically why a steep landing 'checks' (more energy goes into the bounce, less survives as forward roll) while a shallow one releases and runs, and it is exactly what the engine's own roll fraction encodes downstream: rollFrac = clamp(0.04 - (landingAngle-45)*0.0015, 0.012, 0.055), i.e. about 5.5% of carry rolls out at the 32° clamp floor versus only about 1.75% at the 60° ceiling.","hierarchy":[{"driver":"Dynamic loft (drives spin loft, launch and apex at once)","weight":"dominant - about +1.57° of landing angle per +1° of dynamic loft at the 7-iron baseline (engine-measured partial); across the bag this single lever is large enough to walk the model from its 32° floor (10.5° driver-ish loft) to its 60° ceiling (56° wedge-ish loft)","why":"Dynamic loft is the only quantity that touches all three formula terms simultaneously - it sets spin loft directly, sets launch angle directly, and (through ball speed's effect on apex) nudges apex too. No other single input moves that many levers at once."},{"driver":"Apex, mostly via ball/club speed","weight":"+1.0° of landing angle per +1 yd of apex in the raw formula - the steepest per-unit coefficient of the three; and about +0.17° per +1 mph of club speed at fixed loft/attack, so a 20 mph faster swing on the same 7-iron steepens landing by roughly 3° (54.3° at 90 mph vs 57.2° at 110 mph, solveFlight())","why":"A taller flight spends more time falling under gravity before it lands, so a taller apex is mechanically a steeper landing - this is the one channel through which raw speed (not just club choice) reaches landing angle."},{"driver":"Spin loft, independent of the loft/attack split","weight":"+0.5° of landing angle per +1° of spin loft above 25° - real, but the smallest of the two spin-loft-adjacent pulls once dynamic loft is already accounted for","why":"Spin loft is dynamic loft minus attack angle, so most of its punch is already counted under dynamic loft above; holding loft fixed, it is still a genuine, separate lever via how glancing the strike is."},{"driver":"Launch angle, independent of loft","weight":"+0.6° per +1° above 14° baseline - the smallest of the three direct coefficients, though launch angle itself ranges widely (11.65° at 20° loft vs 24.05° at 40° loft, solveFlight())","why":"Launch angle is dynamic-loft-dominant already (0.62 weight in its own formula), so like spin loft its effect mostly rides along with dynamic loft rather than acting as an independent knob."},{"driver":"Attack angle, in isolation","weight":"about 0.00° net per +1° of attack at the 7-iron baseline (engine-measured partial: -0.0044) - its -0.5°/° pull via spin loft is almost exactly cancelled by its +0.15°/° (launch) and +0.35° (apex) pulls the other way","why":"Attack angle sits inside two of the three terms with opposite sign effects, so on landing angle specifically it is close to a wash - even though it is one of the biggest levers on backspin and smash factor elsewhere in the engine. A classic 'moves other things, not this one' parameter."},{"driver":"Face angle, club path, and the environment nodes (altitude/wind/temperature)","weight":"zero in this model - no edge in the app's dependency graph connects any of them to landing-angle","why":"Face angle and club path set start direction and curve (offline); altitude, wind and temperature only reach carry, apex and curve. Landing angle is decided entirely by the vertical shape of the shot (loft, attack, speed), never by where it starts or which way it bends."}],"misconceptions":["\"Landing angle is basically the same thing as launch angle.\" No - launch angle is the take-off angle at impact; landing angle is the descent angle at the end of the flight, and it is steeper than launch angle for almost every real shot (baseline 7-iron: 17.85° launch vs 54.35° landing) because gravity keeps bending the path downward the whole way.","\"You create a steep landing angle by hitting down harder (more negative attack angle).\" In the engine, attack angle's effect on landing angle is close to a wash (~0.00° net per degree at baseline) - its spin-loft-driven flattening and its launch/apex-driven steepening almost cancel. The real lever for a steeper landing is more loft and a taller apex, not a steeper strike.","\"More backspin always means a steeper landing.\" Backspin and landing angle share an upstream driver (spin loft) but are not the same output - a shot can carry huge backspin with a middling apex (a thin, low wedge shot) and land far shallower than a high, soft-landing 3-wood with much less spin.","\"Curve (draw/fade/slice/hook) affects how steeply a ball comes down.\" It doesn't, in this model or in reality to a meaningful degree - face angle and club path (which create curve) have zero edges into landing angle in the app's dependency graph. Curve changes where the ball ends up sideways, not how steeply it falls.","\"A driver lands shallow because drivers are just built differently.\" It lands shallow because of what the swing delivers to it - low dynamic loft and a level-to-upward attack angle, which produce low spin loft and a low apex. Tee a driver way up and swing steeply down into it and, numerically, it would land far steeper - just also lose a lot of the driver's usual distance advantage.","\"Landing angle only matters for wedge shots into greens.\" It also explains why a low punch shot under branches releases 20-30 yards after landing, why links approaches run out on firm turf, and why a full driver keeps rolling down the fairway - it is the single number behind 'how much does this shot run out after it lands' for every club, not just scoring clubs."],"wolframChecks":["tan(38°) = 0.7813, tan(50.5°) = 1.2131 (Wolfram) -> ratio 1.2131/0.7813 = 1.553, so a 7-iron's ~50.5° tour-average landing carries about 55% more vertical-to-horizontal velocity ratio than a driver's ~38° landing - the trig reason steep shots check and shallow ones release.","sin(38°) = 0.6157, sin(50.5°) = 0.7716 (Wolfram) -> ratio 0.7716/0.6157 = 1.253, confirming a steeper landing puts about 25% more of the ball's total speed into the vertical, into-the-ground direction.","tan(45°) = 1 exactly (Wolfram) - confirms the engine's 45° base value is the literal 'balanced' angle where vertical and horizontal velocity components are equal; every formula term pushes away from that neutral point.","Idealized no-drag free-fall speed from a 32-yd apex: 32 yd = 29.26 m (Wolfram), v = sqrt(2 x 9.8 m/s^2 x 29 m) = 23.8 m/s = 53.3 mph (Wolfram) - roughly highway speed, giving a feel for how hard a steeply-falling ball is actually moving before spin and bounce take over.","167 mph -> 74.66 m/s, 120 mph -> 53.64 m/s, 102 mph -> 45.6 m/s (Wolfram unit conversions) - the driver/7-iron/wedge ball-speed inputs behind the tour landing-angle benchmarks.","Engine formula arithmetic check (Wolfram): 45 + (33-25)*0.5 + (17.85-14)*0.6 + (33.04-30)*1.0 = 54.35° - matches solveFlight()'s live default-7-iron output (spinLoft 33.00°, launchAngle 17.85°, apex 33.04 yd -> landingAngle 54.35°) exactly, confirming the source formula matches runtime behavior.","Engine partials around the default 7-iron (90 mph, 30° loft, -3° attack), computed directly from solveFlight(): +1° dynamic loft -> landing angle +1.57°; +1 mph club speed -> +0.17° (via apex only); +1° attack angle -> -0.004° (spin-loft and launch/apex effects almost exactly cancel).","Engine roll-fraction range, directly from solveFlight(): rollFrac = clamp(0.04 - (landingAngle-45)*0.0015, 0.012, 0.055) -> 5.5% of carry at the 32° clamp floor (driver-like) down to 1.75% at the 60° clamp ceiling (wedge-like) - the mechanism linking landing angle to how far a shot releases after it lands."],"quiz":[{"q":"In the app's engine, landing angle is built from a 45° base plus three terms. Which of these is not one of them?","options":["Spin loft","Launch angle","Apex (peak height)","Face angle"],"answerIndex":3,"explanation":"landingAngle = 45 + (spinLoft-25)*0.5 + (launchAngle-14)*0.6 + (apex-30)*1.0, clamped to 32-60°. Face angle (and club path) don't appear anywhere in the formula - they set start direction and curve instead of how steeply the ball comes down."},{"q":"Two shots share the same spin loft and launch angle, but Shot A has a taller apex than Shot B. Which lands steeper?","options":["Shot A, the taller one","Shot B, the shorter one","They land at exactly the same angle","Apex has no effect on landing angle"],"answerIndex":0,"explanation":"Apex has the steepest per-unit weight in the formula: +1.0° of landing angle for every extra yard of apex. A taller flight has been falling under gravity longer by the time it lands, so it comes down steeper - the same reason a faster swing on one club (which raises apex) steepens landing by a few degrees even with loft and attack unchanged."},{"q":"You increase attack angle from -3° to +3° on the same 7-iron, same loft, same speed. What happens to landing angle?","options":["It steepens sharply, by several degrees","It flattens sharply, by several degrees","It barely moves - the two effects nearly cancel","It snaps straight to the 60° ceiling"],"answerIndex":2,"explanation":"Attack angle lowers spin loft (which alone would flatten the landing) while raising launch angle and apex (which alone would steepen it), and in the engine those two pulls very nearly cancel (about 0.00° net change per degree of attack at the 7-iron baseline). Attack angle changes backspin and smash factor a lot - just not landing angle."},{"q":"Real tour data shows landing angles of roughly 34-40° for a driver and 48-52° for a 7-iron. What mainly explains that ~15° gap?","options":["Wind resistance differs by club","The driver's much lower dynamic loft and flatter attack angle give it both a lower spin loft and a lower apex than the 7-iron","Drivers carry more backspin than irons","Landing angle is essentially random and unrelated to club choice"],"answerIndex":1,"explanation":"A driver's low loft (~10-12°) and near-level-to-upward attack angle deliver far less spin loft and a much lower apex than a 7-iron's ~30° loft and downward strike - and both terms push landing angle down in the formula. That's the mechanism behind 'the driver runs out, the 7-iron sits down.'"},{"q":"A steep landing (wedge, ~50-55°) tends to check and stop; a shallow landing (driver, ~38°) tends to release and roll. Physically, why?","options":["Steep shots simply carry less backspin","Steep shots put more of the ball's velocity into the vertical, into-the-ground direction relative to the horizontal, leaving less forward speed to survive the bounce","Shallow shots are always slower overall","Landing angle and rollout are unrelated - it's a myth"],"answerIndex":1,"explanation":"At 50.5° the vertical-to-horizontal velocity ratio (tan) is about 1.21 versus about 0.78 at 38° - roughly 55% more 'straight down' relative to 'forward' - so less forward speed survives the landing. The engine encodes exactly this: its roll fraction shrinks from about 5.5% of carry at the 32° clamp floor to about 1.75% at the 60° ceiling."}],"realWorld":{"tourBenchmarks":["PGA Tour average descent (landing) angles by club, widely published TrackMan University tour-average ranges: driver ~34-40°, 6/7-iron ~48-52°, pitching/short wedges ~50-56° or steeper - roughly a 15-20° spread from the bottom of the bag to the top.","Flightglass's own default 7-iron (30° loft, -3° attack, 90 mph club speed) computes to 54.35° landing (solveFlight()) - in the right neighborhood of the real ~50° tour 7-iron average, a useful sanity check even though the file itself flags the model as illustrative, not lab-calibrated.","A 50.5° landing carries about 55% more vertical-to-horizontal velocity ratio than a 38° landing (tan 50.5° = 1.213 vs tan 38° = 0.781, Wolfram-verified) and about 25% more of its total speed pointed straight down (sin 50.5° = 0.772 vs sin 38° = 0.616) - the trig behind why a wedge 'sits down' and a driver 'runs out.'","Idealized (no-drag) free-fall from a 32-yd (29.26 m) apex hits the ground at about 23.8 m/s, roughly 53 mph (Wolfram) - close to highway speed - which is why a steeply-landing ball can plug in a soft bunker or leave a real pitch mark on a green.","Ball speeds behind these numbers: driver ~167 mph = 74.7 m/s, 7-iron ~120 mph = 53.6 m/s, wedge ~102 mph = 45.6 m/s (Wolfram unit conversions)."],"scenarios":["A tour pro spins a wedge back off a firm green - the steep landing angle (heavy spin loft + a real apex) means most of the impact energy goes into the bounce and the spin can 'grab,' rather than into forward roll.","A links-style knock-down 2-iron or 'stinger' flown low under the wind deliberately keeps dynamic loft and apex down; it lands shallow on purpose and releases 20-30 yards after touching down - the shallow landing angle is the point of the shot, not a mishit.","On firm, fast links turf (British Open-style setups, a drought-firm municipal course) a mid-iron approach that would check on a soft green instead skips and runs well past the flag - the shot's landing angle didn't change, the ground just couldn't absorb it.","An amateur's accidental 'balloon' with a hybrid or 3-wood surprises everyone by stopping dead on the green - not skill, but a steep, handsy strike that pushed spin loft and apex up together, artificially steepening the landing angle at the direct cost of carry distance (the same ballooning covered in the Carry lesson).","Wind, altitude and temperature in this app reshape how far a shot carries and drifts offline, but none of them touch landing angle - only the club you hit and how you deliver it (loft, attack, speed) decide whether a shot checks or releases."],"whatItMeansForYou":"If you need a shot to stop near a tucked pin, the fix is a genuinely different delivery - more loft (which lifts spin loft, launch and apex together) - not just swinging harder or steeper; attack angle alone barely moves the descent. If you need a shot to release and run (a links approach, a punch under branches, chasing extra roll on a par-5 second), take less loft rather than trying to flatten your attack angle, since attack angle's own effect on landing angle is close to a wash."}}
  </script>
  <script type="application/json" id="lesson-total">
{"parameter":"Total Distance","oneLiner":"Total distance is how far the ball travels overall -- carry (the flight) plus roll (the bounce-and-run after it lands) -- and because roll is capped at a few percent of carry, whatever wins the carry battle (ball speed) wins the total-distance battle too.","whatItIs":"Total distance is the full length of the shot as it would show up on a GPS watch or a course yardage marker: how far the ball travelled through the air (carry) plus how far it continued to bounce and roll along the ground once it landed (roll), up to the point it finally stops. It's the number golfers usually mean when they brag about a \"280-yard drive\" -- but it's really two very different distances stacked together. Carry is almost the whole story: it is set by ball speed (club speed x smash factor) through the exact same drag-saturated curve used in the Carry lesson, and nothing else in this app moves the needle nearly as much. Roll is the small top-up on top: Flightglass's engine adds it as total = carry + carry x rollFrac, where rollFrac is clamped to a narrow 1.2%-5.5% window set entirely by how steeply the ball is descending (landing angle) when it lands -- a shallow, driver-like landing angle rolls more, a steep, wedge-like landing angle rolls almost nothing. So total distance inherits everything the Carry lesson taught about ball speed, and adds exactly one new idea: the steepness of the landing determines how much extra ground the ball covers after it touches down.","components":[{"name":"Ball speed (via club speed x smash factor)","role":"The dominant input, inherited directly from Carry. Because roll never exceeds 5.5% of carry in this engine, whatever grows carry grows total by nearly the same absolute amount.","typicalRange":"7-iron ball ~93-159 mph across a 70-120 mph club-speed sweep (engine); tour driver ball ~167 mph; tour 7-iron ball ~120 mph"},{"name":"Carry","role":"The airborne leg and the vast majority of total distance -- the exact same carry the Carry lesson teaches, computed by the same drag-saturated solveFlight() curve.","typicalRange":"app 7-iron ~125-227 yd across the club-speed sweep; PGA Tour driver carry ~275 yd; PGA Tour 7-iron carry ~172 yd"},{"name":"Landing angle (via spin loft -> launch angle & apex)","role":"The one new lever for Total Distance: how steeply the ball is descending when it lands sets the roll fraction directly. Clamped 32-60° in-engine.","typicalRange":"wedge-like ~55-60° (steep); 7-iron-like ~50-56°; driver-like ~32-38° (shallow, clamped to the 32° floor)"},{"name":"Roll (roll-out)","role":"The small ground-distance top-up after the bounce. Engine: roll = carry x rollFrac, rollFrac = clamp(0.04-(landingAngle-45)x0.0015, 0.012, 0.055).","typicalRange":"app default 7-iron ~4.5 yd (2.6% of carry); app driver-regime ~10-12 yd (5.5% ceiling); PGA Tour driver ~21-25 yd (~8-9% of total, above the app's ceiling)"},{"name":"Club / shot-type regime (driver vs iron vs wedge)","role":"The practical golfer-facing lever behind landing angle -- picking a club (and attack angle) sets the whole spin-loft-and-landing-angle regime at once.","typicalRange":"driver spin loft ~9-16°; 7-iron ~30-35°; wedge ~45-55°"},{"name":"Environment (altitude / wind / temperature)","role":"The same EST post-solve air layer as Carry, inherited into total because total is built directly on the carry number. Does not change the roll fraction itself in this app's model.","typicalRange":"altitude ~+2% carry per 1000 ft; headwind ~-1%/mph, tailwind ~+0.5%/mph (asymmetric); temperature ~+2 yd per +10 C"},{"name":"Turf firmness & moisture at landing -- not modeled","role":"Real-world roll depends heavily on how hard/dry the ground is; this app's roll term is turf-blind and always lands inside its fixed 1.2%-5.5% window regardless of course conditions -- a documented simplification, not a bug.","typicalRange":"firm/dry fairway or hardpan can push real roll well above the app's 5.5% ceiling; a wet fairway or a spin-back wedge shot can bring real roll to ~0% or negative"}],"howTheyConnect":"Total distance is arithmetic layered on top of everything the Carry lesson already teaches: total = carry + roll, computed by the same solveFlight() call, not a separate model. Club speed times smash factor sets ball speed, and ball speed drives carry via the identical drag-saturated power curve used in Carry (0.232 x ballSpeed^1.389 / (1 + (ballSpeed/210)^6)) -- and because roll never exceeds 5.5% of carry in this engine, ball speed remains completely dominant for total too. The new piece unique to Total is roll: after the flight arc (governed by launch angle and apex, both downstream of spin loft = dynamic loft - attack angle) the ball lands at some landing angle, and that landing angle sets how much extra ground it covers. Geometrically this is trigonometry: at a shallow 32° landing angle the ball retains ~85% of its speed as a forward (horizontal) component (cos 32° = 0.848) and only ~28% of its kinetic energy is vertical (sin^2 32° = 0.281), so most of that speed keeps driving it along the ground after the bounce. At a steep 60° landing angle only ~50% of the speed is forward (cos 60° = 0.5) and 75% of the energy is vertical (sin^2 60° = 0.75), energy that gets absorbed or bounces up rather than out, so roll collapses. Flightglass's engine encodes this directly as rollFrac = clamp(0.04 - (landingAngle-45) x 0.0015, 0.012, 0.055): every degree the landing angle steepens past 45 trims the roll fraction by 0.15 percentage points, and every degree it flattens below 45 adds 0.15 points back, floored/ceilinged so roll always stays a small top-up (in practice 1.75%-5.5% of carry, since the co-clamped landing-angle range of 32-60° never actually reaches the coded 1.2% floor) rather than a dominant term. Because a driver's low spin loft (~9-16°) produces a shallow landing angle (clamped to the engine's 32° floor), it sits at the roll-fraction ceiling; a wedge's large spin loft (~45-55°) produces a steep landing angle (clamped to the 60° ceiling) and sits at the roll-fraction floor. That is why, in the app's own numbers, a similar-speed driver-regime shot rolls ~10-12 yd (5.5%) while a wedge-regime shot rolls only ~2-3 yd (1.75%) -- the same mechanism (spin loft -> launch/spin -> landing angle) the Backspin lesson already taught, now cashing out as extra ground distance instead of extra height.","hierarchy":[{"driver":"Ball speed (via club speed x smash factor) -- inherited straight from Carry","weight":"dominant -- ~+20 yd of total distance per +10 mph of club speed for a 7-iron (engine: cs 70/80/90/100/110/120 mph -> total 128.8/153.1/176.9/198.5/216.2/227.7 yd, a 98.9 yd swing across 50 mph of club speed).","why":"Total = carry + roll, and roll never exceeds 5.5% of carry in this engine, so total tracks carry almost exactly. Whatever the Carry lesson taught about ball speed dominating carry carries straight through to total distance."},{"driver":"Landing angle (via spin loft = dynamic loft minus attack angle)","weight":"secondary but real -- at a fixed ~175 yd carry, sweeping landing angle across its full 32-60° range moves roll from ~9.6 yd (5.5%) down to ~3.1 yd (1.75%), a 6.6 yd swing -- an order of magnitude smaller than the ball-speed effect above.","why":"This is the one mechanism unique to Total Distance: rollFrac = clamp(0.04-(landingAngle-45)x0.0015, 0.012, 0.055). A shallow landing angle (driver-like, low spin loft) keeps more of the ball's speed moving forward after the bounce; a steep one (wedge-like, high spin loft) buries most of that speed vertically instead."},{"driver":"Club / shot-type selection (driver vs iron vs wedge)","weight":"Sets the whole landing-angle regime at once -- driver's ~9-16° spin loft clamps landing angle to the engine's 32° floor (5.5% roll ceiling, ~10-12 yd roll in the sweep); a wedge's ~45-55° spin loft clamps it to the 60° ceiling (1.75% roll floor, ~2-3 yd roll).","why":"It is the practical lever a golfer actually pulls -- you don't dial 'landing angle' directly, you pick a club (and an attack angle, per the Backspin lesson) that puts you in a shallow or steep landing regime."},{"driver":"Environment (altitude, wind, temperature) -- the same EST air layer as Carry","weight":"Can be the biggest absolute-yardage mover of all: Denver-altitude air (~14% thinner) adds roughly +10% carry (~+15-20 yd on a 175 yd shot); a 20 mph headwind can cost ~25-35 yd on a mid-iron -- both larger in yards than the roll-fraction swing above.","why":"Total inherits carry's environment sensitivity wholesale because total is built directly on top of the carry number; the app does not model environment changing the roll fraction itself, only the carry it's a percentage of."},{"driver":"Turf firmness / moisture at landing -- not modeled by the engine","weight":"Potentially large in reality (firm, dry fairway or hardpan can double or triple real-world roll; a wet fairway or a spinny wedge shot can check the roll to zero or even negative/backward) but the app's roll term is turf-blind, always landing inside its fixed 1.2%-5.5% clamp regardless of ground conditions.","why":"Ranked last only because it isn't a modeled input at all -- it's a documented simplification worth knowing before trusting the app's roll number on a firm links course or a soggy winter fairway."}],"misconceptions":["\"Total distance is basically just carry.\" For a 7-iron that's nearly true (roll is only ~2-4%), but off the tee it isn't: PGA Tour drivers get 8-9% of their total from roll, and the app's own driver-regime numbers show roll running roughly double an iron's (5.5% vs 1.75-2.6%).","\"A bigger total-distance number always means a better/further shot.\" It hides the carry/roll split: a shot that carries 210 yd and rolls 10 (total 220) is a very different, more useful shot near a hazard than one that carries only 195 and rolls 25 on hardpan (also total 220) -- only the first one clears a 205-yd bunker.","\"More roll is always good.\" True off the tee (extra roll = extra total distance), false into greens -- there you want a steep landing angle and minimal roll so the ball checks up near the pin instead of releasing past it.","\"Add spin or loft if you want the ball to roll out more.\" Backwards: raising spin loft steepens the landing angle (per the Backspin lesson) and shrinks the roll fraction. The classic way to add roll off the tee is the opposite -- hit up on it with a flatter, lower-spin launch, the same low-spin driver recipe taught for backspin, now read for its effect on roll instead of height.","\"A steeper landing angle means a shorter shot.\" Not necessarily -- landing angle only controls the small roll top-up, not carry. A well-optimized steep landing (good spin/launch window) can carry just as far as a shallow one; it simply won't add much roll on top.","\"The app's roll number is what would really happen on any course.\" The engine's roll model is turf-blind -- it has no idea if the fairway is firm and dry (real roll can run well above the 5.5% ceiling) or wet and soft (real roll, or a spinny wedge's backward check, can fall well below the engine's 1.2% floor, even negative). Treat the app's roll number as illustrative, not a course-specific prediction."],"wolframChecks":["engine carry check: 0.232 x 119.5^1.389 / (1 + (119.5/210)^6) = 172.37 yd -> matches solveFlight()'s own carry output (172.40 yd) for the app's default 7-iron (cs 90 mph, dl 30°, aa -3°), the carry term that total is built on.","176.88 - 172.40 = 4.48 yd -> confirms total minus carry equals roll for that same default shot (the arithmetic identity behind total = carry + roll).","4.48 / 172.40 = 2.599% -> the default 7-iron's roll fraction, inside the engine's 1.2%-5.5% rollFrac clamp window.","12.48 / 226.96 = 5.499% -> a low-spin-loft driver-regime shot (dl 13°, aa +4°, landing angle clamped to the 32° floor) sits at the engine's 5.5% roll-fraction ceiling, its most roll-heavy case.","cos(32°) = 0.848, cos(45°) = 0.707, cos(60°) = 0.500 -> the forward (horizontal) share of the ball's landing speed drops from ~85% to ~50% as landing angle steepens from 32° to 60° -- the geometric reason a shallow (driver) landing rolls out more than a steep (wedge) one.","sin^2(32°) = 0.281, sin^2(45°) = 0.500, sin^2(60°) = 0.750 -> the vertical (downward) share of kinetic energy at landing nearly triples over that same range, energy that gets absorbed or bounced rather than rolled forward.","tan(32°) = 0.625, tan(45°) = 1, tan(60°) = 1.732 -> the vertical-to-horizontal velocity ratio at landing nearly triples from a 32° to a 60° descent, the same fact expressed as a slope.","175 x 0.055 = 9.625 yd vs 175 x 0.0175 = 3.0625 yd, difference 6.5625 yd -> at a fixed ~175 yd carry, sweeping landing angle across its full 32-60° range moves roll by ~6.6 yd -- real, but an order of magnitude below the ball-speed effect.","227.65 - 128.77 = 98.88 yd -> the app's own total-distance swing across a 70-120 mph club-speed sweep (7-iron), confirming ball speed remains the dominant lever for total exactly as it is for carry.","25 / 300 x 100 = 8.3% (24.8/299.8 = 8.272%, verified) -> published PGA Tour driver roll-as-share-of-total, noticeably above the app's engine ceiling of 5.5% of carry -- a documented gap between the app's deliberately 'small' roll model and real firm-fairway tour roll."],"quiz":[{"q":"In Flightglass's engine, Total Distance is defined as:","options":["Carry multiplied by launch angle","Carry plus roll, where roll is a small percentage of carry set by landing angle","Ball speed times smash factor","Apex height plus carry"],"answerIndex":1,"explanation":"total = carry + carry x rollFrac, and rollFrac = clamp(0.04-(landingAngle-45)x0.0015, 0.012, 0.055) -- a narrow 1.2%-5.5% window driven entirely by how steeply the ball lands. For the app's default 7-iron that's carry 172.40 yd + roll 4.48 yd (2.6%) = total 176.88 yd."},{"q":"Comparing a driver-regime shot (landing angle clamped to the engine's 32° floor) to a wedge-regime shot (landing angle clamped to the 60° ceiling) at similar ball speed, which rolls out more, and why?","options":["The wedge, because more loft always means more spin and more roll","The driver, because its shallower landing angle keeps more of the ball's speed moving forward instead of down at the bounce","They roll the same amount because roll doesn't depend on landing angle","Neither one rolls; roll only happens on the putting green"],"answerIndex":1,"explanation":"At 32° the ball retains ~85% of its landing speed as a forward component (cos 32° = 0.848) versus only ~50% at 60° (cos 60° = 0.5). In the app's own numbers that is roll of ~10-12 yd (5.5%, the ceiling) for the driver regime versus ~2-3 yd (1.75%, the floor) for the wedge regime."},{"q":"You're hitting a wedge into a firm, fast green and want the ball to stop near the pin instead of releasing past it. What landing condition do you actually want?","options":["A shallow landing angle and lots of roll -- maximum total distance","A steep landing angle with plenty of backspin, so the ball checks up with minimal roll","It doesn't matter -- total distance is the only number that counts on approach shots","Zero backspin, so the ball skids to a stop"],"answerIndex":1,"explanation":"Into greens you want the opposite of the tee-shot goal: a steep landing angle (high spin loft, plenty of backspin, per the Backspin lesson) keeps the roll fraction pinned near the engine's 1.75% floor, so the ball checks up close to where it lands instead of running out."},{"q":"PGA Tour drivers average roughly 275 yd of carry and 296-300 yd of total distance. What does that imply about their roll, and how does it compare to this app's engine?","options":["No roll at all -- tour pros carry the full distance in the air","Roughly 21-25 yd of roll, about 8-9% of total -- more roll (as a share) than the app's 5.5% ceiling models","Roughly 100 yd of roll","Negative roll, because backspin pulls the ball backward after it lands"],"answerIndex":1,"explanation":"25/300 = 8.3% (verified). That is meaningfully above the app's own 5.5%-of-carry roll ceiling, because real tour drives launch flatter and land on firm, mown fairways -- a documented gap between the app's deliberately conservative roll model and real-world tour conditions."},{"q":"Two golfers both report a '220-yard drive' on a GPS watch. Golfer A carried 210 yd and rolled 10 yd; Golfer B carried only 195 yd but rolled 25 yd on a hard, dry fairway. Which statement is true?","options":["They hit an identical shot","Total distance hides the carry/roll split -- Golfer A's ball actually flew further in the air, which matters for clearing a hazard","Golfer B necessarily has more ball speed than Golfer A","Total distance always equals carry when the fairway is hard"],"answerIndex":1,"explanation":"Same total, very different shot shape: only Golfer A's 210 yd carry clears a bunker sitting 205 yd out. Golfer B's extra roll came from a shallower landing angle and/or firmer ground, not necessarily more speed -- total distance conflates the two, which is exactly why carry is the number that matters for clearing trouble."}],"realWorld":{"tourBenchmarks":["PGA Tour driver averages (TrackMan/ShotLink, recent seasons): ~113 mph clubhead speed, ~167 mph ball speed, carry ~275 yd, total ~296-300 yd -> roll ~21-25 yd, about 8-9% of total (25/300 = 8.3%, verified) -- noticeably more roll than the app's own 5.5% ceiling, because pros launch flatter/lower-spin off firm fairways than the engine's clamp allows.","LPGA Tour driver averages: ~94 mph clubhead speed, ~140 mph ball speed, carry ~218 yd, total ~235 yd -> roll ~17 yd, about 7% of total.","PGA Tour 7-iron averages: carry ~172 yd, total ~176-180 yd -> roll only ~4-8 yd (2-4%) -- this is the one regime where the app's own default 7-iron (carry 172.40 yd, roll 4.48 yd = 2.6%, engine-verified) tracks real tour data closely, because approach-shot landing angles (~45-50+°) are exactly the steep, low-roll regime the app models well.","Recreational/amateur average driver (Arccos/Shot Scope aggregate GPS data, widely published): total distance averages roughly 214-220 yd across all handicaps -- about 80 yd short of the PGA Tour average, almost entirely a ball-speed gap (the same lesson as Carry), not a roll-percentage gap.","Amateur mid-handicap 7-iron: total distance averages roughly 135-145 yd, versus a solid-strike ~177 yd default in this app -- again predominantly a club-speed/ball-speed shortfall, read off the total-distance number instead of carry."],"scenarios":["Off the tee on a firm, dry fairway: two golfers with near-identical ball speed but different launch (a low, flat 'stinger' vs a high, spinny bomb) can post total distances 15-20 yards apart purely from how much the low one runs out after landing.","A par-3 into a firm, fast green: here you want the opposite of 'more total distance' -- a steep landing angle with plenty of spin so the ball checks up near the pin instead of releasing 20+ feet past it. Total distance is the wrong number to optimize on an approach shot.","A links course in Scotland or Ireland, baked out and downwind: pros deliberately flatten their launch off the tee to run the ball out, sometimes adding 20-30+ yards of roll that a soft, irrigated parkland course in the US would never give up for the same swing.","Two golfers both log a '220-yard drive' on a GPS watch -- one carried 210 yd with 10 yd of roll, the other carried only 195 yd but rolled 25 yd on a hard fairway. Same total, very different shot: only the first one carries a bunker sitting at 205 yd.","A junior golfer's clubhead speed climbs every season (more carry, per the Carry lesson), but their total-distance gains lag behind because they launch it high and spinny -- the fix (from the Backspin lesson: tee it higher, hit up on it) flattens the landing angle and lets the extra speed also cash out as roll, not just carry."],"whatItMeansForYou":"Chase ball speed first -- as in the Carry lesson, it's still roughly 95% of the total-distance story, and nothing else here comes close. Once speed is dialed in, this lesson's one new lever is landing angle: off the tee, on firm ground, a flatter, lower-spin launch (same speed) lets the ball run out for real extra yards -- tour drivers get 8-9% of their total from roll alone, nearly double what a steep, ballooning launch gives up. But into greens the same lever works against you: you want a steep, spinny landing so the ball checks up instead of releasing past the flag. And remember total is a scorecard/GPS-watch number -- when a hazard needs clearing, carry is the number that actually matters, not total."}}
  </script>
  <script type="application/json" id="lesson-curve">
{"parameter":"Curve","oneLiner":"Curve is the sideways bend a shot takes in flight — caused entirely by the gap between face angle and club path (the spin-axis tilt), and it grows with the square of how far the ball flies.","whatItIs":"Curve is the sideways bend a golf shot takes in the air — a completely separate thing from where it starts. A shot can start dead on the target line and still curve 30+ yards offline by the time it lands (a pure slice or hook), or it can start well off-line and then fly perfectly straight from there (a push or pull with zero curve). In Flightglass's engine, curve is driven entirely by the spin axis — how far the backspin's axis tilts sideways instead of staying level — and that tilt comes from exactly one thing: the gap between where the clubface points and where the club is actually travelling (path) at impact. Zero gap, zero curve, no matter how extreme the face or path numbers are individually. The bigger the gap, the more the axis tilts and the more the ball bends — and, crucially, it bends more the longer the shot flies, because curve compounds with distance (curve ≈ carry² × spinAxis / 12000). That's why the exact same swing flaw looks harmless on a wedge and disastrous on a driver.","components":[{"name":"Face-to-path gap (faceAngle − clubPath)","role":"The master lever. Curve is driven entirely by the mismatch between where the face points and where the club is travelling at impact — not by either number alone. Zero gap = zero curve no matter how extreme face or path are individually (e.g. +8° path with a +8° open face cancels to a straight shot). The engine reads this directly as the `faceToPath` field.","typicalRange":"tour player ≈0-4°; recreational slicer ≈5-12°+"},{"name":"Spin axis tilt","role":"The estimate-scaled version of the gap that the curve formula actually multiplies: spinAxis = clamp(1.5 × faceToPath, ±38°). This is the one signed quantity in the curve formula — it alone decides both magnitude and direction (right/left) of the bend.","typicalRange":"tour ≈0-6° tilt; amateur slice/hook ≈9-20°+"},{"name":"Carry distance (club/shot length)","role":"The quadratic amplifier. Curve = carry² × spinAxis / 12000, so the same axis tilt bends a longer shot dramatically more — a driver curves ~2.35× more than a 7-iron, and ~5.3× more than a 100-yd wedge shot, for an identical gap.","typicalRange":"driver ≈220-280 yd tour / 180-230 yd amateur; 7-iron ≈150-172 yd; wedge ≈80-120 yd"},{"name":"Start direction","role":"A separate quantity from curve (face-dominant blend, same mechanism as the start-direction lesson content). It combines with curve to form the total sideways miss: offline = carry·sin(startDirection) + curve. A pushed/pulled shot can miss badly with zero curve.","typicalRange":"±0-8° off the target line depending on the face/path mix"},{"name":"Air density / altitude","role":"An environment-tier modifier wired into the dependency graph (altitude→curve) but not yet a solveFlight() input — thinner air weakens every aerodynamic force on the ball, including the sideways Magnus force behind curve, so shots curve less at altitude (same reason they carry farther). Flagged EST/qualitative — not yet engine-true.","typicalRange":"sea level baseline; ~14% thinner air at Denver's ~1,600 m (per the Carry lesson's own grounded figure)"},{"name":"Strike location on the face / gear effect (driver only)","role":"A real, well-documented curve source that this engine cannot represent at all — it has no strike-location input. A toe or heel strike on a driver's curved, springy face imparts extra sideways spin independent of path or face angle. A genuine limitation to disclose, not an omission to hide.","typicalRange":"a 0.5-1 inch toe/heel miss on a driver can add meaningful extra side-spin, per TrackMan University teaching material"}],"howTheyConnect":"Contact lasts about half a millisecond, but in that instant two separate things get set: which way the ball starts (mostly the face angle, blended down by path — the same face-dominant blend used elsewhere in the engine) and which way it bends afterward (entirely the gap between face angle and club path). If face and path point the same direction — say both +8° in-to-out — the gap is zero and the ball flies dead straight down whatever line it started on, however far off that line was. It is the mismatch that creates sideways spin: the ball skids across the face at an angle instead of compressing straight back, and that skid rolls the backspin axis over sideways instead of leaving it level. The engine encodes this literally as spinAxis = clamp(1.5 × (faceAngle − clubPath), ±38°) — an estimate gain applied to a sourced relationship (curvature driven by face-to-path is TrackMan's well-established D-Plane finding). That tilted axis then acts on the flight: curve = carry² × spinAxis / 12000 (estimate), clamped to ±60% of carry so an extreme axis tilt can never make the ball explode sideways — at the engine's own 38° axis ceiling and a 230-yd carry, the raw formula wants 167.5 yd of curve, but the 0.6×carry safety cap holds it to 138 yd, a visible reminder that the axis-gain and curve-scale constants are tuned, not measured. The carry² term is the quietly important part: it means the same degree of axis tilt curves a longer shot dramatically more, because the ball is airborne longer and the sideways force (a horizontal slice of the same Magnus lift that makes backspin hold the ball up) has more time to push it off-line — lateral deflection under a roughly constant sideways acceleration grows with time squared, and flight time grows roughly with carry. That is why identical mis-hits look so different club to club: an 8° face-to-path gap barely nudges a 100-yd wedge shot (~10.0 yd) but sends a driver over 50 yards off-line (52.9 yd) — Wolfram-verified against the engine's literal formula. Finally, curve is not the same as the ball's total miss: offline = carry·sin(startDirection) + curve, so a pushed shot with zero curve can still finish well right of target, and a shot that starts dead on-line but curves hard finishes just as far off — two very different swing errors producing the same result on the scorecard.","hierarchy":[{"driver":"Spin axis tilt (from the face-to-path gap)","weight":"dominant and the only signed term — every +1° of face-to-path gap adds 1.5° of axis tilt, worth ~6.6 yd of extra curve per degree of gap at a 230-yd driver carry (13.2 yd at 2° gap, 39.7 yd at 6°, 52.9 yd at 8° — Wolfram-verified against the engine).","why":"Curve = carry² × spinAxis / 12000 in the engine. spinAxis is the only signed quantity in that formula, so it single-handedly decides both how much the ball bends and which way. Face angle and club path only matter through their difference."},{"driver":"Carry distance / club length","weight":"quadratic multiplier — a driver (≈230 yd) curves ~2.35× more than a 7-iron (≈150 yd) for the identical axis tilt (39.7 yd vs 16.9 yd at a 6° gap), and ~5.3× more than a 100-yd wedge shot (52.9 yd vs 10.0 yd at an 8° gap). All Wolfram-verified against the engine's own carry² term.","why":"Curve scales with carry², the standard approximation for lateral deflection growing with flight time squared under a roughly constant sideways force. Long clubs are airborne far longer, so an identical swing fault has far more time to push the ball off-line."},{"driver":"Face angle and club path individually (the two raw inputs)","weight":"Each contributes to the gap 1:1 in degrees, but face angle also drives ~60-88% of start direction on its own (a separate outcome, loft-dependent weight), while path drives the rest.","why":"Curve only cares about faceAngle − clubPath, never their individual values — a golfer swinging +8° in-to-out with a +8° open face (0° gap) hits it dead straight, while 0° path with a 4° open face (4° gap) produces a clear fade. This split — start is mostly the face, curve is entirely the face-to-path gap — is the core 'D-Plane' insight."},{"driver":"Altitude / air density","weight":"Second-order, and not yet numerically modelled — solveFlight() takes no altitude input, even though the dependency graph wires altitude→curve for a future Environment-tier lesson. Directionally: thinner air (~14% less dense at Denver, per the Carry lesson's grounded figure) weakens the sideways Magnus force too, so shots curve less at altitude — the flip side of carrying farther.","why":"Curve is an aerodynamic side-force effect, so anything that changes air density changes it — but this driver is currently outside what the interactive diagram can show engine-true, and is disclosed as such rather than faked."},{"driver":"Off-center strike / gear effect (driver-specific, real-world only)","weight":"Can rival or exceed the face-to-path effect on a badly struck driver — entirely absent from this engine, which has no strike-location input among its 5 club-delivery parameters.","why":"A driver's curved, springy face imparts extra sideways spin on toe/heel strikes independent of path or face angle. It's well documented in TrackMan University material as a real curve source golfers should know about, even though this lesson's model cannot represent it — an honest scope limitation, not an error."}],"misconceptions":["\"Club path curves the ball\" (or \"face angle curves the ball\") — wrong; it's the gap between them (face-to-path) that curves it. A path of +10° with a matching +10° open face is dead straight (0° gap) despite huge individual numbers on each.","\"A slice/hook and a fade/draw are different mechanisms\" — they're the same mechanism (face-to-path gap) at different magnitudes. The engine's own threshold: <0.75° gap reads Straight, 0.75-6° reads Draw/Fade, >6° reads Hook/Slice. It's a dial, not a different phenomenon.","\"A shot curves the same amount off every club\" — false. Curve scales with carry², so the identical face-to-path gap that barely nudges a wedge (10.0 yd at 8° gap, 100-yd carry) sends a driver more than 50 yards off-line (52.9 yd, 230-yd carry) — a 5.3× difference for the exact same swing fault.","\"Curve and offline (total miss) are the same thing\" — curve is only the bend. offline = carry·sin(startDirection) + curve. A pull or push with zero curve can still miss badly from the start line alone; a shot that starts dead-center but curves hard misses just as far, for a completely different reason.","\"More backspin = more curve\" — no. Curve is about the spin axis (which way the backspin tilts), not the total spin rate. Two shots can carry identical backspin rpm and curve completely differently if their axis tilt differs, or curve identically with very different total spin — backspin and spin axis are separate engine fields.","\"Curve only comes from the swing (path/face)\" — true in this engine, but not in reality: a real driver adds curve from off-center strikes via gear effect, a face-design/CG effect this model's 5 inputs (path, face, attack, loft, speed) cannot represent. Worth knowing the model has a real, disclosed blind spot here."],"wolframChecks":["sin(2°)=0.0349, sin(6°)=0.1045, sin(10°)=0.1736, sin(20°)=0.3420 — the sideways (Magnus) spin component starts small and grows slowly, consistent with curve being a subtle, easy-to-miss effect at tour-level axis tilts (2-4°) and an obvious one at amateur mis-hit tilts (10-20°+).","Engine curve check: carry 230 yd (driver), face-to-path 2° → spinAxis 1.5×2=3° → curve = 230²×3/12000 = 13.225 yd — a gentle 'tour fade/draw,' barely visible to the eye.","Engine curve check: carry 230 yd, face-to-path 6° (the engine's own Slice/Hook threshold) → spinAxis 9° → curve = 230²×9/12000 = 39.675 yd — matches the real-world read that a driver curving ~40 yd is unmistakably a slice, not a fade.","Engine curve check: carry 150 yd (7-iron), the same 6° gap → spinAxis 9° → curve = 150²×9/12000 = 16.875 yd — only 43% of the driver's curve at the identical axis tilt.","(230/150)² = 2.3511 (529/225) — confirms curve scales with carry², so a driver curves ~2.35× more than a 7-iron for the identical face-to-path gap.","Engine curve check: 8° face-to-path gap → spinAxis 12° → driver (230 yd) curves 230²×12/12000 = 52.9 yd vs a 100-yd wedge shot curving 100²×12/12000 = 10.0 yd — same swing fault, 5.29× more sideways miss on the driver.","Engine clamp check: at the maximum modelled axis tilt (38°, itself a clamp) and a 230-yd carry, the raw formula wants 230²×38/12000 = 167.5 yd of curve, but the engine's own 0.6×carry safety cap holds it to 138 yd (0.6×230) — confirms the axis-gain (1.5) and curve-scale (12000) constants are tuned/estimate, not measured, and the clamp genuinely engages at extreme mishits.","Engine straight-threshold check: the engine's own 0.75° 'Straight' cutoff, at 230-yd carry, curves only 230²×1.125/12000 = 4.96 yd ≈ 5 yd — confirms ~5 yd of drift is the engine's own definition of 'reads as straight to a golfer.'","40 yards = 36.58 m = 120 ft — a concrete real-world scale check for what a 'big slice' curve number (e.g. the 39.7-52.9 yd driver cases above) actually means walking it off on the range or fairway."],"quiz":[{"q":"What actually determines how much a shot curves sideways in the engine?","options":["Club path alone","Face angle alone","The gap between face angle and club path (face-to-path)","Ball speed alone"],"answerIndex":2,"explanation":"The engine computes spinAxis from faceToPath = faceAngle − clubPath, not from either value on its own. A +8° path with a matching +8° open face gives a 0° gap and a dead-straight shot, no matter how big each individual number is."},{"q":"A 7-iron (carry ≈150 yd) and a driver (carry ≈230 yd) are struck with the same 6° face-to-path gap — the engine's own Slice/Hook threshold. How does the curve compare?","options":["Identical in yards for both clubs","The 7-iron curves more","The driver curves roughly 2.3-2.5× more than the 7-iron","Neither club curves at all at that gap"],"answerIndex":2,"explanation":"Curve = carry² × spinAxis / 12000. At a 9° spin-axis tilt (1.5 × 6°), the 7-iron curves 16.9 yd (150²×9/12000) and the driver curves 39.7 yd (230²×9/12000) — a ratio of (230/150)² = 2.35, confirmed via Wolfram. Same swing fault, very different result."},{"q":"In the engine, what's the difference between \"curve\" and \"offline\"?","options":["They're the same number under two names","Curve is only the sideways bend from spin axis; offline is the total miss = start-line displacement plus curve","Curve includes wind effects and offline doesn't","Offline only applies to putts, not full shots"],"answerIndex":1,"explanation":"offline = carry·sin(startDirection) + curve. A pushed or pulled shot can finish well off-target with zero curve (pure start-direction error), and a shot that starts dead-center but curves hard misses just as far for a completely different reason — two separate error sources that only offline combines."},{"q":"Per the engine's own shapeLabel thresholds, a face-to-path gap between 0.75° and 6° reads as which shot shape?","options":["Slice / Hook","Draw / Fade","Straight","Push / Pull"],"answerIndex":1,"explanation":"The engine's thresholds: under 0.75° gap = Straight, 0.75-6° = Draw/Fade (a gentle, often intentional curve — 5.0 yd of bend on a driver at the 0.75° edge, Wolfram-checked), and over 6° = Hook/Slice (39.7+ yd of bend on a driver)."},{"q":"A golfer says their driver misses look far wilder than their iron misses, even though \"it feels like the same swing.\" What's the most likely explanation?","options":["Drivers have more loft, which curves the ball more","Curve scales with the square of carry distance, so the identical face-to-path gap bends much more over a longer flight","Driver balls spin backward less, so they curve more to compensate","It's an optical illusion — the curve in yards is actually the same"],"answerIndex":1,"explanation":"It usually IS the same face-to-path gap. Because curve = carry² × spinAxis / 12000, the driver's ~50% longer flight doesn't add 50% more curve — it adds carry²'s worth: an 8° gap curves a 100-yd wedge shot 10.0 yd but a 230-yd driver 52.9 yd, a 5.3× difference from one unchanged swing flaw."}],"realWorld":{"tourBenchmarks":["PGA Tour average driver (publicly published TrackMan / PGA Tour launch-monitor figures): clubhead speed ≈113 mph, ball speed ≈167 mph, backspin ≈2,545-2,700 rpm — and the key Curve-lesson fact — spin-axis tilt averaging close to 0-3°, which is why a tour player's 'miss' still finishes only 10-20 yards offline rather than in the trees.","Engine-verified (Wolfram-checked against solveFlight()): at that ~230-yd tour-average driver carry, a tight 2° face-to-path gap (spinAxis 3°, well inside a pro's tolerance) curves just 13.2 yd — an almost invisible 'power fade/draw'.","Recreational golfer (roughly 15-20 handicap) driver slice: face-to-path gaps of 5-10°+ are common and well documented in TrackMan University teaching material, producing spin-axis tilts of ≈8-15°+.","Engine-verified (Wolfram-checked): the same 230-yd driver carry with a 6° gap — the engine's own Slice/Hook threshold — curves 39.7 yd; at an 8° gap it's 52.9 yd. That's the 'two fairways over' miss every slicer recognises.","Engine-verified (Wolfram-checked): the identical 8° gap on a 100-yd wedge shot curves only 10.0 yd — 5.3× less than the driver — purely because curve scales with carry squared, not with the gap alone.","LPGA Tour average driver (publicly published): clubhead speed ≈94 mph, ball speed ≈140 mph and a shorter carry than the PGA average — by the same carry² relationship, an identical axis-tilt mishit bends fewer yards off the tee for a shorter hitter, even at the same swing 'quality'."],"scenarios":["Your 7-iron approach starts right at the flag, drifts a touch, and finishes on the fringe — nobody in the group even calls it a miss. Feed that exact same face-to-path gap into a driver and it's 25+ yards off the fairway. Same swing fault, wildly different-looking result, purely from carry² scaling.","The classic banana slice that finishes on the next hole's fairway isn't bad luck — it's an 8-10°+ face-to-path gap (open face relative to path) sitting on top of a 220+ yard flight.","A tour pro's TV-commentator 'stock cut' looks arrow-straight to the eye but is quietly bending 10-15 yards over the flight — visible on a launch-monitor overlay, invisible in real time, because a couple of degrees of axis tilt is genuinely subtle until it compounds over 230 yards.","Two golfers swear they made 'the same swing' with driver and 7-iron, but the driver misses the fairway and the 7-iron finds the green. If the face-to-path gap really was identical, the driver was always going to miss by more — it's not a worse swing, it's a longer one.","A hooking pull that starts left and keeps bending left is doubly wrong: it started off-line (start direction) and then curved further the same direction (curve) — two separate errors stacking, not one big one, which is why it can feel like a small mistake produced a huge miss."],"whatItMeansForYou":"If your driver misses look far wilder than your iron misses even though it 'feels like the same swing,' it usually IS the same swing — you're just seeing the identical face-to-path gap magnified by carry², because the driver flies 50%+ farther and curve grows with the square of that distance. Chasing the driver slice by fixing the driver alone (a stronger grip just for that club, aiming further left) treats the symptom; closing the same 2-4° face-to-path gap you already carry on your irons — nearly invisible there — is what actually straightens every club in the bag at once, driver included."}}
  </script>
  <script type="application/json" id="lesson-offline">
{"parameter":"Offline","oneLiner":"Offline is the ball's total sideways miss from target at landing — start-line aim plus in-flight curve — and it grows fast with distance because curve scales with carry squared.","whatItIs":"Offline is simply how far left or right of your target the ball ends up when it lands — the number that decides fairway vs. rough, or green vs. bunker. It isn't one thing; it's the sum of two separate effects. First, where the shot starts: the initial direction the ball leaves the clubface, set mostly by where the face was pointing at impact, with a smaller nudge from the swing path. Second, how much it bends after that: the sideways curve that develops in flight because the ball is spinning around a tilted axis rather than a level one, and that tilt comes from the gap between face and path — not either one alone. A shot can start dead on line and still curve badly offline (the classic 'looked perfect, ended up in the trees' slice), or it can start well off line and curve back on target. In the app's engine: offline = carry·sin(startDirection) + curve, where startDirection is a face/path blend and curve grows with the square of how far the ball flies — meaning the exact same aim-and-path mistake gets punished far more with a driver than with a wedge.","components":[{"name":"Start direction","role":"Where the ball initially leaves the face relative to the target line — a blend of face angle and club path, engine: startDirection = faceW·faceAngle + (1−faceW)·clubPath. Converted to a start-line yardage by carry·sin(startDirection).","typicalRange":"well-struck ±1-2°; a poor strike ±4-6°+"},{"name":"Face angle","role":"Where the clubface points at impact. The dominant lever on start direction (≈75% weight at a 30° 7-iron loft, faceW = clamp(0.90−dynamicLoft·0.005, 0.60, 0.88)) and, via the face-to-path gap, half of what tilts the spin axis that creates curve. Single biggest lever on total offline.","typicalRange":"elite ball-striker ~±1° of square; recreational golfer often ±3-5°+"},{"name":"Club path","role":"The horizontal direction the head travels through impact. Only a 25% weight on start direction, but an equal partner to face angle in the gap (faceAngle−clubPath) that sets the spin axis and therefore the curve — weak on aim, full-strength on bend.","typicalRange":"tour ~±2-3°; amateur commonly ±5-8° on a real miss"},{"name":"Spin axis (the curve driver)","role":"Tilt of the spin axis away from level, engine: spinAxis = clamp(1.5·(faceAngle−clubPath), −38°, +38°) — estimate gain, physically clamped. This tilt is what bends the flight sideways after launch, completely separate from where it started.","typicalRange":"<0.75° reads as Straight; 3-8° a gentle draw/fade; beyond ~6-10° a slice/hook, clamped at ±38°"},{"name":"Curve (yards)","role":"The actual sideways bend in yards, engine: curve = clamp(carry²·spinAxis/12000, −0.6·carry, +0.6·carry). Grows with carry squared, not carry — so the same axis tilt bends a long shot far more than a short one.","typicalRange":"a few yards on a wedge-length shot, 10-25 yd on a mid-iron miss, 30-50+ yd on a driver-length miss"},{"name":"Carry (the amplifier)","role":"Doesn't create sideways direction by itself, but it squares whatever spin-axis tilt exists, via the curve formula. This is why club selection changes offline outcomes even for an identical swing fault.","typicalRange":"wedge-length ~90-100 yd, 7-iron ~170-175 yd, driver-length ~230-280 yd (engine's carry formula is club-agnostic — only ballSpeed drives it)"},{"name":"Wind (crosswind)","role":"A real-world sideways push during flight that is not modeled in solveFlight (no wind input in the engine) — layered on top of whatever start direction + curve the swing already produced. Roughly proportional to crosswind speed × hang time, with only partial entrainment.","typicalRange":"order of ~10-15 yd of drift for a sustained 10 mph full crosswind on a mid/long shot (estimate, illustrative)"}],"howTheyConnect":"Offline is the last number in the chain — the total sideways distance between where the ball lands and the target line — and the engine builds it from exactly two upstream, independent effects: how the shot started and how much it bent afterward. First, face angle and club path blend into a start direction, but not equally: the clubface controls roughly 75% of the ball's initial line (the weight tapers slightly with loft — faceW = clamp(0.90 − dynamicLoft·0.005, 0.60, 0.88), landing at 0.75 for a 30° 7-iron — sourced from launch-monitor literature) while path supplies only 25%. That start-line angle becomes a real sideways yardage once multiplied by how far the ball actually flies: carry·sin(startDirection). Second, and completely separately, the gap between face and path (faceAngle − clubPath) tilts the spin axis (spinAxis = clamp(1.5·(face−path), ±38°) — an estimate gain, physically clamped so it can never reach a non-physical angle), and that axis tilt is what makes the ball curve sideways in flight, independent of where it started. Crucially, curve is not linear in carry — it is carry²·spinAxis/12000 (clamped to ±60% of carry) — because the ball spends more time bending the longer it stays airborne, so the same degree of axis tilt bends a long shot disproportionately more than a short one (flight-time-squared is the standard illustrative approximation used here for lateral drift). The engine then simply adds the two independent terms — offline = carry·sin(startDirection) + curve — and that addition is exactly what lets a shot start almost perfectly on line and still finish 25+ yards offline: the start term stays tiny because path (which caused most of the curve) barely moved the aim line, while the curve term, built from that very same face-to-path gap, keeps compounding for the whole flight. It is also why club selection changes accuracy outcomes for an identical swing fault: hit a given face-to-path gap with a 90-yard wedge-length shot and it curves a few yards
