; hit the same gap with a 230-yard driver-length shot and it curves roughly 6x farther, purely from the carry² term. In the real world, wind adds one more, genuinely independent layer on top of all this — pushing the ball sideways for as long as it is airborne — but it is not modeled in solveFlight at all (there is no wind input), so it has to be estimated separately from basic physics (crosswind speed × hang time, scaled down because a golf ball only partially rides the airflow), and it usually adds less to the miss than a meaningful face-to-path fault does.","hierarchy":[{"driver":"Face-to-path gap → spin axis → curve (the bend)","weight":"often the largest single piece of offline, and it grows with carry squared — the same 10.5° axis tilt curves ~7.1 yd at a 90-yd wedge-length carry but ~26.0 yd at a 172-yd 7-iron carry and ~46.3 yd at a 230-yd driver-length carry (a 33% longer carry produces a 78% bigger curve)","why":"curve = carry²·spinAxis/12000 in the engine — a purely quadratic relationship. A shot can start almost perfectly on line (a 7° face-to-path gap gives only a 0.25° start direction, ~0.75 yd of push) and still finish 26+ yards offline purely from curve, which is why 'it started on line' is a poor predictor of the final miss."},{"driver":"Face angle (via start direction)","weight":"weighted ≈75% vs path's 25% in the start-line blend — roughly 3-4.5 yd of start-line push per degree of face angle at a 172-yd 7-iron carry (172.4·sin(1°) ≈ 3.0 yd, 172.4·sin(1.5°) ≈ 4.5 yd)","why":"faceW = clamp(0.90−dynamicLoft·0.005, 0.60, 0.88) is sourced from launch-monitor literature: the clubface is the dominant, nearly-3:1 driver of where the ball initially points, and (via the face-to-path gap) it also supplies half of the curve term — making it the single biggest lever on total offline."},{"driver":"Carry / club length (the amplifier, not a direction cause)","weight":"a 33% longer carry (172.4→230 yd, a realistic 7-iron-to-driver jump) produces a 78% bigger curve for the identical spin-axis tilt (curve ratio = carry ratio² = 1.78, verified: 46.29/26.01 = 1.78)","why":"curve's carry² term means distance itself doesn't steer the ball, but it mercilessly amplifies whatever steering error (spin-axis tilt) already exists — the reason a driver 'exposes' a face/path fault that a wedge would barely show."},{"driver":"Club path (via the face-to-path gap only)","weight":"contributes just ~0.25 yd of start-line push per degree (25% weight) but pulls full weight (1:1) alongside face in the gap that sets spin axis and curve","why":"faceToPath = faceAngle − clubPath feeds spinAxis directly; a path-only error is nearly invisible in the initial aim line but shows up entirely in the curve, which is why 'path' alone is a misleading way to talk about a slice or hook."},{"driver":"Crosswind (environmental, estimate — not in solveFlight)","weight":"order of ~1 yd of drift per mph of crosswind per ~100-150 yd of hang carry; physical ceiling for a 10 mph crosswind over a ~4.3 s mid-iron hang time is ~21 yd (full wind-speed×time), but real drift is a fraction of that since a golf ball only partially entrains with the air — commonly cited around 10-15 yd for a strong, sustained crosswind on a mid/long shot","why":"the base engine has no wind input at all — this is a real, additive downstream physical effect layered on top of whatever start direction + curve the swing already created, usually secondary to a meaningful face-to-path gap but not negligible in blustery conditions."}],"misconceptions":["\"If my ball starts on line, it will finish on line.\" False — curve, driven by the face-to-path gap, keeps bending the ball after launch no matter how good the start line looks. The grounded amateur-slice example (face +2°, path −5°) starts within a yard of target (0.75 yd push) and still finishes 26.8 yd right.","\"Offline is caused mostly by a bad swing path (in-to-out or out-to-in).\" Path carries only 25% weight on the start line — face angle is the dominant lever there. Path's real power is in the face-to-path gap that drives curve, and it only matters there in combination with face, never alone.","\"A good, accurate swing with a wedge on the range means I'll be similarly accurate with a driver on the course.\" False — because curve scales with carry squared, an identical face-to-path gap that barely moves a wedge (about 7 yd) can push a driver-length shot 3-4x farther offline (25-46+ yd).","\"Wind is the main reason golfers miss fairways.\" Real, but usually secondary — a sustained 10 mph crosswind adds on the order of 10-15 yd of drift, typically smaller than the curve from a genuine face-to-path gap on a mis-hit (which alone can be 20-45+ yd).","\"Any curve (draw or fade) means the shot is 'offline' and therefore bad.\" A controlled, modest spin-axis tilt that the player starts aimed to allow for is a deliberate, repeatable shot shape tour pros use on purpose. The dangerous case is an uncontrolled face-to-path gap that's bigger than the player accounted for when aiming.","\"Face angle and club path matter equally for direction.\" They don't — face is weighted 3:1 over path for the start line (75/25), but they are equal partners (a simple subtraction, face − path) in the gap that sets the spin axis and curve. That asymmetry is the central idea in the TrackMan D-Plane model of ball flight."],"wolframChecks":["sin(1.5°) = 0.02618, sin(1°) = 0.01745, sin(0.25°) = 0.004363 — the trig terms that convert a start-direction angle into a start-line yardage via carry·sin(startDirection).","172.4^2 = 29,721.76 — the squared-carry term inside the engine's curve formula (curve = carry²·spinAxis/12000), confirming curve grows with the square of carry, not linearly.","Open-face example (face +2°, path 0°, 7-iron carry 172.4 yd): startDirection = 0.75×2 = 1.5° -> start-line push 172.4·sin(1.5°) = 4.513 yd; spin axis = 1.5×2 = 3.0° -> curve = 172.4²×3/12000 = 7.430 yd; total offline = 4.513+7.430 = 11.94 yd right.","In-to-out path example (face 0°, path +4°): startDirection = 0.25×4 = 1.0° -> start push 172.4·sin(1°) = 3.009 yd; spin axis = 1.5×(0−4) = −6.0° -> curve = 172.4²×(−6)/12000 = −14.861 yd; total offline = 3.009−14.861 = −11.85 yd (about 11.9 yd left) — an in-to-out path with a square face produces a draw.","Amateur-slice example (face +2°, path −5°): startDirection = 0.75×2+0.25×(−5) = 0.25° -> start push 172.4·sin(0.25°) = 0.752 yd (starts almost dead on line); spin axis = 1.5×7 = 10.5° -> curve = 172.4²×10.5/12000 = 26.007 yd; total offline = 0.752+26.007 = 26.76 yd right — the ball starts on target and still misses the fairway by 27 yards.","Same 10.5° spin-axis tilt at a wedge-length 90-yd carry: curve = 90²×10.5/12000 = 7.0875 yd, versus 26.007 yd at a 172.4-yd carry — confirms curve scales with carry², so an identical face-to-path fault matters far less on short clubs than on long ones.","Driver-length carry 230 yd at the same 10.5° axis: curve = 230²×10.5/12000 = 46.2875 yd; 230²/172.4² = 1.7798, i.e. a 33% longer carry (172.4->230 yd) produces a 78% bigger curve — the quadratic amplification that makes longer clubs the 'great exposer' of face-to-path mismatches.","10 mph = 4.470 m/s; over an illustrative 4.3 s mid-iron hang time that is 4.470×4.3 ≈ 19.2 m ≈ 21 yd — the physical ceiling for crosswind drift if the ball fully rode the wind (real drift is a fraction of this, since a golf ball only partially entrains with the airflow).","Hang-time cross-check: a 30-yd (27.43 m) apex under gravity alone takes sqrt(2×27.4/9.81) ≈ 2.36 s to fall from the top; doubling for a roughly symmetric up/down flight gives an order-of-magnitude ~4.3-4.7 s total hang time for a 7-iron, the figure used in the crosswind estimate above."],"quiz":[{"q":"What two components does the engine add together to make \"Offline\"?","options":["Carry and apex","Start direction and curve","Backspin and sidespin","Club speed and smash factor"],"answerIndex":1,"explanation":"Offline = the ball's total sideways miss = the initial start-line direction (dominated ~75% by face angle) plus the curve it develops in flight (from the tilt of the spin axis, driven by the face-to-path gap). In the engine: offline = carry·sin(startDirection) + curve."},{"q":"A 7-iron is struck with face angle 2° open and club path square (0°), carrying its default ~172.4 yd. The total offline works out to about 11.9 yd right. How does that split between the start line and the curve?","options":["All ~12 yd from the start line, none from curve","About 4.5 yd from the start line and about 7.4 yd from curve","All ~12 yd from curve, none from the start line","Exactly half and half"],"answerIndex":1,"explanation":"With faceW≈0.75 at a 30° dynamic loft, startDirection = 0.75×2 = 1.5°, giving a 172.4·sin(1.5°) ≈ 4.5 yd start-line push. The 2°-vs-0° face-to-path gap creates a 3.0° spin-axis tilt, so curve = 172.4²×3/12000 ≈ 7.4 yd. Curve actually contributes more than the start line here, even from the same 2° face reading."},{"q":"A golfer's shot starts almost dead on the target line (about 0.75 yd off) but still finishes 27 yards right of target. What's the most likely cause?","options":["A large face-to-path gap creating heavy spin-axis curve, even though the start line looks fine","The ball speed was too low","The club path was exactly zero","There is no possible physical explanation — a ball that starts on line always finishes on line"],"answerIndex":0,"explanation":"This is the classic 'starts straight, ends in the trees' slice. With face +2° and path −5°, the face-path gap is 7°: it barely moves the start line (path is only 25% weighted there, so startDirection ≈ 0.25°) but produces a 10.5° spin-axis tilt, and curve = 172.4²×10.5/12000 ≈ 26 yd. Because path barely steers the start but drives the curve just as strongly as face does, a shot can look perfect off the face and still miss badly."},{"q":"Why does the exact same face-to-path mismatch send a driver-length shot much farther offline than a wedge-length shot?","options":["Because curve scales roughly with carry squared, so a longer flight amplifies the same spin-axis tilt much more","Because the driver spins backwards faster than a wedge","Because wedges use a completely different spin-axis formula","Because driver shots are always hit with a steeper attack angle"],"answerIndex":0,"explanation":"In the engine, curve = carry²·spinAxis/12000. The same 10.5° spin-axis tilt produces about 7.1 yd of curve at a 90-yd wedge-length carry but about 26.0 yd at a 172-yd 7-iron carry and 46.3 yd at a 230-yd driver-length carry — a jump that matches the carry² relationship exactly (a 33% longer carry gives a 78% bigger curve). That's why the driver is the 'great exposer' of face/path faults that a wedge would barely show."},{"q":"How does a 10 mph crosswind typically affect where a shot finishes, compared to the offline created by the swing itself (face and path)?","options":["It's usually the single biggest factor, dwarfing face and path","It adds a real but secondary sideways push — very roughly a yard or so per mph of crosswind for every 100-150 yards of carry, on top of whatever the swing already created","It has zero effect on direction, only on distance","It only matters on wedge shots, not longer clubs"],"answerIndex":1,"explanation":"Wind isn't in the engine's offline formula at all (solveFlight has no wind input) — it's a downstream physical effect layered on top of the swing-created start line and curve. A 10 mph crosswind (4.47 m/s) blowing for a ~4.3 s mid-iron hang time gives a physical ceiling of about 21 yd of drift if the ball moved entirely with the wind, but a golf ball only partially entrains, so real drift is a fraction of that — commonly cited around 10-15 yd for a strong, sustained crosswind. It's real and additive, but a meaningful face-to-path gap is usually still the bigger factor."}],"realWorld":{"tourBenchmarks":["PGA Tour average driving distance is roughly 299 yd total (carry ~275-280 yd), yet average driving accuracy (fairways hit) is only about 60% — proof that even elite face/path control still produces meaningful offline miss once carry is that long, because curve amplifies with carry squared.","Tour-level players deliver face angle within roughly 1° of square and club path within roughly 2-3° on a stock full swing — both far tighter windows than a mid-to-high-handicap amateur's typical 3-6°+ face and path errors, which is the main reason tour dispersion patterns stay narrow while amateur patterns balloon.","The app's own shapeLabel() thresholds mirror widely used TrackMan-style teaching bands: under about 0.75° of face-to-path gap reads as Straight, up to about 6° reads as a Fade/Draw (a controlled shot shape), and beyond about 6° reads as a Slice/Hook (an uncontrolled miss) — the same gap that drives the curve term in offline.","A recreational golfer's face-to-path gap (the number that squares into curve) is commonly several times larger than a tour pro's on a full swing, which is why amateur offline misses are often reported as multiples of tour-level dispersion rather than just 'a bit worse.'"],"scenarios":["The 'looks-great, ends-in-the-trees' slice: the ball starts within a yard or two of the flag, keeps drifting right the entire flight, and finishes 25-30 yards offline — this lesson's grounded amateur-slice example (face +2°, path −5°: 0.75 yd start push, 26 yd of curve).","A pushed iron that flies dead straight (almost no curve) but 10-12 yards right of the pin, purely because the face alone was open at impact with a square path — a pure start-line miss with no meaningful curve involved.","The exact same swing fault on two different clubs in the same round: an 8-iron misses the green by a forgivable 6-8 yards, but the driver carrying the identical face-to-path gap ends up in the rough or trees 25+ yards away — because curve scales with carry squared, the longer club always pays the bigger penalty for the same mistake.","A calm-morning shot that would land pin-high center drifts into a bunker on a blustery afternoon — the crosswind adding an extra, physics-independent sideways push on top of whatever the swing itself already created."],"whatItMeansForYou":"If you're missing fairways or greens sideways, fix face angle first — it's roughly 75% of your start line and half of the face-to-path gap that creates curve, so it's the single biggest lever on total offline. If your start line already looks fine but you still miss badly, the problem is the gap between face and path (not path in isolation) — that's what's curving you offline, and because curve scales with carry squared it will punish your driver far harder than your wedges for the identical swing flaw. On windy days, expect an extra, genuine sideways push layered on top of your normal miss pattern, and aim with a bit more room on the downwind side of the target."}}
  </script>
  <script type="application/json" id="lesson-altitude">
{"parameter":"Altitude","oneLiner":"Altitude is the thinning of the air itself as elevation rises — with the exact same swing, same spin, same ball speed off the face, the shot carries meaningfully farther and curves a little less, simply because there is less air in its way.","whatItIs":"Altitude is simply how high above sea level you're playing — and the only thing it changes is the air the ball flies through. Climb in elevation and the atmosphere thins out: there are fewer air molecules per cubic meter to push against the ball. That thinner air means less aerodynamic drag holding the ball back, so a shot hit at 5,000+ ft carries noticeably farther than the identical swing at sea level — golfers in Denver or at a Mexico City PGA Tour event routinely see drives that would be exceptional anywhere else, purely from thin air, not extra speed. But it isn't a free lunch: the same thinner air also weakens the Magnus lift that backspin generates to hold the ball up, so the carry gain is always less than the raw drop in air density — the app models it as roughly 70% of the density change converting into extra yards. Nothing about the strike itself changes: club speed, ball speed, spin loft and backspin are all identical at altitude for the same swing, because they're set at the clubface before the ball ever touches any air. Altitude is purely a post-impact, in-flight effect — the one this app's engine deliberately keeps separate from the swing-and-strike physics, layering it on afterward as a documented, Wolfram-grounded estimate.","components":[{"name":"Elevation (ft above sea level)","role":"The only real input. Everything else in this lesson is downstream of it — it sets air density via the app's fAlt = 1 − 0.03·(alt/1000) approximation, which tracks the real ISA atmosphere to within about a percentage point through typical golf elevations.","typicalRange":"sea level 0 ft; Denver 5,280 ft; Mexico City (Club de Golf Chapultepec) 7,359 ft; mountain resorts commonly 6,000–9,000 ft"},{"name":"Air density","role":"What elevation actually changes. Falls in a near-linear ~3% per 1,000 ft. This single number is the hidden variable behind every other effect in this lesson.","typicalRange":"sea level 1.225 kg/m3; Denver ≈1.04 kg/m3 (~15% thinner); Mexico City ≈0.98 kg/m3 (~20% thinner)"},{"name":"Aerodynamic drag","role":"The forward-flight brake. Scales directly (linearly) with air density, so thinner air = less drag = the ball keeps more of its launch speed for longer, i.e. more carry.","typicalRange":"driver ball at 167 mph feels ~1.22 N of drag at sea level, ~1.03 N at Denver's density — a 15% cut, matching the density ratio exactly"},{"name":"Magnus lift (the self-limiter)","role":"The same backspin-driven force that holds the ball up also scales with air density, so thin air weakens it too. This is why carry gains less than the raw density drop — the app models the net translation as ~70% of the density change.","typicalRange":"Denver's ~15–16% density drop becomes ~+11% carry, not +16%; Mexico City's ~20% drop becomes ~+15%"},{"name":"Backspin, ball speed, spin loft, launch angle (the swing side)","role":"The contrast group. All set at the clubface, ~half a millisecond before the ball meets any air. Altitude changes none of them — not by one rpm or one mph. Only what happens after launch changes.","typicalRange":"identical for the same swing at sea level and at 8,000 ft"},{"name":"Curve / shot-shape dampening","role":"A secondary, often-missed effect: sideways Magnus force (what bends a hook or slice) is driven by the same density-dependent aerodynamics as vertical lift, so shot shapes visibly flatten out at altitude — spin hasn't changed, the air's grip on it has.","typicalRange":"qualitatively real and grounded in the same physics as lift; not yet a separately-validated multiplier in the shipped engine (EST)"}],"howTheyConnect":"Altitude's whole effect runs through one physical quantity: air density. Climb from sea level and the atmosphere thins — roughly 3% less dense per 1,000 ft (the app's linear fAlt = 1 − 0.03·(alt/1000) approximation, which tracks the real ISA atmosphere to within about a percentage point through Denver's elevation and starts under-predicting a little above ~8,000 ft). That thinner air acts on the ball in two opposing ways at once. First, it cuts aerodynamic drag — the force resisting forward flight — so the ball keeps more of its launch speed for longer, which by itself would add distance one-for-one with the density drop. Second, it cuts Magnus lift — the same backspin-driven force that holds the ball up against gravity — so the ball gets slightly less support to stay airborne. These two effects partly cancel: the app models the net translation as about 70% of the raw density change (an estimate, not a lab-measured constant, but grounded in the fact both forces are proportional to air density), so Denver's ~16% thinner air (the app's linear model at 5,280 ft) becomes about +11% extra carry, not +16%. On a 172-yard 7-iron that is roughly +19 yards; at Mexico City's ~7,360 ft it is closer to +15% and +27 yards. Crucially, none of this touches the swing side of the equation. Backspin, ball speed, spin loft and launch angle are all set half a millisecond after clubface meets ball — before the shot has flown a single inch through any air — so they read identically whether you are at sea level or on a mountaintop. Only what happens after launch changes: the ball carries farther, its flight sits a touch flatter as reduced drag lets it hold speed into the descent, and — by the same density-scaling logic that weakens lift — the sideways Magnus force behind a hook or slice is weakened too, so shot shapes that look severe at sea level visibly straighten out at altitude.","hierarchy":[{"driver":"Elevation (feet above sea level)","weight":"the only real input — a near-linear ~+2.1% carry per 1,000 ft in this app's model (0.70 × the ~3%/1,000ft density drop); Denver (5,280 ft) ≈ +11% carry, Mexico City (7,359 ft) ≈ +15%","why":"Every other number in this lesson is downstream of elevation via fAlt = 1 − 0.03·(alt/1000). Grounded: ISA density falls to ~1.04 kg/m3 (0.85×) at 5,280 ft and ~0.98 kg/m3 (0.80×) at 7,359 ft, matching the app's linear approximation to within 1–2 points through normal golf elevations."},{"driver":"The drag-vs-lift self-limiter","weight":"turns a ~16% density drop into an ~11% carry gain at Denver, not a full 16% — the single biggest reason 'thinner air = same % more distance' is a myth","why":"Both drag and Magnus lift are proportional to air density (F ∝ ρ), so thinning the air helps forward flight (less drag) and hurts the thing holding the ball up (less lift) simultaneously. Grounded: at a 167-mph driver ball speed, drag falls from ~1.22 N (sea level) to ~1.03 N at Denver's density — exactly the 15% density ratio, confirming the linear ρ-scaling behind the self-limiter."},{"driver":"Curve / shot-shape dampening","weight":"qualitative but real — a hook or slice bends noticeably less at altitude, by the same density-scaling logic as the lift term above; not yet a separately-validated multiplier (EST)","why":"Sideways Magnus force (what bends a spin-axis-tilted shot) is driven by the identical ρ-dependent aerodynamics as vertical lift. It is the most-missed part of the altitude story — golfers notice the extra carry immediately but rarely connect it to their slice looking straighter."},{"driver":"Interaction with heat (a sibling Environment node)","weight":"compounds the elevation gain — many high-altitude rounds are also hot, and warm air is independently thinner (~3.3% per +10°C), stacking on top of the elevation effect","why":"Altitude and temperature both act through the same air-density channel, so a hot day at 5,000 ft thins the air more than either effect alone. The dedicated breakdown lives in the Temperature lesson, so this one stays focused on elevation."},{"driver":"Backspin, ball speed, spin loft, launch angle (the swing side)","weight":"zero — completely unchanged by altitude, by design","why":"These are set at the clubface, half a millisecond before the ball meets any air (backspin ≈ spinLoft × ballSpeed × 1.8, no density term anywhere in the engine). Ranking this last is the point: altitude is a downstream, in-flight effect, and confusing it with the strike itself is the most common mistake golfers make."}],"misconceptions":["\"The ball goes exactly as much farther as the air is thinner.\" False — Denver's air is ~15-16% thinner but carry only gains ~11%, because the same thin air that cuts drag also weakens the Magnus lift holding the ball up.","\"Altitude makes you swing faster or hit the ball harder.\" False — club speed and ball speed are swing outputs, completely unaffected by elevation. Only the flight through the air changes.","\"Altitude changes your backspin rate.\" False — spin is set at the face (spinLoft × ballSpeed × k) before the ball ever meets the air. A launch monitor reading at 7,000 ft is identical to one at sea level for the same swing.","\"Only the driver / tee shots are affected.\" False — the effect is proportional (~+10-15%), so it scales every club including approach irons and wedges. Clubbing normally into a mountain-resort green is a classic way to fly it over.","\"Humidity is the big altitude factor.\" False — muggy air barely changes density (<1%, and actually makes air slightly lighter, not heavier). Elevation's ~3%-per-1,000-ft density change dwarfs humidity's effect by more than an order of magnitude.","\"Hooks and slices curve more in thin air because there's more spin to grab.\" Backwards — the spin rate (rpm) doesn't change at all; the sideways aerodynamic force that turns spin into curve is weaker in thin air, so shot shapes flatten out, not sharpen."],"wolframChecks":["ISA air density at sea level (15 °C) = 1.225 kg/m3 (Wolfram-confirmed reference used throughout the app).","ISA air density at 5,280 ft (Denver) ≈ 1.04 kg/m3 = 0.85× sea level → ~15% thinner (Wolfram: 'air density standard atmosphere at 5280 ft' → 1 kg/m3 ≈ 0.85× the 1.225 kg/m3 ISA reference).","Elevation of Mexico City = 7,359 ft / 2,243 m (Wolfram); ISA air density there ≈ 0.98 kg/m3 = 0.80× sea level → ~20% thinner.","Elevation of Denver, CO = 5,280 ft exactly (Wolfram) — confirms the 'Mile High City' figure used as a real-world benchmark.","App's linear model fAlt = 1 − 0.03·(alt/1000) at 5,280 ft = 0.842 vs Wolfram's ISA-derived ratio 0.85 — within ~1 point, confirming the linear approximation holds through typical golf elevations (and starts diverging more above ~8,000-10,000 ft, where ISA gives 0.74× vs the linear model's 0.70×).","Drag force on a driver ball (167 mph = 74.66 m/s, Wolfram-converted) at sea-level density: 0.5×1.225×74.66²×0.25×π×0.0213² ≈ 1.217 N; at Denver density (1.041 kg/m3): ≈ 1.034 N — a 15.0% drag reduction (Wolfram-computed), matching the density ratio exactly and confirming drag scales linearly with air density (ρ).","carryEnvMult = 1 + 0.70·(1 − fAlt): Denver (fAlt = 0.842) → 1.111 (+11.1%); Mexico City (fAlt = 0.779) → 1.155 (+15.5%) (Wolfram-computed, reusing the exact constant already shipped in the Carry Ledger).","Applied to a 172-yd 7-iron baseline: Denver → 191.1 yd (+19 yd); Mexico City → 198.6 yd (+27 yd). Applied to a 150-yd approach shot at 6,500 ft: → 170.5 yd (+20.5 yd, +13.6%) (Wolfram-computed)."],"quiz":[{"q":"Roughly how much extra carry does a shot gain playing at Denver's elevation (5,280 ft) versus sea level, all else equal?","options":["About 2%","About 11%","About 30%","About 50%"],"answerIndex":1,"explanation":"Denver's air is about 15-16% thinner than sea level, but only roughly 70% of that density drop converts into extra carry — the same thin air that cuts drag also weakens the Magnus lift holding the ball up. Net result: about +11% carry (≈+19 yd on a 172-yd 7-iron), which is why 'the ball flies noticeably farther in Denver' is well known among golfers, but 'exactly as much farther as the air is thin' is not."},{"q":"What happens to your backspin rate (rpm off the clubface) when you take the same swing from sea level to 7,000 ft?","options":["It increases, because thin air lets the ball skid and grip more","It decreases, because thin air can't support as much spin","It stays exactly the same — spin is set at the face before the ball meets any air","It becomes unpredictable above 5,000 ft"],"answerIndex":2,"explanation":"Backspin is produced in about half a millisecond of contact (spin loft × ball speed in the engine), entirely before the ball has flown an inch through any air. Altitude only changes what that same spin does after launch — how much lift and curve it produces — never the rpm number itself."},{"q":"Denver sits at 5,280 ft; Club de Golf Chapultepec in Mexico City sits at about 7,360 ft. Which venue gives the bigger carry boost, and why?","options":["Denver — it's the more famous 'thin air' city","Mexico City — it's higher, so the air is thinner still (~20% vs ~15%)","They're identical — altitude caps out below 5,000 ft","Neither — carry gain only depends on temperature, not elevation"],"answerIndex":1,"explanation":"Air keeps thinning as you climb: about 15% thinner at Denver's 5,280 ft versus about 20% thinner at Mexico City's ~7,360 ft. Run through the same drag/lift model, that's roughly +11% carry at Denver and +15% at Mexico City — exactly why PGA Tour pros at the Mexico City event routinely post drives that would be exceptional anywhere else."},{"q":"A hooked or sliced shot at altitude, compared to the identical swing at sea level, tends to...","options":["Curve more sideways, because thin air grips the spin harder","Curve about the same — curve is unrelated to air density","Curve less sideways, because the same thin air that boosts carry also weakens the sideways aerodynamic force","Curve less only above 10,000 ft"],"answerIndex":2,"explanation":"The sideways bend of a hook or slice comes from a Magnus force that is just as density-dependent as the vertical lift that holds the ball up. Thin air weakens both, so a shot shape that looks severe at sea level visibly straightens out at altitude — the spin (rpm) hasn't changed, only how hard the air can act on it."},{"q":"You normally hit a 150-yard 8-iron at sea level. On a golf trip to a 6,500-ft mountain resort, with the identical swing, that shot will fly about...","options":["150 yd — altitude doesn't affect approach shots","170 yd — take one club less or you'll fly the green","135 yd — thin air can't hold the ball up as well","Impossible to predict without a launch monitor"],"answerIndex":1,"explanation":"The altitude effect is proportional, so it scales every club, not just the driver. At 6,500 ft the app's model gives about +13.6% carry — a 150-yard shot becomes roughly 170 yards. Clubbing down (or aiming shorter) is the practical fix; the swing itself needs no adjustment."}],"realWorld":{"tourBenchmarks":["Club de Golf Chapultepec / Vista Vallarta area, Mexico City (~7,359 ft / 2,243 m elevation, Wolfram-confirmed) hosts a PGA Tour event where routine 330-350+ yd drives are common — a direct product of ~20% thinner air, not extra swing speed.","PGA Tour's Barracuda Championship (Tahoe/Reno-area courses, ~6,300 ft, ~17% thinner air per the ISA data) is famous as one of the Tour's longest-hitting weeks, and uses Modified Stableford scoring partly because thin-air birdies pile up so fast.","Denver, CO sits at exactly 5,280 ft — one mile, Wolfram-confirmed — the 'Mile High City.' Cherry Hills Country Club (host of the 1960 U.S. Open, Arnold Palmer's famous final-round charge) plays meaningfully shorter on the card than its stated yardage suggests.","PGA Tour average driver ball speed is roughly 167-171 mph at sea-level events; the same ball speed at Mexico City's elevation carries roughly 15% farther purely because of the air it's flying through, not because the player swung harder."],"scenarios":["A golfer's home-course 150-yard 8-iron becomes roughly a 170-yard shot on a Rockies golf trip (~6,500 ft) — the exact same swing sails the green if you don't club down.","TV commentators at the Mexico City PGA Tour event routinely note drives that would be tour-leading anywhere else, attributing it to 'the altitude' rather than a hot streak of speed.","Golf GPS and rangefinder apps (Arccos, Golfshot, and similar) offer 'altitude-adjusted' or 'plays-like' yardages specifically to correct for this effect on mountain and high-desert courses.","A slice that leaks badly right at a sea-level home course often looks a touch straighter on a high-altitude course — same swing, less air for the spin to grab."],"whatItMeansForYou":"Rule of thumb from this app's model: roughly +2% carry per 1,000 ft of elevation gain (about +11% a mile up in Denver, +15% around 7,000 ft in Mexico City) — take a club or two less than the flat number on the card, and expect any hook or slice to show up a little less severely, because the ball isn't behaving differently off the face, there's just less air for it to fight (or curve) through."}}
  </script>
  <script type="application/json" id="lesson-wind">
{"parameter":"Wind","oneLiner":"Wind is moving air, and to a flying golf ball it is really two separate effects in one: head/tailwind reshapes how far the ball carries, while crosswind steadily pushes it sideways off the target line.","whatItIs":"Wind is simply moving air, but a flying golf ball feels it as two almost-independent problems depending on which way it blows relative to your target line. Blowing straight down the line (head or tail) it changes the drag and lift the ball feels, which changes carry distance. Blowing across the line it pushes the ball sideways for as long as it's airborne, which changes where the ball finishes relative to the target, with barely any effect on distance. Real wind is almost always a mix of both — a gust from the front-left is part headwind, part crosswind — so the first job in reading wind is resolving it into those two components before deciding what to do about either one. Flightglass's physics engine (solveFlight) does not model wind at all: club speed, face angle, path, dynamic loft and attack angle still set backspin, launch angle, spin loft and the ball's engine-true carry exactly as if there were no wind. Everything wind does happens after the ball leaves the face, as a documented, clearly EST-flagged air-and-drift layer applied on top of that engine-true flight — the same honest layering the app already uses for altitude and temperature in the Carry lesson.","components":[{"name":"Wind speed (magnitude)","role":"The raw strength of the wind before it's resolved into head/tail or crosswind. Everything below scales off this number.","typicalRange":"calm 0-5 mph; playable breeze 5-15 mph; tour caution 15-25 mph; suspended-play gusts 40+ mph (2015 Open Championship, St Andrews)"},{"name":"Wind angle relative to the target line","role":"The direction the wind blows measured against your target line. This single angle decides the split between the two components below (0° = pure tailwind, 90°/270° = pure crosswind, 180° = pure headwind).","typicalRange":"resolved via head/tail = speed × cos(angle), crosswind = speed × sin(angle)"},{"name":"Head/tailwind component","role":"The along-the-line part of the wind. Drives the distance effect: headwind adds drag and (less obviously) extra Magnus lift, shrinking carry; tailwind does the reverse but by a smaller margin.","typicalRange":"10 mph headwind ≈ -10% carry; 20 mph ≈ -22%; 10 mph tailwind ≈ +7%; 20 mph ≈ +12% (TrackMan-published figures)"},{"name":"Crosswind component","role":"The across-the-line part of the wind. Drives the direction effect: pushes the ball steadily off the target line for as long as it's in the air, with almost no effect on carry distance.","typicalRange":"caddie rule of thumb ≈ 1 ft of drift per 100 yd of carry per mph of crosswind; 10 mph ≈ 5 yd off on a 150-yd shot, ≈ 9 yd on a 275-yd drive"},{"name":"Trajectory height / hang time (via launch angle & spin loft)","role":"An amplifier, not a wind input itself: the higher and spinnier the shot, the longer it is exposed to the wind per yard of carry, so both the carry effect and the crosswind drift get bigger for a lofted, high-spin shot than for a low, piercing one at the identical wind speed.","typicalRange":"ballistic (no-drag) hang-time floor ≈ 3.3-3.4 s for both a 120-mph 7-iron and a 165-mph driver at their respective launch angles; real, lift-inclusive hang time runs longer, more so for high/spinny shots"},{"name":"Backspin / spin loft (interaction only)","role":"Wind does not change backspin rpm — spin is fixed the instant the ball leaves the face, before wind matters. What changes is how much lift that same spin produces, because Magnus lift depends on speed relative to the air, and that relative speed rises into a headwind — this is why shots balloon.","typicalRange":"7-iron ≈ 6,500-7,500 rpm, driver ≈ 2,200-2,900 rpm — unchanged by wind itself"},{"name":"Gusts & swirl (real-course variability)","role":"The gap between a forecast's steady number and what actually happens at the ball, especially near trees, grandstands and dunes. Not modelled numerically here, but the reason pros distrust a single wind number.","typicalRange":"gusts commonly run 1.5-2x the sustained speed (2015 Open: sustained ~20-25 mph, gusts 40+ mph)"}],"howTheyConnect":"Start by resolving the wind vector: split its speed into a component along the target line (head if it blows at you, tail if it blows with you = windSpeed × cos of the angle off the line) and a component across the target line (crosswind = windSpeed × sin of that angle). Those two components then do almost entirely separate jobs. The along-line component changes the ball's speed relative to the air, and that matters twice over. First, drag: it always slows the ball, and it scales with the square of relative airspeed, so a headwind's extra drag grows faster than a tailwind's relief shrinks it. A grounded check at a representative mid-flight speed shows a 10 mph headwind adding about +21% drag while an equal tailwind removes only about -19%; at 20 mph that gap widens to roughly +44%/-36% — the asymmetry itself grows with wind speed. Real-world TrackMan-published carry data shows the same asymmetry surviving through to final distance: about 1%/mph into a 10 mph headwind (≈10% lost) growing to ≈22% at 20 mph — more than double, not simply double — while a tailwind gives back only ≈0.7%/mph (≈7% at 10 mph, ≈12% at 20 mph). Second, and less obvious: backspin rpm itself does not change in the wind — it is fixed the instant the club leaves the ball, long before the wind can touch it. But Magnus lift depends on the ball's speed relative to the air, not the ground, and that relative speed is higher into a headwind. So the identical spin rate produces more lift, the ball fights gravity harder and longer than usual, and the flight balloons — often costing more distance than the raw drag number alone would suggest, and it's exactly why a high-spin wedge or a slice punishes you more in the wind than a flighted-down stinger does. The across-line (crosswind) component does something almost entirely separate: it steadily pushes the ball off the target line for as long as it's airborne, and because that push accumulates the longer the ball is exposed, both time (hang time — driven by launch angle and trajectory height) and carry distance make it worse. The widely used caddie rule of thumb — about 1 foot of sideways drift per 100 yards of carry for every mph of crosswind — captures this: a 275-yard drive drifts roughly twice as far off a given crosswind as a 150-yard iron, and a high, spinny, slow-falling shot drifts more per yard of carry than a low, piercing one, because it simply hangs in the wind's path longer. Flightglass's engine (solveFlight) never sees any of this — clubPath, faceAngle, attackAngle, dynamicLoft and clubSpeed produce the exact same launchAngle, spinLoft, backspin and baseline carry whether the flag is limp or snapping sideways; wind is applied as a separate, clearly EST-flagged layer on top, the same pattern already used for altitude and temperature.","hierarchy":[{"driver":"Head/tailwind component (resolved wind × cos of the angle off the line)","weight":"dominant for distance — TrackMan-published: 10 mph headwind ≈ -10% carry (-15 yd on a 150-yd shot, -27.5 yd on a 275-yd drive); 20 mph ≈ -22% (-33 yd / -60.5 yd) — more than double the 10 mph loss. Tailwind gives back less: 10 mph ≈ +7% (+10.5 yd / +19.25 yd), 20 mph ≈ +12% (+18 yd / +33 yd).","why":"Drag scales with the square of the ball's speed relative to the air, so a headwind's extra drag always outweighs an equal tailwind's relief, and — because backspin's Magnus lift also scales up with that same higher relative airspeed into a headwind — the shot balloons on top of the raw drag penalty. Nothing else here moves total distance this much."},{"driver":"Crosswind component (resolved wind × sin of the angle off the line)","weight":"dominant for direction, negligible for distance — caddie rule of thumb ≈1 ft of drift per 100 yd of carry per mph of crosswind: 10 mph ≈ 5 yd off on a 150-yd shot, ≈9 yd on a 275-yd drive; 20 mph ≈10 yd / ≈18 yd.","why":"A pure 90° crosswind barely touches the ball's forward (relative-airspeed) component, so drag and lift are almost unchanged — but it steadily accumulates a sideways push for the whole flight, which is why crosswind is a targeting problem, not a club-selection problem."},{"driver":"Trajectory height & hang time (spin loft, launch angle)","weight":"amplifier on both effects above — a high, spinny shot is exposed to the wind longer per yard of carry than a low, piercing one, at the identical wind speed","why":"Both the head/tail ballooning and the crosswind drift accumulate over time in the air, not just distance covered. Ballistic hang-time estimates for a 120-mph 7-iron (~3.3 s) and a 165-mph driver (~3.4 s) land close together despite the huge speed gap, because the driver's much lower launch angle offsets its much higher speed — but a ballooning wedge or high slice, with extra lift-driven hang time, sits in the wind noticeably longer than that floor suggests."},{"driver":"Wind direction angle relative to the target line","weight":"the split lever — determines how much of a given wind speed lands in the head/tail bucket vs the crosswind bucket via the cos/sin decomposition","why":"The exact same 15 mph wind is either almost entirely a distance problem (blowing straight down the line) or almost entirely a direction problem (blowing straight across it), or some mix of both — reading the angle correctly matters as much as reading the speed."},{"driver":"Gusts & swirl (real-course variability)","weight":"situational but can dominate everything else — gusts commonly run 1.5-2x a forecast's sustained speed, and wind swirls unpredictably near trees, dunes and grandstands","why":"This is why tour pros distrust a single wind number and often choose to 'flight it down' (lower launch, less spin) to shrink all of wind's effects at once rather than trying to calculate an exact drift — the extreme case being the 2015 Open Championship at St Andrews, where gusts over 40 mph physically moved golf balls resting on the greens and suspended play for 10.5 hours."}],"misconceptions":["\"Headwind and tailwind cancel out over a round.\" False — a headwind hurts noticeably more than an equal tailwind helps (TrackMan: 10 mph = -10%/+7%, 20 mph = -22%/+12%), and the gap widens as the wind gets stronger, not stays fixed.","\"A headwind puts more spin on the ball.\" False — backspin rpm is set the instant the ball leaves the face, before the wind can touch it. What increases is the lift that same spin produces, because Magnus lift depends on speed relative to the air, and that's higher into a headwind — that's why shots balloon, not because rpm went up.","\"10 mph of wind is always worth about 10 yards.\" Not fixed — the relationship is non-linear (doubling the wind from 10 to 20 mph headwind isn't just double the yardage loss, it's more than double: 10% -> 22%) and it scales with the shot's own carry distance and trajectory height, so a 150-yd iron and a 275-yd drive lose very different yardages to the identical wind.","\"Crosswind mainly costs you distance.\" Its primary effect is directional, not distance — a pure 90° crosswind barely changes carry at all because it does almost nothing to the ball's forward (relative-airspeed) component; it's the head/tail component that changes distance.","\"You should calculate the exact wind drift and aim for it precisely.\" Real course wind swirls and gusts, especially near trees, dunes and grandstands, and gusts commonly run 1.5-2x the sustained/forecast speed — which is why pros mostly try to 'flight it down' (lower launch, less spin) to shrink wind's effect on the whole shot rather than aim for one precise number.","\"Wind only really matters on famously windy links courses.\" Even an ordinary 10-15 mph day — common almost everywhere — can be worth a full club on an approach shot and several yards of sideways drift, and most amateurs under-adjust for it because the headwind/tailwind asymmetry isn't intuitive."],"wolframChecks":["convert 10 mph -> 4.47 m/s; convert 30 mph -> 13.41 m/s — unit conversions grounding every wind-speed input used below.","ballistic (no-drag) hang time for a 120 mph ball / ~17.85° launch (default 7-iron): t = 2×53.6×sin(17.85°)/9.81 ≈ 3.35 s — a floor estimate; real, lift-inclusive hang time runs longer, especially for high/spinny shots.","ballistic hang time for a 165 mph ball / ~13° launch (PGA-average driver): t = 2×73.8×sin(13°)/9.81 ≈ 3.38 s — nearly identical to the iron's, because the driver's much higher speed is offset by its much lower launch angle.","drag-force asymmetry at a representative 45 m/s mid-flight speed: +10 mph headwind -> ((45+4.47)²-45²)/45² = +20.85%; -10 mph tailwind -> ((45-4.47)²-45²)/45² = -18.88% — headwind's extra drag exceeds tailwind's relief, confirming the v² asymmetry.","same check at 20 mph: +43.68% / -35.79% — the asymmetry widens with wind speed (ratio ≈1.10x at 10 mph vs ≈1.22x at 20 mph), matching the TrackMan finding that the penalty/relief gap grows non-linearly, not linearly, with wind speed.","TrackMan-published carry percentages converted to yards: 150 × {0.10, 0.22, 0.07, 0.12} = {15, 33, 10.5, 18} yd; 275 × {0.10, 0.22, 0.07, 0.12} = {27.5, 60.5, 19.25, 33} yd — the head 10mph/head 20mph/tail 10mph/tail 20mph yardage deltas cited throughout.","crosswind rule of thumb (≈10 ft drift per 100 yd of carry per 10 mph of crosswind) converted to a general formula driftYd = crosswindMph×carryYd/300: 10×275/300 ≈ 9.17 yd, 20×275/300 ≈ 18.33 yd, 10×150/300 = 5 yd, 20×150/300 = 10 yd."],"quiz":[{"q":"Wind does two separate things to a golf shot. What are they?","options":["It only changes carry distance, never direction","It changes carry distance via the head/tailwind component and pushes the ball sideways off target via the crosswind component — two separate effects from one wind","It only changes direction, never distance","It adds backspin (rpm) to the ball"],"answerIndex":1,"explanation":"Resolving the wind into a component along the target line (head/tail) and a component across it (crosswind) shows the two jobs are almost independent: head/tail reshapes carry, crosswind pushes the ball off line. Flightglass's engine itself never sees wind — clubSpeed, faceAngle, clubPath, dynamicLoft and attackAngle still produce the same backspin and baseline carry; wind is a separate EST layer applied afterward."},{"q":"Compare a 20 mph headwind to a 20 mph tailwind on the same hole. Which is true?","options":["They cancel out exactly","The headwind costs about 22% of carry while the tailwind only gives back about 12% — the headwind hurts almost twice as much","The tailwind helps more than the headwind hurts","Both change carry by the same amount, just in opposite directions"],"answerIndex":1,"explanation":"TrackMan-published wind data shows a 20 mph headwind costs about 22% of carry (e.g. -60.5 yd on a 275-yd drive) while an equal 20 mph tailwind gives back only about 12% (+33 yd) — the headwind's penalty is roughly 1.8x the tailwind's benefit, and that gap widens as the wind gets stronger."},{"q":"Why does a shot balloon in a headwind even though the golfer swung exactly the same way?","options":["The headwind physically adds backspin (rpm) to the ball at impact","Backspin rpm is unchanged — it's fixed the instant the ball leaves the face, before the wind matters — but the ball's speed relative to the air is higher into a headwind, so the same spin produces more Magnus lift","The golf ball gets lighter in strong wind","A headwind slows the clubhead, which raises spin loft"],"answerIndex":1,"explanation":"Spin rate is set entirely at impact and the wind can't touch it afterward. What the wind changes is the ball's speed relative TO the air — higher into a headwind — and Magnus lift depends on that relative speed, so the identical spin generates more lift, holding the ball up longer and steeper than usual. That's ballooning."},{"q":"A low, piercing knock-down iron and a high, spinny wedge both carry roughly 130 yards in an identical 15 mph pure crosswind (blowing straight across the target line). Which one drifts farther off line, and why?","options":["The knock-down iron, because it's a longer club","Both drift identically — crosswind only cares about carry distance, not shot shape","The high, spinny wedge, because it spends more time exposed to the wind for the same carry distance","Neither drifts — a pure 90° crosswind never affects a shot"],"answerIndex":2,"explanation":"Crosswind drift accumulates over time in the air, not just distance covered. A high, slow-falling, spinny shot has more hang time per yard of carry than a low, piercing one, so it sits in the crosswind's path longer and drifts farther, even at the same carry distance and the same wind speed."},{"q":"Using the ≈1 ft of drift per 100 yd of carry per mph of crosswind rule of thumb, roughly how far offline does a 150-yard approach land in a 10 mph pure crosswind (90° to the target) if you aim straight at the pin?","options":["About 1 yard","About 5 yards","About 15 yards","About 30 yards"],"answerIndex":1,"explanation":"driftYd = crosswindMph × carryYd / 300 = 10 × 150 / 300 = 5 yards. On a 275-yard drive the same 10 mph crosswind would push the ball about 9 yards off line — proportionally more because it covers more distance while exposed to the same wind."}],"realWorld":{"tourBenchmarks":["TrackMan-published wind data: headwind costs about 1%/mph of carry at modest speeds, rising to ≈22% total at 20 mph — more than double the 10 mph loss (≈10%); the penalty compounds, it doesn't just add.","TrackMan-published wind data: tailwind gives back only about 0.7%/mph — ≈7% at 10 mph, ≈12% at 20 mph — meaning a 20 mph tailwind returns barely half of what an equal 20 mph headwind takes away (12% vs 22%).","Applied to a PGA Tour-average 275-yard driver carry: roughly -27.5 yd (10 mph head), -60.5 yd (20 mph head), +19.25 yd (10 mph tail), +33 yd (20 mph tail).","Applied to a 150-yard mid-iron: roughly -15 yd (10 mph head), -33 yd (20 mph head), +10.5 yd (10 mph tail), +18 yd (20 mph tail).","Caddie/instruction rule of thumb for crosswind: ≈1 foot of sideways drift per 100 yards of carry per mph of crosswind — a 10 mph full crosswind moves a 150-yd shot ≈5 yd off line and a 275-yd drive ≈9 yd off line.","PGA Tour driver averages (TrackMan, 2025 season): ≈113-116 mph clubhead speed, ≈167-171 mph ball speed, ≈10.4-10.9° launch angle, ≈275 yd carry / ≈296-300 yd total — the baseline shot the wind percentages above are applied to.","2015 Open Championship, St Andrews: play was suspended for about 10.5 hours after gusts exceeded 40 mph made resting golf balls move on the greens — an extreme, real instance of wind physically overpowering the game."],"scenarios":["Links courses on The Open Championship rota, where wind is part of the strategy on every hole rather than an occasional nuisance.","A 150-yd approach that normally lands pin-high coming up 15-33 yd short into a 10-20 mph headwind, forcing a 1-2 club jump that many amateurs under-estimate.","A tee shot next to trees or grandstands, where a visible crosswind means starting the ball well outside the flag on purpose and letting the wind bring it back to the target.","2015 Open Championship at St Andrews: gusts over 40 mph literally moved golf balls resting on the greens, forcing a 10.5-hour suspension of play.","An ordinary weekday round on a breezy 15 mph day where most amateurs under-club into the wind and over-club downwind, because the 1%/0.7% asymmetry between headwind and tailwind isn't intuitive."],"whatItMeansForYou":"Treat head/tailwind and crosswind as two separate problems solved from the same wind reading. Use the head/tail component (wind speed × cos of the angle off your target line) to pick a club — expect roughly one extra club per 10-15 mph into the wind and only about half a club less downwind, because a headwind always costs more than an equal tailwind gives back, and that gap widens the harder it blows. Use the crosswind component (wind speed × sin of that angle) to pick a target line — expect roughly a yard of drift for every ~10 yards of carry per 10 mph of crosswind, more if your shot flies high and spinny, less if you flight it down. When conditions get gusty or swirly, the single most reliable adjustment isn't a more precise number — it's a lower, quieter trajectory that takes wind out of the equation instead of trying to calculate it exactly."}}
  </script>
  <script type="application/json" id="lesson-temperature">
{"parameter":"Temperature","oneLiner":"Temperature changes how thick the air is: warm air is thinner and lets a struck ball carry a few extra yards, cold air is denser and holds it back — and, separately, a cold ball itself comes off the face a touch less lively.","whatItIs":"Temperature does not touch your swing at all — in the app's engine, ball speed, launch angle, spin loft and backspin are computed by solveFlight() from clubPath/faceAngle/attackAngle/dynamicLoft/clubSpeed alone, and none of those five inputs is temperature. What temperature changes is the air the ball flies through after it leaves the face. Air is a gas: by the ideal gas law, its density is proportional to 1/T (T in absolute/Kelvin terms) at constant pressure — warm air molecules spread out and get lighter per cubic metre, cold air molecules pack in and get heavier. Thinner (warm) air produces less aerodynamic drag, so the same strike coasts a bit farther before it runs out of speed; denser (cold) air produces more drag and pulls the ball up a little short. The app models this exactly the way it models altitude and humidity: as a documented estimate post-solve multiplier applied after the engine-true flight is solved. The live formula is fTemp = 288.15 / (273.15 + tempC) — a ratio against 15°C (288.15 K), the ISA sea-level reference temperature also used for the altitude and humidity layers — which feeds into the same densityRatio = fAltitude × fTemp × fHumidity and carryEnvMult = 1 + 0.70×(1 − densityRatio) used across the whole Environment tier. There is a second, smaller mechanism that is real but not in the current engine: a cold golf ball's core is stiffer and less resilient (lower coefficient of restitution), so a chilled ball can come off the face a touch slower than a warm one at an identical club speed — documented by golf-equipment testing, but absent from solveFlight, so today it is text-only knowledge, not something either the Carry lesson's or this lesson's live diagram can show moving the numbers.","components":[{"name":"Absolute temperature (the actual physics driver)","role":"The ideal-gas law says density is proportional to 1/T with T in Kelvin, not Celsius or Fahrenheit — this is why the effect is nonlinear (bigger jumps near the cold end of a slider than the hot end) and why the app's formula anchors on 288.15 K (15°C) rather than 0.","typicalRange":"playable golf range roughly -5 to 40 degC (268 to 313 K)"},{"name":"Air density (kg/m3)","role":"The direct physical quantity temperature moves. Wolfram-checked dry-air density falls from 1.317 kg/m3 at -5 degC to 1.127 kg/m3 at 40 degC, a 14.4% drop across the app's full slider range.","typicalRange":"-5 degC: 1.317; 0 degC: 1.293; 15 degC (ISA ref): ~1.225; 30 degC: 1.165; 40 degC: 1.127 kg/m3"},{"name":"Drag on the ball","role":"Drag scales with air density times velocity squared. Thinner (warm) air means less drag, so the ball decelerates more slowly and carries farther for an identical launch; denser (cold) air brakes it sooner.","typicalRange":"drag force on a golf ball at typical flight speed ~1 N order of magnitude (2x+ the ball's own ~0.45 N weight)"},{"name":"Magnus lift (backspin's payoff)","role":"Lift from backspin also scales with air density, so thinner warm air gives the same spin rate less lift to hold the ball up. This is why the carry gain from heat is always smaller than the raw density drop alone would suggest — drag falls, but so does lift.","typicalRange":"shared 0.70 coefficient in carryEnvMult damps the raw density swing before it reaches carry"},{"name":"Ball COR / \"liveliness\" (real, not modeled by the engine)","role":"A cold ball's core is stiffer and less resilient, giving a lower coefficient of restitution and slightly less ball speed at the same club speed. Golf-equipment testing documents this as a genuine, separate 'dead ball' effect. solveFlight() has no temperature input, so neither this lesson's diagram nor the Carry lesson's can show it moving — it is a text-only caveat, matching the graph's declared temperature-to-ball-speed edge that the current engine does not yet implement.","typicalRange":"reported by equipment testers as a modest few-yard effect, smaller than the air-density carry swing"},{"name":"Altitude and humidity (the other two Environment layers)","role":"Temperature is one of three multiplicative factors feeding the same densityRatio used across the Environment tier. Its own share of a given day's conditions is usually bigger than humidity's (which is nearly negligible, <1%) but smaller than a large altitude jump like sea level to Denver (~14% thinner air, ~5,280 ft).","typicalRange":"densityRatio = fAltitude x fTemp x fHumidity, each factor near 1.0 at sea-level/15degC/50% baseline"}],"howTheyConnect":"Contact between club and ball is over in half a millisecond — nothing about the day's temperature is in the room for that. All five of solveFlight()'s inputs (clubPath, faceAngle, attackAngle, dynamicLoft, clubSpeed) and everything they derive (ball speed, launch angle, spin loft, backspin, smash) are computed with zero knowledge of temperature; those numbers are identical on a freezing morning and a scorching afternoon for the same swing. What changes is everything that happens next, once the ball is airborne and pushing through a real fluid. By the ideal gas law, air density at a fixed pressure is proportional to 1 / T(Kelvin) — hotter air has the same molecules spread across more volume, so it weighs less per cubic metre. The app captures this with fTemp = 288.15 / (273.15 + tempC): at the 15°C reference fTemp = 1 (no change); at -5°C fTemp = 288.15/268.15 = 1.0746 (denser, ~7.5% above reference); at 40°C fTemp = 288.15/313.15 = 0.9202 (thinner, ~8.0% below reference) — Wolfram-verified, and matching measured air-density tables (1.317 -> 1.127 kg/m3 is a 14.4% real-world drop across the same span) almost exactly, which is why the simple 1/T approximation is trustworthy here. That fTemp multiplies into densityRatio = fAltitude x fTemp x fHumidity, and the same formula used for every Environment node then produces carryEnvMult = 1 + 0.70 x (1 - densityRatio): thinner air (densityRatio < 1) gives a multiplier above 1 (more carry), denser air gives one below 1 (less carry). The 0.70 coefficient is not arbitrary noise — it is the app's way of encoding the two-sided physics: thinner air cuts drag (which alone would push carry up by the full density change) but it also weakens the Magnus lift that backspin generates (which pulls the gain back down), so the net carry swing ends up damped to about 70% of the raw density change. Carry and apex are the only two engine outputs multiplied by this layer; ball speed, launch angle, spin loft and backspin come straight from the base model, unchanged. Separately — and this is not wired into carryEnvMult — a genuinely cold golf ball has a stiffer, less resilient core (lower coefficient of restitution), so in reality a chilled ball can leave the face a hair slower even at an identical club speed. The dependency graph's data literally encodes a temperature-to-ball-speed edge alongside temperature-to-carry, anticipating this mechanism, but solveFlight() has no temperature argument today, so that edge is aspirational: real, teachable, and worth knowing, but the live diagram can only show the air-density half of the story moving.","hierarchy":[{"driver":"Ball speed (club speed x smash) — untouched by temperature","weight":"still dominant for total distance (a 7-iron runs ~149 to ~212 yd carry from 80 to 110 mph club speed), but this lesson's whole point is that temperature does not move this number at all in the engine","why":"solveFlight() takes clubPath/faceAngle/attackAngle/dynamicLoft/clubSpeed only — temperature is never an argument. Every yard temperature adds or removes comes entirely from rescaling the flight of an identical strike through different air, never from the strike itself."},{"driver":"Air density via temperature (the EST carry lever)","weight":"roughly +4.2 yd per +10 degC (about +2.3 yd per +10 degF) near the 15 degC/173-yd reference for a 120-mph-ball-speed 7-iron, widening to about -9.0 yd at -5 degC and +9.7 yd at 40 degC vs the 15 degC baseline (Wolfram-checked) -- an ~18.7 yd swing across the app's full -5 to 40 degC slider on a 172-yard shot","why":"This is the mechanism the app actually implements: fTemp feeds densityRatio, which feeds carryEnvMult = 1 + 0.70x(1-densityRatio), applied to carry and apex only. It is the single lever this lesson's diagram can move live."},{"driver":"Temperature vs its Environment siblings (altitude, humidity)","weight":"a full -5..40 degC run is a 14.4% air-density swing -- bigger than humidity's <1% but smaller than the ~14% thinning of a big altitude jump like sea level to Denver (~5,280 ft, ~+10% carry)","why":"All three share one multiplicative densityRatio, so their yardage contributions are directly comparable: on an ordinary day temperature usually moves carry more than humidity ever will, but less than a serious elevation change."},{"driver":"Ball COR / \"dead ball\" effect (real, not modeled)","weight":"documented by golf-equipment testing as a genuine but modest effect -- clearly smaller than the air-density swing above, and currently absent from the app's carry number entirely","why":"A cold ball's core resists compression less efficiently (lower COR), trimming ball speed slightly at an identical club speed. The dependency graph anticipates this (temperature -> ball-speed edge) but solveFlight() has no temperature input, so it cannot show up in either this lesson's or the Carry lesson's live numbers today."},{"driver":"Swing / body effects in the cold (real, not modeled, often the biggest practical effect)","weight":"not quantified anywhere in the app -- purely anecdotal/behavioral, but frequently the largest real-world distance loss on a genuinely cold tee box","why":"Stiff muscles, tighter grip from cold hands, and extra clothing layers can slow the actual clubhead speed a golfer produces. That is a human-performance effect entirely outside solveFlight() and outside the EST air layer -- it changes clubSpeed itself, the one input everything else is built on, rather than rescaling the flight afterward."}],"misconceptions":["\"Cold air is heavier, so surely it helps the ball fly farther the way thin mountain air does.\" Backwards: it is the thin, warm air that reduces drag and adds carry; dense, cold air does the opposite and costs distance. People conflate 'heavier air feels more substantial' with 'more support for the ball' -- the physics runs the other way.","\"Temperature changes your ball speed and spin the same way altitude and wind can shove a shot around.\" In this engine it does not -- solveFlight() has no temperature input at all, so ball speed, launch angle, spin loft and backspin are byte-identical on a freezing day and a hot one. Only carry and apex get rescaled, by a documented EST post-solve layer.","\"Warming your golf balls before a cold round is a superstition, it can't really do anything.\" It is a small but genuine effect -- a cold ball's core is stiffer and less resilient (lower COR), documented by independent equipment testing -- just much smaller than the air-density swing, and not something the app's own diagram can show since solveFlight() doesn't model it.","\"The temperature effect is basically the same size as altitude.\" They share the exact same densityRatio mechanism, but day-to-day temperature swings (maybe 20-30 degC in most climates) move carry far less than a serious altitude jump like sea level to Denver (~5,280 ft, ~14% thinner air).","\"If it's cold, the ball comes up short because the air is thick -- that's the whole story.\" Air density is real and modeled, but on a genuinely cold tee box the biggest practical yardage loss is often the golfer's own stiff, cold-muscled, extra-clothed swing producing less club speed to begin with -- an effect entirely outside both the air-density layer and the engine's solve.","\"Since it isn't in the engine, the ball-COR effect must not be real.\" 'Not modeled by this app' and 'not real' are different claims -- the graph data even encodes a temperature-to-ball-speed dependency edge anticipating it; it just isn't wired into solveFlight() yet."],"wolframChecks":["Ideal-gas density ratio 288.15/268.15 = 1.0746 -> matches the app's fTemp formula at -5 degC (cold air ~7.5% denser than the 15 degC/288.15K ISA reference).","Ideal-gas density ratio 288.15/313.15 = 0.9202 -> at 40 degC, air is ~8.0% thinner than the 15 degC reference.","Measured dry-air density (1 atm): -5 degC -> 1.317 kg/m3, 0 degC -> 1.293, 10 degC -> 1.247, 20 degC -> 1.205, 30 degC -> 1.165, 40 degC -> 1.127 kg/m3; (1.317-1.127)/1.317 = 14.43% -> real measured density falls 14.4% across the app's full -5..40 degC slider, closely matching the pure 1/T prediction and validating the engine's simplification.","Engine carry at 120 mph ball speed (default 7-iron): 0.232*120^1.389/(1+(120/210)^6) = 173.2 yd -> the baseline the temperature layer scales.","App's EST carry delta at the slider ends: 173.2*0.70*(1-1.07459) = -9.04 yd at -5 degC; 173.2*0.70*(1-0.92017) = +9.68 yd at 40 degC -> both vs the 15 degC baseline, an ~18.7 yd total swing on a 172-yard 7-iron.","10 degF temperature difference = 5.556 degC -> converting the app's per-degC rate to the commonly-cited per-10-degF golf rule of thumb (~+2.3 yd/10 degF near the 15 degC reference, matching published club-fitting guidance of roughly 1-2 yd per 10 degF)."],"quiz":[{"q":"In the app's engine, what does raising the Temperature slider actually change?","options":["Ball speed, launch angle and spin all increase together","Only carry and apex are rescaled by an EST air-density layer; ball speed, launch angle, spin loft and backspin stay exactly the same","Only spin loft changes","Nothing -- temperature has no effect anywhere in the app"],"answerIndex":1,"explanation":"solveFlight() takes clubPath, faceAngle, attackAngle, dynamicLoft and clubSpeed -- temperature is never an input. It only rescales carry and apex through the documented EST post-solve air layer (fTemp -> densityRatio -> carryEnvMult), exactly like altitude and humidity."},{"q":"Why does thinner, warmer air let the ball carry farther?","options":["Warm air pushes the ball upward directly","Air density is proportional to 1/absolute-temperature, so warm air is lighter and produces less drag on the ball","Warm air spins the ball faster","The ball itself gets lighter when warm"],"answerIndex":1,"explanation":"By the ideal gas law, density at constant pressure scales as 1/T (Kelvin). The app's fTemp = 288.15/(273.15+tempC) captures exactly this: at 40 degC, fTemp = 0.920 (Wolfram-checked), meaning the air is about 8% thinner than the 15 degC reference, which cuts drag and adds carry."},{"q":"Going from a chilly -5 degC morning to a hot 40 degC afternoon, roughly how much does the app say a 172-yard 7-iron's carry changes (both vs the 15 degC baseline)?","options":["About 2 yards total -- barely noticeable","About 19 yards total (roughly -9 yd cold, +9.7 yd hot)","About 90 yards total -- nearly half the shot","It gets shorter in both directions"],"answerIndex":1,"explanation":"Wolfram-checked: 173.2 x 0.70 x (1-1.07459) = -9.04 yd at -5 degC and 173.2 x 0.70 x (1-0.92017) = +9.68 yd at 40 degC, both relative to the 15 degC baseline -- an ~18.7 yard total swing across the full slider on this shot, a meaningful but modest fraction of the total carry."},{"q":"Why doesn't the full air-density change translate one-for-one into carry gain (i.e. why is there a 0.70 factor, not 1.0)?","options":["It's an arbitrary safety cap with no physical meaning","Thinner air cuts drag (which alone would add the full density change) but also weakens the Magnus lift from backspin (which pulls some of that gain back), so the net effect is damped","Warm air increases spin, cancelling some of the gain","Humidity always partially cancels temperature"],"answerIndex":1,"explanation":"Drag and Magnus lift both scale with air density. Warm, thin air reduces drag (more carry) but simultaneously gives the same backspin less air to grab for lift (less carry) -- two opposing effects on the same variable, so the net carry gain ends up damped to roughly 70% of the raw density swing rather than the full amount."},{"q":"A player blames a short cold-day drive entirely on 'thick air.' What is this lesson's caution about that explanation?","options":["Thick cold air has zero effect on carry, so the explanation is wrong","Air density is real and modeled, but a genuinely cold ball's stiffer core (lower COR) and the golfer's own stiff, cold-muscled swing are separate, real effects the app's engine does not model at all","Cold air only affects putting, not full swings","The engine already accounts for all cold-weather effects, so nothing else matters"],"answerIndex":1,"explanation":"The EST air-density layer is real and grounded (~9 yd lost at the app's coldest setting for a 7-iron), but it isn't the whole story: a cold ball's lower coefficient of restitution and a golfer's own reduced clubhead speed from cold, stiff muscles are genuine, documented effects that sit entirely outside solveFlight() and the EST air layer -- often the bigger practical loss on a truly freezing tee box."}],"realWorld":{"tourBenchmarks":["Wolfram-checked: dry-air density falls from 1.317 kg/m3 at -5 degC to 1.127 kg/m3 at 40 degC -- a 14.4% drop across the app's full temperature slider, and the ideal-gas ratio 288.15/268.15 = 1.0746 vs 288.15/313.15 = 0.9202 (a 14.4%-wide ratio spread) matches that measured drop almost exactly, validating the app's 1/T simplification.","Wolfram-checked engine baseline: 0.232 x 120^1.389 / (1+(120/210)^6) = 173.2 yd carry for a 120-mph-ball-speed 7-iron (PGA-Tour-typical). Applying the app's EST air layer: 173.2 x 0.70 x (1-1.07459) = -9.04 yd at -5 degC, and 173.2 x 0.70 x (1-0.92017) = +9.68 yd at 40 degC, both versus the 15 degC baseline -- about 19 total yards of swing from temperature alone on this one shot.","Near the 15 degC/59 degF reference this works out to roughly +4.2 yd of carry per +10 degC (about +2.3 yd per +10 degF, since 10 degF = 5.556 degC, Wolfram-confirmed) -- closely matching the club-fitting-industry rule of thumb (TrackMan University and most fitting literature teach roughly 1-2 extra yards of carry per 10 degF of warming).","Golf-equipment testing (cold-ball vs warm-ball comparisons run by independent labs and golf media) documents a real 'dead ball' effect: a chilled ball can leave the face a touch slower than a body-temperature one at an identical club speed, because its core is stiffer and less resilient (lower coefficient of restitution) when cold -- a genuine mechanism the app's engine does not currently implement."],"scenarios":["A frosty 7am tee time versus a 2pm round on the same course, same course same swing: the early ball sits in denser, colder air (and is itself colder), so it comes up shorter than the exact same strike hit after the day warms up.","Instructors and caddies routinely tell golfers to 'take one more club' in cold weather -- a rule of thumb that lines up with the app's own ~9-10 yard EST carry loss at the cold end of its slider for a mid-iron.","Tour pros and caddies on cold-weather tee times (early-morning coastal rounds, late-season cold snaps) are known to keep a spare ball in a jacket pocket to keep its core warm -- a direct, practical response to the documented cold-ball COR effect.","Winter 'flyer' complaints often get blamed entirely on temperature when club-face friction, wet turf, or a stiff cold grip are doing at least as much damage -- temperature is real but it is only one ingredient in a cold-weather short-shot.","A hot desert-swing afternoon versus a cool, breezy links morning: the warm-air carry gain modeled here is real, but on a links day it is easily swamped by the far bigger, separate wind effect (a 10 mph headwind alone costs roughly as much carry as this entire temperature slider)."],"whatItMeansForYou":"Don't blame a whole club's worth of a bad swing on the thermometer: across the app's entire -5 to 40 degC range the pure air-density effect is only about a 19-yard swing on a 172-yard 7-iron (roughly 4-5% each way), and your ball speed, spin and launch never actually change with temperature in this model. What you should expect: a few extra yards on a hot day, a few less on a cold one, growing faster as you get closer to freezing than as you get closer to summer heat (because density runs on 1/T, not a straight line) -- and, separately, a genuinely cold ball in your bag is quietly working against you a little more on top of that, so keeping it warm on a freezing tee time is not superstition."}}
  </script>
  <script type="application/json" id="lesson-low-point">
{"parameter":"Low Point","oneLiner":"Your swing is a circle, and every circle has a bottom. Where that bottom sits — behind the ball, at it, or ahead of it — is the single number that decides whether you strike down, level, or up.","whatItIs":"The low point is the lowest point of the arc your clubhead travels on. It is not a feeling and not a technique — it is a place, measured in centimetres along the target line, relative to the ball. In this app's geometry engine (swing-parameters-and-impact.js) it is literally the state variable lowPoint.x, and the whole strike story falls out of one line of trigonometry: theta = asin(−xLP / R) finds where on the circle the ball sits, and deriveImpact() converts that place into the attack angle. Put the bottom of the circle AHEAD of the ball (positive x, toward the target) and the club must still be descending when it arrives at the ball — a negative attack angle and, with turf, a divot that starts after the ball. Put the bottom BEHIND the ball and the club is already climbing — a positive attack angle, which is exactly what a teed driver wants and a grounded 7-iron does not. Engine-run: sliding the low point from 6 cm behind the ball to 15 cm ahead (plane 55°) sweeps attack angle from +2.35° to −5.88° — about 0.4° per centimetre, the famous \"one degree per inch of ball position\" from the range, computed instead of recited.","components":[{"name":"lowPoint.x — the place along the target line","role":"The master input. effectiveLpx() reads it (plus a swing-direction correction taught in lesson 3), thetaAtImpact() converts it to the ball's position on the circle, and deriveImpact() turns that into attack angle. Engine-run at plane 55°: x −6 cm → +2.35° up, x 0 → exactly 0.00°, x +10.5 cm → −4.11° down, x +15 → −5.88°.","typicalRange":"irons: low point 2–15 cm ahead of the ball (the engine's own 'Pure' window, ideal centre +10.5 cm); driver: at or behind the ball"},{"name":"The radius (R = 1.2 m)","role":"The circle's size sets how fast attack angle changes per centimetre of low point. theta = asin(−xLP/R): a bigger circle is flatter near its bottom, so the same offset produces a gentler angle.","typicalRange":"fixed at 1.2 m in the engine — roughly a mid-iron swing radius"},{"name":"Club path, riding along (G-3)","role":"The same geometry moves the head's horizontal direction: strike before the bottom and the head still travels slightly rightward/outward. Engine-run, swing direction held at 0: x +10.5 cm gives path +2.88°, x +15 gives +4.13°. Attack and path are two shadows of one place on the circle.","typicalRange":"≈ +0.28° of in-to-out path per cm of low point ahead (plane 55°)"},{"name":"What it is NOT: depth","role":"lowPoint.x says where along the line the bottom sits. How DEEP the bottom sits (lowPoint.z) is a different axis with a completely different job — the next lesson. Trailer, engine-run: attack angle at z −30 mm, 0 and +30 mm is −4.11°, −4.11°, −4.11°.","typicalRange":"see the Strike Depth lesson"}],"howTheyConnect":"Think of the swing as a wheel rolling through the hitting area, and the ball as a stone on the ground somewhere along its path. Nothing about the wheel changes — only where the stone sits. If the stone is before the wheel's lowest point, the rim is still travelling downward when it hits; past the lowest point, upward. That is the entire mechanism: attack angle is not a move you make at the ball, it is an address — where you placed the bottom of your circle. The engine says it in two lines: theta = asin(−xLP/R) (where is the ball on the circle?) and attackAngle = atan2(sinθ·sinφ, hypot(cosθ, −sinθ·cosφ)) (what direction is the rim moving there?). Two things follow that most golfers have backwards. First, the slope is gentle and linear-ish in the playable zone — about 0.4° per cm (engine-run: 5.1° of attack across the 13 cm from x +2 to x +15) — so small setup drifts make small, predictable attack changes; nobody 'suddenly' hits 5° steeper without the bottom of their circle moving a lot. Second, the far end bites: push the low point 25 cm ahead (z = 0) and the club reaches the ball 21.6 mm above its bottom — equator height — and the band chip flips to Thin at the exact moment the geometry says 'blade'. Steep and thin are neighbours, which is why chasing an ever-more-forward low point without depth control tops the ball. The low point is the cause; attack angle, path nudge, contact height and the divot are all effects read off the same circle.","hierarchy":[{"driver":"Ball position / low-point offset (x)","weight":"dominant — ~0.39°/cm ≈ 1.0°/inch (engine-run: +2 cm → −0.78°, +15 cm → −5.88°, plane 55°)","why":"It is the direct argument of thetaAtImpact(). Nothing else in the geometry moves attack angle as much for a realistic change."},{"driver":"Swing plane angle (φ)","weight":"secondary multiplier — ~+0.05° per degree of plane (engine-run at x +10.5: plane 40° → −3.22°, 70° → −4.72°)","why":"vz = sinθ·sinφ — a steeper plane converts the same circle-position into more vertical motion. Taught fully in lesson 3."},{"driver":"Low-point depth (z)","weight":"ZERO — exactly 0.00° per mm (engine-run: −4.11° at z −30/0/+30 mm)","why":"deriveImpact() never reads lowPoint.z. Depth changes what the strike hits, never the angle it arrives at — the whole point of the next lesson."}],"realWorld":{"tourBenchmarks":["Launch monitors measure this directly: TrackMan's \"Low Point\" number reports cm ahead (A) or behind (B) the ball — tour iron strikes typically bottom out ~7–10 cm ahead, exactly the middle of this app's own Pure window (2–15 cm, ideal +10.5 cm)","Engine cross-check: the ideal +10.5 cm low point at the default 55° plane computes to −4.1° attack — landing on the tour mid-iron −4°..−5° benchmark from the Attack Angle lesson","Tour driver setups place the ball forward specifically to move the strike past the low point — the same single variable, used in the opposite direction"],"scenarios":["Ball creeping back in the stance dur
