"A separate physical mechanism from face-to-path spin-axis tilt; Flightglass's engine assumes a centered strike, so this lesson (and its diagram) isolates face angle and path cleanly, but a real fitting session must also check strike location."}],"realWorld":{"tourBenchmarks":["TrackMan's \"New Ball Flight Laws\" research (the radar data that overturned decades of golf teaching around 2012) found face angle governs roughly 75-85% of a shot's starting direction, club path the rest - a split that shifts by club. Flightglass's engine mirrors this with a loft-tapered face weight from 0.60 (wedge) up to 0.88 (driver), landing at exactly 0.75 for a stock 7-iron.","PGA Tour players deliver a famously tight face-to-path window off the driver - commonly described in TrackMan-based coaching as within a degree or two of matched - which is why ~113-mph clubhead speeds still produce a repeatable, controlled shot shape rather than a wild miss. Flightglass's own 'tour window' test (face +0.5°, path +1.5°, driver preset) nets just a 3.7-yard draw on a 224-yard carry.","Teaching-industry material (TrackMan University, major golf publications) widely reports that a large majority of recreational golfers battle a slice - an open face relative to an out-to-in path. Flightglass's modeled 'banana slice' (face +4° open, path -4°, an 8-degree gap on a driver) computes to 48 yards offline - a real 'lost it in the trees' number.","This lesson's default ball speeds trace back to the same launch-monitor anchors already used elsewhere in Flightglass: a stock 7-iron (dynamic loft 30°, attack -3°, ball ~119-120 mph) sits right at the PGA-average carry band (~172-175 yd), and the driver preset (dynamic loft 13°, attack +4°, ball ~160 mph) sits near the ~220-230 yd tour band."],"scenarios":["The banana slice: the ball starts a touch right of target, then keeps bending further right until it's in the trees. Mechanically: an open face relative to an out-to-in path, both errors reinforcing each other - modeled here as 48 yards offline on a driver.","The 'that felt fine' miss: a 7-iron approach that misses the green by 15-18 yards even though the swing path felt perfectly down the line - because a 3-degree open face with a square path is nearly invisible in the swing but adds up to real yards (17.9 yd in this lesson's model).","The push (no curve): face and path are open by the same amount, so there is zero face-to-path gap - the ball starts right of target but flies dead straight instead of curving further, because a pure start-direction error and pure curve are two different mistakes that only look similar at first glance.","The pull-hook: a closed face plus a mismatched path sends the ball left immediately and keeps bending left - the mirror image of the slice, and just as costly (30 yards offline in this lesson's modeled example).","Why the driver 'exposes' your face angle more than your irons: the exact same degree of face-angle error that costs a few yards with a wedge can cost 30-50 yards with a driver, purely from geometry (higher faceW plus curve scaling with carry^2) - nothing to do with swinging the driver 'worse'."],"whatItMeansForYou":"Because face angle carries roughly double the total leverage of path on where your ball ends up - and drives essentially all of the curve on top of that - the single highest-value fix for a wayward shot is almost always the face (a grip check, alignment-stick drill, or impact tape), not a swing-path overhaul; and because that same face error costs far more off a driver than a wedge, don't judge your ball-striking by the tee shot alone - the geometry, not just your swing, is working against you more with the longer clubs."},"misconceptions":["\"The ball goes wherever the path points\" (the old ball-flight law). Reversed: face angle governs roughly 75-85% of starting direction depending on club (engine faceW 0.75-0.835), path only the rest. This is exactly the finding that overturned decades of teaching once TrackMan's radar data went public.","\"Face angle relative to the target is what curves the ball.\" No - curvature comes from the gap between face and path (faceToPath), not face-vs-target. A face perfectly square to target can still curve hard if the path is off: engine test face=0/path=5 (in-to-out) still produces an 8.9-yard draw with zero start-line contribution from the face.","\"A square face at address means a square face at impact.\" Dynamic face angle (the number that actually matters) can differ hugely from address due to grip, wrist rotation and release timing through the swing - that's precisely why this whole discipline calls it 'dynamic', mirroring 'dynamic loft'.","\"Path is the bigger problem behind my slice.\" Mechanically, face moves both start line and curve the same way (reinforcing, 5.97 yd/° on a 7-iron) while path's two effects partly cancel (2.96 yd/°) - so degree for degree the face is roughly twice as costly. Fix the face first.","\"My driver just naturally goes more offline because it's harder to hit.\" Partly true swing-wise, but there is a hard geometric reason too: curve scales with carry^2 and faceW is higher for a driver, so an identical face/path error is ~1.69x more offline on a driver than a 7-iron before swing consistency even enters it.","\"Gear effect explains all curved driver shots.\" Gear effect (curving opposite to strike location on an off-center hit) is real but a separate mechanism from face-to-path spin-axis tilt. This lesson's engine assumes a centered strike; a toe/heel miss adds another layer not modeled here."],"wolframChecks":["tan(1 degree) x 100 -> 1.7455 yd (Wolfram-verified): a 1-degree aiming error drifts about 1.75 yards sideways per 100 yards of shot from simple trigonometry alone - why the same degree of face-angle error costs far more yards off a 220-yard drive than a 100-yard wedge.","172.4 x sin(0.75 degree) -> 2.2566 yd (Wolfram-verified): confirms the engine's start-line component of offline for a 7-iron with 1° of open face (faceW=0.75 -> startDirection=0.75°), matching solveFlight()'s carry*sin(startDirection) term exactly.","(223.8/172.4)^2 -> 1.6852 (Wolfram-verified): a driver's ~224-yd carry vs a 7-iron's ~172-yd carry means an identical face-to-path gap bends the ball about 1.69x more off the driver (curve ~ carry^2), independently confirmed by the engine's own driver-vs-7-iron curve output (18.79 yd vs 11.15 yd = 1.685x).","1 degree = pi/180 rad (Wolfram-verified, ~0.01745 rad): the radian conversion underlying every sin()/tan() call in the engine's start-direction and curve math.","Engine sweep, 7-iron, path held at 0: face -6/-3/-1/0/1/3/6° -> offline -35.82/-17.91/-5.97/0/+5.97/+17.91/+35.82 yd - exactly linear at 5.97 yd per degree of face angle across this range, symmetric about square.","Engine sweep, 7-iron, face held at 0: path -6/-3/0/+3/+6° -> offline +17.78/+8.89/0/-8.89/-17.78 yd - only 2.96 yd per degree, about half of face's leverage, because a path-only error pushes the start line one way and pulls the curve the other way (self-cancelling).","Engine scenario check - amateur banana slice (driver, face +4° open, path -4° out-to-in, an 8-degree face-to-path gap, club speed 95 mph): offline = 48.0 yd right on a 197-yd carry. Tour-tight window (driver, face +0.5°, path +1.5° in-to-out, a 1-degree gap, club speed 113 mph): offline = only 3.7 yd (a gentle draw) on a 224-yd carry."],"quiz":[{"q":"On a stock 7-iron (dynamic loft 30°), Flightglass's engine splits start direction between face angle and club path roughly...","options":["50% face, 50% path","25% face, 75% path","75% face, 25% path","100% face, path has zero effect"],"answerIndex":2,"explanation":"The engine computes faceW = clamp(0.90 - dynamicLoft*0.005, 0.60, 0.88), which lands at exactly 0.75 at a 30-degree dynamic loft - so start direction is about 75% face, 25% path. This matches TrackMan's widely cited research finding, which is loft-dependent: the split shifts toward more face on a driver (~0.835) and less on a wedge (~0.67)."},{"q":"What actually determines how much a shot curves sideways in flight?","options":["Face angle measured against the target line","The gap between face angle and club path","Dynamic loft alone","Ball speed alone"],"answerIndex":1,"explanation":"The engine derives spin-axis tilt from faceToPath = faceAngle - clubPath, not from face angle relative to the target. Proof: with face square to target (0°) but a 5-degree in-to-out path, the engine still produces an 8.9-yard draw - all curve, zero start-line push from the face."},{"q":"An identical 3-degree face-to-path gap is applied to both a driver (carry ~224 yd) and a 7-iron (carry ~172 yd), path=0 in both cases. What happens to the curve?","options":["Exactly the same number of yards on both clubs","The driver curves noticeably more - about 1.7x","The driver curves less because it launches lower","Curve doesn't apply to drivers"],"answerIndex":1,"explanation":"Curve scales with carry squared. (224/172)^2 = 1.69 (Wolfram-verified), matching the engine's own output almost exactly: 18.79 yd of curve on the driver vs 11.15 yd on the 7-iron for the same gap. The longer flight gives the same spin-axis tilt more time to bend the ball."},{"q":"A player's face is 5 degrees open and their path is 5 degrees open (matched, so face is square TO the path). What ball flight results?","options":["A big slice that keeps curving further right","A straight push - starts right of target, flies straight, no curve","A big hook to the left","The ball goes dead at the target"],"answerIndex":1,"explanation":"With faceToPath = 5 - 5 = 0, the engine's spinAxis and curve are both zero - there is no curvature lever engaged. But start direction still moves (0.75 x 5 = 3.75° on a 7-iron), so the ball starts right of target and flies dead straight from there: a 'push', not a slice. Engine test: offline = +15.03 yd, curve = 0."},{"q":"Why does a small, barely-felt face-angle error cost far more yardage with a driver than with a wedge?","options":["Driver swings are inherently less accurate as a rule","The driver's lower dynamic loft gives face angle a bigger share of start direction (higher faceW) and its longer carry lets curve compound over more distance (curve ~ carry^2) - two compounding, purely geometric reasons","Wedges have no measurable face angle","Drivers produce no backspin, so nothing corrects the miss"],"answerIndex":1,"explanation":"Two engine mechanisms stack in the same direction for a driver: faceW rises from ~0.67 (wedge) to ~0.835 (driver), so more of the face error reaches the start line, and curve grows with carry^2, so the ~224-yard driver flight bends about 1.69x more than a ~172-yard 7-iron flight for an identical face-to-path gap. Neither has anything to do with swing quality - it's geometry."}]}
  </script>
  <script type="application/json" id="lesson-club-path">
{"parameter":"Club Path","oneLiner":"Club path is the horizontal direction the clubhead is actually traveling through impact — in-to-out or out-to-in, relative to the target line — and together with face angle it decides both where a shot starts and, through the gap between the two, how hard it curves.","whatItIs":"Club path is the horizontal direction the clubhead is moving as it passes through the ball — not where the face is pointing, not up-or-down, just left-right travel relative to the target line. Positive (in Flightglass's convention) means in-to-out (the clubhead is moving to the right of the target line for a right-handed golfer, on its way from \"inside\" the line to \"outside\" it); negative means out-to-in (moving left, the classic \"over the top\" move). Every shot has both a club path and a face angle at the same instant, and they are genuinely different numbers measuring different things — a launch monitor reports them separately because a golfer can have almost any combination of the two. Path matters in two distinct ways: first, it contributes (along with face angle) to where the ball starts, though face angle usually does most of that work; second, and often more importantly, the gap between face angle and club path is what makes the ball curve sideways in flight. A club path number on its own, without knowing the face angle alongside it, doesn't tell you whether a shot will draw, fade, hook, or slice — it only tells you the swing's raw horizontal direction. Path itself isn't something dialed in directly either: it's the product of where a golfer's swing plane is aimed and, subtly, exactly when along the circular arc of the swing the club meets the ball.","components":[{"name":"Face-to-path gap (face angle minus club path)","role":"The number that actually curves the ball. Flightglass's engine: spinAxis = 1.5 x (faceAngle - clubPath), clamped to +-38°; the ball curves toward the face and away from the path. Path on its own only sets part of where the shot starts — this gap is what bends it sideways in flight.","typicalRange":"tour players inside ~1-2° for driver-length consistency; recreational slicers commonly 6-10+°"},{"name":"Face angle (relative to target)","role":"Club path's partner. Face angle alone is the single biggest driver of start direction (75-85% of it, club-dependent) and, via its gap to path, the other half of what curves the shot.","typicalRange":"square is 0°; tour players rarely stray more than 1-2° at impact"},{"name":"Start-direction face weight (loft-dependent taper)","role":"How much of the start line comes from face vs path — not fixed, it changes with the club. Lower loft (driver) is more face-dominant; higher loft (wedge) lets path matter more. sourced in the engine as startFaceW = clamp(0.90 - dynamicLoft x 0.005, 0.60, 0.88).","typicalRange":"driver faceW ~0.835 (path ~16.5% of start line); 7-iron 0.750 (path 25%); wedge ~0.650 (path 35%)"},{"name":"Swing direction (body/arm aim)","role":"The horizontal direction the whole swing plane is rotated toward — the thing a golfer actually feels themselves aiming. It is the biggest single input to path in Flightglass's geometry engine, but path is not numerically identical to it.","typicalRange":"engine input, degrees relative to target line (geometry model, swing-parameters-and-impact.js)"},{"name":"Low-point timing (where on the arc contact happens)","role":"Whether the club meets the ball before (descending) or after (ascending) the bottom of the swing arc. In Flightglass's geometry engine this alone shifts measured path even with swing direction held perfectly on line.","typicalRange":"Flightglass 'Pure' strike window: low point ~0.08-0.13 m ahead of the ball"},{"name":"Swing-plane steepness (plane angle)","role":"How upright vs flat the swing plane is. A flatter plane amplifies how much a mistimed low point turns into path error; a steeper plane is more forgiving of the same timing miss.","typicalRange":"Flightglass default 55°; flat ~35-45°, steep ~65-75°"},{"name":"Carry distance","role":"Not a cause of curve — an amplifier of it. The same face-to-path gap bends a shot by an amount that grows with the square of how far it flies, so an identical fault costs far more yards off the tee than with a wedge.","typicalRange":"wedge ~110-135 yd, mid-iron ~160-185 yd, driver ~225-290 yd"}],"howTheyConnect":"Club path shows up twice in the flight model, and understanding both is the whole lesson. First, at the moment of impact, path and face angle blend to decide where the ball starts: startDirection = faceW x faceAngle + (1-faceW) x clubPath. The blend weight (faceW) is not fixed — it tapers with loft (faceW = clamp(0.90 - dynamicLoft x 0.005, 0.60, 0.88)), so face angle owns about 83.5% of the start line with a driver, 75% with a 7-iron, and only 65% with a wedge, leaving path a bigger say on shorter, more lofted clubs. Second, and usually more importantly, path and face combine differently to decide how the ball curves: what matters is not path alone but the gap between face and path (faceToPath = faceAngle - clubPath). That gap sets the spin axis tilt (spinAxis = 1.5 x faceToPath, clamped to +-38° for physical realism), and the ball curves toward the face and away from the path — a square-to-target face with a wildly out-to-in path still slices hard, because it is open relative TO the path even though it looks square relative to the target. That curve then gets amplified by distance: curve = carry^2 x spinAxis / 12000, a genuinely quadratic relationship, so the identical face-to-path gap that barely moves a wedge shot can wreck a drive. Finally, offline (the total sideways miss) simply adds the small start-line push (carry x sin(startDirection)) to that much larger curve term — which is why, once the gap passes a degree or two, curve dominates the story and start direction becomes the minor character. Zoom out one more level and ask where path itself comes from: it is not something a golfer directly dials, it emerges from the 3D swing-plane geometry in Flightglass's companion engine (swing-parameters-and-impact.js). There, clubPath = swingDirection + a correction term driven by exactly where on the circular swing arc contact happens (theta, relative to the arc's low point) and how steep the plane is. Concretely: holding swing direction dead square at 0°, shifting the low point just 3 cm ahead of the ball (the \"compressed, ball-then-turf\" strike every coach wants) quietly adds about 0.8° of in-to-out path and 1.2° of extra downward attack angle — with zero change in where the golfer is aiming. Shift the low point behind the ball instead (the fat/scoop tendency) and path drifts out-to-in by the same amount, the opposite direction. A flatter swing plane makes this timing-to-path coupling roughly twice as strong as a steep one. So the full chain is: swing-plane aim + arc timing + plane steepness produce the club path number a launch monitor reports; that path then blends with face angle (loft-weighted) to set the start line, and subtracts from face angle to set the face-to-path gap that — amplified by the square of carry distance — actually curves the shot.","hierarchy":[{"driver":"Face-to-path gap -> spin axis -> curve (the sideways bend)","weight":"Usually the dominant effect on total offline once the gap passes ~1-2°, because curve grows with carry squared. Engine check: a 5° path / 0° face 7-iron gap curves ~18.6 yd (offline -14.8 yd, the curve overwhelms the +3.8 yd start-line push in the opposite direction); TrackMan's own published tour numbers show a similar-size driver gap curving ~44-47 yd.","why":"The engine sets spinAxis = 1.5 x (face - path), clamped +-38°, then curve = carry^2 x spinAxis / 12000 — a genuinely quadratic-in-distance formula. That squared term is why the same degree of path/face mismatch is forgiving on a wedge and ruinous on a driver."},{"driver":"Club path's share of start direction (loft-dependent face weight)","weight":"~15-17% of start direction with a driver, 25% with a 7-iron, up to ~35-40% with a wedge (engine faceW taper 0.835 / 0.750 / 0.650) — closely matching the independently-published, TrackMan-derived rule that face angle owns ~85%/~75% of start line for driver/mid-iron respectively.","why":"sourced in the engine (startDirection = faceW·face + (1-faceW)·path). It is why the identical path fault matters more for aim with a wedge (path counts for more of where it starts) than off the tee, where face nearly owns the start line."},{"driver":"Swing-plane geometry: swing direction + low-point timing + plane steepness","weight":"The upstream cause of path. Engine check (deriveImpact): with swing direction held at a dead-square 0°, moving the low point 3 cm ahead of the ball (a good, compressed strike) added +0.82° of in-to-out path (and -1.17° of attack angle) with zero change in aim. The identical 3 cm timing error on a flatter plane (35°) roughly doubled that path shift (+1.17°) versus a steep plane (70°, +0.49°).","why":"This is the deepest layer: path is not something a golfer consciously 'aims' the way they aim their feet — it emerges from the shape of the swing arc and exactly when contact happens on it. It also explains why flatter swingers are more path-sensitive to mistimed strikes than upright swingers."},{"driver":"Carry distance (amplifier, not a cause)","weight":"Curve grows with carry^2. TrackMan's own published examples: a driver (275 yd carry) curves ~19 yd at a -2° face-to-path gap, while a 6-iron (183 yd carry) curves only ~8 yd at a +2° gap — a similar-size degree mismatch, but ~2.4x the yardage penalty off the tee.","why":"Confirms the engine's carry^2 curve model isn't just a house style. Scaling the 6-iron's real -5°/20 yd example up to driver carry via carry^2 predicts ~45 yd of curve; TrackMan's own driver data, extrapolated linearly from -2°/19 yd to -5°, gives ~47.5 yd — two independent published tour numbers agreeing within ~5% of the same carry-squared model the app uses."},{"driver":"Attack angle / low-point (correlated, not causal)","weight":"Doesn't enter the flight engine's path formula directly (clubPath is an independent input there), but shares its geometric origin with attack angle in the swing-plane engine — the same low-point-ahead move that nudges path in-to-out also makes the strike more descending.","why":"Explains a real-world pattern golfers notice: cleaning up ball-first contact (attack angle) often comes with path getting a little more neutral too — not because one causes the other, but because both trace back to the same low-point fix."}],"realWorld":{"tourBenchmarks":["TrackMan's own PGA Tour Averages chart (the same table Flightglass's 7-iron preset is calibrated to: 90 mph club speed -> 120 mph ball -> 1.33 smash -> 172 yd carry): driver 113 mph club speed, 167 mph ball speed, 1.48 smash factor, 2,686 rpm spin, 275 yd carry — the baseline context every club-path number below sits on top of.","Face angle governs roughly 85% of start direction with a driver and about 75% with a mid-iron; club path is the remaining 15%/25% (TrackMan-derived rule cited by TrackMan-certified fitters). Flightglass's engine encodes this almost exactly: faceW = 0.835 for a driver-loft strike, 0.750 for a 7-iron.","PGA Tour average driver club path sits around +2 to +3° in-to-out; the average amateur driver path is commonly cited around -2 to -5° out-to-in — opposite signs, and the single most repeated explanation for why most tour pros draw the ball and most amateurs slice it.","TrackMan's own published face-to-path worked examples: a driver at 275 yd carry curves about 19 yd left at a -2° face-to-path gap and about 44 yd right at +5°; a 6-iron at 183 yd carry curves about 8 yd right at +2° and 20 yd left at -5°. Elite tour players hitting 300+ yd drives keep face-to-path inside roughly 1° for consistency, since even 1° is about 12 yd of curve at that distance."],"scenarios":["The banana slice off the tee: an out-to-in ('over the top') path pulls the start line left of target, and because the face ends up open relative to that leftward path — even if it looks 'square', aimed right at the target — the ball curves hard back right, often 30-40+ yards offline with a driver.","The 'I fixed my grip but still slice' plateau: closing the face to the target line only shrinks the slice if the path also gets more neutral. A golfer can close the face 2° and still be several degrees open relative to an 8° out-to-in path — the miss softens but doesn't disappear.","The overcorrected hook: a golfer told to 'swing more in-to-out' sometimes swings so far in-to-out that even a slightly closed-to-target face becomes badly closed relative to the new path, and the old slice flips into a low, diving pull-hook.","Why the driver slices worse than the wedges on the very same day: the identical face-to-path mismatch curves a driver roughly 2-2.5x more, in yards, than a mid-iron, because curve grows with the square of carry distance, not in a straight line.","Tour pros deliberately playing a small 'controlled fade' or 'controlled draw' off the tee: both are small, repeatable face-to-path gaps (often under 2°) held the same way every time — the shot shape isn't the goal, the consistency of the gap is."],"whatItMeansForYou":"If you slice or hook, club path is usually the more productive number to chase first — not face angle alone, and not 'keep your head down.' What curves the ball is the gap between face and path, and for most amateurs that gap starts with an out-to-in path (a body/arm move), not a hands/face problem. Working your path toward neutral does two things at once: it straightens your start line (path is 15-35% of that, more with shorter clubs) and, more importantly, it shrinks the face-to-path gap that's actually bending the ball sideways — a fix that pays off hardest with the driver, since the same gap curves a tee shot roughly twice as many yards as it curves a mid-iron."},"misconceptions":["\"Club path is what curves the ball.\" Not by itself — path mostly decides where the shot starts (15-35% of it, club-dependent; the rest is face angle). What actually curves the ball is the gap between face and path: a path of -8° with a perfectly target-square face (0°) still produces a 'Pull Slice' in the engine — about 24 yards offline on a 7-iron — because the face is 8° open relative TO the path, even though it looks square to the target.","\"An in-to-out path always produces a draw.\" Only if the face is closed relative to that path, not to the target. Engine check: path +8° with face +6° (closed relative to path) draws; path +8° with face +10° (even more open than the path) fades — the same in-to-out path, opposite curve, because the gap's sign flipped.","\"0° club path is the goal for a straight shot.\" A straight shot needs face-to-path ≈ 0, not path = 0. Engine check: path +5° with face +5° (matched) flies dead straight with zero curve — it just starts 5° right of the original target line.","\"Closing the clubface fixes a slice.\" Closing the face relative to the target only helps if it also closes relative to the path. A golfer with an 8° out-to-in path who closes their face from 0° to -2° (to target) is still 6° open relative to path — engine check shows offline drops from ~24 yd to ~12 yd (better, not fixed) until the path itself moves too.","\"Aiming your body/shoulders further right increases club path by the same amount.\" In Flightglass's own swing-plane geometry, rotating swing direction by 5° only shifted measured club path by about 3.35° in one worked example (and also moved attack angle) — the relationship isn't 1:1, because path also depends on exactly where along the circular swing arc contact happens and how upright the plane is.","\"The same swing fault shows up the same in every club.\" It doesn't. The identical face-to-path gap curves a driver roughly 2-2.5x more, in yards, than a mid-iron (curve scales with carry squared, confirmed against TrackMan's own published driver/6-iron curve examples), and the loft-dependent face weight means path itself also matters more for where a wedge starts than where a driver starts."],"wolframChecks":["167 / 113 = 1.478 -> the tour driver smash factor from TrackMan's own PGA Tour Averages chart (1.48), the same table Flightglass's 7-iron preset (90 mph -> 120 mph -> 1.33 smash -> 172 yd) is calibrated against.","(223.8 / 172.4)^2 = 1.6852 -> matches the engine's own curve(driver-loft input)/curve(7-iron) ratio of 31.31/18.58 = 1.6852 exactly at a matched 5° path/0° face input, confirming curve scales with carry squared inside the app's own math.","20 / 8 = 2.5 -> matches TrackMan's published 6-iron face-to-path curve examples (-5° -> 20 yd, +2° -> 8 yd) exactly to the face-to-path magnitude ratio (5/2 = 2.5), confirming curve is linear in face-to-path degrees, as the engine assumes (spinAxis = 1.5 x faceToPath).","(275/183)^2 x 20 = 45.16 yd -> scaling TrackMan's own 6-iron -5° face-to-path curve (20 yd) up to driver carry distance via carry^2 predicts ~45 yd of curve; TrackMan's own driver data, linearly extrapolated from -2°/19 yd to -5°, gives 19 x (5/2) = 47.5 yd -> two independent TrackMan-published numbers agree within ~5%, cross-validating the engine's carry^2 curve model against real tour data.","(300/275)^2 x 9.5 = 11.31 yd/° -> matches TrackMan's own stated elite-tour tolerance of ~12 yd of curve per 1° of face-to-path at 300 yd carry, scaled up from the driver's 275 yd / 9.5-yd-per-degree baseline (19 yd at 2°) -> a second independent real-world cross-check of the carry^2 model.","250 yd x tan(1°) = 4.364 yd and 172 yd x tan(1°) = 3.002 yd -> the pure geometric 'where it starts' contribution of 1° of start-direction error over a driver-length vs 7-iron-length carry, isolating the (much smaller) start-line effect from the (much larger) curve effect on total offline.","engine check: faceW = 0.90 - 0.005 x dynamicLoft at dynLoft 13 / 30 / 50 -> 0.835 / 0.750 / 0.650, i.e. club path contributes 16.5% / 25% / 35% to start direction -> matches the independently-published TrackMan-derived rule that 'face angle drives ~85% of start direction with driver, ~75% with a mid-iron' almost exactly (85% vs engine's 83.5%, 75% vs the engine's 75.0%).","engine check: spinAxis = clamp(1.5 x (faceAngle - clubPath), +-38°); at 7-iron path -8° / face 0° -> spinAxis 12°, curve 29.7 yd, offline 23.7 yd (Pull Slice) -- demonstrates a face that is square relative to the target still slices badly once it is 8° open relative to path, grounding the #1 real-world slice misconception."],"quiz":[{"q":"What does \"club path\" actually measure?","options":["Where the clubface is pointing at impact","The horizontal direction the clubhead is traveling through impact, relative to the target line","The vertical angle of the clubhead's approach (up or down)","How far inside or outside the ball the club is positioned at address"],"answerIndex":1,"explanation":"Club path is purely about the direction of clubhead travel through impact — in-to-out (positive) or out-to-in (negative) relative to the target line. Where the face points is a separate number (face angle); up/down motion is attack angle. Mixing up path and face is the single most common launch-monitor reading mistake."},{"q":"A 7-iron is struck with the clubface pointing exactly at the target (0° face angle) but the club path is 8° out-to-in. What happens to the shot?","options":["It flies dead straight, since the face is square","It starts slightly left and curves hard back to the right — a big slice","It starts slightly right and curves left — a big hook","A square face means path has no effect on curve at all"],"answerIndex":1,"explanation":"In Flightglass's engine this exact input (path -8°, face 0°) produces a 'Pull Slice': the ball starts about 2° left (path still contributes 25% of start direction for a 7-iron) and then curves roughly 30 yards back right, landing about 24 yards offline — because the face is 8° open relative to the path, even though it's perfectly square to the target. This is the #1 real-world misconception about slicing."},{"q":"With a driver, roughly what share of the ball's initial start direction comes from club path rather than face angle?","options":["About 15%","About 50%","About 75%","About 100%"],"answerIndex":0,"explanation":"Flightglass's engine gives a driver-loft strike a face weight of about 0.835 — meaning path contributes only about 16-17% to start direction, the rest is face angle. That closely matches the independently-published, TrackMan-derived rule that face angle owns roughly 85% of start direction with a driver (about 75% with a mid-iron, since a lofted club lets path matter more)."},{"q":"A driver (275-yard carry) and a 6-iron (183-yard carry) each have a similarly sized face-to-path gap. Which curves more, in actual yards?","options":["The 6-iron, because it's more lofted","They curve the same number of yards — only the gap size matters","The driver, by roughly double, because curve grows with the square of carry distance","Neither curves — only face angle relative to the target matters"],"answerIndex":2,"explanation":"TrackMan's own published numbers show it directly: a driver curves about 19 yards at a 2° face-to-path gap, while a 6-iron curves only about 8 yards at a similar 2° gap — roughly 2.4x more yards off the tee for essentially the same degree of mismatch. Flightglass's engine models this with curve growing as carry-squared, matching the real-world ratio closely."},{"q":"Two golfers both aim their swing direction dead at the target (0°). Golfer A's low point (where the swing arc bottoms out) sits well ahead of the ball; Golfer B's sits behind the ball. Whose club path is more in-to-out?","options":["Golfer A (low point ahead of the ball)","Golfer B (low point behind the ball)","They're identical — path only depends on aim, not low point","Neither has a measurable path since both aimed at the target"],"answerIndex":0,"explanation":"In Flightglass's swing-plane geometry engine, moving the low point 3 cm ahead of the ball (a good, descending, ball-first strike) added about +0.8° of in-to-out path even with swing direction held at a dead-square 0°. The same offset behind the ball produced about -0.8° (out-to-in) instead. Club path isn't purely a matter of where you aim — it also depends on exactly when, along the circular swing arc, contact happens."}]}
  </script>

  <script type="application/json" id="lesson-spin-loft">
{"parameter":"Spin Loft","oneLiner":"Spin loft is the angle between where the clubface points and where the club is actually travelling at impact — dynamic loft minus attack angle — and it is the single geometric dial that decides how glancing (spinny) or square (efficient) every strike is.","whatItIs":"Spin loft is the angle, in the vertical (side-on) plane, between two directions that almost never quite line up at impact: the direction the clubface is pointing (dynamic loft) and the direction the clubhead is travelling (attack angle). The bigger that mismatch, the more the strike glances across the ball instead of squarely compressing it — and a glancing strike is exactly what turns clubhead speed into backspin. The formula used in this app's engine, and in TrackMan-style launch-monitor literature generally, is the standard simplification: spin loft = dynamic loft − attack angle. It is a purely geometric quantity — it doesn't care how fast you're swinging, only about the shape of the strike — which is why it sits in the 'Derived' tier of this app's dependency graph, built entirely from two Fundamentals-tier numbers (Dynamic Loft and Attack Angle) and in turn feeding two more Derived-tier outcomes (Smash Factor and Backspin) plus a term in Landing Angle. It is genuinely one of the most useful single numbers in golf instruction because it explains, with one subtraction, both why a driver should be low-spin and why a wedge should be high-spin — they're not different rules, they're the same formula run at opposite ends of its range.","components":[{"name":"Dynamic loft","role":"The effective loft the face actually presents at impact — not the number stamped on the club. It is the larger, additive half of spin loft and the widest-ranging lever: club selection alone swings it more than 40 degrees across a bag.","typicalRange":"driver ~9-13°; 7-iron delivered ~24-30° (often several° less than the stamped static loft due to forward shaft lean); wedge ~30-46°"},{"name":"Attack angle","role":"The vertical direction the clubhead is moving at impact — up or down. It subtracts from dynamic loft, so a more negative (steeper down) attack angle makes spin loft bigger, and a more positive (upward) attack angle makes it smaller. It is the only lever that changes spin loft without also changing the club or the launch character.","typicalRange":"driver -5 to +5° (tour average close to level/-1 to -1.5°; optimized/low-spin fittings +3 to +5°); mid-iron -6 to -2°; wedge -6 to -3°"},{"name":"Club / loft selection","role":"The single biggest real-world decision that resets dynamic loft in one move. Golfers rarely think 'I'm changing spin loft' — they think 'I'm changing clubs' — but every club swap directly resets the dominant half of the equation.","typicalRange":"driver ~10° to lob wedge ~58-64° static loft — a >45° span across a full bag"},{"name":"Shaft lean / hand position (forward press)","role":"Fine, golfer- or fitter-controllable adjustment to dynamic loft on top of a single club's stamped loft. Leaning the shaft forward at impact de-lofts the face a few degrees, which is why measured dynamic loft on tour irons runs meaningfully below the printed number.","typicalRange":"can shift dynamic loft several degrees (illustrative; shaft-lean-dependent, not a fixed constant)"},{"name":"Smash factor (downstream consequence)","role":"Ball speed / club speed — the strike-efficiency payoff. In the engine it falls in a straight line as spin loft rises (smashEff = 1.46 − 0.004×spinLoft, clamped), because a bigger spin loft is a more glancing hit that sends more of the impact energy into skid/spin rather than forward compression.","typicalRange":"engine: ~1.42 at 9° spin loft (driver-style) down to ~1.26 at 51° (wedge-style), clamp ceiling 1.42 for the 7-iron preset used"},{"name":"Backspin (downstream consequence)","role":"The rev-rate spin loft feeds. In the engine, backspin scales with |spin loft| x ball speed x a per-club spin coefficient — spin loft is the dominant lever, ball speed a near-linear multiplier on top.","typicalRange":"engine at 90 mph clubspeed: ~2,070 rpm at 9° spin loft, ~7,100 rpm at 33°, clamped to 9,000 rpm ceiling at 51°"}],"howTheyConnect":"Contact between clubface and ball lasts under a millisecond, and in that instant the ball's compression against the face can be resolved into two directions: the direction the face is pointing (which drives spin loft's dynamic-loft half) and the direction the club is travelling (attack angle, the half that subtracts). When those two directions coincide — attack angle equals dynamic loft — spin loft would be zero and the strike would be as square/compressive as geometry allows. In practice they never coincide by more than a few degrees at best, and the gap between them (spin loft) determines how much of the strike is a clean compression versus a glancing skid. A bigger spin loft geometrically means more of the impact's relative velocity runs along the face (the skid/spin-producing direction, scaling like sin of the angle) rather than into the face (the compression/ball-speed-producing direction, scaling like cos of the angle) — grounded numerically above: at driver-level spin loft (~12°) about 96% of that energy still resolves forward; at wedge-level spin loft (~37°) it drops to about 64%. That single geometric fact is why, in this app's engine, raising spin loft simultaneously lowers smash factor (smashEff = 1.46 − 0.004×spinLoft) and raises backspin (backspin ≈ |spinLoft| × ballSpeed × spinK) — they are two readings of the same underlying trade-off, not two unrelated dials. Spin loft itself is built from exactly two Fundamentals-tier numbers with equal, opposite-signed weight — dynamic loft adds, attack angle subtracts — so a golfer can reach the identical spin loft through very different deliveries (steep attack + low loft, or shallow attack + high loft). It then feeds forward into Landing Angle too (steeper spin loft nudges the ball's descent angle steeper, alongside launch angle and apex), which is why a big-spin-loft wedge doesn't just spin more, it also comes down noticeably steeper and holds the green better than a low-spin-loft chip-and-run.","hierarchy":[{"driver":"Dynamic loft","weight":"1:1 direct addition to spin loft, and by far the widest practical range of any single lever — roughly 9° (driver) to 50+° (lob wedge), a >40° span across the bag","why":"Every degree of dynamic loft adds exactly one degree of spin loft (it's a direct subtraction in the formula). Because loft varies enormously just from picking a different club, it explains most of the spin-loft spread golfers see shot to shot — it is the biggest lever mainly because it has the biggest room to move, not because it is weighted more heavily in the math."},{"driver":"Attack angle","weight":"mathematically identical weight to dynamic loft (each degree subtracts one degree of spin loft), but a much narrower golfer-controllable window — roughly -6° to +5°, an ~11° span","why":"It carries the exact same per-degree pull as loft, but because real swings vary attack angle far less than loft varies across the bag, it moves the total less in absolute terms shot-to-shot. It is, however, the only lever that changes spin loft without also changing club or launch character — engine check: an 11° driver loft at -5° attack gives 16° spin loft, the same loft at +4° attack gives 7° — swinging up instead of down more than halves it."},{"driver":"Club / loft selection","weight":"the single biggest real-world decision — swapping a wedge (46°) for a 7-iron (30°) resets dynamic loft ~16° in one choice, more than most swing changes could ever move it","why":"Golfers experience this lever as 'which club am I hitting', not as a spin-loft adjustment, but every club change directly resets the dominant half of the formula. It is why spin loft naturally clusters into bands by club (driver ~9-12°, mid-iron ~28-33°, wedge ~37-51°) before a golfer does anything else differently."},{"driver":"Shaft lean / hand position (forward press)","weight":"a fine-tuning knob worth several degrees of dynamic loft on top of one club's stamped number","why":"Tour players deliver notably less loft at impact than the number stamped on the iron by leaning the shaft forward through the ball; it is the precision adjustment within a single club, which is why 'dynamic' loft (delivered) and 'static' loft (stamped) are never quite the same number."},{"driver":"Strike centeredness / gear effect","weight":"does not move the geometric spin-loft number at all, but distorts how faithfully that number becomes real, measured spin","why":"An off-center hit can under- or over-deliver the spin a 'clean' spin-loft geometry would predict via gear effect. It is ranked last because on a centered strike it's invisible — but it's the reason two swings with an identical measured spin loft can still produce visibly different real-world spin."}],"realWorld":{"tourBenchmarks":["PGA Tour driver (widely cited TrackMan tour-average figures, the same 2,700 rpm ballpark already used elsewhere in this app's Backspin lesson): dynamic loft ~10.9°, attack angle ~-1.3° (near level), spin loft ~12.2°, backspin ~2,686 rpm, ball speed ~167 mph, carry ~275 yd.","PGA Tour 7-iron: dynamic loft ~24.2°, attack angle ~-4.3° (clearly descending), spin loft ~28.5°, backspin ~7,097 rpm, carry ~172 yd — matches this app's own 7-iron backspin window (6,500-7,500 rpm) almost exactly.","PGA Tour pitching wedge: dynamic loft ~32.6°, attack angle ~-4.5°, spin loft ~37.1°, backspin ~9,304 rpm, carry ~136 yd — the steepest spin loft and highest spin of the three, consistent with this app's wedge window (8,000-9,000+ rpm).","Modern 'low-spin driver' / long-drive-style fitting: pairing a low static loft (~9-11°) with a strongly upward attack angle (+3 to +5°) can push spin loft down to ~6-8° — below even the tour average — chasing the low-spin, low-drag launch window that maximizes carry at high ball speed."],"scenarios":["Why a mid-handicap's driver balloons and comes up short: chopping down on the ball (attack angle around -4°) on top of ordinary driver loft (11°) creates a ~15° spin loft — roughly what a tour player'S 7-iron runs. The driver ends up spinning like an iron, climbing too steeply and running out of ball speed early.","Why 'hit up on the driver' is the single most repeated modern fitting tip: engine check shows raising attack angle from -1° to +4° on the same 11° loft driver cuts spin loft from ~12° to ~7° — a real, teachable, single-number reason the advice works, not just a feel cue.","Why a well-struck wedge shot 'sits down' and spins back on a firm green: 46° loft delivered with a -5° descending blow makes a 51° spin loft — more than four times the driver's. That huge glancing angle is exactly what manufactures the ~9,000 rpm needed to stop the ball; it is the shot working AS designed, not a mishit.","Why two golfers can carry the same 7-iron distance but flight it completely differently: one is running a flatter, lower spin loft (e.g. ~21° from a strong delivered loft and a shallower attack angle) while the other runs ~40+° (weaker delivered loft plus a steep chop) — identical club, identical carry number, very different trajectory shape and landing angle underneath."],"whatItMeansForYou":"You don't set spin loft directly with a knob — you set it through two decisions: which club you pick (that sets your baseline dynamic loft) and how steep or shallow your attack angle is with it. If a driver balloons or seems to run out of gas in the air, the fix is almost always attack angle, not loft — get more level or slightly upward through impact rather than adding static loft, since more loft only makes spin loft bigger. If wedge shots aren't stopping on the green, you actually want spin loft to stay large — a steeper, more descending strike (not more bounce or more loft) is what gets you back into that 9,000 rpm window."},"misconceptions":["\"Spin loft and dynamic loft are the same thing.\" They aren't — dynamic loft is just where the face points; spin loft is the gap between where the face points and where the club is travelling (dynamic loft minus attack angle). A club can have plenty of dynamic loft and still a small spin loft if attack angle is matched to it.","\"Hitting up on the ball kills spin loft entirely.\" It shrinks spin loft, it doesn't zero it out. Engine check: an 11° driver loft at a strongly upward +4° attack angle still leaves 7° of spin loft — small, not nothing, because dynamic loft is still doing most of the work.","\"You should minimize spin loft on every club.\" False — the right spin loft is club- and shot-dependent. A driver wants a small spin loft (less spin, more distance); a wedge needs a large spin loft (high spin, stopping power on the green). There is no universal 'smaller is better' rule.","\"The loft stamped on the clubhead is what goes into the spin-loft formula.\" It's the delivered (dynamic) loft that counts, which is often several degrees less than the static number for irons because tour players lean the shaft forward through impact.","\"Dynamic loft matters more than attack angle because it's the bigger number.\" Mathematically they carry identical 1:1 weight in the formula — each degree of either moves spin loft by exactly one degree. Loft only looks more important because golfers vary it over a much wider range (club selection) than they vary attack angle.","\"A big spin loft means a bad, mishit strike.\" Spin loft is pure geometry (an angle), not a strike-quality score. A perfectly centered, well-struck wedge naturally runs 40+ degrees of spin loft by design — that's not a mishit, that's the shot working as intended."],"wolframChecks":["10.9 - (-1.3) = 12.2 -> driver-average dynamic loft minus attack angle reproduces the commonly cited tour driver spin loft exactly, confirming the identity holds on real launch-monitor-style figures, not just round numbers.","24.2 - (-4.3) = 28.5 -> 7-iron dynamic loft minus attack angle reproduces the cited 7-iron spin loft exactly.","32.6 - (-4.5) = 37.1 -> pitching-wedge dynamic loft minus attack angle reproduces the cited wedge spin loft exactly.","cos^2(12.2°) = 0.9553, cos^2(28.5°) = 0.7723, cos^2(37.1°) = 0.6361 -> the fraction of impact-velocity energy resolved along the compressive, ball-speed-producing direction falls from ~96% (driver-level spin loft) to ~64% (wedge-level spin loft) as spin loft grows -- the physical reason smash factor drops as spin loft rises, not an arbitrary engine constant.","sin(37.1°)/sin(12.2°) = 2.854 -> the glancing/skid velocity component (the geometric seed of spin) is nearly 3x larger at wedge-level spin loft than at driver-level spin loft, before friction or ball speed are even factored in.","Engine check (solveFlight, clubSpeed 90 mph): dynamicLoft 13/attackAngle +4 -> spinLoft 9°, smashEff 1.420 (clamped at the 7-iron-preset ceiling); dynamicLoft 30/attackAngle -3 -> spinLoft 33°, smashEff 1.328; dynamicLoft 46/attackAngle -5 -> spinLoft 51°, smashEff 1.256 -- confirms the engine's smash-vs-spin-loft tradeoff (-0.004 smash per degree of spin loft) runs consistently across the full realistic range.","Engine check, same three presets, backspin output: 2,070 / 7,099 / 9,000(engine-clamped) rpm -> spin loft alone, at a fixed 90 mph club speed, spans almost the app's entire realistic backspin range (1,500-9,000 rpm), underscoring it as the dominant lever.","Amateur-vs-optimized driver check: dynamicLoft 11/attackAngle -5 -> spinLoft 16°; dynamicLoft 11/attackAngle +4 -> spinLoft 7° -> swinging up instead of down on the same 11° driver loft more than halves spin loft (16 -> 7°, ratio 2.29x), the arithmetic behind the 'hit up on the driver' fitting advice."],"quiz":[{"q":"A driver is delivered with 11° of dynamic loft. Which attack angle gives the smallest spin loft?","options":["-3° (slightly down)","0° (level)","+3° (slightly up)","+6° (strongly up)"],"answerIndex":3,"explanation":"Spin loft = dynamic loft − attack angle, so the most positive (most upward) attack angle subtracts the most. At +6°: 11 − 6 = 5°, the smallest of the four options. This is exactly why 'hit up on the driver' is repeated so often in modern fitting — it shrinks spin loft without touching loft at all."},{"q":"Why does smash factor (ball speed / club speed) tend to fall as spin loft rises, even at the exact same clubhead speed?","options":["The club physically decelerates before a glancing strike","A bigger spin loft is a more glancing hit, so more of the impact's energy resolves into skid/spin rather than forward compression, leaving less to become ball speed","Backspin slows the ball down mid-flight, which the engine miscounts as a speed loss","Spin loft has no real effect on smash factor — it's a coincidence in the model"],"answerIndex":1,"explanation":"At impact, the compressive (ball-speed-producing) component of the strike scales with cos(spin loft) and the tangential/skid (spin-producing) component with sin(spin loft). Grounded check: cos^2(12.2°) = 0.955 (driver-level spin loft keeps ~96% of impact energy pointed forward) vs cos^2(37.1°) = 0.636 (wedge-level keeps only ~64%) — a real, physical energy trade-off, not an arbitrary engine constant."},{"q":"An amateur chops down on the driver (11° loft, -5° attack angle) while a tour-optimized swing uses the same 11° loft but a +4° attack angle. Roughly how much bigger is the amateur's spin loft?","options":["About the same","About 50% bigger","About double","About 10x bigger"],"answerIndex":2,"explanation":"Amateur: 11 − (−5) = 16°. Optimized: 11 − 4 = 7°. 16/7 ≈ 2.3 — roughly double. Same club, same loft, only the attack angle changed, and it more than doubled the spin loft — which is exactly the mechanism behind a driver that balloons and comes up short."},{"q":"Because spin loft is defined as dynamic loft minus attack angle, could it ever be zero or negative?","options":["No — spin loft is always a positive number by definition","Yes — if attack angle exceeds dynamic loft (an unusually upward strike with very little loft), spin loft can shrink toward zero or go negative, an unusual 'topspin-style' geometry","Only mathematically, it can never happen on a real golf shot","Only on wedges, never on a driver"],"answerIndex":1,"explanation":"It's just subtraction — if attack angle ever exceeds dynamic loft, the result goes negative. It's rare (most real swings keep loft comfortably above attack angle), but it's why the engine's backspin formula uses the absolute value of spin loft (|spinLoft|) rather than assuming it's always positive — a small but deliberate safeguard in the code for that edge case."},{"q":"Comparing a wedge (spin loft ~37-51°) to a driver (spin loft ~9-12°), what's the main real-world consequence for a golfer?","options":["The wedge has higher smash factor and more ball speed than the driver","The wedge spins far more and launches much higher, trading distance for a steep, controllable descent — while the driver stays low-spin to maximize carry","Spin loft has no real consequence on ball flight, only club selection does","They behave identically because club path is zero on both"],"answerIndex":1,"explanation":"A big spin loft (wedge) is BY design: it manufactures the ~9,000 rpm and steep descent needed to stop a shot on the green, at the cost of distance and smash factor. A small spin loft (driver) is also by design: it keeps spin low and smash factor near its ceiling to maximize carry. Same formula, opposite goals depending on the club."}]}
  </script>
  <script type="application/json" id="lesson-smash">
{"parameter":"Smash Factor","oneLiner":"Smash factor is ball speed divided by club speed — a pure strike-quality score that tells you how efficiently your swing's speed became ball speed, independent of how hard you actually swung.","whatItIs":"Smash factor is the simplest ratio on a launch monitor: ball speed / club speed. A 7-iron swung at 90 mph that sends the ball off at 120 mph has a smash factor of 1.33 (120 / 90); a driver swung at 113 mph that produces 167 mph of ball speed is 1.48. It should be read as a strike-quality number, not a power number — it measures how much of your swing's energy actually made it into the ball, not how fast you swung. A slow, perfectly centered strike can post a great smash factor at modest ball speed; a fast but mishit swing can post a poor smash factor despite plenty of speed. Two things move it: how square the hit is (a flush, low-loft, minimal-glancing strike sends energy almost directly into ball speed) versus how glancing it is (a lofted, oblique strike diverts real energy into spinning the ball instead of launching it — which is exactly what a wedge is designed to do on purpose). Flightglass's engine models this directly: smash factor falls as spin loft (dynamic loft minus attack angle) rises — smashEff = clamp(1.46 − 0.004 × spinLoft, 1.15, 1.42) for the app's calibrated 7-iron — and ball speed = club speed × smash factor.","components":[{"name":"Ball speed / club speed ratio (the definition)","role":"Smash factor IS ballSpeed ÷ clubSpeed — one number answering 'how efficiently did this swing's speed turn into ball speed.'","typicalRange":"driver ~1.45-1.50, 7-iron ~1.30-1.38, pitching wedge ~1.15-1.25"},{"name":"Spin loft (dynamic loft minus attack angle)","role":"The engine's sole live driver of smash factor. A tighter spin loft (more square, less glancing) pushes smash up toward the club's ceiling; a wider spin loft pushes it down toward the floor.","typicalRange":"7-iron spin loft ~28-38° -> smash ~1.32-1.36; driver spin loft ~8-16° (low loft, positive attack) -> smash ~1.45-1.50"},{"name":"Strike location on the face (center vs toe/heel/high/low)","role":"The biggest real-world lever for a given club and swing. Off-center hits ('gear effect') twist the clubhead instead of driving through the ball, bleeding ball speed even with perfect delivery angles. Not modeled in this app's smash formula, which assumes a center strike.","typicalRange":"dead-center strike = full smash; ~3/4 in (19mm) off-center can cost several mph of ball speed / roughly 0.05-0.15 off smash factor"},{"name":"Club/face COR (coefficient of restitution) and club category","role":"Sets the theoretical ceiling per club. Drivers are built with a springy, thin, USGA/R&A-limited face; irons and wedges are more rigid and are struck with far more loft, which matters more than face stiffness.","typicalRange":"driver COR legal max ~0.83; iron/wedge real-world smash sits well below its own theoretical square-hit ceiling because of loft-driven spin loss"},{"name":"Club-to-ball mass ratio","role":"A heavier clubhead relative to the ball transfers momentum more efficiently in a head-on collision. Iron heads (~250-265g) are actually proportionally heavier vs the 45.93g ball than driver heads (~195-200g) — a square iron strike models even higher than a driver's ceiling; it is loft, not mass ratio, that pulls real iron smash back down.","typicalRange":"driver head ~195-200g vs ball 45.93g (ratio ~0.81); 7-iron head ~255-265g vs ball 45.93g (ratio ~0.85)"},{"name":"Ball construction & temperature","role":"A ball's core and cover set its own COR; a colder or lower-compression ball springs off the face slightly less efficiently. Small compared to strike location and spin loft.","typicalRange":"roughly 0.01-0.03 smash-factor swing between ball models or a cold vs warm ball"}],"howTheyConnect":"At impact the club and ball are in contact for well under a millisecond. A simple restitution-collision model says the ball's exit speed depends on the club-to-ball mass ratio and the face's coefficient of restitution (COR — its 'springiness', capped by the USGA/R&A at about 0.83 for drivers): v_ball = v_club x (1+COR) x m_club/(m_club+m_ball). Plugging in a representative 200g driver head, the 45.93g USGA-maximum ball, and COR 0.83 gives a theoretical ceiling of about 1.49 — matching the real-world driver smash-factor ceiling almost exactly. Here is the twist: running the same formula for a 258g 7-iron head at a lower COR (~0.78) gives an even higher theoretical number, about 1.51 — because the heavier iron head is proportionally closer in mass to the ball. A square, dead-flush collision would actually favor the iron. What really happens is that irons are never struck square: the face carries loft, so every iron strike is a glancing blow BY design, and that obliqueness — spin loft, the gap between where the face points and where the club is travelling — diverts a real slice of the collision's energy into spinning the ball rather than launching it forward. The bigger the spin loft, the more glancing the hit, the more energy goes to spin instead of speed, and the lower smash factor falls. That is exactly what the app's engine encodes: smash factor is a direct, falling function of spin loft alone, not of club speed or club identity. On top of that clean geometric story sits one more real-world layer this diagram cannot model: where on the face you strike it. A hit toward the toe, heel, or off the vertical center makes the whole clubhead twist around its own center of mass at impact instead of driving straight through, so energy bleeds into head rotation rather than ball speed. That is why, on a real launch monitor, smash factor is treated as the single best on-screen number for 'did you find the center of the face,' even though it began life as nothing more than an energy-transfer ratio.","hierarchy":[{"driver":"Strike location on the face (center vs toe/heel/high/low — 'gear effect')","weight":"Largest real-world swing-to-swing lever — a strike ~3/4 in (19mm) off-center can cost several mph of ball speed and roughly 0.05-0.15+ off smash factor even with perfect delivery angles","why":"Off-center contact makes the clubhead twist around its own center of mass at impact instead of driving straight through, so energy bleeds into head rotation rather than ball speed. It is why TrackMan treats smash factor as the best on-screen proxy for 'did you find the middle of the face.' Not modeled in this app's smash formula (which assumes a center strike), but it is the #1 real-world separator between a tour player's and an amateur's smash factor at the same clubhead speed."},{"driver":"Spin loft (dynamic loft minus attack angle)","weight":"The engine's modeled lever — smash falls ~0.004 per degree of spin loft; moving spin loft from 25° to 40° drops smash 1.36 -> 1.30 on the identical strike","why":"Spin loft is how glancing the blow is. A bigger gap between where the face points and where the club travels diverts more of the collision's energy into spinning the ball rather than launching it forward — the same tradeoff that makes backspin rise as smash falls. This is the one quantity solveFlight actually uses to compute smash factor in the app."},{"driver":"Club/face technology and category (driver vs iron vs wedge)","weight":"Sets the ceiling for the whole range: driver ~1.46-1.50, mid-iron ~1.30-1.38, wedge ~1.15-1.25 — a wedge physically cannot post driver-like numbers","why":"Every club category is built around a different intended spin loft (a wedge needs a big glancing blow to work) and the USGA/R&A spring-like-effect limit (COR <= ~0.83) puts a hard ceiling near 1.49-1.50 on any conforming driver. In the app this shows up as the clubs preset table (smash 1.33 for the 7-iron today; a driver preset is planned but not yet wired into solveFlight)."},{"driver":"Ball construction & temperature (the ball's own COR)","weight":"Small — on the order of 0.01-0.03 of smash factor between ball models, or between a cold and a warm ball","why":"A ball's core compression and cover material set its own coefficient of restitution; a warm, higher-compression premium ball springs off the face marginally more efficiently than a cold or low-compression one. Real, but far smaller than strike location or spin loft."},{"driver":"Club speed itself","weight":"~zero direct effect on the ratio — smash factor stays roughly flat across a normal swing-speed range for the same strike quality","why":"Because smash = ballSpeed / clubSpeed, and ball speed scales up roughly in proportion to club speed for a fixed spin loft and strike location, the ratio barely moves. Swinging harder raises ball speed and carry; it does not, by itself, raise smash factor — the most common misread of the number."}],"realWorld":{"tourBenchmarks":["PGA Tour driver: ~113 mph clubhead speed -> ~167 mph ball speed -> smash factor ~1.48 (TrackMan Tour averages).","PGA Tour 7-iron: ~90 mph clubhead speed -> ~120 mph ball speed -> smash factor ~1.33.","PGA Tour pitching wedge: ~83 mph clubhead speed -> ~102 mph ball speed -> smash factor ~1.23 — smash factor drops steadily as loft climbs, club by club.","LPGA Tour driver: ~94 mph clubhead speed -> ~140 mph ball speed -> smash factor ~1.49 — LPGA pros swing ~19 mph slower than PGA Tour pros off the tee yet match or slightly beat their smash factor, proof the number rewards strike quality, not raw speed.","Physical ceiling: with the USGA/R&A spring-like-effect limit (COR <= ~0.83) and standard masses (~200g driver head, 45.93g ball — the USGA maximum), the theoretical maximum smash factor is about 1.49. Essentially no one exceeds ~1.50 on a conforming driver."],"scenarios":["Two golfers both swing the driver at 95 mph. One flushes it dead center (smash ~1.48, ball speed ~141 mph); the other catches it slightly off the toe (smash ~1.35, ball speed ~128 mph). Same swing speed, but ~13 mph of ball speed and 15-20+ yards of carry lost purely to strike quality.","A 7-iron struck with a steep, digging attack angle (big spin loft) might only reach smash ~1.28, while the identical swing speed with a shallower, more sweeping strike (smaller spin loft) can reach ~1.36-1.38 — the difference between a heavy, ballooning shot and a piercing one.","Range-ball smash factor often reads lower than course-ball smash factor: cheap, harder range balls have a lower COR ('less spring') than premium urethane tour balls, so the identical swing shows a smaller number on the mat than it would on the course.","In a fitting session, a golfer's smash factor creeps up after switching to a lighter, more speed-friendly shaft even though clubhead speed barely changes — a sign that improved timing and center-face contact, not extra power, improved the strike.","A junior or senior golfer with a modest 80 mph driver swing but a beautifully centered strike can post a smash factor (~1.46-1.48) that rivals a much faster amateur swinger who mishits — proof smash factor is not a speed contest."],"whatItMeansForYou":"On your own launch monitor, read smash factor as your strike-quality gauge, not a speed gauge: if it sits below your club's typical band (roughly 1.30+ for a 7-iron, 1.45+ for a driver), the fix is almost always contact — find the center of the face and tighten up spin loft — before you reach for more swing speed. Two swings at the exact same clubhead speed can carry 15-20 yards apart purely because one has a better smash factor; that gap is 'free' distance you can recover without swinging any harder."},"misconceptions":["\"A higher smash factor always means you hit it farther.\" Not on its own — smash factor is ball speed divided by club speed, so a slow, perfectly struck swing can post a great smash factor (say 1.42) with modest actual ball speed and carry. Distance needs both a good smash factor and enough club speed.","\"Swinging harder increases your smash factor.\" False. Smash factor is a ratio of ball speed to club speed and tracks strike quality, not power. A harder swing with the same spin loft and same center-face contact usually leaves smash factor about the same — it just scales ball speed up along with the extra club speed.","\"Irons are inherently less 'springy'/efficient than drivers, and that's why their smash factor is lower.\" Mostly backward. A square, zero-loft collision using typical iron-head mass actually computes to a higher theoretical smash ceiling than a driver's (the iron head is proportionally heavier relative to the ball). Real iron smash factor is lower because of loft/spin loft — the strike is deliberately glancing to launch the ball with spin — not because the club transfers energy worse.","\"You should try to maximize smash factor on every club.\" No — a wedge needs a big spin loft (a glancing blow) to work; chasing driver-like smash numbers with a 60° wedge would mean de-lofting it into a different club entirely. Each club has its own healthy smash-factor band.","\"Smash factor above 1.5 is achievable with a good enough strike.\" No — physics puts a hard ceiling near 1.49-1.50 for a conforming driver, set by the USGA/R&A spring-like-effect limit (COR <= ~0.83) and standard head/ball masses. Nobody, tour pro or robot, meaningfully exceeds this on a legal club.","\"A cold ball or cold day mainly hurts smash factor.\" The temperature effect on smash factor itself (ball COR/compression) is small (roughly 0.01-0.03). Most of a cold-weather distance loss comes from denser air adding drag after the ball leaves the face, not from a big change in the strike's smash factor."],"wolframChecks":["smash factor definition check: 90 mph x 1.33 = 119.7 mph (matches TrackMan 7-iron tour-average ball speed ~120 mph) and 113 mph x 1.48 = 167.24 mph (matches TrackMan driver tour-average ball speed ~167 mph).","USGA maximum golf ball mass 1.620 oz -> Wolfram-confirmed 45.926 g; Wolfram Alpha's own knowledge base independently labels this figure '~maximum allowed mass of a golf ball', anchoring the ball-mass constant used throughout.","theoretical driver smash ceiling from a restitution collision: (1+0.83) x 200/(200+45.93) = 1.488 -- using the USGA/R&A spring-like-effect COR limit (0.83) and a representative 200 g driver head vs the 45.93 g ball; matches the real-world driver smash-factor ceiling of ~1.48-1.50.","the same restitution formula for a 258 g 7-iron head at a lower COR (0.78) gives (1+0.78) x 258/(258+45.93) = 1.511 -- higher than the driver's theoretical ceiling, proving mass ratio favors the iron; real iron smash (~1.33) sits far below this because of loft/spin loft, not an inferior collision.","engine formula check: 1.46 - 0.004x25 = 1.36 and 1.46 - 0.004x40 = 1.30 -- confirms the app's smashEff falls by 0.06 as spin loft widens from 25° to 40°, the exact mechanism the diagram lets a user drag.","energy-transfer efficiency at tour-average driver smash: (45.93/200) x 1.48^2 = 0.503 -- only about 50% of the clubhead's kinetic energy converts into the ball's kinetic energy at even a great strike; the rest stays with the decelerating club head or is lost to vibration/heat.","energy-transfer efficiency at tour-average 7-iron smash: (45.93/258) x 1.33^2 = 0.315 -- only about 31% of the iron head's kinetic energy converts to ball speed, lower than the driver despite the iron's more favorable mass ratio -- again pointing at spin loft as the energy sink.","tour-average smash factors are self-consistent ratios: 167/113 = 1.478 (driver), 120/90 = 1.333 (7-iron), 102/83 = 1.229 (pitching wedge) -- confirms smash factor falls steadily as the club gets more lofted, club by club.","cross-checks for LPGA and wedge references: 94 mph x 1.49 = 140.06 mph (matches LPGA driver tour-average ball speed ~140 mph) and 83 mph x 1.23 = 102.09 mph (matches PGA Tour pitching-wedge tour-average ball speed ~102 mph)."],"quiz":[{"q":"What does smash factor actually measure?","options":["Clubhead speed alone","Ball speed divided by club speed","Backspin rate","How far the ball carries"],"answerIndex":1,"explanation":"Smash factor = ball speed / club speed — e.g. a 90 mph 7-iron swing that produces 120 mph of ball speed has a smash factor of 1.33 (120/90). It measures strike efficiency, not raw power or distance."},{"q":"Why doesn't simply swinging harder raise your smash factor?","options":["It always does raise smash factor","Smash factor is a ratio; ball speed scales roughly with club speed at a fixed strike quality, so the ratio stays about the same","Faster swings always mishit the ball","Ball speed can never exceed club speed"],"answerIndex":1,"explanation":"Because smash = ballSpeed / clubSpeed, and ball speed itself scales with clubSpeed x smash for a given spin loft and strike location, swinging faster with the same strike quality raises ball speed but leaves the ratio roughly unchanged. Smash factor tracks strike quality, not effort — the most common misread of the number."},{"q":"Two identical 90 mph 7-iron swings differ only in spin loft: Swing A is 25°, Swing B is 40°. Using the app's engine (smash = 1.46 - 0.004 x spinLoft), which has the higher smash factor, and by about how much?","options":["Swing B is higher, by about 0.06","Swing A is higher, by about 0.06 (1.36 vs 1.30)","They are identical","Swing B is higher, by about 0.30"],"answerIndex":1,"explanation":"At 25° spin loft the engine gives 1.46 - 0.004x25 = 1.36; at 40° it gives 1.46 - 0.004x40 = 1.30. Swing A (the tighter, more square strike) is about 0.06 higher. A bigger spin loft is a more glancing hit that diverts more energy into spin instead of ball speed."},{"q":"A well-struck driver can reach a smash factor near 1.48-1.50, while even a beautifully struck 7-iron tops out around 1.33-1.38. Why?","options":["Driver clubheads are heavier than iron heads, which alone explains it","Iron faces simply have lower COR ('spring') than driver faces","The driver's low loft makes for a nearly square collision, while the iron's higher loft makes every strike a glancing blow that diverts energy into spin","Driver balls and iron balls are built differently"],"answerIndex":2,"explanation":"A simple head-on collision model using typical masses actually predicts an iron strike could reach ~1.51 smash — higher than a driver's ~1.49 theoretical ceiling — because the heavier iron head is proportionally closer in mass to the ball. What pulls real iron smash down to ~1.33-1.38 is loft: every iron strike is deliberately oblique (glancing) to launch the ball with spin, and that obliqueness, not the club's construction, is what caps its smash factor."},{"q":"Which of these will most quickly show up as a lower smash factor, even with perfect attack angle and dynamic loft?","options":["Playing at high altitude","A mishit toward the toe or heel instead of the center of the face","Playing on a cold day","Increasing swing speed"],"answerIndex":1,"explanation":"Off-center strikes ('gear effect') twist the clubhead around its own center of mass instead of driving straight through the ball, bleeding energy into head rotation rather than ball speed. A strike roughly 3/4 in (19mm) off-center can cost several mph of ball speed and 0.05-0.15+ of smash factor even with technically perfect delivery angles — exactly why TrackMan treats smash factor as the best on-screen proxy for center-face contact."}]}
  </script>
  <script type="application/json" id="lesson-ball-speed">
{"parameter":"Ball Speed","oneLiner":"Ball speed is how fast the ball is travelling the instant it leaves the clubface — club speed multiplied by smash factor — and it is the single biggest lever on how far every shot flies.","whatItIs":"Ball speed is exactly what it sounds like: how fast the ball is travelling in the instant it leaves the clubface, in mph. It is not the same thing as club speed — club speed is how fast the club itself was moving, and ball speed is always some multiple of that, because a struck ball briefly compresses against the face and springs back faster than the club that hit it. That multiplier is called smash factor (ball speed / club speed), and Flightglass's engine states the whole relationship as literally as possible: ballSpeed = clubSpeed x smashEff. A flush 7-iron at 90 mph of club speed makes about 119-120 mph of ball speed (smash ~1.33); a flush driver near 113 mph of club speed makes about 167 mph of ball speed (smash ~1.48) — a higher multiplier, because a driver face is legally allowed to be springier than an iron's solid face. Ball speed is a magnitude only — it says nothing about direction (that's face angle, club path and spin axis' job) — but it is the single biggest input to how far the ball goes: more ball speed almost always means more carry, a higher apex, and (through backspin) more aerodynamic lift, which is why every serious swing-speed or ball-speed training plan targets this number first.","components":[{"name":"Club speed","role":"The raw energy input — how fast the clubhead is moving at impact. This is the widest-ranging number in the whole equation and the one a golfer trains for directly.","typicalRange":"7-iron: recreational ~75-85 mph, PGA Tour ~90 mph. Driver: high-handicap ~80-90 mph, recreational average ~93-94 mph, PGA Tour ~113-114 mph, LPGA Tour ~94 mph, World Long Drive 150+ mph."},{"name":"Smash factor (strike efficiency)","role":"The multiplier: ball speed / club speed. Measures how much of the clubhead's energy actually transfers to the ball. In the engine it is spin-loft-responsive: smashEff = clamp(1.46 - 0.004 x spinLoft, 1.15, 1.42) for the 7-iron preset — a more glancing strike lowers it.","typicalRange":"7-iron ~1.30-1.38 (engine model floors at 1.15, ceilings at 1.42). Driver ~1.45-1.50 on tour; can collapse to ~1.00-1.20 on a heel/toe mishit."},{"name":"Spin loft (dynamic loft minus attack angle)","role":"The hidden lever behind smash factor. It is not in the ballSpeed formula directly, but it is the exact quantity smashEff is a function of — raise spin loft and smash (and therefore ball speed) falls, even at unchanged club speed.","typicalRange":"7-iron ~30-35°, driver ~11-15°."},{"name":"Club/ball construction and the COR limit","role":"Sets the smash-factor ceiling for a given club, fixed by the legal coefficient-of-restitution (spring-face) limit — not something a single swing changes. This is why a driver and an iron can never reach the same smash factor even on an identically pure strike.","typicalRange":"USGA/R&A COR limit 0.830 for drivers (irons get no COR bonus — solid face). Physics-derived theoretical smash ceiling ≈1.488 for a ~200 g driver head against a ~45.93 g ball."},{"name":"Temperature / ball warmth","role":"A small, real-world modifier not wired into this engine build (solveFlight takes no temperature input). A warmer ball's core rebounds slightly more efficiently (higher ball-side COR).","typicalRange":"Roughly +1 mph of ball speed across a large ball-temperature swing (estimate, real-world equipment testing) — far smaller than club speed or smash-factor effects, and separate from air density's much larger effect on carry (covered in the Carry lesson)."}],"howTheyConnect":"Contact between clubface and ball lasts under half a millisecond, and in that instant only part of the clubhead's kinetic energy can physically transfer to the ball. Grounded in the numbers: at PGA Tour-average figures (113.8 mph clubhead = 50.87 m/s, ~200 g driver head; 167 mph ball = 74.66 m/s, ~45.93 g ball) the clubhead carries about 258.8 J of kinetic energy and the ball leaves with about 128.0 J — a transfer efficiency of roughly 49.5%, essentially half. The rest stays in the clubhead, which keeps moving forward (slowed) after impact. How much of that available energy reaches the ball is exactly what smash factor measures, and it is capped by a real physical limit. For a two-body collision with coefficient of restitution e and masses M (club) and m (ball), the classic result is ballSpeed = clubSpeed x (1+e) x M/(M+m). Plugging in the USGA/R&A's legal driver spring-face limit (COR <= 0.830) with a 200 g head and a 45.93 g ball gives (1+0.83) x 200/245.93 = 1.488 — matching almost exactly the ~1.48-1.50 smash factor tour pros actually produce with a driver. Irons get no COR bonus (their faces are solid, not a legal \"trampoline\"), which is the real reason a flush 7-iron tops out around 1.33-1.38 smash instead of 1.48: the ceiling is different by club, not just the swing. Within that ceiling, Flightglass's engine adds a second, swing-dependent layer: smashEff = clamp(1.46 - 0.004 x spinLoft, 1.15, 1.42), so a more glancing strike (higher spin loft = dynamic loft minus attack angle) trades ball speed for backspin. At a fixed 90 mph club speed, moving spin loft from 25° to 45° drops smashEff from 1.36 to 1.28 and ball speed from 122.4 to 115.2 mph — a real, swing-to-swing self-limiter meaning simply swinging harder does not always translate into proportionally more ball speed if the strike gets more glancing at the same time. Put the two layers together and ballSpeed = clubSpeed x smashEff is the whole story: club speed supplies the energy, smash factor (bounded above by club/ball construction, tuned below that by strike quality and spin loft) decides what fraction of it survives the hit. Everything downstream in the dependency graph — backspin, carry, apex — inherits ball speed as its dominant input, which is why it sits at
