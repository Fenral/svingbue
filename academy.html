ing a range session — attack quietly steepens ~1° per inch until strikes feel \"trapped\"","The fairway-wood off a tight lie that only works when the low point is barely ahead — the geometry's narrow Pure window at small x, made visible","A \"steep\" swing diagnosed on video that is really a ball position problem — the circle is fine, the stone moved"],"whatItMeansForYou":"Stop thinking of attack angle as something your hands do at impact and start thinking of it as somewhere the bottom of your circle sits. With irons, that bottom belongs a hand-width ahead of the ball; move the ball, not your swing, and watch the attack readout follow at about a degree per inch. When a strike pattern changes overnight, ask \"where is my bottom?\" before asking \"what is wrong with my swing?\"."},"misconceptions":["\"Attack angle is created at impact with the hands.\" It is set by where the low point sits, decided at address and by the swing's overall shape — the engine computes it from lowPoint.x and plane alone; nothing hand-shaped is in the formula.","\"Hitting down means the low point is AT the ball.\" Backwards — hitting down means the low point is AHEAD of the ball; the club passes the ball on its way down to a bottom that comes later.","\"More forward low point is always better ball-striking.\" Only inside the window. At z = 0 the engine blades the ball (Thin, contact at the equator) once the low point passes ~25 cm ahead — steep and thin are neighbours.","\"The low point is where the divot is deepest, so it's behind the ball on good strikes.\" On a good iron strike the low point (and the whole divot) is ahead of the ball — ball first, then turf.","\"A degree of attack angle needs a big swing change.\" ~1° per inch of ball position (engine-run 0.39°/cm) — it is one of the cheapest numbers in golf to move.","\"Low point and attack angle are the same thing.\" One is a place (cm), the other is a direction (degrees) read off that place; lesson 2 shows a third quantity (depth) that moves neither."],"wolframChecks":["thetaAtImpact/deriveImpact sweep, plane 55°, z 0: x −6 cm → attack +2.35°, x 0 → 0.00°, x +2 → −0.78°, x +10.5 → −4.11°, x +15 → −5.88°, x +25 → −9.83° (Thin, contact +0.3 mm above equator), x +30 → −11.82° (Whiff)","slope check: (−5.88 − (−0.78))/13 cm = 0.392°/cm ≈ 1.00°/inch — the range rule of thumb, derived","path coupling: same sweep, clubPath +0.55° (x +2) → +2.88° (x +10.5) → +4.13° (x +15) — deriveImpact's swingDirection term held at 0","band flips (strikeQuality, z=0): x < 0 → Fat (low point behind), x 0..+2 → Thin (\"not far enough ahead\" — engine-run: Thin at exactly x 0), +2..+15 → Pure, +18..+25 → Thin, ≥ +30 → Whiff — matches LP_AHEAD_MIN/MAX 0.02/0.15","sanity: arcPosition(thetaAtImpact(state), state) lands at the ball (x = y = 0.0 mm) for swing directions −6, 0, +5 — the address-compensated lpWorld() keeps impact at the ball, so every drawn number belongs to the same strike"],"quiz":[{"q":"In the engine, what single input does thetaAtImpact() use to locate the ball on the swing's circle?","options":["The golfer's grip pressure","The low point's position along the target line (lowPoint.x)","The club's loft","The depth of the divot"],"answerIndex":1,"explanation":"theta = asin(−effectiveLpx/R). Grip and loft never enter; depth (z) belongs to the next lesson and moves contact, not angle."},{"q":"A well-struck 7-iron hits down about 4°. Where is the low point?","options":["Exactly at the ball","About 10 cm ahead of the ball","About 10 cm behind the ball","Wherever the hands release"],"answerIndex":1,"explanation":"Engine-run: x +10.5 cm → −4.11° at the default 55° plane. Down means the bottom comes AFTER the ball."},{"q":"Roughly how much attack angle does one inch of ball position buy?","options":["~1°","~5°","~0.1°","It depends only on swing speed"],"answerIndex":0,"explanation":"0.39°/cm engine-run = ~1.0°/inch. Speed is nowhere in the geometry."},{"q":"You keep pushing the low point further and further ahead of the ball (depth unchanged). What does the engine eventually do?","options":["The strike gets purer forever","The ball is bladed — contact climbs to the equator and the band flips to Thin","The attack angle stops changing","The divot gets deeper"],"answerIndex":1,"explanation":"At x +25 cm (z = 0) contact height reaches +0.3 mm above the equator — Thin at −9.8° attack. Steep and thin are neighbours."},{"q":"Moving the low point ahead also nudges which other delivery number, according to the same circle geometry?","options":["Club path (slightly more in-to-out)","Clubhead speed","Face angle","Ball compression"],"answerIndex":0,"explanation":"Engine-run: path +0.55° → +4.13° as x goes +2 → +15 cm (swing direction fixed 0). Attack and path are two shadows of one place on the circle."}]}
  </script>
  <script type="application/json" id="lesson-strike-depth">
{"parameter":"Strike Depth","oneLiner":"Depth is the forgotten axis of the low point: how far below (or above) the turf the bottom of your circle sits. It decides what you hit — turf first, ball first, equator, or air — and it never changes your attack angle by even a tenth of a degree.","whatItIs":"Strike depth is lowPoint.z — the height of the arc's bottom relative to the ground. Where lesson 1's x-axis answered \"down or up?\", the z-axis answers \"how much ball, how much earth?\". The engine keeps the two jobs perfectly separate: deriveImpact() (attack angle) never reads z at all — engine-run, attack is −4.11° whether the bottom sits 30 mm below the turf or 30 mm above it — while clubBallContact() moves the contact point on the ball exactly one millimetre per millimetre of depth (clubZ = lowPoint.z + lift). Between the two extremes lives every strike you know: bottom far below turf = the club is underground at the ball (Fat, then Duff); bottom just below = ball first, then a divot ahead (Pure); bottom above the turf = a clean pick with no divot at all — which, and this is the part almost everyone has backwards, can still be a steeply descending blow. The divot is testimony about the arc's DEPTH; it says nothing about the arc's DIRECTION at the ball.","components":[{"name":"lowPoint.z — the depth dial","role":"Moves contact height 1:1: clubZ = z + lift(θ). Engine-run at x +10.5/plane 55: z −30 mm → Duff, −25..−4 → Fat, −2..+15 → Pure, +18..+25 → Thin, +30 → Whiff. Every band edge is just the contact tick crossing a line on the ball.","typicalRange":"playable window ≈ −8 mm (deepest ball-first, far-forward low point) to +15 mm (still Pure); the Geometry screen's slider allows ±20 cm"},{"name":"lift(θ) — how much the arc has climbed at the ball","role":"Because the ball sits BEFORE the bottom (lesson 1), the club is still above its own low point when it arrives: lift = R(1−cosθ)sinφ. Engine-run lift table (plane 55): low point +2 cm ahead → 0.1 mm of lift, +8 → 2.2 mm, +10.5 → 3.8 mm, +15 → 7.7 mm. Lift is the divot budget: it is exactly how deep the bottom may sit below turf while the BALL is still struck cleanly.","typicalRange":"0–8 mm across the Pure window"},{"name":"The divot pair (entry/exit)","role":"Where the arc crosses the turf: groundCrossingTheta0() gives ±θ₀; entry before the bottom, exit after. Engine-run: x +10.5, z −2 mm → divot starts +2.8 cm AFTER the ball, 15.4 cm long — the tour pattern; x +2, z −4 mm → starts 8.8 cm BEHIND the ball — the fat. Same depth axis, opposite stories, because x decides where the dip lands.","typicalRange":"good iron strike: entry 0–5 cm after the ball; model depths are mm-scale (see honesty note)"},{"name":"Contact height on the ball (the \"height\" of the title)","role":"clubBallContact().offset = clubZ − ball radius, the tick on the ball face. −21.3 mm = struck at the very bottom, 0 = equator (blade), above = whiff. This — not divot depth — is what \"hitting down on the ball\" actually moves.","typicalRange":"Pure band: contact 2.5–19.5 mm below the equator (offset −19.5..−2.5 mm engine-run at x +10.5)"}],"howTheyConnect":"Hold the picture from lesson 1 — the wheel and the stone — and now raise or lower the whole wheel. Nothing about \"down or up at the stone\" changes: the rim arrives at the same angle whether the wheel's bottom hangs a centimetre into soft ground or floats a centimetre above it. The engine proves the separation exactly: attack angle at z −30, 0 and +30 mm is −4.11°, −4.11° and −4.11°. What DOES change is what the rim meets. Lower the wheel and the contact point slides down the ball millimetre for millimetre until the rim is below the grass at the ball — turf first, fat. Raise it and contact slides up the ball toward the equator — thin, then air. The two pearls of this chapter both live here. Pearl one: a DEEP bottom does not mean hitting far down ON the ball, because x sets how much of that depth has already been climbed away when the club reaches the ball. Engine-run: a −4 mm bottom at x +10.5 strikes at −0.2 mm (leading edge a hair under the grass), and a −6 mm bottom at x +13 strikes at the SAME −0.2 mm — half again more divot depth, identical height on the ball. Divot depth and strike height are different measurements of different things. Pearl two, the inverse: NO divot does not mean a shallow blow. Put the bottom 2 mm ABOVE the turf with the low point 15 cm ahead and the engine reports attack −5.88° — steeper than the tour 7-iron average — with zero turf contact and a Pure band. A clean picker can be the steepest hitter on the range; the grass just never got to testify. And the fat you feel when the bottom is barely ahead of the ball is the same geometry running backwards: at x +2 the divot budget is 0.1 mm — the club has essentially no lift left at the ball, so ANY depth at all digs in behind it (engine-run: z −4 at x +2 → entry 8.8 cm behind the ball). Depth chooses what you hit; x chooses where the dip lands; the angle was never up for negotiation.","hierarchy":[{"driver":"lowPoint.z","weight":"total control of contact height — 1.000 mm per mm (clubZ = z + lift, engine identity)","why":"It is an additive term. The band chip is a pure function of where the tick lands."},{"driver":"lowPoint.x (via the lift budget)","weight":"sets how much depth is survivable — budget 0.1 mm at x +2 cm up to 7.7 mm at x +15 (engine lift table)","why":"Ball-first requires clubZ ≥ 0 at the ball, i.e. z ≥ −lift(θ). Forward low point = bigger budget = deeper clean divots."},{"driver":"Attack angle","weight":"ZERO influence in either direction — depth does not move attack (−4.11° at any z) and attack does not require turf (Pure at z +5 mm)","why":"deriveImpact() and groundCrossingTheta0() share no variable except through x and plane. The divot and the angle are witnesses to different events."}],"realWorld":{"tourBenchmarks":["Tour iron divots start AFTER the ball — the model reproduces the pattern at x +10.5, z −2 mm: divot entry +2.8 cm past the ball, exit +18.2 cm (a bacon-strip ~15 cm long)","Plenty of elite players are \"pickers\" — clean, divotless iron strikes with completely normal descending attack angles; TrackMan classes them by low point ahead, not by turf taken","The engine's own Pure window tops out at a 7.7 mm model divot — real divots read deeper (1–2 cm) because a real sole passes below the ball while the FACE strikes it; the point-club model compresses that (honesty note G-1)"],"scenarios":["Range mats hiding a fat pattern: the mat pays the depth penalty the turf would — the bottom sits below \"grass\" but the club skids instead of digging. Same z, kinder surface","\"I took no divot so I must have picked it clean/shallow\" — the picker with a steep, perfectly fine strike (pearl b), and the scooper who ALSO takes no divot but with the bottom behind the ball: same missing divot, opposite geometry","Wet vs firm turf changing effective depth: soft ground effectively raises z's cost — the same swing that brushed dry turf digs on soggy ground"],"whatItMeansForYou":"Read your strikes as two separate dials. The divot (its start point and existence) reports your DEPTH and your x; the flight's steepness reports your x and plane. When contact is heavy, you don't necessarily \"swing too steep\" — your circle's bottom may simply sit too low, or not far enough ahead. And when you take no divot at all, don't assume shallow: check where the strike met the ball. Fixing the right dial is the difference between a setup adjustment and six months of rebuilding a swing that was never broken."},"misconceptions":["\"A deep divot means I hit steeply down on the ball.\" Divot depth is z; attack is x-and-plane. Engine: −4 mm and −6 mm bottoms both strike the ball at −0.2 mm when x compensates — more earth, same ball.","\"No divot = shallow attack angle.\" The engine's cleanest counterexample: bottom 2 mm above turf, low point 15 cm ahead → attack −5.88°, no turf, Pure. The divot testifies about depth, never direction.","\"Hitting down digs the club into the ground, so hitting down causes fat shots.\" Fat is depth-behind-the-ball. A steeper descending strike with the bottom well ahead takes turf AFTER the ball; the fat happens when the bottom (however shallow) sits barely ahead or behind.","\"The strike bands (Pure/Thin/Fat) are judgements about my swing.\" They are a ruler on the ball: the engine flips band exactly when the contact tick crosses a line (turf level, equator, 1.4 ball-radii). Move z one millimetre across an edge and the word changes.","\"To stop blading it, help the ball up.\" Thin contact = tick too high = bottom too high (or x too far forward). Raising the hands raises the bottom further. The fix is down and/or less far forward — the opposite instinct.","\"Divots should start at the ball.\" At the ball is the boundary case; the tour pattern starts 2–5 cm after it (engine: +2.8 cm at the ideal x, 2 mm depth). Starting AT or BEFORE the ball is the first warning of a depth/x budget problem."],"wolframChecks":["invariance: deriveImpact attack = −4.11° at lowPoint.z ∈ {−0.030, 0, +0.030} m (x +10.5 cm, plane 55°) — identical, structurally: deriveImpact() has no z term at all","contact 1:1: clubBallContact clubZ at z −10/0/+10 mm = −6.2/+3.8/+13.8 mm — slope exactly 1 mm/mm; offset vs ball equator −27.5/−17.5/−7.5 mm","band ladder at x +10.5: z −30 Duff · −25 Fat(edge) · −4 Fat (clubZ −0.2) · −2 Pure (divot +2.8..+18.2 cm) · +15 Pure (offset −2.5) · +18 Thin (offset +0.5) · +30 Whiff (clubZ 33.8 > 1.4·ball radius 29.8)","pearl (a) triple: (x+10.5, z−4) clubZ −0.2 mm & (x+13, z−6) clubZ −0.2 mm — deeper bottom, same strike height; (x+2, z−4) clubZ −3.9 mm, turf entry −8.8 cm (fat) — same depth, budget blown","pearl (b) triple: (x+15, z+2) attack −5.88°, groundCrossingTheta0 = null (no turf), band Pure 79; inverse (x+15, z−7.7) attack −5.88°, divot 0→+30 cm, 7.7 mm deep, Pure 70","lift budget table: deepest ball-first z = −0.1/−0.9/−2.2/−3.8/−5.8/−7.7 mm at x +2/+5/+8/+10.5/+13/+15 cm (clubZ(z=0) per x — engine-run)"],"quiz":[{"q":"In the engine, what happens to attack angle when you move the low point 3 cm deeper into the turf (x unchanged)?","options":["It gets ~3° steeper","Nothing — exactly 0.0° of change","It gets shallower as the club decelerates","It depends on club speed"],"answerIndex":1,"explanation":"deriveImpact() never reads lowPoint.z. Engine-run: −4.11° at z −30, 0 and +30 mm. Depth moves WHAT you hit, not the angle you arrive at."},{"q":"Player A's circle bottoms 4 mm under the turf, 10.5 cm ahead of the ball. Player B's bottoms 6 mm under, 13 cm ahead. Who strikes lower on the ball?","options":["B — deeper bottom means hitting further down on the ball","Neither — both strike at the same height (engine: −0.2 mm for both)","A — shallower divots always strike lower","Cannot be known without swing speed"],"answerIndex":1,"explanation":"clubZ = z + lift(x): B's extra 2 mm of depth is paid for by 2 mm more lift from the more-forward bottom. Divot depth and strike height are different measurements — the owner's pearl, computed."},{"q":"A golfer never takes a divot. What does that tell you about their attack angle?","options":["It must be shallow or level","It must be positive (hitting up)","Nothing — the engine shows −5.9° down with zero turf contact (bottom 2 mm above the grass, 15 cm ahead)","They must be topping the ball"],"answerIndex":2,"explanation":"The divot testifies about the arc's DEPTH, not its DIRECTION. A picked strike from a bottom just above the turf can be steeper than the tour average — Pure band, no grass harmed."},{"q":"Why does the tour divot start AFTER the ball?","options":["Because the club bounces off the ball first","Because the arc's bottom — and therefore its below-turf dip — sits ahead of the ball","Because tour players hit up on their irons","It doesn't — good divots start at or behind the ball"],"answerIndex":1,"explanation":"Engine-run: x +10.5, z −2 mm → turf entry +2.8 cm past the ball, exit +18.2 cm. Ball first at −4.1° down, then the dip."},{"q":"Same 4 mm depth, but the low point only 2 cm ahead of the ball. The engine says:","options":["Pure — depth is fine at any x","Fat — turf entry 8.8 cm BEHIND the ball, because the lift budget at x +2 is only 0.1 mm","Thin — less forward always thins it","Whiff"],"answerIndex":1,"explanation":"Ball-first needs z ≥ −lift(x). The budget grows with x: 0.1 mm at +2 cm, 3.8 mm at +10.5, 7.7 mm at +15. Depth is only survivable when the bottom is far enough ahead."}]}
  </script>
  <script type="application/json" id="lesson-plane-coupling">
{"parameter":"Plane Coupling","oneLiner":"Plane, swing direction and low point are not three settings — they are one linked system. Turn any one of them and the engine moves your real, effective low point for you, whether you meant it or not.","whatItIs":"The x-axis low point you learned in lesson 1 is where the bottom sits if you swing straight down the line. Rotate the swing direction and the whole tilted circle rotates with it — and because the circle is tilted (the plane), rotating it slides the bottom along the target line. The engine does this bookkeeping in one line, effectiveLpx(): xLP(effective) = lowPoint.x − swingDirection · R·cos(plane)·π/180. The coupling constant R·cos(plane) is the part worth tattooing somewhere: it says the FLATTER your plane, the more every degree of swing direction drags your low point around — engine-run: 1.48 cm per degree at a 45° plane, 1.20 at 55°, only 0.72 at 70°. Plane also has the direct effect from lesson 1 (steeper plane = more attack per cm, ~+0.05°/° of plane) and it sets the lift budget from lesson 2. Which is why the chapter ends here: x, z and plane are not tuned separately. A change of swing direction that means nothing on a steep plane can silently move a flat-plane player's bottom from \"hand-width ahead\" to \"behind the ball\" — same ball position, same feel, completely different strike.","components":[{"name":"The coupling constant R·cos(plane)","role":"How many cm of low point one degree of swing direction is worth. Engine-run: 1.481 cm/° (plane 45), 1.201 (55), 0.716 (70). Flat planes pay the steepest exchange rate.","typicalRange":"0.7–1.5 cm per degree over the instrument's 45–70° plane range"},{"name":"Swing direction (dir)","role":"Positive = in-to-out. It shifts the effective bottom BACKWARD (a positive dir subtracts from xLP): swing out to right field and your bottom arrives earlier. Engine-run at plane 45, x +10.5: dir +8 → effective x −1.3 cm (behind the ball!), attack +0.46°, Fat. The same +8 at plane 70 keeps +4.8 cm, −2.14°, Pure.","typicalRange":"±8° on the instrument; ±4° covers most real patterns"},{"name":"Out-to-in, the other direction","role":"Negative dir ADDS effective low point and steepens everything: plane 45, dir −8 → effective x 22.3 cm, attack −7.57°, band Thin (contact riding up the ball). The classic over-the-top strike — steep, forward-bottomed, prone to thin/heel — emerges from pure geometry with no \"swing flaw\" narrative needed.","typicalRange":"each −1° of direction ≈ +0.7..1.5 cm of effective low point, by plane"},{"name":"Plane's own two dials (recap)","role":"Direct: same x reads steeper on a steeper plane (engine-run at x +10.5: −3.22° at 40°... −4.72° at 70°, ~+0.05°/°). Budget: steeper plane lifts the club more at the ball (clubZ 3.0 → 4.3 mm across 40→70°), slightly widening the clean-divot window. Plane is a multiplier on both earlier lessons.","typicalRange":"45–70° on the instrument; engine default 55°"}],"howTheyConnect":"Picture the tilted hula-hoop of your swing lying at its plane angle, its lowest point marked with chalk. Now rotate the whole hoop a few degrees to the right, as an in-to-out swinger does. The chalk mark doesn't stay put — it slides around the hoop, and because the hoop is tilted, \"around the hoop\" has a component ALONG the target line. That slide is the coupling, and its size is R·cos(plane): a flat hoop's bottom lives far from the pivot horizontally, so rotation swings it a long way (1.48 cm/°); a steep hoop's bottom sits nearly under the pivot, so the same rotation barely moves it (0.72 cm/°). Everything the chapter taught now runs through this one line. The engine's own numbers, low point held at +10.5 cm with a 2 mm turf brush: a flat-plane player (45°) who starts swinging +8° in-to-out watches the effective bottom move to 1.3 cm BEHIND the ball — attack flips to +0.5°, the divot jumps behind the ball, the band reads Fat — while nothing about their ball position or depth changed. The steep-plane player (70°) making the identical direction change keeps the bottom 4.8 cm ahead and stays Pure. Run it the other way and the over-the-top move (−8° at 45°) piles up 22.3 cm of effective low point: attack −7.6°, contact climbing the ball, Thin. This is what \"must cohere\" means: x, z, plane and direction are four inputs to ONE circle, and the strike bands only reward combinations that agree. It is also why the same swing-direction tip helps one golfer and wrecks another — the exchange rate depends on the plane they brought with them.","hierarchy":[{"driver":"Swing direction × the coupling (dir · R·cos φ)","weight":"dominant mover of the EFFECTIVE low point — up to ±12 cm across the ±8° slider on a flat plane (engine-run: effLpx 22.3 → −1.3 cm at plane 45)","why":"It is the only term in effectiveLpx() besides x itself. On flat planes it can outmuscle deliberate ball-position changes."},{"driver":"Plane angle (as the exchange-rate setter)","weight":"halves the coupling across the slider range (1.48 → 0.72 cm/° from 45° to 70°)","why":"cos(plane) — the flat plane's bottom sits far from the pivot horizontally; rotation moves it more."},{"driver":"Plane angle (direct steepness)","weight":"secondary — ~+0.05° attack per degree of plane at fixed x (−3.55° → −4.72° across 45–70°)","why":"vz = sinθ·sinφ, the lesson-1 multiplier; real but a third of the ball-position lever."}],"realWorld":{"tourBenchmarks":["TrackMan's classic pairing: out-to-in swings measure steeper attack, in-to-out swings shallower — the engine derives it (dir −8 → −7.6°, dir +8 → +0.5°, plane 45, same ball position) rather than asserting it","Flat-plane \"rotary\" players are famously sensitive to start-direction changes turning into contact changes; upright players get away with more — the cos(plane) exchange rate, named","The fitter's cross-check: a player who \"suddenly hits it fat\" after learning to draw the ball (in-to-out shift) hasn't lost their swing — their effective low point moved back ~1–1.5 cm per degree of direction change"],"scenarios":["The draw project that turned into fat shots: +4° of new in-to-out at a 45° plane = the bottom ~6 cm earlier. The fix is a ball-position/x compensation, not abandoning the draw","The over-the-top slicer's deep, ball-side divots and occasional thins: −6° direction at a flattish plane piles ~9 cm ONTO the effective low point — steep AND thin-prone at once (engine: Thin at effLpx 22.3 cm)","Why one range tip (\"swing more right\") fixes a steep friend and buries yours: different planes, different exchange rates"],"whatItMeansForYou":"When you change one of the three — plane, direction, or low point — assume the other two moved and go look. The instrument's Geometry screen shows all four numbers live; the cheapest habit in this chapter is checking the EFFECTIVE low point readout after any direction change. If you swing in-to-out on a flatter plane, your real bottom lives closer to the ball than your setup says — budget for it with ball position before you blame your contact."},"misconceptions":["\"Swing direction only changes where the ball starts, not how I strike it.\" Direction moves your effective low point 0.7–1.5 cm per degree (plane-dependent). At a flat plane, +8° in-to-out relocates the bottom behind the ball — a Fat, from a direction change alone.","\"Steep plane = steep attack = digging.\" Partly true (−0.05°/° direct effect) but the steep plane is the STABLE one under direction changes (0.72 vs 1.48 cm/°) and carries a bigger lift budget at the ball. Steepness where it matters is mostly x, not plane.","\"In-to-out is the shallow, safe pattern.\" Shallower in angle, yes (engine: +8° dir → attack +0.46°) — but it drags the bottom BACK, which is the fat direction. Safe only if ball position compensates.","\"Over-the-top means fat shots.\" Usually the opposite: out-to-in ADDS effective low point ahead (engine: 22.3 cm at −8°/plane 45) — steep contact climbing the ball: thin, not fat, is its signature miss.","\"These   function seed(){

    return { version:1, xp:0, lessons, unlocked:[], badges:[], lastOpened:null };

  let store = load();
  function load(){
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return seed();
      const p = JSON.parse(raw);
      if (!p || p.version !== 1 || !p.lessons) return seed();
      const base = seed();
      // Merge any saved per-lesson progress; fill in modules added since the save (robust migration).
      const lessons = {};
      for (const id of LESSON_IDS) {
        const savedLesson = p.lessons[id] || {};
        lessons[id] = { ...base.lessons[id], ...savedLesson,
          journey:mergeLessonJourney(savedLesson.journey)
        };
      }
      return { ...base, ...p, lessons,
        unlocked: Array.isArray(p.unlocked)?p.unlocked:base.unlocked, badges: Array.isArray(p.badges)?p.badges:[] };
    } catch(e){ return seed(); }
  }

    if (!lesson) return freshLessonJourney();
    const current = getJourney(id);
    const nextPatch = patch && typeof patch === 'object' ? patch : {};
    const myths = Array.isArray(nextPatch.myths)
      ? current.myths.map((value, index) => nextPatch.myths[index] === undefined
        ? value
        : Boolean(nextPatch.myths[index]))
      : current.myths;
    lesson.journey = mergeLessonJourney({
      ...current,
      ...nextPatch,
      mission:nextPatch.mission
        ? { ...current.mission, ...nextPatch.mission }
        : current.mission,
      myths
    });
    if (immediate) saveNow(); else save();
    return lesson.journey;
  }

  function recomputeUnlocks(){
    if (SLICE_MODE){
      // Dependency-graph progression, restricted to AUTHORED modules: the five
      // Fundamentals are graph ROOTS (no predecessors) → available from the start;
      // any authored module whose AUTHORED predecessors are all complete also unlocks.
      // Predecessors are filtered to AUTHORED and to NON-environment tiers: the three
      // Environment nodes are graph SOURCES that modify the Outcomes, so they must never
      // gate an Outcome/Derived module — they unlock as their own capstone chain below.
      for (const n of GRAPH.nodes){
        if (!AUTHORED[n.id]) continue;
        if (NODE[n.id].tier === 'environment') continue;   // Environment handled by the chain below
        const preds = GRAPH.edges.filter(e => e.to === n.id).map(e => e.from).filter(p => AUTHORED[p] && NODE[p].tier !== 'environment');
        const ready = preds.length === 0 || preds.every(p => store.lessons[p] && store.lessons[p].completed);
        if (ready && !store.unlocked.includes(n.id)) store.unlocked.push(n.id);
      }
      // Backspin & Carry ship pre-unlocked as demo modules (their derived predecessors
      // aren't authored in this slice), preserving the original slice behaviour.
      for (const id of ['backspin','carry']) if (!store.unlocked.includes(id)) store.unlocked.push(id);
      // Environment capstone chain: this tier modifies the Outcomes, so it opens once
      // Carry (the central outcome it rescales) is mastered, then unlocks node-by-node —
      // altitude → wind → temperature — mirroring "complete a lesson, unlock the next".
      let envGate = !!(store.lessons.carry && store.lessons.carry.completed);
      for (const id of ['altitude','wind','temperature']){
        if (envGate && !store.unlocked.includes(id)) store.unlocked.push(id);
        envGate = envGate && store.lessons[id] && store.lessons[id].completed;
      }
      return;
    }
    for (const n of GRAPH.nodes){
      const preds = GRAPH.edges.filter(e => e.to === n.id).map(e => e.from);
      const ok = preds.length === 0 || preds.every(p => store.lessons[p] && store.lessons[p].completed);
      if (ok && !store.unlocked.includes(n.id)) store.unlocked.push(n.id);
    }
  }
  function nodeState(id){
    const l = store.lessons[id];
    if (l && l.completed) return 'completed';
    if (AUTHORED[id] && store.unlocked.includes(id)) return 'available';
    return 'locked';
  }
  // "Mastered" is EARNED — quiz best ≥ 80% correct (4/5), not merely completed (aca-05).
  const MASTERY_FRAC = 0.8;
  function isMastered(id){ const l = store.lessons[id]; return !!(l && l.mastered); }
  function masteredCount(){ return Object.keys(store.lessons).filter(isMastered).length; }
  // The single next-recommended node (§3.3): the first available node with all prereqs
  // complete, preferring the successor of the last opened lesson.
  function nextNodeId(){
    const avail = [];
    for (const col of TIER_COLS) for (const id of col.ids){
      if (nodeState(id) === 'available' && prereqIds(id).every(p => store.lessons[p] && store.lessons[p].completed)) avail.push(id);
    }
    if (!avail.length) return null;
    if (store.lastOpened){
      const meta = LESSONS[store.lastOpened];
      if (meta && meta.next && avail.includes(meta.next)) return meta.next;
    }
    return avail[0];
  }

  // chain recomputeUnlocks() uses — so the copy always matches the real gate.
  function prereqIds(id){

      const chain = ['carry','altitude','wind','temperature'];
      const i = chain.indexOf(id);
      return i > 0 ? [chain[i-1]] : [];
    }
    return GRAPH.edges.filter(e => e.to === id).map(e => e.from).filter(p => AUTHORED[p] && NODE[p] && NODE[p].tier !== 'environment');
  }
  function prereqLabels(id){
    const ids = prereqIds(id);
    return ids.length ? ids.map(p => NODE[p].label).join(' and ') : 'its prerequisites';
  }

  /* ══ HELPERS ══ */
  const $ = (s, r=document) => r.querySelector(s);
  const reduced = () => window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const app = $('#app');
  const liveEl = $('#live');
  let liveT; // 260 ms settle: rapid sequences coalesce, last message wins (aca a11y contract)
  function announce(msg){ clearTimeout(liveT); liveT = setTimeout(() => { liveEl.textContent = ''; requestAnimationFrame(() => { liveEl.textContent = msg; }); }, 260); }

  /* ══ ORIENTATION NUDGE (non-blocking): Academy is orientation-FLEXIBLE. Portrait is the
     optimized reading layout; landscape stays usable (centred column). We never inert the app —
     we only surface a dismissible hint in landscape. CSS handles show/hide by orientation. ══ */
  const NUDGE_KEY = 'strikearc.academy.nudge';
  (function initNudge(){
    const nudgeEl = document.getElementById('nudge');
    if (!nudgeEl) return;
    try { if (localStorage.getItem(NUDGE_KEY) === '1') nudgeEl.classList.add('dismissed'); } catch(e){}
    const x = document.getElementById('nudge-x');
    if (x) x.addEventListener('click', () => {
      nudgeEl.classList.add('dismissed');
      try { localStorage.setItem(NUDGE_KEY, '1'); } catch(e){}
    });
  })();

  // All haptics route through sa-haptics.js (path-06 / module-anatomy §9): the shared
  // singleton handles the native Capacitor bridge AND the non-native no-op log, so
  // geometry.html / impact.html / academy stay on one contract. Kinds → table:
  //   select = slider detent / relation-select (tick) · light = card tap / verdict ·
  //   medium = tier complete · success = unlock / mastery notify · error = warning.
  function haptic(k){
    try{
      if(k==='select') saHaptics.selectionChanged();
      else if(k==='light') saHaptics.impact('light');
      else if(k==='medium') saHaptics.impact('medium');
      else if(k==='success') saHaptics.notify('success');
      else if(k==='error') saHaptics.notify('warning');
    }catch(e){}
  }

  function fmt(v, dp, commas){
    let n = dp>0 ? Number(v).toFixed(dp) : String(Math.round(v));
    if (commas) n = Number(n).toLocaleString('en-US', { minimumFractionDigits:dp||0, maximumFractionDigits:dp||0 });
    return n;
  }
  // THE signed-minus grammar for every rendered datum: '+' only when signed & positive,
  // U+2212 (never ASCII hyphen) when negative, nothing at zero.
  function signStr(v, signed){ return v<0 ? '−' : (signed && v>0 ? '+' : ''); }
  function setNum(el, to, opts){
    opts = opts || {};
    const dp = opts.dp||0, suffix = opts.suffix||'', prefix = opts.prefix||'', commas = !!opts.commas, signed = !!opts.signed;
    const from = parseFloat(el.dataset.v || '0');
    el.dataset.v = to;
    const render = v => { let core = fmt(Math.abs(v), dp, commas); return prefix + signStr(v, signed) + core + suffix; };
    if (reduced() || Math.abs(to-from) < 0.5 || isNaN(from)){ el.textContent = render(to); return; }
    if (el._raf) cancelAnimationFrame(el._raf);
    const t0 = performance.now(), dur = 180;
    const step = t => { const k = clamp((t-t0)/dur,0,1); const e = 1-Math.pow(1-k,3); const v = from+(to-from)*e; el.textContent = render(v); if (k<1) el._raf = requestAnimationFrame(step); };
    el._raf = requestAnimationFrame(step);
  }

  /* ══ BOTTOM SHEET (spec §3.2 preview / §4 node preview) — replaces the hover tooltip ══ */
  const sheetEl = $('#sheet'), scrimEl = $('#sheet-scrim');
  let sheetTrigger = null, sheetKey = null, sheetOnClose = null;
  const sheetFocusable = () => Array.from(sheetEl.querySelectorAll('button,[href],input,[tabindex]:not([tabindex="-1"])')).filter(e => !e.disabled && e.offsetParent !== null);
  function openSheet(html, opts){
    opts = opts || {};
    if (sheetKey){ document.removeEventListener('keydown', sheetKey); sheetKey = null; }   // no listener leak on re-open
    if (opts.trigger !== undefined) sheetTrigger = opts.trigger;
    else if (sheetEl.hidden) sheetTrigger = (document.activeElement && document.activeElement !== document.body ? document.activeElement : null);
    sheetOnClose = opts.onClose || null;
    sheetEl.innerHTML = html;
    sheetEl.setAttribute('aria-modal', opts.modal ? 'true' : 'false');
    if (opts.labelId) sheetEl.setAttribute('aria-labelledby', opts.labelId);
    sheetEl.hidden = false;
    requestAnimationFrame(() => { sheetEl.classList.add('open'); if (opts.modal) scrimEl.classList.add('open'); });
    const foc = sheetEl.querySelector('[data-autofocus]') || sheetFocusable()[0];
    if (foc) foc.focus({ preventScroll:true });
    sheetKey = e => {
      if (e.key === 'Escape'){ e.preventDefault(); closeSheet(); return; }
      if (opts.modal && e.key === 'Tab'){ const f = sheetFocusable(); if (!f.length) return; const a = f[0], z = f[f.length-1];
        if (e.shiftKey && document.activeElement === a){ e.preventDefault(); z.focus(); }
        else if (!e.shiftKey && document.activeElement === z){ e.preventDefault(); a.focus(); } }
    };
    document.addEventListener('keydown', sheetKey);
  }
  function closeSheet(restoreFocus, immediate){
    if (sheetEl.hidden) return;
    sheetEl.classList.remove('open'); scrimEl.classList.remove('open');
    if (sheetKey){ document.removeEventListener('keydown', sheetKey); sheetKey = null; }
    const cb = sheetOnClose, t = sheetTrigger; sheetOnClose = null; sheetTrigger = null;
    const finish = () => { sheetEl.hidden = true; sheetEl.innerHTML = ''; if (cb) cb(); if (restoreFocus !== false && t && document.contains(t)) t.focus({ preventScroll:true }); };
    if (immediate || reduced()) finish(); else setTimeout(finish, 240);
  }
  scrimEl.addEventListener('click', () => closeSheet());

  /* ══ BADGES + LEVEL ══ */
  let pendingBadges = [];   // badges awarded during current lesson finish (for completion panel)
  function awardBadges(collectInto){
    const newlyEarned = [];
    for (const b of BADGES){
      if (!store.badges.includes(b.id) && badgePredicate[b.id](store)){
        store.badges.push(b.id);
        if (collectInto) collectInto.push(b.id);
        newlyEarned.push(b);
      }
    }
    if (newlyEarned.length){
      haptic('success');
      const msg = newlyEarned.length === 1
        ? 'Badge earned: ' + newlyEarned[0].label + '. ' + newlyEarned[0].desc
        : 'Badges earned: ' + newlyEarned.map(b => b.label + ' — ' + b.desc).join(' ');
      announce(msg);
    }
  }

  /* ══ HEADER (aca-02 collapse · aca-07 gold XP · aca-19 SVG badge rail) ══ */
  function headerHTML(){
    const li = levelInfo(store.xp);
    // path-01: the old six-icon badge rail read as mystery chrome. It becomes TWO
    // labelled, real-function actions: målskive = Mastery progress (opens the progress
    // + badges sheet), kompass = Where next (routes to the recommended next lesson).
    // Badges still earn silently and live inside the Progress sheet; the star survives
    // only as the Mastered marker on completed cards.
    return `<header class="hdr" id="hdr">
      <div class="hdr-top">
        <a class="sa-strip__home" href="./index.html" aria-label="Home">

        </a>
        <div class="wordmark">FLIGHTGLASS ACADEMY</div>
        <div class="hdr-lv"><span class="lvn" id="hdr-lvline">Level ${li.lvl} · ${esc(li.title)}</span><span aria-hidden="true">·</span><span class="xp"><span id="hdr-xp" data-v="${store.xp}">${store.xp}</span> XP</span></div>
      </div>
      <div class="hdr-expand">
        <div class="xpbar" id="hdr-xpbar" role="progressbar" aria-valuemin="${li.curXp}" aria-valuemax="${li.nextXp}" aria-valuenow="${store.xp}" aria-label="Experience to next rank"><div class="fill" id="hdr-xpfill" style="width:${(li.pct*100).toFixed(1)}%"></div></div>
        <div class="pathacts" role="group" aria-label="Path actions">
          <button class="pathact" id="act-progress" type="button" aria-label="Mastery progress and badges">
            <span aria-hidden="true">${badgeIcon('range-finder')}</span><span class="pa-lbl">Progress</span></button>
          <button class="pathact" id="act-next" type="button" aria-label="Go to the recommended next lesson">
            <span aria-hidden="true">${badgeIcon('curious')}</span><span class="pa-lbl">Where next</span></button>
        </div>
      </div>
    </header>`;
  }
  function wireBadges(root){
    root.querySelectorAll('[data-badge]').forEach(b => {
      b.addEventListener('click', () => { const bd = BADGE[b.dataset.badge]; announce(bd.label + (store.badges.includes(bd.id)?' — earned. ':' — locked. ') + bd.desc); });

  /* collapse the path header on scroll → single ~58px row (aca-02) */
  let hdrTick = false;
  function onHdrScroll(){
    if (hdrTick) return; hdrTick = true;
    requestAnimationFrame(() => { const h = document.getElementById('hdr'); if (h) h.classList.toggle('collapsed', window.scrollY > 80); hdrTick = false; });
  }
  window.addEventListener('scroll', onHdrScroll, { passive:true });

  /* ══ ROUTER ══ */
  function go(hash){ if (location.hash === hash) route(); else location.hash = hash; }
  function focusMainHeading(){
    const h1 = app.querySelector('h1');
    if (!h1) return;
    if (!h1.hasAttribute('tabindex')) h1.setAttribute('tabindex', '-1');
    h1.focus({ preventScroll:true });
  }
  let hasRoutedOnce = false;
  function route(){
    closeSheet(false, true);   // a sheet must never survive a route change (browser back etc.)
    const h = location.hash || '#/path';
    const m = h.match(/^#\/lesson\/([\w-]+)$/);
    if (h.indexOf('#/proto') === 0) renderProto();   // hidden dev gallery of the archetypes (not linked in the path)
    else if (m && LESSONS[m[1]]) renderLesson(m[1]);
    else renderPath();
    window.scrollTo(0,0);
    // Move focus to the new view's heading on every SPA route change, but not on the very
    // first paint — that would rob keyboard users of the skip link as their first Tab stop.
    if (hasRoutedOnce) focusMainHeading();
    hasRoutedOnce = true;
  }
  window.addEventListener('hashchange', route);

  /* ══ ARCHETYPE GALLERY (dev-only, #/proto) ══
     A hidden preview of every reusable diagram archetype with a demo config, so a
     build agent can see each one live before wiring a lesson to it. Not linked in

  const PROTO_CONFIGS = {

        {key:'aa', label:'Attack angle', min:-8, max:8, step:1, value:-3, bind:'attackAngle', unit:'°', unitSpoken:'degrees', signed:true},
        {key:'cs', label:'Club speed', min:70, max:130, step:1, value:90, bind:'clubSpeed', unit:' mph', unitSpoken:'miles per hour'},

      engineSliders:[
        {key:'cs', label:'Club speed', min:70, max:130, step:1, value:90, bind:'clubSpeed', unit:' mph', unitSpoken:'miles per hour'},
        {key:'dl', label:'Dynamic loft', min:10, max:55, step:1, value:30, bind:'dynamicLoft', unit:'°', unitSpoken:'degrees'},
        {key:'aa', label:'Attack angle', min:-8, max:8, step:1, value:-3, bind:'attackAngle', unit:'°', unitSpoken:'degrees', signed:true},
      ],
      bars:[
        {name:'Spin loft', est:false, unit:'rpm', value:f=>f.spinLoft*f.ballSpeed*1.8*0.6, why:'Dynamic loft minus attack angle — the dominant geometric lever on backspin.'},
        {name:'Ball speed', est:false, unit:'rpm', value:f=>f.ballSpeed*33*1.8*0.4, why:'For a fixed spin loft, backspin is near-linear in ball speed.'},
        {name:'Friction / strike', est:true, unit:'idx', value:()=>40, why:'The on/off gate — clean dry contact is near-maxed and invisible; a flyer strips 20–50%.'},
        {name:'Air / altitude', est:true, unit:'idx', value:()=>12, why:'Does not change face spin; only reshapes what the spin does in flight.'},
      ],
    },
  };
  function renderProto(){
    document.title = 'Archetype gallery — Flightglass Academy';

      <div class="path-intro"><div class="kicker">Dev · not linked in the mastery path</div>
      <h1>Archetype Gallery</h1>
      <div class="slice">${names.length} reusable portrait diagram archetypes, each mounted with a demo config.</div></div>
      <div class="lesson-body" id="proto-body"></div></div>`;
    const body = $('#proto-body');
    names.forEach(name => {

      sec.className = 'sect in'; sec.style.paddingTop = '18px';
      sec.innerHTML = `<div class="sect-k">${esc(name)}</div><div class="vignette" id="proto-${name}"></div>`;
      body.appendChild(sec);
      try { ARCHETYPES[name]($('#proto-'+name), { config: PROTO_CONFIGS[name], lessonId:null, onTouch:()=>{} }); }
      catch(e){ $('#proto-'+name).textContent = 'archetype error: ' + e.message; }

  /* ══ PATH / MAP VIEW — VERTICAL CLIMB ══
     Tiers stack top→bottom (Fundamentals at the top, Environment at the bottom): the vertical
     scroll direction reads as foundations → derived → outcomes, matching the dependency flow.
     Within a tier, nodes flow down two lanes; a lone trailing node centres as a capstone.
     x is stored as the node CENTRE in PERCENT (0–100) so the map is fully width-responsive;
     y is a pixel offset. Edges + mini-map both consume these coordinates. */
  const NODE_H = 58;
  const LANE = [27, 73];        // lane centres, percent

  /* ─ path-03 upcoming/collapse helpers + path-04 param-hue law ─ */
  let expandedTiers = new Set();           // tiers the user manually expanded (in-memory)
  function completedOf(id){ return !!(store.lessons[id] && store.lessons[id].completed); }
  // "1 lesson away": locked, with exactly one incomplete prerequisite that is itself available.
  function isUpcoming(id){
    if (nodeState(id) !== 'locked') return false;
    const inc = prereqIds(id).filter(p => !completedOf(p));
    return inc.length === 1 && nodeState(inc[0]) === 'available';
  }
  // shown = completed/available/upcoming (or all, if the tier is expanded); the rest collapse.
  function tierShownHidden(col){
    const expanded = expandedTiers.has(col.tier);
    const shown = [], hidden = [];
    col.ids.forEach(id => { const st = nodeState(id);
      (expanded || st !== 'locked' || isUpcoming(id) ? shown : hidden).push(id); });
    return { shown, hidden };
  }
  // param-hue per node, drawn ONLY from sa-p3 law tokens, grouped by physical family
  // (direction=face · lateral=path · vertical/strike=attack · loft/height=loft ·
  //  spin/depth=depth · plane/speed/distance=plane · environment=violet chrome).
  const NODE_HUE = {
    'face-angle':'#FF5C6B','start-direction':'#FF5C6B','offline':'#FF5C6B',
    'club-path':'#6FC6FF','spin-axis':'#6FC6FF','curve':'#6FC6FF',
    'attack-angle':'#F472B6','low-point':'#F472B6','landing-angle':'#F472B6',
    'dynamic-loft':'#B9A0FF','launch-angle':'#B9A0FF','spin-loft':'#B9A0FF','apex':'#B9A0FF',
    'strike-depth':'#C98AE6','backspin':'#C98AE6',
    'plane-coupling':'#93A4F2','club-speed':'#93A4F2','ball-speed':'#93A4F2','smash':'#93A4F2','carry':'#93A4F2','total':'#93A4F2',
    'altitude':'#9D8BFF','wind':'#9D8BFF','temperature':'#9D8BFF',
  };
  const nodeHue = id => NODE_HUE[id] || '#9D8BFF';
  const STAR_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 3.3l2.6 5.4 5.9.8-4.3 4.2 1 5.9L12 17.7 6.8 20.4l1-5.9-4.3-4.2 5.9-.8z"/></svg>';

  function computeLayout(opts){
    opts = opts || {};
    const headH = 48, rowH = 78, tierGap = 30, topPad = 10, summaryH = 54;   // headH 38→48: clears the floating "Start here" badge (§1.1)
    const pos = {}, tierBands = [], summaries = [];
    let y = topPad;
    TIER_COLS.forEach(col => {
      const y0 = y;
      const rowStart = y + headH;
      const { shown, hidden } = opts.full ? { shown: col.ids, hidden: [] } : tierShownHidden(col);
      const n = shown.length;
      shown.forEach((id, ri) => {
        const loneLast = (ri === n - 1) && (n % 2 === 1);
        const lane = ri % 2, row = Math.floor(ri / 2);
        pos[id] = { x: loneLast ? 50 : LANE[lane], y: rowStart + row * rowH, lane, row };
      });
      let yEnd = rowStart + Math.ceil(n / 2) * rowH;
      if (!opts.full && hidden.length){
        summaries.push({ tier: col.tier, label: col.label, y: yEnd, hidden: hidden.slice(), shownCount: n });
        yEnd += summaryH;
      }
      y = yEnd;
      tierBands.push({ label: col.label, y0, y1: y });
      y += tierGap;
    });
    return { pos, tierBands, summaries, width: 100, height: y };
  }

  function renderPath(){
    const L = computeLayout();
    const nMastered = masteredCount();
    const nextId = nextNodeId();
    // edges — every thread carries data-from/data-to so relation-light can address it;
    // at rest all sit at ≤.08 alpha (CSS), lit violet only on select/focus (path-02).
    let edges = '';
    for (const e of GRAPH.edges){
      const A = L.pos[e.from], B = L.pos[e.to]; if (!A || !B) continue;   // skip collapsed endpoints
      const x1 = A.x, x2 = B.x;
      let y1, y2;
      if (A.y <= B.y){ y1 = A.y + NODE_H; y2 = B.y; }   // downward: source bottom → target top
      else { y1 = A.y; y2 = B.y + NODE_H; }             // upward (e.g. Environment → Outcomes)
      const dy = (y2 - y1) * 0.5;
      edges += `<path data-from="${e.from}" data-to="${e.to}" d="M${x1},${y1.toFixed(1)} C${x1},${(y1+dy).toFixed(1)} ${x2},${(y2-dy).toFixed(1)} ${x2},${y2.toFixed(1)}" fill="none" stroke-width="1.5" vector-effect="non-scaling-stroke"/>`;
    }
    // tier heads — full-width bands stacked down the climb
    let heads = '';
    L.tierBands.forEach(t => { heads += `<div class="col-head" style="top:${t.y0}px">${esc(t.label)}</div>`; });
    // nodes (shown only; deep locks collapse into the summary rows below)
    let nodes = '';
    TIER_COLS.forEach(col => {
      const tierTag = col.label.replace(/s$/,'');
      col.ids.forEach(id => {
        const p = L.pos[id]; if (!p) return;                          // hidden → summary row
        const n = NODE[id], st = nodeState(id), l = store.lessons[id], meta = LESSONS[id];
        const upcoming = st === 'locked' && isUpcoming(id);
        const isNext = st === 'available' && id === nextId;
        const mastered = st === 'completed' && isMastered(id);
        const cls = ['node'];
        if (isNext) cls.push('node--next'); else if (upcoming) cls.push('node--upcoming'); else cls.push('node--'+st);
        if (mastered) cls.push('is-mastered');
        if (store.lastOpened === id) cls.push('node--current');
        // path-04: right glyph (star for mastered) + XP stamp
        let rightGlyph, xpStamp = '', away = '';
        if (mastered){ rightGlyph = `<span class="nstar" aria-hidden="true">${STAR_SVG}</span>`; xpStamp = `<span class="nxp">+${l.quizBest + (l.read?40:0)} XP</span>`; }
        else if (st === 'completed'){ rightGlyph = `<span class="nglyph" aria-hidden="true">${ICON.check}</span>`; xpStamp = `<span class="nxp">+${l.quizBest + (l.read?40:0)} XP</span>`; }
        else if (st === 'available'){ rightGlyph = '<span class="ring" aria-hidden="true"></span>'; xpStamp = meta ? `<span class="nxp nxp--avail">${meta.maxXp} XP</span>` : ''; }
        else if (upcoming){ rightGlyph = ''; away = '<span class="naway">1 lesson away</span>'; }
        else { rightGlyph = `<span class="nglyph" aria-hidden="true">${ICON.lock}</span>`; }
        const startHere = isNext ? '<span class="starthere" aria-hidden="true">Start here</span>' : '';
        const stateWord = mastered ? 'mastered' : st === 'completed' ? 'completed' : upcoming ? 'upcoming' : st;
        const aria = (st === 'locked' && !upcoming)
          ? (AUTHORED[id] ? `${n.label}, locked — complete ${prereqLabels(id)} to unlock.` : `${n.label}, locked, coming soon`)
          : upcoming ? `${n.label}, upcoming, one lesson away — complete ${prereqLabels(id)} to unlock. ${n.blurb}`
          : `${n.label}, ${stateWord}${isNext?', recommended next':''}${st==='available'?', press Enter to preview':''}. ${n.blurb}`;
        nodes += `<button class="${cls.join(' ')}" data-node="${id}" aria-disabled="${st==='locked' && !upcoming}"
          style="left:${(p.x-21).toFixed(2)}%;top:${p.y}px;height:${NODE_H}px" aria-label="${esc(aria)}">
          ${startHere}<span class="r1"><span class="r1l"><span class="nhue" aria-hidden="true" style="background:${nodeHue(id)};color:${nodeHue(id)}"></span><span class="ntier">${tierTag}</span></span>${rightGlyph}</span>
          <span class="nlabel">${esc(n.label)}</span>${away}${xpStamp}
        </button>`;
      });
    });
    // collapsed tier summary rows (path-03 — destinations, not barriers)
    let summaries = '';
    L.summaries.forEach(s => {
      const label = s.shownCount ? `+${s.hidden.length} more in ${s.label}` : s.label;
      const word = s.hidden.length === 1 ? 'lesson' : 'lessons';
      summaries += `<button class="tsummary" data-expand="${s.tier}" type="button" style="top:${s.y}px" aria-expanded="false" aria-label="${esc(s.label)}: ${s.hidden.length} more ${word} ahead. Expand to preview.">
        <span class="ts-l">${esc(label)}</span>
        <span class="ts-r">${s.hidden.length} ${word}<span class="ts-chev" aria-hidden="true">${ICON.arrow}</span></span>
      </button>`;
    });
    // path-05 fold economy: mission line + real progress bar with tier ticks
    const totalLessons = LESSON_IDS.length;
    // §13d ENDOWED PROGRESS — the bar never shows 0%: the first tick is
    // CREDITED. With prior app activity in localStorage (a played shot /
    // home-visit stat keys) the credit names it; with zero evidence the
    // journey itself is credited. Real mastery counts add on top; the aria
    // valuetext stays honest about what the credit is.
    const credit = (() => {
      try {
        const seen = ['sa.stat.shot','sa.stat.flight','sa.stat.outcome','sa_flight_data']
          .some(k => localStorage.getItem(k) != null);
        return seen ? 'Ball Flight seen in action' : 'The instrument tour';
      } catch(e){ return 'The instrument tour'; }

  function wireMap(){
    const canvas = $('.map-canvas');
    const btns = Array.from(canvas.querySelectorAll('[data-node]'));
    const byId = Object.fromEntries(btns.map(b => [b.dataset.node, b]));
    const edgePaths = Array.from(canvas.querySelectorAll('.map-edges path'));
    btns.forEach(b => { b.dataset.baseLabel = b.getAttribute('aria-label'); });
    const inEdges  = id => GRAPH.edges.filter(e => e.to === id).map(e => e.from);
    const outEdges = id => GRAPH.edges.filter(e => e.from === id).map(e => e.to);
    let selected = null;

    // path-02 relation-light: light ONLY this node's prereq/unlock threads (violet), dim the rest.
    function lightRelations(id){
      const nb = new Set([id, ...inEdges(id), ...outEdges(id)]);
      canvas.classList.add('has-selection');
      btns.forEach(b => { const nid = b.dataset.node;
        b.classList.toggle('node--selected', nid === id);
        b.classList.toggle('node--related', nid !== id && nb.has(nid));
        b.classList.toggle('node--dimmed', !nb.has(nid));
      });
      edgePaths.forEach(p => p.classList.toggle('edge--lit', p.dataset.from === id || p.dataset.to === id));
    }
    function clearRelations(){
      canvas.classList.remove('has-selection');
      btns.forEach(b => b.classList.remove('node--selected','node--related','node--dimmed'));
      edgePaths.forEach(p => p.classList.remove('edge--lit'));
    }
    function clearSelection(){                      // sheet onClose
      selected = null; clearRelations();
      btns.forEach(b => { if (b.dataset.baseLabel) b.setAttribute('aria-label', b.dataset.baseLabel); });
    }
    function selectNode(id){                         // tap / Enter → relation-light + preview
      selected = id; lightRelations(id);
      btns.forEach(b => { const nid = b.dataset.node; b.setAttribute('aria-label', b.dataset.baseLabel + (nid === id ? ', selected' : '')); });
      haptic('light');                               // path-06: card tap = light
      openPreview(id);
    }
    function enterNode(id){                          // second tap / Open / Enter-on-Open → ENTER lesson
      if (nodeState(id) === 'locked'){ haptic('light'); announce(AUTHORED[id] ? `${NODE[id].label}, locked. Complete ${prereqLabels(id)} to unlock.` : NODE[id].label + ', locked. Coming soon — this module is not built yet.'); return; }
      haptic('light'); store.lastOpened = id; save(); closeSheet(false, true); go('#/lesson/' + id);
    }
    function openPreview(id){
      const n = NODE[id], st = nodeState(id), locked = st === 'locked';
      const deps = inEdges(id).map(x => NODE[x].label);
      const feeds = outEdges(id);
      const tier = LESSONS[id] ? LESSONS[id].tier : (n.tier.charAt(0).toUpperCase()+n.tier.slice(1));
      const xp = (LESSONS[id] && !locked) ? LESSONS[id].maxXp : null;
      const feedChips = feeds.map(x => `<button class="sa-sheet__chip" data-rel="${x}" type="button">${esc(NODE[x].label)}</button>`).join('');
      const html = `
        <div class="sa-sheet__grip" aria-hidden="true"></div>
        <span class="sa-sheet__tier">${esc(tier)} parameter</span>
        <h2 class="sa-sheet__title" id="sheet-title">${esc(n.label)}</h2>
        <p class="sa-sheet__blurb">${esc(n.blurb)}</p>
        ${deps.length ? `<p class="sa-sheet__rel"><b>Depends on:</b> ${esc(deps.join(', '))}.</p>` : ''}
        ${feeds.length ? `<p class="sa-sheet__rel"><b>Feeds into:</b></p><div class="sa-sheet__chips">${feedChips}</div>` : ''}
        ${locked ? `<p class="sa-sheet__rel">${AUTHORED[id] ? 'Locked — complete '+esc(prereqLabels(id))+' to unlock.' : 'Coming soon — this module is not built yet.'}</p>` : ''}
        <div class="sa-sheet__foot">
          ${xp != null ? `<span class="sa-sheet__xp">Up to ${xp} XP</span>` : ''}
          <button class="sa-sheet__close" data-sheet-close type="button"${locked?' data-autofocus':''}>Close</button>
          ${locked ? '' : `<button class="sa-sheet__open" data-sheet-open type="button" data-autofocus>Open lesson ${ICON.arrow}</button>`}
        </div>`;
      openSheet(html, { trigger: byId[id], labelId:'sheet-title', onClose: clearSelection });
      if (locked) announce(AUTHORED[id] ? `${n.label}, locked. Complete ${prereqLabels(id)} to unlock.` : `${n.label}, locked. Coming soon.`);
      sheetEl.querySelectorAll('[data-rel]').forEach(c => c.addEventListener('click', () => {
        const rid = c.dataset.rel; selectNode(rid);
        if (byId[rid]) byId[rid].scrollIntoView({ block:'center', behavior: reduced()?'auto':'smooth' });
      }));
      const ob = sheetEl.querySelector('[data-sheet-open]'); if (ob) ob.addEventListener('click', () => enterNode(id));
      const cb = sheetEl.querySelector('[data-sheet-close]'); if (cb) cb.addEventListener('click', () => closeSheet());
    }

    btns.forEach(b => {
      const id = b.dataset.node;
      b.addEventListener('click', () => { if (selected === id && nodeState(id) !== 'locked') enterNode(id); else selectNode(id); });
      // path-02 keyboard parity: focus lights this node's relations (no sheet); blur clears
      // once focus leaves the map and nothing is selected.
      b.addEventListener('focus', () => { if (!selected) lightRelations(id); });
      b.addEventListener('blur', () => { setTimeout(() => { if (!selected && !canvas.contains(document.activeElement)) clearRelations(); }, 0); });
    });
    // tap empty map background → deselect
    canvas.addEventListener('click', e => { if (e.target === canvas && selected) closeSheet(); });

    // path-03: collapsed tier rows expand on tap (or Enter/Space — real buttons)
    canvas.querySelectorAll('[data-expand]').forEach(btn => btn.addEventListener('click', () => {
      const tier = btn.dataset.expand; expandedTiers.add(tier); haptic('light');
      const col = TIER_COLS.find(c => c.tier === tier);
      renderPath();
      // land focus on the first revealed card of that tier for keyboard users
      const first = col && document.querySelector('[data-node="'+col.ids.find(id => nodeState(id)==='locked' && !isUpcoming(id))+'"]');
      if (first) first.focus({ preventScroll:false });
    }));

    // path-01 header actions: Progress (målskive) + Where next (kompass)
    const actProg = $('#act-progress');
    if (actProg) actProg.addEventListener('click', () => { haptic('light'); openMasterySheet(); });
    const actNext = $('#act-next');
    if (actNext) actNext.addEventListener('click', () => {
      const id = nextNodeId();
      if (!id){ announce('Nothing new to recommend — everything within reach is open.'); return; }
      haptic('light');
      if (byId[id]) byId[id].scrollIntoView({ block:'center', behavior: reduced()?'auto':'smooth' });
      selectNode(id);
    });
    // path-05 "how the path works"
    const pathHow = $('#path-how');
    if (pathHow) pathHow.addEventListener('click', () => { haptic('light'); openHowSheet(); });

    // pulse the just-completed / last-opened node
    if (store.lastOpened && byId[store.lastOpened] && nodeState(store.lastOpened) === 'completed'){
      const b = byId[store.lastOpened];
      if (!reduced()){ b.classList.add('justdone'); setTimeout(() => b.classList.remove('justdone'), 1200); }
    }
  }

  /* ══ LESSON VIEW ══ */
  function parseMyth(s){
    s = String(s).trim();
    const q = s[0];
    const pair = { '"':'"', '“':'”', "'":"'", '‘':'’' };
    if (pair[q]){ const idx = s.indexOf(pair[q], 1); if (idx > 0) return { myth:s.slice(1, idx), truth:s.slice(idx+1).trim() }; }
    const m = s.match(/^(.+?[.!?])\s+(.+)$/s);
    if (m) return { myth:m[1], truth:m[2] };
    return { myth:s, truth:'' };
  }
  function isEnvDriver(d){ return /air|altitude|wind|temperature|humidity|conditions/i.test(d); }

  // Editorial layering (spec §2): split an authored prose blob into a one-sentence KEY IDEA
  // (its existing lead sentence, verbatim — no invented claims) + the remaining sentences
  // grouped into ≤3 short paragraphs. Nothing is deleted; the depth is portioned, not lost.
  function sentences(t){ const m = String(t).trim().match(/[^.!?]+[.!?]+["'”’)\]]*(?=\s|$)/g); return m ? m.map(s => s.trim()).filter(Boolean) : [String(t).trim()]; }
  function proseBlock(text){
    const s = sentences(text);
    const lead = s[0] || '';
    const rest = s.slice(1);
    let paras = [];
    if (rest.length){
      const np = Math.min(3, Math.max(1, Math.ceil(rest.length / 2)));
      const size = Math.ceil(rest.length / np);
      for (let i = 0; i < rest.length; i += size) paras.push(rest.slice(i, i + size).join(' '));
    }
    return { lead, paras };
  }
  function proseSection(lead, paras){
    return `<div class="keyidea">${esc(lead)}</div>` + (paras.length ? `<div class="prose">${paras.map(p => `<p>${esc(p)}</p>`).join('')}</div>` : '');
  }

  function miniMapSVG(currentId){
    const L = computeLayout({ full: true });   // lesson "you are here" map shows the whole graph, uncollapsed
    const VW = 110, VH = 106;                       // portrait mini-map, mirrors the vertical climb (aca-24: compact)
    const sx = VW / L.width, sy = VH / L.height;
    let dots = '';
    for (const id of Object.keys(L.pos)){
      const p = L.pos[id], st = nodeState(id);
      const cx = p.x * sx, cy = (p.y + NODE_H/2) * sy;
      const cur = id === currentId;
      // you-dot = violet ring+fill (aca-24, no gold on the map); completed = filled violet
      const fill = cur ? '#9D8BFF' : (st==='completed' ? 'rgba(157,139,255,.7)' : st==='available' ? 'rgba(167,159,199,.7)' : 'rgba(126,116,154,.45)');
      dots += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${cur?4.5:2.4}" fill="${fill}"/>`;
      if (cur) dots += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="7" fill="none" stroke="#9D8BFF" stroke-width="1"/>`;
    }
    return `<svg class="minimap" viewBox="0 0 ${VW} ${VH}" width="100%" height="${VH}" preserveAspectRatio="xMidYMid meet" aria-hidden="true">${dots}</svg>`;
  }

    { id:'sec-hook', label:'Hook' },

  function setupReveal(lessonId, navSections){
    const sects = Array.from(app.querySelectorAll('.sect'));
    const dots = Array.from(app.querySelectorAll('#secdots .d'));
    const idIndex = Object.fromEntries(navSections.map((s,i)=>[s.id,i]));
    const stepCount = $('#step-count'), stepLabel = $('#step-label'), stepFill = $('#step-fill'), nextBtn = $('#nextBtn'), nextLabel = $('#next-label');
    const pad2 = n => String(n).padStart(2,'0');
    let seen = new Set(['sec-hook']);
    dots[0] && dots[0].classList.add('on');
    if (reduced()){ sects.forEach(s => s.classList.add('in')); }
    // The stepper + sticky-Next silently reflect the current section (no new live region, §5.2).
    function setStep(idx){
      if (idx == null || idx < 0) idx = 0;
      const total = navSections.length;
      if (stepCount) stepCount.textContent = pad2(idx+1) + ' / ' + pad2(total);
      if (stepLabel) stepLabel.textContent = navSections[idx].label;
      if (stepFill) stepFill.style.width = (((idx+1)/total)*100).toFixed(1) + '%';
      const hasNext = idx + 1 < total;
      if (nextLabel) nextLabel.textContent = hasNext ? navSections[idx+1].label : 'Finish lesson';
      if (nextBtn) nextBtn.dataset.target = hasNext ? navSections[idx+1].id : 'sec-done';
    }
    setStep(0);
    const io = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (en.isIntersecting){
          en.target.classList.add('in');
          const idx = idIndex[en.target.id];
          if (idx != null){ seen.add(en.target.id); dots[idx] && dots[idx].classList.add('on'); }
        }
      });
      // current section = topmost nav section crossing the upper half
      const vis = sects.filter(s => idIndex[s.id] != null).filter(s => { const r = s.getBoundingClientRect(); return r.top < window.innerHeight*0.5 && r.bottom > 80; });
      if (vis.length) setStep(idIndex[vis[0].id]);
    }, { rootMargin:'0px 0px -20% 0px', threshold:0.15 });
    sects.forEach(s => io.observe(s));
    // safety: reveal anything still hidden after 700ms
    setTimeout(() => sects.forEach(s => s.classList.add('in')), 700);
  }

  function bumpLessonXpDisplay(lessonId){ /* per-lesson XP now lives in the topbar total (refreshHeaderLive) */ }

  /* ══ DIAGRAMS ══ */

  function refreshHeaderLive(){

    // badge rail
