      const earned = store.badges.includes(b.dataset.badge);
      if (earned && !b.classList.contains('earned')){ b.classList.add('earned','pop'); }
    });
  }

  /* ══════════════════════════════════════════════════════════════════════════
     ARCHETYPE API — reusable, parameterised portrait diagram components.
     A lesson picks one by LESSONS[id].diagramArchetype and configures it with
     LESSONS[id].diagramConfig. Adding a lesson needs NO new diagram code — only
     an archetype name + a config object. Contract: fn(mount, ctx) where
       ctx = { config, lessonId, onTouch }   (onTouch marks the diagram touched)
     Portrait-first: canvas on top, full-width sliders below. Engine-driven via
     solveFlight() wherever the physics maps; post-solve transforms are EST-flagged.
     Canvas is decorative (role=img + live aria-label; inner <svg> aria-hidden);
     every value ALSO appears as text (big readout / chips / data table). Each
     archetype renders its own <h2 class="vig-title">.

     ── engineSliders[] entry (shared by every archetype) ──
        key         state key + DOM id suffix (#sl-<key>, #v-<key>)
        label       visible + aria label
        min,max,step,value   range spec
        bind        solveFlight input this slider drives — one of:
                    'clubSpeed'|'dynamicLoft'|'attackAngle'|'faceAngle'|'clubPath'
                    (omit for a non-engine/EST slider, e.g. the air layer)
        unit        suffix on the visible value (e.g. '°', ' mph', '%')
        unitSpoken  spoken unit for aria-valuetext (e.g. 'degrees','miles per hour')
        signed      true → show +/- on the visible value
        est         true → EST pill + ', estimated' appended to aria-valuetext
        speak(raw)  optional custom aria-valuetext body (e.g. wind head/tail)
        commas      true → thousands separators on the visible value
     config.fixed = { <engineInput>: value } overrides any input NOT exposed as a
        slider (e.g. drive a driver lesson at a fixed clubSpeed).
     config.chips = [engine field names] → small live readouts (see CHIP_DEFS).

     Archetypes + the engine calls each makes:
       'trajectory-carry' solveFlight + trajectorySamples. config: {title,tag,
            readout,readoutLabel,readoutUnit, engineSliders, air?:bool (adds the
            EST alt/wind/temp/hum layer + reset), chips, ledger?:bool}. The big
            readout sits ABOVE the arc; the arc gets a tall portrait frame.
       'spin-machine'     solveFlight + trajectorySamples. config: {title,tag,
            readoutLabel,readoutUnit, engineSliders, presets?, defaultBand, bands,
            frictionGate?:bool (EST ×0.6 flyer gate), chips}. Draws the spin-loft
            wedge schematic + rpm meter + backspin formula.
       'dplane-topdown'   solveFlight (startDirection, faceToPath, spinAxis, shape).
            config: {title,tag, engineSliders (face/path/loft), readout, chips}.
       'launch-sideon'    solveFlight (launchAngle, spinLoft, ballSpeed, apex).
            config: {title,tag, engineSliders (loft/attack/speed), readout, chips}.
       'bar-drivers'      solveFlight; each bar's value(flight,state)=>number is an
            engine-or-EST magnitude. config: {title,tag, engineSliders, footnote?,
            bars:[{name,est?,unit?,why?,value(f,state)}]}. Bars re-rank live.
     ════════════════════════════════════════════════════════════════════════ */

  // Single range-control markup (unchanged signature; used by every archetype).
  function slider(name, lbl, min, max, step, val, est){
    return `<div class="sl">
      <label for="sl-${name}"><span class="slk">${lbl}${est?'<span class="est">EST</span>':''}</span><span class="slv mono" id="v-${name}"></span></label>
      <input type="range" class="sa-range" id="sl-${name}" min="${min}" max="${max}" step="${step}" value="${val}" aria-label="${lbl.replace(/<[^>]+>/g,'')}">
      <div class="ticks"><span>${signStr(min,false)}${Math.abs(min)}</span><span>${signStr(max,false)}${Math.abs(max)}</span></div>
    </div>`;
  }

  // Build the solveFlight input from sensible defaults, config.fixed overrides,
  // then any engineSlider whose `bind` names an input.
  const ENGINE_DEFAULTS = { clubPath:0, faceAngle:0, attackAngle:-3, dynamicLoft:30, clubSpeed:90, club:'7iron' };
  function engineInput(config, state){
    const inp = { ...ENGINE_DEFAULTS, ...(config.fixed||{}) };
    (config.engineSliders||[]).forEach(s => { if (s.bind) inp[s.bind] = state[s.key]; });
    return inp;
  }

  // Chip dictionary — config.chips lists these engine-field names.
  const CHIP_DEFS = {
    ballSpeed:{label:'Ball speed',unit:'mph',dp:1}, launchAngle:{label:'Launch',unit:'°',dp:1},
    backspin:{label:'Backspin',unit:'rpm',dp:0,commas:true}, spinLoft:{label:'Spin loft',unit:'°',dp:0},
    smash:{label:'Smash',unit:'',dp:2}, carry:{label:'Carry',unit:'yd',dp:0}, apex:{label:'Apex',unit:'yd',dp:0},
    total:{label:'Total',unit:'yd',dp:0}, roll:{label:'Roll',unit:'yd',dp:1}, landingAngle:{label:'Land ang',unit:'°',dp:0},
    startDirection:{label:'Start dir',unit:'°',dp:1,signed:true}, faceToPath:{label:'Face−path',unit:'°',dp:1,signed:true},
    spinAxis:{label:'Spin axis',unit:'°',dp:1,signed:true}, offline:{label:'Offline',unit:'yd',dp:1,signed:true},
    curve:{label:'Curve',unit:'yd',dp:1,signed:true},
    dynamicLoft:{label:'Dyn loft',unit:'°',dp:0}, attackAngle:{label:'Attack',unit:'°',dp:0,signed:true},
  };
  function chipsHTML(fields, idp){
    if (!fields || !fields.length) return '';
    return `<div class="chips">`+fields.map(k=>{ const c=CHIP_DEFS[k]||{label:k,unit:'',dp:1};
      return `<div class="chip"><div class="ck">${esc(c.label)}</div><div class="cv"><span class="mono" id="${idp}-${k}">0</span>${c.unit?`<span class="cu">${esc(c.unit)}</span>`:''}</div></div>`;}).join('')+`</div>`;
  }
  function updateChips(mount, fields, f, idp){
    (fields||[]).forEach(k=>{ const c=CHIP_DEFS[k]||{dp:1}; const el=mount.querySelector('#'+idp+'-'+k); if(el && f[k]!=null) setNum(el, f[k], {dp:c.dp, commas:c.commas, signed:c.signed}); });
  }

  function slidersHTML(sliders){ return (sliders||[]).map(s => slider(s.key, s.label, s.min, s.max, s.step, s.value, !!s.est)).join(''); }
  // Sync every slider's visible value + aria-valuetext to state (EST → ', estimated').
  function applySliderText(mount, sliders, state){
    (sliders||[]).forEach(s=>{
      const input=mount.querySelector('#sl-'+s.key), lbl=mount.querySelector('#v-'+s.key);
      if(!input) return;
      const raw=state[s.key];
      const num=s.commas?Number(Math.abs(raw)).toLocaleString('en-US'):Math.abs(raw);
      const disp=signStr(raw, s.signed)+num+(s.unit||'');
      if(lbl) lbl.textContent=disp;
      const core=s.speak?s.speak(raw):((s.signed&&raw<0?'minus ':'')+num+(s.unitSpoken?' '+s.unitSpoken:''));
      input.setAttribute('aria-valuetext', core+(s.est?', estimated':''));
    });
  }
  function wireSliders(mount, sliders, state, render, onTouch){
    (sliders||[]).forEach(s=>{
      const input=mount.querySelector('#sl-'+s.key);
      if(!input) return;
      input.addEventListener('input', ()=>{ state[s.key]=+input.value; onTouch(); haptic('select'); render(); });
    });
  }
  function ptRay(cx, cy, angDeg, r){ const a=deg2rad(angDeg); return { x: cx + r*Math.cos(a), y: cy - r*Math.sin(a) }; }

  const ARCHETYPES = {
    'trajectory-carry': mountTrajectoryCarry,
    'spin-machine':     mountSpinMachine,
    'dplane-topdown':   mountDplaneTopdown,
    'launch-sideon':    mountLaunchSideon,
    'bar-drivers':      mountBarDrivers,
    'arc-window':       mountArcWindow,
  };
  function mountDiagram(lessonId){
    const L = LESSONS[lessonId];
    const mount = $('#diagramMount');
    const fn = ARCHETYPES[L.diagramArchetype] || mountTrajectoryCarry;
    fn(mount, { config: L.diagramConfig, lessonId, onTouch: () => markDiagramTouched(lessonId) });
  }

  /* ── ARCHETYPE 1: trajectory-carry — portrait ball-flight arc + big readout ── */
  function mountTrajectoryCarry(mount, ctx){
    const cfg=ctx.config, eng=cfg.engineSliders||[], air=!!cfg.air;
    const airSliders = air ? [
      {key:'alt', label:'Altitude (ft)', min:0, max:8000, step:100, value:0, est:true, unit:' ft', unitSpoken:'feet', commas:true},
      {key:'wind', label:'Wind (+head)', min:-20, max:20, step:1, value:0, est:true, unit:' mph', signed:true, speak:v=>Math.abs(v)+' mph '+(v>0?'headwind':v<0?'tailwind':'calm')},
      {key:'temp', label:'Temperature (°C)', min:-5, max:40, step:1, value:15, est:true, unit:'°C', unitSpoken:'degrees celsius'},
      {key:'hum', label:'Humidity (%)', min:0, max:100, step:5, value:50, est:true, unit:'%', unitSpoken:'percent'},
    ] : [];
    const allSliders=eng.concat(airSliders);
    // airOnly (optional): render only the named air sliders (e.g. isolate Altitude or
    // Temperature) while keeping ALL four in state at neutral defaults so the density
    // math is unaffected. Undefined → all four render, exactly as the Carry lesson ships.
    const airShown = (air && Array.isArray(cfg.airOnly)) ? airSliders.filter(s=>cfg.airOnly.includes(s.key)) : airSliders;
    const state={}; allSliders.forEach(s=>state[s.key]=s.value);
    const readout=cfg.readout||'carry', rDef=CHIP_DEFS[readout]||{dp:0};

    mount.innerHTML = `
      <div class="vig-head"><h2 class="vig-title">${esc(cfg.title)}</h2><div class="vig-tag mono">${esc(cfg.tag||'LIVE')}</div></div>
      <div class="arch">
        <div class="bigread">
          <div class="brk">${esc(cfg.readoutLabel||rDef.label||'Carry')}</div>
          <div class="brv"><span class="mono" id="tj-read">0</span><span class="u">${esc(cfg.readoutUnit||rDef.unit||'yd')}</span></div>
          ${air?'<span class="deltachip gain mono" id="tj-delta">+0 yd air</span>':''}
        </div>
        <div role="img" id="tj-fig" aria-label="">
          <svg class="arch-svg traj-svg" viewBox="0 0 340 300" aria-hidden="true">
            <g id="tj-ticks"></g>
            <line x1="30" y1="250" x2="326" y2="250" stroke="rgba(245,242,255,.18)" stroke-width="1.5"/>
            <line id="tj-apexln" x1="0" y1="0" x2="0" y2="0" stroke="rgba(255,138,77,.30)" stroke-width="1" stroke-dasharray="3 4"/>
            <path id="tj-ghost" d="" fill="none" stroke="rgba(167,159,199,.40)" stroke-width="2" stroke-dasharray="5 5"/>
            <path id="tj-live" d="" fill="none" stroke="#FF8A4D" stroke-width="2.6"/>
            <circle id="tj-ball" r="5.5" fill="#FF8A4D" style="filter:drop-shadow(0 0 7px rgba(255,138,77,.8))"/>
            <text id="tj-apexlbl" x="0" y="0" font-family="IBM Plex Mono" font-size="10" fill="#FF8A4D" text-anchor="middle"></text>
            <text id="tj-ghostlbl" x="0" y="0" font-family="IBM Plex Mono" font-size="10" fill="#A79FC7" text-anchor="end"></text>
          </svg>
        </div>
        ${chipsHTML(cfg.chips, 'tj-c')}
        <div class="arch-controls">
          <div class="ctl-grid">${slidersHTML(eng)}</div>
          ${air?`<div class="ctl-sep">EST air layer</div><div class="ctl-grid">${slidersHTML(airShown)}</div>
          <button class="resetbtn" id="tj-reset">${esc(cfg.resetLabel||'Sea level, no wind, 15 °C')}</button>`:''}
          <div class="footnote">${air?'Engine carry depends on ball speed only; altitude, wind, temperature and humidity are an estimated air layer added on top (grounded by the checks below). Drawn flight = engine carry × estimated air. Every estimated number is marked EST.':'Live from the engine — the arc is the engine\'s trajectory shape.'}${air&&cfg.note?' '+esc(cfg.note):''}</div>
          <button class="datatoggle" id="tj-datatoggle" aria-expanded="false">Show data table</button>
          <div class="datatable" id="tj-datatable"><table><caption class="sr-only">${esc(cfg.title)} values</caption><tbody id="tj-datarows"></tbody></table></div>
        </div>
        ${cfg.ledger?`<div class="arch-ledger"><div class="ledger-k">The ledger — where the yards come from</div><div id="tj-ledger"></div></div>`:''}
      </div>`;

    const el=s=>mount.querySelector(s);
    const MAXYD=300, MAXAP=55, GX0=30, GX1=326, GY0=250, GY1=30;
    const SX=yd=>GX0+clamp(yd/MAXYD,0,1)*(GX1-GX0);
    const SY=h =>GY0-clamp(h/MAXAP,0,1)*(GY0-GY1);
    let ticks=''; for(let yd=0; yd<=MAXYD; yd+=50){ const X=SX(yd); ticks+=`<line x1="${X.toFixed(0)}" y1="246" x2="${X.toFixed(0)}" y2="254" stroke="rgba(245,242,255,.16)" stroke-width="1"/><text x="${X.toFixed(0)}" y="268" font-family="IBM Plex Mono" font-size="10" fill="#8E85A8" text-anchor="middle">${yd}</text>`; }
    el('#tj-ticks').innerHTML=ticks;
    function arcPath(carry, apex, f){ const s=trajectorySamples(f,64); let d=''; s.forEach((p,i)=>{ d+=(i===0?'M':'L')+SX(p.d*carry).toFixed(1)+','+SY(p.h*apex).toFixed(1); }); return d; }

    function render(){
      const f=solveFlight(engineInput(cfg,state));
      applySliderText(mount, allSliders, state);
      let carryFinal=f.carry, apexFinal=f.apex, delta=0, densityRatio=1, windMult=1, dAlt=0,dTemp=0,dHum=0,dWind=0;
      if(air){
        const fAlt=1-0.030*(state.alt/1000), fTemp=288.15/(273.15+state.temp), fHum=1-0.001*(state.hum/100);
        densityRatio=fAlt*fTemp*fHum; const carryEnvMult=1+0.70*(1-densityRatio);
        windMult = state.wind>=0 ? (1-0.010*state.wind) : (1+0.005*(-state.wind));
        carryFinal=f.carry*carryEnvMult*windMult; apexFinal=f.apex*carryEnvMult; delta=carryFinal-f.carry;
        dAlt=f.carry*0.70*(1-fAlt); dTemp=f.carry*0.70*(1-fTemp); dHum=f.carry*0.70*(1-fHum); dWind=f.carry*(windMult-1);
      }
      const shown={...f, carry:carryFinal, apex:apexFinal};
      el('#tj-ghost').setAttribute('d', air?arcPath(f.carry,f.apex,f):'');
      el('#tj-live').setAttribute('d', arcPath(carryFinal, apexFinal, f));
      const bx=SX(0.52*carryFinal), by=SY(0.9985*apexFinal);
      el('#tj-ball').setAttribute('cx',bx.toFixed(1)); el('#tj-ball').setAttribute('cy',by.toFixed(1));
      el('#tj-apexln').setAttribute('x1',bx.toFixed(1)); el('#tj-apexln').setAttribute('y1',by.toFixed(1)); el('#tj-apexln').setAttribute('x2',bx.toFixed(1)); el('#tj-apexln').setAttribute('y2','250');
      el('#tj-apexlbl').setAttribute('x',bx.toFixed(1)); el('#tj-apexlbl').setAttribute('y',Math.max(by-8,16).toFixed(1)); el('#tj-apexlbl').textContent='apex '+apexFinal.toFixed(0)+' yd';
      const glbl=el('#tj-ghostlbl'); if(air){ glbl.setAttribute('x',SX(f.carry).toFixed(1)); glbl.setAttribute('y','244'); glbl.textContent='baseline '+f.carry.toFixed(0); } else glbl.textContent='';
      setNum(el('#tj-read'), shown[readout], {dp:rDef.dp, commas:rDef.commas});
      if(air){ const dc=el('#tj-delta'); dc.textContent=(delta>=0?'+':'−')+Math.abs(delta).toFixed(0)+' yd air'; dc.className='deltachip mono '+(delta>=0?'gain':'loss'); }
      updateChips(mount, cfg.chips, f, 'tj-c');
      if(cfg.ledger){
        const base=f.carry, windowBonus=base*0.06*Math.max(0,1-Math.abs(f.launchAngle-15)/12);
        const rows=[
          {name:'Ball speed', val:base, kind:'base', est:false},
          {name:'Launch + spin window', val:windowBonus, kind:'pos', est:true},
          {name:'Altitude', val:dAlt, kind:dAlt>=0?'pos':'neg', est:true},
          {name:'Wind', val:dWind, kind:dWind>=0?'pos':'neg', est:true},
          {name:'Temperature', val:dTemp, kind:dTemp>=0?'pos':'neg', est:true},
          {name:'Humidity', val:dHum, kind:dHum>=0?'pos':'neg', est:true},
        ];
        el('#tj-ledger').innerHTML = rows.map(r=>{ const w=clamp(Math.abs(r.val)/base*100, r.val!==0?4:0,100); const sign=r.kind==='base'?'':(r.val>=0?'+':'−');
          return `<div class="lrow"><div class="ltop"><span class="ln">${r.name}${r.est?'<span class="est">EST</span>':''}</span><span class="lv mono">${sign}${Math.abs(r.val).toFixed(r.kind==='base'?0:1)} yd</span></div><div class="lbar"><div class="lf ${r.kind}" style="width:${w.toFixed(1)}%"></div></div></div>`;
        }).join('') + `<div class="footnote">Ball-speed base is engine-true; the window bonus is illustrative (EST) and not added to the drawn flight. Air deltas are marginal EST contributions.</div>`;
      }
      el('#tj-fig').setAttribute('aria-label', `${cfg.title}: club speed ${f.clubSpeed.toFixed(0)} mph, ball speed ${f.ballSpeed.toFixed(0)} mph, engine carry ${f.carry.toFixed(0)} yards${air?`, estimated air layer ${carryFinal.toFixed(0)} yards (${delta>=0?'+':'−'}${Math.abs(delta).toFixed(0)} from air)`:''}, apex ${apexFinal.toFixed(0)} yards.`);
      const tbl=[['Ball speed',f.ballSpeed.toFixed(1)+' mph'],['Smash',f.smash.toFixed(2)],['Spin loft',f.spinLoft.toFixed(0)+'°'],['Launch',f.launchAngle.toFixed(1)+'°'],['Backspin',Math.round(f.backspin).toLocaleString('en-US')+' rpm'],['Carry (engine)',f.carry.toFixed(0)+' yd']];
      if(air){ tbl.push(['Density ratio (EST)',densityRatio.toFixed(3)],['Carry ×air (EST)',carryFinal.toFixed(0)+' yd'],['Air delta (EST)',(delta>=0?'+':'−')+Math.abs(delta).toFixed(0)+' yd']); }
      el('#tj-datarows').innerHTML=tbl.map(r=>`<tr><th scope="row">${r[0]}</th><td>${r[1]}</td></tr>`).join('');
    }

    wireSliders(mount, allSliders, state, render, ctx.onTouch);
    if(air) el('#tj-reset').addEventListener('click', ()=>{ state.alt=0;state.wind=0;state.temp=15;state.hum=50; ['alt','wind','temp','hum'].forEach(k=>{const i=el('#sl-'+k); if(i)i.value=state[k];}); haptic('light'); render(); });
    el('#tj-datatoggle').addEventListener('click', ()=>{ const t=el('#tj-datatable'); const open=t.classList.toggle('show'); el('#tj-datatoggle').setAttribute('aria-expanded',open?'true':'false'); el('#tj-datatoggle').textContent=open?'Hide data table':'Show data table'; });
    render();
  }

  /* ── ARCHETYPE 2: spin-machine — spin-loft wedge schematic → backspin readout ── */
  function mountSpinMachine(mount, ctx){
    const cfg=ctx.config, eng=cfg.engineSliders||[];
    const state={}; eng.forEach(s=>state[s.key]=s.value);
    state.friction=false;
    const BANDS=cfg.bands||{'7iron':{lo:6500,hi:7500,name:'7-iron'}};
    state.band=cfg.defaultBand||Object.keys(BANDS)[0];
    const presets=cfg.presets||null;
    const presetBtns=presets?Object.keys(presets).map(k=>`<button data-preset="${k}" aria-pressed="${k===state.band?'true':'false'}">${esc(presets[k].label||k)}</button>`).join(''):'';

    mount.innerHTML = `
      <div class="vig-head"><h2 class="vig-title">${esc(cfg.title)}</h2><div class="vig-tag mono">${esc(cfg.tag||'LIVE')}</div></div>
      <div class="bs-diagram">
        <div class="bs-machine">
          <div role="img" id="sm-fig" aria-label="">
            <svg class="bs-svg" viewBox="0 110 300 110" aria-hidden="true">
              <style>@keyframes saSpin{to{transform:rotate(-360deg)}}</style>

    const el=s=>mount.querySelector(s);

    function render(){
      const f=solveFlight(engineInput(cfg,state));
      applySliderText(mount, eng, state);
      const rpmEngine=f.backspin;
      const fr=(cfg.frictionGate&&state.friction);
      const rpmShown=fr?Math.round(rpmEngine*0.6):Math.round(rpmEngine);
      const IX=140, IY=200, aa=f.attackAngle, dl=f.dynamicLoft;
      const pathTip=ptRay(IX,IY,aa,108), faceTip=ptRay(IX,IY,dl,95);
      el('#sm-path').setAttribute('x2',pathTip.x.toFixed(1)); el('#sm-path').setAttribute('y2',pathTip.y.toFixed(1));
      el('#sm-face').setAttribute('x2',faceTip.x.toFixed(1)); el('#sm-face').setAttribute('y2',faceTip.y.toFixed(1));
      const rW=66; let pts=IX+','+IY; for(let i=0;i<=12;i++){ const ang=aa+(dl-aa)*(i/12); const p=ptRay(IX,IY,ang,rW); pts+=' '+p.x.toFixed(1)+','+p.y.toFixed(1); }
      el('#sm-wedge').setAttribute('points',pts);

      el('#sm-pathlbl').innerHTML=`<rect x="${(pl.x-16).toFixed(0)}" y="${(pl.y-8).toFixed(0)}" width="34" height="14" rx="2" fill="rgba(8,5,14,.78)"/><text x="${pl.x.toFixed(0)}" y="${(pl.y+2).toFixed(0)}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#6FC6FF">PATH</text>`;
      el('#sm-facelbl').innerHTML=`<rect x="${(fl.x-16).toFixed(0)}" y="${(fl.y-8).toFixed(0)}" width="34" height="14" rx="2" fill="rgba(8,5,14,.78)"/><text x="${fl.x.toFixed(0)}" y="${(fl.y+2).toFixed(0)}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#FF5C6B">FACE</text>`;
      el('#sm-wedgelbl').innerHTML=`<rect x="${(wl.x-22).toFixed(0)}" y="${(wl.y-9).toFixed(0)}" width="46" height="16" rx="2" fill="rgba(8,5,14,.86)"/><text x="${(wl.x+1).toFixed(0)}" y="${(wl.y+3).toFixed(0)}" text-anchor="middle" font-family="IBM Plex Mono" font-weight="600" font-size="10" fill="#FF8A4D">${f.spinLoft.toFixed(0)}° SL</text>`;
      const spd=clamp(9000/Math.max(rpmShown,400),0.4,6), spin=el('#sm-spin'); spin.style.animation='saSpin '+spd.toFixed(2)+'s linear infinite';
      spin.querySelectorAll('path').forEach(p=>p.setAttribute('stroke', fr?'#8E85A8':'#FF8A4D'));
      spin.querySelectorAll('path[fill]').forEach(p=>{ if(p.getAttribute('fill')!=='none') p.setAttribute('fill', fr?'#8E85A8':'#FF8A4D'); });

      el('#sm-f-sl').textContent=f.spinLoft.toFixed(0); el('#sm-f-bs').textContent=f.ballSpeed.toFixed(1);
      const clamped=Math.round(f.spinRpmRaw)!==Math.round(f.backspin);
      el('#sm-f-res').textContent=Math.round(rpmEngine).toLocaleString('en-US');
      const note=el('#sm-f-note'); note.textContent=(clamped?'raw '+Math.round(f.spinRpmRaw).toLocaleString('en-US')+' rpm capped at engine limit. ':'')+(fr?'× 0.6 friction gate → '+rpmShown.toLocaleString('en-US')+' rpm shown.':''); note.style.display=(clamped||fr)?'block':'none';
      setNum(el('#sm-rpm'), rpmShown, {commas:true});

      const samples=trajectorySamples(f,40); const xMax=230,yMax=52,gx0=18,gx1=290,gy0=86,gy1=8; let dP='',apexPt=null,maxh=0;
      samples.forEach(s=>{ const X=gx0+(s.d*f.carry/xMax)*(gx1-gx0); const Y=gy0-(s.h*f.apex/yMax)*(gy0-gy1); dP+=(dP===''?'M':'L')+X.toFixed(1)+','+Y.toFixed(1); if(s.h>maxh){maxh=s.h;apexPt={X,Y};} });

    if(presets){ mount.querySelectorAll('[data-preset]').forEach(b=>b.addEventListener('click', ()=>{ const p=presets[b.dataset.preset]; if('dl' in p){ state.dl=p.dl; const i=el('#sl-dl'); if(i)i.value=p.dl; } if('aa' in p){ state.aa=p.aa; const i=el('#sl-aa'); if(i)i.value=p.aa; } state.band=p.band||b.dataset.preset; setPressed(b.dataset.preset); haptic('light'); ctx.onTouch(); render(); })); }
    if(cfg.frictionGate && el('#sm-friction')){ el('#sm-friction').addEventListener('click', ()=>{ state.friction=!state.friction; el('#sm-friction').setAttribute('aria-pressed', state.friction?'true':'false'); haptic('light'); render(); }); }

  /* ── ARCHETYPE 3: dplane-topdown — top-down face/path arrows over a target line ── */
  function mountDplaneTopdown(mount, ctx){
    const cfg=ctx.config, eng=cfg.engineSliders||[];
    // ── WIND MODE (config-gated extension: cfg.wind) ──────────────────────────
    // Same top-down "arrows against a target line" grammar, repurposed for the wind
    // vector. The engine flight is wind-INDEPENDENT (chips stay put); head/tail rescales
    // carry on a TrackMan-anchored EST curve, crosswind pushes it offline via the caddie
    // rule (drift ≈ crossMph·carry/300), amplified for high, spinny flights. All EST.
    if (cfg.wind){
      const windS=cfg.windSliders||[], allS=eng.concat(windS);
      const st={}; allS.forEach(s=>st[s.key]=s.value);
      const headTailMult=h=>{ if(h>=0) return Math.max(0.4, 1-(0.0001*h*h+0.009*h)); const t=-h; return 1+(0.008*t-0.0001*t*t); };
      mount.innerHTML = `
        <div class="vig-head"><h2 class="vig-title">${esc(cfg.title)}</h2><div class="vig-tag mono">${esc(cfg.tag||'EST WIND')}</div></div>

            <div class="brv"><span class="mono" id="w-read">0</span><span class="u">${esc(cfg.readoutUnit||'yd')}</span></div>
            <span class="deltachip gain mono" id="w-delta">on line</span>
          </div>
          <div role="img" id="w-fig" aria-label="">
            <svg class="arch-svg" viewBox="0 0 300 300" aria-hidden="true">
              <defs><marker id="w-ahw" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#FFD056"/></marker></defs>
              <line x1="150" y1="262" x2="150" y2="26" stroke="rgba(245,242,255,.16)" stroke-width="1" stroke-dasharray="4 5"/>
              <text x="156" y="36" font-family="IBM Plex Mono" font-size="10" fill="#8E85A8">TARGET</text>
              <path id="w-ghost" d="" fill="none" stroke="rgba(167,159,199,.45)" stroke-width="2" stroke-dasharray="5 5"/>
              <path id="w-live" d="" fill="none" stroke="#FF8A4D" stroke-width="2.6"/>
              <line id="w-windarrow" x1="0" y1="0" x2="0" y2="0" stroke="#FFD056" stroke-width="2.4" marker-end="url(#w-ahw)"/>

            <button class="datatoggle" id="w-datatoggle" aria-expanded="false">Show data table</button>

      const el=s=>mount.querySelector(s);

        const base=f.carry, htm=headTailMult(st.head), windCarry=base*htm;
        const hangAmp=1+clamp((f.launchAngle-14)/40,0,0.6)+clamp((f.spinLoft-25)/140,0,0.35);

        const baseY=OY-clamp(base*SY,0,232), liveY=OY-clamp(windCarry*SY,0,232);
        const liveX=OX+clamp(drift*SXlat,-132,132);

        const spd=Math.hypot(st.head,st.cross);

      }
      wireSliders(mount, allS, st, render, ctx.onTouch);

      render();
      return;
    }
    const state={}; eng.forEach(s=>state[s.key]=s.value);
    const readout=cfg.readout||'startDirection', rDef=CHIP_DEFS[readout]||{dp:1,signed:true};
    const chipList=cfg.chips||['startDirection','faceToPath','spinAxis'];
    mount.innerHTML = `

        <div class="bigread">
          <div class="brk">${esc(cfg.readoutLabel||rDef.label)}</div>

            <text x="156" y="40" font-family="IBM Plex Mono" font-size="10" fill="#8E85A8">TARGET</text>
            <polygon id="dp-wedge" points="150,258" fill="rgba(255,138,77,.08)" stroke="none"/>
            <line id="dp-path" x1="150" y1="258" x2="150" y2="80" stroke="#6FC6FF" stroke-width="2.4" marker-end="url(#dp-ahp)"/>

  /* ── ARCHETYPE 6: arc-window — face-on swing-arc window over the geometry engine ──
     Live engine is swing-parameters-and-impact.js (NOT solveFlight). Orthographic,
     isotropic face-on window (x = target line →, z = up) so the drawn attack tangent's
     angle IS the attack angle — the drawing never lies (chapter spec §2). One archetype,
     three configs (low-point / strike-depth / plane-coupling). groundCrossingTheta0 is
     reimplemented inline (identical closed form to geo3d/groundcontact.js) because that
     module hard-imports THREE at load — a non-starter for this single-file SPA. */
  const ARC_PX = 5;                 // px per cm (isotropic)
  const ARC_XMIN = -25, ARC_ZMAX = 12, ARC_ZMIN = -4, ARC_XMAX = 40;
  const AWX = xm => ((xm*100) - ARC_XMIN) * ARC_PX;         // metres → svg x
  const AWY = zm => (ARC_ZMAX - (zm*100)) * ARC_PX;         // metres → svg y (z up)
  // identical closed form to geo3d/groundcontact.js#groundCrossingTheta0 (no THREE dep)
  function arcGroundTheta0(gs){
    const lp = lpWorld(gs);
    if (lp.z >= 0) return null;
    const phi = deg2rad(gs.planeAngle), r = gs.radius, s = Math.sin(phi);
    if (Math.abs(s) < 1e-9) return null;
    const c = 1 + lp.z / (r * s);
    if (c < -1 || c > 1) return null;
    return Math.acos(c);
  }
  const ARC_CHIPS = {
    attack:     { label:'Attack',      unit:'°',  dp:1, signed:true,  get:o=>o.im.attackAngle },
    clubPath:   { label:'Club path',   unit:'°',  dp:1, signed:true,  get:o=>o.im.clubPath },
    contactMM:  { label:'Contact',     unit:'mm', dp:0, signed:true,  get:o=>o.ct.offset*1000 },
    divotStart: { label:'Divot start', unit:'cm', dp:1, signed:true,  get:o=>o.divot?o.divot.startCm:null },
    divotLen:   { label:'Divot length',unit:'cm', dp:1, signed:false, get:o=>o.divot?o.divot.lenCm:null },
    band:       { label:'Strike',      special:'band' },
  };
  function mountArcWindow(mount, ctx){
    const cfg = ctx.config, eng = cfg.engineSliders || [], fixed = cfg.fixed || {};
    const presets = cfg.presets || null;
    const state = {}; eng.forEach(s => state[s.key] = s.value);
    // scoped styles (once)
    if (!document.getElementById('aw-style')){
      const st = document.createElement('style'); st.id = 'aw-style';
      st.textContent = '.aw-fig{position:relative}.aw-svg{width:100%;height:auto;display:block;border-radius:12px;background:linear-gradient(180deg,#0B0818,#0E0A18)}.aw-readrow{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:6px 0 8px}.aw-band{font-family:var(--f-mono);font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;border:1px solid var(--rule);white-space:nowrap}.aw-cap{font-family:var(--f-mono);font-size:11px;color:var(--muted);text-align:center;margin-top:5px;min-height:14px}.aw-controls{margin-top:12px}';
      document.head.appendChild(st);
    }
    // GeometryState from fixed overrides + slider binds
    function geomState(){
      const gs = { view:'face', radius:RADIUS, planeAngle:55, swingDirection:0, lowPoint:{ x:0, y:0, z:0 } };
      if ('planeAngle'    in fixed) gs.planeAngle = fixed.planeAngle;
      if ('swingDirection'in fixed) gs.swingDirection = fixed.swingDirection;
      if ('lowPointX'     in fixed) gs.lowPoint.x = fixed.lowPointX;
      if ('lowPointZ'     in fixed) gs.lowPoint.z = fixed.lowPointZ;
      eng.forEach(s => { const v = state[s.key];
        if (s.bind==='planeAngle') gs.planeAngle = v;
        else if (s.bind==='swingDirection') gs.swingDirection = v;
        else if (s.bind==='lowPointX') gs.lowPoint.x = v;
        else if (s.bind==='lowPointZ') gs.lowPoint.z = v;
      });
      return gs;

    };
    const chipFields = cfg.chips || [];

    const presetBtns = presets ? Object.keys(presets).map(k=>`<button data-aw-preset="${k}" aria-pressed="false" type="button">${esc(presets[k].label||k)}</button>`).join('') : '';

    mount.innerHTML = `
      <div class="vig-head"><h2 class="vig-title">${esc(cfg.title)}</h2><div class="vig-tag mono">${esc(cfg.tag||'LIVE')}</div></div>
      <div class="aw-readrow">
        <div><div class="fk">${esc(cfg.readoutLabel||'Attack angle')}</div>
          <div class="rpmbig"><span class="mono" id="aw-read" data-v="0">0</span><span class="u">${esc(cfg.readoutUnit||'°')}</span></div></div>
        <span class="aw-band mono" id="aw-band">—</span>
      </div>
      <div class="aw-fig" role="img" id="aw-fig" aria-label="">
        <svg class="aw-svg" viewBox="0 0 325 88" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <defs><marker id="aw-arrow" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#F472B6"/></marker></defs>
          <rect x="0" y="60" width="325" height="28" fill="rgba(138,90,43,.14)"/>
          <line x1="0" y1="60" x2="325" y2="60" stroke="var(--rule)" stroke-width="1"/>
          <path id="aw-divot" d="" fill="rgba(201,138,230,.25)" stroke="none"/>
          <path id="aw-arc" d="" fill="none" stroke="#9D8BFF" stroke-width="2" stroke-linecap="round"/>
          <line id="aw-drop" x1="125" y1="60" x2="125" y2="60" stroke="#F472B6" stroke-width="1" stroke-dasharray="2 2"/>
          <circle id="aw-ball" cx="125" cy="49.35" r="10.65" fill="#160F28" stroke="rgba(245,242,255,.45)" stroke-width="1"/>
          <line id="aw-eq" x1="114.35" y1="49.35" x2="135.65" y2="49.35" stroke="rgba(245,242,255,.18)" stroke-width="0.6" stroke-dasharray="1.5 1.5"/>
          <line id="aw-tan" x1="107" y1="49" x2="143" y2="49" stroke="#F472B6" stroke-width="2" marker-end="url(#aw-arrow)"/>
          <line id="aw-tick" x1="118" y1="49" x2="132" y2="49" stroke="#FF8A4D" stroke-width="2.4" stroke-linecap="round"/>
          <circle id="aw-lp" cx="125" cy="60" r="3" fill="#F472B6"/>
          <text id="aw-lplabel" x="125" y="85" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#F472B6"></text>
          <text id="aw-depthlabel" x="125" y="75" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#C98AE6"></text>
        </svg>
        <div class="aw-cap" id="aw-cap"></div>

      <div class="chips">${chipHTML}</div>

        ${eng.map(awSlider).join('')}
        ${presets?`<div class="segmented" role="group" aria-label="Strike presets">${presetBtns}</div>`:''}
        <div class="footnote">Face-on window, drawn true to scale — the pink tangent's angle IS the attack angle. Model divot depths are millimetre-scale (the engine models the club as a point on the arc); the relationships are exact.</div>
      </div>`;

    const el = s => mount.querySelector(s);
    function readout(o){
      const u = cfg.readoutUnit;
      if (u==='mm'){ const v=o.ct.offset*1000; return { v, dp:0, signed:true, spoken:(Math.abs(Math.round(v))+' millimetres '+(v<0?'below':v>0?'above':'at')+' the equator') }; }
      if (u==='cm'){ const v=o.effLp*100; return { v, dp:1, signed:true, spoken:(Math.abs(v).toFixed(1)+' centimetres '+(v>=0?'ahead':'behind')) }; }
      const v=o.im.attackAngle; return { v, dp:1, signed:true, spoken:(Math.abs(v).toFixed(1)+' degrees '+(v<0?'down':v>0?'up':'level')) };
    }
    function render(){
      const gs = geomState();
      const im = deriveImpact(gs), ct = clubBallContact(gs), sq = strikeQuality(gs), effLp = effectiveLpx(gs);
      const lp0 = arcPosition(0, gs);                 // low point (arc bottom), metres
      const t0 = arcGroundTheta0(gs);
      let divot = null;
      if (t0 != null){ const en = arcPosition(-t0, gs), ex = arcPosition(t0, gs);
        divot = { startCm: en.x*100, lenCm: (ex.x - en.x)*100, en, ex, t0 }; }
      const o = { im, ct, sq, effLp, lp0, divot };
      // arc path (θ −28..+28)
      let dArc='';
      for (let i=0;i<=56;i++){ const th=deg2rad(-28 + 56*(i/56)); const p=arcPosition(th, gs); dArc+=(i?'L':'M')+AWX(p.x).toFixed(1)+','+AWY(p.z).toFixed(1); }
      el('#aw-arc').setAttribute('d', dArc);
      // low-point marker + drop line + depth
      const mx = AWX(lp0.x), my = AWY(lp0.z);
      el('#aw-lp').setAttribute('cx', mx.toFixed(1)); el('#aw-lp').setAttribute('cy', my.toFixed(1));
      el('#aw-drop').setAttribute('x1', mx.toFixed(1)); el('#aw-drop').setAttribute('x2', mx.toFixed(1));
      el('#aw-drop').setAttribute('y1', my.toFixed(1)); el('#aw-drop').setAttribute('y2', AWY(0).toFixed(1));
      const lpCm = effLp*100;
      el('#aw-lplabel').setAttribute('x', mx.toFixed(1));
      el('#aw-lplabel').textContent = Math.abs(lpCm).toFixed(1)+' cm '+(lpCm>=0?'ahead':'behind');
      const depMm = lp0.z*1000;
      const dl = el('#aw-depthlabel');
      if (Math.abs(depMm) >= 0.5){ dl.setAttribute('x', mx.toFixed(1)); dl.textContent = Math.abs(depMm).toFixed(0)+' mm '+(depMm<0?'below':'above'); }
      else dl.textContent = '';
      // model divot
      const dv = el('#aw-divot');
      if (divot){ let dd=''; const N=24; for (let i=0;i<=N;i++){ const th=-t0 + 2*t0*(i/N); const p=arcPosition(th, gs); dd+=(i?'L':'M')+AWX(p.x).toFixed(1)+','+AWY(p.z).toFixed(1); }
        dd += 'L'+AWX(divot.ex.x).toFixed(1)+','+AWY(0).toFixed(1)+'L'+AWX(divot.en.x).toFixed(1)+','+AWY(0).toFixed(1)+'Z';
        dv.setAttribute('d', dd); dv.style.display='';
        const sc = divot.startCm; el('#aw-cap').textContent = 'divot starts '+Math.abs(sc).toFixed(1)+' cm '+(sc<0?'before':'after')+' the ball · '+divot.lenCm.toFixed(1)+' cm long';
      } else { dv.setAttribute('d',''); dv.style.display='none'; el('#aw-cap').textContent = 'no turf contact'; }
      // attack tangent at impact point (x=0, z=clubZ)
      const tang = tangentAt(thetaAtImpact(gs), gs);
      const mag = Math.hypot(tang.x, tang.z) || 1;
      const ux = tang.x/mag, uz = tang.z/mag, len = 3.6;   // cm each way
      const ix = AWX(0), iy = AWY(ct.clubZ);
      el('#aw-tan').setAttribute('x1', (ix - ux*len*ARC_PX).toFixed(1)); el('#aw-tan').setAttribute('y1', (iy + uz*len*ARC_PX).toFixed(1));
      el('#aw-tan').setAttribute('x2', (ix + ux*len*ARC_PX).toFixed(1)); el('#aw-tan').setAttribute('y2', (iy - uz*len*ARC_PX).toFixed(1));
      // contact tick
      el('#aw-tick').setAttribute('x1', (ix-7).toFixed(1)); el('#aw-tick').setAttribute('x2', (ix+7).toFixed(1));
      el('#aw-tick').setAttribute('y1', iy.toFixed(1)); el('#aw-tick').setAttribute('y2', iy.toFixed(1));
      // readout + band
      const rd = readout(o);
      setNum(el('#aw-read'), rd.v, { dp:rd.dp, signed:rd.signed });
      const band = el('#aw-band'); band.textContent = sq.band + ' · ' + sq.pct; band.style.color = sq.textColor; band.style.borderColor = sq.textColor;
      // chips
      chipFields.forEach(k => { const c = ARC_CHIPS[k]; const cel = el('#aw-c-'+k); if (!cel) return;
        if (c.special === 'band'){ cel.textContent = sq.band; cel.style.color = sq.textColor; return; }
        const val = c.get(o);
        if (val == null){ cel.dataset.v = 0; cel.textContent = '—'; }
        else setNum(cel, val, { dp:c.dp, signed:c.signed });
      });
      // slider value text + aria-valuetext (spoken units)
      eng.forEach(s => { const input=el('#sl-'+s.key), lbl=el('#v-'+s.key); if(!input) return;
        const raw = state[s.key]; const d = s.display ? s.display(raw) : raw;
        if (lbl) lbl.textContent = signStr(d, s.signed) + Math.abs(d) + (s.unit||'');
        const num = Math.abs(s.display ? s.display(raw) : raw);
        input.setAttribute('aria-valuetext', (s.signed&&d<0?'minus ':'') + num + (s.unitSpoken ? ' '+s.unitSpoken : ''));
      });
      // live aria sentence (every drawn value spoken; §2.3)
      const turfSent = divot ? ('Turf contact '+Math.abs(divot.startCm).toFixed(1)+' cm '+(divot.startCm<0?'before':'after')+' the ball.') : 'No turf contact.';
      el('#aw-fig').setAttribute('aria-label',
        `${cfg.title}: low point ${Math.abs(lpCm).toFixed(1)} cm ${lpCm>=0?'ahead of':'behind'} the ball, ${Math.abs(depMm).toFixed(0)} mm ${depMm<0?'below':'above'} the turf. Attack ${Math.abs(im.attackAngle).toFixed(1)} degrees ${im.attackAngle<0?'down':im.attackAngle>0?'up':'level'}. ${turfSent} ${sq.band}.`);
    }
    // wire sliders (haptic detent + touch + re-render)
    eng.forEach(s => { const input=el('#sl-'+s.key); if(!input) return;
      input.addEventListener('input', ()=>{ state[s.key]=+input.value; if(presets) setAwPressed(null); ctx.onTouch(); haptic('select'); render(); }); });
    function setAwPressed(which){ mount.querySelectorAll('[data-aw-preset]').forEach(b=>b.setAttribute('aria-pressed', b.dataset.awPreset===which?'true':'false')); }
    if (presets){ mount.querySelectorAll('[data-aw-preset]').forEach(b=>b.addEventListener('click', ()=>{
      const p = presets[b.dataset.awPreset];
      ['lpx','lpz','plane','dir'].forEach(k=>{ if (k in p){ state[k]=p[k]; const i=el('#sl-'+k); if(i) i.value=p[k]; } });
      setAwPressed(b.dataset.awPreset); haptic('light'); ctx.onTouch(); render();
    })); }
    render();
  }


  /* ══ QUIZ ══ */
  function mountQuiz(lessonId, d){
    const mount = $('#quizMount');
    const quiz = d.quiz;
    const qs = quiz.map(() => ({ answered:false, firstTry:null, resolved:false }));

    mount.innerHTML = quiz.map((q, qi) => {
      const opts = q.options.map((o, oi) => `<button class="opt" role="radio" aria-checked="false" tabindex="${oi===0?0:-1}" data-q="${qi}" data-o="${oi}"><span class="mark" aria-hidden="true"></span><span>${esc(o)}</span></button>`).join('');
      return `<div class="q" data-qi="${qi}">
        <div class="qn mono">Question ${qi+1} of ${quiz.length}</div>
        <div class="qq" id="q-${qi}">${esc(q.q)}</div>
        <div class="opts" role="radiogroup" aria-labelledby="q-${qi}">${opts}</div>
        <div class="qfoot"><button class="retrybtn" data-retry="${qi}">Retry</button><span class="qscore mono" data-qscore="${qi}"></span></div>
        <div class="expl" id="expl-${qi}"><div class="el"></div><div class="et"></div></div>
      </div>`;
    }).join('') + `<button class="finishbtn" id="finishBtn" aria-disabled="true">Finish lesson</button>`;

    const optsOf = qi => Array.from(mount.querySelectorAll(`.opt[data-q="${qi}"]`));

    // aca-25: project the header XP forward as each question resolves so the header counter
    // tracks the "+N XP" awards live (animated). Mirrors finishLesson's grammar exactly, so the
    // Finish commit lands on the same number (idempotent) — nothing double-counts.
    function syncQuizXp(){
      const l = store.lessons[lessonId];
      const perQ = qs.map(s => s.resolved ? (s.firstTry?20:10) : 0);
      const liveQuizXP = perQ.reduce((a,b)=>a+b,0) + (qs.every(s => s.resolved && s.firstTry) ? 50 : 0);
      setHeaderXpDisplay(store.xp + Math.max(0, liveQuizXP - l.quizBest));
    }

    function awardRead(){
      const l = store.lessons[lessonId];
      if (!l.read){ l.read = true; store.xp += 40; save(); refreshHeaderLive(); bumpLessonXpDisplay(lessonId); announce('Lesson read — plus 40 XP.'); }
    }
    function updateFinish(){
      const all = qs.every(s => s.answered);
      const fb = $('#finishBtn'); fb.classList.toggle('ready', all); fb.setAttribute('aria-disabled', all?'false':'true');
    }
    function choose(qi, oi){
      const st = qs[qi]; if (st.resolved) return;
      awardRead();
      const q = quiz[qi]; const correct = oi === q.answerIndex;
      if (!st.answered){ st.firstTry = correct; st.answered = true; }
      const opts = optsOf(qi);
      opts.forEach(o => o.setAttribute('aria-checked', o.dataset.o === String(oi) ? 'true':'false'));
      const expl = $('#expl-'+qi);
      expl.querySelector('.et').textContent = q.explanation;
      expl.classList.add('show');
      // verdict goes through the single live region (a11y contract: one polite region)
      announce((correct ? (st.firstTry && !st.resolved ? 'Correct — first try. ' : 'Correct. ') : 'Not quite. ') + q.explanation);
      if (correct){
        st.resolved = true;
        let correctEl = null;
        opts.forEach(o => { o.setAttribute('aria-disabled','true'); if (+o.dataset.o === oi){ o.classList.add('correct'); o.querySelector('.mark').innerHTML = ICON.check; correctEl = o; } });
        expl.classList.add('ok'); expl.classList.remove('no'); expl.querySelector('.el').textContent = st.firstTry ? 'Correct — first try' : 'Correct';
        mount.querySelector(`[data-retry="${qi}"]`).classList.remove('show');
        const sc = mount.querySelector(`[data-qscore="${qi}"]`); sc.textContent = '+' + (st.firstTry?20:10) + ' XP'; sc.classList.remove('zero');
        haptic('success');
        if (correctEl) correctEl.focus({ preventScroll:true });
      } else {
        opts.forEach(o => { o.setAttribute('aria-disabled','true'); if (+o.dataset.o === oi){ o.classList.add('wrong'); o.querySelector('.mark').innerHTML = ICON.x; } if (+o.dataset.o === q.answerIndex){ o.classList.add('correct'); o.querySelector('.mark').innerHTML = ICON.check; } });
        expl.classList.add('no'); expl.classList.remove('ok'); expl.querySelector('.el').textContent = 'Not quite — see why';
        const retryBtn = mount.querySelector(`[data-retry="${qi}"]`);
        retryBtn.classList.add('show');
        const sc = mount.querySelector(`[data-qscore="${qi}"]`); sc.textContent = 'Retry for +10 XP'; sc.classList.add('zero');
        haptic('error');
        retryBtn.focus({ preventScroll:true });
      }
      updateFinish();
      syncQuizXp();
    }
    function retry(qi){
      const st = qs[qi]; if (st.resolved) return;
      const opts = optsOf(qi);
      opts.forEach(o => { o.removeAttribute('aria-disabled'); o.classList.remove('wrong','correct'); o.setAttribute('aria-checked','false'); o.querySelector('.mark').innerHTML = ''; });
      $('#expl-'+qi).classList.remove('show');
      mount.querySelector(`[data-retry="${qi}"]`).classList.remove('show');
      mount.querySelector(`[data-qscore="${qi}"]`).textContent = '';
      opts.forEach(o => o.tabIndex = -1);
      opts[0].tabIndex = 0;
      opts[0].focus();
    }

    mount.querySelectorAll('.opt').forEach(o => {
      o.addEventListener('click', () => { if (o.getAttribute('aria-disabled') === 'true') return; choose(+o.dataset.q, +o.dataset.o); });
    });
    mount.querySelectorAll('[data-retry]').forEach(b => b.addEventListener('click', () => retry(+b.dataset.retry)));
    // radiogroup keyboard
    mount.querySelectorAll('.opts').forEach(group => {
      group.addEventListener('keydown', e => {
        const opts = Array.from(group.querySelectorAll('.opt')).filter(o => o.getAttribute('aria-disabled') !== 'true');
        if (!opts.length) return;
        let i = opts.indexOf(document.activeElement);
        if (['ArrowDown','ArrowRight'].includes(e.key)){ i = (i+1+opts.length)%opts.length; opts.forEach(o=>o.tabIndex=-1); opts[i].tabIndex=0; opts[i].focus(); e.preventDefault(); }
        else if (['ArrowUp','ArrowLeft'].includes(e.key)){ i = (i-1+opts.length)%opts.length; opts.forEach(o=>o.tabIndex=-1); opts[i].tabIndex=0; opts[i].focus(); e.preventDefault(); }
        else if (e.key===' '||e.key==='Enter'){ if (document.activeElement.classList.contains('opt')){ document.activeElement.click(); e.preventDefault(); } }
      });
    });

    $('#finishBtn').addEventListener('click', () => {
      if (!$('#finishBtn').classList.contains('ready')) return;
      haptic('light'); finishLesson(lessonId, d, qs);
    });
  }

  /* ══ COMPLETION ══ */
  function commitLessonAttempt(lessonId, results, { ensureRead=false } = {}){
    const l = store.lessons[lessonId];
    const quiz = LESSONS[lessonId]?.quiz;
    if (!l || !Array.isArray(quiz)) throw new RangeError('Unknown Academy lesson');
    if (!Array.isArray(results) || results.length !== quiz.length) {
      throw new RangeError(`Expected ${quiz.length} lesson results`);
    }

    const scored = results.map(result => ({
      resolved:Boolean(result?.resolved),
      firstTry:Boolean(result?.firstTry)
    }));
    const perQ = scored.map(result => result.resolved ? (result.firstTry?20:10) : 0);
    const quizXP = perQ.reduce((a,b)=>a+b,0);
    const correct = scored.filter(result => result.resolved).length;
    const perfect = scored.every(result => result.resolved && result.firstTry);
    const lessonQuizXP = quizXP + (perfect?50:0);
    const threshold = Math.ceil(quiz.length * MASTERY_FRAC);

    l.quizLen = quiz.length;
    l.quizBestCorrect = Math.max(l.quizBestCorrect || 0, correct);
    l.mastered = l.mastered || (l.quizBestCorrect >= Math.ceil((l.quizLen||quiz.length) * MASTERY_FRAC));

    const beforeLevel = levelInfo(store.xp).lvl;
    const readDelta = ensureRead && !l.read ? 40 : 0;
    if (readDelta){
      l.read = true;
      store.xp += readDelta;
    }
    l.quizAttempts += 1;
    const delta = Math.max(0, lessonQuizXP - l.quizBest);
    store.xp += delta;
    l.quizBest = Math.max(l.quizBest, lessonQuizXP);
    if (perfect) l.perfect = true;
    l.completed = true; l.completedAt = Date.now();
    store.lastOpened = lessonId;
    const unlockedBefore = store.unlocked.length;
    recomputeUnlocks();
    const didUnlock = store.unlocked.length > unlockedBefore;
    const earned = [];
    awardBadges(earned);
    save();

    const tierCol = TIER_COLS.find(column => column.ids.includes(lessonId));
    const tierComplete = tierCol && tierCol.ids.every(id => store.lessons[id] && store.lessons[id].completed);
    if (tierComplete) haptic('medium');
    else if (didUnlock && !earned.length) haptic('success');

    const li = levelInfo(store.xp);
    const leveledUp = li.lvl > beforeLevel;
    refreshHeaderLive();
    bumpLessonXpDisplay(lessonId);

    return {
      correct,
      total:quiz.length,
      perfect,
      threshold,
      mastered:l.mastered,
      delta,
      readDelta,
      totalDelta:readDelta + delta,
      storeXp:store.xp,
      leveledUp,
      levelInfo:{ ...li },
      earnedBadges:[...earned],
      didUnlock
    };
  }

  function commitNativeLessonAttempt(lessonId, submission){
    const attemptId = submission?.attemptId;
    if (typeof attemptId !== 'string' || !attemptId) throw new TypeError('attemptId is required');
    const journey = getJourney(lessonId);
    if (!journey.masteryAttemptId) throw new RangeError('No active mastery attempt');
    if (attemptId !== journey.masteryAttemptId) throw new RangeError('attemptId does not match the active mastery attempt');
    if (journey.lastSubmission?.attemptId === attemptId) return journey.lastSubmission.summary;

    const summary = commitLessonAttempt(lessonId, submission.results, { ensureRead:true });
    updateJourney(lessonId, {
      surface:5,
      masteryBest:Math.max(journey.masteryBest, summary.correct),
      masteryAttempts:journey.masteryAttempts + 1,
      masteryAttemptId:attemptId,
      lastSubmission:{ attemptId, summary }
    }, { immediate:true });
    return summary;
  }

  function finishLesson(lessonId, d, qs){
    const quiz = d.quiz, meta = LESSONS[lessonId];
    const summary = commitLessonAttempt(lessonId, qs);
    const { correct, perfect, threshold, delta, leveledUp } = summary;
    const earned = summary.earnedBadges;
    const li = summary.levelInfo;
    const afterLevel = li.lvl;
    const mastered = summary.mastered;

    const nextCta = meta.next ? `<button class="cta primary" id="c-next">Next: ${esc(meta.nextLabel)} ${ICON.arrow}</button>` : '';
    const luBanner = leveledUp ? `<div class="levelup show">Level up! You reached Level ${afterLevel} — ${esc(li.title)}.</div>` : '';
    const badgeCards = earned.map(id => { const b = BADGE[id]; return `<div class="cbadge"><span class="g" aria-hidden="true">${badgeIcon(id)}</span><div><div class="n">${esc(b.label)}</div><div class="d">${esc(b.desc)}</div></div></div>`; }).join('');
    // "MASTERED" only renders at ≥ threshold; below it the card is honest and points to the retry.
    const headline = mastered ? `${esc(d.parameter)} mastered` : `${esc(d.parameter)} complete`;
    const scoreLine = mastered
      ? `${correct} / ${quiz.length} correct${perfect?' · <b class="perf">perfect run</b>':''} &middot; earned <b>+${delta} XP</b> this attempt`
      : `${correct} / ${quiz.length} on the check &middot; earned <b>+${delta} XP</b> this attempt. Retry any question for mastery (${threshold}/${quiz.length}).`;

    const cm = $('#completionMount');
    cm.innerHTML = `<div class="completion">
      <div class="ck">${mastered ? 'Module mastered' : 'Module complete'}</div>
      <h2>${headline}</h2>
      <div class="cscore">${scoreLine}</div>
      <div class="xptally"><span class="mono" id="c-xptally">${store.xp - delta}</span><span class="u">XP TOTAL</span></div>
      ${luBanner}
      ${badgeCards ? `<div class="cbadges">${badgeCards}</div>` : ''}
      <div class="cctas">${nextCta}<button class="cta ghost" id="c-back">Back to path</button></div>
    </div>`;

    setNum($('#c-xptally'), store.xp, { commas:true });
    announce(`Module ${mastered?'mastered':'complete'}. ${correct} of ${quiz.length} correct.${mastered?'':' Retry for mastery.'} Plus ${delta} XP. ${leveledUp?('Level '+afterLevel+', '+li.title+'. '):''}${earned.length?('Badge'+(earned.length>1?'s':'')+' earned: '+earned.map(id=>BADGE[id].label).join(', ')+'.'):''}`);

    const nb = $('#c-next'); if (nb) nb.addEventListener('click', () => { haptic('light'); store.lastOpened = meta.next; save(); go('#/lesson/'+meta.next); });
    $('#c-back').addEventListener('click', () => { haptic('light'); go('#/path'); });
    if (!reduced()) cm.scrollIntoView({ behavior:'smooth', block:'start' });
  }

  /* ══ INIT ══ */
  recomputeUnlocks();
  route();
  </script>
