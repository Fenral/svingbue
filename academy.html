b: each +1° of spin loft drops smash ~0.004 (less ball speed) while adding backspin steeply. Spin loft 25->40°: smash 1.36->1.30, backspin 5400->8496 rpm.","why":"Dynamic loft minus attack angle. It is why launch, spin and ball speed all move together — you cannot add spin/launch without paying in ball speed, so carry is optimized, not maximized, on this lever."},{"driver":"Altitude / air density","weight":"~+2% carry per 1000 ft of elevation (the raw density drop is ~3%/1000 ft, but lift-loss offsets ~a third). Denver 5280 ft ~ +10%, roughly +15 yd on a 175-yd shot.","why":"Grounded: air density falls from 1.225 kg/m3 (sea level) to 1.19 at 1000 ft (0.97x) and 1.056 at 5000 ft (0.86x). Less dense air = less drag = more carry, but the same thin air weakens backspin lift, so carry gains less than density falls."},{"driver":"Wind (head / tail)","weight":"Headwind ~ -1% carry per mph; tailwind ~ +0.5% per mph — asymmetric. A 10 mph headwind ~ -10 to -18 yd; 20 mph ~ -25 to -35 yd on a mid-iron.","why":"Wind changes the ball's airspeed and drag scales with airspeed^2, so a headwind adds more drag (+21% at a representative 45 m/s) than a tailwind removes (-19%), and it also lengthens air-exposure time. In strong gusts wind is the single biggest environmental factor, exceeding altitude."},{"driver":"Temperature","weight":"Air density is proportional to 1/absolute-temperature: ~3.3% thinner per +10 C (~+2 yd per +10 C, ~+1 yd per 10 F). Small.","why":"Grounded: dry air is 1.247 kg/m3 at 10 C vs 1.165 at 30 C (288/283 = 1.018, 288/303 = 0.951). Hot air is thinner so the ball flies a touch farther; a cold ball is also slightly less lively, compounding the loss modestly."},{"driver":"Humidity","weight":"<1% of carry — essentially negligible, and opposite to intuition: humid air is lighter, so muggy conditions add ~1-2 yd at most.","why":"Grounded: water vapor is 18.0 g/mol vs dry air 28.96 g/mol, so replacing air molecules with water molecules lowers density (moist air ~1.199 kg/m3 vs 1.20+ dry at 20 C). The 'thick humid air kills distance' belief is a myth."}],"misconceptions":["More loft = more carry. False past the window: added dynamic loft raises backspin and lowers smash/ball speed (engine: spin loft 25->40° drops smash 1.36->1.30), so beyond the optimal launch/spin the ball balloons and carries shorter.","'Thick, humid air kills distance.' Backwards — humid air is lighter than dry air (water vapor 18.0 g/mol vs dry air 28.96 g/mol), so muggy conditions add a tiny bit of carry, not take it away.","'Swing down harder to hit it farther.' Attack angle mostly changes spin loft, launch and spin — the real distance lever is ball speed (club speed x a clean, centered strike).","'Backspin is bad, it shortens shots.' You need backspin: it creates the Magnus lift (~0.77 N at 60 m/s, ~1.7x the ball's weight) that keeps the ball airborne. Only spin above the window costs carry.","'At altitude the ball goes as much farther as the air is thinner.' No — carry gains only ~2% per 1000 ft even though density drops ~3%, because the same thin air also weakens the lift holding the ball up.","'A headwind and a tailwind cancel out.' They don't — a headwind hurts about twice as much as an equal tailwind helps, because drag grows with airspeed squared.","'Cold air makes the ball fly short because it's cold.' The effect is real but small (~2 yd per 10 C) and it's mostly the denser cold air, not the ball's temperature."],"wolframChecks":["air density at sea level standard atmosphere 15 C -> 1.226 kg/m3 (ISA reference 1.225)","air density at 1000 ft ISA -> 1.19 kg/m3 (0.97x sea level = ~3% thinner per 1000 ft)","air density at 5000 ft ISA -> 1.056 kg/m3 (0.86x); at 5280 ft (Denver) -> 1.047 kg/m3 (0.855x, ~14% thinner)","density of dry air at 30 C 1 atm -> 1.165 kg/m3 (0.95x); at 10 C -> 1.247 kg/m3 (1.02x): ~3.3% per 10 C","288.15/303.15 = 0.9505 and 288.15/283.15 = 1.0177 -> confirms density is proportional to 1/absolute-temperature (matches the 30 C / 10 C densities exactly)","molar mass water vapor 18.015 g/mol vs dry air 28.96 g/mol -> humid air is lighter, so moist air is less dense (density of moist air 20 C/50% -> 1.199 kg/m3, MW 28.84)","drag force 0.5*1.225*70^2*0.25*(pi/4*0.0427^2) = 1.074 N on a golf ball at 70 m/s (vs ball weight ~0.45 N) -> drag dominates flight","Magnus lift 0.5*1.2*0.25*(pi/4*0.0427^2)*60^2 = 0.773 N at 60 m/s -> ~1.7x the ball's 0.45 N weight, why backspin extends carry","engine carry 0.232*ballSpeed^1.389/(1+(ballSpeed/210)^6) at club speeds 80/90/100/110 mph (ball 106/120/133/146) -> 148.8 / 172.4 / 193.9 / 211.6 yd = ~+20 yd per +10 mph, tapering","engine ballSpeed 150 vs 170 -> carry 215.7 vs 226.9 yd (only +5.2%): confirms drag saturation flattens carry at the top end","engine smash 1.46-0.004*spinLoft at 25/33/40° -> 1.36 / 1.328 / 1.30, and backspin spinLoft*ballSpeed*1.8 -> 5400 / 7098 / 8496 rpm: adding loft trades ball speed for spin (the optimal-window mechanism)","wind drag asymmetry (49.47^2-45^2)/45^2 = +0.209 headwind vs (40.53^2-45^2)/45^2 = -0.189 tailwind at 45 m/s +/-10 mph -> headwind adds ~21% drag, tailwind removes ~19%: asymmetric penalty"],"quiz":[{"q":"What is the single biggest driver of how far a shot carries?","options":["Backspin rate","Ball speed (club speed x smash factor)","Air temperature","Dynamic loft"],"answerIndex":1,"explanation":"Ball speed dominates everything else. In Flightglass's engine, going from 80 to 110 mph of club speed lifts a 7-iron's carry from ~149 to ~212 yards — about +20 yards per 10 mph. Launch, spin and weather only fine-tune how efficiently that speed becomes distance."},{"q":"You play the same 7-iron shot in Denver (~5,280 ft) instead of at sea level. Roughly what happens to your carry?","options":["About 10% shorter","About the same","About 10% longer","About 25% longer"],"answerIndex":2,"explanation":"Thinner air means less drag. Air density falls ~14% from sea level to Denver, but carry only gains about +2% per 1,000 ft (~+10% total) because the same thin air also weakens the backspin lift holding the ball up. On a 175-yard shot that's roughly +15 yards."},{"q":"Compare a 10 mph headwind to a 10 mph tailwind. Which is true?","options":["They cancel out — wind is symmetric","The headwind costs more than the tailwind gives back","The tailwind helps more than the headwind hurts","Wind changes direction but not carry"],"answerIndex":1,"explanation":"Drag grows with airspeed squared, so a headwind adds more drag (~21% at a typical mid-flight speed) than a tailwind removes (~19%), and it also keeps the ball in the air longer. Rule of thumb: a headwind costs ~1% carry per mph, a tailwind gives back only ~0.5% per mph."},{"q":"On a hot, humid, muggy day, the ball tends to carry...","options":["Noticeably shorter — humid air is heavy and thick","Slightly farther — humid air is actually lighter than dry air","Exactly the same — water vapor has no effect","Shorter, because the ball absorbs moisture"],"answerIndex":1,"explanation":"Water vapor (18.0 g/mol) is lighter than the nitrogen and oxygen it displaces (dry air 28.96 g/mol), so humid air is less dense than dry air. Combined with the heat thinning the air, the ball flies a touch farther — the opposite of the common 'thick air' myth, though the effect is only a yard or two."},{"q":"You add a lot of dynamic loft to hit it higher, same club speed. Backspin and launch jump up, but carry doesn't grow the way you hoped. Why?","options":["More loft always means more carry","Extra spin loft boosts spin and launch but lowers smash/ball speed, and past the optimal window the extra spin balloons the flight","Loft has no effect on a golf ball's carry","The ball gets heavier at higher loft"],"answerIndex":1,"explanation":"Dynamic loft raises spin loft, which trades ball speed for spin — in the engine, spin loft 25 to 40° drops smash 1.36 to 1.30 while backspin climbs 5,400 to 8,496 rpm. Beyond the optimal launch-and-spin window the ball balloons and stalls, so carry peaks and then falls. You tune loft to find the window, not to maximize spin."}]}
  </script>

  <script type="application/json" id="lesson-club-speed">
{"parameter":"Club Speed","oneLiner":"Club speed is how fast the clubhead is moving, in mph, at the instant it reaches the ball — the raw power number every other outcome in the swing is built on top of.","whatItIs":"Club speed is exactly what it sounds like: the clubhead's speed, in miles per hour, at one single instant — the moment it meets the ball. It carries no directional information (that's club path and face angle, separate parameters) and no loft/spin information — it is a pure scalar magnitude, and it is usually the very first number a launch monitor (TrackMan, Foresight, etc.) reports after a shot. In Flightglass's dependency graph, club speed sits in the Fundamentals tier as a true root input: nothing else in the model feeds into it — the engine takes it directly as a slider value, not something computed from other parameters — and it has exactly one child in the graph: ball speed. That is the whole physics job of club speed: it is the raw energy that gets converted, through the strike, into ball speed, which is what actually determines flight. A very fast but badly-struck swing can lose more to poor strike quality than a slower, flush one gains in ball speed, which is why club speed alone — without knowing how it was delivered (smash factor / centeredness) — doesn't tell you distance. One honest engine limitation worth flagging up front: Flightglass currently ships a single generic strike-efficiency model (only a '7iron' preset exists; the source code has a literal 'TODO driver' comment), so a driver-shaped strike (low dynamic loft, positive attack angle) in the app tops out at a smash factor of about 1.42 — short of the real ~1.48-1.50 pros achieve off the tee. The core relationship (faster club speed -> proportionally faster ball speed -> more carry, with diminishing returns from drag) is engine-true and matches real launch-monitor data closely; the exact driver smash-factor ceiling is an EST/engine-simplification, not a physical fact, and should be flagged wherever it's shown.","components":[{"name":"Club speed (the raw input)","role":"The swing's power number, measured in mph at the clubhead at the instant of impact. It is the root of the dependency graph — nothing upstream computes it, and it feeds exactly one thing downstream: ball speed.","typicalRange":"recreational driver ~85-95 mph; PGA Tour driver ~113-115 mph; LPGA Tour driver ~94 mph; World Long Drive ~145-155+ mph"},{"name":"Smash factor (strike efficiency)","role":"The multiplier that turns club speed into ball speed: ballSpeed = clubSpeed x smashEff. In the engine it is driven entirely by spin loft (smashEff = 1.46 minus 0.004 x spinLoft) — a flush, low-spin-loft strike sits near the ceiling; a glancing, high-spin-loft strike sits well below it.","typicalRange":"driver ~1.45-1.50 physically (engine caps at 1.42, see note); 7-iron ~1.30-1.35; wedge ~1.20-1.25"},{"name":"Kinematic sequence (ground -> hips -> torso -> arms -> club)","role":"The biomechanical engine that actually generates clubhead speed — not modeled inside solveFlight, but the real-world cause behind whatever number ends up on the club-speed slider. Proximal-to-distal sequencing (each body segment handing off speed to the next, like cracking a whip) is the single biggest lever golfers and coaches actually train.","typicalRange":"poor vs. good sequencing at equal physical effort: commonly a 10-20+ mph gap (illustrative, biomechanics/TPI literature)"},{"name":"Swing radius & release timing (\"lag\")","role":"Clubhead speed is approximately angular velocity times effective radius. Holding the wrist-cock angle and releasing it late (rather than 'casting' it away early) keeps that radius working through the fastest part of the downswing, multiplying tip speed in the final instants before impact.","typicalRange":"well-timed vs. early release at equal body-rotation speed: commonly cited 10-15 mph difference (illustrative)"},{"name":"Physical training (speed work)","role":"A trainable athletic quality layered on top of technique. Overspeed-training protocols (lighter/heavier training clubs, explosive rotational drills) specifically target the neuromuscular sequencing above, independent of a golfer's starting size or strength.","typicalRange":"documented average gains ~3-5 mph over 6-8 weeks; dedicated programs report up to 8-10 mph"},{"name":"Equipment fit (shaft weight/flex, clubhead COR)","role":"Tunes how efficiently body-generated energy reaches the ball. A properly fit shaft is worth a few mph at most — and the clubface's spring-like effect (COR) is legally capped, which is the physical reason smash factor itself has a hard ceiling regardless of swing.","typicalRange":"shaft-fit gain ~1-3 mph; legal COR limit 0.830 (USGA/R&A) -> theoretical smash-factor ceiling ~1.49"}],"howTheyConnect":"Club speed is captured at one instant — the moment the clubhead reaches the ball, measured by a launch monitor's radar or camera system in the last few milliseconds of the downswing. Getting there fast is a kinetic-chain problem: the body builds speed proximally (ground force through the legs and hips) and hands it distally to the torso, arms, and finally the club, like cracking a whip — each link moving faster than the one before it, provided the timing (sequencing) is right and the wrist-cock angle ('lag') is held and released late rather than thrown away early ('casting'). None of that biomechanics lives inside Flightglass's impact-flight engine — clubSpeed arrives as a single raw mph number, the one parameter in the dependency graph with no upstream cause. What the engine does model, faithfully, is what happens the instant club speed meets the ball: ballSpeed = clubSpeed x smashEff, where smashEff is a strike-efficiency multiplier that itself depends on spin loft (smashEff = 1.46 - 0.004 x spinLoft, clamped between 1.15 and preset.smash+0.09). That single line is the whole story of why identical club speed can produce very different ball speeds: a flush, low-spin-loft driver-shaped strike (spin loft ~9°) sits near smashEff's ceiling (1.42 in this engine; physically ~1.48-1.50, capped by the legal 0.830 clubface COR limit and the ball-to-clubhead mass ratio, Wolfram-verified: (1+0.83)/(1+0.04593/0.200) = 1.488), while a glancing, high-spin-loft wedge-shaped strike (spin loft ~51°) sits down near 1.25. From there, ball speed cascades everywhere: it is the sole input to Flightglass's carry formula (a drag-saturated power curve) and to apex, and it multiplies directly into the backspin formula alongside spin loft. Sweeping club speed on 7-iron-shaped geometry (30° dynamic loft, -3° attack) through the engine shows the payoff concretely: 60/70/80/90/100/110 mph produces carries of 101/125/149/172/194/212 yd — roughly +20 to +24 yards of carry for every +10 mph, though that per-mph return shrinks as speed climbs (+23.6 yd from 60->70 mph, only +17.6 yd from 100->110 mph) because aerodynamic drag grows with speed too. Pushed to driver-shaped geometry at extreme speeds (120->130 mph, spin loft 9°), the engine's carry curve actually peaks near a 172 mph ball speed (~227 yd) and edges down slightly beyond it (223.8/227.0/223.1 yd at 113/120/130 mph club speed) — an honest, if slightly artificial, reminder from the model itself that the relationship between raw speed and distance is not indefinitely linear.","hierarchy":[{"driver":"Kinematic sequence (hips -> torso -> arms -> club, \"the whip\")","weight":"dominant — proper proximal-to-distal sequencing and ground-force use is the single biggest source of clubhead speed; poor sequencing ('casting', releasing the wrist-cock too early) can cost 10-20+ mph versus a well-timed swing at the same physical effort","why":"Clubhead speed isn't generated by the arms alone — it's the last link in a kinetic chain (ground -> hips -> torso -> arms -> club) where each segment hands off speed to the next, amplified by properly-timed release. This is why smaller/lighter golfers with excellent sequencing regularly out-swing bigger, stronger golfers with poor technique, and why biomechanics research (e.g. TPI-style analysis) treats sequencing as the #1 speed lever, ahead of raw strength."},{"driver":"Swing radius & release timing (lag)","weight":"large — clubhead speed is approximately angular velocity times effective radius, and a late release multiplies tip speed sharply in the final ~50ms before impact; this alone can separate a 90 mph swing from a 100 mph swing at the same rotational effort","why":"The club is a lever on the end of a double pendulum (arms, then club). Holding the wrist-cock angle longer keeps the radius effectively 'folded' until the last instant, then unleashes it right at the ball — this is the 'whip' or 'lag' every fast swinger shares, from tour pros to World Long Drive competitors."},{"driver":"Physical power / speed training","weight":"moderate, trainable — documented overspeed-training protocols add roughly +3 to +5 mph of clubhead speed on average over 6-8 weeks (dedicated programs report up to +8-10 mph), independent of a golfer's starting size","why":"Speed is a trainable athletic quality, not just a byproduct of playing golf. Programs built around overspeed swings (lighter/heavier training clubs, explosive rotational work) specifically target the neuromuscular sequencing above, which is why gains show up even in golfers who don't get objectively 'stronger' in the gym."},{"driver":"Equipment fit (shaft weight/flex, clubhead design)","weight":"small — proper shaft weight/flex/length fitting is typically worth only ~1-3 mph versus a mismatched setup, and can just as easily cost speed or smash factor if it's wrong for the swing","why":"Equipment tunes how efficiently a golfer's own generated energy reaches the clubhead — it doesn't manufacture new speed from nothing. A shaft too heavy or stiff for the swing damps speed; one that's too light can be gained on paper but lost in strike quality (smash factor), which is why 'fastest shaft' marketing rarely delivers the mph it promises on its own."},{"driver":"Physical attributes (age, strength, flexibility, sex)","weight":"background factor — average clubhead speeds differ meaningfully across these groups (commonly cited: ~90-93 mph male recreational average vs ~70-75 mph female recreational average; speed trends down with age past the 50s in aggregate data), but they set a population baseline, not a ceiling any individual is locked into","why":"These are the broad demographic patterns behind published averages, useful for context on why 'the average golfer' number varies by source/sample — but sequencing, lag, and training above are the levers an individual golfer actually pulls, and they can move a person well outside their demographic average."}],"realWorld":{"tourBenchmarks":["PGA Tour driver averages (TrackMan tour-average table): clubhead speed ~113 mph, ball speed ~167 mph, smash factor ~1.48, carry ~275 yd, total driving distance commonly reported in the high-290s to ~300 yd in recent seasons.","LPGA Tour driver averages: clubhead speed ~94 mph, ball speed ~135 mph, smash factor ~1.44, carry ~218 yd.","PGA Tour 7-iron averages: clubhead speed ~90 mph, ball speed ~120 mph, smash factor ~1.33, carry ~172 yd — matches Flightglass's own default 7-iron engine calibration (90 mph -> 119.5 mph ball speed, 172.4 yd carry) almost exactly.","Recreational golfer benchmarks (commonly cited launch-monitor aggregates): men ~90-93 mph, women ~70-75 mph driver clubhead speed — roughly 20% slower than the PGA Tour average (Wolfram-verified: (113-93)/93 = 21.5%).","World Long Drive competitors: clubhead speeds of 145-155+ mph, with recorded peaks over 150 mph (e.g. Kyle Berkshire) and ball speeds over 220 mph.","Physics ceiling: the legal clubface coefficient-of-restitution limit (USGA/R&A, 0.830) combined with a ~200g driver head and a 45.93g ball (USGA max, Wolfram-confirmed) caps theoretical smash factor around 1.49 (Wolfram: (1+0.83)/(1+0.04593/0.200)=1.488) — Tour pros' ~1.48 average is already right up against that legal/physical wall."],"scenarios":["Two golfers both catch the ball flush (same smash factor) but one swings 90 mph and the other 113 mph — the faster swinger's ball leaves roughly 47 mph faster (120 vs 167 mph) from clubhead speed alone.","A golfer buys a driver marketed for 'more clubhead speed' and gains 3 mph on the radar — but starts missing the center of the face more often, and net ball speed actually drops, because the speed gain didn't come with the same smash factor.","A player does a 6-8 week overspeed-training block and adds ~4 mph of 7-iron clubhead speed with no other swing changes — Flightglass's engine shows what that alone is worth: roughly +9 to +10 yards of carry in the 90-100 mph 7-iron range.","At a World Long Drive event, a 150+ mph swing that clips the ball off-center still loses to a well-struck 130 mph swing — speed without a centered strike is wasted, exactly as the engine's smash-factor formula predicts.","A junior or senior golfer with modest physical strength but excellent sequencing and lag can out-swing a bigger, stronger golfer with poor kinematic timing — clubhead speed is a technique number as much as a strength number."],"whatItMeansForYou":"Club speed is the lever with the most raw headroom for distance — but it isn't a knob you can crank without limit, and it does nothing on its own without a centered strike (smash factor) to convert it. For most recreational golfers, a realistic, well-earned gain is a handful of mph (3-5) from better sequencing/technique or a structured speed-training block — not the ~20 mph gap to Tour pros. Chase speed, but chase it alongside strike quality: Flightglass's own numbers show a faster swing with a worse smash factor can go shorter than a slower, flush one, and even the engine's own carry curve flattens (and can dip slightly) at extreme, largely unrealistic speeds — a reminder that past a point, consistency starts to matter more than one more mph on the radar."},"misconceptions":["\"Swinging as hard/fast as possible always means more distance.\" Not quite: club speed only becomes distance through smash factor (a centered strike), and the engine's own carry curve is drag-saturated — it peaks near a 172 mph ball speed and can taper or even dip slightly beyond it (driver-preset check: 120 mph -> 227.0 yd vs 130 mph -> 223.1 yd carry). Real swings rarely reach that extreme zone, but the broader point holds: an uncontrolled max-effort swing that sacrifices centeredness can net less ball speed than a controlled, flush 85-90%-effort swing.","\"Club speed and ball speed are basically the same number.\" False — ball speed is club speed multiplied by smash factor (roughly 1.2x-1.5x depending on club and strike), so a 90 mph swing and a 113 mph swing don't just differ by 23 mph on ball speed; the gap widens because faster swingers (often, but not always) also strike more efficiently.","\"A slower swing off the tee is always more accurate.\" Not from the speed number alone — dispersion is governed mainly by face angle and club path, different nodes in the graph entirely. Tour pros swinging 113+ mph are also extremely accurate; dispersion tends to rise mainly when someone swings beyond their own repeatable technical limit, not from raw speed itself.","\"Only strength/size determines swing speed.\" Sequencing and release timing (lag) matter enormously — lighter, smaller golfers with excellent kinematic sequencing regularly out-swing bigger, stronger golfers with poor sequencing. Documented speed-training gains (+3-5 mph typical) also show trainable improvement independent of raw muscle mass.","\"Faster equipment (longer/lighter shafts) is a free speed upgrade.\" Shaft and clubhead tuning yields a modest few mph at best (~1-3 mph) and can cost control/centeredness (lower smash factor) if mismatched — so raw spec changes alone don't guarantee more ball speed; a 'faster' setup with a worse strike can lose more than it gains.","\"There's no physical ceiling on smash factor if you strike it perfectly.\" False — the clubface's spring-like effect (coefficient of restitution) is legally capped at 0.830 by the USGA/R&A, which combined with the ball-to-clubhead mass ratio puts a hard theoretical ceiling on smash factor around 1.49 for a driver (Wolfram-verified). Tour pros' ~1.48 average is already right up against this legal and physical wall, which is why smash-factor gains plateau even for elite ball-strikers."],"wolframChecks":["113 mph -> 50.52 m/s; 90 mph -> 40.23 m/s; 167 mph -> 74.66 m/s; 120 mph -> 53.64 m/s — unit conversions anchoring every mph benchmark quoted.","(113/90)^2 = 157.6% -> a 25.6% clubhead-speed gap (90->113 mph) becomes a 57.6% kinetic-energy gap; KE = 0.5x0.2kgx50.52^2 = 255.23 J vs 0.5x0.2kgx40.23^2 = 161.85 J, ratio 1.577 — confirms energy scales with speed squared even though ball speed/carry scale closer to linearly (through the roughly-constant smash-factor multiplier).","Smash-factor physics ceiling: (1+COR)/(1+m_ball/m_club) = (1+0.83)/(1+0.04593/0.200) = 1.488 — the USGA/R&A legal COR limit (0.830) combined with a ~200g driver head and a 45.93g ball (USGA max, Wolfram-confirmed) puts a hard theoretical ceiling on smash factor around 1.49, matching real PGA Tour driver smash (~1.48) almost exactly.","Engine cross-check: 113 mph x 1.48 = 167.24 mph -> matches the commonly cited PGA Tour driver ball-speed average (~167 mph) almost exactly.","94 mph x 1.44 = 135.36 mph -> matches the commonly cited LPGA Tour driver ball-speed average (~135 mph).","90.2 mph x 1.33 = 119.97 mph -> matches the commonly cited PGA Tour 7-iron ball-speed average (~120 mph) and matches Flightglass's own engine output for a 90 mph 7-iron swing (ballSpeed 119.52 mph, smashEff 1.328) almost exactly — the engine's 7-iron calibration lines up with real tour data.","(113-93)/93 = 21.51% -> PGA Tour pros swing the driver roughly 20% faster than commonly cited recreational-golfer averages (~93 mph).","Engine sweep (driver-preset geometry, dl=13 aa=+4, smashEff capped at 1.42): club speed 70/90/110/113/120/130 mph -> ball speed 99.4/127.8/156.2/160.5/170.4/184.6 mph -> carry 136.5/186.2/221.1/223.8/227.0/223.1 yd. Carry peaks near ballSpeed~172 mph (found by direct sweep of the engine formula in 0.5 mph steps: peak 227.02 yd at ballSpeed 172) then very slightly declines — the engine's drag-saturated carry curve (0.232xballSpeed^1.389/(1+(ballSpeed/210)^6)) is not perfectly monotonic at extreme, largely unrealistic ball speeds.","Engine sweep (7-iron-preset geometry, dl=30 aa=-3): club speed 60->110 mph in 10 mph steps -> carry deltas of +23.6, +24.1, +23.5, +21.5, +17.6 yd per +10 mph — confirms carry rises steeply with club speed but the marginal yard-per-mph shrinks as speed climbs (drag).","Engine limitation flagged: smashEff = clamp(1.46 - 0.004xspinLoft, 1.15, preset.smash+0.09) depends only on spin loft, not on which club preset is selected — so the driver-geometry sweep above tops out at smashEff 1.42 (spin loft 9°), short of the real ~1.48-1.50 tour driver smash factor, because Flightglass's engine currently ships only a single '7iron' preset (confirmed via source comment: 'TODO driver (when 3D model ready)'). This is an engine simplification, not a physical fact — any driver-context smash-factor readout in the diagram should carry an EST/engine-capped flag."],"quiz":[{"q":"In Flightglass's engine, what is club speed's one direct output in the dependency graph?","options":["Backspin, directly","Ball speed, via the smash factor (ballSpeed = clubSpeed x smashEff)","Carry, directly","Launch angle"],"answerIndex":1,"explanation":"Club speed has a single outgoing edge in the app's dependency graph: club-speed -> ball-speed. The engine formula is literal: ballSpeed = clubSpeed x smashEff. Everything else you feel downstream (backspin, carry, apex...) is built on ball speed, not on club speed directly."},{"q":"A golfer raises clubhead speed from 90 to 113 mph — a ~25.6% increase. What happens to the kinetic energy in the clubhead at impact?","options":["Also rises about 25% (linear)","Rises about 58%, because kinetic energy scales with speed squared","Stays the same — smash factor cancels it out","Falls, because faster swings are less efficient"],"answerIndex":1,"explanation":"Energy = 1/2 m v^2, so it scales with the square of speed. Wolfram-verified: 0.5 x 0.2kg x 50.52^2 m/s = 255.2 J at 113 mph vs 0.5 x 0.2kg x 40.23^2 m/s = 161.8 J at 90 mph — a 57.7% jump in energy from a 25.6% jump in speed, matching (113/90)^2 = 157.6%. This is why 'a little more speed' is disproportionately hard to add, and why realistic training targets are a few mph, not tens of mph."},{"q":"Real PGA Tour average driver numbers are roughly clubhead speed 113 mph and ball speed 167 mph. What smash factor does that imply, and what caps it physically?","options":["~1.48, capped near there by the legal clubface COR limit (0.830) and the ball-to-clubhead mass ratio","~2.0, capped by ball dimples","~1.0, capped by club length","~3.5, uncapped"],"answerIndex":0,"explanation":"167.24 / 113 = 1.48. That's close to the physics ceiling: with the USGA/R&A's legal coefficient-of-restitution limit (0.830) and a ~200g driver head against a 45.93g ball, the formula (1+COR)/(1+m_ball/m_club) gives a theoretical max smash factor around 1.49 — Tour pros are already swinging right up against that legal/physical wall."},{"q":"In Flightglass's own engine, sweeping club speed from 120 to 130 mph on a driver-shaped strike (spin loft 9°) makes carry go from ~227 yd to ~223 yd — it goes down. Why?","options":["A bug that should be ignored","The engine's drag-saturated carry formula flattens and slightly dips at very high, largely unrealistic ball speeds (~172 mph+) — a reminder that raw speed has diminishing, and eventually shrinking, returns","Because attack angle changed","Because backspin drops to zero"],"answerIndex":1,"explanation":"Flightglass's carry formula (0.232 x ballSpeed^1.389 / (1+(ballSpeed/210)^6)) is built to saturate with drag — a direct sweep of the formula shows it peaks near ballSpeed = 172 mph (227.02 yd) and edges down beyond that. Most real swings never reach that zone, but the shape makes an honest point: past some speed, more mph stops paying off in distance, and control/centeredness starts to matter more."},{"q":"Why is a driver's smash factor (~1.48) so much higher than a wedge's (~1.20-1.25)?","options":["Drivers are swung faster, and faster swings always have higher smash factor","Spin loft — the driver's low spin loft (~9-15°) makes for a flush, minimally-glancing strike near the physics ceiling; the wedge's high spin loft (~45-51°) is inherently more glancing, which the engine models directly as smashEff falling with spin loft","The wedge's ball is heavier","Smash factor is not related to club type"],"answerIndex":1,"explanation":"The engine states this directly: smashEff = clamp(1.46 - 0.004 x spinLoft, ...). A driver's low spin loft keeps the strike close to flush (smash near the ~1.49 physics ceiling); a wedge's high spin loft is a much more glancing blow, which the formula — and real launch-monitor data — shows as a lower smash factor. It's about strike geometry, not swing speed."}]}
  </script>
  <script type="application/json" id="lesson-dynamic-loft">
{"parameter":"Dynamic Loft","oneLiner":"Dynamic loft is the loft the clubface actually delivers at the instant of impact — not the number stamped on the sole — and in this engine it is the single biggest lever on how high the ball launches.","whatItIs":"Every club has a static loft milled into its face — 10.5° on a driver, 34° on a 7-iron, 58° on a lob wedge. Dynamic loft is different: it's what the face is actually doing in the roughly half-millisecond it touches the ball, after shaft lean and wrist condition have had their say. Lean the shaft forward (hands ahead at impact) and the whole clubhead — face included — rotates forward too, subtracting loft; lean it back and loft comes back. Bow or flatten the lead wrist and the face rotates down (de-lofts) even with a neutral shaft; cup or extend it and loft is added back. So the same 7-iron, swung by two different players, can deliver two genuinely different dynamic lofts — and a launch monitor measures this delivered number, not the one on the spec sheet. In the app, dynamic loft is one of five true 'Fundamentals' — a root input the golfer sets directly, with no upstream formula feeding it — and it does two big jobs downstream: it is the dominant term in launch angle (the ball's initial climb), and, paired with attack angle, it sets spin loft (dynamicLoft − attackAngle), the engine's master lever for backspin.","components":[{"name":"Static loft (the number on the sole)","role":"The baseline every other lever adjusts. Fixed the moment a club is picked — driver, iron or wedge — and by far the biggest single swing available across a bag.","typicalRange":"driver ~9-13°, mid-iron (7i) ~28-34°, pitching wedge ~44-48°, lob wedge ~58-60°"},{"name":"Shaft lean (forward press / hand position at impact)","role":"Leaning the shaft toward the target rotates the whole clubhead — face included — forward, subtracting from static loft; leaning it back gives loft back. The main lever a coach or fitter is watching when they talk about 'delofting'.","typicalRange":"tour irons commonly deliver several degrees less than stamped loft; club-fitting rule of thumb ~3-4° deloft per inch of forward hand shift on a full iron shot (industry estimate)"},{"name":"Wrist condition (bowed/flat vs cupped/extended lead wrist)","role":"Independent of shaft lean: a bowed/flexed lead wrist rotates the face down (de-lofts) even with a neutral shaft; a cupped/extended wrist adds loft back. The mechanical difference between a compressed 'pro' strike and a scoopy amateur miss.","typicalRange":"a few degrees either way; extreme cupping can add 5°+ of unwanted loft (and spin) versus a flat-wrist strike"},{"name":"Attack angle (its constant companion, not a source of it)","role":"Does not change dynamic loft at all — they are independent engine inputs — but combines with it downstream: spinLoft = dynamicLoft − attackAngle. Reading this as subtraction, not addition, is the key to the whole engine.","typicalRange":"iron -6° to -2° (down), driver -2° to +5° (up)"},{"name":"Smash factor / ball speed (what raising it costs)","role":"Not a source of dynamic loft, but the price of raising it: more dynamic loft raises spin loft, and the engine's smash factor falls as spin loft rises (smashEff = 1.46 − 0.004·spinLoft), quietly trimming ball speed.","typicalRange":"smash ~1.30-1.36 across a 25-40° spin-loft range in the 7-iron-calibrated engine"},{"name":"Strike location / face curvature (vertical gear effect, mainly drivers)","role":"A driver face is curved top-to-bottom ('roll'); a strike high or low on the face meets a slightly different loft than a center strike, on top of the usual smash-factor penalty of an off-center hit.","typicalRange":"roughly ±1-3° of effective loft shift high-face vs low-face on a driver, EST/illustrative"}],"howTheyConnect":"Dynamic loft is set once, in the roughly half-millisecond of contact, by three things stacking together: the club's static (stamped) loft, how far forward or back the shaft leans through the ball, and whether the lead wrist is flexed (bowed/flat — rotates the face down, reduces loft) or extended (cupped — rotates it up, adds loft). Nothing in the engine derives dynamic loft from anything else — it is one of five true 'Fundamentals' inputs (with club speed, attack angle, face angle and club path) the golfer delivers directly; everything downstream is computed from it. Two channels matter most. First, dynamic loft is the dominant term in launch angle: launchAngle = 0.62·dynamicLoft + 0.25·attackAngle — loft's weight (0.62) is about 2.5x attack angle's (0.25, confirmed 0.62/0.25=2.48), so loft decides most of how high the ball takes off, and the ball always launches noticeably below the loft number itself (a 30° dynamic loft with a -3° attack launches at 17.85°, not 30°). Second, dynamic loft is the larger of the two terms that make spin loft: spinLoft = dynamicLoft − attackAngle. Because attack angle never changes dynamic loft itself (they are independent, sibling inputs), raising loft always raises spin loft degree-for-degree, which raises backspin (spinLoft·ballSpeed·1.8) and quietly trims ball speed through the spin-loft-responsive smash factor (smashEff = 1.46 − 0.004·spinLoft). That trade-off is why adding loft doesn't reliably add carry: at a 90 mph 7-iron swing (attack -3°), moving dynamic loft from 26° to 34° raises backspin from 6,314 to 7,864 rpm and launch from 15.4° to 20.3°, but ball speed falls from 121.0 to 118.1 mph and carry actually drops from 174.9 to 169.9 yd in the engine — loft bought a taller shot, not a longer one. At driver speeds the same trade looks different: moving dynamic loft from 9° to 17° (attack +4°, 113 mph) barely touches carry (223.8→223.0 yd, deep in the drag-saturated top of the carry curve) while apex climbs 30% (21.9→28.5 yd) — loft mostly reshapes trajectory height at driver speed, not distance. There is a third, smaller channel: dynamic loft also tilts the loft-dependent face-weight taper that blends start direction (startFaceW = clamp(0.90 − 0.005·dynamicLoft, 0.60, 0.88)) — a low-lofted driver lets face angle govern start line more (~0.88 weight), a high-lofted wedge lets path govern more (~0.60), which is part of why 'start line' coaching cues differ so much between driver and wedge.","hierarchy":[{"driver":"Club selection / static (stamped) loft","weight":"Dominant — a ~50° range across a full bag (driver ~9-13° to a lob wedge ~58-60°) that swamps every other lever. Swapping the app's Driver preset (13°/+4°) for its Wedge preset (46°/-5°) alone moves engine launch from 9.06° to 27.27°.","why":"This one-time choice sets the baseline every other lever only nudges by a handful of degrees. No amount of hand position or wrist condition turns a driver into a wedge."},{"driver":"Shaft lean at impact (hands ahead of the ball / forward press)","weight":"Large within one club — commonly several degrees of deloft on a full shot; club-fitting rules of thumb put it near ~3-4° of loft reduction per inch of forward hand shift (industry estimate, not lab-measured here).","why":"This is the main thing a coach or fitter is watching when they say a player 'delofts' the club. It's the biggest lever actively trained within one club, and why identical clubs in different hands deliver different dynamic lofts."},{"driver":"Wrist condition at impact (bowed/flat vs cupped/extended lead wrist)","weight":"Secondary but real — a few degrees either way; extreme cupping can add 5°+ of loft (and, through spin loft, real backspin) versus a flat or bowed strike.","why":"Independent of shaft lean: a bowed wrist de-lofts even with a neutral shaft, while a cupped wrist adds loft back. It's why a 'compressed' tour strike and a 'scoopy' amateur strike can share a setup but deliver very different dynamic loft."},{"driver":"Strike location / face curvature (vertical gear effect, mainly drivers)","weight":"Smallest of the four — roughly ±1-3° of effective loft shift high-face vs low-face on a driver (EST/illustrative), on top of the usual smash-factor penalty of missing the middle.","why":"Driver faces are curved top-to-bottom ('roll'), so the loft actually presented to the ball depends a little on where on the face it's struck, not just on setup and swing positions."}],"realWorld":{"tourBenchmarks":["PGA Tour driver: dynamic loft commonly ~10-13° with attack angle slightly positive (+1° to +5°, 'hitting up'), giving a small spin loft (~7-10°) — grounded in the app: its Driver preset (13°/+4°) computes spin loft 9° and engine launch 9.06° (0.62×13+0.25×4).","PGA Tour 7-iron: dynamic loft ~28-32°, attack angle ~-3° to -5° (hitting down), spin loft ~30-37° — the app's own default 7-iron preset (30°/-3°) computes spin loft 33° and launch 17.85° (0.62×30+0.25×(-3)), matching the engine file's own calibration note.","Full-swing wedges commonly deliver less dynamic loft than the number stamped on the sole because tour players lean the shaft forward through impact — a 56° sand wedge can present closer to ~50-52° at the moment of the strike on a full shot.","Amateur contrast: many mid/high-handicap players deliver a flatter (less negative, sometimes positive) attack angle with irons than a tour player's ~-4° to -5°, while a cupped lead wrist often adds loft back rather than removing it — the combination shrinks spin loft less than a tour delivery and, paired with lower ball speed, is a big reason amateur iron shots often fly higher, shorter and spinnier than a pro's with the 'same' club."],"scenarios":["Why 'hit up on the driver' is repeated in every fitting session: raising attack angle doesn't touch dynamic loft at all, but it shrinks spin loft (dynamicLoft − attackAngle) — the same 10-13° driver head can deliver anywhere from a tour-style ~2,700 rpm to a range-ball-ballooning ~4,000+ rpm depending only on attack angle, with dynamic loft held constant.","Why a tour pro's 7-iron flight looks lower and more compressed than an amateur's with the identical stamped loft: forward shaft lean plus a bowed/flat lead wrist at impact deloft the tour strike by several degrees below the number on the sole, while a cupped, 'scoopy' amateur wrist adds loft back in — same club, different dynamic loft, very different flight.","Why fitters put you on a launch monitor instead of just reading the loft off the sole: the stamped number is only the starting point. In the app's own model, an 8° swing in dynamic loft (26°→34° at a fixed attack angle) moves launch nearly 5° and backspin by over 1,500 rpm — numbers a spec sheet can never show.","Why 'delofting' feels like a swing change, not an equipment change: the exact same 7-iron head can be delivered anywhere from roughly 20° to 34°+ of dynamic loft purely from shaft lean and wrist condition — a bigger single-club swing than most players realize."],"whatItMeansForYou":"If your ball flies too low or too high, don't reach for a different-lofted club first — check your hands and wrists at impact. In this engine, dynamic loft outweighs attack angle by about 2.5x (0.62 vs 0.25) in setting launch angle, so a few degrees of forward press or a cupped wrist will move your trajectory more than tee height or ball position ever will. And remember loft is a trade, not a free lunch: adding dynamic loft raises backspin and launch, but it also quietly costs ball speed — so more loft does not automatically mean more carry, only a different-shaped shot."},"misconceptions":["\"Dynamic loft is just the loft stamped on the club.\" It's the loft the face actually delivers at impact — shaft lean and wrist condition can shift it several degrees off the stamped number in either direction; a launch monitor measures the delivered number, never the spec sheet.","\"A bigger-numbered club (more static loft) always launches higher.\" Only if the delivered loft rises to match. A strong, bowed-wrist strike with a 56° wedge can deliver less effective loft than a lazy, cupped strike with a 46° wedge.","\"You control launch mainly with ball position or tee height (attack angle).\" In the engine, launchAngle = 0.62·dynamicLoft + 0.25·attackAngle — loft's weight is about 2.5x attack angle's. Attack angle matters, but dynamic loft dominates.","\"Hitting down 'adds' loft or spin.\" Hitting down (a more negative attack angle) never changes dynamic loft at all — they are independent inputs. It raises spin loft, because spinLoft = dynamicLoft − attackAngle, and subtracting a more negative number is the same as adding.","\"A strong/bowed wrist just closes the face, it has nothing to do with loft.\" Bowing the lead wrist primarily DE-lofts the club (rotates the face down toward the ground), independent of face-angle closure — it's the main reason tour irons deliver a lower, more compressed flight than the stamped loft suggests.","\"Dynamic loft changes with altitude, temperature or wind.\" No — it's a Fundamentals-tier, swing-mechanics quantity fixed entirely at the moment of impact by the club, shaft and wrists. Altitude/wind/temperature are Environment-tier factors that only reshape the flight after the ball leaves the face."],"wolframChecks":["0.62×13 + 0.25×4 = 9.06° -> engine launch angle for the app's Driver preset (dynamic loft 13°, attack +4°).","0.62×30 + 0.25×(−3) = 17.85° -> engine launch angle for the app's 7-iron preset/default (dynamic loft 30°, attack −3°), matching the engine file's own calibration comment.","0.62×46 + 0.25×(−5) = 27.27° -> engine launch angle for the app's Wedge preset (dynamic loft 46°, attack −5°).","0.62/0.25 = 2.48 -> dynamic loft's weight in the launch-angle formula is about 2.5x attack angle's, confirming loft dominates launch angle.","spinLoft = dynamicLoft−attackAngle at attack −3°: dynamic loft 26° -> 29°; dynamic loft 34° -> 37°.","smashEff = 1.46−0.004×spinLoft: 29° -> 1.344, 37° -> 1.312 -> raising dynamic loft alone (same attack) measurably lowers smash factor.","ball speed at 90 mph club speed: 90×1.344 = 120.96 mph vs 90×1.312 = 118.08 mph -> a ~2.9 mph ball-speed cost for +8° of dynamic loft at fixed club speed.","backspin = spinLoft×ballSpeed×1.8: 29×120.96×1.8 = 6,314.1 rpm vs 37×118.08×1.8 = 7,864.1 rpm.","engine carry 0.232×ballSpeed^1.389/(1+(ballSpeed/210)^6): at 120.96 mph -> 174.86 yd, at 118.08 mph -> 169.91 yd -> raising dynamic loft 26°→34° (same swing) costs ~5 yd of carry despite adding 1,550 rpm of backspin, grounding 'more loft ≠ more carry'.","Driver case: dynamic loft 9°→17° at attack +4°, club speed 113 mph -> ball speed 160.46→159.10 mph (smash clamped to the 1.42 ceiling at 9°, since raw 1.44 exceeds preset.smash+0.09), carry 223.83→223.04 yd (only −0.8 yd, deep in the drag-saturated top of the carry curve) while apex climbs 21.94→28.55 yd (+30%) -> at driver speeds, loft mostly reshapes trajectory height, not carry.","Backspin floor check: 5°×160.46×1.8 = 1,444.1 rpm raw at the Driver preset (dynamic loft 9°, attack 4°), clamped up to the engine's 1,500 rpm floor — a reminder the model has hard rpm bounds (1,500-9,000 rpm) spanning realistic driver-to-wedge spin."],"quiz":[{"q":"What does \"dynamic loft\" actually mean, in the engine and on a real launch monitor?","options":["The loft number stamped on the sole of the club","The effective loft the clubface delivers at the moment of impact, shaped by shaft lean and wrist condition","The average loft over the whole swing","The loft measured after the ball has already left the face"],"answerIndex":1,"explanation":"Dynamic loft is what the face is doing AT impact — not the static number stamped on the club. Shaft lean (forward press) and wrist condition (bowed vs cupped) can shift it several degrees off the stamped loft, which is why two players with the 'same' 9° driver can deliver very different dynamic lofts."},{"q":"In the engine, launchAngle = 0.62·dynamicLoft + 0.25·attackAngle. If you could change only one of them by 4° to raise launch, which gives the bigger gain?","options":["Attack angle, by 4°","Dynamic loft, by 4°","They give exactly the same gain","Neither changes launch angle"],"answerIndex":1,"explanation":"Dynamic loft's weight (0.62) is about 2.5x attack angle's (0.25) — 0.62/0.25 = 2.48. A 4° change in dynamic loft moves launch by roughly 2.5°, versus about 1° for the same 4° change in attack angle. Loft is the dominant launch lever."},{"q":"Spin loft = dynamicLoft − attackAngle. A golfer hits down harder (attack angle goes from -3° to -6°) but their dynamic loft doesn't change at all. What happens to spin loft?","options":["It falls","It rises","It's unaffected — only dynamic loft matters","Dynamic loft rises to compensate"],"answerIndex":1,"explanation":"Subtracting a more negative number is the same as adding: at dynamic loft 30°, attack -3° gives spin loft 33°, but attack -6° gives spin loft 36°. Hitting down harder raises spin loft even though dynamic loft — a completely separate engine input — never moved."},{"q":"At a 90 mph 7-iron swing (attack -3°), raising dynamic loft from 26° to 34° raises backspin from 6,314 to 7,864 rpm in the engine. What happens to carry?","options":["Carry rises by a similar amount","Carry stays exactly the same","Carry actually falls slightly, from about 175 yd to about 170 yd","Carry roughly doubles"],"answerIndex":2,"explanation":"More dynamic loft raises spin loft, which lowers the engine's smash factor (1.344→1.312) and trims ball speed (121.0→118.1 mph). The extra backspin and launch don't make up for the lost ball speed, so carry actually drops about 5 yards (174.9→169.9 yd) — a concrete case of 'more loft ≠ more carry.'"},{"q":"Does altitude, temperature or wind change a golfer's dynamic loft?","options":["Yes — thinner air reduces effective loft","Yes, but only above 5,000 ft","No — dynamic loft is fixed at impact by the club and swing, before the ball ever meets the air","Only for drivers"],"answerIndex":2,"explanation":"Dynamic loft lives entirely in the Fundamentals tier — set by the club, shaft lean and wrist condition at the moment of the strike. Altitude, wind and temperature are Environment-tier factors that only reshape the flight after the ball leaves the face; they never reach back and change the loft that was delivered."}]}
  </script>
  <script type="application/json" id="lesson-attack-angle">
{"parameter":"Attack Angle","oneLiner":"Attack angle is whether the clubhead is still falling or already climbing the instant it meets the ball - the up/down geometry that decides whether a shot is compressed like an iron or launched like a driver.","whatItIs":"Attack angle is the up-or-down direction the clubhead is travelling in the split second it meets the ball - measured in degrees from horizontal. A negative number means the club is still descending (moving down) at contact; a positive number means it's already ascending (moving up). It has nothing to do with loft, face angle or swing speed - it is purely the vertical component of the clubhead's velocity vector at impact. Every well-taught iron or wedge shot is struck with a mildly negative attack angle (the club is still falling toward the bottom of its arc, which is what produces the ball-then-turf divot pattern), while a well-taught driver shot off a tee is struck with a neutral-to-positive attack angle (the club has already passed the bottom of its arc and is climbing). In the app's engine this number is a pure input to the ball-flight model (impact-flight.js) - it is fed straight into two formulas, spinLoft = dynamicLoft - attackAngle and launchAngle = 0.62·dynamicLoft + 0.25·attackAngle - but it is not itself arbitrary: the companion swing-geometry engine (swing-parameters-and-impact.js) derives it from where the ball sits relative to the low point of the swing's arc and how steep the swing plane is, so 'attack angle' is really the visible fingerprint of a golfer's setup and swing shape, not a dial anyone turns directly at the ball.","components":[{"name":"Low-point position (ball vs. swing bottom)","role":"The direct geometric cause of attack angle. The engine derives it literally: effectiveLpx()/thetaAtImpact() in swing-parameters-and-impact.js compute where the ball sits relative to the low point of the swing arc (xLP, + = low point ahead/target-side of the ball), then deriveImpact() turns that offset into attackAngle = atan2(sinθ·sinφ, hypot(cosθ,−sinθ·cosφ)). If the low point is still ahead of the ball when the club arrives, the club is still descending (negative AA); if the ball is ahead of (forward of) the low point, the club is already climbing (positive AA).","typicalRange":"iron 'Pure'-strike window (the app's own strikeQuality() constants): low point 2-15cm / 0.8-5.9in ahead of the ball, ideal centre ~10.5cm/4.1in; driver: ball at or slightly behind the low point"},{"name":"Swing plane angle (steepness)","role":"A secondary multiplier on the low-point effect. The same low-point offset produces a bigger attack-angle magnitude on a steep plane than a flat one, because vz = sinθ·sinφ scales directly with sin(φ). Grounded: at the identical 10.5cm-ahead ball position, a 40° (flat) plane gives ≈-3.2° AA, the engine default 55° plane gives ≈-4.1°, and a 70° (steep) plane gives ≈-4.7° - roughly +0.05° of attack angle per degree of plane, about a third as strong as moving the ball itself.","typicalRange":"~40° (flat, sweepers/rotary swingers) to ~70° (steep, upright/vertical swingers); engine default 55°"},{"name":"Ball position & tee height (the practical setup lever)","role":"What a golfer or fitter actually changes to move the low-point relationship above. Playing the ball back (or on the ground) shifts it toward 'low point ahead' (descending); teeing it up and playing it forward shifts it toward 'low point behind' (ascending). This is the real-world dial behind the geometry.","typicalRange":"driver: teed 1-2in above the ground, ball off the lead heel; irons: ball played center-to-back of stance, off the turf"},{"name":"Spin loft (the dominant downstream consequence)","role":"spinLoft = dynamicLoft − attackAngle (sourced, impact-flight.js). This is attack angle's single biggest 'reach' into the rest of the ball-flight model - a 1:1 relationship: every +1° of attack angle removes exactly 1° of spin loft, which is the master lever on backspin (see the Backspin lesson).","typicalRange":"1° of attack angle change = 1° of spin loft change, always, regardless of club"},{"name":"Launch angle (the smaller downstream consequence)","role":"launchAngle = 0.62·dynamicLoft + 0.25·attackAngle (sourced, impact-flight.js). Attack angle only carries a 0.25 weight here versus dynamic loft's 0.62, so it nudges launch rather than setting it - launch is loft-dominant, not attack-dominant.","typicalRange":"1° of attack angle change = only 0.25° of launch-angle change"},{"name":"Club & shot intent","role":"Not a physics driver but the reason the 'correct' attack angle flips sign by club: irons/wedges are designed and taught to be struck descending (for compression, control and a divot after the ball); a teed driver is designed to be struck ascending (to cut spin loft and protect ball speed). The engine's clubs table currently only calibrates a 7-iron's smash/spin coefficients (TODO driver noted in impact-flight.js), so driver-specific numbers below are industry benchmarks, not yet reproducible inside this engine.","typicalRange":"driver target ≈ 0° to +5° ascending; mid-iron target ≈ -3° to -5° descending; wedge ≈ -4° to -6° descending"}],"howTheyConnect":"Attack angle is not something a golfer sets with their hands at the ball - it falls out of geometry that is decided well before impact. The swing traces an arc with a low point (its bottom); where the ball sits relative to that low point, combined with how steep the swing plane is, together determine whether the clubhead is still travelling down or already travelling up when it reaches the ball. The engine states this literally in swing-parameters-and-impact.js: theta = asin(-xLP/radius) locates the ball on the arc relative to the low point (xLP, positive = low point still ahead/target-side of the ball), and attackAngle = atan2(sinθ·sinφ, hypot(cosθ,-sinθ·cosφ)) converts that position - combined with the plane angle φ - into the vertical-vs-horizontal split of the clubhead's velocity at contact. Play the ball back of the low point (as irons are taught to) and the club is still falling toward the bottom of its arc when it strikes - a descending, negative attack angle, and the club continues down into the turf just after the ball (the divot). Play the ball forward of the low point (as a teed driver is taught to) and the club has already passed the bottom and is climbing - an ascending, positive attack angle, with nothing below it to strike. Once that number exists, it has exactly two doors into the rest of the flight model, and they are unequal in size. The big door is spin loft: spinLoft = dynamicLoft - attackAngle (sourced), a full 1:1 relationship, so attack angle is the other half of the same lever that sets backspin (see the Backspin lesson) - hit down and spin loft rises, hit up and it falls. The small door is launch angle: launchAngle = 0.62·dynamicLoft + 0.25·attackAngle (sourced) - attack angle only gets a quarter-weight vote here, dynamic loft dominates. That asymmetry is the whole story of why golf instruction treats attack angle as a spin control, not a launch or a distance control: dialling attack angle up 8° (Wolfram-verified, 7-iron, fixed 30° dynamic loft and 90mph club speed) drops backspin from 7,293 to 5,711rpm (-22%) and nudges launch from 17.6° to 19.6°, but only adds carry from 171.8 to 176.7yd (+2.8%) - real, but modest next to what ball speed alone does (see the Carry lesson: +20yd per +10mph of club speed). There is a self-limiting coupling too: raising attack angle lowers spin loft, and a lower spin loft is a less glancing, more efficient strike, so the engine's smashEff = 1.46 - 0.004·spinLoft actually rises slightly as attack angle climbs (1.324 → 1.356 across that same 8° sweep) - hitting up doesn't just cut spin, it very slightly protects ball speed too, which is exactly why driver fitters chase a positive attack angle instead of treating it as a curiosity.","hierarchy":[{"driver":"Ball position relative to the swing's low point","weight":"dominant geometric driver - roughly 1.0° of attack angle per inch of ball position (Wolfram-verified: sweeping the app's own 'Pure'-strike window, 2cm to 15cm/0.8-5.9in ahead of the ball at the default 55° plane, moves attack angle from -0.8° to -5.9°, a 5.1° swing across ~5.1 inches)","why":"This is the literal mechanism in swing-parameters-and-impact.js: theta = asin(-xLP/R) feeds directly into attackAngle = atan2(sinθ·sinφ, hypot(cosθ,-sinθ·cosφ)). Nothing else moves attack angle this much for a realistic amount of change, and it is exactly the '1 inch of ball position ≈ 1 degree of attack angle' rule taught on every driving range - now grounded in the app's own geometry rather than folklore."},{"driver":"Swing plane steepness (plane angle)","weight":"secondary multiplier - about +0.05° of attack angle per degree of plane, roughly a third as strong as ball position across realistic ranges (Wolfram-verified: same 10.5cm-ahead ball position gives -3.2° at a 40° plane, -4.1° at the 55° default, -4.7° at a 70° plane)","why":"vz = sinθ·sinφ in deriveImpact() scales directly with sin(plane angle), so a steeper plane converts the same ball-position offset into a bigger vertical velocity component. It explains why an upright, steep swinger digs a deeper divot than a flat, rotary swinger even with identical ball position."},{"driver":"Ball position & tee height (the setup lever)","weight":"the practical, always-available control - a golfer cannot dial theta or phi directly, but can move the ball 1-2 inches in the stance or change tee height in seconds","why":"This is where driver 1 (low-point offset) becomes actionable. Every TrackMan driver fitting that changes measured attack angle does it by moving ball position and tee height, not by asking the player to consciously 'swing up' with their hands."},{"driver":"Club & shot-specific target","weight":"not a physics lever, but it flips the sign of the target - driver wants ≈0° to +5° (ascending), mid-irons want ≈-3° to -5° (descending), wedges ≈-4° to -6° (descending)","why":"Attack angle only 'matters' relative to what the shot needs. A -4° attack angle is a great iron number and a distance-costing driver number on the exact same swing - so ranking attack angle in isolation is meaningless without knowing which club is in the golfer's hands."},{"driver":"Downstream reach: spin loft (1:1) vs. launch angle (0.25 weight)","weight":"attack angle's own direct pull on the rest of the model - full 1:1 into spin loft (dynamicLoft-attackAngle), only 0.25:1 into launch angle (0.62·dynamicLoft+0.25·attackAngle); its pull on carry is smaller still (Wolfram-verified: an 8° AA swing at fixed loft/speed changes carry only ~4.9yd/+2.8% while backspin swings ~22%, 7,293→5,711rpm)","why":"This ranks last deliberately: attack angle is a steering/spin parameter, not a distance parameter. Golfers chasing 'more speed' by manipulating attack angle are pulling the wrong lever - see the Carry lesson, where ball speed dominates by an order of magnitude more."}],"realWorld":{"tourBenchmarks":["PGA Tour average driver attack angle ≈ -1.3° (near neutral, slightly descending) - TrackMan University's widely cited tour-average table","Distance-optimized/longer hitters swing up on the driver, commonly +3° to +5°; some long-drive competitors reach +8° or more","Recreational amateurs average a noticeably steeper driver attack angle than tour pros, commonly cited around -2° to -5° - the classic 'chopping down' miss that spins the ball too much and shortens the drive","Tour mid-iron (6-7 iron) attack angle averages roughly -4° to -5° descending; wedges steeper still, roughly -4° to -6°, by design","Engine cross-check: this app's own 'Pure'-strike geometry (strikeQuality()'s low-point-ahead window, 2-15cm/0.8-5.9in ahead of the ball at the default 55° swing plane) computes to an attack angle of about -0.8° to -5.9°, centred near -4.1° - landing almost exactly on the tour mid-iron benchmark above, an internal-consistency check between the app's swing geometry and real launch-monitor data"],"scenarios":["Why an iron shot takes a divot after the ball but a teed-up driver shouldn't take one at all - the sign of the attack angle","The 'tee it higher, play it forward' driver-fitting tip - fitters change attack angle by moving ball position and tee height, not by asking a player to swing differently","The low, spinny, short 'worm-burner' drive - almost always a steep negative attack angle off the tee, ballooning spin loft on a low-loft club","A thin, bladed iron shot that traces back not to a speed problem but to a low point that isn't far enough ahead of the ball (attack angle too shallow, not steep enough)","Long-drive competitors deliberately swinging up at +8° or more with very low-lofted drivers to push spin loft near zero and maximise carry-plus-roll"],"whatItMeansForYou":"For irons and wedges, don't fight the descending strike - a modest -3° to -5° attack angle (ball back of centre, a shallow divot after the ball) is correct and is what a launch monitor should show; trying to 'help' the ball into the air by scooping just adds inconsistency, not carry. For your driver, the single biggest free-distance change most amateurs can make is the opposite instinct: tee it higher, play it forward in your stance, and let the club catch the ball on the way up. That alone shifts attack angle toward the tour-pro-and-beyond range, cuts spin loft, lifts launch a touch and protects ball speed - real yards, with no extra swing speed required."},"misconceptions":["\"You create power/compression by hitting down hard on the ball.\" Compression comes from ball speed and a clean, centred strike - not from how steep the attack angle is. A great iron strike needs only a modest descending angle (roughly -3° to -5°, the app's own 'Pure'-strike window computes to about -4° to -5°); an aggressively steep chop just raises spin loft, spikes backspin and can cost ball speed and consistency.","\"Attack angle is something you do with your hands or wrists right at impact.\" It is a geometric consequence, set well before the club ever nears the ball, of where the ball sits relative to the low point of your swing's arc and how steep your swing plane is (Wolfram-grounded: about 1° per inch of ball position, ~0.05° per degree of plane steepness). By the time you're consciously reacting at impact, it has already been decided by your setup.","\"You should hit down on a driver too, like you do with an iron - that's how the pros look on TV.\" Backwards for a teed ball. Because the driver sits on a tee, ball forward in the stance, the correct target is an ascending strike (PGA Tour average ≈ -1.3°, but distance-optimized players and long-drive competitors are often +3° to +8°). Chopping down on a teed driver is one of the most common amateur distance leaks.","\"More negative attack angle always means more useful backspin.\" Only up to the spin window a shot needs. Wedges are already near their spin ceiling; adding more descending angle there mostly steepens the divot and the landing angle, not the useful lift - see the Backspin lesson's 'balloon past the optimum' point.","\"Attack angle and launch angle are basically the same knob.\" They're related but very different in weight: launch angle is dominated by dynamic loft (0.62 weight) with only a small 0.25 nudge from attack angle, while attack angle's real lever is spin loft (a full 1:1 relationship). Changing attack angle moves spin a lot and launch only a little.","\"Every golfer should aim for a positive attack angle - it's just objectively better.\" Only true for the driver (and arguably fairway woods off a tee). Irons and wedges are struck off the ground and need a negative, descending attack angle to compress the ball correctly, take a divot after it, and control trajectory and spin. The 'right' attack angle is club- and shot-dependent, not a single universal target."],"wolframChecks":["swing-geometry check: low point 10.5cm/4.1in ahead of the ball (xLP=0.105m, the app's own LP_ideal constant), radius 1.2m, plane 55° -> theta=arcsin(-0.0875)=-5.02°, then attackAngle = arctan(vz/vh) = arctan(0.0718604) = 4.1° (descending, i.e. -4.1°) - matches the tour mid-iron AoA benchmark almost exactly","same low-point offset (10.5cm ahead) at a flatter 40° plane -> arctan(0.056333) = 3.2° (-3.2°); at a steeper 70° plane -> arctan(0.0825016) = 4.7° (-4.7°): confirms a steeper swing plane turns the same ball position into a bigger attack-angle magnitude","sweeping the app's own 'Pure'-strike window at the default 55° plane: xLP=0.02m (0.8in ahead) -> arctan(0.013654) = 0.78° (-0.78°); xLP=0.15m (5.9in ahead) -> arctan(0.102938) = 5.9° (-5.9°) - a 5.1° swing in attack angle across ~5.1 inches of ball position, i.e. ~1.0° per inch, grounding the classic 'ball position = 1 degree per inch' golf-instruction rule of thumb in the app's own geometry engine","engine spin-loft/launch-angle arithmetic (7-iron, dynamicLoft=30°, clubSpeed=90mph, clubPath=faceAngle=0): AA=-4° -> spinLoft=34°, launchAngle=17.6°, smashEff=1.46-0.004*34=1.324, ballSpeed=90*1.324=119.16mph, backspin=34*119.16*1.8=7292.6rpm (Wolfram-confirmed), carry=0.232*119.16^1.389/(1+(119.16/210)^6)=171.78yd (Wolfram-confirmed)","same setup at AA=0° -> spinLoft=30°, launchAngle=18.6°, smashEff=1.34, ballSpeed=120.6mph, backspin=30*120.6*1.8=6512.4rpm (Wolfram-confirmed), carry=0.232*120.6^1.389/(1+(120.6/210)^6)=174.25yd (Wolfram-confirmed)","same setup at AA=+4° -> spinLoft=26°, launchAngle=19.6°, smashEff=1.356, ballSpeed=122.04mph, backspin=26*122.04*1.8=5711.5rpm (Wolfram-confirmed), carry=0.232*122.04^1.389/(1+(122.04/210)^6)=176.70yd (Wolfram-confirmed) - net across the 8° attack-angle sweep: backspin falls ~22% (7293->5711rpm) but carry rises only ~4.9yd/+2.8% (171.8->176.7yd), showing attack angle's direct pull on distance is modest next to its pull on spin","driver-style spin-loft/launch mechanism (dynamicLoft=13°, sourced formula, club-agnostic): AA=-2° -> spinLoft=15°, launchAngle=0.62*13+0.25*(-2)=7.56°; AA=+5° -> spinLoft=8°, launchAngle=0.62*13+0.25*5=9.31° - a 7° attack-angle swing removes 7° of spin loft and adds 1.75° of launch, the exact mechanism behind the 'hit up on your driver' distance tip (note: driver ball-speed/backspin/carry numbers are not yet engine-reproducible since clubs only calibrates a 7-iron preset)"],"quiz":[{"q":"In the app's engine, a negative attack angle means:","options":["The clubhead is moving upward through impact","The clubhead is moving downward through impact (descending)","The clubface is closed relative to the path","The ball is curving left"],"answerIndex":1,"explanation":"impact-flight.js states the convention directly: attackAngle is '+ = up, - = down (descending)'. A negative number means the clubhead is still falling toward the bottom of its swing arc when it strikes the ball - the normal, correct picture for a ball-first iron strike."},{"q":"The engine computes spinLoft = dynamicLoft - attackAngle. A 7-iron delivers 30° of dynamic loft with a -4° attack angle. What is the spin loft?","options":["26°","30°","34°","-4°"],"answerIndex":2,"explanation":"30 - (-4) = 34°. Subtracting a negative attack angle adds to spin loft - this is exactly why a steeper, more descending strike raises spin loft (and therefore backspin), while hitting up (a positive attack angle) subtracts from it."},{"q":"Roughly what is the PGA Tour average driver attack angle?","options":["About -1° (slightly descending, near neutral)","About -10° (steeply descending, like a wedge)","About +15° (very steeply ascending)","Exactly 0° for every player, no variation"],"answerIndex":0,"explanation":"TrackMan University's widely cited tour-average table puts driver attack angle around -1.3° - only slightly descending. Distance-optimized players and long-drive competitors push it more positive (often +3° to +8°+), while recreational amateurs tend to average noticeably more negative (roughly -2° to -5°), the classic steep 'chop' that spins the ball too much and costs carry."},{"q":"According to the app's swing-geometry engine (swing-parameters-and-impact.js), what mainly determines whether a swing strikes down or up on the ball?","options":["How hard the golfer grips the club","Where the ball sits relative to the low point of the swing's arc","The colour or flex of the shaft","How fast the golfer swings"],"answerIndex":1,"explanation":"deriveImpact()/effectiveLpx()/thetaAtImpact() compute attack angle purely from the ball's position relative to the arc's low point and the swing-plane angle - grounded (Wolfram-verified) at roughly 1° of attack angle per inch of ball-position change. Grip and swing speed don't enter this calculation at all."},{"q":"Why does a well-struck iron shot take a divot after the ball, while a well-struck teed driver ideally takes no divot at all?","options":["Irons are simply heavier clubs","The driver has no grooves so it can't dig into turf","Irons are struck with a negative (descending) attack angle, so the low point of the swing is still ahead of the ball at contact; a teed driver should be struck with a positive (ascending) attack angle, so the club is already climbing","It is random and unrelated to attack angle"],"answerIndex":2,"explanation":"With irons, the ball is played back of the swing's low point, so the club is still descending when it strikes - it keeps travelling down into the turf just past the ball, making the divot. A teed driver is played forward of the low point, so the club has already bottomed out and is climbing (positive attack angle) by the time it meets the ball, well above the turf."}]}
  </script>
  <script type="application/json" id="lesson-face-angle">
{"parameter":"Face Angle","oneLiner":"Face angle - where the clubface points at impact - is the single biggest lever on where your shot starts, and together with club path it also drives almost all of the sideways curve, which is why teachers now say \"when in doubt, blame the face.\"","whatItIs":"Face angle is simply which way the clubface is pointing - left or right of the target line - at the exact instant it strikes the ball, measured in degrees. Open (positive, for a right-handed golfer) means the face aims right of target at impact; closed (negative) means it aims left; square (0°) means it aims exactly at the target. It has nothing to do with how the club is swinging - that's club path - so you can swing perfectly down the target line and still send the ball way offline if the face itself isn't square when it meets the ball. Of every number a launch monitor reports, face angle is the single biggest lever on where your shot starts, and, together with club path, it is also the entire reason the ball curves in flight.","components":[{"name":"Face angle (the parameter itself)","role":"Where the clubface is aimed — left or right of the target line — at the exact instant it strikes the ball. Open (+) aims right of target for a right-handed golfer, closed (-) aims left, square (0) aims dead at it. It is a snapshot of the face only, independent of how the club is swinging.","typicalRange":"tour driver roughly ±1-2° of square; mid-handicap commonly 2-5° open (slice-prone); high-handicap 5-8°+ open"},{"name":"Club path","role":"The horizontal direction the clubHEAD is travelling at impact (in-to-out or out-to-in). Needed only as the reference for the face — the engine cares about the gap between the two, not path on its own.","typicalRange":"tour driver +1 to +3° in-to-out; iron closer to neutral, -2 to +2°"},{"name":"Face-to-path gap (faceAngle - clubPath)","role":"The true curvature lever. The engine derives spin-axis tilt directly from this gap, not from face angle relative to the target — so a face that is square to the target can still curve hard if the path is off, and vice-versa.","typicalRange":"tour players commonly inside 1-2°; a recreational slice is often 5-10°"},{"name":"Dynamic loft (sets the face-weight taper)","role":"Controls how much of face angle (vs path) reaches the start line. Engine: faceW = clamp(0.90 - dynamicLoft*0.005, 0.60, 0.88) - lower loft (driver) leans harder on the face, higher loft (wedge) lets path in more.","typicalRange":"faceW ~0.67 for a wedge (dynLoft 46), ~0.75 for a 7-iron (dynLoft 30), ~0.835 for a driver (dynLoft 13)"},{"name":"Carry distance (amplifies the curve)","role":"Curve grows with the square of carry (curve ~ carry^2 x spinAxis / 12000), because a longer flight gives the same axis tilt more time to bend the ball sideways. The identical angular error therefore costs far more yards off a driver than a wedge.","typicalRange":"7-iron ~172 yd carry vs driver ~224 yd carry -> ~1.69x more curve for the same face-to-path gap"},{"name":"Strike location / gear effect (not modeled here)","role":"A real, separate mechanism: an off-center hit (toe/heel, especially on a large driver head) can curve the ball opposite to what face angle alone predicts. Flightglass's engine assumes a centered strike, so this lesson covers face-to-path curvature only.","typicalRange":"can rival or exceed face-to-path curvature on a bad mis-hit; not quantified in this engine"}],"howTheyConnect":"At impact the ball's initial direction is a weighted blend of where the face points and where the club is travelling - never purely one or the other, and never a flat 50/50. Flightglass's engine states this literally: startDirection = faceW*faceAngle + (1-faceW)*clubPath, where faceW itself tapers with dynamic loft - clamp(0.90 - dynamicLoft*0.005, 0.60, 0.88) - from about 0.60 for a lofted wedge up to about 0.88 for a driver, landing at exactly 0.75 for a stock 30° 7-iron. This loft-taper is a sourced refinement of the older flat \"75/25 rule\": a driver's low loft sends the ball more directly off the face (path matters less), while a wedge's high loft lets path \"grab\" a bigger share. Separately - and this is the part most golfers have backwards - face angle also supplies almost all of the ball's sideways curve. The engine derives spin-axis tilt from the gap between face and path (faceToPath = faceAngle - clubPath), not from face angle relative to the target: spinAxis = 1.5 x faceToPath, clamped to +-38° (estimate gain). Curve then grows with the square of carry distance (curve ~ carry^2 x spinAxis / 12000, estimate), because a longer flight gives the same axis tilt more time to bend the ball. Put the two mechanisms together and the asymmetry between face and path becomes obvious: when face angle moves, it pushes the start line and the curve axis in the same direction, so the effects reinforce each other. When only path moves (face held square), the start line nudges one way but the curve pulls the other way - an in-to-out path starts the ball slightly right but curves it back left, toward a draw - so path's effects partly cancel themselves. Engine-verified on a 7-iron: sweeping face alone (path=0) drifts the ball 5.97 yards offline per degree; sweeping path alone (face=0) only moves it 2.96 yards per degree - essentially half, purely from this self-cancelling geometry. Finally, both channels scale with the club: a driver's higher faceW and much longer carry mean the identical face-to-path gap that costs a few yards with a wedge can cost 30-50 yards with a driver.","hierarchy":[{"driver":"Face angle's weight on start direction (faceW, loft-tapered 0.60-0.88)","weight":"dominant - ~0.75° of start-line shift per 1° of face angle on a 7-iron (faceW=0.75), rising to ~0.835° per° on a driver; path only contributes the leftover (1-faceW)","why":"Directly coded in the engine (startDirection = faceW*faceAngle + (1-faceW)*clubPath) and matches TrackMan's widely-cited finding that face angle governs roughly 75-85% of starting direction depending on club - the research that overturned the old path-first teaching."},{"driver":"Face-to-path gap -> spin axis -> curve (compounds with the driver above)","weight":"spinAxis = 1.5 x (faceAngle - clubPath), clamped +-38° (estimate); curve grows with carry^2, e.g. 3° gap -> 11.15 yd curve on a 172-yd 7-iron","why":"Because face angle changes push both the start line and the curve axis the same direction, the two effects reinforce. Engine-verified: sweeping face alone (path=0) moves total offline 5.97 yd/° on a 7-iron - almost exactly 2x the 2.96 yd/° you get sweeping path alone (face=0), because path's start-line push and curve pull partly cancel each other."},{"driver":"Club path's own (smaller, self-cancelling) contribution","weight":"Only (1-faceW) of start direction - about 0.25°/° on a 7-iron, ~0.165°/° on a driver - and its curve contribution runs opposite to that start push","why":"An in-to-out path alone starts the ball slightly right but curves it back left (a draw), so path partially self-corrects. That is the mechanical reason teachers say 'when in doubt, blame the face, not the path.'"},{"driver":"Club/loft amplification (driver vs wedge for an identical error)","weight":"~1.69x more curve on a driver than a 7-iron for the same face-to-path gap (Wolfram-verified: (223.8/172.4)^2 = 1.685, matching the engine's own driver-vs-7-iron curve ratio of 18.79/11.15 = 1.685), stacked on top of the higher faceW","why":"Two engine mechanisms compound in the same direction for longer/lower-lofted clubs: faceW rises (more of the error reaches the start line) and curve scales with carry^2 (the longer flight has more time to bend). That is why the exact same felt mis-hit looks catastrophic off the tee and barely noticeable with a wedge."},{"driver":"Strike location / gear effect (not modeled, real-world caveat)","weight":"Unquantified here, but can rival face-to-path curvature on a bad toe/heel driver miss","why":
