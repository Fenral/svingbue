 the hub of the Derived tier.","hierarchy":[{"driver":"Club speed (the swing itself)","weight":"dominant and near-1:1 at fixed smash factor — the engine's 80/90/100/110 mph sweep (7-iron, default 33° spin loft) gives ball speed 106.2/119.5/132.8/146.1 mph, i.e. +1 mph club speed = +1.33 mph ball speed. Real-world range is enormous: ~80 mph (high-handicap driver) to ~113-114 mph (PGA Tour driver) to 150+ mph (World Long Drive).","why":"Club speed IS the kinetic-energy source: ballSpeed = clubSpeed x smashEff, and smashEff only ever varies within a ~1.15-1.50 band while club speed varies 2x or more across the golfing population. Nothing else moves ball speed this much."},{"driver":"Smash factor / strike efficiency (via spin loft)","weight":"Second in the formula but large per shot — 1.15 to 1.42 in the engine's 7-iron model, a ~25% band. Losing smash from 1.33 to 1.15 at a fixed 90 mph swing costs ~16 mph of ball speed (119.5 -> 103.5 mph) — more than most golfers gain from months of speed training.","why":"Smash factor is the direct multiplier on club speed, and the engine ties it to spin loft (smashEff = 1.46 - 0.004 x spinLoft): a more glancing strike trades ball speed for spin. It's also the same number a mishit (toe/heel strike) collapses, even at full swing speed."},{"driver":"Club/ball construction and the COR limit","weight":"Sets the ceiling per club category, not a swing-to-swing variable. Physics-grounded: (1+0.83) x 200/(200+45.93) = 1.488 — the theoretical max smash factor for a legal driver, matching the ~1.48-1.50 tour pros actually achieve. Irons, with no COR benefit, cap out lower at ~1.33-1.38.","why":"This is why a driver and a 7-iron can never reach the same smash factor even on an identically pure strike: the driver face is legally allowed to be springier (higher coefficient of restitution), returning more of the clubhead's energy to the ball. It's a fixed property of the club, not something the swing changes shot to shot."},{"driver":"Dynamic loft and attack angle (the two inputs that set spin loft)","weight":"Indirect but the exact levers a golfer or fitter adjusts — every +1° of spin loft trims smashEff by 0.004. Spin loft 25 -> 45° drops smashEff 1.36 -> 1.28, costing ~7 mph of ball speed at a 90 mph swing (122.4 -> 115.2 mph).","why":"They don't appear in the clubSpeed x smashEff formula directly, but they are literally the two numbers (dynamicLoft - attackAngle) that set spin loft, and spin loft is what smash factor is a function of. Teeing the ball up and hitting up (raising attack angle) is the standard real-world way to protect driver ball speed."},{"driver":"Temperature / ball warmth","weight":"Marginal and not wired into the engine — real-world testing suggests roughly +1 mph of ball speed from a cold ball (~40 F) to a hot one (~100 F), an order of magnitude smaller than the club-speed or smash-factor effects above.","why":"A warmer ball's core compresses and rebounds slightly more efficiently (higher ball-side COR) — real but tiny, and layered on top of the much bigger air-density effect on carry (not ball speed) already covered in the Carry lesson. Flagged estimate/real-world only since solveFlight has no temperature input."}],"realWorld":{"tourBenchmarks":["PGA Tour driver: clubhead speed ~113-114 mph -> ball speed ~167 mph (smash factor ~1.48).","LPGA Tour driver: clubhead speed ~94 mph -> ball speed ~140 mph (smash factor ~1.49, nearly matching the men's tour ceiling despite far lower clubhead speed).","PGA Tour 7-iron: clubhead speed ~90 mph -> ball speed ~120 mph (smash factor ~1.33) — this is exactly Flightglass's default 7-iron calibration.","Recreational/average amateur driver: clubhead speed ~93-94 mph -> ball speed ~131-136 mph (smash factor ~1.41-1.45) — similar clubhead speed to LPGA Tour, but 5-9 mph less ball speed from a lower, less consistent smash factor.","World Long Drive competitors: clubhead speeds of 150+ mph, ball speeds regularly above 200 mph and into the ~220-225 mph range — grounded: 225 mph = 100.6 m/s, about 29% of the speed of sound (343 m/s at 20 C).","Theoretical smash-factor ceiling for a legal driver: ~1.488, derived from the USGA/R&A 0.830 coefficient-of-restitution limit and a ~200 g head against a ~45.93 g ball — within rounding of what tour pros actually produce.","Energy transfer at impact: even on a flush PGA Tour driver strike, only about half (~49.5%) of the clubhead's kinetic energy (258.8 J at 113.8 mph) converts into the ball's kinetic energy (128.0 J at 167 mph) — the rest stays in the clubhead's follow-through.","The gap between an average PGA Tour driver (167 mph) and average PGA Tour 7-iron (120 mph) ball speed is 47 mph — from both a faster clubhead and a higher smash-factor ceiling."],"scenarios":["Your playing partner swings noticeably slower than you but still outdrives you — almost always a smash-factor story: their strike is more centered (higher smash) than yours, not that they're secretly swinging faster.","Beating range balls all afternoon feels different from playing your gamer ball on the course — range balls are typically harder/lower-compression by design (built to survive thousands of hits, not perform), which slightly lowers smash factor and ball speed versus a premium ball.","A tour pro's driver swing looks smooth and effortless yet produces 167+ mph ball speed — it comes from both a genuinely fast clubhead (113+ mph) and a smash factor near the theoretical ceiling (~1.48) from a dead-center strike; amateurs typically lose more ball speed to the second half (strike quality) than the first (raw speed).","The same golfer's 7-iron ball speed (~120 mph) feels much slower than their driver (~167 mph) despite similar swing effort — a chunk of that 47 mph gap is the driver's higher legal smash-factor ceiling (springier face), not swing speed alone.","A toe or heel miss that 'felt fine' at address comes up dramatically short — smash factor can collapse toward 1.0-1.2 on an off-center strike even at full swing speed, which on a 90 mph swing can mean losing 15-25 mph of ball speed invisibly."],"whatItMeansForYou":"If you want more distance, ball speed is the metric to chase — but it has two separate levers, and most amateurs are leaving more on the strike-quality lever than the swing-speed one. Raw club speed has the bigger ceiling (tour players are roughly 20 mph faster than recreational golfers), but it's also the hardest and slowest to add safely. Smash factor is the faster win: moving from a mediocre 1.15-1.20 strike to a centered 1.33-1.40 strike, AT the same swing speed, adds real ball speed (15+ mph on a 90 mph swing) for free — no extra speed training required, just a more centered hit and a spin loft that isn't ballooning. In practice: protect strike quality and spin loft before chasing more clubhead speed, because a faster swing that also gets more glancing cancels part of itself out."},"misconceptions":["\"Ball speed and club speed are basically the same number.\" They are not — ball speed is club speed multiplied by smash factor, and that multiplier itself varies (1.15-1.42 in the engine's 7-iron model). An 80 mph swing that's flush (smash 1.42, 113.6 mph ball) can out-produce a 90 mph swing that mishits (smash 1.15, 103.5 mph ball) — the slower swing can win.","\"A smash factor over 1.5 on a launch monitor means a great strike.\" Physically, 1.5 sits right at the theoretical ceiling for a driver under the legal COR limit (grounded: (1+0.83) x 200/245.93 = 1.488). A reading meaningfully above ~1.50 almost always signals a measurement quirk, not a magic strike.","\"Swinging harder always raises ball speed proportionally.\" Only if strike quality holds. The engine's own self-limiter shows why: a harder swing that also steepens attack angle raises spin loft, which lowers smash factor (smashEff = 1.46 - 0.004 x spinLoft) enough to blunt or even offset the extra club speed.","\"Ball speed decides which way the ball curves.\" No — ball speed is a pure magnitude (how fast, not which way). Direction and curve come entirely from face angle, club path and spin axis, separate numbers in the engine; a shot can have huge ball speed and still fly dead straight, or modest ball speed and slice hard.","\"A driver just has a faster swing, that's the whole story.\" Only part of it. Even AT the same clubhead speed, a driver produces more ball speed than an iron because its face is legally allowed to be springier (COR up to 0.830 vs no COR bonus for a solid iron face) — the smash-factor ceiling itself is higher, not just the swing.","\"A cold golf ball is a total myth.\" There is a small real effect — a warmer ball's core rebounds slightly better, adding roughly a mile per hour of ball speed across a big temperature swing — but it is a minor add-on layered on top of the much larger air-density effect on carry (not ball speed) already covered in the Carry lesson, and it is not modelled in this engine build."],"wolframChecks":["Golf ball mass -> less than 45.9 g (USGA/R&A max), the fixed ball mass behind every impact-energy calculation here.","113.8 mph (PGA Tour average clubhead speed) -> 50.87 m/s; 167 mph (PGA Tour average driver ball speed) -> 74.66 m/s — confirms these launch-monitor mph numbers are genuinely large real-world speeds.","Smash-factor ceiling from collision physics: (1+COR) x M/(M+m) with COR = 0.83 (USGA/R&A driver spring-face limit), clubhead M = 200 g, ball m = 45.93 g -> 1.488 — matches the ~1.48-1.50 ceiling tour pros actually hit with a driver.","Kinetic energy of a 200 g clubhead at 50.87 m/s (113.8 mph) -> 258.8 J; kinetic energy of a 45.93 g ball at 74.66 m/s (167 mph) -> 128.0 J; 128.0 / 258.8 = 49.5% -> only about half the clubhead's kinetic energy converts into ball speed at impact, even on a flush tour strike.","167 mph - 120 mph = 47 mph -> the gap between average PGA Tour driver ball speed and average PGA Tour 7-iron ball speed, from both a faster clubhead and a higher smash-factor ceiling.","(167-133)/133 = 25.6% -> PGA Tour average driver ball speed is roughly a quarter faster than a typical recreational golfer's driver ball speed (~133 mph).","(225-167)/167 = 34.7% -> a World Long Drive-class ball speed (~225 mph) is about a third faster again than the PGA Tour average driver ball speed.","225 mph = 100.6 m/s -> 29.3% of the speed of sound in air at 20 C (343.3 m/s) — the fastest human-produced golf-ball speeds sit close to a third of Mach 1.","Engine sweep: clubSpeed 80/90/100/110 mph at the default 33° spin loft (7-iron) -> ballSpeed 106.2/119.5/132.8/146.1 mph — confirms ballSpeed = clubSpeed x smashEff is exactly linear once spin loft (and therefore smashEff) is held fixed.","Engine smashEff = clamp(1.46 - 0.004 x spinLoft, 1.15, 1.42): spin loft <=10° -> ceiling 1.42; spin loft 33° (7-iron default) -> 1.328; spin loft >= 77.5° -> floor 1.15 (1.46 - 0.004x77.5 = 1.15 exactly) — the engine's built-in self-limiter, a more glancing strike caps ball speed even at full club speed."],"quiz":[{"q":"Flightglass's engine states ball speed as a simple product of two numbers. Which two?","options":["Club speed x dynamic loft","Club speed x smash factor","Attack angle x spin loft","Backspin x carry"],"answerIndex":1,"explanation":"ballSpeed = clubSpeed x smashEff is the literal formula in the engine. A flush 7-iron at 90 mph of club speed and a 1.328 smash factor makes 119.5 mph of ball speed — multiply the two echoed fields and you get exactly the ballSpeed field back."},{"q":"A golfer's club speed stays exactly the same (90 mph), but their strike collapses from a centered hit (smash 1.33) to a toe miss (smash 1.15). What happens to ball speed?","options":["Nothing changes — club speed is all that matters","It drops from about 119.5 mph to about 103.5 mph","It increases, because mishits add spin","Ball speed only depends on backspin, not smash"],"answerIndex":1,"explanation":"90 x 1.328 = 119.5 mph vs 90 x 1.15 = 103.5 mph — about 16 mph lost purely to strike quality, with zero change in swing speed. This is exactly the engine's smashEff floor (1.15) kicking in at a high spin loft (a glancing, mishit-like strike)."},{"q":"What physically sets the ceiling on driver smash factor (around 1.48-1.50), rather than swing speed alone?","options":["The golfer's grip strength","The USGA/R&A coefficient-of-restitution (spring-face) limit combined with the clubhead-to-ball mass ratio","The dimple pattern on the ball","Wind speed at address"],"answerIndex":1,"explanation":"Physics grounds this: ballSpeed = clubSpeed x (1+COR) x M/(M+m). With the legal COR limit (0.830), a ~200 g driver head and a ~45.93 g ball: (1.83)(200/245.93) = 1.488 — matching the ~1.48-1.50 real tour pros hit. It's a fixed property of the club/ball, not something a harder swing can push past."},{"q":"Two golfers have identical clubhead speed (94 mph) — one swinging a driver, one a 7-iron. Why does the driver produce noticeably more ball speed?","options":["Drivers are always swung faster, so this scenario can't happen","The driver's legally springier face gives it a higher smash-factor ceiling (~1.48-1.50 vs ~1.33-1.38), not just a faster swing","7-irons are heavier, so they transfer less energy","There is no real difference between clubs at the same speed"],"answerIndex":1,"explanation":"Irons have solid faces with no COR benefit; drivers are legally allowed a springier face up to COR 0.830, pushing the smash ceiling to ~1.48-1.50. At the same clubhead speed the driver still wins on ball speed — close to LPGA Tour's real numbers (94 mph clubhead, ~140 mph ball, smash ~1.49)."},{"q":"A golfer swings the driver 5 mph faster by steepening their attack angle, which raises spin loft. What does the engine predict for ball speed?","options":["Ball speed rises by roughly the same proportion as club speed","Ball speed barely rises, or can even fall, because the higher spin loft lowers smash factor and partly cancels the club-speed gain","Ball speed becomes negative","Spin loft has no effect on ball speed"],"answerIndex":1,"explanation":"The engine's self-limiter: smashEff = clamp(1.46 - 0.004 x spinLoft, 1.15, 1.42). Raising spin loft from 25 to 45° drops smashEff from 1.36 to 1.28 — at a 90 mph swing that's 122.4 mph vs 115.2 mph. Swinging harder only pays off in ball speed if strike quality (spin loft) doesn't degrade along with it."}]}
  </script>
  <script type="application/json" id="lesson-launch-angle">
{"parameter":"Launch Angle","oneLiner":"Launch angle is the angle the ball leaves the clubface at the instant of impact — the ball's initial climb, set mostly by loft and nudged by whether the club was moving up or down.","whatItIs":"Launch angle is the very first number a launch monitor reports after you hit a shot: the vertical angle, in degrees above the ground, that the ball is travelling at the instant it leaves the clubface. It is not the same as the loft stamped on the club, and it is not even the same as the loft actually delivered at impact (dynamic loft) — it sits below that number, nudged up or down by whether the club was moving up or down through the ball. Flightglass's engine states this precisely: launch angle is approximately 0.62 x dynamic loft + 0.25 x attack angle. Dynamic loft does almost two-thirds of the work; the up/down motion of the club (attack angle) does about a quarter. A default 7-iron strike (30° dynamic loft, a -3° descending attack) launches at 17.85° — well under the 30° of loft on the face, and close to the ~16° a real launch monitor shows for a tour 7-iron. Get this one number right for your ball speed and everything downstream — apex, hang time, landing angle, and ultimately carry — falls into place; get it wrong (too low or too high for your speed) and no amount of extra clubhead speed will fully save the shot.","components":[{"name":"Dynamic loft","role":"The effective loft actually delivered to the ball at impact — not the number stamped on the club. It is the dominant term in the engine's launch formula (weight 0.62) and by far the biggest lever a golfer has over launch angle, through club selection, shaft lean and hand position.","typicalRange":"7-iron ~28-32° dynamic; driver ~9-11° static loft, ~10-17° dynamic on tour with modern low-CoG heads"},{"name":"Attack angle","role":"The up (+) or down (-) direction the clubhead is travelling through impact. It is a smaller, secondary term in the launch formula (weight 0.25) — hitting up adds to launch angle, hitting down subtracts from it.","typicalRange":"irons ~ -6 to -2° (descending); driver ~ -1 to +5° (tour average about +1.3°, slightly ascending)"},{"name":"Club selection / loft progression","role":"Each club is built with a different static loft, which sets the range of dynamic lofts — and therefore launch angles — available before a swing even starts. It is why a PW launches near 24° and a driver near 10-11° with a broadly similar swing shape.","typicalRange":"driver 9-11°, 7-iron 30-34°, PW 44-48° static loft"},{"name":"Shaft lean / hand position","role":"Forward shaft lean (hands ahead of the ball) delofts the club, lowering dynamic loft below the static number — the classic ball-first, descending iron technique. Less forward lean keeps more loft on and raises launch.","typicalRange":"irons typically deloft ~2-6° below static loft; driver stays close to static (swept, not delofted)"},{"name":"Tee height & ball position (driver)","role":"Teeing higher and moving the ball forward in the stance shifts attack angle upward — from negative toward positive — without changing the club at all. It's the cheapest, most direct lever an amateur has to raise driver launch angle and cut spin.","typicalRange":"low tee ~ -2° attack; high tee + forward ball ~ +3 to +5° attack"}],"howTheyConnect":"At impact the ball is compressed against the face for under half a millisecond and springs off along a path set mostly by where the face is pointing (its loft) but bent slightly by the direction the club itself was travelling. Flightglass's engine encodes this as a weighted blend of the same two swing numbers that also produce spin loft: launchAngle = 0.62*dynamicLoft + 0.25*attackAngle, while spinLoft = dynamicLoft - attackAngle (see the Backspin lesson). Notice the sign flip on attack angle: it adds to launch angle but subtracts from spin loft. That is the single most useful fact in ball-flight fitting — hitting up on the ball (a more positive attack angle) simultaneously raises launch angle a little and lowers spin loft (hence backspin) a lot, which is exactly the \"launch it high, spin it low\" recipe TrackMan fitters chase for driver distance. Hitting down does the reverse: it very slightly lowers launch angle while raising spin loft (and backspin) sharply — which is why a descending iron strike still produces a nicely climbing shot even though attack angle subtracts a little from launch: dynamic loft is doing almost all of the launching (62% weight) while the descending attack angle is mostly busy building the spin loft that generates lift once the ball is airborne. Once launch angle and backspin are both set at the face, physics alone would predict a much lower trajectory than golf balls actually fly: a driver launched at a tour-average 10.4° and 167 mph with NO spin would peak at only about 10 yards under pure ballistics (verified: (74.66 m/s)^2 * sin(10.4°)^2 / (2*9.81 m/s^2) = 10.12 yd) — but real drives apex around 30 yards, roughly three times higher, because backspin's Magnus lift keeps adding upward force throughout the flight (as grounded in the Backspin lesson, lift can exceed 2x the ball's weight at speed). So launch angle sets the shape of the takeoff, backspin sets how long that shape is sustained, and together — not launch angle alone — they determine apex, hang time and landing angle, which is why the app's dependency graph draws both launch-angle and spin-loft feeding downstream into apex and landing-angle.","hierarchy":[{"driver":"Dynamic loft","weight":"Dominant — weight 0.62° of launch per° of loft","why":"It is the single biggest number in the formula and the one a golfer changes most, via club selection and hand position. Moving dynamic loft alone from 24° to 35° (attack fixed at -3°) swings the engine's launch angle from 13.63° to 20.95° — a 7.3° range from loft alone, more than triple what the realistic attack-angle range can produce."},{"driver":"Attack angle","weight":"Secondary — weight 0.25° of launch per° of attack","why":"A real quarter of the formula, but the usable range (-6 to +5°) is narrower than loft's, so in practice it nudges launch by only 1-3°. Its real power is indirect: through the sign-flipped spin-loft formula (spinLoft = loft - attack) it swings backspin far more than it swings launch angle itself — the mechanism behind 'launch high, spin low' driver fitting."},{"driver":"Club selection (loft progression)","weight":"Sets the starting range before either lever above is touched","why":"A driver's ~10° static loft and a PW's ~46° static loft bookend the entire launch-angle spectrum a player will ever see, independent of technique — you can only nudge launch angle within the window your club gives you."},{"driver":"Shaft lean / hand position","weight":"~1.2-3.7° of launch swing (0.62 x a 2-6° deloft)","why":"The main swing technique that changes dynamic loft mid-round without switching clubs. Forward shaft lean delofts a normal iron strike 2-6° below static loft, which is enough to meaningfully shift launch angle through the dominant loft term."},{"driver":"Tee height / ball position (driver-specific)","weight":"~1.75° of direct launch-angle swing, plus a larger indirect cut to spin loft","why":"The cheapest, most direct way to shift attack angle (not loft) for the same club and swing. Teeing higher and moving the ball forward can swing attack angle from roughly -2° to +5° — worth about 1.75° of extra launch by the formula, and a much bigger cut to spin loft (hence backspin) because attack angle is subtracted there, not added."}],"realWorld":{"tourBenchmarks":["PGA Tour average driver: ~10.9° launch angle, ~113 mph clubhead speed, ~167 mph ball speed, attack angle ~+1.3° (slightly ascending) — commonly cited TrackMan University tour averages.","PGA Tour average 7-iron: ~16.1° launch angle, ~90 mph clubhead speed, ~120 mph ball speed, attack angle ~ -4.3° (descending) — commonly cited TrackMan University tour averages.","PGA Tour average pitching wedge: ~24.2° launch angle at ~102 mph ball speed — despite launching roughly 2.3x higher than the driver, the wedge's much lower ball speed keeps its apex close to the driver's (both cluster around 30-32 yd).","Flightglass's engine, fed tour-average 7-iron inputs (30° dynamic loft, -3° attack — a rounded stand-in for the -4.3° tour figure) launches at 17.85°, about 1.75° above the measured 16.1° tour average (Wolfram-verified: 17.85 - 16.1 = 1.75). Fed a driver-plausible input (17° dynamic loft, +1.3° attack) it launches at 10.865°, within 0.66° of the measured 10.9° tour average (Wolfram-verified: 10.9 - 10.245 at 16° loft = 0.655) — a good illustrative match even though the engine has no dedicated driver preset yet.","Ballistics-only check (no spin/lift, Wolfram-verified): a tour driver's launch conditions (74.66 m/s = 167 mph, 10.4°) would peak at only ~10.1 yd without backspin; measured tour apex is ~30 yd, about 3x higher, because Magnus lift from backspin — not launch angle alone — does most of the work of holding the ball up."],"scenarios":["Why a beginner's driver often flies low and 'stings' off the tee while a tour pro's climbs high and lands soft: the beginner is typically hitting slightly down on a low-lofted driver (negative attack angle), which the formula shows drags launch angle down and raises spin loft — a low-launch, high-spin combination that balloons and comes up short. The pro tees higher, plays the ball forward, and catches the driver on the upswing (positive attack), raising launch a touch while cutting spin sharply.","A club-fitting session where the fitter has you tee the ball higher and move it forward in your stance, then re-measures: attack angle moves from around -2° toward +3°, and the launch monitor shows both a slightly higher launch angle and a noticeably lower spin number — the exact mechanism captured by the engine's opposite-signed attack-angle terms in launch angle versus spin loft.","Why a crisp, ball-first iron strike still climbs steeply into the sky even though the attack angle is negative: dynamic loft (62% weight) is doing almost all of the launching; the descending attack angle only trims a degree or two off launch while it is busy building the spin loft that keeps the ball up once airborne.","Why two players with identical club speed can carry the ball very differently: one launches too low (steep attack, delofted hands-forward strike) and the shot dives into the ground early; the other finds the launch/spin 'window' and gets meaningfully more carry from the exact same speed."],"whatItMeansForYou":"If you swing a driver like an amateur average — hitting down a degree or two, teed low — your launch angle is probably 2-5° lower than it should be for your speed, and your spin is simultaneously too high: the worst possible combination for distance. The single biggest, free fix is mechanical, not a new club: tee the ball higher and move it slightly forward in your stance so the driver meets the ball on the way up (a more positive attack angle). That alone raises launch angle a little (the +0.25 term) and cuts spin loft — and therefore backspin — a lot (the -1x term), which is the same 'launch high, spin low' recipe fitters use to add real distance without swinging any faster. On irons, don't chase a higher launch angle by scooping or trying to help the ball into the air — dynamic loft is already doing 62% of that work by design; a clean, descending, ball-first strike with the loft the club was built with will launch you correctly on its own."},"misconceptions":["\"Launch angle equals the loft of the club.\" False — it is a blend dominated by dynamic loft (62%) plus a smaller attack-angle term (25%), so a 30° dynamic loft with a -3° downward attack launches at 17.85°, well below the loft number itself, and typically a couple degrees below even the dynamic loft alone.","\"Hitting down on the ball raises launch angle.\" Backwards, if anything: attack angle's coefficient in the formula is positive (0.25 x attackAngle), so a descending (negative) attack angle slightly lowers launch angle relative to a level strike — it just doesn't lower it much, because loft dominates. What hitting down really does aggressively is raise spin loft (and backspin), a separate quantity.","\"You should launch the driver as high as possible for more distance.\" False past the optimum. Too much launch (especially paired with too much spin) wastes forward ball speed and balloons the flight, costing carry rather than adding it. Tour players optimize launch and spin together to a window matched to their ball speed, not to maximum height.","\"Launch angle and spin loft are the same thing.\" They share the same two inputs (dynamic loft, attack angle) but combine them with opposite signs on attack angle: launch = 0.62*loft + 0.25*attack (attack adds), spin loft = loft - attack (attack subtracts). A steeper downward attack angle raises spin loft/backspin while it actually slightly lowers launch angle — they are siblings, not twins.","\"A slow swinger and a tour pro should aim for the same launch angle.\" No — the optimal launch angle depends on ball speed. Slower swingers need proportionally more launch angle and less spin to maximize carry, which is why fitters give different launch/spin targets to different swing speeds rather than one universal number.","\"Scooping or trying to 'help' the ball up increases launch angle.\" On a normal iron strike, dynamic loft is already doing 62% of the launching by design; scooping mostly adds inconsistent, thin or fat contact rather than meaningfully raising launch, because it fights the descending attack angle the club was built to use."],"wolframChecks":["launchAngle blend: 0.62 x 30 + 0.25 x (-3) = 17.85 -> the default 7-iron engine launch (dynamic loft 30, attack -3), close to the ~16.1° a real tour 7-iron shows on a launch monitor.","17.85 - 16.1 = 1.75 -> the engine's 7-iron launch sits about 1.75° above the measured TrackMan tour-average launch, a good illustrative match.","0.62 x 16 + 0.25 x 1.3 = 10.245 -> a driver-plausible input (16° dynamic loft, +1.3° attack) lands within ~0.66° of the ~10.9° driver tour average, even without a dedicated driver preset.","0.62 x 10 + 0.25 x (-5) = 4.95 -> a low-lofted driver chopped down on launches only ~5°, the low-launch half of the classic low-launch/high-spin miss.","ballistics-only apex (no lift): (74.66 m/s)^2 x sin(10.4°)^2 / (2 x 9.81 m/s^2) = 10.12 yd -> a spinless tour drive would peak ~10 yd, versus the measured ~30 yd, so Magnus lift from backspin (not launch angle) does most of the height.","engine check: launchAngle = 0.62 x dynamicLoft + 0.25 x attackAngle has no clubSpeed term -> dragging club speed leaves the launch readout fixed while ball speed, carry and apex all move, confirming launch is speed-independent."],"quiz":[{"q":"In Flightglass's engine, launch angle is calculated as:","options":["Dynamic loft minus attack angle","0.62 x dynamic loft + 0.25 x attack angle","Club speed x smash factor","Face angle x 0.75 + club path x 0.25"],"answerIndex":1,"explanation":"Launch angle blends dynamic loft (62% weight) and attack angle (25% weight) — loft-dominant, with attack only nudging it. A default 7-iron strike (30° dynamic loft, -3° attack) launches at 0.62*30 + 0.25*(-3) = 17.85°, close to the ~16.1° a real tour 7-iron shows on a launch monitor. Dynamic loft minus attack angle is a different quantity, spin loft, which drives backspin, not launch angle."},{"q":"A player wants to raise their driver's launch angle and lower their spin at the same time — the classic 'launch high, spin low' fitting goal. Which single change to attack angle does both?","options":["Hit down more steeply (more negative attack)","Hit up more (more positive attack)","Attack angle can only affect one of the two, never both","Keep attack angle at exactly zero"],"answerIndex":1,"explanation":"Attack angle has opposite signs in the two formulas: launchAngle = 0.62*loft + 0.25*attack (attack adds) but spinLoft = loft - attack (attack subtracts). Hitting up therefore raises launch angle a little while lowering spin loft — and backspin — a lot, exactly why fitters have players tee the ball higher and move it forward to hit up on the driver."},{"q":"Tour average launch angle for a 7-iron is about 16 degrees, while a driver averages about 11 degrees, even though the 7-iron is swung much slower. Why does the slower club launch higher?","options":["Slower swings always launch higher, regardless of loft","The 7-iron's much greater dynamic loft (~30° vs ~11-17°) dominates the formula despite its steeper, negative attack angle","Attack angle matters more than loft for irons","Launch angle is unrelated to loft or club speed"],"answerIndex":1,"explanation":"Dynamic loft carries 62% of the weight in the launch-angle formula versus 25% for attack angle, so the 7-iron's ~30° of loft overwhelms its negative (-3 to -4°) attack angle, while a driver's much lower dynamic loft keeps launch low even with a slightly positive attack angle."},{"q":"Without any backspin, pure ballistics predicts a tour driver's launch conditions (167 mph, ~10.4°) would peak at only about 10 yards. Measured tour apex is about 30 yards. What accounts for the extra height?","options":["Launch angle alone fully explains the difference","Backspin's Magnus lift adds upward force throughout the flight, roughly tripling the peak height beyond what launch angle alone would produce","Launch monitors measure apex inconsistently","Wind always adds exactly 20 yards of height"],"answerIndex":1,"explanation":"Launch angle only sets the ball's initial direction. Once airborne, backspin creates Magnus lift (shown in the Backspin lesson to exceed 2x the ball's weight at speed) that keeps pushing the ball upward well past where simple no-spin ballistics would have it falling — which is why real apex (~30 yd) is roughly 3x the no-lift prediction (~10 yd)."},{"q":"An amateur hits their driver with a -5° (steeply descending) attack angle and only 10° of dynamic loft. Using the engine's formula, roughly what launch angle results, and what does that predict for the shot?","options":["About 15° — a well-optimized, tour-like launch","About 5° — a low launch that, combined with the steep attack's higher spin loft, tends to balloon and fall short","About 25° — far too high","Attack angle this steep makes launch angle impossible to calculate"],"answerIndex":1,"explanation":"0.62*10 + 0.25*(-5) = 4.95, about 5° — a low launch. Worse, that same -5° attack angle raises spin loft (loft minus attack = 15°), so the shot combines low launch with relatively high spin: the classic low-launch/high-spin miss that kills driver distance, the opposite of the tour's high-launch/low-spin recipe."}]}
  </script>
  <script type="application/json" id="lesson-start-direction">
{"parameter":"Start Direction","oneLiner":"Start direction is the initial line the ball leaves the clubface on, before any curve is added - and it is set mostly by where the face points at impact, not by the club's swing path, with the exact split shifting by club.","whatItIs":"Start direction is the initial horizontal line the ball is travelling on the instant it leaves the clubface - measured in degrees left or right of the target line, before any sideways curve has had a chance to act on it. It answers one narrow question: which way did the ball launch, not which way did it end up. For decades, golf instruction taught that this was mostly decided by the club's swing path (the classic 'path is king' rule of thumb, roughly path 80% / face 20%). TrackMan's launch-monitor research (the 'D-Plane' model) overturned that: face angle at impact is actually the dominant factor, contributing somewhere between about 62% and 88% of start direction depending on the club, with swing path filling in the rest. Flightglass's engine encodes this exact, loft-dependent blend: startDirection = faceW*faceAngle + (1-faceW)*clubPath, where faceW tapers from ~0.85 on a low-lofted driver down to the engine's floor of ~0.60-0.625 on a high-lofted wedge. Start direction then feeds directly into Offline (the final sideways miss), together with Curve - so getting comfortable with 'face mostly, path a little, and it shifts by club' is the single most useful direction-fixing idea in the whole bag.","components":[{"name":"Face angle at impact","role":"the dominant lever. Where the clubface points at impact relative to the target line at the moment of contact. In Flightglass's engine it carries 62-88% of the start-direction weight depending on the club (faceW = clamp(0.90 - dynamicLoft*0.005, 0.60, 0.88)), which is exactly the loft-dependent split TrackMan's D-Plane research established. Face angle is mostly a hands/grip/clubface-control variable, distinct from swing direction.","typicalRange":"tour driver/iron ~ -2 to +2° (near square); amateur slicers commonly 3-6+° open"},{"name":"Club path at impact","role":"The secondary lever - the horizontal direction the club-head is actually travelling through impact (in-to-out = positive/right, out-to-in = negative/left). It only gets 12-38% of the say in where the ball starts (it matters far more for curve, a separate node). Its share grows as loft increases.","typicalRange":"tour driver ~ -1 to +3° (often in-to-out); iron/wedge ~ -2 to +2°"},{"name":"Dynamic loft / club selection","role":"Not a direction input itself - it is the dial that sets how much face vs. path matter. Lower loft (driver) -> more face-dominant (~85%); higher loft (wedge) -> path talks more (~62% face / 38% path). This is why a driver miss 'feels like the face' and a wedge miss 'feels like the path'.","typicalRange":"driver ~9-13°; 7-iron ~28-32° dynamic; wedge ~45-60°"},{"name":"Carry / club length (the yardage amplifier)","role":"Not a cause of start direction, but the reason the same angular error matters more with longer clubs: offline-at-start = carry x sin(startDirection). A given face error is weighted more heavily on a driver and travels farther, so it compounds into more yards.","typicalRange":"wedge carry ~80-120 yd; 7-iron ~150-180 yd (engine default ~172 yd); driver ~230-300 yd (tour avg ~275 yd carry)"},{"name":"Attack angle & club speed","role":"not factors in start direction in this model (or the standard D-Plane model) - solveFlight's startDirection formula uses only faceAngle, clubPath and dynamicLoft. Hitting up or down, or swinging faster, changes launch angle, spin loft and ball speed, but does not move the horizontal start line. A very small real-world secondary effect exists via gear effect on off-center strikes, not modelled here.","typicalRange":"0% direct weight on start direction"}],"howTheyConnect":"Contact between clubface and ball lasts roughly half a millisecond. In that instant the ball is compressed against the face and launches largely along the direction the face is pointed - not along the direction the club-head is swinging. This is the corrected physics behind TrackMan's 'D-Plane' / 'New Ball Flight Laws': for decades golf instruction taught that swing path was ~80% of start direction and face only ~20%; TrackMan's launch-monitor data flipped that, showing face dominates (roughly 62-88% depending on the club) and path plays the smaller supporting role. Flightglass's engine encodes this directly: startDirection = faceW*faceAngle + (1-faceW)*clubPath, where faceW is not a fixed constant but tapers with dynamic loft (faceW = clamp(0.90 - dynamicLoft*0.005, 0.60, 0.88)). Physically, more loft means a more glancing, higher-friction contact where the ball skids a little further along the path direction before it releases, letting path 'talk' more (a 55° wedge: 62.5% face / 37.5% path); a nearly flat-faced driver contact is closer to a pure face-angle launch (~85% face / 15% path). Crucially, none of this depends on attack angle or club speed - those variables live entirely in the vertical/spin side of the model (spin loft, launch angle, ball speed) and never enter the startDirection formula. Once the ball leaves the face on this start line, that line becomes the baseline the rest of the flight bends away from: the graph's own dependency edge runs start-direction -> offline, and the engine's offline field is exactly carry*sin(startDirection) plus a separate curve term driven by spin axis (face-to-path gap, not face alone). So start direction answers 'which way did it launch' and spin axis/curve answers 'which way did it bend after that' - two different questions that share the same two raw inputs (face, path) but combine them completely differently.","hierarchy":[{"driver":"Face angle at impact","weight":"dominant - 62% (lob wedge) to 85% (driver) of start direction, formula-verified: faceW = clamp(0.90 - dynamicLoft*0.005, 0.60, 0.88) gives 0.75 (7-iron), 0.8475 (driver), 0.625 (55° wedge).","why":"Wolfram-verified: a 2° open face with a square path alone starts a driver 1.695° right (0.8475*2) and a 7-iron 1.5° right (0.75*2). At tour carry that is ~8.1 yd of pure start-line miss on the driver (275*sin(1.695°)=8.13 yd) vs ~4.5 yd on the 7-iron (172.4*sin(1.5°)=4.51 yd) - before any curve is added. This is the corrected, TrackMan-era finding that overturned the old '80% path' teaching."},{"driver":"Club path at impact","weight":"secondary - only 15% (driver) to 38% (lob wedge) of start direction; its share is the exact complement of face weight and grows as loft increases.","why":"The same 2° path error (face held square) shifts a driver's start line only 0.305° (0.1525*2) but a 55° wedge's start line 0.75° (0.375*2) - path 'talks' roughly 2.5x more, proportionally, on the most lofted clubs. Path matters far more for curve (a separate node) than for where the ball starts."},{"driver":"Dynamic loft / club selection (the blend dial)","weight":"Indirect - moves 0 yards on its own, but re-weights levers 1 and 2: driver-to-lob-wedge slides faceW from 0.8475 down to the engine's floor of 0.60-0.625.","why":"This is why a driver miss reads as 'my face was off' while a chunked wedge reads as 'my path/direction was off' - the same swing fault (a slightly open face) is diagnosed differently by feel because the underlying blend genuinely shifts with the club in your hands."},{"driver":"Carry distance / club length (the yardage amplifier)","weight":"Not a direction input, but the multiplier that turns a fixed angular error into yards: offline-at-start = carry * sin(startDirection).","why":"From the identical '2° open face, square path' scenario, the driver's combination of higher face-weight and longer carry (275 yd) yields ~8.1 yd of start-line miss, while a ~100-yd wedge shot with a comparable 1.25° start (lower face-weight, 0-path case) yields only ~2.2 yd (100*sin(1.25°)=2.18 yd) - roughly a 3.7x gap, purely from combining higher face-weight with a longer flight."},{"driver":"Attack angle & club speed","weight":"zero direct weight - absent from the startDirection formula entirely.","why":"solveFlight computes startDirection = faceW*faceAngle + (1-faceW)*clubPath only; attackAngle and clubSpeed never enter that line (they drive spin loft, launch angle and ball speed instead). Golfers who 'try to hit it more left by hitting down more' are chasing a lever that, in this model and in the standard D-Plane physics, does not exist for start line."}],"realWorld":{"tourBenchmarks":["PGA Tour averages (widely published TrackMan/launch-monitor data): driver clubhead speed ~113 mph, ball speed ~167 mph, carry ~275 yd (~296-300 yd total with roll) - used here as the reference driver carry for start-line-yardage math.","Tour players typically keep face angle within roughly a degree of square on full swings; with face carrying 75-85% of the start-direction weight for mid-iron-to-driver lofts, that sub-1-° face control is what lets tour pros start the ball on a repeatable line even when their swing paths differ from player to player (a strong in-to-out 'draw' path vs a milder 'fade' path).","Engine-true: a 2° open face with a square path alone starts a tour driver 1.695° right - at a 275-yd tour carry that is ~8.1 yd of pure start-line miss (275*sin(1.695°) = 8.13 yd, Wolfram-verified), before any curve is added on top.","Engine-true: the identical 2° open face on a 172-yd 7-iron only starts the ball 1.5° right (~4.5 yd of miss, 172.4*sin(1.5°) = 4.51 yd) and on a ~100-yd wedge shot just 1.25° right (~2.2 yd, 100*sin(1.25°) = 2.18 yd) - the driver amplifies the same face error by roughly 3.7x versus a wedge, from higher face-weight (85% vs 62%) compounding with 2.75x more carry.","Rule-of-thumb, trig-verified: cot(1°) = 57.30, so a golfer can estimate roughly 1 yard of start-line miss for every 57 yards of shot distance, for every degree the ball starts off target."],"scenarios":["The classic 'banana' slice: an amateur's face is open both relative to target and relative to their (often out-to-in) path. Because face dominates start direction, the ball starts right of target (the push component); because the face is also open relative to path, spin axis tilts and the ball curves further right after launch - the two-part 'starts right, curves right' shape golfers call a slice.","The mirror-image 'pull-hook': face closed relative to target and path left of target - the ball starts left and keeps curving further left.","Tour players shaping shots on purpose hold the face open or closed relative TO their path, not relative to the target - e.g. a controlled power fade is 'aim the path a few degrees right of target, hold the face just closed enough relative to that path (but still slightly open to the target) so it starts right and drifts back'.","A weak grip that leaves the clubface open at impact is one of the most common amateur swing faults, and it is the textbook cause of a push or slice off the tee - because driver is both the most face-dominant club (~85%) and the longest-flying, that same grip fault produces a bigger offline miss with driver than the identical face fault would with a wedge or short iron."],"whatItMeansForYou":"If your shots are starting off-line, check your face first - it is doing somewhere between 3/4 and 7/8 of the work, and even more so with driver in your hands. Working on swing path alone will only nudge your start line a little; its bigger job is reshaping curve, not launch direction. And because a given face error costs more yards the longer the club, tightening face control matters most with driver - the same roughly-2-degree open face that is about a 2-yard miss with a wedge is closer to an 8-yard miss off the tee."},"misconceptions":["\"Swing path is what starts the ball.\" This was the pre-TrackMan teaching. Face angle actually dominates (62-88% depending on the club); path only contributes the remainder. A player can have a wildly in-to-out path and still start the ball left if the face is closed enough.","\"Attack angle (hitting up or down) changes your start line.\" It does not, in this model or in the standard D-Plane physics - attackAngle never appears in the startDirection formula. Attack angle changes launch angle and spin loft, both vertical/spin quantities, not the horizontal start line.","\"A push and a slice are the same miss.\" A push is a pure start-line issue (face-dominated, ball starts right and flies straight-ish). A slice adds curve on top, from a face-to-path gap driving the spin axis. Same starting symptom, two different causes, two different fixes.","\"Path's importance is the same for every club.\" False - the model's face weight is loft-dependent, so path has roughly 2.5x more proportional say on a lob wedge (~38%) than on a driver (~15%).","\"A 2° face error is a 2° face error, full stop.\" True in degrees, but not in yards: because offline-at-start scales with carry (offline = carry * sin(startDirection)), the identical angular error is worth roughly 3-4x more yards off a driver than off a wedge, purely from flying farther on a club that also weights face more heavily.","\"Aiming your body/stance is the same as aiming the clubface.\" They are separate variables in the model (face angle vs club path) and in reality - grip and hand position control face angle largely independently of where the body/swing direction is aimed."],"wolframChecks":["faceW formula check: 0.90 - 30*0.005 = 0.75 (7-iron face weight, matches engine's sourced comment of ~75%).","faceW formula check: 0.90 - 10.5*0.005 = 0.8475 (driver face weight, matches engine's sourced comment of ~0.85, within the 0.60-0.88 clamp).","faceW formula check: 0.90 - 55*0.005 = 0.625 (55° wedge face weight, matches engine's sourced comment of ~0.62, at the clamp floor).","startDirection blend check: 0.75*2 + 0.25*0 = 1.5 (7-iron, 2° open face, square path).","startDirection blend check: 0.8475*2 + (1-0.8475)*0 = 1.695 (driver, same 2° open face, square path).","startDirection blend check: 0.625*2 + 0.375*0 = 1.25 (55° wedge, same 2° open face, square path).","offline-at-start check: 172.4*sin(1.5°) = 4.513 yd (7-iron pure start-line miss).","offline-at-start check: 172.4*sin(3.75°) = 11.28 yd (7-iron, larger 5° face-angle example).","offline-at-start check: 275*sin(1.694°) = 8.129 yd (tour driver pure start-line miss, using tour-average 275 yd carry).","offline-at-start check: 100*sin(1.25°) = 2.181 yd (short wedge shot pure start-line miss).","engine carry cross-check: 0.232*120^1.389/(1+(120/210)^6) = 173.22 yd, confirming the ~172-yd default 7-iron carry figure used throughout (matches the app's existing Carry lesson).","trig rule-of-thumb: tan(1°) = 0.017455, so cot(1°) = 57.2900 -> confirms the 'about 1 yard of miss per 57 yards of shot distance, per degree of start-line error' heuristic used in the real-world section."],"quiz":[{"q":"In the D-Plane model, what does the most to determine where the ball initially starts (before any curve)?","options":["Club path","Face angle at impact","Attack angle","Club speed"],"answerIndex":1,"explanation":"Face angle carries 62-88% of the start-direction weight depending on the club (Flightglass engine: faceW = clamp(0.90 - dynamicLoft*0.005, 0.60, 0.88)). This is the corrected, TrackMan-era finding that replaced the older belief that swing path was ~80% of start direction."},{"q":"A 7-iron and a driver are both struck with an identical 3° open face and a perfectly square (0°) path. What happens?","options":["Both start exactly 3° right - face angle is face angle","The driver starts more right than the 7-iron, because lower-lofted clubs weight face angle more heavily","The driver starts less right, because path matters more on a driver","Neither ball moves off target since the path is square"],"answerIndex":1,"explanation":"Face weight rises as loft falls: the driver's faceW is ~0.8475 (start = 2.54° right) versus the 7-iron's 0.75 (start = 2.25° right). Lower-lofted clubs are more face-dominant, so the same face error pushes the driver further off line in degrees."},{"q":"A wedge shot has a square (0°) face but a +4° in-to-out path. Which variable, if changed, would have NO effect on this shot's start direction?","options":["Club path","Face angle","Attack angle","Dynamic loft (via the face/path blend)"],"answerIndex":2,"explanation":"Attack angle never appears in the startDirection formula - it only affects launch angle and spin loft. Changing it would alter how high the ball launches and how much it spins, but not which way it starts."},{"q":"Why does the same 2° face-angle error (path held square) cost noticeably more yards off a driver than off a wedge?","options":["It doesn't - the yardage loss is identical for every club","The driver weights face angle more heavily and flies much farther, so the angular miss compounds with distance (offline = carry x sin(startDirection))","Wedges have no measurable face angle at impact","Path fully cancels out any face error on wedges"],"answerIndex":1,"explanation":"With the driver's higher face weight (~85% vs ~62-66%) and its much longer carry (~275 yd vs ~100 yd), the same 2°-class face error works out to roughly 8 yd of start-line miss off the driver versus roughly 2 yd off a wedge - about a 3.7x gap, purely from combining a bigger blend weight with a longer flight."},{"q":"A ball starts about 3° right of target and then keeps curving further right as it flies. What is most likely happening?","options":["Only the path is off - the face is perfectly square","The face is open relative to target (pushing the start line right) and open relative to path (driving spin axis / curve further right) - a classic push-slice","This is purely a launch-angle problem","Backspin is simply too high"],"answerIndex":1,"explanation":"The initial 3° right comes from the face-dominant start-direction blend. The continued curve after launch comes from a separate mechanism - the face-to-path gap driving spin axis tilt. A shot that starts right and keeps bending right is showing both effects at once: an open face relative to target (start) and open relative to path (curve)."}]}
  </script>
  <script type="application/json" id="lesson-spin-axis">
{"parameter":"Spin Axis","oneLiner":"Spin Axis is the sideways tilt of the ball's spin away from pure backspin - set by the gap between where the face points and where the club is travelling - and it decides which way, and how sharply, the shot curves.","whatItIs":"Spin Axis is the sideways tilt of a golf ball's total spin away from a pure, level backspin. Picture the ball's spin as an arrow poking out of one pole of the ball: if that arrow points straight left-to-right (perfectly horizontal), the ball spins purely backward, generates only lift, and flies straight. Tilt that arrow even a little - the top of the axis leaning right or left - and some of the same spin gets redirected into sideways curve instead of pure lift, bending the shot into a draw, fade, hook, or slice. Crucially, spin axis is not about how much the ball spins (that's backspin's job); it's about which direction that spin points. The tilt is created at impact by the gap between where the clubface is aimed and the direction the club is actually travelling (face angle minus club path) - the horizontal-plane twin of spin loft, which is the same idea in the vertical plane. Flightglass's engine encodes this as spinAxis = clamp(1.5 x (faceAngle - clubPath), -38°, 38°): a positive value tilts the axis right, which curves the ball right for a right-handed golfer (slice or fade); negative tilts it left (hook or draw). That tilt then feeds the engine's curve field - the sideways bend in yards - which grows with the square of carry distance, and offline - the total sideways miss, which also folds in start direction.","components":[{"name":"Face Angle","role":"Where the clubface points at impact relative to the target line. It is the dominant input for start direction (~75-88% weight, loft-dependent), but for curve it only matters as one half of the face-to-path gap — it pulls on spin axis with exactly the same 1° = 1° weight as club path does.","typicalRange":"diagram range -8 to +8°; tour irons commonly within about +/-2° of the intended aim"},{"name":"Club Path","role":"The horizontal direction the clubhead is travelling through impact (in-to-out = positive/right, out-to-in = negative/left). It is the minor partner for start direction, but the co-equal partner (with face angle) for spin axis — path and face pull on curve with identical weight.","typicalRange":"iron path roughly -4 to +4°; tour drivers often +2 to +6° (in-to-out)"},{"name":"Face-to-path gap (faceAngle - clubPath)","role":"the quantity that actually creates spin axis tilt. A wide-open face relative to the path (or a big out-to-in path relative to the face) creates a large gap; a gap near zero means face and path are aimed the same way and the shot flies straight regardless of where either one points relative to the target.","typicalRange":"engine thresholds: <0.75° = Straight, 0.75-6° = Fade/Draw, >6° = Slice/Hook"},{"name":"Spin Axis (the output)","role":"The tilt of the ball's total spin vector away from a pure, level backspin axis. 0° = pure backspin (dead straight, all lift, no curve); as the axis tilts, some of that same spin gets redirected sideways into curve. Engine: clamp(1.5 x faceToPath, +/-38°).","typicalRange":"tour ~2-5° (small controlled fade/draw); recreational slice 15-25+°; engine ceiling 38°"},{"name":"Carry distance / hang time","role":"Not a spin generator at all, but the multiplier that turns a fixed axis tilt into yards of sideways curve. Because the sideways force acts on the ball for its whole time in the air, curve compounds with (flight time)^2 - the engine models this directly as carry-squared.","typicalRange":"wedge ~90 yd carry, 7-iron ~172 yd, driver ~275 yd (tour) - same axis tilt curves the driver ~2.5x more than the iron"},{"name":"Gear effect / strike location (off-center hits)","role":"On real clubs - especially a large, springy driver face - hitting the toe or heel spins the ball around its own vertical axis independent of face/path, nudging the effective spin axis a few extra degrees. Real and well documented in club-fitting, but not modeled by this engine (face/path only).","typicalRange":"toe/heel misses can shift the resulting curve by several degrees beyond what face and path alone predict"},{"name":"Total spin magnitude (club-dependent)","role":"Spin axis is a tilt (a fraction), not an amount. The same axis-tilt fraction redirects a very different absolute rpm sideways depending on how much total spin the club produces in the first place (driver ~2,700 rpm vs wedge ~9,000 rpm, from the Backspin lesson).","typicalRange":"driver ~2,200-2,900 rpm total; 7-iron ~6,500-7,500 rpm; wedge ~8,000-9,000 rpm"}],"howTheyConnect":"Backspin and spin axis are the two halves of one physical quantity - the ball's total spin vector at impact - split along two different mismatches. Spin loft (dynamic loft minus attack angle) is the vertical mismatch between where the face points and where the club travels, and it sets how much the ball spins. Spin axis is the horizontal mismatch - face angle minus club path - and it sets which way that spin vector tilts: dead level (0°) means pure backspin and a straight flight; tilted right or left redirects a slice of that same spin sideways. In true physics this is a clean decomposition, backspin-for-lift = totalSpin x cos(axisTilt) and sidespin-for-curve = totalSpin x sin(axisTilt) - grounded here (sin 9° = 0.156, sin 38° = 0.616): even the engine's own 38° clamp ceiling only redirects about 62% of the spin sideways, because cos(38°) = 0.79 keeps most of it working as lift. Flightglass's engine takes a simpler shortcut for the same idea: spinAxis = clamp(1.5 x (faceAngle - clubPath), +/-38°), computed completely independently of the backspin formula (an acknowledged estimate/simplification - real spin axis also depends on spin loft and gear effect). Once the ball leaves the face, that tilted spin creates a Magnus force that points partly sideways as well as up, and because the ball is under this steady sideways push for its entire hang time, the lateral deflection compounds roughly with (time in the air)^2 - basic projectile kinematics (x = 1/2 a t^2). The engine encodes this directly: curve = carry^2 x spinAxis / 12000, capped at 60% of carry. That squared term is why identical face-to-path faults look so different by club: a 172-yd 7-iron and a 275-yd driver carrying the same 9° axis tilt bend 22 yd and 57 yd respectively - 2.56x more curve on the longer shot, exactly (275/172)^2. One more piece keeps this whole model coherent: a golf ball's angular momentum at typical spin rates is large (a 7,000-rpm ball's spin angular momentum works out to about 0.0061 kg m^2/s from a solid-sphere moment of inertia of 8.33e-6 kg m^2), which makes the spinning ball gyroscopically stable - the tilt set in the half-millisecond of contact stays essentially fixed for the whole flight rather than drifting. That is exactly why a single \"spin axis\" number, read the instant after impact, is enough to predict the entire shape of the shot from launch to landing.","hierarchy":[{"driver":"Face-to-path gap (faceAngle minus clubPath)","weight":"the entire input - engine gain 1.5° of spin-axis tilt per 1° of gap, clamped to +/-38°. A 2° gap gives 3° axis; a 12° gap gives 18° axis; a 40° gap clamps at 38°.","why":"Spin axis has exactly one geometric cause in this model: how far the face is aimed away from where the club is actually travelling. Zero gap means zero axis tilt and a dead-straight shot no matter where either number points relative to the target - this is the whole 'new ball flight laws' finding TrackMan popularized."},{"driver":"Carry distance / hang time (quadratic multiplier)","weight":"Curve = carry^2 x spinAxis / 12000. The identical 9° axis tilt bends a 172-yd 7-iron ~22 yd but a 275-yd drive ~57 yd - about 2.56x more, matching (275/172)^2.","why":"Curve is not created at impact, it accumulates in flight from a steady sideways force acting for the whole hang time. A longer flight (more carry, more time) lets the same sideways push compound much further, which is why the exact same swing fault is nearly invisible on a wedge and a disaster off the tee."},{"driver":"Face angle (as the gap's larger, more-aimed-at half)","weight":"Pulls on spin axis 1:1 with club path - not weighted ~75-88% like it is for start direction.","why":"Golfers often assume the club that dominates start direction also dominates curve. It doesn't: for spin axis face and path are exactly equal partners, so 'aim the face' fixes start line but does nothing for curve unless the path also changes to match it."},{"driver":"Club path (the gap's other, equally-weighted half)","weight":"Pulls on spin axis 1:1 with face angle, despite being the minor (~12-40%) contributor to start direction.","why":"Path is the lever most golf instruction actually targets for curve (an over-the-top out-to-in path is the classic slicer's path fault) precisely because, for axis tilt, it carries the same weight as the face - closing the path closes the gap just as effectively as squaring the face."},{"driver":"Gear effect / strike location (off-center hits)","weight":"Not modeled by the engine at all; in real clubs, especially a large driver face, toe/heel contact can shift the effective curve by several degrees beyond face and path alone.","why":"It is a genuine third input to real-world spin axis (rotation imparted by the club's centre-of-gravity offset on an off-centre hit) that a face/path-only model cannot capture - flagged here as the honest limit of the engine's simplification."},{"driver":"Total spin magnitude (club-dependent)","weight":"Second-order for the axis number itself, but it sets what that tilt fraction means in absolute rpm - driver ~2,700 rpm total vs wedge ~9,000 rpm (Backspin lesson).","why":"Spin axis is a tilt/fraction, not an amount, so it interacts with - but is computed independently of - how much total spin the strike produced. The same 10° tilt redirects a very different absolute sidespin rpm by club, even though the engine treats backspin and spinAxis as separate, uncoupled fields (a known simplification vs. true physics, where axis tilt technically trims a little backspin too)."}],"realWorld":{"tourBenchmarks":["PGA Tour driver: ~113 mph clubhead speed, ~167 mph ball speed, ~275 yd carry, ~2,700 rpm backspin (Backspin lesson) - and spin axis tilt kept tight, typically in the roughly 2-5° range (a small, intentional draw or fade), because tour players manage the face-to-path gap closely.","PGA Tour 7-iron: ~120 mph ball speed, ~172 yd carry, ~7,000 rpm backspin (Carry lesson) - spin axis tilt usually even tighter than the driver's, partly because a shorter, higher-lofted shot is more forgiving of small mismatches.","Recreational slice (a very common amateur miss): face-to-path gaps of 8-15+° are common off the tee, producing spin-axis tilts of roughly 12-25+°.","Engine ceiling: spin axis clamps at +/-38° (from a ~25° face-to-path gap) - roughly the most tilt a realistically struck ball can carry before the shot stops behaving like a normal golf shot."],"scenarios":["Two golfers both miss the fairway by 30 yards off the tee. One hit a straight push (face and path both aimed 6° right, a near-zero gap between them, spin axis near 0° - the ball just starts right and flies dead straight). The other hit a slice (face 6° open, path 6° left, a 12° gap, spin axis ~18° - the ball starts closer to target, then bends hard right). Same miss distance, two completely different fixes: the pusher needs to change where they're aimed, the slicer needs to close the face-to-path gap.","A weekend player's 7-iron slice 'doesn't look that bad' (maybe 15-20 yd of curve), but the exact same swing fault with the driver turns into a 40-50 yard banana that finds the trees - purely because the ball is airborne roughly twice as long and curve compounds with the square of that hang time.","A golfer who fixes an over-the-top, out-to-in path closes the face-to-path gap and watches their curve shrink dramatically - even if their clubface aim (and therefore their start direction) barely changes at all, because start direction and curve are governed by different blends of the same two numbers.","Wedge shots almost never look like they curve, even with an ugly face-to-path gap present, simply because they don't carry far enough or stay airborne long enough for the sideways push to accumulate into visible yards - the same technical fault is nearly invisible at 80 yards and glaring at 260."],"whatItMeansForYou":"If your miss is a big sideways banana off the tee, look at the gap between where your face is pointing and where your path is actually swinging - not just where you're aimed. Because face and path pull equally on spin axis (unlike start direction, where face dominates), closing that gap by even a few degrees shrinks your curve a lot, and it shrinks it most on your longest club: the same swing flaw that's barely visible on a wedge can cost you 40+ yards off the driver, because curve grows with the square of how far the ball carries."},"misconceptions":["\"Club path is what curves the ball, face angle is just for where it starts.\" This is the old, now-debunked golf teaching. Face angle dominates start direction (~75-88% weight), but for curve, face and path are equal partners - spin axis = 1.5 x (face minus path), a straight 1:1 subtraction. Changing either one by the same amount bends the shot by the same amount.","\"A big slice means a wildly open face.\" It means a big gap between face and path. A face that is only 2° open can still slice hard if the path is 10° out-to-in (a 12° gap) - and a face that is 8° open can fly nearly straight if the path matches it closely.","\"Spin axis and backspin are the same thing / more spin always means more curve.\" They are different fields entirely. A driver can carry very little total spin (~2,700 rpm) but still slice violently if its spin axis is badly tilted; a wedge can spin 9,000 rpm and fly dead straight if its axis is near zero. Total spin sets lift; spin axis sets curve direction and share.","\"The same swing fault curves every club about the same amount.\" Curve grows with carry squared in the model (and with flight-time squared physically), so an 8-10° face-to-path gap that barely nudges a wedge can turn into a 40-50 yard banana off the driver, purely because the ball is airborne roughly twice as long.","\"Spin axis drifts and changes shape mid-flight (it starts straight then curves late).\" The tilt is set almost entirely at impact and stays close to fixed - the ball is gyroscopically stable (large angular momentum vs tiny aerodynamic torques). What looks like late curve is really the same constant sideways push compounding over time (curve ~ time^2), not the axis itself changing.","\"Toe and heel mis-hits only cost you distance.\" On a driver especially, off-center strikes also impart extra spin via gear effect, nudging the effective spin axis a few degrees beyond what face and path alone would produce - a real-world layer this face/path-only engine does not model."],"wolframChecks":["spinAxis = 1.5 x (faceAngle - clubPath): 1.5 x (4 - 2) = 3 -> a 4° open face with a 2° in-to-out path tilts the axis 3°, a mild fade.","curve = carry^2 x spinAxis / 12000: 172^2 x 9 / 12000 = 22.19 yd (7-iron) vs 275^2 x 9 / 12000 = 56.72 yd (driver) at the same 9° axis tilt.","(275/172)^2 = 2.556 -> the driver bends ~2.56x more than the 7-iron on an identical axis tilt, purely from the carry-squared term.","engine clamp: 1.5 x 25 = 37.5 and 1.5 x 40 = 60 -> spin axis is capped at +/-38°, so a ~25° face-to-path gap already saturates it.","lift/curve split: cos(38°) = 0.788, sin(38°) = 0.616 -> even at the 38° ceiling about 62% of the spin is redirected sideways while ~79% still works as lift, matching the decomposition.","sin(9°) = 0.1564 -> at a small 9° tilt only ~16% of the spin goes sideways, which is why modest face-to-path gaps curve gently.","gyroscopic stability: a 7,000 rpm ball (solid-sphere moment of inertia ~8.33e-6 kg m^2) carries ~0.0061 kg m^2/s of spin angular momentum, large versus aerodynamic torques -> the axis set at impact stays essentially fixed through the flight."],"quiz":[{"q":"What does Spin Axis actually control, as distinct from Backspin?","options":["How high the ball launches","Which way (and how much) the ball curves sideways - not the total amount of spin","How far the ball rolls after landing","The ball's raw speed off the face"],"answerIndex":1,"explanation":"Backspin is the amount of spin (the lift-making engine). Spin axis is the tilt of that spin vector - 0° is pure backspin (straight), and tilting it right or left redirects part of that same spin into sideways curve. In the engine they are separate fields: backspin = spinLoft x ballSpeed x 1.8, spinAxis = clamp(1.5 x (faceAngle - clubPath), +/-38°)."},{"q":"A golfer's face is 4° open and their path is 2° in-to-out. Using the engine's formula spinAxis = 1.5 x (faceAngle - clubPath), what happens?","options":["Axis tilt = 12°, a hard slice","Axis tilt = 3°, a mild fade to the right","Axis tilt = -3°, a mild draw to the left","The shot flies dead straight"],"answerIndex":1,"explanation":"faceToPath = 4 - 2 = 2°. spinAxis = 1.5 x 2 = 3°. That 2° gap sits between the engine's Straight threshold (0.75°) and its Slice/Hook threshold (6°), so shapeLabel calls it a Fade - a mild rightward bend for a right-handed golfer, not a hard slice."},{"q":"The exact same 9° spin-axis tilt is present on both a 172-yd 7-iron shot and a 275-yd drive. Because the engine's curve formula scales with carry squared, how much more does the drive curve?","options":["About the same amount","About 1.5x more","About 2.5x more","About 10x more"],"answerIndex":2,"explanation":"curve = carry^2 x spinAxis / 12000. At 9° axis: the 172-yd shot bends 22.2 yd, the 275-yd drive bends 56.7 yd - a ratio of (275/172)^2 = 2.56x. The identical swing fault is far more forgiving on a shorter shot because curve compounds with hang time squared."},{"q":"\"Club path is what curves the ball; face angle only sets where it starts.\" Is that right, per the engine and modern (TrackMan-era) ball-flight teaching?","options":["True - path alone controls curve","False - face angle dominates start direction, and curve comes from the gap between face and path, with face and path weighted equally","False - face angle alone controls both start and curve","True, but only for wedges"],"answerIndex":1,"explanation":"Face angle carries ~75-88% of the weight for start direction (loft-dependent), but for spin axis the formula is a plain 1:1 subtraction, spinAxis = 1.5 x (faceAngle - clubPath) - face and path pull on curve with identical weight. This reversal (face dominates start, but face and path share curve equally) is exactly the 'new ball flight laws' finding that overturned the old path-curves/face-starts teaching."},{"q":"Which pattern best matches real spin-axis tilts: PGA Tour professionals vs. a typical mid/high-handicap slicer?","options":["Tour players ~2-5° tilt (a small, controlled draw or fade); slicers commonly 15-25+°","Tour players ~20° tilt; amateurs near 0°","Both groups average close to 0°","Spin axis doesn't meaningfully differ by skill level"],"answerIndex":0,"explanation":"Tour players keep their face-to-path gap tight, producing spin-axis tilts typically in the low single digits - a deliberate small draw or fade, not dead-zero. Recreational slicers commonly carry much larger face-to-path gaps (8-15+°), producing 15-25+° of axis tilt and, per the carry-squared relationship, 30-80+ yards of sideways curve on a full driver."}]}
  </script>


  <script type="application/json" id="lesson-apex">
{"parameter":"Apex","oneLiner":"Apex is the peak height the ball reaches in flight — driven almost entirely by ball speed (which sets a saturating base height) and launch angle (which then scales that height by up to 3x), and it is the number that decides how steeply the shot comes back down.","whatItIs":"Apex is simply the highest point the ball reaches above the ground during its flight, measured in yards (or feet). It happens roughly in the middle-to-back half of the shot's flight, right before the ball starts descending toward the ground. In Flightglass's engine, apex is computed directly from just two numbers — ball speed and launch angle — using apex = apex_max · (1 − e^(−ballSpeed/apex_TAU)) · apexLaunchFactor(launchAngle), where apex_max = 44 yd is a hard ceiling and apex_TAU = 85 mph sets how quickly the curve saturates. That means apex behaves like a saturating (diminishing-returns) function of ball speed — much like carry — but then gets scaled by up to 1.35x or down to 0.45x depending on how steep the launch angle is. A default 7-iron shot (120 mph ball speed, 17.85° launch) computes to about 33.1 yd of apex. Apex is not just a cosmetic number: it directly feeds forward into how steeply the ball lands (landingAngle), which in turn decides how much the ball rolls out after it lands — the physical reason a towering wedge shot stops near the pin while a low, driven shot releases and runs.","components":[{"name":"Ball speed","role":"The base term. Apex follows the same saturating curve as carry — apex = 44 * (1 - e^(-ballSpeed/85)) * launchFactor — so it climbs steeply at low speed and flattens hard at high speed. It is engine-true, computed by solveFlight() from clubSpeed × smashEff.","typicalRange":"7-iron ball ~105-125 mph; driver ~150-185 mph"},{"name":"Launch angle","role":"The multiplier. Feeds an apexLaunchFactor that runs from 0.45x (very low launch) to 1.35x (very high launch) — nearly a 3x swing on its own, bigger than ball speed's realistic range. Launch angle itself = 0.62 × dynamic loft + 0.25 × attack angle (loft-dominant).","typicalRange":"7-iron ~16-19°; driver ~10-15°"},{"name":"Dynamic loft","role":"The bigger of the two raw levers behind launch angle (weight 0.62 vs attack angle's 0.25). Club selection and shaft lean move it directly, which is why loft — not swing effort — is the practical way to raise apex.","typicalRange":"7-iron ~28-32°; driver ~9-13° (modern low-spin fitting)"},{"name":"Attack angle","role":"The smaller launch-angle lever (weight 0.25) but also sets spin loft (with dynamic loft), which nudges ball speed slightly via the smash-factor self-limiter. Hitting up (positive attack) with a driver is the classic way to add launch without adding loft.","typicalRange":"iron -4 to -2° (down); driver 0 to +5° (up)"},{"name":"Spin loft (indirect, via smash factor)","role":"A small secondary channel: bigger spin loft nudges smashEff down (1.46 − 0.004×spinLoft), trimming ball speed a little as spin loft climbs — so apex gets a small negative nudge from the same lever that (physically) creates more lift. A minor self-limiter, not a headline driver.","typicalRange":"iron ~30-35°; driver ~11-15°"},{"name":"Altitude / air density (EST, app layer)","role":"Not modeled inside solveFlight — it's a post-solve multiplier applied in the academy UI, and it is currently the same multiplier used for carry (apexFinal = apex × carryEnvMult). Thinner, warmer, drier air raises apex by the same % it raises carry.","typicalRange":"sea level baseline; Denver (5,280 ft) ~+14% on both carry and apex in the app's model"},{"name":"Backspin (parallel, not a direct input)","role":"Physically, backspin's Magnus lift is the real reason a shot climbs far higher than simple launch-angle geometry predicts — but solveFlight()'s apex formula only reads ballSpeed and launchAngle, never backspin itself. Backspin moves with apex because they share the same upstream levers (spin loft, ball speed), not because one causes the other in the code.","typicalRange":"7-iron ~6,500-7,500 rpm; driver ~2,200-2,900 rpm"}],"howTheyConnect":"Apex is the highest point the ball reaches, and in the engine it is computed from just two upstream numbers: ball speed and launch angle. First, ball speed sets a saturating base height: apex = apex_max · (1 − e^(−ballSpeed/apex_TAU)), the same shape as carry's curve, with apex_max = 44 yd as a ceiling and apex_TAU = 85 mph setting how fast it saturates. At a default 7-iron's 120 mph ball speed this base term is already 33.28 yd — about 76% of the theoretical ceiling — so pushing ball speed higher buys steadily less extra height, exactly like it does for carry but with a lower ceiling and a faster saturation. Second, that base height is then scaled by an apexLaunchFactor derived from launch angle: clamp(0.35 + 0.65·(launchAngle/18), 0.45, 1.35). This is a genuinely large lever — nearly 3x, floor to ceiling — and it is why two shots with identical ball speed can have wildly different apexes depending on how steeply they took off. Launch angle itself is set upstream by dynamic loft and attack angle (0.62·loft + 0.25·attack), so the practical way a user raises apex in the diagram is by adding loft or hitting more upward, not by swinging harder. There is a secondary, indirect channel too: spin loft (dynamic loft − attack angle) nudges the smash factor down as it rises, trimming ball speed a little — the same lever that, physically, creates backspin actually reaches apex through this small ball-speed discount, not through backspin itself. That is the model's most important nuance: solveFlight()'s apex formula never reads the backspin number. Backspin and apex are computed in parallel from the same root levers; they move together in practice (both track spin loft and ball speed) but one does not compute the other in code, even though in the real world backspin's Magnus lift is exactly what makes real apex so much higher than a simple ballistic (no-lift) trajectory would predict — an idealized driver launch reaches only ~11 yd without lift, versus ~32 yd for a real tour driver. Finally, apex feeds forward into landing angle: landingApexTerm = (apex − 30) · 1.0 is a direct, roughly one-degree-per-yard term in the landingAngle formula, so a taller flight is computed to also descend more steeply — the physically correct link between hang time and descent angle. In the academy UI (not inside solveFlight itself), altitude/wind/temperature/humidity apply one shared EST multiplier, apexFinal = f.apex × carryEnvMult, that is identical to the multiplier already used for carry — thinner or warmer air lifts both by the same percentage in this simplified model.","hierarchy":[{"driver":"Ball speed","weight":"Dominant base term but strongly saturating — over the 106→146 mph ball-speed range used in the Carry lesson's own sweep, apex only grows 31.2→35.9 yd (+15%), while carry grows 148.8→211.6 yd (+42%) over the identical range.","why":"apex = 44·(1−e^(−ballSpeed/85))·launchFactor is a saturating exponential; by ~120 mph ball speed it has already used ~76% of its 44-yd ceiling, so extra speed buys only diminishing height even though it keeps buying carry."},{"driver":"Launch angle (via apexLaunchFactor)","weight":"The single biggest relative lever — isolated at a fixed 120 mph ball speed, apexLaunchFactor's 0.45x floor to 1.35x ceiling swings apex from 14.98 yd to 44.93 yd, roughly a 3x range.","why":"Unlike ball speed's saturating curve, the launch-angle multiplier is linear in launch angle (clamped 0.45–1.35) and applies after the ball-speed term, so it rescales the whole result — a low, driven trajectory and a high, floating one can share the same ball speed and still differ by 3x in apex."},{"driver":"Dynamic loft & attack angle (the raw levers behind launch angle)","weight":"Dynamic loft carries roughly 2.5x the weight of attack angle in setting launch angle (0.62 vs 0.25), so it is the practical dial — a few degrees of loft moves apex noticeab
