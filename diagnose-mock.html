<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#07060C" />
<meta name="robots" content="noindex" />
<title>DIAGNOSE MOCK — The coach interview</title>
<!-- ═════════════════════════════════════════════════════════════════════
     diagnose-mock.html — DESIGN MOCK, NOT SHIPPED (the -mock.html suffix
     keeps it out of scripts/copy-web.mjs's native allowlist). REBUILT v2.
     Specs: docs/diagnose-spec-v2.md (delta) over docs/diagnose-spec.md (v1).
     Physics ground truth: docs/diagnose-harness-v2-findings.md + diagnose-map-v2.json.
     The user answers a coach's anamnesis — club · speed · shape · height ·
     distance · (contact if way short) · divot — the engine reweights clusters
     in place (never duplicating maps), reconstructs the delivery, and replays
     it in ember over the user's cold-violet memory sketch AT THEIR SPEED. The
     ONE thing (v1 §10) is untouched: the ember reveal over the violet sketch.
     Imports ./diagnose-engine-v2.js (imports ./impact-flight.js DIRECTLY —
     byte-identical) + ./sa-haptics.js. P3 tokens + shell from ./sa-p3.css.
     ═════════════════════════════════════════════════════════════════════ -->
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2052%2052'%20fill='none'%3E%3Cpath%20d='M11%2045%20C%2016%2026,%2024%2018,%2035%2015%20M21%2039%20L%2030%2024%20L%2043%2045'%20stroke='%239D8BFF'%20stroke-width='4.2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3Ccircle%20cx='37'%20cy='15'%20r='5.2'%20fill='%23FF8A4D'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="./sa-p3.css" />
<style>
  @view-transition{ navigation:auto; }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:var(--scene-bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden;
    font-variant-numeric:tabular-nums;
  }

  /* ══ APP FRAME — question rail (left) drives a live scene (right) ══════ */
  .app{
    position:fixed; inset:0;
    padding-top:calc(40px + env(safe-area-inset-top));
    display:flex; flex-direction:row;
    overflow:hidden;
  }
  .rail{
    flex:0 0 300px; min-width:264px; max-width:300px;
    height:100%;
    display:flex; flex-direction:column;
    border-right:1px solid var(--line);
    background:linear-gradient(180deg, rgba(17,13,28,.42), rgba(7,6,12,.10));
  }
  .railBody{
    flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:12px; padding-left:max(12px,env(safe-area-inset-left));
    padding-bottom:calc(12px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:12px;
  }
  .scene{
    flex:1 1 auto; position:relative; overflow:hidden; min-width:0;
    background:
      linear-gradient(rgba(7,6,12,.20), rgba(7,6,12,.44)),
      url(./assets/range-night-3d-33.png) center bottom / cover no-repeat,
      var(--scene-bg);
  }
  .scene canvas#sceneCanvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ══ SUMMARY CHIP ROW (answered descriptors — dock pattern) ═══════════ */
  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .schip{
    position:relative; display:inline-flex; align-items:center; gap:6px;
    min-height:32px; padding:0 11px; border-radius:var(--radius-pill);
    background:var(--secondary-soft); border:1px solid var(--secondary-line);
    color:var(--ink); font:600 12px/1 inherit; cursor:pointer;
  }
  .schip::after{ content:""; position:absolute; left:0; right:0; top:50%; height:44px; transform:translateY(-50%); }
  .schip .ed{ color:var(--muted); font-size:11px; }
  .schip.pulse{ animation:pulse .5s var(--ease); }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 var(--secondary-line);} 50%{ box-shadow:0 0 0 4px var(--secondary-soft);} 100%{ box-shadow:0 0 0 0 transparent;} }

  /* ══ QUESTION BLOCK (only one ever expanded) ══════════════════════════ */
  .qblock{ display:flex; flex-direction:column; gap:8px; }
  .eyebrow{ font:600 11px/1.2 inherit; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .qtitle{ font:700 15px/1.3 inherit; color:var(--ink); margin:0; }
  h1.sa-strip__title{ margin:0; }   /* heading semantics; sa-p3.css owns the look (read-only) */
  .qhint{ font:400 11px/1.45 inherit; color:var(--muted); }
  .qhint b{ color:var(--secondary); font-weight:600; }
  .qrow{ display:flex; flex-wrap:wrap; gap:8px; }

  /* option chips (radiogroup) — 36px visual + 44px hit pad */
  .chip{
    position:relative; display:inline-flex; align-items:center; justify-content:center;
    min-height:36px; padding:0 13px; border-radius:var(--radius-pill);
    background:var(--secondary-soft); border:1px solid var(--secondary-line);
    color:var(--ink); font:600 13px/1 inherit; cursor:pointer; white-space:nowrap;
    transition:background .12s var(--ease), border-color .12s var(--ease);
  }
  .chip::after{ content:""; position:absolute; left:0; right:0; top:50%; height:44px; transform:translateY(-50%); }
  .chip[aria-checked="true"]{ background:var(--secondary); color:#0b0913; border-color:var(--secondary); }
  .chip .sub{ font-weight:500; opacity:.8; margin-left:4px; }
  .chip.glyphchip{ gap:7px; padding-left:10px; }
  .chip.glyphchip svg{ width:18px; height:18px; flex:0 0 auto; }
  .chip[aria-checked="true"] svg *{ stroke:#0b0913 !important; }

  /* speed = stacked radio cards (chip label + curious-golfer anchor copy) */
  .speedlist{ display:flex; flex-direction:column; gap:8px; }
  .speedopt{
    position:relative; display:flex; flex-direction:column; gap:3px; text-align:left;
    min-height:44px; padding:9px 12px; border-radius:14px; cursor:pointer;
    background:var(--secondary-soft); border:1px solid var(--secondary-line); color:var(--ink);
    transition:background .12s var(--ease), border-color .12s var(--ease);
  }
  .speedopt .sl-label{ font:700 13px/1.2 inherit; }
  .speedopt .sl-anchor{ font:400 11px/1.4 inherit; color:var(--muted); }
  .speedopt[aria-checked="true"]{ background:var(--secondary); border-color:var(--secondary); color:#0b0913; }
  .speedopt[aria-checked="true"] .sl-anchor{ color:rgba(11,9,19,.8); }

  /* the 3×3 flight picker */
  .picker{ display:grid; grid-template-columns:repeat(3,72px); gap:8px; }
  .phead{ display:grid; grid-template-columns:repeat(3,72px); gap:8px; font:600 10px/1 inherit; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  .phead span{ text-align:center; }
  .tile{
    position:relative; width:72px; height:72px; border-radius:12px;
    background:var(--secondary-soft); border:1px solid var(--line); cursor:pointer; padding:0;
    transition:border-color .12s var(--ease), box-shadow .12s var(--ease);
  }
  .tile svg{ width:100%; height:100%; display:block; }
  .tile[aria-checked="true"]{ border-color:var(--secondary); box-shadow:inset 0 0 0 1px var(--secondary), 0 0 0 1px var(--secondary); }
  .footnote{ font:400 10px/1.4 inherit; color:var(--muted); }

  /* driver honesty strip — real text, 11px muted (spec v2 §1, non-negotiable) */
  .honeststrip{ font:400 11px/1.5 inherit; color:var(--muted); }

  /* ══ RECONSTRUCTING BEAT ══════════════════════════════════════════════ */
  .beat{ padding:14px; border-radius:16px; background:var(--plate); border:1px solid var(--line); color:var(--muted); font:500 13px/1.4 inherit; }

  /* ══ RESULTS ══════════════════════════════════════════════════════════ */
  /* focusable results region — after each reveal/refine, focus lands here so
     keyboard & SR users don't have to Tab from the top (a11y focus mgmt). It is
     only ever focused programmatically (tabindex=-1, not Tab-reachable), so no
     visible ring is needed; layout matches the rail's own flex column. */
  .results{ display:flex; flex-direction:column; gap:12px; width:100%; }
  .results:focus{ outline:none; }
  .miss:focus{ outline:none; }
  .wink{ font:500 12px/1.45 inherit; color:var(--secondary); }
  .stories{ list-style:none; display:flex; flex-direction:column; gap:10px; padding:0; margin:0; }
  .card{ background:var(--plate); border:1px solid var(--line); border-radius:16px; padding:13px; -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); }
  .card.compact{ padding:11px; }
  .cardhead{ display:flex; gap:10px; align-items:flex-start; }
  .cardhead .glyphwrap{ flex:0 0 auto; }
  .cardhead .txt{ flex:1 1 auto; min-width:0; }
  .cardeye{ font:600 11px/1.2 inherit; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  .cardeye .emb{ color:var(--accent); }
  .cardeye .refined{ color:var(--secondary); }
  .ctitle{ font:700 15px/1.3 inherit; color:var(--ink); margin-top:3px; }
  /* coach story line — the dynamic-loft→spin-loft chain, spoken by the physics */
  .coach{ font:500 13px/1.5 inherit; color:var(--ink); margin-top:6px; }
  .coach .sl{ font-weight:700; }
  .cbody{ font:400 13px/1.5 inherit; color:var(--ink); margin-top:7px; }
  .term{ color:var(--secondary); background:none; border:0; padding:0; margin:0; font:inherit; cursor:pointer; border-bottom:1px dotted var(--secondary-line); }
  .termdef{ display:block; font:400 12px/1.4 inherit; color:var(--muted); margin-top:5px; padding-left:10px; border-left:2px solid var(--secondary-soft); }
  .termdef[hidden]{ display:none; }

  .variants{ margin-top:10px; display:flex; flex-direction:column; gap:6px; }
  .variant{ display:flex; align-items:center; gap:8px; font:500 12px/1.3 inherit; color:var(--ink); }
  .vtrack{ flex:0 0 56px; height:6px; border-radius:3px; background:var(--secondary-soft); overflow:hidden; }
  .vbar{ height:100%; background:var(--secondary); border-radius:3px; transition:width .32s var(--ease); }
  .vpct{ flex:0 0 auto; color:var(--muted); font-size:11px; }

  /* teaching moment — quiet muted paragraph, never a warning banner (spec v2 §2) */
  .teach{ font:400 12px/1.5 inherit; color:var(--muted); margin-top:10px; padding-top:10px; border-top:1px solid var(--line); }

  /* ══ v3 VALUES — insight lines (spec §3.1 anatomy) ════════════════════ */
  /* every inserted value is mono + tabular; outcome values (m/%/°) ride the
     lane ember (--accent) the page already owns — colour only, never a glow
     (ember budget ≤3 at rest is untouched). Delivery-param values keep their
     param token colours exactly as the readout strip does. */
  .vnum{ font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; white-space:nowrap;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-weight:700; }
  .v-accent{ color:var(--accent); }
  .v-muted{ color:var(--muted); }
  .v-face{ color:var(--face); } .v-path{ color:var(--path); }
  .v-attack{ color:var(--attack); } .v-loft{ color:var(--loft); }

  /* THE COST LINE (§3.1 slot 4) — certain-conditional register, 13px, directly
     under the coach story; inherits the card's ranked hedging from the eyebrow. */
  .costline{ font:500 13px/1.5 inherit; color:var(--ink); margin-top:8px; }
  /* THE HALF-GAP LINE (§3.1 slot 5) — 12px muted forecast, IF · mono micro-label */
  .halfgap{ font:400 12px/1.5 inherit; color:var(--muted); margin-top:6px; }
  .halfgap .iflabel{ font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:10px; font-weight:700; letter-spacing:.08em; color:var(--muted); margin-right:5px; }
  /* rpm texture (§1.3, alot band only) — one muted line, never a second paragraph */
  .rpmtex{ font:400 12px/1.5 inherit; color:var(--muted); margin-top:5px; }

  /* the Pro moment (§3.5) — "See both flights side by side" ghost-compare CTA,
     under the cost line. Gating stub only (no paywall wiring this run). */
  .procta{
    position:relative; display:inline-flex; align-items:center; gap:7px; min-height:36px;
    margin-top:9px; padding:2px 0; background:none; border:0;
    color:var(--accent); font:600 12px/1.2 inherit; cursor:pointer; text-decoration:none;
  }
  .procta::after{ content:""; position:absolute; left:0; right:0; top:50%; height:44px; transform:translateY(-50%); }
  .procta .probadge{
    font:700 10px/1 inherit; letter-spacing:.1em; padding:3px 5px; border-radius:5px;
    background:var(--accent-line); color:var(--accent); border:1px solid var(--accent-line);
  }

  /* tour benchmark row (§1.4 / §3.1 slot 7) — quiet static bench, above the CTA.
     Replaces the BANNED grid-quantile "norm"; labelled TOUR, never personalized. */
  .tourrow{ font:400 11px/1.5 inherit; color:var(--muted); margin-top:11px; padding-top:9px; border-top:1px solid var(--line); }
  .tourrow .tourlabel{ font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-size:10px; font-weight:700; letter-spacing:.1em; color:var(--muted); margin-right:6px; }
  /* contact-card carry-delta evidence line (§3.2 way-short → cost line's small Δ) */
  .conttextnum{ font-variant-numeric:tabular-nums; font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-weight:700; color:var(--accent); }

  /* ══ SHARPEN-ROW (post-reveal refiners, spec v2 §3) ═══════════════════ */
  .sharpen{ margin-top:12px; padding-top:11px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:9px; }
  .refiner{ display:flex; flex-direction:column; gap:8px; }
  .rf-toggle{
    position:relative; display:flex; align-items:center; justify-content:space-between; gap:8px;
    min-height:40px; padding:0 12px; border-radius:12px; cursor:pointer; text-align:left;
    background:var(--secondary-soft); border:1px solid var(--secondary-line); color:var(--ink); font:600 13px/1.2 inherit;
  }
  .rf-toggle .rf-caret{ color:var(--muted); font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; }
  .rf-body{ display:flex; flex-direction:column; gap:8px; padding-left:2px; }
  .rf-body[hidden]{ display:none; }
  .rf-why{ font:400 11px/1.45 inherit; color:var(--muted); }

  /* carry detent slider — 44px thumb, arrow-key parity native to <input range> */
  .carrywrap{ display:flex; flex-direction:column; gap:8px; }
  .carryval{ font:600 13px/1 inherit; color:var(--ink); }
  .carryval b{ color:var(--secondary); }
  input[type="range"].carry{
    -webkit-appearance:none; appearance:none; width:100%; height:44px; background:transparent; cursor:pointer; margin:0;
  }
  input[type="range"].carry::-webkit-slider-runnable-track{ height:6px; border-radius:3px; background:var(--secondary-soft); border:1px solid var(--secondary-line); }
  input[type="range"].carry::-moz-range-track{ height:6px; border-radius:3px; background:var(--secondary-soft); border:1px solid var(--secondary-line); }
  input[type="range"].carry::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:22px; height:22px; margin-top:-9px; border-radius:50%; background:var(--secondary); border:3px solid #0b0913; box-shadow:0 0 0 1px var(--secondary); }
  input[type="range"].carry::-moz-range-thumb{ width:22px; height:22px; border-radius:50%; background:var(--secondary); border:3px solid #0b0913; box-shadow:0 0 0 1px var(--secondary); }

  .cta{
    position:relative; display:inline-flex; align-items:center; justify-content:center;
    min-height:44px; margin-top:12px; padding:0 16px; border-radius:12px;
    background:var(--plate); border:1px solid var(--accent-line); color:var(--accent);
    font:700 14px/1 inherit; cursor:pointer; text-decoration:none; align-self:stretch; text-align:center;
  }
  .cta-sub{ font:400 11px/1.4 inherit; color:var(--muted); margin-top:6px; }
  .qcta{
    position:relative; display:inline-flex; align-items:center; min-height:36px; margin-top:8px;
    background:none; border:0; padding:2px 0; color:var(--accent); font:600 12px/1 inherit; cursor:pointer; text-decoration:none;
  }
  .qcta::after{ content:""; position:absolute; left:0; right:0; top:50%; height:44px; transform:translateY(-50%); }

  .honesty{ font:400 12px/1.5 inherit; color:var(--muted); }
  .honesty b{ color:var(--ink); font-weight:600; }

  /* contact card — separate model, never blended */
  .contactcard{ background:var(--plate); border:1px dashed var(--secondary-line); border-radius:16px; padding:13px; }
  .contactcard .cardeye{ color:var(--secondary); }

  .miss{ background:var(--plate); border:1px solid var(--line); border-radius:16px; padding:13px; display:flex; flex-direction:column; gap:9px; }
  .miss .mtitle{ font:700 14px/1.3 inherit; color:var(--ink); }
  .miss .mbody{ font:400 12px/1.45 inherit; color:var(--muted); }
  .miss .mbody b{ color:var(--ink); font-weight:600; }

  .textbtn{
    position:relative; background:none; border:0; padding:4px 0; color:var(--secondary);
    font:600 12px/1 inherit; cursor:pointer; align-self:flex-start; text-decoration:underline; text-underline-offset:3px;
  }
  .textbtn::after{ content:""; position:absolute; left:0; right:0; top:50%; height:44px; transform:translateY(-50%); }

  .errbox{ background:var(--plate); border:1px solid var(--bad); border-radius:16px; padding:13px; display:flex; flex-direction:column; gap:9px; color:var(--ink); font:400 13px/1.4 inherit; }

  /* ══ SCENE OVERLAYS ═══════════════════════════════════════════════════ */
  .scene-ghost{
    position:absolute; left:50%; top:46%; transform:translate(-50%,-50%);
    font:500 13px/1.4 inherit; color:var(--muted); text-align:center; pointer-events:none;
  }
  .sideinset{
    position:absolute; right:12px; bottom:12px; width:172px; height:84px;
    padding:6px 8px; overflow:hidden;
  }
  .sideinset .slabel{ position:absolute; left:8px; top:5px; font:600 10px/1 inherit; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  .sideinset canvas{ position:absolute; inset:0; width:100%; height:100%; }
  .readout{
    position:absolute; left:12px; bottom:12px; max-width:calc(100% - 200px);
    display:flex; flex-wrap:wrap; gap:6px;
  }
  .pchip{
    display:inline-flex; align-items:center; gap:5px; padding:4px 9px; border-radius:var(--radius-pill);
    background:var(--plate); border:1px solid var(--line); font:600 11px/1 inherit; color:var(--ink);
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
  }
  .pchip b{ color:var(--muted); font-weight:600; letter-spacing:.04em; }
  .pdot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }

  .vh{ position:absolute !important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  /* ══ PORTRAIT FALLBACK (web only — the app is landscape-locked) ═══════ */
  @media (orientation:portrait){
    .app{ flex-direction:column; }
    .scene{ flex:0 0 40vh; order:1; width:100%; border-bottom:1px solid var(--line); }
    .rail{ flex:1 1 auto; order:2; max-width:none; min-width:0; width:100%; border-right:0; }
    .readout{ max-width:calc(100% - 24px); }
    .sideinset{ width:132px; height:66px; }
  }
</style>
</head>
<body class="sa-depth">
  <div class="sa-strip">
    <a class="sa-strip__home" href="./home-mock.html" aria-label="Home">
      <svg viewBox="0 0 52 52" fill="none" aria-hidden="true">
        <path class="sa-arc" d="M11 45 C 16 26, 24 18, 35 15 M21 39 L 30 24 L 43 45" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle class="sa-ball" cx="37" cy="15" r="5.2"/>
      </svg>
    </a>
    <h1 class="sa-strip__title">DIAGNOSE</h1>
    <span class="sa-strip__spacer"></span>
  </div>

  <div class="app">
    <div class="rail">
      <div class="railBody" id="railBody"></div>
    </div>
    <div class="scene" id="scene">
      <canvas id="sceneCanvas" aria-hidden="true"></canvas>
      <div class="scene-ghost" id="sceneGhost">Pick your club to begin</div>
      <div class="readout" id="readout" hidden></div>
      <div class="sideinset sa-plate" id="sideInset" hidden>
        <span class="slabel">Side profile</span>
        <canvas id="sideCanvas" aria-hidden="true"></canvas>
      </div>
    </div>
  </div>

  <!-- one polite live region (visually hidden), throttled ≥800ms -->
  <p id="saLive" class="vh" aria-live="polite" role="status"></p>
  <!-- scene text alternative (visually hidden, NOT aria-hidden) -->
  <p id="sceneAlt" class="vh"></p>

<script type="module">
import haptics from './sa-haptics.js';
import * as DX from './diagnose-engine-v2.js';

const Y2M = 0.9144;
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const wait = ms => new Promise(r => setTimeout(r, ms));
const DEV = /[?&]dev=1\b/.test(location.search);

/* ── DOM ─────────────────────────────────────────────────────────────── */
const railBody   = document.getElementById('railBody');
const sceneEl    = document.getElementById('scene');
const sceneGhost = document.getElementById('sceneGhost');
const readoutEl  = document.getElementById('readout');
const sideInset  = document.getElementById('sideInset');
const liveEl     = document.getElementById('saLive');
const sceneAlt   = document.getElementById('sceneAlt');
const sceneCanvas= document.getElementById('sceneCanvas');
const sideCanvas = document.getElementById('sideCanvas');

/* ── state (v2 machine: S0 CLUB → S1 SPEED → S2 SHAPE → S3 HEIGHT →
      S4 DISTANCE [→S4b CONTACT if way short] → S5 DIVOT → REVEAL) ──────── */
const state = {
  club:null, speed:null,
  startLine:null, curveDir:null, curve:null,
  height:null, distance:null,
  contact:null, contactSource:null,       // 's4b' | 'sharpen'
  divot:null,
  // sharpen refiners (post-reveal)
  secondary:null, carry:null,
  active:'club', phase:'input', hasResults:false, _reopen:false,
};
let MAP = null;

/* trace state (module-scope so canvas redraws share it) */
let sketchPts=null, sketchAbs=null;
let emberSamples=null, emberAbs=null, emberProgress=0;
let currentEntry=null, currentCon=null, currentBase=null, currentDesc=null, sceneDimAmt=0;
let lastRefinedBy=null;

/* ── club helpers (per-club bands, never free-typed) ─────────────────── */
function CM(){ return MAP ? DX.clubMap(MAP, state.club || '7iron') : null; }
function BANDS(){ const cm=CM(); return cm ? cm.meta.bands : null; }
function clubLabel(club){ return MAP ? DX.clubMap(MAP, club).meta.label : (club==='driver'?'Driver':'7-iron'); }
function carryTrusted(){ const b=BANDS(); return !b || b.speed.absoluteCarryTrusted !== false; }

/* ── vocab / display maps ────────────────────────────────────────────── */
const DIST_DISPLAY = { 'Long (gained distance)':'Longer', 'Full (normal distance)':'Normal distance', 'Slight loss':'A bit short', 'Noticeable loss':'Way short' };
const DIST_UIWORD  = ['Longer','Normal','A bit short','Way short'];
const START_WORD  = { Left:'Starts left', Straight:'Starts straight', Right:'Starts right' };
const HEIGHT_WORD = { Low:'Low flight', Normal:'Normal height', High:'High flight', Ballooned:'Ballooned' };
const CURVE_WORD  = { Straight:'Straight', Draw:'Draw', Hook:'Hook', Fade:'Fade', Slice:'Slice' };
const SPEED_LABEL = { slow:'Gentle', mid:'Mid', fast:'Fast', unsure:'Not sure' };

const PICKER_LABELS = {
  '0,0':'Starts left, keeps curving left',  '0,1':'Starts left, flies straight',   '0,2':'Starts left, curves back right',
  '1,0':'Starts straight, curves left',     '1,1':'Dead straight',                 '1,2':'Starts straight, curves right',
  '2,0':'Starts right, curves back left',   '2,1':'Starts right, flies straight',  '2,2':'Starts right, keeps curving right',
};
const START_BY_COL = ['Left','Straight','Right'];
const DIR_BY_ROW = ['left','straight','right'];

function curveDirFromCurve(c){ return (c==='Slice'||c==='Fade')?'right' : (c==='Hook'||c==='Draw')?'left' : 'straight'; }
function provisionalCurve(){ return state.curveDir==='left' ? 'Draw' : state.curveDir==='right' ? 'Fade' : 'Straight'; }
function descriptor(){
  return {
    curve: state.curve || provisionalCurve(),
    startLine: state.startLine || 'Straight',
    height: state.height || 'Normal',
    distanceLoss: state.distance || 'Full (normal distance)',
  };
}
function isWayShort(){ return state.distance === 'Noticeable loss'; }
function isStartStraight(){ return state.startLine === 'Straight'; }
function descriptorComplete(){ return !!(state.startLine && state.curve && state.height && state.distance); }

/* ── live region (throttled ≥800ms) ──────────────────────────────────── */
let lastAnnounce = -Infinity, pendingT = null;
function announce(msg){
  const now = performance.now(), gap = now - lastAnnounce;
  if (gap >= 800){ liveEl.textContent = msg; lastAnnounce = now; }
  else { clearTimeout(pendingT); pendingT = setTimeout(()=>{ liveEl.textContent = msg; lastAnnounce = performance.now(); }, 800 - gap); }
}
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ══ CANVAS ═══════════════════════════════════════════════════════════ */
function fit(canvas){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== Math.round(w*dpr) || canvas.height !== Math.round(h*dpr)){
    canvas.width = Math.round(w*dpr); canvas.height = Math.round(h*dpr);
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return { ctx, w, h };
}
function sceneScale(){
  let maxD = 40, maxLat = 15;
  const scan = (pts, abs) => { if(!pts) return; for(const p of pts){ maxD = Math.max(maxD, abs.carryM*p.d); maxLat = Math.max(maxLat, Math.abs(abs.offlineM*p.x)); } };
  scan(sketchPts, sketchAbs); scan(emberSamples, emberAbs);
  return { maxD: maxD*1.15, maxLat: maxLat*1.15 };
}
function drawPathTop(ctx, pts, abs, toXY, o){
  ctx.save();
  if (o.glow){ ctx.shadowColor='rgba(255,138,77,.35)'; ctx.shadowBlur=8; }
  ctx.strokeStyle=o.color; ctx.lineWidth=o.width; ctx.lineJoin='round'; ctx.lineCap='round';
  if (o.dash) ctx.setLineDash(o.dash);
  ctx.beginPath();
  const prog = o.progress==null ? 1 : o.progress;
  let started=false;
  for (const p of pts){
    if (p.d > prog + 1e-9) break;
    const [x,y] = toXY(abs.carryM*p.d, abs.offlineM*p.x);
    if (!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
  }
  ctx.stroke(); ctx.restore();
}
function markX(ctx,x,y,color){ ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x-4,y-4); ctx.lineTo(x+4,y+4); ctx.moveTo(x+4,y-4); ctx.lineTo(x-4,y+4); ctx.stroke(); ctx.restore(); }

function drawTopDown(){
  const { ctx, w, h } = fit(sceneCanvas);
  ctx.clearRect(0,0,w,h);
  if (sceneDimAmt>0){ ctx.save(); ctx.fillStyle=`rgba(7,6,12,${sceneDimAmt})`; ctx.fillRect(0,0,w,h); ctx.restore(); }
  const { maxD, maxLat } = sceneScale();
  const padTop=26, padBottom=26, padSide=30;
  const groundY=h-padBottom, usableH=groundY-padTop, cx=w/2, halfW=w/2-padSide;
  const toXY=(dM,lM)=>[cx+(lM/maxLat)*halfW, groundY-(dM/maxD)*usableH];

  // range depth rings. Absolute metre LABELS only when the club's carry is
  // trusted (7-iron). Driver: rings stay for depth, but NO absolute yardage is
  // ever printed (absoluteCarryTrusted=false — the honesty law).
  const labelRings = carryTrusted();
  ctx.font='9px -apple-system,sans-serif'; ctx.textBaseline='alphabetic';
  for (let m=25; m<=maxD; m+=25){
    const y=groundY-(m/maxD)*usableH;
    ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(padSide,y); ctx.lineTo(w-padSide,y); ctx.stroke();
    if (labelRings){ ctx.fillStyle='rgba(167,159,199,.45)'; ctx.fillText(m+' m', 6, y-2); }
  }
  ctx.strokeStyle='rgba(157,139,255,.30)'; ctx.lineWidth=1.5; ctx.setLineDash([4,5]);
  ctx.beginPath(); ctx.moveTo(cx,groundY); ctx.lineTo(cx,padTop); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#F5F2FF'; ctx.beginPath(); ctx.arc(cx,groundY,3,0,7); ctx.fill();

  if (sketchPts){
    drawPathTop(ctx, sketchPts, sketchAbs, toXY, { color:'rgba(157,139,255,.78)', width:2, dash:[5,4] });
    const [lx,ly]=toXY(sketchAbs.carryM, sketchAbs.offlineM);
    markX(ctx,lx,ly,'rgba(157,139,255,.9)');
    ctx.fillStyle='rgba(167,159,199,.85)'; ctx.font='9px -apple-system,sans-serif'; ctx.fillText('AS DESCRIBED', lx+7, ly+3);
  }
  if (emberSamples && emberProgress>0){
    drawPathTop(ctx, emberSamples, emberAbs, toXY, { color:'#FF8A4D', width:3, glow:true, progress:emberProgress });
    if (emberProgress>=0.999){
      const [ex,ey]=toXY(emberAbs.carryM, emberAbs.offlineM);
      ctx.save(); ctx.shadowColor='rgba(255,138,77,.5)'; ctx.shadowBlur=8; ctx.fillStyle='#FF8A4D';
      ctx.beginPath(); ctx.arc(ex,ey,4,0,7); ctx.fill(); ctx.restore();
    }
  }
}
function drawSide(){
  if (sideInset.hidden) return;
  const { ctx, w, h } = fit(sideCanvas);
  ctx.clearRect(0,0,w,h);
  const { maxD } = sceneScale();
  let maxApex=20; if(sketchAbs) maxApex=Math.max(maxApex,sketchAbs.apexM); if(emberAbs) maxApex=Math.max(maxApex,emberAbs.apexM);
  maxApex*=1.2;
  const padL=8, padR=8, padT=18, padB=10;
  const ground=h-padB, usableH=ground-padT, usableW=w-padL-padR;
  const toXY=(dM,htM)=>[padL+(dM/maxD)*usableW, ground-(htM/maxApex)*usableH];
  ctx.strokeStyle='rgba(255,255,255,.10)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(padL,ground); ctx.lineTo(w-padR,ground); ctx.stroke();
  const sidePath=(pts,abs,o)=>{
    ctx.save(); if(o.glow){ctx.shadowColor='rgba(255,138,77,.35)';ctx.shadowBlur=6;}
    ctx.strokeStyle=o.color; ctx.lineWidth=o.width; ctx.lineJoin='round'; ctx.lineCap='round'; if(o.dash)ctx.setLineDash(o.dash);
    ctx.beginPath(); const prog=o.progress==null?1:o.progress; let started=false;
    for(const p of pts){ if(p.d>prog+1e-9) break; const [x,y]=toXY(abs.carryM*p.d, abs.apexM*p.h); if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);} ctx.stroke(); ctx.restore();
  };
  if (sketchPts) sidePath(sketchPts, sketchAbs, { color:'rgba(157,139,255,.78)', width:2, dash:[4,4] });
  if (emberSamples && emberProgress>0) sidePath(emberSamples, emberAbs, { color:'#FF8A4D', width:2.5, glow:true, progress:emberProgress });
}
function drawAll(){ drawTopDown(); drawSide(); }

/* ══ SKETCH (violet — the user's memory, engine-independent, club-scaled) ═ */
function updateSketch(){
  const d = descriptor();
  sketchPts = DX.sketchTrace(d, state.club || '7iron');
  sketchAbs = { carryM:sketchPts.carryM, apexM:sketchPts.apexM, offlineM:sketchPts.offlineM };
  sceneGhost.hidden = true;
  sideInset.hidden = false;
  sceneAlt.textContent = sceneAltText(d);
  drawAll();
}
function sceneAltText(d){
  const start = { Left:'starts left', Straight:'starts straight', Right:'starts right' }[d.startLine];
  const curve = { Slice:'curves hard right', Fade:'curves gently right', Draw:'curves gently left', Hook:'curves hard left', Straight:'flies straight' }[d.curve];
  const ht    = { Low:'low', Normal:'normal height', High:'high', Ballooned:'ballooned high' }[d.height];
  const dist  = (DIST_DISPLAY[d.distanceLoss]||'').toLowerCase();
  return `Your described shot with the ${clubLabel(state.club)}: ${start}, ${curve}, ${ht}, ${dist}.`;
}

/* ══ RENDER: helpers ══════════════════════════════════════════════════ */
function mk(tag, cls, html, isHTML){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null){ if(isHTML||/[<&]/.test(html)) e.innerHTML=html; else e.textContent=html; } return e; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function wrapLi(node){ const li=document.createElement('li'); li.appendChild(node); return li; }

/* summary chips (now include club + speed — v2 §5) */
function chipRow(){
  const chips = [];
  if (state.club)  chips.push({ dim:'club',  label:clubLabel(state.club) });
  if (state.speed) chips.push({ dim:'speed', label:`${SPEED_LABEL[state.speed]} speed` });
  if (state.startLine && state.curve) chips.push({ dim:'shape', label:`${START_WORD[state.startLine]} · ${CURVE_WORD[state.curve]}` });
  if (state.height)   chips.push({ dim:'height', label:HEIGHT_WORD[state.height] });
  if (state.distance) chips.push({ dim:'distance', label:DIST_DISPLAY[state.distance] });
  if (state.contact && state.contactSource==='s4b' && state.contact!=='skip') chips.push({ dim:'contact', label:contactWord(state.contact) });
  return chips.filter(c => c.dim !== state.active);
}
function contactWord(c){ return (c==='Not sure'||c==='unsure') ? 'Contact: not sure' : `Contact: ${c.toLowerCase()}`; }
function renderChips(host){
  const chips = chipRow();
  if (!chips.length) return;
  const wrap = document.createElement('div'); wrap.className='chips'; wrap.setAttribute('role','group'); wrap.setAttribute('aria-label','Your description so far — tap to change');
  const pulseDim = state._pulseDim; state._pulseDim = null;   // consume the one-shot pulse flag
  for (const c of chips){
    const b=document.createElement('button'); b.type='button'; b.className='schip sa-focus'; b.dataset.dim=c.dim;
    b.innerHTML = `${esc(c.label)} <span class="ed" aria-hidden="true">edit</span>`;
    b.setAttribute('aria-label', `${c.label}. Edit`);
    b.addEventListener('click', ()=> openQuestion(c.dim));
    if (pulseDim===c.dim){ b.classList.add('pulse'); }
    wrap.appendChild(b);
  }
  host.appendChild(wrap);
}

/* generic 1-D radiogroup of chips */
function radiogroup(label, options, checkedVal, onSelect){
  const grp=document.createElement('div'); grp.className='qrow'; grp.setAttribute('role','radiogroup'); grp.setAttribute('aria-label',label);
  const radios=[];
  options.forEach((o,i)=>{
    const el=document.createElement('button'); el.type='button'; el.className='chip sa-focus'+(o.cls?' '+o.cls:''); el.setAttribute('role','radio');
    const checked = o.value===checkedVal;
    el.setAttribute('aria-checked', checked?'true':'false');
    el.tabIndex = (checkedVal==null ? i===0 : checked) ? 0 : -1;
    el.innerHTML = o.html || esc(o.label);
    if (o.aria) el.setAttribute('aria-label', o.aria);
    el.addEventListener('click', ()=> onSelect(o.value, el));
    el.addEventListener('keydown', e=> radioKey(e, radios, i, onSelect, options));
    radios.push(el); grp.appendChild(el);
  });
  return grp;
}
/* radiogroup rendered as stacked cards (speed anchors) */
function radioCards(label, options, checkedVal, onSelect){
  const grp=document.createElement('div'); grp.className='speedlist'; grp.setAttribute('role','radiogroup'); grp.setAttribute('aria-label',label);
  const radios=[];
  options.forEach((o,i)=>{
    const el=document.createElement('button'); el.type='button'; el.className='speedopt sa-focus'; el.setAttribute('role','radio');
    const checked = o.value===checkedVal;
    el.setAttribute('aria-checked', checked?'true':'false');
    el.tabIndex = (checkedVal==null ? i===0 : checked) ? 0 : -1;
    el.innerHTML = `<span class="sl-label">${esc(o.label)}</span><span class="sl-anchor">${esc(o.anchor)}</span>`;
    el.setAttribute('aria-label', `${o.label}. ${o.anchor}`);
    el.addEventListener('click', ()=> onSelect(o.value, el));
    el.addEventListener('keydown', e=> radioKey(e, radios, i, onSelect, options));
    radios.push(el); grp.appendChild(el);
  });
  return grp;
}
function radioKey(e, radios, i, onSelect, options){
  let ni=null;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') ni=(i+1)%radios.length;
  else if (e.key==='ArrowLeft'||e.key==='ArrowUp') ni=(i-1+radios.length)%radios.length;
  else if (e.key===' '||e.key==='Enter'){ e.preventDefault(); onSelect(options[i].value, radios[i]); return; }
  if (ni!=null){ e.preventDefault(); radios.forEach(r=>r.tabIndex=-1); radios[ni].tabIndex=0; radios[ni].focus(); }
}

/* small club glyphs (SVG only, SYS-12) */
function clubGlyph(club){

  return `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 4 L6 16" stroke="#9D8BFF" stroke-width="2" stroke-linecap="round"/><path d="M6 16 l7 3" stroke="#9D8BFF" stroke-width="2.4" stroke-linecap="round"/><circle cx="16" cy="20" r="2.2" stroke="#9D8BFF" stroke-width="1.6" fill="none"/></svg>`;
}

/* ══ INPUT FLOW ═══════════════════════════════════════════════════════ */
function renderInput(){
  state.phase='input'; readoutEl.hidden=true;
  railBody.innerHTML='';
  renderChips(railBody);
  const block=document.createElement('div'); block.className='qblock';

  if (state.active==='club'){
    block.appendChild(mk('div','eyebrow','Describe your last shot'));
    block.appendChild(mk('h2','qtitle','Which club?'));
    const preselect = state.club || safeGet('sa.diagnose.club') || '7iron';
    block.appendChild(radiogroup('Which club?', [
      { value:'7iron',  label:'7-iron', cls:'glyphchip', html:`${clubGlyph('7iron')}<span>7-iron</span>`, aria:'7-iron' },
      { value:'driver', label:'Driver', cls:'glyphchip', html:`${clubGlyph('driver')}<span>Driver</span>`, aria:'Driver' },
    ], preselect, onClub));
    const strip=document.createElement('p'); strip.className='honeststrip'; strip.id='clubHonesty';
    // guard: on the pre-load renderInput MAP is still null (BANDS_FOR needs it). If
    // the last-used club was driver, the note fills in on the post-load re-render.
    strip.textContent = (MAP && preselect==='driver') ? BANDS_FOR(preselect).speed.note : '';
    block.appendChild(strip);
    // update the honesty strip as the user arrows across the club radios (before the confirming tap)
    block.querySelectorAll('[role="radio"]').forEach(r=>{
      r.addEventListener('focus', ()=>{ strip.textContent = (MAP && r.getAttribute('aria-label')==='Driver') ? BANDS_FOR('driver').speed.note : ''; });
    });
  }
  else if (state.active==='speed'){
    const b = BANDS();
    block.appendChild(mk('div','eyebrow','How fast do you swing?'));
    block.appendChild(mk('h2','qtitle',`Your ${clubLabel(state.club)} speed`));
    const ac = b.speed.anchorCopy;
    block.appendChild(radioCards('How fast do you swing?', [
      { value:'slow',   label:'Gentle',   anchor:ac.slow },
      { value:'mid',    label:'Mid',      anchor:ac.mid },
      { value:'fast',   label:'Fast',     anchor:ac.fast },
      { value:'unsure', label:'Not sure', anchor:"No problem — the reveal just won't be pinned to a speed band." },
    ], state.speed, onSpeed));
    // driver honesty note (why we read shape/cause, not driver carry) — spec §1 S1
    if (b.speed.note) block.appendChild(mk('p','honeststrip', b.speed.note));
    block.appendChild(mk('div','qhint','Speed pins how far it flew — not the fault. We ask early so the reveal flies at <b>your</b> speed.', true));
  }
  else if (state.active==='shape'){
    block.appendChild(mk('div','eyebrow','Your last shot'));
    block.appendChild(mk('h2','qtitle','Which flight looks like yours?'));
    const head=document.createElement('div'); head.className='phead'; head.setAttribute('aria-hidden','true');
    head.innerHTML='<span>Left</span><span>Straight</span><span>Right</span>';
    block.appendChild(head);
    block.appendChild(buildPicker());
    block.appendChild(mk('div','footnote','Right-handed flights — mirrored left-hand mode is on the list.'));
  }
  else if (state.active==='severity'){
    const right = state.curveDir==='right';
    block.appendChild(mk('div','eyebrow','How much curve?'));
    const opts = right
      ? [ {value:'Fade', html:'A little <span class="sub">— a fade</span>'}, {value:'Slice', html:'A lot <span class="sub">— a slice</span>'} ]
      : [ {value:'Draw', html:'A little <span class="sub">— a draw</span>'}, {value:'Hook', html:'A lot <span class="sub">— a hook</span>'} ];
    block.appendChild(radiogroup('How much curve?', opts, state.curve, onSeverity));
    block.appendChild(mk('div','qhint', right ? 'Small curve = <b>fade</b>. Big curve = <b>slice</b>.' : 'Small curve = <b>draw</b>. Big curve = <b>hook</b>.', true));
  }
  else if (state.active==='height'){
    const labels = BANDS().height.labels; // per-club labels, never free-typed
    block.appendChild(mk('div','eyebrow','How high did it fly?'));
    block.appendChild(radiogroup('How high did it fly?',
      labels.map(l=>({value:l,label:l})), state.height, onHeight));
    if (state.height==='Ballooned') block.appendChild(mk('div','qhint','Climbed steep, dropped short of its usual flight.'));
    block.appendChild(mk('div','qhint', `Next to a well-struck <b>${esc(clubLabel(state.club))}</b>.`, true));
  }
  else if (state.active==='distance'){
    const labels = BANDS().distance.labels; // per-club edges/labels
    const q = `Distance, next to your normal ${state.club==='driver'?'drive':'7-iron'}?`;
    block.appendChild(mk('div','eyebrow', q));
    block.appendChild(radiogroup(q,
      labels.map((l,i)=>({value:l,label:DIST_UIWORD[i]})), state.distance, onDistance));
  }
  else if (state.active==='contact'){
    // S4b — conditional (way short only): matched-speed geometry can't lose real distance
    block.appendChild(mk('div','eyebrow','Way short — how did it feel off the face?'));
    block.appendChild(radiogroup('How did it feel off the face?', [
      {value:'Pure',label:'Pure'},{value:'Thin',label:'Thin'},{value:'Fat',label:'Fat'},{value:'Not sure',label:'Not sure'}
    ], state.contact, onContact));
    block.appendChild(mk('div','qhint','Geometry alone barely loses distance — a big loss is usually the strike.'));
  }
  else if (state.active==='divot'){
    // S5 — divot: highest-value resolver of the residual attack fog (1.292 bits)
    block.appendChild(mk('div','eyebrow','Last clue — your divot?'));
    let opts = [
      {value:'deep',label:'Deep divot'},{value:'brushed',label:'Brushed the grass'},
      {value:'none',label:'No divot'},{value:'unsure',label:"Didn't notice"}
    ];
    // driver: No divot is normal — lead with it
    if (state.club==='driver') opts = [opts[2],opts[1],opts[0],opts[3]];
    block.appendChild(radiogroup('Last clue — your divot?', opts, state.divot, onDivot));
    if (state.club==='driver') block.appendChild(mk('div','qhint','No divot is normal for a driver.'));
  }
  railBody.appendChild(block);
  focusActiveGroup(block);
}
function focusActiveGroup(block){
  if (!state._reopen) return; state._reopen=false;
  const first = block.querySelector('[role="radio"]');
  if (first){ const target = block.querySelector('[tabindex="0"]') || first; target.focus(); }
}

/* helpers that read a specific club's bands even before state.club is committed */
function BANDS_FOR(club){ return DX.clubMap(MAP, club).meta.bands; }
function safeGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function safeSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

/* 3×3 picker with 2-D roving tabindex + arrow keys */
function buildPicker(){
  const grid=document.createElement('div'); grid.className='picker'; grid.setAttribute('role','radiogroup'); grid.setAttribute('aria-label','Which flight looks like yours?');
  const tiles=[];
  const checkedCol = state.startLine? START_BY_COL.indexOf(state.startLine):-1;
  const checkedRow = state.curveDir? DIR_BY_ROW.indexOf(state.curveDir):-1;
  for (let row=0; row<3; row++){
    for (let col=0; col<3; col++){
      const t=document.createElement('button'); t.type='button'; t.className='tile sa-focus'; t.setAttribute('role','radio');
      t.dataset.col=col; t.dataset.row=row;
      const checked = col===checkedCol && row===checkedRow;
      t.setAttribute('aria-checked', checked?'true':'false');
      t.setAttribute('aria-label', PICKER_LABELS[`${col},${row}`]);
      const first = (checkedCol<0 && col===0 && row===0);
      t.tabIndex = (checked || first) ? 0 : -1;
      t.innerHTML = tileSVG(col,row);
      t.addEventListener('click', ()=> onShape(col,row));
      t.addEventListener('keydown', e=> pickerKey(e, tiles, col, row));
      tiles.push({el:t,col,row}); grid.appendChild(t);
    }
  }
  return grid;
}
function pickerKey(e, tiles, col, row){
  let nc=col, nr=row, move=false;
  if (e.key==='ArrowRight'){ nc=(col+1)%3; move=true; }
  else if (e.key==='ArrowLeft'){ nc=(col+2)%3; move=true; }
  else if (e.key==='ArrowDown'){ nr=(row+1)%3; move=true; }
  else if (e.key==='ArrowUp'){ nr=(row+2)%3; move=true; }
  else if (e.key===' '||e.key==='Enter'){ e.preventDefault(); onShape(col,row); return; }
  if (move){ e.preventDefault(); const next=tiles.find(t=>t.col===nc&&t.row===nr); tiles.forEach(t=>t.el.tabIndex=-1); next.el.tabIndex=0; next.el.focus(); }
}
function tileSVG(col,row){
  const sdx = {0:-13,1:0,2:13}[col];
  const cdx = {0:-15,1:0,2:15}[row];
  const ex = 36+sdx+cdx, ey=12;
  const c1x=(36+sdx*0.55).toFixed(1), c1y=42;
  const c2x=(36+sdx+cdx*0.35).toFixed(1), c2y=24;
  return `<svg viewBox="0 0 72 72" aria-hidden="true">
    <path d="M36 60 C ${c1x} ${c1y} ${c2x} ${c2y} ${ex} ${ey}" fill="none" stroke="#9D8BFF" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="36" cy="60" r="3" fill="#F5F2FF"/>
  </svg>`;
}

/* ── input handlers (auto-advance) ───────────────────────────────────── */
function onClub(val){
  state.club=val; safeSet('sa.diagnose.club', val); haptics.tick('club');
  afterAnswer('club', `${clubLabel(val)}. How fast do you swing?`);
}
function onSpeed(val){
  state.speed=val; haptics.tick('speed');
  afterAnswer('speed', `Speed: ${SPEED_LABEL[val].toLowerCase()}. Which flight looks like yours?`);
}
function onShape(col,row){
  state.startLine = START_BY_COL[col];
  state.curveDir  = DIR_BY_ROW[row];
  haptics.tick('shape');
  if (state.curveDir==='straight'){
    state.curve='Straight'; updateSketch();
    afterAnswer('shape', `Sketched: ${START_WORD[state.startLine].toLowerCase()}, straight.`);
  } else {
    state.curve=null; updateSketch();
    state._reopen=true; state.active='severity'; renderInput();
    announce(`Sketched: ${START_WORD[state.startLine].toLowerCase()}, curving ${state.curveDir}. How much curve?`);
  }
}
function onSeverity(val){ state.curve=val; haptics.tick('sev'); updateSketch(); afterAnswer('severity', `A ${val.toLowerCase()}. Next: height.`); }
function onHeight(val){ state.height=val; haptics.tick('h'); updateSketch(); afterAnswer('height', `Height: ${HEIGHT_WORD[val].toLowerCase()}. Next: distance.`); }
function onDistance(val){
  state.distance=val; haptics.tick('d'); updateSketch();
  const msg = isWayShort() ? `Way short. How did it feel off the face?` : `Distance noted. Last clue: your divot.`;
  afterAnswer('distance', msg);
}
function onContact(val){ state.contact=val; state.contactSource='s4b'; haptics.tick('c'); afterAnswer('contact', `Contact: ${(val==='Not sure'?'not sure':val.toLowerCase())}. Reconstructing your delivery…`); }
function onDivot(val){ state.divot=val; haptics.tick('divot'); afterAnswer('divot', 'Reconstructing your delivery…'); }

function nextQuestion(){
  if (!state.club) return 'club';
  if (!state.speed) return 'speed';
  if (!state.startLine) return 'shape';
  if (state.curveDir!=='straight' && !state.curve) return 'severity';
  if (!state.height) return 'height';
  if (!state.distance) return 'distance';
  if (isWayShort() && state.contact==null) return 'contact';  // S4b
  // S5 divot pre-reveal — asked on every NON-way-short branch (it earns the last
  // pre-reveal slot, findings §4). On the way-short branch that slot already went
  // to S4b contact (way-short is a contact/speed conversation, finding #1), so
  // divot moves to a post-reveal SHARPEN refiner there. This keeps every branch
  // within the spec's 6–7 tap budget: curved+way-short is 7 pre-reveal taps
  // (club·speed·shape·severity·height·distance·contact), not 8.
  if (!isWayShort() && !state.divot) return 'divot';          // S5
  return null;
}
function afterAnswer(justAnswered, msg){
  // pre-reveal S-MISS gate: the moment the descriptor is complete, if the exact
  // flight isn't in the model, surface S-MISS instead of asking more questions.
  if (descriptorComplete()){
    const cm = CM(); const res = DX.lookup(cm, descriptor());
    if (!res.exact){
      if (state.hasResults){ renderMiss(res.nearest, descriptor()); return; }
      // gate the moment a descriptor field is (re)answered into a non-existent flight
      if (justAnswered==='distance' || justAnswered==='height' || justAnswered==='severity' || justAnswered==='shape'){
        renderMiss(res.nearest, descriptor()); return;
      }
    }
  }
  if (state.hasResults){ state.active=null; recomputeResults(); if (msg) announce(msg); return; }
  const next = nextQuestion();
  if (next){ state._reopen=true; state.active=next; renderInput(); if (msg) announce(msg); }
  else { if (msg) announce(msg); goReveal(); }
}
function openQuestion(dim){
  state._reopen=true; state.active=dim; renderInput();
  const nm = dim==='shape' ? 'your flight' : dim==='club' ? 'your club' : dim;
  announce(`Change ${nm}.`);
}

/* ══ REVEAL ═══════════════════════════════════════════════════════════
   Pre-reveal conditioning pipeline (findings §6 call order): lookup →
   consolidate baseline (honesty totals) → reweightSpeed (S1) → applyDivot (S5)
   → [+ any post-reveal sharpen refiners already chosen] → consolidate. The
   ember reveal is a REAL solveFlight solve of the speed-matched top rep. */
function solveNow(){
  const d = descriptor(); currentDesc = d;
  const cm = CM();
  const res = DX.lookup(cm, d);
  if (!res.exact){ currentEntry=null; return { miss:true, nearest:res.nearest, d }; }
  currentEntry = res.entry;
  currentBase = DX.consolidateStories(res.entry);        // true all-delivery shares + folded tail
  let clusters = res.entry.clusters;
  let divotEmpty = false;
  if (state.speed && state.speed!=='unsure') clusters = DX.reweightSpeed(clusters, state.speed);
  if (state.divot && state.divot!=='unsure'){ const dr = DX.applyDivot(clusters, state.divot); clusters=dr.clusters; divotEmpty=dr.empty; }
  if (state.secondary && state.secondary!=='skip' && !isStartStraight()) clusters = DX.reweightSecondary(clusters, state.secondary);
  if (state.carry!=null && state.carry!=='skip' && carryTrusted()) clusters = DX.reweightCarry(clusters, +state.carry, 10);
  currentCon = DX.consolidateStories(clusters);
  return { miss:false, con:currentCon, base:currentBase, d, divotEmpty };
}
function setEmberFromTop(top){
  const { flight, samples } = DX.solveTrace(top.rep);
  emberSamples = samples;
  emberAbs = { carryM:flight.carry*Y2M, apexM:flight.apex*Y2M, offlineM:flight.offline*Y2M, flight };
  return flight;
}
function animateEmber(ms){
  return new Promise(res=>{
    const t0=performance.now();
    (function step(t){ emberProgress=Math.min(1,(t-t0)/ms); drawAll(); if(emberProgress<1) requestAnimationFrame(step); else res(); })(performance.now());
  });
}
async function goReveal(){
  state.phase='reveal';
  const sol = solveNow();
  if (sol.miss){ renderMiss(sol.nearest, sol.d); return; }
  const top = sol.con.stories[0];
  const flight = setEmberFromTop(top);
  emberProgress = 0;

  if (reduce){
    // reduced motion: no beat, no draw — both traces + results render complete
    emberProgress=1; drawAll();
    renderResults(sol, {});
    return;
  }
  // reveal beat (v1 §6.1): rail shows reconstructing, scene dims 8% — nothing
  // else moves; ember draws itself over the violet sketch ≤500 ms after last tap
  railBody.innerHTML=''; renderChips(railBody);
  railBody.appendChild(mk('div','beat','Reconstructing your delivery…'));
  // No announce() here — every path's final answer message already ends with
  // "Reconstructing your delivery…"; a duplicate eats the live-region throttle
  // and delays the headline announcement (verifier finding).
  sceneDimAmt=0.08; drawAll();
  await wait(420);
  sceneDimAmt=0; drawAll();
  await animateEmber(720);
  haptics.notify('success');
  renderResults(sol, {});
}
function recomputeResults(){
  const sol = solveNow();
  if (sol.miss){ renderMiss(sol.nearest, sol.d); return; }
  const top = sol.con.stories[0];
  const flight = setEmberFromTop(top);
  emberProgress=1; drawAll();
  renderResults(sol, {});
}

/* ══ RESULTS ══════════════════════════════════════════════════════════ */
function revealHeadline(con, refinedBy){
  const top=con.stories[0]; const conf=DX.confidenceLabel(top.pct);
  const pre = refinedBy ? `Refined by your ${refinedBy}. ` : '';
  return `${pre}${conf.label}: ${DX.storyTitle(top)} — about ${conf.n} in 10.`;
}

/* ══ v3 VALUES — the headline insight per diagnosis (spec §1/§3) ═══════════
   Finding V-1's inversion: matched-speed carry cost is tiny; the honest big
   number is the TARGET LINE. One insight line per result (pick, don't stack —
   decision table §3.2). All numbers are engine solves (costOfPattern / halfGap),
   converted to metres; driver renders in %/degrees only (the yardage ban). */
const mNum = v => String(Math.round(v));                                  // metres, integer
const degTxt = v => { const r=Math.round(Math.abs(v)*10)/10; return Number.isInteger(r)?String(r):r.toFixed(1); };
const num = (v, tone) => ({ t:'num', tone: tone||'accent', v: String(v) });

/* which single headline this diagnosis earns (§3.2 — pick, don't stack) */
function headlineClass(d){
  if (d.curve==='Straight' && d.startLine==='Straight' && d.height==='Normal' && d.distanceLoss==='Full (normal distance)') return 'wink';
  if (d.distanceLoss==='Noticeable loss') return 'wayshort';                                      // contact card is the headline
  if (d.height==='Ballooned' || (d.height==='High' && d.distanceLoss==='Slight loss')) return 'spinloft'; // coach line is the headline
  if (d.curve!=='Straight' || d.startLine!=='Straight') return 'cost';                             // the target-line cost line
  return 'plain';
}
/* 7-iron personalization (§1.6): a typed carry inverts to a club speed and every
   value line is re-solved at THEIR speed. Driver keeps ratio/degree form always. */
function effectiveRep(top){
  if (state.club==='7iron' && state.carry!=null && state.carry!=='skip' && carryTrusted()){
    const cs = DX.clubSpeedForCarryM(+state.carry);
    return { rep: { ...top.rep, clubSpeed: cs }, typedCarryM: +state.carry };
  }
  return { rep: top.rep, typedCarryM: null };
}
/* the carry clause switches by sign/size (§1.1 guard-rails) */
function carryClauseParts(dCarryM, curve){
  if (dCarryM >= 1){ const n=Math.round(dCarryM);
    return { parts:[{t:'text',v:'and only '}, num(mNum(dCarryM)+' m'), {t:'text',v:' of carry'}], plain:`and only ${n} metres of carry` }; }
  if (dCarryM <= -1){ const n=Math.round(-dCarryM);
    if (curve==='Hook'||curve==='Draw')
      return { parts:[{t:'text',v:'and actually squeezes out ~'}, num(n+' m'), {t:'text',v:' more carry — hot, flat and unplayable is still unplayable'}], plain:`and actually squeezes out about ${n} metres more carry — still unplayable` };
    return { parts:[{t:'text',v:'and actually adds ~'}, num(n+' m'), {t:'text',v:' of carry — distance was never the problem'}], plain:`and actually adds about ${n} metres of carry — distance was never the problem` }; }
  return { parts:[{t:'text',v:'barely any carry at all — distance was never the problem'}], plain:'barely any carry at all — distance was never the problem' };
}
/* THE COST LINE (§1.1) — 7-iron: absolute metres; driver: %/degrees only (ban) */
function costLineData(cost, club, curve, typedCarryM){
  if (club==='driver'){
    const per10 = Math.round(cost.offlinePctOfCarry/10);     // offline/carry as "N m per 10 m" — a pure ratio
    const ang = Math.round(Math.abs(cost.missAngleDeg));
    return {
      parts:[
        {t:'text',v:'This delivery flies '}, num(ang+'°'), {t:'text',v:' off your target line — '},
        num(per10+' m'), {t:'text',v:' sideways for every '}, num('10 m','muted'), {t:'text',v:' of flight. A square strike at the same speed flies the same distance, on line: the slice costs you the fairway, not the yards.'},
      ],
      plain:`This delivery flies ${ang} degrees off your target line — ${per10} metres sideways for every 10 metres of flight. A square strike flies the same distance, on line.`,
    };
  }
  const offAbs = Math.round(Math.abs(cost.offlineM));
  const side = cost.offlineM >= 0 ? 'right' : 'left';
  if (typedCarryM != null){
    if (Math.abs(cost.dCarryM) >= 2 && cost.dCarryM > 0){
      const into = Math.round(cost.carryM);
      return {
        parts:[{t:'text',v:'This pattern turns your '}, num(typedCarryM+' m'), {t:'text',v:' into '}, num(into+' m'), {t:'text',v:', '}, num(offAbs+' m'), {t:'text',v:` ${side} of your line.`}],
        plain:`This pattern turns your ${typedCarryM} metres into ${into}, ${offAbs} metres ${side} of your line.`,
      };
    }
    return {
      parts:[{t:'text',v:'At your '}, num(typedCarryM+' m'), {t:'text',v:' carry, this pattern still finishes '}, num(offAbs+' m'), {t:'text',v:` ${side} of your line — the distance is fine; the line isn’t.`}],
      plain:`At your ${typedCarryM} metres carry, this pattern still finishes ${offAbs} metres ${side} of your line — the distance is fine, the line isn't.`,
    };
  }
  const neutralM = Math.round(cost.neutralCarryM);
  const cc = carryClauseParts(cost.dCarryM, curve);
  return {
    parts:[{t:'text',v:'A square delivery at this speed lands on your line and carries ~'}, num(neutralM+' m'), {t:'text',v:'. This pattern gives up '}, num(offAbs+' m'), {t:'text',v:' sideways — '}, ...cc.parts, {t:'text',v:'.'}],
    plain:`A square delivery at this speed carries about ${neutralM} metres. This pattern gives up ${offAbs} metres sideways — ${cc.plain}.`,
  };
}
/* THE HALF-GAP LINE (§1.2) — one real solveFlight, the app's first forecast */
function halfGapData(cost, half, club, rep){
  const hm = DX.flightMetrics(half);
  if (club==='driver'){
    const fromPct=Math.round(cost.offlinePctOfCarry), toPct=Math.round(hm.offlinePctOfCarry);
    const fromAng=Math.round(Math.abs(cost.missAngleDeg)), toAng=Math.round(Math.abs(hm.missAngleDeg));
    return {
      parts:[{t:'iflabel',v:'IF ·'}, {t:'text',v:' Close half the face gap: '}, num(fromPct+'%'), {t:'text',v:' of carry sideways drops to '}, num(toPct+'%'), {t:'text',v:', and '}, num(fromAng+'°'), {t:'text',v:' becomes '}, num(toAng+'°'), {t:'text',v:'. You don’t need a new swing — you need half the gap.'}],
      plain:`Close half the face gap and it drops from ${fromPct}% of carry to ${toPct}%, ${fromAng} degrees to ${toAng} degrees.`,
    };
  }
  const gapAbs = degTxt(rep.faceAngle - rep.clubPath);
  const from=Math.round(Math.abs(cost.offlineM)), to=Math.round(Math.abs(hm.offlineM));
  return {
    parts:[{t:'iflabel',v:'IF ·'}, {t:'text',v:' Close half of that '}, num(gapAbs+'°'), {t:'text',v:' face-to-path gap and the miss shrinks from '}, num(from+' m'), {t:'text',v:' to '}, num(to+' m'), {t:'text',v:'. You don’t need a new swing — you need half the gap.'}],
    plain:`Close half of that ${gapAbs} degree face-to-path gap and the miss shrinks from ${from} to ${to} metres.`,
  };
}
/* assemble the whole insight for a solved result (card-1 only) */
function buildInsight(sol){
  const d = sol.d, top = sol.con.stories[0], club = state.club;
  const klass = headlineClass(d);
  const { rep: effRep, typedCarryM } = effectiveRep(top);
  const out = { klass, club, effRep, typedCarryM, costParts:null, halfParts:null, announceCost:null, contactEvidence:null, proSeed:null };
  if (klass==='cost' || klass==='wayshort'){
    const cost = DX.costOfPattern(effRep, club);
    if (klass==='cost'){
      const half = DX.halfGapSolve(effRep);
      const cl = costLineData(cost, club, d.curve, typedCarryM);
      out.costParts = cl.parts; out.announceCost = cl.plain;
      out.halfParts = halfGapData(cost, half, club, effRep).parts;
      out.proSeed = { a: effRep, b: { ...(DX.NEUTRAL_DELIVERY[club]||DX.NEUTRAL_DELIVERY['7iron']), clubSpeed: effRep.clubSpeed } };
    } else {
      out.contactEvidence = cost;  // way-short: the small Δcarry becomes contact-card evidence (§3.2)
    }
  }
  return out;
}
function renderResults(sol, opts={}){
  const con = sol.con, base = sol.base, d = sol.d;
  state.phase='results'; state.hasResults=true; state.active=null;
  lastRefinedBy = opts.refinedBy || null;
  const insight = buildInsight(sol);
  const opts2 = Object.assign({}, opts, { insight });
  railBody.innerHTML='';
  renderChips(railBody);

  // focusable results region — the reveal/refine wipes railBody, so without this
  // keyboard focus would drop to <body> and a keyboard/SR user would have to Tab
  // from the top to reach the diagnosis. We wrap the diagnosis in a named region
  // (tabindex=-1) and move focus into it below. Summary chips stay ABOVE the
  // region (Shift+Tab reaches them), cards/CTA/refiners are AFTER (Tab flows in).
  const region=document.createElement('section'); region.className='results'; region.id='diagResults';
  region.tabIndex=-1; region.setAttribute('role','region'); region.setAttribute('aria-label','Your diagnosis');

  // perfect-shot wink (the "one you're trying to repeat")
  if (d.curve==='Straight' && d.startLine==='Straight' && d.height==='Normal' && d.distanceLoss==='Full (normal distance)'){
    region.appendChild(mk('div','wink', "That's the one you're trying to repeat. Here's a delivery that does it:"));
  }
  if (sol.divotEmpty){
    region.appendChild(mk('div','honesty', `A ${divotLabel(state.divot)} doesn't fit this flight in the model — showing all patterns.`));
  }

  const shown = con.stories.slice(0,3);
  const ol=document.createElement('ol'); ol.className='stories';
  const wayShort = isWayShort();
  shown.forEach((story,i)=>{
    ol.appendChild(storyCard(story, i, d, con, opts2));
    if (i===0){
      // teaching moment 1 + contact card: promote directly under card 1 when way short
      if (wayShort) ol.appendChild(wrapLi(contactCard('wayshort', insight.contactEvidence)));
      else if (state.contact==='Thin'||state.contact==='Fat') ol.appendChild(wrapLi(contactCard('feel')));
    }
  });
  region.appendChild(ol);

  // honesty line (v1 §3.2) — bucket totals from base (unconditioned), share from con.
  // "patterns" = raw delivery clusters throughout; the cards are consolidated
  // "groups" (face|path stories) that each bundle several patterns — so the shown
  // count (groups) is named distinctly from the pattern counts to avoid the word
  // "patterns" reading as the same unit as the grouped cards.
  if (con.otherPct>0 && base.clusterCount>shown.reduce((s,st)=>s+st.variants.length,0)){
    const shownN = shown.length;
    const shownClusterN = shown.reduce((s,st)=>s+st.variants.length,0);
    const rarerN = Math.max(1, base.clusterCount-shownClusterN);
    region.appendChild(mk('div','honesty',
      `This flight matches <b>${base.gridCount.toLocaleString('en-US')}</b> deliveries in ${base.clusterCount} patterns. Showing the ${shownN} biggest ${shownN===1?'group':'groups'} — ${rarerN} rarer ${rarerN===1?'pattern shares':'patterns share'} the remaining ${con.otherPct}%.`, true));
  }

  // SHARPEN-ROW (post-reveal refiners)
  const sharpen = buildSharpenRow(d);
  if (sharpen) region.appendChild(sharpen);

  // re-diagnose
  const again=document.createElement('button'); again.type='button'; again.className='textbtn sa-focus'; again.textContent='Describe another shot';
  again.addEventListener('click', resetFlow);
  region.appendChild(again);

  railBody.appendChild(region);
  renderReadout(con.stories[0].rep);
  drawAll();
  region.focus({ preventScroll:false });   // land keyboard/SR focus in the diagnosis
  // one polite live region announces the refreshed headline; on a carry refine it
  // carries the PERSONALIZED cost (§3.4) so the SR user hears their own numbers.
  let annc = revealHeadline(con, opts.refinedBy);
  if (opts.refinedBy==='carry' && insight.announceCost) annc = `Refined by your carry. ${insight.announceCost}`;
  announce(annc);
}

function storyCard(story, i, d, con, opts){
  const li=document.createElement('li');
  const card=document.createElement('article'); card.className='card' + (i>0?' compact':'');
  const conf=DX.confidenceLabel(story.pct);
  const n = conf.n;

  const eye=document.createElement('div'); eye.className='cardeye';
  const embN = i===0 ? `<span class="emb">${n}</span>` : `${n}`;
  const refinedTag = (i===0 && opts.refinedBy) ? ` · <span class="refined">Refined by your ${esc(opts.refinedBy)}</span>` : '';
  eye.innerHTML = `${esc(conf.label)} · About ${embN} in 10 matches${refinedTag}`;

  const head=document.createElement('div'); head.className='cardhead';
  const glyphwrap=document.createElement('div'); glyphwrap.className='glyphwrap';
  glyphwrap.innerHTML = dplaneSVG(story.rep);
  const gvh=document.createElement('span'); gvh.className='vh'; gvh.textContent = dplaneAlt(story.rep);
  glyphwrap.appendChild(gvh);
  const txt=document.createElement('div'); txt.className='txt';
  txt.appendChild(eye);
  txt.appendChild(mk('div','ctitle', DX.storyTitle(story)));

  if (i===0){
    // coach story line (the dynamic-loft → spin-loft chain, spoken by the physics)
    const coach=document.createElement('div'); coach.className='coach';
    renderParts(coach, DX.coachStory(story, CM().meta));
    // §1.3 — append the healthy spin-loft window as a ruler (grid-derived edges,
    // zero new computation). The number gets a scale; not the pure wink (nothing
    // to contextualize there).
    if (d.curve!=='Straight' || d.startLine!=='Straight' || d.height!=='Normal' || d.distanceLoss!=='Full (normal distance)'){
      const e = DX.spinLoftEdges(CM().meta);
      renderParts(coach, [
        { t:'text', v:` The healthy ${clubLabel(state.club)} window is about ` },
        num(`${Math.round(e.low)}–${Math.round(e.alot)}°`, 'muted'),
        { t:'text', v:'.' },
      ]);
    }
    txt.appendChild(coach);
    // §1.3 supporting texture — only when spin loft is "a lot": backspin vs the
    // square strike, one muted line, never a second paragraph (engine numbers).
    if (DX.spinLoftBand(DX.spinLoftOf(story.rep), CM().meta)==='alot'){
      const cost = DX.costOfPattern(story.rep, state.club);
      const rpm=document.createElement('div'); rpm.className='rpmtex';
      renderParts(rpm, [
        { t:'text', v:'That loft spins it to ' }, num(Math.round(cost.backspin).toLocaleString('en-US')+' rpm'),
        { t:'text', v:' vs ' }, num(Math.round(cost.neutralBackspin).toLocaleString('en-US')+' rpm', 'muted'),
        { t:'text', v:' off a square strike — more spin, higher, shorter.' },
      ]);
      txt.appendChild(rpm);
    }
    // §3.1 slot 4/5 — THE COST LINE + THE HALF-GAP LINE, directly under the coach
    // story (rendered only for the classes that earn it — §3.2 pick, don't stack).
    const ins = opts.insight;
    if (ins && ins.costParts){
      const cl=document.createElement('div'); cl.className='costline'; renderParts(cl, ins.costParts); txt.appendChild(cl);
      if (ins.halfParts){ const hl=document.createElement('div'); hl.className='halfgap'; renderParts(hl, ins.halfParts); txt.appendChild(hl); }
      // §3.5 the Pro moment — "See both flights side by side" ghost-compare CTA
      if (ins.proSeed){ txt.appendChild(proCompareCTA(ins.proSeed, DX.storyTitle(story))); }
    }
    head.appendChild(glyphwrap); head.appendChild(txt); card.appendChild(head);
  } else {
    card.appendChild(eye); card.appendChild(mk('div','ctitle', DX.storyTitle(story)));
  }

  const body=document.createElement('div'); body.className='cbody';
  renderParts(body, DX.storyBody(story, d.curve));
  card.appendChild(body);

  if (i===0){
    // variant rows
    const vwrap=document.createElement('div'); vwrap.className='variants';
    story.variants.slice(0,3).forEach(v=>{
      const share = story.pct>0 ? v.pct/story.pct : 0;
      const vn = Math.max(1, Math.round(share*10));
      const row=document.createElement('div'); row.className='variant';
      row.innerHTML = `<span style="flex:1 1 auto">${esc(cap(DX.attackWord(v.attack)))} swing</span>` +
        `<span class="vtrack" aria-hidden="true"><span class="vbar" style="width:${Math.round(share*100)}%"></span></span>` +
        `<span class="vpct">${vn} in 10</span>`;
      row.setAttribute('aria-label', `${DX.attackWord(v.attack)} swing — about ${vn} in 10 within this pattern`);
      vwrap.appendChild(row);
    });
    card.appendChild(vwrap);

    // teaching moment 2 — the pull-hook / snap-hook truth (finding #2)
    if ((d.curve==='Hook'||d.curve==='Draw') && d.startLine==='Left'){
      const t=document.createElement('div'); t.className='teach';
      renderParts(t, [
        { t:'text', v:'Read it this way: your low duck-hook is a ' },
        { t:'term', v:'club path', def:DX.TERMS['club path'] },
        { t:'text', v:' swinging out to the right with a slammed-shut ' },
        { t:'term', v:'face angle', def:DX.TERMS['face angle'] },
        { t:'text', v:' — a snap-hook, not an over-the-top move. A shut face on an out-to-in path can only make a pull-draw.' },
      ]);
      card.appendChild(t);
    }

    // §1.4 / §3.1 slot 7 — tour benchmark row (replaces the BANNED grid-quantile
    // "norm"). Static, labelled TOUR, never a personalized claim. Skipped for the
    // pure wink (no face-to-path gap to benchmark).
    if (headlineClass(d)!=='wink'){
      const tr=document.createElement('div'); tr.className='tourrow';
      const lab=document.createElement('span'); lab.className='tourlabel'; lab.textContent='TOUR'; lab.setAttribute('aria-hidden','true');
      tr.appendChild(lab); tr.appendChild(document.createTextNode('Tour players keep '));
      renderParts(tr, [{ t:'term', v:'face-to-path', def:DX.TERMS['face-to-path'] }]);
      tr.appendChild(document.createTextNode(' inside about 2° on their stock shots.'));
      card.appendChild(tr);
    }
    card.appendChild(tryCTA(story.rep, DX.storyTitle(story), true, d.curve));
    card.appendChild(mk('div','cta-sub','Loads these numbers into Ball Flight — drag them to fix the shot.'));
  } else {
    card.appendChild(tryCTA(story.rep, DX.storyTitle(story), false, d.curve));
  }

  li.appendChild(card);
  return li;
}

/* render a parts array ([{t:'text'|'strong'|'term',v,def}]) with taught terms */
function renderParts(host, parts){
  for (const p of parts){
    if (p.t==='text'){ host.appendChild(document.createTextNode(p.v)); }
    else if (p.t==='strong'){ const s=document.createElement('span'); s.className='sl'; s.textContent=p.v; host.appendChild(s); }

    else if (p.t==='iflabel'){ const s=document.createElement('span'); s.className='iflabel'; s.textContent=p.v; host.appendChild(s); }

}

/* D-plane mini glyph (top-down schematic, aria-hidden; ×2 visual gain) */
function dplaneSVG(rep){
  const L=40, tx=36, ty=60;
  const fa=rep.faceAngle*2*Math.PI/180, pa=rep.clubPath*2*Math.PI/180;
  const fe=[(tx+L*Math.sin(fa)).toFixed(1),(ty-L*Math.cos(fa)).toFixed(1)];
  const pe=[(tx+L*Math.sin(pa)).toFixed(1),(ty-L*Math.cos(pa)).toFixed(1)];
  const mx=((+fe[0]+ +pe[0])/2 + (+fe[0]-+pe[0])*0.5).toFixed(1), my=((+fe[1]+ +pe[1])/2).toFixed(1);
  return `<svg viewBox="0 0 72 72" width="72" height="72" aria-hidden="true">
    <path d="M${tx} ${ty} L${fe[0]} ${fe[1]} L${pe[0]} ${pe[1]} Z" fill="rgba(157,139,255,.14)"/>
    <line x1="36" y1="8" x2="36" y2="64" stroke="rgba(255,255,255,.30)" stroke-width="1.4" stroke-dasharray="3 3"/>
    <line x1="${tx}" y1="${ty}" x2="${pe[0]}" y2="${pe[1]}" stroke="#6FC6FF" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="${tx}" y1="${ty}" x2="${fe[0]}" y2="${fe[1]}" stroke="#FF5C6B" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M${pe[0]} ${pe[1]} Q ${mx} ${my} ${fe[0]} ${fe[1]}" fill="none" stroke="#9D8BFF" stroke-width="1.2" opacity=".5"/>
    <circle cx="36" cy="60" r="2.6" fill="#F5F2FF"/>
  </svg>`;
}
function dplaneAlt(rep){
  const f=rep.faceAngle, p=rep.clubPath;
  const fw = f>0?`${Math.abs(f).toFixed(1)} degrees open`:f<0?`${Math.abs(f).toFixed(1)} degrees closed`:'square';
  const pw = p<0?`${Math.abs(p).toFixed(1)} degrees left of target`:p>0?`${Math.abs(p).toFixed(1)} degrees right of target`:'down the line';
  const rel = (f-p)>1?'face right of path':(f-p)<-1?'face left of path':'face and path aligned';
  return `Diagram: face ${fw}, path ${pw} — ${rel}.`;
}
