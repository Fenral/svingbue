/* ══ SHARPEN-ROW (spec v2 §3) ═════════════════════════════════════════ */
function buildSharpenRow(d){
  const refiners=[];
  // 0. divot — deferred here from pre-reveal ONLY on the way-short branch (its
  //    pre-reveal slot went to S4b contact, tap-budget ≤7). It is the highest-value
  //    refiner (1.292 bits, findings §4), so it leads the row and survives the
  //    ~2-visible cap below.
  if (isWayShort() && state.divot==null) refiners.push('divot');
  // 1. pattern question — hidden on start-straight shapes (≈0 bits there)
  if (!isStartStraight() && state.secondary==null) refiners.push('pattern');
  // 2. exact carry — 7-IRON only (driver absoluteCarryTrusted=false, honesty law)
  if (carryTrusted() && state.club==='7iron' && state.carry==null) refiners.push('carry');
  // 3. contact feel — only if S4b never fired (distance !== way short)
  if (!isWayShort() && state.contactSource!=='sharpen' && state.contact==null) refiners.push('contact');
  const visible = refiners.slice(0,2);   // at most ~2 refiners visible
  if (!visible.length) return null;

  const wrap=document.createElement('div'); wrap.className='sharpen';
  wrap.appendChild(mk('div','eyebrow', 'Sharpen it — two more coach questions'));
  visible.forEach(kind=> wrap.appendChild(buildRefiner(kind)));
  return wrap;
}
function buildRefiner(kind){
  const wrap=document.createElement('div'); wrap.className='refiner';
  const toggle=document.createElement('button'); toggle.type='button'; toggle.className='rf-toggle sa-focus'; toggle.setAttribute('aria-expanded','false');
  const body=document.createElement('div'); body.className='rf-body'; body.hidden=true;
  const titles={ pattern:'Do you also hit other shots often?', carry:'Know your carry?', contact:'How did it feel off the face?', divot:'Your divot?' };
  toggle.innerHTML = `<span>${esc(titles[kind])}</span><span class="rf-caret" aria-hidden="true">Answer</span>`;
  toggle.addEventListener('click', ()=>{ const open=toggle.getAttribute('aria-expanded')==='true'; toggle.setAttribute('aria-expanded', open?'false':'true'); body.hidden=open; if(!open){ const r=body.querySelector('[role="radio"]'); if(r) r.focus(); } });
  wrap.appendChild(toggle); wrap.appendChild(body);

  if (kind==='pattern'){
    body.appendChild(radiogroup('Do you also hit other shots often?', [
      {value:'pulls',label:'Pulls'},{value:'pushes',label:'Pushes'},{value:'straights',label:'Straight ones'},{value:'skip',label:'No / not sure'}
    ], state.secondary, (val)=> applyRefiner('pattern', val)));
    body.appendChild(mk('div','rf-why','Same swing — the face just arrives a touch different each time. This confirms the read; it doesn\'t decide it.'));
  }
  else if (kind==='carry'){
    body.appendChild(buildCarrySlider());
  }
  else if (kind==='contact'){
    body.appendChild(radiogroup('How did it feel off the face?', [
      {value:'Pure',label:'Pure'},{value:'Thin',label:'Thin'},{value:'Fat',label:'Fat'},{value:'unsure',label:'Not sure'}
    ], state.contact, (val)=> applyRefiner('contact', val)));
  }
  else if (kind==='divot'){
    // same question/mapping as pre-reveal S5 (driver leads with "No divot")
    let opts = [
      {value:'deep',label:'Deep divot'},{value:'brushed',label:'Brushed the grass'},
      {value:'none',label:'No divot'},{value:'unsure',label:"Didn't notice"}
    ];
    if (state.club==='driver') opts = [opts[2],opts[1],opts[0],opts[3]];
    body.appendChild(radiogroup('Your divot?', opts, state.divot, (val)=> applyRefiner('divot', val)));
    body.appendChild(mk('div','rf-why','The divot reads your attack angle — it sharpens which delivery within this pattern, even though the way-short distance itself is a strike/speed story.'));
  }
  return wrap;
}
function buildCarrySlider(){
  const wrap=document.createElement('div'); wrap.className='carrywrap';
  const val=document.createElement('div'); val.className='carryval'; val.id='carryval';
  const start = (state.carry!=null && state.carry!=='skip') ? +state.carry : 145;
  val.innerHTML = `Carry: <b>${start} m</b>`;
  // range 90–200 m, 5 m detents (spec §2: map ground truth cluster carryM p10 min
  // 91 m … p90 max 198.1 m over 1,459 stats). Native <input range step=5> gives
  // arrow-key = 1 detent + 44px hit area. Skip keeps the "Not sure" law intact.
  const s=document.createElement('input'); s.type='range'; s.className='carry sa-focus';
  s.min='90'; s.max='200'; s.step='5'; s.value=String(start);
  s.setAttribute('aria-labelledby','carryval');   // visible label IS the name (drift-proof)
  s.setAttribute('aria-description','Your 7-iron carry in metres, 5 metre steps, 90 to 200');
  s.setAttribute('aria-valuetext', `${start} metres carry`);
  s.addEventListener('input', ()=>{ val.innerHTML = `Carry: <b>${s.value} m</b>`; s.setAttribute('aria-valuetext', `${s.value} metres carry`); });
  s.addEventListener('change', ()=> applyRefiner('carry', +s.value));
  const skip=document.createElement('button'); skip.type='button'; skip.className='textbtn sa-focus'; skip.textContent='Skip';
  skip.addEventListener('click', ()=> applyRefiner('carry','skip'));
  const why=mk('div','rf-why','Pins your numbers so the cost is measured in your yardstick — it personalizes the read, it doesn’t change the fault.');
  wrap.appendChild(val); wrap.appendChild(s); wrap.appendChild(skip); wrap.appendChild(why);
  return wrap;
}
function applyRefiner(kind, value){
  if (kind==='pattern'){ state.secondary=value; }
  else if (kind==='carry'){ state.carry=value; }
  else if (kind==='contact'){ state.contact=value; state.contactSource='sharpen'; }
  else if (kind==='divot'){ state.divot=value; }
  haptics.tick('refine');
  const sol = solveNow();
  if (sol.miss){ renderMiss(sol.nearest, sol.d); return; }
  const top = sol.con.stories[0];
  setEmberFromTop(top);
  emberProgress=1; drawAll();   // ember redraws from the new top rep (static — the reveal beat is not re-run)
  let refinedBy=null;
  if (kind==='pattern' && value!=='skip') refinedBy='pattern';
  else if (kind==='carry' && value!=='skip') refinedBy='carry';
  else if (kind==='divot' && value!=='unsure' && !sol.divotEmpty) refinedBy='divot';
  renderResults(sol, { refinedBy });
}

/* divot label for the empty-filter honesty line */
function divotLabel(a){ return ({ deep:'deep', brushed:'brushed', none:'no', unsure:'' }[a]||'') + ' divot'; }

/* ══ v3 DRIVER HONESTY LAW — render-layer unit test (?dev=1, spec §4) ══════
   Fails if any driver-mode absolute metres/yards reach the DOM in value lines.
   It renders the SAME costLineData/halfGapData the real driver card uses (single
   source), then asserts the value-line text carries no number a carry/offline
   metre would produce — every honest driver value is a %/degree/ratio ≤ 41. */
function devRenderContract(){
  const rows=[]; const push=(name,pass,detail)=>rows.push({name,pass:!!pass,detail});
  try{
    const cmd = DX.clubMap(MAP,'driver');
    const top = DX.consolidateStories(DX.lookup(cmd,{curve:'Slice',startLine:'Right',height:'Normal',distanceLoss:'Full (normal distance)'}).entry).stories[0];
    const cost = DX.costOfPattern(top.rep,'driver');
    const half = DX.halfGapSolve(top.rep);
    const tmp=document.createElement('div');
    const a=document.createElement('div'); renderParts(a, costLineData(cost,'driver','Slice',null).parts); tmp.appendChild(a);
    const b=document.createElement('div'); renderParts(b, halfGapData(cost,half,'driver',top.rep).parts); tmp.appendChild(b);
    const text=tmp.textContent; const ints=(text.match(/\d+/g)||[]).map(Number);
    const maxInt=ints.length?Math.max(...ints):0;
    push('driver value lines carry no absolute metres/yards (max int < 50)', maxInt<50, `max ${maxInt} · "${text}"`);
    const banned=[Math.round(Math.abs(cost.offlineM)),Math.round(cost.carryM),Math.round(cost.neutralCarryM),Math.round(Math.abs(cost.curveM))];
    push('banned metre magnitudes absent ['+banned.join(', ')+']', banned.every(v=>!ints.includes(v)), 'ints '+ints.join(' '));
    push('allowed missAngleDeg present (~22°)', ints.includes(Math.round(Math.abs(cost.missAngleDeg))), 'ints '+ints.join(' '));
    push('allowed offlinePctOfCarry present (~41%)', ints.includes(Math.round(cost.offlinePctOfCarry)), 'ints '+ints.join(' '));
  }catch(e){ push('render-contract threw', false, String(e)); }
  const failed=rows.filter(r=>!r.pass);
  if (typeof console!=='undefined'){
    console.groupCollapsed(`[diagnose-v3 render-contract] ${rows.length-failed.length}/${rows.length} passed`);
    for(const r of rows) console[r.pass?'info':'error'](`${r.pass?'PASS':'FAIL'} — ${r.name}`, r.detail||'');
    console.groupEnd();
    if(failed.length) console.error('[diagnose-v3 render-contract] FAILURES', failed.map(f=>f.name));
  }
  return { passed:rows.length-failed.length, failed:failed.length, rows };
}

/* ══ CONTACT CARD (§6.6 — parallel model, never blended into the ranking) ══
   Way-short case arms it with the club's real geometry-loss ceiling from
   meta.bands.distance (bandLossPct / worstGeometryLossPct / lossNote), so
   nothing implies a bigger geometry loss than the grid supports. */
function contactCard(reason, evidence){
  const c=document.createElement('article'); c.className='contactcard';
  c.appendChild(mk('div','cardeye','The strike, separately'));
  const body=document.createElement('div'); body.className='cbody';
  const worst = BANDS().distance.worstGeometryLossPct;
  if (reason==='wayshort'){
    const feel = (state.contact==='Thin'||state.contact==='Fat') ? `You felt it ${state.contact.toLowerCase()} — and that fits: ` : '';
    body.textContent = `${feel}delivery geometry alone can only cost about ${worst}% of carry with this club. A genuinely huge loss is strike or club speed talking — not the shape of your swing. This flight engine can't see the strike; the Strike Window can.`;
    // §3.2 way-short headline — the cost line's small carry delta as supporting
    // evidence, in the club's honest units (7-iron: metres + %; driver: % only).
    if (evidence){
      renderParts(body, [{ t:'text', v:' In fact, this exact pattern gives up just ' }]);
      if (carryTrusted()){
        renderParts(body, [ num(Math.round(evidence.dCarryM)+' m'), { t:'text', v:' (' }, num(evidence.dCarryPct.toFixed(1)+'%'), { t:'text', v:') to a square strike.' } ]);
      } else {
        renderParts(body, [ num(evidence.dCarryPct.toFixed(1)+'%'), { t:'text', v:' of its carry to a square strike.' } ]);
      }
    }
  } else {
    const feel = state.contact==='Thin' ? 'Thin' : 'Fat';
    body.textContent = `${feel} contact comes from where your swing bottoms out — that's strike geometry, and this flight engine genuinely can't see it. A pure strike at this same delivery loses only a few percent of distance; a big loss is the strike talking.`;
  }
  c.appendChild(body);
  const a=document.createElement('a'); a.className='qcta sa-focus'; a.href='./geometry-window-mock.html';
  a.textContent='Open the Strike Window →'; a.setAttribute('aria-label','Open the Strike Window');
  c.appendChild(a);
  return c;
}

/* ══ S-MISS ═══════════════════════════════════════════════════════════
   Descriptor not in the model. Upgraded: a LOW slice that's also way short is
   teaching moment 3 (finding #3) — the physics REFUSES it, and says why. */
function renderMiss(nearest, d){
  state.phase='miss'; readoutEl.hidden=true;
  railBody.innerHTML=''; renderChips(railBody);
  // focusable region — the rail was wiped, so move focus here (not to <body>)
  const box=document.createElement('div'); box.className='miss';
  box.tabIndex=-1; box.setAttribute('role','region'); box.setAttribute('aria-label','No exact match — closest real flights');

  const lowShortSlice = (d.curve==='Slice'||d.curve==='Fade') && d.height==='Low' && d.distanceLoss==='Noticeable loss';
  if (lowShortSlice){
    box.appendChild(mk('div','mtitle','That one can’t come out of the swing shape'));
    const p=document.createElement('div'); p.className='mbody';
    renderParts(p, [
      { t:'text', v:'A low slice that is also way short doesn’t exist in the physics: low means ' },
      { t:'term', v:'spin loft', def:DX.TERMS['spin loft'] },
      { t:'text', v:' is down (de-lofted), which comes out ' },
    ]);
    const emb=document.createElement('b'); emb.textContent='hotter and longer'; p.appendChild(emb);
    p.appendChild(document.createTextNode(', not shorter. Low '));
    const emb2=document.createElement('b'); emb2.textContent='and'; p.appendChild(emb2);
    p.appendChild(document.createTextNode(' short is contact or club speed — never delivery geometry. Closest real flights:'));
    box.appendChild(p);
  } else {
    box.appendChild(mk('div','mtitle',"That mix doesn't come out of the physics"));
    box.appendChild(mk('div','mbody',`A ${state.club==='driver'?'driver':'mid-iron'} can't fly that exact combination in our model — usually one detail reads differently than it felt. Closest real flights:`));
  }

  if (nearest && nearest.length){
    const row=document.createElement('div'); row.className='qrow'; row.setAttribute('role','group'); row.setAttribute('aria-label','Closest real flights');
    nearest.forEach(nd=>{
      const b=document.createElement('button'); b.type='button'; b.className='chip sa-focus';
      b.textContent = missChipLabel(nd, d);
      b.addEventListener('click', ()=> applyNearest(nd));
      row.appendChild(b);
    });
    box.appendChild(row);
  } else {
    box.appendChild(mk('div','mbody','Try changing the height or distance a notch.'));
  }
  const again=document.createElement('button'); again.type='button'; again.className='textbtn sa-focus'; again.textContent='Describe another shot';
  again.addEventListener('click', resetFlow);
  box.appendChild(again);
  railBody.appendChild(box);
  box.focus({ preventScroll:false });
  announce(lowShortSlice
    ? "A low, way-short slice isn't delivery geometry — it's contact or speed. Pick one of the closest real flights."
    : "That mix doesn't fit the model. Pick one of the closest real flights.");
  drawAll();
}
function missChipLabel(nd, oldD){
  const v=nd.descriptor;
  if (nd.changed==='distance'){ return { 'Long (gained distance)':'Same, but longer','Full (normal distance)':'Same, normal distance','Slight loss':'Same, but a bit short','Noticeable loss':'Same, but way short' }[v.distanceLoss]; }
  if (nd.changed==='height'){ return `Same, ${HEIGHT_WORD[v.height].toLowerCase()}`; }
  if (nd.changed==='severity'){
    const gentler = (oldD.curve==='Slice'&&v.curve==='Fade')||(oldD.curve==='Hook'&&v.curve==='Draw');
    return gentler ? 'Gentler curve' : 'Sharper curve';
  }
  return 'Closest flight';
}
function applyNearest(nd){
  const v = nd.descriptor;
  state.curve=v.curve; state.curveDir=curveDirFromCurve(v.curve);
  state.startLine=v.startLine; state.height=v.height; state.distance=v.distanceLoss;
  updateSketch();
  // pulse the changed summary chip once on next paint (spec §5.5)
  state._pulseDim = ({ distance:'distance', height:'height', severity:'shape' })[nd.changed] || null;
  state.active=null;
  if (state.hasResults){ recomputeResults(); return; }
  const next = nextQuestion();
  if (next){ state._reopen=true; state.active=next; renderInput(); announce('Updated. '+(next==='contact'?'How did it feel off the face?':next==='divot'?'Last clue: your divot.':'')); }
  else goReveal();
}

/* ══ reset ════════════════════════════════════════════════════════════ */

/* ══ boot ═════════════════════════════════════════════════════════════ */
function renderError(retry){
  railBody.innerHTML='';
  const box=document.createElement('div'); box.className='errbox';
  box.appendChild(mk('div',null,'Diagnosis needs its physics map — check your connection and retry.'));
  const b=document.createElement('button'); b.type='button'; b.className='chip sa-focus'; b.textContent='Retry';
  b.addEventListener('click', retry); box.appendChild(b);
  railBody.appendChild(box);
}
async function boot(){
  // preselect the last club but never skip the confirming tap (spec §1 S0)
  const last = safeGet('sa.diagnose.club');
  if (last==='7iron'||last==='driver') state.club=null; // still ask, just preselect in the UI
  renderInput(); drawAll();
  try {
    MAP = await DX.loadMapV2();
    renderInput();  // re-render now that per-club bands are available (honesty strip, anchors)
    if (DEV){ DX.devAsserts(MAP); devRenderContract(); }
  } catch(e){
    renderError(boot);
  }
}
const ro = new ResizeObserver(()=> drawAll());
ro.observe(sceneEl);
window.addEventListener('orientationchange', ()=> setTimeout(drawAll,120));
boot();
</script>
</body>
</html>
