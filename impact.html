<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0A0E12" />
<meta name="robots" content="noindex" />
<title>See the Shot — Live D-plane Instrument</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2052%2052'%20fill='none'%3E%3Cpath%20d='M11%2045%20C%2016%2026,%2024%2018,%2035%2015%20M21%2039%20L%2030%2024%20L%2043%2045'%20stroke='%2322E3D6'%20stroke-width='4.2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3Ccircle%20cx='37'%20cy='15'%20r='5.2'%20fill='%2322E3D6'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="./sa.css" />
<link rel="stylesheet" href="./sa-paywall.css" />
<style>
  :root{
    --accent:#22E3D6; --accent-soft:rgba(34,227,214,.16); --accent-line:rgba(34,227,214,.55);
    --ink:#e8f0fb; --muted:#9aabc6;                     /* unified ink + AAA-ish muted */
    --bg:#0A0E12; --bg-top:#0b1220;
    --panel:rgba(12,20,33,.72); --line:rgba(255,255,255,.30);  /* line raised to ≥3:1 */
    --radius-pill:999px; --radius-card:16px; --radius-control:12px;
    --blur-surface:10px; --blur-overlay:18px;
    --plate:#0E141C;
    /* anatomy colours (ported hexApprox from direction-height-arrows-layout.ts) */
    --c-face:#E83B47; --c-path:#8FB4D4; --c-loft:#A66BFF; --c-attack:#FF7AA8; --c-launch:#F4D000;
    /* outcome/ghost tokens (stage 3+; stage 5 uses them more) */
    --good:#4ADE80; --warn:#FBBF24; --bad:#F87171; --ghost:#9FB2C8;
    --dim:0.55;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    background:radial-gradient(130% 120% at 50% -10%, var(--bg-top), var(--bg));
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

  /* ══ TOP STRIP (thin ~32–40px) ══════════════════════════════════ */
  .topstrip{
    flex:0 0 auto;display:flex;align-items:center;gap:10px;
    height:40px;padding:0 max(12px,env(safe-area-inset-right)) 0 max(12px,env(safe-area-inset-left));
    border-bottom:1px solid rgba(255,255,255,.06);
    background:linear-gradient(180deg, rgba(12,20,33,.55), rgba(10,14,18,.2));
  }
  .ts-left{display:flex;align-items:center;gap:8px;flex:0 0 auto;min-width:0}
  .ts-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);white-space:nowrap}
  .modnav{display:flex;align-items:center;gap:4px;view-transition-name:sa-nav}
  .modnav a{
    -webkit-tap-highlight-color:transparent;text-decoration:none;color:var(--muted);
    border:1px solid transparent;border-radius:8px;position:relative;
    height:30px;display:inline-flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;line-height:1;padding:0 8px;
    transition:background .2s,border-color .2s,color .2s;
  }
  /* visual pill stays 30px (fits the thin top strip); the hit target is
     expanded to >=44px via a transparent pseudo-element pad, matching the
     app's ghostPill/ghostClear convention for compact controls. */
  .modnav a::after{content:"";position:absolute;left:0;right:0;top:50%;height:44px;transform:translateY(-50%)}
  .modnav a.home{width:30px;padding:0;font-size:15px}
  /* square icon button: expand the pad on all sides (text tabs above are
     already wide enough that only vertical expansion is needed). */
  .modnav a.home::after{left:50%;right:auto;top:50%;width:44px;height:44px;transform:translate(-50%,-50%)}
  .modnav a:hover{background:rgba(255,255,255,.08);color:var(--ink)}
  .modnav a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .modnav a[aria-current="page"]{color:var(--accent);border-color:var(--accent-line);background:var(--accent-soft)}

  .ts-center{flex:1 1 auto;display:flex;align-items:center;justify-content:center;gap:9px;min-width:0}
  .ts-center label{font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;white-space:nowrap}
  .ts-center .speedwrap{display:flex;align-items:center;gap:8px;max-width:min(30vw,240px);width:100%}
  .ts-center input[type=range]{flex:1 1 auto;min-width:60px}
  /* once wrapped in .rwrap, the wrapper becomes the flex item */
  .ts-center .speedwrap .rwrap{flex:1 1 auto;min-width:60px}
  .ts-center .speedval{font-size:12px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;width:60px;text-align:right;white-space:nowrap}


  .ts-right{flex:0 0 auto;display:flex;align-items:center;gap:8px}
  /* size the shared "?" help affordance to fit the thin top strip; the visual
     button stays 30px but the hit target is padded out to >=44px via the
     same transparent pseudo-element trick used by .seg button/.ghostPill. */
  .ts-right .sa-help{width:30px;height:30px;font-size:14px;position:relative}
  .ts-right .sa-help::after{content:"";position:absolute;inset:-7px;border-radius:999px}
  .playpill{
    height:30px;padding:0 13px;border-radius:999px;position:relative;
    background:rgba(10,18,30,.6);color:var(--accent);
    border:1px solid var(--accent-line);
    font-size:11px;font-weight:700;cursor:pointer;line-height:1;
    display:inline-flex;align-items:center;gap:6px;font-family:inherit;letter-spacing:.02em;
    transition:background .18s,border-color .18s,transform .08s;
  }
  /* visual pill stays 30px; hit target padded to >=44px, same convention. */
  .playpill::after{content:"";position:absolute;left:0;right:0;top:50%;height:44px;transform:translateY(-50%)}
  .playpill:hover{background:var(--accent-soft);border-color:var(--accent)}
  .playpill:active{transform:translateY(1px)}
  .playpill:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .playpill .pico{font-size:10px}

  /* ══ MAIN — FOCUS-MODE STAGE (Direction | Launch | Flight) ═══════
     Replaces the old fixed two-lens layout. Each focus is a full-stage
     panel; only the active one is laid out (others are display:none via
     .active), matching the mock's 70/30 hero-lens + mini-panel weighting. */
  /* DUAL-LENS: Direction + Launch panels are BOTH shown at once (side by side),
     so the opposite lens's arrows are always visible (Sivert's redesign). Flight
     stays a separate overlay (#flightScrim), reached via the top-strip Play-flight
     button — the old [Direction|Launch|Flight] toggle + mini-panels are retired. */
  .main{flex:1 1 auto;position:relative;padding:2px;min-height:0;display:flex;gap:6px}
  .focusPanel{
    display:none;flex:1 1 0;gap:6px;min-height:0;min-width:0;
    opacity:0;transform:scale(.985);
    transition:opacity .25s ease, transform .25s ease;
  }
  .focusPanel.active{display:flex;opacity:1;transform:scale(1)}
  @media (prefers-reduced-motion:reduce){ .focusPanel{transition:none} }

  /* hero lens (~74%) — the large, focused instrument view. LENS-DOMINANCE
     REBALANCE: the lens must win the height budget on phone viewports, so
     every sibling inside .heroLens (minidock/heroResults/coachWrap) was
     shrunk into a compact secondary strip and this column widened slightly
     (68%→74%) at the expense of the mini side panel, which only needs to
     read as a small live preview, not a second hero. */
  .heroLens{
    flex:1 1 auto;min-width:0;border-radius:20px;position:relative;
    background:
      radial-gradient(120% 90% at 50% 18%, rgba(34,227,214,.07), rgba(10,14,18,0) 62%),
      #0A0E12;
    border:1px solid rgba(255,255,255,.07);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 14px 40px -22px rgba(0,0,0,.8);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .heroLens .lenshead{position:absolute;top:6px;left:10px;z-index:3;pointer-events:none}
  .heroLens .lenshead .lh1{font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
  /* the SVG gets flex:1 1 auto with min-height:0 so it is the ONE element
     that absorbs/gives back space as the compact chrome around it shrinks —
     this is what lets the lens claim the freed-up height. */
  .heroLens svg{flex:1 1 auto;width:100%;height:100%;display:block;min-height:0}

  /* docked mini-sliders (the two PRIMARY sliders for this focus) — trimmed
     to a slimmer strip so more height goes to the lens above it. */
  .minidock{
    flex:0 0 auto;display:flex;gap:8px;padding:0 10px 0;
    border-top:1px solid rgba(255,255,255,.06);
    background:linear-gradient(180deg, rgba(10,14,18,0), rgba(8,12,16,.5));
  }
  .mini{flex:1 1 0;min-width:0}
  .mini .mtop{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-bottom:0}
  .mini .mname{font-size:11px;font-weight:700;letter-spacing:.02em;display:inline-flex;align-items:center;gap:5px}
  .mini .mname label{cursor:pointer}
  .mini .mdot{width:7px;height:7px;border-radius:2px;flex:0 0 auto}
  .mini .mval{font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink)}

  input[type=range]{width:100%;height:18px;cursor:pointer;accent-color:var(--accent);background:transparent}
  input[type=range]:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:6px}
  .mini.k-face input{accent-color:var(--c-face)} .mini.k-face .mname{color:#ffb0b6}
  .mini.k-path input{accent-color:var(--c-path)} .mini.k-path .mname{color:#bcd6ea}
  .mini.k-loft input{accent-color:var(--c-loft)} .mini.k-loft .mname{color:#cdb0ff}
  .mini.k-attack input{accent-color:var(--c-attack)} .mini.k-attack .mname{color:#ffc0d4}

  /* hero results row — max 4 metric cards under the hero lens (per-focus).
     REBALANCE: these read as SECONDARY/supporting chips now (the lens is the
     hero), so the row is one slim strip — cards ~50px tall visually, with
     the touch target padded out to >=44px via a transparent ::after pad
     (same convention as .seg button / .playpill elsewhere in this file)
     rather than by inflating the visual box. */
  .heroResults{flex:0 0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 10px 0}
  .mcard{
    height:48px;padding:5px 9px;border-radius:10px;position:relative;
    background:linear-gradient(180deg, rgba(22,34,50,.7), rgba(12,19,29,.7));
    border:1px solid rgba(255,255,255,.09);
    display:flex;flex-direction:column;justify-content:center;gap:1px;min-width:0;
    appearance:none;font-family:inherit;color:inherit;text-align:left;cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .12s ease;
  }
  /* transparent hit-area pad: expands the tap target to >=44px effective
     height without growing the visual chip (mcard is 50px tall already, so
     the pad only needs to cover the vertical gaps either side). */
  .mcard::after{content:"";position:absolute;left:0;right:0;top:50%;height:44px;transform:translateY(-50%)}
  .mcard:hover{border-color:rgba(255,255,255,.18);background:linear-gradient(180deg, rgba(26,40,58,.78), rgba(14,22,33,.78))}
  .mcard:active,.mcard[aria-expanded="true"]{transform:scale(.97);border-color:rgba(255,255,255,.2)}
  .mcard:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .mcard .mk{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mcard .mv{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent);letter-spacing:-.01em;white-space:nowrap}
  .mcard .mv small{font-size:.55em;color:var(--muted);font-weight:600;margin-left:2px}

  /* coach line — main cause + coach cue, one compact line under the hero
     cards. Never allowed to wrap to a second line's worth of height budget:
     kept single-line height via line-height/padding trim only (content still
     wraps if truly needed, same as before, but the common case is one row). */
  .coachWrap{flex:0 0 auto;padding:1px 10px 1px}
  .coachLine{
    font-size:11.5px;line-height:1.25;color:var(--ink);
    display:flex;flex-wrap:wrap;align-items:baseline;gap:5px 7px;
    overflow:hidden;max-height:1.3em;
  }
  .coachLine .cause{font-weight:700;color:var(--ink)}
  .coachLine .cue{color:var(--muted)}
  .coachDot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);flex:0 0 auto;margin-right:2px}

  /* DENSITY-DIET: the Launch panel's 6 cells (3 hero + 3 secondary) form two
     clean rows of 3 — same 3-up grid as Direction, bigger type (step 3/4). */
  #heroResultsLaunch{grid-template-columns:repeat(3,1fr);gap:5px}
  #heroResultsLaunch .mcard{padding:5px 7px;border-radius:9px}
  #heroResultsLaunch .mcard .mv{font-size:18px}
  #heroResultsLaunch .mcard .mk{font-size:10px;letter-spacing:.03em}

  /* ══ PREMIUM CUSTOM RANGE SLIDERS ══════════════════════════════════
     Applied to s_face / s_path / s_attack / s_loft / s_speed (+ fSpeedRange).
     • ~5px rounded base track rgba(255,255,255,.14)
     • centre-origin (signed) or left-origin (loft/speed) FILL in the param colour,
       painted as a layered linear-gradient set live by JS on `input`.
     • centre tick at 0 for the ± sliders.
     • ~20px disc thumb in the param colour + ring + shadow, grows ×1.25 on :active.
     • hit area: full ≥44px box on every host (density-diet 2026-07: the 36px "REBALANCE casualty" trim is reverted).
     Each slider sets:  --rc (param colour), --rf (fill geometry gradient). */
  .rwrap{position:relative;--rc:var(--accent)}
  .rwrap input[type=range].premium-range{
    -webkit-appearance:none;appearance:none;
    width:100%;height:44px;
    margin:0;cursor:pointer;background:transparent;
    /* the visible track + fill is painted on a 5px-tall band centred vertically,
       via a background-image set by JS (--rf) over the base track. */
  }
  /* base track + live fill (var(--rf) injected by JS) — WebKit */
  .rwrap input[type=range].premium-range::-webkit-slider-runnable-track{
    height:5px;border-radius:999px;border:none;
    background:var(--rf, rgba(255,255,255,.14));
  }
  .rwrap input[type=range].premium-range::-moz-range-track{
    height:5px;border-radius:999px;border:none;
    background:var(--rf, rgba(255,255,255,.14));
  }
  /* the live fill is baked into --rf (so centre-origin works); hide Firefox's
     default left-only progress fill so it doesn't double up. */
  .rwrap input[type=range].premium-range::-moz-range-progress{
    height:5px;border-radius:999px;background:transparent;
  }
  /* THUMB — WebKit */
  .rwrap input[type=range].premium-range::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:20px;height:20px;border-radius:50%;margin-top:-7.5px; /* centre on 5px track */
    background:var(--rc);
    border:2px solid rgba(255,255,255,.92);
    box-shadow:0 2px 7px rgba(0,0,0,.5), 0 0 0 4px color-mix(in srgb, var(--rc) 28%, transparent);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  /* THUMB — Firefox */
  .rwrap input[type=range].premium-range::-moz-range-thumb{
    width:20px;height:20px;border-radius:50%;
    background:var(--rc);
    border:2px solid rgba(255,255,255,.92);
    box-shadow:0 2px 7px rgba(0,0,0,.5), 0 0 0 4px color-mix(in srgb, var(--rc) 28%, transparent);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  /* grow ×1.25 while dragging (and on focus for keyboard parity) */
  .rwrap input[type=range].premium-range:active::-webkit-slider-thumb,
  .rwrap input[type=range].premium-range.dragging::-webkit-slider-thumb{
    transform:scale(1.25);
    box-shadow:0 3px 11px rgba(0,0,0,.55), 0 0 0 6px color-mix(in srgb, var(--rc) 34%, transparent);
  }
  .rwrap input[type=range].premium-range:active::-moz-range-thumb,
  .rwrap input[type=range].premium-range.dragging::-moz-range-thumb{
    transform:scale(1.25);
    box-shadow:0 3px 11px rgba(0,0,0,.55), 0 0 0 6px color-mix(in srgb, var(--rc) 34%, transparent);
  }
  .rwrap input[type=range].premium-range:focus-visible{outline:none}
  .rwrap input[type=range].premium-range:focus-visible::-webkit-slider-thumb{
    box-shadow:0 2px 7px rgba(0,0,0,.5), 0 0 0 3px #0A0E12, 0 0 0 6px var(--rc);
  }
  .rwrap input[type=range].premium-range:focus-visible::-moz-range-thumb{
    box-shadow:0 2px 7px rgba(0,0,0,.5), 0 0 0 3px #0A0E12, 0 0 0 6px var(--rc);
  }
  /* CENTRE TICK at 0 — only for ± (signed) sliders. A 2px notch on the track. */
  .rwrap.signed::before{
    content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:2px;height:11px;border-radius:2px;background:rgba(255,255,255,.42);
    pointer-events:none;z-index:1;
  }
  /* VALUE BUBBLE above the thumb (x set live by JS, shown on drag) */
  .rwrap .rbubble{
    position:absolute;top:-2px;left:0;transform:translate(-50%,-100%) scale(.9);
    padding:2px 7px;border-radius:7px;white-space:nowrap;
    font-size:11px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.25;
    color:#fff;background:color-mix(in srgb, var(--rc) 66%, #0A0E12);
    border:1px solid rgba(255,255,255,.28);
    box-shadow:0 4px 12px rgba(0,0,0,.45);
    opacity:0;pointer-events:none;z-index:3;
    transition:opacity .16s ease, transform .16s ease;
  }
  .rwrap .rbubble::after{
    content:"";position:absolute;left:50%;bottom:-4px;transform:translateX(-50%) rotate(45deg);
    width:7px;height:7px;background:inherit;border-right:1px solid rgba(255,255,255,.28);
    border-bottom:1px solid rgba(255,255,255,.28);
  }
  .rwrap.bubble-show .rbubble{opacity:1;transform:translate(-50%,-100%) scale(1)}
  /* thin top strip: float the bubble BELOW the thumb (caret points up) */
  .rwrap.bubble-below .rbubble{top:auto;bottom:-2px;transform:translate(-50%,100%) scale(.9)}
  .rwrap.bubble-below.bubble-show .rbubble{transform:translate(-50%,100%) scale(1)}
  .rwrap.bubble-below .rbubble::after{
    top:-4px;bottom:auto;
    border-right:none;border-bottom:none;
    border-left:1px solid rgba(255,255,255,.28);border-top:1px solid rgba(255,255,255,.28);
  }
  /* per-param colours for the premium sliders */
  .mini.k-face  .rwrap{--rc:var(--c-face)}
  .mini.k-path  .rwrap{--rc:var(--c-path)}
  .mini.k-loft  .rwrap{--rc:var(--c-loft)}
  .mini.k-attack .rwrap{--rc:var(--c-attack)}
  .speedwrap .rwrap{--rc:var(--accent)}
  .fSpeed .rwrap{--rc:var(--accent)}
  @media (prefers-reduced-motion:reduce){
    .rwrap input[type=range].premium-range::-webkit-slider-thumb{transition:none}
    .rwrap input[type=range].premium-range::-moz-range-thumb{transition:none}
    .rwrap input[type=range].premium-range:active::-webkit-slider-thumb,
    .rwrap input[type=range].premium-range.dragging::-webkit-slider-thumb{transform:none}
    .rwrap input[type=range].premium-range:active::-moz-range-thumb,
    .rwrap input[type=range].premium-range.dragging::-moz-range-thumb{transform:none}
    .rwrap .rbubble{transition:none}
  }

  /* SVG arrow groups */
  .arrowG{transition:opacity .22s ease}
  /* dim = non-active: lower opacity AND a dashed line, so the cue is not colour-only */
  .arrowG.dim{opacity:var(--dim)}
  .arrowG.dim .aline{stroke-dasharray:10 7}
  .arrowG .aline{stroke-linecap:round}
  .arrowG.grab{cursor:grab}
  .arrowG.grab:active{cursor:grabbing}
  @media (prefers-reduced-motion:reduce){ .arrowG{transition:none} }

  /* DISPLAY-ONLY launch indicator arrows (derived result, NOT an input).
     PURELY VISUAL now: slimmer + dashed line, subtle opacity, NON-interactive
     (decorative, aria-hidden). The explanation lives only on the bottom chips. */
  .launchG{opacity:.92;pointer-events:none}
  .launchG .lline,.launchG polygon{pointer-events:none}
  .launchG .lline{stroke-linecap:round;stroke-dasharray:6 5}

  /* value chip near arrow (chip-fade ALWAYS ON) */
  .vchip{
    pointer-events:none;
    fill:rgba(14,20,28,.92);stroke:rgba(255,255,255,.18);
  }
  .vchipText{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;font-family:inherit}
  .vchipWrap{opacity:0;transition:opacity .26s ease}
  .vchipWrap.show{opacity:1}
  @media (prefers-reduced-motion:reduce){ .vchipWrap{transition:none} }

  /* ══ STAGE 6 — LANDING PREDICTOR (direction lens) ═══════════════
     Neutral reference geometry (#predRef) + a SMALL cyan dot (#predGroup)
     showing the predicted lateral finish, LIVE. Sits BEHIND the face/path/
     launch arrows in DOM/z-order (declared earlier in the SVG). The gentle
     ~2s breathing pulse is applied to #predDot/#predHalo via GSAP
     (transform-only, opacity on the halo). Deliberately SUBTLE: while an
     input is being dragged the dot + bare label show at full strength;
     ~1.2s after the last input the group eases down to a faint resting
     state (.rest) so the info recedes without disappearing. */
  #predGroup{transition:opacity .3s ease;pointer-events:none}
  #predGroup.show{opacity:1}
  #predDot,#predHalo{transform-box:fill-box;transform-origin:center}
  #predDot{transition:opacity .5s ease}
  #predLabel{
    font-variant-numeric:tabular-nums;letter-spacing:-.005em;
    opacity:.75;transition:opacity .5s ease;
    text-shadow:0 1px 2px rgba(0,0,0,.65);
  }
  #predGroup.rest #predDot{opacity:.45}
  #predGroup.rest #predLabel{opacity:.4}
  /* ── curve hint (PRED_CURVE) — thin top-down shot-shape line, ball→finish.
        Gated by the PRED_CURVE const in JS; delete this block + the
        #predCurveG SVG node + the marked JS blocks to remove entirely. ── */
  #predCurveG{pointer-events:none}
  #predCurve{opacity:.3;transition:opacity .5s ease}
  #predCurveG.rest #predCurve{opacity:.18}
  /* ── /curve hint (PRED_CURVE) ── */
  @media (prefers-reduced-motion:reduce){
    #predGroup,#predDot,#predLabel,#predCurve{transition:none}
    /* reduced-motion: static resting state only (JS also forces .rest) */
    #predGroup #predDot{opacity:.45}
    #predGroup #predLabel{opacity:.4}
    #predCurveG #predCurve{opacity:.18}
  }


  /* ══ GLASS EXPLAINER POPOVER (STAGE 7 — three-section redesign) ══
     Sections: WHAT IT IS (plain-language) / HOW IT'S CREATED (mini SVG
     diagram) / WHAT AFFECTS IT (ranked driver chips). Header, caret,
     open/close/Esc/focus-return + positioning are UNCHANGED from before. */
  .pop{
    /* z-index 55 sits ABOVE the flight scrim (50) so grid-cell popovers
       render over the overlay, and below the portrait rotate hint (60). */
    position:fixed;z-index:55;width:min(324px,88vw);
    border-radius:16px;
    background:rgba(20,28,38,.55);
    -webkit-backdrop-filter:blur(20px) saturate(140%);backdrop-filter:blur(20px) saturate(140%);
    border:1px solid rgba(255,255,255,.18);
    box-shadow:0 18px 50px -12px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.12);
    padding:5px;
    opacity:0;visibility:hidden;transform:translateY(8px) scale(.98);
    transform-origin:bottom center;
    transition:opacity .18s ease, transform .18s ease, visibility .18s;
    pointer-events:none;
  }
  @supports not ((-webkit-backdrop-filter:blur(1px)) or (backdrop-filter:blur(1px))){ .pop{background:#0C1421} }
  .pop.open{opacity:1;visibility:visible;transform:translateY(0) scale(1);pointer-events:auto}
  .pop .plate{background:var(--plate);border-radius:12px;padding:11px 13px;position:relative;z-index:1;
    max-height:var(--pop-max,none);overflow-y:auto;overscroll-behavior:contain}
  .pop .caret{position:absolute;width:14px;height:14px;background:var(--plate);
    border-right:1px solid rgba(255,255,255,.18);border-bottom:1px solid rgba(255,255,255,.18);
    transform:rotate(45deg);z-index:0}
  /* when the popover sits BELOW the chip the caret is on its TOP edge and must
     point UP — flip to the top+left borders. */
  .pop.below .caret{
    border-right:none;border-bottom:none;
    border-left:1px solid rgba(255,255,255,.18);border-top:1px solid rgba(255,255,255,.18);}
  .pop .pophead{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;margin-bottom:6px}
  .pop .pophead .pn{font-size:12.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .pop .pophead .pt{font-size:8.5px;font-weight:800;letter-spacing:.08em;color:var(--muted);
    border:1px solid rgba(255,255,255,.16);border-radius:5px;padding:1px 5px;text-transform:uppercase}
  .pop .pophead .pv{font-size:15px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;margin-left:auto}
  .pop .seclab{font-size:8.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  /* SECTION 1 — WHAT IT IS */
  .pop .pdesc{font-size:11.5px;line-height:1.32;color:#cdd9ec;margin-bottom:7px}
  /* SECTION 2 — HOW IT'S CREATED (mini SVG diagram) */
  .pop .popdiagram{margin-bottom:6px;max-width:150px;margin-left:auto;margin-right:auto}
  .pop .popdiagram svg{display:block;width:100%;height:auto;overflow:visible}
  /* SECTION 3 — WHAT AFFECTS IT (ranked driver chips) */
  .pop .drivers{display:flex;flex-direction:column;gap:4px}
  .pop .driver{display:flex;align-items:center;gap:7px;font-size:11px;line-height:1.25;
    padding:4px 8px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
  .pop .driver .dRank{flex:0 0 auto;width:14px;height:14px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;
    background:rgba(255,255,255,.08);color:var(--muted)}
  .pop .driver:first-child .dRank{background:var(--accent-soft);color:var(--accent)}
  .pop .driver .dName{color:#e8f0fb;font-weight:600;flex:1 1 auto;min-width:0}
  .pop .driver .dTrend{flex:0 0 auto;font-weight:800;font-size:11.5px;font-variant-numeric:tabular-nums}
  .pop .driver .dTrend.up{color:var(--good)}
  .pop .driver .dTrend.down{color:#ffb0a0}
  @media (prefers-reduced-motion:reduce){ .pop{transition:none} }

  /* ══ PLAY-FLIGHT OVERLAY (oblique 3D driving-range, scene C) ════ */
  .flightScrim{position:fixed;inset:0;z-index:50;background:rgba(4,7,10,.78);
    opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;
    display:flex;align-items:center;justify-content:center;padding:0}
  .flightScrim.open{opacity:1;visibility:visible}
  /* FULL-BLEED: fill the entire viewport width + height (edge-to-edge, no
     16:9 letterbox). On a real wide phone in landscape (~19.5:9) the scene now
     spans the full width so the bottom data frame gets maximum horizontal room.
     border-radius / outer border dropped since it is now full-screen. */
  .flightCard{
    position:relative;
    width:100vw;
    height:100dvh;
    border-radius:0;overflow:hidden;background:#000;
    border:none;box-shadow:none;
    transform:scale(.985);transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .flightScrim.open .flightCard{transform:scale(1)}
  .flightCard svg#fScene{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* ── safe-area-aware top-right pill row (close/replay/ghosts/clear) ──
     Fullscreen/full-bleed overlay: these controls sit inset from the true
     viewport edge, so on a notched/rounded device (future native shell)
     they clear the safe area instead of hugging the physical edge. Purely
     additive — visual position on a normal browser (inset=0) is unchanged. */
  .flightClose{position:absolute;top:max(10px,env(safe-area-inset-top));right:max(10px,env(safe-area-inset-right));z-index:6;width:36px;height:36px;border-radius:999px;
    border:1px solid var(--line);background:rgba(10,18,30,.7);color:var(--ink);font-size:18px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .flightClose::after{content:"";position:absolute;inset:-5px;border-radius:999px} /* ≥44px hit target */
  .flightClose:hover{background:rgba(255,255,255,.12)}
  .flightClose:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .flightReplay{position:absolute;top:max(10px,env(safe-area-inset-top));right:calc(max(10px,env(safe-area-inset-right)) + 44px);z-index:6;height:36px;padding:0 15px;border-radius:999px;
    border:1px solid var(--accent-line);background:rgba(10,18,30,.7);color:var(--accent);
    font-size:12px;font-weight:700;line-height:1;cursor:pointer;font-family:inherit;letter-spacing:.04em;
    display:inline-flex;align-items:center;gap:6px}
  .flightReplay::after{content:"";position:absolute;left:0;right:0;top:50%;height:46px;transform:translateY(-50%)} /* ≥44px hit target */
  .flightReplay:hover{background:var(--accent-soft);border-color:var(--accent)}
  .flightReplay:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* ── MONETIZATION: discreet "N free shots left" nudge — top-center, clear
       of the top-left carry hero and the top-right pill stack. Toggled via
       the [hidden] attribute (not display, so the base rule never fights the
       UA [hidden]{display:none} — see :not([hidden]) below); text is set by
       refreshNudge(). Static (non-live-region) — aria-hidden, no announcements
       on every play. */
  .saNudge{position:absolute;top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    z-index:6;height:28px;padding:0 14px;border-radius:999px;
    border:1px solid var(--accent-line);background:rgba(10,18,30,.7);color:var(--accent);
    font-size:11px;font-weight:700;line-height:1;letter-spacing:.04em;font-family:inherit;
    white-space:nowrap;pointer-events:none}
  .saNudge:not([hidden]){display:flex;align-items:center;justify-content:center}
  /* ── STAGE 3: ghost toggle pill + clear control (same pill family as Replay) ── */
  .ghostPill{position:absolute;top:max(10px,env(safe-area-inset-top));right:calc(max(10px,env(safe-area-inset-right)) + 142px);z-index:6;height:36px;padding:0 15px;border-radius:999px;
    border:1px solid rgba(159,178,200,.5);background:rgba(10,18,30,.7);color:var(--ghost);
    font-size:12px;font-weight:700;line-height:1;cursor:pointer;font-family:inherit;letter-spacing:.04em;
    display:inline-flex;align-items:center;gap:6px}
  .ghostPill::after{content:"";position:absolute;inset:-5px;border-radius:999px} /* ≥44px hit target */
  .ghostPill .gdot{width:8px;height:8px;border-radius:50%;background:var(--ghost);flex:0 0 auto;box-sizing:border-box}
  .ghostPill:hover{background:rgba(159,178,200,.14)}
  .ghostPill:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* off-state is NOT colour-only: hollow dot + aria-pressed carry the state */
  .ghostPill[aria-pressed="false"]{color:var(--muted);border-color:var(--line)}
  .ghostPill[aria-pressed="false"] .gdot{background:transparent;border:1.5px solid var(--muted)}
  .ghostClear{position:absolute;top:max(10px,env(safe-area-inset-top));right:calc(max(10px,env(safe-area-inset-right)) + 228px);z-index:6;width:36px;height:36px;border-radius:999px;
    border:1px solid var(--line);background:rgba(10,18,30,.7);color:var(--muted);font-size:16px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-family:inherit}
  .ghostClear::after{content:"";position:absolute;inset:-5px;border-radius:999px} /* ≥44px hit target */
  .ghostClear:hover{background:rgba(255,255,255,.12);color:var(--ink)}
  .ghostClear:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* ── GHOST LAB: legend column (pin + per-ghost chips), below the top pill row ── */
  .fLegend{position:absolute;top:calc(max(10px,env(safe-area-inset-top)) + 46px);right:max(10px,env(safe-area-inset-right));
    z-index:6;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .fChip{position:relative;height:36px;padding:0 12px;border-radius:999px;
    border:1px solid rgba(159,178,200,.5);background:rgba(10,18,30,.7);color:var(--ghost);
    font-size:12px;font-weight:700;line-height:1;cursor:pointer;font-family:inherit;letter-spacing:.03em;
    display:inline-flex;align-items:center;gap:7px;font-variant-numeric:tabular-nums}
  .fChip::after{content:"";position:absolute;left:0;right:0;top:-4px;bottom:-4px;border-radius:999px} /* 44px hit target; 8px gap keeps neighbours clear */
  .fChip:hover{background:rgba(159,178,200,.14)}
  .fChip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .fChip .dashSwatch{flex:0 0 auto;display:block}
  /* hidden-ghost state is NOT colour-only: strikethrough + dimmed swatch + aria-pressed */
  .fChip-ghost[aria-pressed="false"]{color:var(--muted);border-color:var(--line)}
  .fChip-ghost[aria-pressed="false"] .cl,.fChip-ghost[aria-pressed="false"] .cd{text-decoration:line-through}
  .fChip-ghost[aria-pressed="false"] .dashSwatch{opacity:.35}
  /* pinned state is NOT colour-only: label text changes Pin → <carry>m */
  .fChip-pin[aria-pressed="true"]{color:#E8F0FB;border-color:rgba(232,240,251,.6)}
  .fChip-pin .pinGlyph{font-size:14px;line-height:1}
  /* ── STAGE 3: "what changed" micro-label under the left hero stack ── */
  .fDelta{position:absolute;left:max(3.4%,env(safe-area-inset-left));top:calc(15% + clamp(84px,19vh,118px));z-index:5;pointer-events:none;
    display:flex;flex-direction:column;gap:3px;max-width:46%;
    text-shadow:0 0 14px rgba(0,0,0,.6);
    transition:opacity .3s ease, transform .3s ease}
  .fDelta.is-hidden{opacity:0;transform:translateY(6px)}
  .fDelta .dl1{font-size:clamp(10px,1.9vh,12.5px);font-weight:700;color:var(--ink);
    display:flex;align-items:center;flex-wrap:wrap;gap:5px;line-height:1.35}
  .fDelta .dl1 .pdot{width:8px;height:8px;border-radius:2px;display:inline-block;flex:0 0 auto}
  .fDelta .dl2{font-size:clamp(10px,1.9vh,12.5px);font-weight:700;font-variant-numeric:tabular-nums;
    display:flex;flex-wrap:wrap;gap:5px;line-height:1.35}
  /* FOCUS-MODES: coach-cue line (shares the fDelta reveal, same styling
     family as the coachLine .cue on the base instrument) */
  .fDelta .dl3{font-size:clamp(9.5px,1.7vh,11.5px);font-weight:500;color:var(--muted);
    line-height:1.35;margin-top:1px;max-width:32ch}
  .fDelta .sep{color:var(--muted)}
  .fDelta .neu{color:var(--ink)}
  .fDelta .good{color:var(--good)}
  .fDelta .warn{color:var(--warn)}
  /* ── LEFT HERO STACK (Layout B): big TOTAL + offline only ──
     Fullscreen overlay: left inset stays clear of a device's safe area
     (notch/rounded corner) in addition to the existing 3.4% breathing room. */
  .flightCarry{position:absolute;top:15%;left:max(3.4%,env(safe-area-inset-left));z-index:5;pointer-events:none;line-height:1;text-align:left;
    text-shadow:0 0 22px rgba(0,0,0,.65)}
  .flightCarry .num{font-size:clamp(30px,8vh,60px);font-weight:800;letter-spacing:-.03em;color:#fff;line-height:.9;
    font-variant-numeric:tabular-nums;text-shadow:0 0 28px rgba(34,227,214,.6)}
  .flightCarry .num .u{font-size:.4em;font-weight:700;color:var(--accent);margin-left:3px;vertical-align:.2em}
  .flightCarry .lab{font-size:clamp(8px,1.6vh,11px);letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .flightCarry .offline{margin-top:10px;font-variant-numeric:tabular-nums;font-weight:800;
    font-size:clamp(15px,3.4vh,24px);color:var(--accent);line-height:1;text-shadow:0 0 18px rgba(34,227,214,.4)}
  .flightCarry .offline .side{font-size:.6em;font-weight:700;letter-spacing:.06em;margin-left:3px;color:#fff}

  /* ── LAYOUT B (BOTTOM ONLY): one aligned rectangle along the bottom ──
     [ club-speed block (2 chip-rows tall) ] + [ 4×2 parameter chips ].
     Flight is the full-width hero on top; the left hero column (Total →
     Offline) stays clear above the bottom frame.
     Fullscreen overlay: insets combine the existing 3.4% breathing room
     with env(safe-area-inset-*) so the chip grid gets full room on a normal
     browser (safe-area = 0 everywhere → identical to before) and clears a
     device's home-indicator / rounded-corner area on a future native shell. */
  .fBottom{position:absolute;z-index:5;
    left:max(3.4%,env(safe-area-inset-left));right:max(3.4%,env(safe-area-inset-right));
    bottom:max(3.4%,env(safe-area-inset-bottom));
    display:flex;align-items:stretch;gap:8px;
    /* CHANGE 1: revealed only AFTER the ball lands (fade + slide-up) */
    transition:opacity .5s ease, transform .5s ease}
  /* hidden during the flight so the launch + low bow stay unobstructed */
  .fBottom.is-hidden{opacity:0;transform:translateY(12px);pointer-events:none}
  .fData{flex:1 1 auto;min-width:0;
    display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;gap:8px}
  .fData .cell{width:100%}
  /* each cell is a real button (raised pressable pill) that opens the glass explainer popover.
     A2 CLEAN — label ABOVE (small uppercase muted), big value below (tabular-nums)
     + tiny muted unit, soft-depth surface, "›" chevron, plus a thin 2px range
     UNDERLINE along the bottom edge filled with cyan to show the value's position. */
  .fData .cell{appearance:none;font-family:inherit;cursor:pointer;
    display:flex;flex-direction:column;align-items:stretch;justify-content:center;gap:4px;min-width:0;
    min-height:44px;padding:8px 10px 15px;text-align:left;color:var(--ink);overflow:hidden;
    background:linear-gradient(180deg, rgba(22,34,50,.88), rgba(12,19,29,.88));
    border:1px solid rgba(255,255,255,.10);border-radius:12px;position:relative;
    box-shadow:0 6px 16px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    transition:transform .12s ease, box-shadow .12s ease, border-color .15s ease, background .15s ease}
  .fData .cell:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.18);
    box-shadow:0 10px 22px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.08)}
  .fData .cell:active,
  .fData .cell[aria-expanded="true"]{transform:scale(.97);
    box-shadow:0 4px 10px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.05);border-color:rgba(255,255,255,.2)}
  .fData .cell:focus-visible{outline:3px solid #fff;outline-offset:2px}
  /* chevron affordance — bottom-right corner */
  .fData .cell::after{content:"›";position:absolute;right:8px;bottom:6px;
    color:var(--muted);font-weight:800;font-size:clamp(10px,1.3vw,13px);opacity:.5;line-height:1}
  .fData .cell:hover::after{opacity:.8}
  /* label — own row, full width, ABOVE the value. */
  .fData .cell .k{font-size:clamp(8px,1.1vw,11.5px);letter-spacing:.04em;text-transform:uppercase;color:var(--muted);
    white-space:nowrap;display:flex;align-items:center;gap:4px;line-height:1;order:-1}
  /* value — own row, full width, dominant. */
  .fData .cell .valrow{display:flex;align-items:center;min-width:0}
  .fData .cell .v{font-weight:800;font-variant-numeric:tabular-nums;font-size:clamp(12.5px,1.7vw,22px);color:var(--ink);white-space:nowrap;line-height:1;min-width:0;padding-right:11px;letter-spacing:-.012em}
  .fData .cell .v small{font-size:.52em;color:var(--muted);font-weight:600;margin-left:2px}
  /* hero chips (Carry/Ball Speed/Smash): cyan accent value */
  .fData .cell.hero .v{color:var(--accent);text-shadow:0 0 14px rgba(34,227,214,.35)}
  /* A2 range underline — thin 2px bar along the bottom edge, cyan fill shows
     the value's position in its range (signed metrics fill from CENTRE). */
  .fData .cell .rng{position:absolute;left:11px;right:11px;bottom:7px;height:2px;border-radius:2px;
    background:rgba(255,255,255,.10);display:block}
  .fData .cell .rng .fill{position:absolute;top:0;bottom:0;border-radius:2px;background:var(--accent);width:0;
    transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .fData .cell[data-signed] .rng .fill{background:rgba(34,227,214,.7)}
  /* Shape — text-only, no underline. Its value can be a two-word string
     ("Pull Hook"), so allow it to scale a touch smaller than the numeric chips
     and lose the chevron padding so it always fits on one line. */
  .fData .cell.noRange{padding-bottom:8px}
  .fData .cell.noRange .v{font-size:clamp(12px,1.55vw,20px);padding-right:9px}
  @media (prefers-reduced-motion:reduce){ .flightScrim,.flightCard,.fBottom{transition:none} .fData .cell .rng .fill{transition:none} }

  /* ── CLUB SPEED block — far LEFT of the bottom frame, exactly 2 chip-rows tall ──
     Holds: CLUB SPEED label, big NN mph value, and −/slider/+ steppers.
     Changing it re-solves + replays the flight. */
  .fSpeed{flex:0 0 auto;width:clamp(150px,16vw,200px);
    display:flex;flex-direction:column;justify-content:center;gap:12px;
    background:linear-gradient(180deg, rgba(20,32,48,.85), rgba(11,17,26,.85));
    border:1px solid rgba(255,255,255,.10);border-radius:var(--radius-card);
    padding:12px 14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 8px 22px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.06)}
  .fSpeed label{font-size:clamp(8px,1.05vw,11px);font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .fSpeed .val{font-weight:700;font-size:clamp(22px,3.2vw,30px);color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap;line-height:1;margin-top:3px}
  .fSpeed .val small{font-size:.42em;color:var(--muted);font-weight:600;margin-left:3px}
  .fSpeed .ctrl{display:flex;align-items:center;gap:7px;min-height:44px}
  .fSpeed .step{appearance:none;flex:0 0 auto;width:44px;height:44px;border-radius:10px;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.16);color:var(--ink);
    font-weight:700;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;font-family:inherit}
  .fSpeed .step:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.26)}
  .fSpeed .step:active{transform:scale(.94)}
  .fSpeed .step:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .fSpeed input[type=range]{flex:1 1 auto;width:100%;height:44px;min-width:0;accent-color:var(--accent);background:transparent;cursor:pointer}
  .fSpeed input[type=range]:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
  /* once wrapped in .rwrap, the wrapper becomes the flex item in the −/slider/+ ctrl */
  .fSpeed .ctrl .rwrap{flex:1 1 auto;min-width:0}

  /* CHANGE 2: lateral side references (STAGE 5 — demoted to white-alpha neutral:
     reference geometry, not live-ball data; labels keep a touch more alpha for AA)
     + offline badge (STAGE 5 keeps the offline badge cyan — it IS live-ball data) */
  #fLatRef line{stroke:rgba(230,240,250,.20)}
  #fLatRef text{fill:rgba(230,240,250,.55);font-family:inherit;font-weight:600}
  #fOfflineBox{fill:rgba(8,16,20,.72);stroke:rgba(34,227,214,.28)}
  #fOfflineTxt{fill:#22E3D6;font-family:inherit;font-weight:700}

  /* ── rotate hint (portrait) ── */
  .rotate{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;background:var(--bg);text-align:center;padding:24px}
  .rotate .ico{font-size:46px;animation:tilt 1.8s ease-in-out infinite}
  .rotate p{font-size:15px;max-width:240px;color:var(--ink)}
  @keyframes tilt{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(78deg)}}
  @media (orientation:portrait){.rotate{display:flex}}
  @media (prefers-reduced-motion:reduce){.rotate .ico{animation:none}}

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}

  /* ══ RESPONSIVE — narrower landscape phones (≤800px wide) ══════════
     The top strip packs FOUR flex groups (title+nav / segmented control /
     speed slider / play-flight+help) into one 40px row. At ~740px wide
     they collide (mirrors the density guardrail already applied in
     impact-focus-mock.html's own ≤800px block). Shrink the least-critical
     text first: the "Geometry" nav label, the speed number label, the
     segmented control's padding, then the Play-flight button's label.
     Breakpoint 960 (not 800): on-device the landscape safe-area insets shrink
     the CONTENT box ~90px below the viewport width, so a 844–932px phone still
     needs this compact layout — otherwise the full layout overflows the
     notch-padded strip and the items overlap. */
  @media (max-width:960px){
    .ts-title{display:none}                          /* "See the Shot" — least essential at this width */
    .modnav a.tab{padding:0 6px;font-size:10px}
    .ts-center .speedwrap{max-width:min(22vw,150px)}
    .ts-center label{display:none}                    /* keep the live mph value, drop the "Club speed" label */
    .playpill{padding:0 9px;font-size:10px;gap:4px}
    .playpill .pico{font-size:9px}
  }
  @media (max-width:620px){
    .modnav a.tab:not([aria-current]){display:none}   /* drop the "Geometry" cross-link; keep the current-page "Impact" tab + Home icon */
  }

  /* global reduced-motion reset (matches index.html) */
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
  <div class="app">

    <!-- ══ TOP STRIP ══ -->
    <div class="topstrip">
      <div class="ts-left">
        <span class="ts-title">See the Shot</span>
        <nav class="modnav" aria-label="Modules">
          <a class="home" href="./index.html" aria-label="Home"><svg width="20" height="20" viewBox="0 0 52 52" fill="none" aria-hidden="true"><path d="M11 45 C 16 26, 24 18, 35 15 M21 39 L 30 24 L 43 45" stroke="currentColor" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="37" cy="15" r="5.2" fill="currentColor"/></svg></a>
          <a class="tab" href="./geometry.html">Geometry</a>
          <a class="tab" href="#" aria-current="page">Impact</a>
        </nav>
      </div>
      <!-- DUAL-LENS: the [Direction|Launch|Flight] focus toggle is retired — both
           lenses are shown at once and Flight opens via the Play-flight button. -->

      <div class="ts-center">
        <div class="speedwrap">
          <label for="s_speed">Club speed</label>
          <input type="range" id="s_speed" min="40" max="130" step="1" value="90"
                 aria-describedby="speed_help">
          <span class="speedval" id="v_speed" aria-hidden="true">90 mph</span>
          <span id="speed_help" class="sr-only">Global club-head speed in miles per hour. Drives ball speed and carry.</span>
        </div>
      </div>
      <div class="ts-right">
        <button class="playpill" id="playFlight" aria-haspopup="dialog" aria-controls="flightScrim">
          <span class="pico" aria-hidden="true">▶</span> Play flight
        </button>
        <button id="helpBtn" class="sa-help" type="button" aria-label="Replay the walkthrough" title="Help">?</button>
      </div>
    </div>

    <!-- ══ MAIN — FOCUS-MODE STAGE ══ -->
    <main class="main" id="stage">

    <!-- ═══ DIRECTION FOCUS ═══ -->
    <div class="focusPanel active" id="panelDir" data-focus="direction">

      <!-- HERO — DIRECTION (top-down) -->
      <section class="heroLens" id="lensDir" aria-label="Direction lens, top-down view">
        <div class="lenshead"><div class="lh1">Direction</div></div>
        <!-- STAGE 6 — landing-predictor live region: announces the predicted finish
             on settle (debounced ~800ms after the last input), separate from the
             lens's static aria-label so screen readers get a calm, single update. -->
        <div class="sr-only" id="predLive" aria-live="polite" aria-atomic="true"></div>
        <svg id="svgDir" viewBox="0 0 400 360" preserveAspectRatio="xMidYMid meet" role="img"
             aria-label="Top-down view from the ball. A vertical target line runs straight ahead. A red face arrow and a blue path arrow rotate from the ball to show clubface aim and swing direction. A yellow launch arrow shows the start line, bending toward the spin side. A cyan marker shows the predicted landing position.">
          <defs>
            <!-- userSpaceOnUse so the glow stays anchored to the ball/target axis even
                 though fitLenses() widens the background rect to the live viewBox -->
            <radialGradient id="dirGlow" gradientUnits="userSpaceOnUse" cx="200" cy="281" r="240">
              <stop offset="0" stop-color="rgba(34,227,214,.10)"/><stop offset="1" stop-color="rgba(34,227,214,0)"/>
            </radialGradient>
          </defs>
          <rect x="-600" y="0" width="1600" height="360" fill="url(#dirGlow)"/>
          <!-- target line up from the ball -->
          <line x1="200" y1="330" x2="200" y2="40" stroke="var(--accent-line)" stroke-width="1.5" stroke-dasharray="5 8"/>
          <circle cx="200" cy="40" r="4" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity=".8"/>
          <text x="200" y="30" text-anchor="middle" font-size="20" fill="var(--muted)" style="font-family:inherit;letter-spacing:.1em">TARGET</text>
          <!-- face↔path gap field (subtle, curved outer arc) -->
          <path id="dirCone" fill="rgba(34,227,214,.04)" stroke="none"/>
          <!-- STAGE 6 — LANDING PREDICTOR: neutral reference geometry (centre tick +
               lateral scale hints) in the far zone, BEHIND the arrows in z-order.
               Purely decorative reference lines — neutral white-alpha per the app's
               "reference geometry is neutral" colour rule. -->
          <g id="predRef" aria-hidden="true" opacity=".85">
            <line x1="180" y1="52" x2="220" y2="52" stroke="rgba(230,240,250,.20)" stroke-width="1.5"/>
            <line id="predTickL" x1="140" y1="56" x2="140" y2="48" stroke="rgba(230,240,250,.20)" stroke-width="1"/>
            <line id="predTickR" x1="260" y1="56" x2="260" y2="48" stroke="rgba(230,240,250,.20)" stroke-width="1"/>
            <text id="predLabL" x="140" y="46" text-anchor="middle" font-size="20" fill="rgba(230,240,250,.35)" style="font-family:inherit;letter-spacing:.05em">L</text>
            <text id="predLabR" x="260" y="46" text-anchor="middle" font-size="20" fill="rgba(230,240,250,.35)" style="font-family:inherit;letter-spacing:.05em">R</text>
          </g>
          <!-- ── curve hint (PRED_CURVE) — thin top-down shot-shape line from the
               ball (200,330) to the predicted finish, following startDirection +
               curve. Gated by the PRED_CURVE const in JS; remove via that const.
               Declared BEFORE #predGroup and the arrows: renders under both. ── -->
          <g id="predCurveG" aria-hidden="true" opacity="0">
            <path id="predCurve" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <!-- ── /curve hint (PRED_CURVE) ── -->
          <!-- STAGE 6 — predictor dot: SMALL cyan dot at the predicted lateral
               finish (mapped from solveFlight().offline), slim halo, subtle GSAP
               breathing pulse, bare unboxed label below the dot.
               BEHIND the face/path/launch arrows (declared before them). -->
          <g id="predGroup" aria-hidden="true" opacity="0">
            <circle id="predHalo" cx="200" cy="52" r="9" fill="var(--accent)" opacity=".2"/>
            <circle id="predDot" cx="200" cy="52" r="4.5" fill="var(--accent)" stroke="rgba(255,255,255,.65)" stroke-width="1"/>
            <g id="predEdge" opacity="0">
              <circle cx="200" cy="52" r="7.5" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
            </g>
            <text id="predLabel" x="200" y="72" text-anchor="middle" font-size="20" font-weight="600" fill="var(--accent)" style="font-family:inherit">On line</text>
          </g>
          <!-- ball -->
          <circle cx="200" cy="330" r="5" fill="#fff" opacity=".9"/>
          <!-- PATH arrow (pointer enhancement; the docked slider is the accessible control) -->
          <g class="arrowG" id="g_path" data-key="path" aria-hidden="true">
            <line class="aline" id="line_path" x1="200" y1="330" x2="200" y2="111" stroke="var(--c-path)" stroke-width="9"/>
            <polygon id="head_path" points="200,95 184,125 200,116 216,125" fill="var(--c-path)"/>
          </g>
          <!-- LAUNCH DIRECTION (derived 0.75·face+0.25·path). PURELY VISUAL:
               decorative indicator only — no role/tabindex/hit-rect, aria-hidden.
               Still NON-draggable (no data-key). Explanation lives on the rail. -->
          <!-- LAUNCH DIR — a curved shaft that BENDS toward the spin side
               (fade→right / draw→left). The bend's size + sign are set live from
               solveFlight().spinAxis in renderLaunchBend(); the group itself is
               rotated to the START direction by applyArrowTransform, so the bend
               rides on top = physically honest (starts on the start-line, curves
               with the spin). Replaces the old separate curve line. -->
          <g class="launchG" id="g_launchDir" aria-hidden="true">
            <path class="lline" id="line_launchDir" d="M200,330 Q200,231 200,132" fill="none" stroke="var(--c-launch)" stroke-width="5.5" stroke-linecap="round"/>
            <polygon id="head_launchDir" points="0,0 -12,26 0,18 12,26" fill="var(--c-launch)" transform="translate(200,132)"/>
          </g>
          <!-- FACE arrow (pointer enhancement; the docked slider is the accessible control) -->
          <g class="arrowG" id="g_face" data-key="face" aria-hidden="true">
            <line class="aline" id="line_face" x1="200" y1="330" x2="200" y2="111" stroke="var(--c-face)" stroke-width="9"/>
            <polygon id="head_face" points="200,95 184,125 200,116 216,125" fill="var(--c-face)"/>
          </g>
          <!-- value chips (chip-fade ON) -->
          <g class="vchipWrap" id="vchip_path" aria-hidden="true"><rect class="vchip" x="0" y="0" width="58" height="22" rx="6"/><text class="vchipText" x="0" y="0" text-anchor="middle" fill="var(--c-path)"></text></g>
          <!-- LAUNCH DIRECTION value chip (fades with the Direction-lens arrows) -->
          <g class="vchipWrap" id="vchip_launchDir" data-launch="launchDir" aria-hidden="true"><rect class="vchip" x="0" y="0" width="58" height="22" rx="6"/><text class="vchipText" x="0" y="0" text-anchor="middle" fill="var(--c-launch)"></text></g>
          <g class="vchipWrap" id="vchip_face" aria-hidden="true"><rect class="vchip" x="0" y="0" width="58" height="22" rx="6"/><text class="vchipText" x="0" y="0" text-anchor="middle" fill="var(--c-face)"></text></g>
        </svg>
        <div class="minidock">
          <div class="mini k-face">
            <div class="mtop"><span class="mname"><span class="mdot" style="background:var(--c-face)" aria-hidden="true"></span><label for="s_face">Face</label></span><span class="mval" id="v_face" aria-hidden="true">−2.0°</span></div>
            <input type="range" id="s_face" min="-20" max="20" step="0.1" value="-2">
          </div>
          <div class="mini k-path">
            <div class="mtop"><span class="mname"><span class="mdot" style="background:var(--c-path)" aria-hidden="true"></span><label for="s_path">Path</label></span><span class="mval" id="v_path" aria-hidden="true">+2.0°</span></div>
            <input type="range" id="s_path" min="-20" max="20" step="0.1" value="2">
          </div>
        </div>
        <!-- HERO CARDS — Direction (max 4): re-homed rail cells, same popover wiring -->
        <div class="heroResults" id="heroResultsDir" role="group" aria-label="Direction results — tap any value for an explanation"></div>
        <div class="coachWrap">
          <div class="coachLine"><span class="coachDot" aria-hidden="true"></span><span class="cause" id="causeDir">Main cause: —</span><span class="cue" id="cueDir"></span></div>
        </div>
      </section>

    </div>

    <!-- ═══ LAUNCH FOCUS ═══ -->
    <div class="focusPanel active" id="panelLaunch" data-focus="launch">

      <!-- HERO — LAUNCH (side-on). This is THE interactive height lens — keeps
           every original id (svgHt/g_attack/g_loft/htCone/s_attack/s_loft/
           vchip_*) so the existing arrow-rotation, drag, slider-bind, haptics
           and chip-fade JS drives it unchanged; it is simply re-homed from the
           old fixed right-hand panel into the Launch focus's hero slot. -->
      <section class="heroLens" id="lensHt" aria-label="Launch lens, side-on view">
        <div class="lenshead"><div class="lh1">Launch</div></div>
        <svg id="svgHt" viewBox="0 0 400 360" preserveAspectRatio="xMidYMid meet" role="img"
             aria-label="Side-on view. A ground line runs along the bottom. From the impact point, a pink attack arrow and a violet dynamic-loft arrow rotate to show the club's descent and delivered loft.">
          <defs>
            <!-- userSpaceOnUse so the glow stays anchored to the impact zone even
                 though fitLenses() widens the background rect to the live viewBox -->
            <radialGradient id="htGlow" gradientUnits="userSpaceOnUse" cx="88" cy="223" r="280">
              <stop offset="0" stop-color="rgba(34,227,214,.10)"/><stop offset="1" stop-color="rgba(34,227,214,0)"/>
            </radialGradient>
          </defs>
          <rect x="-700" y="0" width="2800" height="360" fill="url(#htGlow)"/>
          <!-- ground line — spans far past the widest fitted viewBox (cropped by it) -->
          <line x1="-700" y1="250" x2="2100" y2="250" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
          <text id="htGroundLab" x="372" y="272" text-anchor="end" font-size="14" fill="var(--muted)" style="font-family:inherit;letter-spacing:.1em">GROUND</text>
          <!-- impact point + ball -->
          <circle cx="80" cy="250" r="5" fill="#fff" opacity=".9"/>
          <!-- attack↔loft gap field (subtle, curved outer arc) — behind the arrows -->
          <path id="htCone" fill="rgba(34,227,214,.04)" stroke="none"/>
          <!-- ATTACK arrow (shorter, lower of the pair) -->
          <g class="arrowG" id="g_attack" data-key="attack" aria-hidden="true">
            <line class="aline" id="line_attack" x1="80" y1="250" x2="284" y2="250" stroke="var(--c-attack)" stroke-width="7"/>
            <polygon id="head_attack" points="300,250 270,234 279,250 270,266" fill="var(--c-attack)"/>
          </g>
          <!-- LAUNCH ANGLE (derived 0.62·loft+0.25·attack). PURELY VISUAL:
               decorative indicator only — no role/tabindex/hit-rect, aria-hidden.
               Still NON-draggable (no data-key). Explanation lives on the hero cards. -->
          <g class="launchG" id="g_launchAng" aria-hidden="true">
            <line class="lline" id="line_launchAng" x1="80" y1="250" x2="264" y2="250" stroke="var(--c-launch)" stroke-width="4"/>
            <polygon id="head_launchAng" points="280,250 254,238 262,250 254,262" fill="var(--c-launch)"/>
          </g>
          <!-- DYNAMIC LOFT arrow (longer) -->
          <g class="arrowG" id="g_loft" data-key="loft" aria-hidden="true">
            <line class="aline" id="line_loft" x1="80" y1="250" x2="284" y2="250" stroke="var(--c-loft)" stroke-width="7"/>
            <polygon id="head_loft" points="300,250 270,234 279,250 270,266" fill="var(--c-loft)"/>
          </g>
          <g class="vchipWrap" id="vchip_attack" aria-hidden="true"><rect class="vchip" x="0" y="0" width="58" height="22" rx="6"/><text class="vchipText" x="0" y="0" text-anchor="middle" fill="var(--c-attack)"></text></g>
          <!-- LAUNCH ANGLE value chip (fades with the Height-lens arrows) -->
          <g class="vchipWrap" id="vchip_launchAng" data-launch="launchAng" aria-hidden="true"><rect class="vchip" x="0" y="0" width="58" height="22" rx="6"/><text class="vchipText" x="0" y="0" text-anchor="middle" fill="var(--c-launch)"></text></g>
          <g class="vchipWrap" id="vchip_loft" aria-hidden="true"><rect class="vchip" x="0" y="0" width="58" height="22" rx="6"/><text class="vchipText" x="0" y="0" text-anchor="middle" fill="var(--c-loft)"></text></g>
        </svg>
        <div class="minidock">
          <div class="mini k-attack">
            <div class="mtop"><span class="mname"><span class="mdot" style="background:var(--c-attack)" aria-hidden="true"></span><label for="s_attack">Attack</label></span><span class="mval" id="v_attack" aria-hidden="true">−3.0°</span></div>
            <input type="range" id="s_attack" min="-15" max="15" step="0.1" value="-3">
          </div>
          <div class="mini k-loft">
            <div class="mtop"><span class="mname"><span class="mdot" style="background:var(--c-loft)" aria-hidden="true"></span><label for="s_loft">Dyn loft</label></span><span class="mval" id="v_loft" aria-hidden="true">30.0°</span></div>
            <input type="range" id="s_loft" min="0" max="60" step="0.1" value="30">
          </div>
        </div>
        <!-- HERO CARDS — Launch (max 4): re-homed rail cells, same popover wiring -->
        <div class="heroResults" id="heroResultsLaunch" role="group" aria-label="Launch results — tap any value for an explanation"></div>
      </section>
    </div>
  </main>

  <!-- ══ GLASS POPOVER (single reused node) — STAGE 7 three-section body ══ -->
  <div class="pop" id="pop" role="dialog" aria-modal="false" aria-labelledby="popHeadName" hidden>
    <span class="caret" id="popCaret" aria-hidden="true"></span>
    <div class="plate">
      <div class="pophead">
        <span class="pn" id="popHeadName">—</span>
        <span class="pt" id="popHeadPlane" hidden>—</span>
        <span class="pv" id="popHeadVal">—</span>
      </div>
      <!-- SECTION 1 — WHAT IT IS -->
      <p class="pdesc" id="popDesc"></p>
      <!-- SECTION 2 — HOW IT'S CREATED (mini SVG diagram, built per-parameter) -->
      <div class="seclab">How it's created</div>
      <div class="popdiagram" id="popDiagram"></div>
      <!-- SECTION 3 — WHAT AFFECTS IT (ranked driver chips, informative text) -->
      <div class="seclab">What affects it</div>
      <div class="drivers" id="popDrivers"></div>
    </div>
  </div>

  <!-- ══ PLAY-FLIGHT OVERLAY ══ -->
  <div class="flightScrim" id="flightScrim">
    <div class="flightCard" id="flightCard" role="dialog" aria-modal="true" aria-label="Ball flight playback">
      <button class="flightClose" id="flightClose" aria-label="Close flight playback">×</button>
      <button class="flightReplay" id="flightReplay" type="button"><span aria-hidden="true">↻</span> Replay</button>
      <!-- MONETIZATION: discreet free-shots-remaining nudge (hidden by default;
           refreshNudge() shows it only in the last 1-2 free shots). Static text,
           not a live region — aria-hidden so it never spams a screen reader. -->
      <div class="saNudge" id="saNudge" hidden aria-hidden="true"></div>
      <!-- STAGE 3: ghost toggle (aria-pressed, default ON) + clear-history control -->
      <button class="ghostPill" id="fGhostPill" type="button" aria-pressed="true"><span class="gdot" aria-hidden="true"></span> Ghosts</button>
      <button class="ghostClear" id="fGhostClear" type="button" aria-label="Clear ghosts">×</button>
      <!-- GHOST LAB: pin-baseline + per-ghost legend chips (built by buildGhostLegend) -->
      <div class="fLegend" id="fGhostLegend" role="group" aria-label="Shot comparison">
        <button class="fChip fChip-pin" id="fPinBtn" type="button" aria-pressed="false"
          aria-label="Pin current shot as baseline"><span class="pinGlyph" aria-hidden="true">⊙</span><span id="fPinTxt">Pin</span></button>
      </div>
      <!-- LEFT HERO STACK (Layout B): big TOTAL count-up + offline only.
           Visual hero is aria-hidden (updates every frame); #fCarryLive is the ONLY live region. -->
      <div class="flightCarry" aria-hidden="true">
        <div class="num"><span id="fCarryNum">0</span><span class="u">m</span></div>
        <div class="lab">Total</div>
        <div class="offline"><span id="fHeroOffNum">0</span> m<span class="side" id="fHeroOffSide">R</span></div>
      </div>
      <!-- STAGE 3: "what changed" micro-label — cause (param delta) + effect vs ghosts[0].
           Revealed +150ms after data-reveal; hidden when no ghost exists. -->
      <div class="fDelta is-hidden" id="fDelta" aria-live="polite" hidden>
        <div class="dl1" id="fDeltaCause"></div>
        <div class="dl2" id="fDeltaEffect"></div>
        <!-- FOCUS-MODES: the same main-cause coach cue shown on the Direction/
             Launch coach lines, live-updated with state (see updateCoachLines
             in the instrument script). Sits directly under the delta line. -->
        <div class="dl3" id="flightCoachCue"></div>
      </div>
      <div class="sr-only" id="fCarryLive" aria-live="polite" aria-atomic="true"></div>

      <svg id="fScene" viewBox="0 0 960 540" preserveAspectRatio="xMidYMid slice" role="img"
           aria-label="Driving-range ball flight: the ball launches from the tee, rises to apex and lands downrange on the fairway.">
        <defs>
          <!-- cyan/teal duotone grade overlay -->
          <linearGradient id="ftealGrade" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#0a3a3a" stop-opacity=".06"/>
            <stop offset=".55" stop-color="#147878" stop-opacity=".20"/>
            <stop offset="1" stop-color="#22E3D6" stop-opacity=".15"/>
          </linearGradient>
          <linearGradient id="fground" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#0c2a1c"/><stop offset=".5" stop-color="#0a3320"/><stop offset="1" stop-color="#06351f"/>
          </linearGradient>
          <radialGradient id="fapexGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#22E3D6" stop-opacity=".9"/><stop offset="1" stop-color="#22E3D6" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="flandGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#22E3D6" stop-opacity=".75"/><stop offset="1" stop-color="#22E3D6" stop-opacity="0"/>
          </radialGradient>
          <!-- haze softness lives in the gradient shape; the BAND's element
               opacity (.22 base) carries the level so ambient breathing only
               ever animates element opacity, never the gradient. -->
          <linearGradient id="fhaze" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#9fd8d2" stop-opacity="0"/>
            <stop offset=".5" stop-color="#bfeae4" stop-opacity="1"/>
            <stop offset="1" stop-color="#bfeae4" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="ftracerGrad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0" stop-color="#22E3D6" stop-opacity=".15"/>
            <stop offset=".5" stop-color="#22E3D6" stop-opacity=".95"/>
            <stop offset="1" stop-color="#eafffb"/>
          </linearGradient>
          <clipPath id="fclip"><rect x="0" y="0" width="960" height="540"/></clipPath>
        </defs>

        <g clip-path="url(#fclip)">
          <!-- dusk range photo, darkened (scene C base) -->
          <image id="fBgImg" href="./assets/range-day.png" x="-40" y="-40" width="1040" height="620"
                 preserveAspectRatio="xMidYMid slice" opacity="0.46"/>
          <rect x="0" y="0" width="960" height="540" fill="#06121a" opacity="0.42"/>
          <!-- ground tint — starts at the photo tree-line (yH≈265) so it greens
               only the grass, not the sky -->
