<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#07060C" />
<meta name="robots" content="noindex" />
<title>See the Shot — One Scene, Three Camera Stations</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2052%2052'%20fill='none'%3E%3Cpath%20d='M11%2045%20C%2016%2026,%2024%2018,%2035%2015%20M21%2039%20L%2030%2024%20L%2043%2045'%20stroke='%239D8BFF'%20stroke-width='4.2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3Ccircle%20cx='37'%20cy='15'%20r='5.2'%20fill='%23FF8A4D'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="./sa-p3.css" />
<link rel="stylesheet" href="./sa.css" />
<style>
  /* ══ IMPACT · KAMERA (Økt B) ══════════════════════════════════════
     Én scene, tre kamerastasjoner (design/orders/impact-kamera.md).
     Erstatter DUAL-LENS-layouten + de tre SVG-visningene — beslutning B1
     i docs/systemkontrakt.md §9. Identity-tokens konsumeres fra sa-p3.css;
     null hardkodede fargeverdier her (K4): alt går via tokens/color-mix. */
  :root{
    --panel:color-mix(in srgb, var(--surface) 82%, transparent);
    /* anatomy colours — bound to the ONE HUE · ONE MEANING dictionary */
    --c-face:var(--q-face); --c-path:var(--q-path); --c-loft:var(--q-loft);
    --c-attack:var(--q-attack); --c-launch:var(--q-launch);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}
  body{
    background:var(--dusk-scene-bg);
    color:var(--ink);
    font-family:var(--font-ui);
  }
  /* sa-depth setter sin egen body-bakgrunn med høyere spesifisitet enn body{}
     — denne siden eier dusk-scenen (mock-normativ), så den vinner her.
     Grain-laget (body.sa-depth::after) beholdes: det dreper banding i gradienten. */
  body.sa-depth{
    background:var(--dusk-scene-bg);
    -webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
  }
  .app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

  /* ══ TOP STRIP — én tilbake-til-meny-kontroll + global speed-stepper
     (eierordre 2026-07-22). position:relative så speed-steget kan sentreres
     absolutt i baren uavhengig av back-knappen til venstre. ══ */
  .topstrip{
    flex:0 0 auto;position:relative;display:flex;align-items:center;gap:10px;
    box-sizing:border-box;min-height:calc(40px + env(safe-area-inset-top));
    padding:env(safe-area-inset-top) max(12px,env(safe-area-inset-right)) 0 max(12px,env(safe-area-inset-left));
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, color-mix(in srgb, var(--surface) 66%, transparent), transparent);
  }
  .ts-back{-webkit-tap-highlight-color:transparent;text-decoration:none;flex:0 0 auto;
    width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;
    color:var(--ink);border:1px solid var(--line);border-radius:9px;
    background:color-mix(in srgb, var(--surface) 50%, transparent);
    view-transition-name:sa-nav;transition:transform .15s,border-color .2s}
  .ts-back:hover{border-color:var(--secondary-line)}
  .ts-back:active{transform:scale(.93)}
  .ts-back:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  /* ══ SCENE — ett canvas, kamerastyrt ══ */
  .scene{flex:1 1 auto;position:relative;min-height:0;overflow:hidden}
  .scene canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:grab}
  .scene canvas:active{cursor:grabbing}

  /* stats-hero (venstre topp) — §6: stort tall = CARRY. Visuelt lag er
     aria-hidden; #fCarryLive er ENESTE live-region (arvet a11y-kontrakt). */
  .flightCarry{position:absolute;left:16px;top:14px;z-index:5;pointer-events:none}
  .flightCarry .num{font-size:44px;font-weight:700;line-height:1;letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;color:var(--ink);
    text-shadow:0 0 26px color-mix(in srgb, var(--gold) 25%, transparent)}
  .flightCarry .num .u{font-size:17px;font-weight:500;color:var(--muted);margin-left:2px}
  .flightCarry .lab{font-size:10px;letter-spacing:.24em;color:var(--muted-2);margin-top:3px;text-transform:uppercase}

  /* ══ STASJONSSEGMENT — TOP · SIDE │ FLIGHT (ordre §2) ══
     Nå nested i .card (§C nedenfor); ikke lenger selv-posisjonert. */
  .stations{display:flex;gap:4px;align-items:stretch;width:max-content;margin:0 auto 12px}
  .stations button{appearance:none;border:0;background:transparent;color:var(--muted);
    font:inherit;font-size:11px;font-weight:700;letter-spacing:.16em;
    padding:9px 16px;border-radius:999px;cursor:pointer;position:relative;
    transition:background .25s,color .25s}
  .stations button::after{content:"";position:absolute;inset:-4px;border-radius:999px} /* ≥44px hit */
  .stations button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  /* aktiv TOP/SIDE = lilla (input), aktiv FLIGHT = gull (output) — ordre §2 */
  .stations button[aria-pressed="true"]{background:var(--secondary-soft);color:var(--secondary)}
  .stations button[data-s="0"][aria-pressed="true"]{
    background:color-mix(in srgb, var(--gold) 15%, transparent);color:var(--gold)}
  .stations .stdiv{width:1px;align-self:stretch;margin:5px 3px;background:var(--line-strong)}

  /* ══ GLOBAL SPEED STEPPER — nå i topstrip, sentrert (eierordre 2026-07-22) ══
     Farge: --secondary (kjølig lilla, «input»-familien). Flyttet bort fra
     --q-launch/--gold slik at den oransje --accent-banen står som DEN ene
     varme fokal i scenen — mph konkurrerte før med ballbanen. */
  .speedctl{position:absolute;left:50%;top:calc(env(safe-area-inset-top) + 20px);transform:translate(-50%,-50%);z-index:6;
    display:flex;align-items:center;gap:2px;
    background:var(--panel);border:1px solid color-mix(in srgb, var(--secondary) 40%, transparent);
    border-radius:999px;padding:3px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
  .speedctl button{appearance:none;border:0;cursor:pointer;font:inherit;position:relative;
    width:28px;height:28px;border-radius:50%;
    color:var(--secondary);background:color-mix(in srgb, var(--secondary) 14%, transparent);
    font-size:16px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:background .15s}
  .speedctl button::after{content:"";position:absolute;inset:-8px;border-radius:50%} /* ≥44px hit */
  .speedctl button:active{background:color-mix(in srgb, var(--secondary) 32%, transparent)}
  .speedctl button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .speedctl .val{min-width:72px;text-align:center;font-size:13px;font-weight:700;
    color:var(--secondary);font-variant-numeric:tabular-nums;cursor:ew-resize;touch-action:none;
    border-radius:8px}
  .speedctl .val:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  /* ══ SAVE SHOT PILL — topp høyre, alle stasjoner (ordre §2) ══
     Kjølig lilla (--secondary), ikke gull — samme grunn som speed-steget:
     hold den oransje --accent-banen som eneste varme fokal (eierordre). */
  .pinfab{position:absolute;right:14px;top:calc(14px + env(safe-area-inset-top));z-index:6;
    appearance:none;cursor:pointer;font:inherit;font-size:12.5px;font-weight:700;
    color:var(--secondary);background:var(--panel);border:1px solid color-mix(in srgb, var(--secondary) 45%, transparent);
    border-radius:999px;padding:9px 15px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:transform .15s}
  .pinfab:active{transform:scale(.95)}
  .pinfab:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  /* ══ STATS-HERO — flip mot høyre når skuddet trenger venstrefeltet ══
     (§C: mekanisk port av mockens .stats.right; hysterese-logikken lever i
     JS, se updateStats). Flytter nå bare CARRY-tallet unna banen. */
  .flightCarry.right{left:auto;right:16px;text-align:right}

  /* ══ STASJONSKORT — kollaps-grabber + paneler (ordre §2) ══ */
  .card{position:absolute;left:10px;right:10px;z-index:6;
    bottom:calc(10px + env(safe-area-inset-bottom));
    background:var(--panel);border:1px solid var(--line);border-radius:22px;
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    padding:14px 18px 16px;pointer-events:auto}
  .card .grab{appearance:none;border:0;background:transparent;display:block;
    width:100%;padding:6px 0 10px;cursor:pointer}
  .card .grab::before{content:"";display:block;width:44px;height:5px;border-radius:3px;
    margin:0 auto;background:var(--line-strong)}
  .card .grab:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:8px}
  .panewrap{overflow:hidden;max-height:420px;
    transition:max-height .45s var(--ease),opacity .3s}
  .card.collapsed .panewrap{max-height:0;opacity:0}
  .panehead{display:flex;justify-content:space-between;align-items:baseline}
  .panehead .h-title{font-size:11px;letter-spacing:.26em;font-weight:700}
  .panehead .h-title.gold{color:var(--gold)}
  .panehead .h-title.purple{color:var(--secondary)}
  .panehead .hint{font-size:10.5px;color:var(--muted-2)}
  .pane{min-height:118px;padding-top:12px}

  /* ══ SLIDERE — ekte <input type=range>, ikke div (a11y-krav) ══ */
  .sl{margin-top:13px}
  .sl:first-child{margin-top:0}
  .sl .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .sl .name{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.14em;
    color:var(--muted);font-weight:500}
  .sl .name i{width:9px;height:9px;border-radius:3px;background:var(--c)}
  .sl .val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
  .sl input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:34px;
    margin:0;background:transparent;touch-action:none;cursor:pointer}
  .sl input[type="range"]:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:8px}
  .sl input[type="range"]::-webkit-slider-runnable-track{height:4px;border-radius:2px;
    background:color-mix(in srgb, var(--muted) 22%, transparent)}
  .sl input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:26px;height:26px;border-radius:50%;margin-top:-11px;
    background:var(--plate-solid);border:3.5px solid var(--c);
    box-shadow:0 0 0 5px color-mix(in srgb, var(--c) 16%, transparent),0 3px 10px color-mix(in srgb, var(--bg) 60%, transparent)}
  .sl input[type="range"]::-moz-range-track{height:4px;border-radius:2px;
    background:color-mix(in srgb, var(--muted) 22%, transparent)}
  .sl input[type="range"]::-moz-range-thumb{width:19px;height:19px;border-radius:50%;border:3.5px solid var(--c);
    background:var(--plate-solid);
    box-shadow:0 0 0 5px color-mix(in srgb, var(--c) 16%, transparent),0 3px 10px color-mix(in srgb, var(--bg) 60%, transparent)}

  /* ══ READOUT-CHIPS — dashed = avlesning, ingen unntak (ordre §2) ══ */
  .readouts{display:flex;gap:8px;flex-wrap:wrap}
  .chip{border-radius:12px;padding:8px 11px;min-width:74px;flex:1;
    background:color-mix(in srgb, var(--surface) 62%, transparent)}
  .chip.read{border:1px dashed color-mix(in srgb, var(--gold) 40%, transparent)}
  .chip .k{font-size:9px;letter-spacing:.18em;color:var(--muted-2);white-space:nowrap}
  .chip .v{font-size:15px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}
  .chip .v em{font-style:normal;font-size:10px;font-weight:500;color:var(--muted)}
  /* mini-rad og utfoldet grid trenger mindre typografi enn en generisk chip
     for å unngå avkutting ved fire-i-rad på smale skjermer (mock-presedens) */
  #ogMini .chip{flex:1;min-width:0;padding:8px 9px}
  #ogMini .chip .k{font-size:8.5px;letter-spacing:.13em}
  #ogMini .chip .v{font-size:15px}
  .ogrid .readouts .chip{flex:1;min-width:0;padding:7px 8px}
  .ogrid .chip .k{font-size:8px;letter-spacing:.12em}
  .ogrid .chip .v{font-size:14px}
  .ogrid .chip .v em{font-size:9.5px}

  /* ══ ALL METRICS — utfold/fold, gruppehopp ══ */
  .ogexp{appearance:none;border:0;background:transparent;cursor:pointer;font:inherit;
    display:flex;align-items:center;gap:6px;margin:9px auto 0;padding:6px 12px;
    font-size:9.5px;letter-spacing:.2em;font-weight:700;color:var(--muted)}
  .ogexp:focus-visible{outline:2px solid var(--ink);outline-offset:2px;border-radius:8px}
  .ogexp .chev{transition:transform .3s;font-size:11px}
  .ogexp[aria-pressed="true"] .chev{transform:rotate(180deg)}
  .ogrid[hidden]{display:none}
  .ogrid{padding-top:2px}
  .ogroup{appearance:none;border:0;background:transparent;cursor:pointer;font:inherit;
    display:flex;align-items:center;gap:6px;margin:13px 0 7px;padding:2px 0;width:100%}
  .ogrid .ogroup:first-child{margin-top:4px}
  .ogroup .glab{font-size:9.5px;letter-spacing:.2em;color:var(--muted-2);font-weight:700}
  .ogroup:not(.static) .glab{color:var(--secondary)}
  .ogroup .garr{font-size:12px;color:var(--secondary);line-height:1;opacity:.85}
  .ogroup.static{cursor:default}
  .ogroup:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

  .sr-only{position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;
    clip:rect(0 0 0 0);white-space:nowrap;border:0}

  /* ══ ANNOTASJONSLAGET — etiketter i DOM, geometri i canvas (§5.4/Økt D) ══
     Måle-etiketter i ravfamilien (ordre §3, --q-measure — A10). Laget er
     aria-hidden: #fCarryLive forblir eneste annonseringskanal (§5.4, uendret
     kontrakt) — disse er supplerende visuell detalj, ikke ny data. */
  .annoLabels{position:absolute;inset:0;pointer-events:none;z-index:4}
  .annoLabel{position:absolute;top:0;left:0;transform:translate(-50%,-50%);
    padding:2px 9px;border-radius:8px;font-size:10.5px;font-weight:600;
    white-space:nowrap;font-variant-numeric:tabular-nums;
    background:color-mix(in srgb, var(--surface) 82%, transparent);
    border:1px solid color-mix(in srgb, var(--q-measure) 30%, transparent);
    color:var(--q-measure)}
  .annoLabel.hot{font-weight:700;
    box-shadow:0 0 8px color-mix(in srgb, var(--q-measure) 55%, transparent)}
  .annoLabel[hidden]{display:none}

  @media (prefers-reduced-motion:reduce){
    .stations button,.panewrap,.ogexp .chev,.pinfab{transition:none}
  }
</style>
</head>
<body class="sa-depth">
  <div class="app">

    <!-- ══ TOP STRIP — tilbake til meny + global speed-stepper (ordre 2026-07-22) ══
         See the Shot-tittelen og Geometry/Impact-fanene er fjernet; igjen står
         én ←-kontroll til menyen og speed-steget, flyttet opp hit vekk fra
         scene-annotasjonene. view-transition-name:sa-nav bevart på back-lenken. -->
    <div class="topstrip">
      <a class="ts-back" href="./index.html" aria-label="Back to menu">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 5 L8 12 L15 19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <!-- Global speed-stepper — synlig i alle stasjoner (ordre §2). -->
      <div class="speedctl">
        <button type="button" id="spMinus" aria-label="Decrease club speed">−</button>
        <span class="val" id="spVal" tabindex="0" role="slider" aria-label="Club speed"
          aria-valuemin="30" aria-valuemax="150" aria-valuenow="90" aria-valuetext="90 mph">90 mph</span>
        <button type="button" id="spPlus" aria-label="Increase club speed">+</button>
      </div>
    </div>

    <!-- ══ SCENE — én scene, tre kamerastasjoner ══ -->
    <main class="scene" id="stage">
      <!-- Kontrakt (docs/systemkontrakt.md §5.4): scenen er aria-hidden (den
           oppdateres hver frame); role="img"+aria-label beholdes på canvas;
           #fCarryLive under er den ENESTE live-regionen. Etiketter hører til
           DOM-laget (Økt D), aldri canvas. -->
      <canvas id="scene" aria-hidden="true" role="img"
        aria-label="Ball-flight scene seen from a travelling camera: top-down direction plane, side-on launch plane, and a perspective flight view behind the ball."></canvas>

      <!-- Annotasjonsetiketter (Økt D) — DOM, ikke canvas (§5.4). Samme
           a11y-kontrakt som scenen: aria-hidden, ren visuell detalj. -->
      <div class="annoLabels" id="annoLabels" aria-hidden="true"></div>

      <!-- LEFT HERO STACK — kun CARRY (eierordre 2026-07-22: offline + Δ
           fjernet). #fCarryNum/#fCarryLive/.flightCarry er arvet a11y-kontrakt.
           .right-flip (§3 "Stats-flip") flytter nå bare carry-tallet unna banen. -->
      <div class="flightCarry" id="fCarryStack" aria-hidden="true">
        <div class="num"><span id="fCarryNum">0</span><span class="u">m</span></div>
        <div class="lab">Carry</div>
      </div>
      <div class="sr-only" id="fCarryLive" aria-live="polite" aria-atomic="true"></div>

      <!-- Save shot pill — topp høyre, alle stasjoner (ordre §2). Lagrer
           gjeldende skudd som spøkelsesbane til sammenligning. -->
      <button type="button" class="pinfab" id="pinFab">⊙ Save shot</button>

      <!-- ══ STASJONSKORT — kollaps-grabber + stasjonssegment + panel ══
           Stasjonssegment: TOP · SIDE │ FLIGHT (ordre §2 — rekkefølgen er
           bevisst motsatt av stasjonsskalaren 0=FLIGHT/1=SIDE/2=TOP, §3.2).
           Stasjonsknappene ligger UTENFOR .panewrap slik at de forblir
           synlige når kortet er kollapset (ordre §2). -->
      <div class="card" id="panel">
        <button type="button" class="grab" id="grab" aria-pressed="false"
          aria-label="Collapse or expand the station panel"></button>
        <div class="stations" id="stseg" role="group" aria-label="Camera station">
          <button type="button" data-s="2" aria-pressed="false">TOP</button>
          <button type="button" data-s="1" aria-pressed="false">SIDE</button>
          <span class="stdiv" aria-hidden="true"></span>
          <button type="button" data-s="0" aria-pressed="false">FLIGHT</button>
        </div>
        <div class="panewrap">
          <div class="panehead">
            <span class="h-title" id="paneTitle">OUTCOME · READ</span>
            <span class="hint">drag scene vertically</span>
          </div>
          <div class="pane" id="pane"></div>
        </div>
      </div>
    </main>
  </div>

<script type="module">
import { rigAt, buildBasis, project } from './impact-camera.js';
import { fitZoom, gridStops, lateralStops, dollyRig } from './impact-framing.js';
import { selectOutcome } from './impact-outcome.js';
import { buildAnnotations, placeLabels, statsFlip, cometPoint, MEASURE_KEEPOUT } from './impact-annotate.js';

/* ══ state — docs/systemkontrakt.md §3.1. Parametrene er eneste input-
   sannhet; `station` er kamera, aldri parameter (§3.4): scrub re-solver
   aldri fysikk, parameterendring rører aldri kamera. */
const state = {
  face: 2.0, path: 0.0, attack: 3.0, dynLoft: 24, speed: 90,
  station: 0,            // kontinuerlig 0=FLIGHT · 1=SIDE · 2=TOP (§3.2)
  pins: [],              // maks 3, eldste ut
  allMetrics: false,
  collapsed: false,
};

// én forhåndspinnet ghost (ordre §2, default-oppsettet)
const seedParams = { face: -3.0, path: 1.2, attack: 2.5, dynLoft: 24, speed: 90 };
state.pins.push({ params: seedParams, outcome: selectOutcome(seedParams) });

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const TAU = Math.PI * 2;

/* ══ canvas ══ */
const stage = document.getElementById('stage');
const cv = document.getElementById('scene');
const ctx = cv.getContext('2d');
let W = 0, H = 0;
function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  W = stage.clientWidth; H = stage.clientHeight;
  cv.width = Math.max(1, Math.round(W * dpr));
  cv.height = Math.max(1, Math.round(H * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener('resize', resize);
resize();

/* ══ farger — kun via tokens (K4). Leses computed én gang; alpha legges
   på programmatisk (ingen fargeverdier hardkodes her). */
const rootStyle = getComputedStyle(document.documentElement);
function tokenRGB(name) {
  const v = rootStyle.getPropertyValue(name).trim();
  let m = v.match(/^#([0-9a-f]{6})$/i);
  if (m) {
    const n = parseInt(m[1], 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }
  m = v.match(/^#([0-9a-f]{3})$/i);
  if (m) return [...m[1]].map(c => parseInt(c + c, 16));
  m = v.match(/rgba?\(\s*(\d+)[ ,]+(\d+)[ ,]+(\d+)/i);
  if (m) return [+m[1], +m[2], +m[3]];
  return [255, 255, 255]; // ukjent format → ink-nøytral fallback
}
const COL = {
  ink: tokenRGB('--ink'),
  ghost: tokenRGB('--ghost'),
  gold: tokenRGB('--gold'),
  accent: tokenRGB('--accent'),
  measure: tokenRGB('--q-measure'),
  grid: tokenRGB('--grid-lav'),
  fog: tokenRGB('--dusk-fog'),
};
const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;
// grid-referansetall tegnes i canvas (scenen er aria-hidden; DOM-poolen er
// forbeholdt måle-etiketter med kollisjonskaskade). Font fra typetokenet.
const GRID_FONT = `500 10px ${rootStyle.getPropertyValue('--font-display').trim() || "'Space Grotesk',sans-serif"}`;

/* ══ tegneløkke ══
   Verden er meter, Z-up: +X nedslag, +Y høyre, +Z høyde (§1.4). Alle punkter
   går gjennom impact-camera.js sin project(); å lerpe projiserte 2D-punkter
   er utenfor kontrakten (§5.1/A1). Tekst-etiketter hører til DOM-laget
   (Økt D) — canvasen tegner kun geometri. */
let basis = null;
const P = (x, y, z) => project({ x, y, z }, basis);

function line3(a, b) {
  const pa = P(a[0], a[1], a[2]), pb = P(b[0], b[1], b[2]);
  if (!pa || !pb) return;
  ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
}

// Avrundet rektangel-sti (canvas har ingen innebygd før roundRect bredt støttes).
function chipPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// C — flat 2D distansestripe, tegnet i skjermpiksler nederst på scenen.
// Bevisst UTENFOR 3D-projeksjonen: en lineær linjal 0→siste stopp, med en
// prikk der ballen lander og en hul markør ved apex sin nedslagsposisjon.
function drawDistanceStrip(stops, extent, a) {
  const maxD = stops[stops.length - 1];
  // Legg stripa like OVER dokken, ellers okkluderer bunnpanelet den. Dokken
  // (#panel) er et DOM-overlegg; vi finner toppkanten relativt til scenen.
  const panel = document.getElementById('panel');
  let y = H - 46;
  if (panel && typeof stage !== 'undefined') {
    const st = stage.getBoundingClientRect(), pr = panel.getBoundingClientRect();
    y = Math.min(y, pr.top - st.top - 34);
  }
  const x0 = 24, x1 = W - 24, ww = x1 - x0;
  const px = d => x0 + (Math.max(0, Math.min(d, maxD)) / maxD) * ww;
  ctx.font = GRID_FONT;
  chipPath(x0 - 8, y - 16, ww + 16, 40, 10);
  ctx.fillStyle = rgba(COL.fog, 0.5 * a);
  ctx.fill();
  ctx.strokeStyle = rgba(COL.grid, 0.14 * a); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (const d of [0, ...stops]) {
    const gx = px(d);
    ctx.strokeStyle = rgba(COL.grid, 0.3 * a);
    ctx.beginPath(); ctx.moveTo(gx, y - 4); ctx.lineTo(gx, y + 4); ctx.stroke();
    ctx.fillStyle = rgba(COL.grid, 0.55 * a);
    ctx.fillText(d === maxD ? d + ' m' : String(d), gx, y + 7);
  }
  // apex sin nedslagsposisjon (≈ halvveis) — hul markør, egen etikett.
  const ax = px(extent / 2);
  ctx.strokeStyle = rgba(COL.gold, 0.8 * a); ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(ax, y, 3.5, 0, TAU); ctx.stroke();
  // landing — fylt aksent-prikk + tall.
  const lx = px(extent);
  ctx.fillStyle = rgba(COL.accent, 0.95 * a);
  ctx.beginPath(); ctx.arc(lx, y, 4.5, 0, TAU); ctx.fill();
  ctx.fillStyle = rgba(COL.accent, 0.95 * a);
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(Math.round(extent) + '', lx, y - 8);
}

function drawGrid(s, extent = 200, halfWidth = 0, sideSigned = 0) {
  const topA = clamp(s - 1, 0, 1);
  const sideA = clamp(1 - Math.abs(s - 1), 0, 1);
  const perspA = clamp(1 - s, 0, 1);
  // Rutenettet følger slaget i stedet for å være låst til 50/100/150/200.
  // `span` er hvor langt linjene på tvers må rekke, og `lat` hvilke
  // breddeguider som trengs for å dekke utfallet.
  const stops = gridStops(extent);
  const lat = lateralStops(halfWidth);
  const span = Math.max(150, Math.abs(lat[0]) + 50);
  const reach = stops[stops.length - 1] + 25;
  // tåkebånd langs horisonten — finnes kun i perspektiv (mock drawGrid)
  if (perspA > 0.02) {
    const hy = H * 0.60;
    const g = ctx.createLinearGradient(0, hy - 46, 0, hy + 56);
    g.addColorStop(0, rgba(COL.fog, 0));
    g.addColorStop(0.55, rgba(COL.fog, 0.28 * perspA));
    g.addColorStop(1, rgba(COL.fog, 0));
    ctx.fillStyle = g;
    ctx.fillRect(0, hy - 46, W, 102);
  }
  ctx.lineWidth = 1;
  // nedslagslinjer på tvers (50 m-intervaller) + lengdereferanser (mock drawGrid)
  ctx.font = GRID_FONT;
  for (const x of stops) {
    ctx.strokeStyle = rgba(COL.grid, 0.10 + 0.14 * topA);
    line3([x, -span, 0], [x, span, 0]);
    // Etiketten satt like innenfor bredderammen så den følger med når scenen
    // zoomer ut, i stedet for å bli stående på en fast 112 m-kolonne.
    const lp = P(x, Math.min(span - 12, 112), 0);
    if (lp) {
      ctx.fillStyle = rgba(COL.grid, 0.35 + 0.3 * topA);
      ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
      ctx.fillText(String(x), lp.x + 4, lp.y - 2);
    }
  }
  // Sideveis-guider + breddereferanser. Disse blendet tidligere til NULL i
  // FLIGHT (topA=0 der), så den stasjonen sto helt uten målestokk — man kunne
  // ikke lese av hverken lengde eller bredde. Nå holder de en synlig bunn i
  // perspektiv og forsterkes mot TOP.
  const latA = Math.max(0.55 * perspA, topA);
  if (latA > 0.05) {
    for (const y of lat) {
      ctx.strokeStyle = rgba(COL.grid, 0.09 * latA);
      line3([0, y, 0], [reach, y, 0]);
    }
    // Merk bare det ytterste paret, ellers blir TOP full av tall.
    const edge = Math.max(...lat);
    const l = P(12, -edge, 0), r = P(12, edge, 0);
    ctx.fillStyle = rgba(COL.grid, 0.5 * latA);
    ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
    if (l) ctx.fillText(edge + ' L', l.x, l.y);
    if (r) ctx.fillText(edge + ' R', r.x, r.y);
  }
  // Lengdereferanse i FLIGHT — tre kandidater eieren skal velge mellom.
  // Dybden komprimeres kraftig mot horisonten, så en naiv rad distansetall
  // langs senterlinjen stables til en uleselig grøt; derfor disse tre.
  if (perspA > 0.05) {
    if (flightRef === 'gates') {
      // B — distanseporter: en lav vertikal port ved hver stopp, tallet på
      // toppen der perspektivet gir loddrett luft mellom nære og fjerne porter.
      ctx.font = GRID_FONT;
      for (const x of stops) {
        ctx.strokeStyle = rgba(COL.grid, 0.16 * perspA);
        line3([x, 0, 0], [x, 0, 16]);
        const tp = P(x, 0, 16);
        if (tp) {
          ctx.fillStyle = rgba(COL.grid, 0.55 * perspA);
          ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
          ctx.fillText(x + ' m', tp.x, tp.y - 3);
        }
      }
    } else if (flightRef === 'strip') {
      // C — flat 2D distansestripe nederst, helt utenfor 3D-perspektivet,
      // så dybdekomprimeringen ikke rører lesbarheten.
      drawDistanceStrip(stops, extent, perspA);
    } else {
      // A (standard) — ingen egen lengde-etikett inne i scenen. Lengden bor i
      // hero-tallet øverst (281 m CARRY), og høyden leses av høydestigen.
      // FLIGHT holdes ren: én utfallsbue, én høydeskala, ett tall.
    }
  }
  // Høydeguider (20/40/60 m). Vises i SIDE, og — for variant A — også i
  // FLIGHT, som er den lesbare aksen der: høyde går rett opp på skjermen.
  // Dette er høydestigen; sammen med landingstallet over dekker den både
  // høyde og lengde uten å slåss mot dybdekomprimeringen.
  const heightA = Math.max(sideA, flightRef === 'ladder' ? 0.7 * perspA : 0);
  if (heightA > 0.05) {
    ctx.setLineDash([2, 5]);
    ctx.font = GRID_FONT;
    for (const z of [20, 40, 60]) {
      ctx.strokeStyle = rgba(COL.grid, 0.11 * heightA);
      line3([0, 0, z], [reach, 0, z]);
      // Tallet festet ved det nære enden av linja (x liten), der den er
      // lavest og lengst fra horisonten — lesbart i begge stasjoner.
      const hp = P(4, 0, z);
      if (hp) {
        ctx.fillStyle = rgba(COL.grid, 0.5 * heightA);
        ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
        ctx.fillText(z + ' m', hp.x + 3, hp.y - 2);
      }
    }
    ctx.setLineDash([]);
  }
  // target-linjen — består alltid, men strekker seg nå forbi nedslaget i
  // stedet for å stoppe på det gamle faste ankeret x≈228.
  ctx.setLineDash([4, 7]);
  ctx.strokeStyle = rgba(COL.grid, 0.32);
  line3([0, 0, 0], [reach, 0, 0]);
  ctx.setLineDash([]);
  // ballen
  const ball = P(0, 0, 0);
  if (ball) {
    ctx.beginPath(); ctx.arc(ball.x, ball.y, 3, 0, TAU);
    ctx.fillStyle = rgba(COL.ink, 0.9); ctx.fill();
  }
}

function tracePath(pts) {
  ctx.beginPath();
  let started = false;
  for (const p of pts) {
    const q = project(p, basis);
    if (!q) { started = false; continue; }
    if (started) ctx.lineTo(q.x, q.y); else { ctx.moveTo(q.x, q.y); started = true; }
  }
}

function drawTraj(outcome, mode) {
  const pts = outcome.path;
  if (mode === 'ghost') {
    tracePath(pts);
    ctx.strokeStyle = rgba(COL.ghost, 0.55);
    ctx.lineWidth = 1.6; ctx.lineCap = 'round'; ctx.stroke();
    const land = project(pts[pts.length - 1], basis);
    if (land) {
      ctx.beginPath(); ctx.arc(land.x, land.y, 3.2, 0, TAU);
      ctx.fillStyle = rgba(COL.ghost, 0.8); ctx.fill();
    }
    return;
  }
  // aktiv bane = skjermens ENE oransje fokal (ordre §2, warm light rule)
  tracePath(pts);
  ctx.strokeStyle = rgba(COL.accent, 0.16);
  ctx.lineWidth = 9; ctx.lineCap = 'round'; ctx.stroke();
  const a = project(pts[0], basis), b = project(pts[pts.length - 1], basis);
  if (a && b) {
    const g = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
    g.addColorStop(0, rgba(COL.ink, 0.95));
    g.addColorStop(0.5, rgba(COL.gold, 1));
    g.addColorStop(1, rgba(COL.accent, 1));
    tracePath(pts);
    ctx.strokeStyle = g; ctx.lineWidth = 2.6; ctx.stroke();
  }
  if (b) {
    ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, TAU);
    ctx.strokeStyle = rgba(COL.accent, 1); ctx.lineWidth = 1.6; ctx.stroke();
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.4, 0, TAU);
    ctx.fillStyle = rgba(COL.ink, 1); ctx.fill();
  }
}

/* ══ ANNOTASJONSLAGET (Økt D, ordre §3) — impact-annotate.js gjør ren
   geometri/kaskade; her tegnes primitivene: linjer/buer/bånd i canvas,
   etikett-tekst i DOM (§5.4, samme mønster som geo3d/lowpoint.js#placeLabel). ══ */
function drawAnnotationPrimitives(prims) {
  for (const prim of prims) {
    switch (prim.kind) {
      case 'band': {
        if (prim.points.length < 3) break;
        const pts = prim.points;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.closePath();
        const mid = pts[Math.floor(pts.length / 2)];
        const g = ctx.createLinearGradient(pts[0].x, pts[0].y, mid.x, mid.y);
        g.addColorStop(0, rgba(COL.measure, prim.alphaFrom));
        g.addColorStop(1, rgba(COL.measure, prim.alphaTo));
        ctx.fillStyle = g; ctx.fill();
        break;
      }
      case 'tick':
      case 'line': {
        const [a, b] = prim.points;
        ctx.save();
        if (prim.dashed) ctx.setLineDash([5, 6]);
        ctx.strokeStyle = rgba(COL.measure, prim.alpha);
        ctx.lineWidth = prim.hot ? 1.6 : 1;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.restore();
        break;
      }
      case 'arc': {
        ctx.save();
        if (prim.hot) { ctx.shadowColor = rgba(COL.measure, 1); ctx.shadowBlur = 8; }
        ctx.strokeStyle = rgba(COL.measure, prim.hot ? prim.alpha * 0.85 : prim.alpha * 0.5);
        ctx.lineWidth = prim.hot ? 1.6 : 1;
        ctx.beginPath();
        prim.points.forEach((q, i) => { if (i) ctx.lineTo(q.x, q.y); else ctx.moveTo(q.x, q.y); });
        ctx.stroke();
        if (prim.tick) {
          ctx.beginPath(); ctx.moveTo(prim.tick[0].x, prim.tick[0].y); ctx.lineTo(prim.tick[1].x, prim.tick[1].y); ctx.stroke();
        }
        ctx.shadowBlur = 0;
        ctx.restore();
        break;
      }
      case 'dimline': {
        const [a, b] = prim.points;
        ctx.save();
        if (prim.hot) { ctx.shadowColor = rgba(COL.measure, 1); ctx.shadowBlur = 9; }
        ctx.strokeStyle = rgba(COL.measure, prim.alpha);
        ctx.lineWidth = prim.hot ? 2 : 1.2;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        const ang = Math.atan2(b.y - a.y, b.x - a.x) + Math.PI / 2, t = 5;
        for (const p of [a, b]) {
          ctx.beginPath();
          ctx.moveTo(p.x - Math.cos(ang) * t, p.y - Math.sin(ang) * t);
          ctx.lineTo(p.x + Math.cos(ang) * t, p.y + Math.sin(ang) * t);
          ctx.stroke();
        }
        ctx.shadowBlur = 0;
        ctx.restore();
        break;
      }
      case 'apex': {
        const dot = prim.points[0];
        ctx.beginPath(); ctx.arc(dot.x, dot.y, 3.4, 0, TAU);
        ctx.fillStyle = rgba(COL.measure, 1); ctx.fill();
        break;
      }
      case 'label': default: break; // ren DOM-etikett, ingen canvas-geometri
    }
  }
}

// DOM-etikett-pool — gjenbrukte noder (unngår innerHTML-churn per frame, §5.4/K6).
const annoLabelsEl = document.getElementById('annoLabels');
const annoPool = [];
function renderAnnotationLabels(placed) {
  let n = 0;
  for (const prim of placed) {
    if (!prim.label || !prim.labelPos) continue;
    let el = annoPool[n];
    if (!el) { el = document.createElement('div'); el.className = 'annoLabel'; annoLabelsEl.appendChild(el); annoPool[n] = el; }
    el.hidden = false;
    el.textContent = prim.label;
    el.style.transform = `translate(${prim.labelPos.x}px,${prim.labelPos.y}px) translate(-50%,-50%)`;
    el.style.opacity = prim.alpha != null ? String(clamp(prim.alpha, 0, 1)) : '1';
    el.classList.toggle('hot', !!prim.hot);
    n++;
  }
  for (let i = n; i < annoPool.length; i++) annoPool[i].hidden = true;
}

function drawComet(worldPt, basis) {
  const p = project(worldPt, basis);
  if (!p) return;
  const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 16);
  g.addColorStop(0, rgba(COL.gold, 0.95));
  g.addColorStop(0.35, rgba(COL.accent, 0.5));
  g.addColorStop(1, rgba(COL.accent, 0));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(p.x, p.y, 16, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(p.x, p.y, 2.6, 0, TAU);
  ctx.fillStyle = rgba(COL.ink, 1); ctx.fill();
}

// ── hot-state (ordre §3 "Hot-state") — hvilken kontroll som nettopp ble
// rørt. Transient UI-interaksjon, lever her (ikke i outcome/state); matet
// inn i buildAnnotations som 4. valgfrie parameter (se impact-annotate.js
// toppkommentar). Sliderne (face/path/attack/dynLoft) setter/rydder på
// pointerdown/up; speed pulser 700 ms etter stepper/scrub (ordre §3).
let hotKey = null;
let hotTimer = null;
function pulseHot(key, ms = 700) {
  hotKey = key;
  clearTimeout(hotTimer);
  hotTimer = setTimeout(() => { if (hotKey === key) hotKey = null; }, ms);
}

/* ══ kamera-animasjon: scrub + snap + segmenthopp + oppstartsreise ══ */
let stationTarget = 2;   // oppstart: land i TOP …
let scrubbing = false;
if (reduceMotion) state.station = 2;   // … uten reise ved redusert bevegelse
// ellers starter state.station på 0 (bak ballen) og rAF-løkken kjører reisen
// dit på ~0,5 s (tidsbasert easing, se TAU_S i render-løkken).

const segButtons = [...document.querySelectorAll('#stseg button')];
function syncSeg() {
  const snapped = Math.round(stationTarget);
  for (const b of segButtons) b.setAttribute('aria-pressed', String(+b.dataset.s === snapped && !scrubbing));
}
function setStation(s, animate = true) {
  stationTarget = clamp(s, 0, 2);
  if (!animate || reduceMotion) state.station = stationTarget;
  syncSeg();
  const snapped = Math.round(stationTarget);
  if (snapped !== activePaneStation) renderPane(snapped);
}
for (const b of segButtons) b.addEventListener('click', () => setStation(+b.dataset.s));

/* ══ PANELER — mekanisk port fra mocken (ordre §2, "DU KJØRER: C · Paneler").
   Pane-innholdet bytter når MÅL-stasjonen (avrundet) endrer seg, ikke under
   selve scrub-glidningen — samme kobling som segmentknappene (setStation).
   Slidere er ekte <input type=range> med <label for>, ikke div-er (a11y). */
const fmtDeg = v => (v >= 0 ? '+' : '−') + Math.abs(v).toFixed(1) + '°';

const SLDEF = {
  face:    { name: 'FACE',     token: '--q-face',   min: -15, max: 15, step: 0.1, fmt: fmtDeg },
  path:    { name: 'PATH',     token: '--q-path',   min: -15, max: 15, step: 0.1, fmt: fmtDeg },
  attack:  { name: 'ATTACK',   token: '--q-attack', min: -15, max: 15, step: 0.1, fmt: fmtDeg },
  dynLoft: { name: 'DYN LOFT', token: '--q-loft',   min: 0,   max: 50, step: 0.1, fmt: v => v.toFixed(1) + '°' },
};
function buildSlider(container, key) {
  const d = SLDEF[key];
  const id = `sl-${key}`;
  const wrap = document.createElement('div');
  wrap.className = 'sl';
  wrap.style.setProperty('--c', `var(${d.token})`);
  wrap.innerHTML =
    `<div class="head"><label class="name" for="${id}"><i aria-hidden="true"></i>${d.name}</label>` +
    `<span class="val" id="${id}-val"></span></div>` +
    `<input type="range" id="${id}" min="${d.min}" max="${d.max}" step="${d.step}" value="${state[key]}">`;
  container.appendChild(wrap);
  const input = wrap.querySelector('input');
  const val = wrap.querySelector('.val');
  const sync = () => { val.textContent = d.fmt(state[key]); };
  input.addEventListener('input', () => {
    state[key] = clamp(Math.round(parseFloat(input.value) * 10) / 10, d.min, d.max);
    sync();
  });
  // hot-state (ordre §3): rørt så lenge sliderdraget varer, ikke tidsbasert
  // slik speed er — face/path/attack/dynLoft er en direkte holdt kontroll.
  input.addEventListener('pointerdown', () => { hotKey = key; });
  const clearHot = () => { if (hotKey === key) hotKey = null; };
  input.addEventListener('pointerup', clearHot);
  input.addEventListener('pointercancel', clearHot);
  sync();
}

const chipHTML = (k, v, em) =>
  `<div class="chip read"><div class="k">${k}</div><div class="v">${v}${em ? ` <em>${em}</em>` : ''}</div></div>`;
function renderMetricChips(outcome) {
  const mini = document.getElementById('ogMini');
  if (!mini) return;
  mini.innerHTML =
    chipHTML('TOTAL', Math.round(outcome.m.total), 'm') +
    chipHTML('APEX', Math.round(outcome.m.apex), 'm') +
    chipHTML('CURVE', Math.abs(Math.round(outcome.m.curve)), 'm') +
    chipHTML('BALL SPEED', Math.round(outcome.misc.ballSpeed), 'mph');
  const axis = (outcome.deg.spinAxis >= 0 ? '+' : '−') + Math.abs(Math.round(outcome.deg.spinAxis)) + '°';
  document.getElementById('ogDir').innerHTML =
    chipHTML('LAUNCH DIR', fmtDeg(outcome.deg.launchDir)) +
    chipHTML('SPIN AXIS', axis) +
    chipHTML('CURVE', Math.abs(Math.round(outcome.m.curve)), 'm') +
    chipHTML('SIDE', Math.abs(Math.round(outcome.m.side)), 'm ' + (outcome.m.side >= 0 ? 'R' : 'L'));
  document.getElementById('ogLaunch').innerHTML =
    chipHTML('LAUNCH ANG', outcome.deg.launchAng.toFixed(1) + '°') +
    chipHTML('SPIN LOFT', outcome.deg.spinLoft.toFixed(1) + '°') +
    chipHTML('BACKSPIN', Math.round(outcome.misc.backspin), 'rpm') +
    chipHTML('LAND ANG', Math.round(outcome.deg.landAng) + '°');
  document.getElementById('ogDist').innerHTML =
    chipHTML('SMASH', outcome.misc.smash.toFixed(2)) +
    chipHTML('BALL SPEED', Math.round(outcome.misc.ballSpeed), 'mph') +
    chipHTML('CARRY', Math.round(outcome.m.carry), 'm') +
    chipHTML('TOTAL', Math.round(outcome.m.total), 'm');
}

const PANE_HTML = {
  0: `<div class="readouts" id="ogMini"></div>
    <button type="button" class="ogexp" id="ogExp" aria-pressed="false"><span>ALL METRICS</span><span class="chev" aria-hidden="true">▾</span></button>
    <div class="ogrid" id="ogFull" hidden>
      <button type="button" class="ogroup" data-goto="2"><span class="glab">DIRECTION · TOP</span><span class="garr" aria-hidden="true">→</span></button>
      <div class="readouts" id="ogDir"></div>
      <button type="button" class="ogroup" data-goto="1"><span class="glab">LAUNCH · SIDE</span><span class="garr" aria-hidden="true">→</span></button>
      <div class="readouts" id="ogLaunch"></div>
      <div class="ogroup static"><span class="glab">DISTANCE</span></div>
      <div class="readouts" id="ogDist"></div>
    </div>`,
  1: `<div id="slSide"></div>`,
  2: `<div id="slTop"></div>`,
};
const PANE_TITLES = { 0: ['OUTCOME · READ', 'gold'], 1: ['INPUT · LAUNCH PLANE', 'purple'], 2: ['INPUT · DIRECTION PLANE', 'purple'] };

const paneTitleEl = document.getElementById('paneTitle');
const paneEl = document.getElementById('pane');
let allMetricsOpen = false;
let activePaneStation = null;
let lastChipsOutcome = null;
function renderPane(s) {
  activePaneStation = s;
  const [title, cls] = PANE_TITLES[s];
  paneTitleEl.textContent = title;
  paneTitleEl.className = 'h-title ' + cls;
  paneEl.innerHTML = PANE_HTML[s];
  if (s === 1) { buildSlider(document.getElementById('slSide'), 'dynLoft'); buildSlider(document.getElementById('slSide'), 'attack'); }
  if (s === 2) { buildSlider(document.getElementById('slTop'), 'face'); buildSlider(document.getElementById('slTop'), 'path'); }
  if (s === 0) {
    allMetricsOpen = false;
    const exp = document.getElementById('ogExp');
    const full = document.getElementById('ogFull');
    exp.addEventListener('click', () => {
      allMetricsOpen = !allMetricsOpen;
      exp.setAttribute('aria-pressed', String(allMetricsOpen));
      full.hidden = !allMetricsOpen;
    });
    paneEl.querySelectorAll('.ogroup[data-goto]').forEach(b => {
      b.addEventListener('click', () => setStation(+b.dataset.goto));
    });
    lastChipsOutcome = null;
    renderMetricChips(selectOutcome(state));
    lastChipsOutcome = selectOutcome(state);
  }
}

/* ══ kollaps-grabber — stasjonsknappene forblir synlige kollapset (ordre §2) ══ */
const panelEl = document.getElementById('panel');
const grabBtn = document.getElementById('grab');
grabBtn.addEventListener('click', () => {
  state.collapsed = panelEl.classList.toggle('collapsed');
  grabBtn.setAttribute('aria-pressed', String(state.collapsed));
});

/* ══ global speed-stepper — synlig i alle stasjoner (ordre §2, S4) ══ */
const spVal = document.getElementById('spVal');
function setSpeed(v) {
  state.speed = clamp(Math.round(v), 30, 150);
  spVal.textContent = state.speed + ' mph';
  spVal.setAttribute('aria-valuenow', String(state.speed));
  spVal.setAttribute('aria-valuetext', state.speed + ' mph');
  pulseHot('speed'); // ordre §3: speed → kurve-sjikt, 700 ms etter stepper/scrub
}
function bindHold(btn, dir) {
  let t1 = null, t2 = null, n = 0;
  const end = () => { clearTimeout(t1); clearInterval(t2); t1 = t2 = null; };
  btn.addEventListener('pointerdown', e => {
    e.stopPropagation(); btn.setPointerCapture(e.pointerId);
    n = 0; setSpeed(state.speed + dir);
    t1 = setTimeout(() => {
      t2 = setInterval(() => { n++; setSpeed(state.speed + dir * (n > 10 ? 5 : 1)); }, 90);
    }, 400);
  });
  btn.addEventListener('pointerup', end);
  btn.addEventListener('pointercancel', end);
  btn.addEventListener('lostpointercapture', end);
}
bindHold(document.getElementById('spMinus'), -1);
bindHold(document.getElementById('spPlus'), 1);
// horisontal scrub på tallet: ±1 mph per 6 px (ordre §2, S4)
(() => {
  let sx = null, sv = 0;
  spVal.addEventListener('pointerdown', e => {
    e.stopPropagation(); spVal.setPointerCapture(e.pointerId);
    sx = e.clientX; sv = state.speed;
  });
  spVal.addEventListener('pointermove', e => {
    if (sx === null) return;
    setSpeed(sv + Math.round((e.clientX - sx) / 6));
  });
  const end = () => { sx = null; };
  spVal.addEventListener('pointerup', end);
  spVal.addEventListener('pointercancel', end);
  spVal.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp' || e.key === 'ArrowRight') { setSpeed(state.speed + 1); e.preventDefault(); }
    if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') { setSpeed(state.speed - 1); e.preventDefault(); }
  });
})();

/* ══ Pin pill — maks 3 ghosts, eldste ut (ordre §2, S7) ══ */
document.getElementById('pinFab').addEventListener('click', () => {
  const params = { face: state.face, path: state.path, attack: state.attack, dynLoft: state.dynLoft, speed: state.speed };
  state.pins.push({ params, outcome: selectOutcome(params) });
  if (state.pins.length > 3) state.pins.shift();
});

// vertikal drag i scenen = kontinuerlig skalar; slipp = snap til nærmeste
let pan = null;
cv.addEventListener('pointerdown', e => {
  pan = { y0: e.clientY, s0: stationTarget };
  scrubbing = true;
  cv.setPointerCapture(e.pointerId);
  syncSeg();
});
cv.addEventListener('pointermove', e => {
  if (!pan) return;
  const ds = (pan.y0 - e.clientY) * 0.0055;
  stationTarget = clamp(pan.s0 + ds, 0, 2);
  state.station = stationTarget; // følg fingeren direkte under scrub
});
function endPan() {
  if (!pan) return;
  pan = null; scrubbing = false;
  setStation(Math.round(stationTarget));
}
cv.addEventListener('pointerup', endPan);
cv.addEventListener('pointercancel', endPan);

/* ══ stats-hero + live-region (a11y-kontrakten) + stats-flip (ordre §3, S2) ══
   Kun CARRY vises nå (eierordre 2026-07-22: offline + Δ fjernet). Live-regionen
   beholder full carry+offline-opplesning (a11y-kontrakt). lastHud-vakten hopper
   over DOM-skriving når verken tallene eller stasjonen har endret seg. */
const fCarryStack = document.getElementById('fCarryStack');
const fCarryNum = document.getElementById('fCarryNum');
const fCarryLive = document.getElementById('fCarryLive');
let statsRight = false;
let lastHud = '';
function updateStats(outcome) {
  const carry = Math.round(outcome.m.carry);
  const side = Math.round(outcome.m.side);
  const hud = [carry, side, state.station.toFixed(3)].join('|');
  if (hud === lastHud) return;
  lastHud = hud;

  fCarryNum.textContent = carry;
  fCarryLive.textContent =
    `Carry ${carry} metres, ${Math.abs(side)} metres ${side >= 0 ? 'right' : 'left'}.`;

  // dataene viker for skuddet: hysteresebåndet (ordre §3 "Stats-flip") flytter
  // nå bare carry-tallet unna banen. Én kilde i impact-annotate.js (statsFlip).
  statsRight = statsFlip(statsRight, state.station, outcome.m.side);
  fCarryStack.classList.toggle('right', statsRight);
}

/* ══ render-løkke ══
   Kameraglidingen er TIDSBASERT (eksponentiell mot målet, τ=110 ms →
   ~0,5 s til ro over hele skalaen), ikke per-frame: en droppet frame skal
   koste bilder, aldri strekke reisen. */
const TAU_S = 0.11;
let lastT = 0;
/**
 * Skudd-tilpasset innramming (§5.5: pos/look/fov/refDist er fritt å re-tune).
 *
 * To grep, begge kontinuerlige i station-blendingen:
 *   1) sentrer blikkpunktet nedover banen — men BARE i ortho, skalert med
 *      orthoK, ellers ville FLIGHT-kameraet gli forbi ballen;
 *   2) zoom ved å dolly kameraet bakover, som skalerer både ortho og
 *      perspektiv uten å røre fov (se impact-framing.js for hvorfor fov-
 *      utvidelse ble forkastet: >100° fisheye ved 386 m).
 * Eksakt-ortografi (A2) er bevart strukturelt — zDiv = refDist ved orthoK=1
 * uansett hvilken verdi refDist får.
 */
function frameForShot(rig, outcome, aspectFix) {
  const carry = Math.max(outcome.m.carry, 1);
  const apex = outcome.m.apex || 0;
  const side = Math.abs(outcome.m.side || 0);
  const mid = carry / 2;
  const dx = (mid - rig.look.x) * rig.orthoK;
  const look = { x: rig.look.x + dx, y: rig.look.y, z: rig.look.z };
  const pos = { x: rig.pos.x + dx, y: rig.pos.y, z: rig.pos.z };
  const maxDist = Math.max(mid, apex, side + 8);   // halv-utstrekning som må få plass
  // Hybrid-innramming: en FAST «hjemme»-ramme for hele det normale slag-spennet,
  // fit-to-shot zoomer KUN ut når slaget faktisk går utenfor den. HOME_FIT er den
  // halve utstrekningen hjemme-rammen så vidt rommer — kile (~62), jern (~92) og
  // en realistisk driver (~141) ligger alle under, så de deler nøyaktig samme
  // stabile målestokk (ingen «bakken flytter seg» når du drar i sliderne). Bare
  // de bratte 300–386 m-ekstremene (maxDist > HOME_FIT) trigger utzoom.
  const HOME_FIT = 150;
  const k = fitZoom(Math.max(maxDist, HOME_FIT));
  const zoomed = dollyRig({ ...rig, pos, look }, k);
  return {
    rig: { ...zoomed, xStretch: (rig.xStretch ?? 1) * aspectFix },
    extent: carry,
    halfWidth: side,
    sideSigned: outcome.m.side || 0,
  };
}

// FLIGHT-lengdereferanse: tre kandidater eieren skal velge mellom.
//   'ladder' (A) — høydestige + ett landingstall (standard-anbefaling)
//   'gates'  (B) — vertikale distanseporter inne i scenen
//   'strip'  (C) — flat 2D distansestripe nederst
let flightRef = 'strip';

function frame(now) {
  const dt = Math.min((now - lastT) / 1000 || 0, 0.25);
  lastT = now;
  if (!scrubbing) {
    const k = reduceMotion ? 1 : 1 - Math.exp(-dt / TAU_S);
    state.station += (stationTarget - state.station) * k;
    if (Math.abs(state.station - stationTarget) < 0.002) state.station = stationTarget;
  }
  if (api.capture && api.trace.length < 4000) api.trace.push({ t: now, station: state.station });
  // Aspekt-lås mot mocken (§5.5-tuning): mockens ortho-gridskala er bredde-
  // avhengig (projTop x = W/360 per m), riggens er høydeavhengig. STATIONS-
  // verdiene er tunet ved aspekt ≈0.4647 (mobil portrett); i bredere vinduer
  // skaleres ortho-xStretch opp så anisotropien følger mockens W/H. Persp
  // (orthoK=0) er isotrop i mocken og røres ikke; blend via orthoK holder
  // reisen kontinuerlig.
  const rig0 = rigAt(state.station);
  const aspectFix = 1 + ((W / H) / 0.4647 - 1) * rig0.orthoK;
  // Skudd-tilpasset innramming: kjenn slaget FØRST, så sentrer og zoom riggen
  // rundt det. selectOutcome er memoisert, så å hente den før basis er gratis.
  const liveOutcome = selectOutcome(state);
  const framed = frameForShot(rig0, liveOutcome, aspectFix);
  basis = buildBasis(framed.rig, { w: W, h: H });
  ctx.clearRect(0, 0, W, H);
  drawGrid(state.station, framed.extent, framed.halfWidth, framed.sideSigned);
  for (const pin of state.pins) drawTraj(pin.outcome, 'ghost');
  drawTraj(liveOutcome, 'active');
  updateStats(liveOutcome);

  // annotasjonslaget (ordre §3, Økt D): buildAnnotations kjører hver frame —
  // den er ikke bak lastHud-vakten, for den avhenger kontinuerlig av
  // state.station under scrub/reise, ikke bare av utfallstallene.
  const keepOut = statsRight ? null : MEASURE_KEEPOUT;
  const placed = placeLabels(buildAnnotations(liveOutcome, state.station, basis, hotKey), keepOut, { w: W, h: H });
  drawAnnotationPrimitives(placed);
  renderAnnotationLabels(placed);
  if (!reduceMotion) {
    const cp = cometPoint(liveOutcome, now);
    if (cp) drawComet(cp, basis);
  }

  if (activePaneStation === 0 && liveOutcome !== lastChipsOutcome) {
    renderMetricChips(liveOutcome);
    lastChipsOutcome = liveOutcome;
  }
  requestAnimationFrame(frame);
}

// instrumenteringskrok for evidens (K1/K6: logget skalarverdi per frame når
// `capture` er på) og for senere økter/dommer
const api = { state, setStation, get stationTarget() { return stationTarget; },
  setFlightRef(m) { flightRef = m; }, get flightRef() { return flightRef; }, capture: false, trace: [] };
window.__impact = api;

renderPane(Math.round(stationTarget));
updateStats(selectOutcome(state));
syncSeg();
requestAnimationFrame(frame);
</script>

     is the web fallback shown only on a landscape phone, where the browser
     cannot be force-rotated. -->

  .rotate .ico{font-size:46px;line-height:1}
  .rotate p{font-size:15px;max-width:240px;margin:0}
  @media (orientation:landscape) and (max-height:480px){.rotate{display:flex}}
</style>
