<script src="./vendor/gsap/gsap.min.js"></script>
<script src="./sa-firstrun.js" defer></script>
<script type="module">
import { solveFlight, clamp } from './impact-flight.js';
import saHaptics from './sa-haptics.js';
import * as saShots from './sa-shots.js';
import * as saIap from './sa-iap.js';
import { openPaywall } from './sa-paywall.js';
window.saHaptics = saHaptics;   // expose for non-module scripts / tests
saIap.init();   // MONETIZATION — sync RevenueCat "pro" entitlement at boot (no-op on web build)

const $ = id => document.getElementById(id);
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const YD2M = 0.9144;
const f1 = v => (v>=0?'+':'') + v.toFixed(1);

// ── live club state (standalone defaults — NO Geometry / localStorage seeding) ──
const state = { clubSpeed: 90, faceAngle: -2, clubPath: 2, attackAngle: -3, dynamicLoft: 30 };

// ════════════════════════════════════════════════════════════════
//  HARD-LOCKED APPROVED BEHAVIOURS (no dev toggles)
//    • chip-fade        = ALWAYS ON
//    • two-way arrows   = ALWAYS ON
//    • docked sliders   = the accessible controls
// ════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════
//  ARROW ROTATION — ONE CONSISTENT VISUAL GAIN PER LENS
//   Every arrow in a lens multiplies its TRUE angle by the SAME gain, so a
//   1° input change gives a clearly visible (bigger-than-before) deflection,
//   AND each derived launch arrow automatically lands BETWEEN its neighbours
//   (launchDir between face & path; launchAng between attack & loft, closer
//   to loft) because they share the lens gain.
//
//   • DIRECTION lens (face, path, launchDir): GAIN_DIR = 2.0 → 1° = 2° visual.
//     Face/Path span ±20°, so the worst case is ±40° visual — still well inside
//     the lens frame (verified) while a 1° change stays clearly readable.
//   • HEIGHT lens (attack, loft, launchAng): GAIN_HEIGHT = 1.0 → 1:1, so dynamic
//     loft 30° shows as 30° visual (true-to-life) and attack is subtler per
//     degree (intended). Loft up to 60° stays under horizontal-clipping.
//  Direction pivot = ball (200,330), arrows point UP at 0°.
//  Height pivot = impact (80,250), arrows point RIGHT at 0°.
// ════════════════════════════════════════════════════════════════
const GAIN_DIR = 2.0;     // Direction-lens visual gain (face, path, launchDir) — halved so ±20° → ±40° visual stays inside the frame
const GAIN_HEIGHT = 1.0;  // Height-lens visual gain (attack, loft, launchAng) — 1:1 (dyn loft 30° → 30° visual)
const ROT = {
  // DIRECTION lens (top-down, arrows point UP): positive value = right of target
  // = clockwise in SVG = POSITIVE rotate. (The old leading minus was inherited
  // from StrikeArc 3.0's canvas orientation and inverted the whole lens.)
  face:   v => v * GAIN_DIR * (Math.PI/180),
  path:   v => v * GAIN_DIR * (Math.PI/180),
  launchDir: v => v * GAIN_DIR * (Math.PI/180),
  attack: v => -v * GAIN_HEIGHT * (Math.PI/180),
  loft:   v => -v * GAIN_HEIGHT * (Math.PI/180),
  launchAng: v => -v * GAIN_HEIGHT * (Math.PI/180),
};
// per-lens gain lookup for the drag inverse (recovers the true angle from the
// applied visual rotation). Keyed by draggable arrow.
const ARROW_GAIN = { face:GAIN_DIR, path:GAIN_DIR, attack:GAIN_HEIGHT, loft:GAIN_HEIGHT };
const DIR_PIVOT = { x:200, y:330 };
const HT_PIVOT  = { x:80,  y:250 };

// arrow rendering meta: pivot, lens, length to the head tip (svg px) for chip placement.
const ARROWS = {
  // Direction lens: face & path share ONE length, a touch longer than before
  // (235). At ±20° (→ ±40° visual at gain 2) the tip x = 200 ± 235·sin40° ≈
  // 200 ± 151 → [49,351], well inside the 400-wide frame.
  path:   { lens:'dir', pivot:DIR_PIVOT, tipLen:235, group:'g_path' },
  face:   { lens:'dir', pivot:DIR_PIVOT, tipLen:235, group:'g_face' },
  // Height lens: attack & loft share ONE length (220). At loft 60° (gain 1.0)
  // the tip y = 250 − 220·sin60° ≈ 59.5 → inside the top edge with margin.
  attack: { lens:'ht',  pivot:HT_PIVOT,  tipLen:220, group:'g_attack' },
  loft:   { lens:'ht',  pivot:HT_PIVOT,  tipLen:220, group:'g_loft' },
};
const ARROW_STATE_KEY = { path:'clubPath', face:'faceAngle', attack:'attackAngle', loft:'dynamicLoft' };

// DISPLAY-ONLY launch indicators. Kept OUT of ARROWS so they are NEVER dimmed,
// never get the grab cursor, and are never drag-rotation targets. They reuse the
// same visAngle/targetAngle/computeTarget/placeChip machinery, eased in tick().
// Their angle is DERIVED from solveFlight(state), not from a slider.
const LAUNCH = {
  launchDir: { lens:'dir', pivot:DIR_PIVOT, tipLen:198, group:'g_launchDir', solveKey:'startDirection', fmt:'signed' },
  launchAng: { lens:'ht',  pivot:HT_PIVOT,  tipLen:200, group:'g_launchAng', solveKey:'launchAngle',    fmt:'plain'  },
};

// ════════════════════════════════════════════════════════════════
//  LENS-DOMINANCE REBALANCE — dynamic viewBox fit (kills letterboxing)
//  The lens SVGs shipped with a FIXED 400×360 (portrait-ish) viewBox inside a
//  WIDE landscape hero box; preserveAspectRatio "meet" letterboxed the drawn
//  geometry into a narrow centred band (~half the width empty at 740×416) and
//  the arrows stayed small no matter how much height the layout freed up.
//  fitLenses() re-derives each lens's viewBox WIDTH from the box's real aspect
//  ratio (the height stays anchored to the content), so the render scale is
//  boxHeight/contentHeight — the arrows, wedges and labels fill the full lens
//  height with zero wasted bands. The Launch lens additionally TIGHTENS its
//  vertical window (y 36..280 instead of 0..360): its side-on content never
//  used the outer bands, which alone cost ~32% of the rendered scale.
//  (Same pattern as the flight overlay's dynamic-width fScene viewBox.)
const LENS_VB = {
  dir: { svgId:'svgDir', y0:0,  h:360, cx:200 },  // top-down: full height, centred on the target line
  ht:  { svgId:'svgHt',  y0:36, h:244, cx:205 },  // side-on: tightened around ground+arrows (content y≈43..268)
};
// live viewBox bounds per lens — placeChip() clamps value chips to THIS frame
// (not the old hardcoded 400×360) so chips stay visible in the wider window.
const LENS_FRAME = {
  dir: { x0:0, y0:0,  x1:400, y1:360 },
  ht:  { x0:0, y0:36, x1:400, y1:280 },
};
// scene-ready signal for the coach-mark gate (see PHASE D below): true once
// at least one lens has actually been laid out with real dimensions — i.e.
// the landscape instrument has rendered, not just a hidden/zero-size box.
let lensesFitted = false;
function fitLenses(){
  Object.entries(LENS_VB).forEach(([lens, cfg])=>{
    const svg = $(cfg.svgId);
    const r = svg.getBoundingClientRect();
    if (r.width < 20 || r.height < 20) return;    // hidden (inactive focus) — refit on switch
    lensesFitted = true;
    const W = Math.max(360, cfg.h * (r.width / r.height));
    const x0 = cfg.cx - W/2;
    svg.setAttribute('viewBox', `${x0.toFixed(1)} ${cfg.y0} ${W.toFixed(1)} ${cfg.h}`);
    const F = LENS_FRAME[lens];
    F.x0 = x0; F.y0 = cfg.y0; F.x1 = x0 + W; F.y1 = cfg.y0 + cfg.h;
    // keep the GROUND caption hugging the lens's right edge in the wide window
    if (lens === 'ht'){
      const cap = $('htGroundLab');
      if (cap) cap.setAttribute('x', (x0 + W - 14).toFixed(1));
    }
  });
}
// refit on resize (debounced to one per frame) + once now that layout exists.
let lensFitRaf = 0;
window.addEventListener('resize', ()=>{
  cancelAnimationFrame(lensFitRaf);
  lensFitRaf = requestAnimationFrame(fitLenses);
});
fitLenses();
requestAnimationFrame(fitLenses);   // re-run after first paint (fonts/flex settle)

// eased visual angle per arrow (radians actually applied), to avoid jitter
const visAngle = { path:0, face:0, attack:0, loft:0, launchDir:0, launchAng:0 };
const targetAngle = { path:0, face:0, attack:0, loft:0, launchDir:0, launchAng:0 };

function computeTarget(key){
  // DERIVED branch: launch indicators read their value from solveFlight, not a slider.
  if (LAUNCH[key]){
    const v = solveFlight(state)[LAUNCH[key].solveKey];
    targetAngle[key] = ROT[key](v);
    return;
  }
  const v = state[ARROW_STATE_KEY[key]];
  targetAngle[key] = ROT[key](v);
}

// resolve arrow meta from either the interactive ARROWS or the display-only LAUNCH set
const arrowMeta = key => ARROWS[key] || LAUNCH[key];

function applyArrowTransform(key){
  const a = arrowMeta(key);
  const ang = visAngle[key] * 180/Math.PI; // deg for SVG transform
  $(a.group).setAttribute('transform', `rotate(${ang.toFixed(2)} ${a.pivot.x} ${a.pivot.y})`);
}

// every arrow that lives in a given lens (interactive + display-only launch),
// used to nudge a chip's placement angle away from neighbouring arrow lines.
const LENS_ARROWS = {
  dir: ['face','path','launchDir'],
  ht:  ['attack','loft','launchAng'],
};

// boxes of chips already placed THIS frame, per lens, so a second chip in the
// same lens (e.g. the derived launch chip) can dodge the first one too.
const placedChipBoxes = { dir: [], ht: [] };
function rectsOverlap(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

// place value-chip CLEARLY OUTSIDE the arrow tip (beyond it), then step it
// further out along its own ray until its box clears EVERY arrow line in the
// lens AND any chip already shown in the same lens — so a value chip never sits
// on top of an arrow line/head, and the input + launch chips never collide.
function placeChip(key){
  const a = arrowMeta(key);
  const baseAngle = a.lens==='dir' ? -90 : 0; // base direction in deg (up = -90, right = 0)
  const ownDeg = baseAngle + visAngle[key]*180/Math.PI;
  const w = 76, hh = 30;                       // chip box size (scaled with the 20px chip text)
  const F = LENS_FRAME[a.lens];                // live viewBox bounds (fitLenses)
  const pivot = a.pivot;
  // ALL arrow rays in this lens (incl. this chip's own) as pivot→tip segments.
  // The chip must clear every one of them — including its own line, since the
  // box is wide enough to fall back across the tip if placed too close.
  const sibs = (LENS_ARROWS[a.lens] || []).map(k => {
    const m = arrowMeta(k);
    const ang = (baseAngle + visAngle[k]*180/Math.PI) * Math.PI/180;
    return { x2: pivot.x + Math.cos(ang)*m.tipLen, y2: pivot.y + Math.sin(ang)*m.tipLen };
  });
  // does an axis-aligned chip box centred at (cx,cy) cross any arrow line
  // segment (pivot → tip)? Uses real segment-vs-rectangle intersection.
  function segRect(x1,y1,x2,y2, rx,ry,rw,rh){
    if ((x1>=rx&&x1<=rx+rw&&y1>=ry&&y1<=ry+rh) || (x2>=rx&&x2<=rx+rw&&y2>=ry&&y2<=ry+rh)) return true;
    const edges=[[rx,ry,rx+rw,ry],[rx+rw,ry,rx+rw,ry+rh],[rx+rw,ry+rh,rx,ry+rh],[rx,ry+rh,rx,ry]];
    function ix(ax,ay,bx,by,cx2,cy2,dx,dy){
      const d=(bx-ax)*(dy-cy2)-(by-ay)*(dx-cx2); if(!d) return false;
      const t=((cx2-ax)*(dy-cy2)-(cy2-ay)*(dx-cx2))/d;
      const u=((cx2-ax)*(by-ay)-(cy2-ay)*(bx-ax))/d;
      return t>=0&&t<=1&&u>=0&&u<=1;
    }
    return edges.some(e=>ix(x1,y1,x2,y2,e[0],e[1],e[2],e[3]));
  }
  const others = placedChipBoxes[a.lens] || [];
  // a candidate (centre) is GOOD if its box stays in-frame, clears every arrow
  // line, and clears any sibling chip already placed this frame.
  function score(cx,cy){
    const box = { x:cx-w/2, y:cy-hh/2, w, h:hh };
    const inFrame = box.x>=F.x0+2 && box.x+w<=F.x1-2 && box.y>=F.y0+2 && box.y+hh<=F.y1-2;
    const hitsLine = sibs.some(s => segRect(pivot.x,pivot.y,s.x2,s.y2, box.x, box.y, w, hh));
    const hitsChip = others.some(o => rectsOverlap(box, o));
    return { inFrame, clear: !hitsLine && !hitsChip };
  }
  const rad = ownDeg * Math.PI/180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  const baseReach = a.tipLen + (LAUNCH[key] ? 40 : 30);
  // Build candidates: first push BEYOND the tip along the arrow ray (radial
  // steps), then — if the frame edge blocks that — offset PERPENDICULAR to the
  // ray (both sides). Pick the first candidate that is in-frame AND fully clear;
  // otherwise fall back to the clearest in-frame one (then plain radial).
  const px = -sin, py = cos;                 // unit perpendicular to the ray
  let tx = pivot.x + cos*baseReach, ty = pivot.y + sin*baseReach, chosen = false, firstInFrame = null;
  outer:
  for (const perp of [0, 22, -22, 40, -40, 58, -58]){
    for (let step=0; step<=11; step++){
      const reach = baseReach + step*14;
      const cx = pivot.x + cos*reach + px*perp;
      const cy = pivot.y + sin*reach + py*perp;
      const s = score(cx, cy);
      if (s.inFrame && !firstInFrame) firstInFrame = { cx, cy };
      if (s.inFrame && s.clear){ tx = cx; ty = cy; chosen = true; break outer; }
    }
  }
  if (!chosen && firstInFrame){ tx = firstInFrame.cx; ty = firstInFrame.cy; }
  const wrap = $('vchip_'+key);
  const rect = wrap.querySelector('rect');
  const txt  = wrap.querySelector('text');
  if (LAUNCH[key]){
    // derived value from solveFlight; both shown to 1 dp with a degree sign
    const v = solveFlight(state)[LAUNCH[key].solveKey];
    txt.textContent = (LAUNCH[key].fmt==='signed' ? f1(v)+'°' : v.toFixed(1)+'°');
  } else {
    const v = state[ARROW_STATE_KEY[key]];
    txt.textContent = (key==='loft' ? v.toFixed(1)+'°' : f1(v)+'°');
  }
  // clamp the chip centre so the whole rect stays inside the LIVE lens frame
  // (the fitted viewBox) — it never clips outside the panel.
  const cx = Math.max(F.x0 + w/2 + 2, Math.min(tx, F.x1 - w/2 - 2));
  const cy = Math.max(F.y0 + hh/2 + 2, Math.min(ty, F.y1 - hh/2 - 2));
  rect.setAttribute('x', cx - w/2); rect.setAttribute('y', cy - hh/2);
  rect.setAttribute('width', w);
  rect.setAttribute('height', hh);
  txt.setAttribute('x', cx); txt.setAttribute('y', cy + 7);
  // record this chip's final box so a sibling chip in the same lens dodges it.
  (placedChipBoxes[a.lens] || (placedChipBoxes[a.lens]=[])).push({ x:cx-w/2, y:cy-hh/2, w, h:hh });
}

// ── render loop (rAF) eases visAngle → targetAngle ──────────────
let rafPending = false;
function scheduleRender(){
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(tick);
}
function tick(){
  rafPending = false;
  let stillEasing = false;
  placedChipBoxes.dir = []; placedChipBoxes.ht = [];   // fresh per-frame chip-collision set
  // interactive input arrows (chip-fade gated on activeKey)
  for (const key of Object.keys(ARROWS)){
    if (reduce){
      visAngle[key] = targetAngle[key];           // snap, no easing
    } else {
      const d = targetAngle[key] - visAngle[key];
      if (Math.abs(d) > 0.0004){
        visAngle[key] += d * 0.28;                 // ease toward target
        stillEasing = true;
      } else {
        visAngle[key] = targetAngle[key];
      }
    }
    applyArrowTransform(key);
    if (activeKey === key) placeChip(key);         // chip-fade always on
  }
  // DISPLAY-ONLY launch indicators — same easing (reduced-motion snaps). Their
  // value chip is no longer always-on: it fades in with its lens's arrows and
  // is only placed while that lens's launch chip is the active chip.
  for (const key of Object.keys(LAUNCH)){
    if (reduce){
      visAngle[key] = targetAngle[key];
    } else {
      const d = targetAngle[key] - visAngle[key];
      if (Math.abs(d) > 0.0004){
        visAngle[key] += d * 0.28;
        stillEasing = true;
      } else {
        visAngle[key] = targetAngle[key];
      }
    }
    applyArrowTransform(key);
    if (activeLaunch === key) placeChip(key);   // placed only while shown
  }
  drawCone();
  if (stillEasing) scheduleRender();
}

// ── SUBTLE CURVED GAP FIELD between two arrows (both lenses) ──────────────
// A sector ("pie wedge") whose two straight edges lie along the two arrows'
// VISUAL angles and whose outer edge is a CURVED arc at radius r, centred on
// the lens pivot. Built as: M pivot L a  A r r 0 0 sweep b  Z, where a and b
// are the points at radius r along each arrow. The sweep flag is chosen so the
// arc spans the MINOR angle directly between the two arrows (tracks them live).
function buildWedge(pathId, pivot, baseDeg, keyA, keyB, r){
  const angA = (baseDeg + visAngle[keyA]*180/Math.PI) * Math.PI/180;
  const angB = (baseDeg + visAngle[keyB]*180/Math.PI) * Math.PI/180;
  const ax = pivot.x + Math.cos(angA)*r, ay = pivot.y + Math.sin(angA)*r;
  const bx = pivot.x + Math.cos(angB)*r, by = pivot.y + Math.sin(angB)*r;
  // signed delta a→b in degrees, normalised to (-180,180]; sweep=1 when going
  // clockwise (positive delta) so the arc hugs the gap between the arrows.
  let dDeg = (visAngle[keyB] - visAngle[keyA]) * 180/Math.PI;
  while (dDeg > 180) dDeg -= 360; while (dDeg <= -180) dDeg += 360;
  const sweep = dDeg >= 0 ? 1 : 0;
  $(pathId).setAttribute('d',
    `M ${pivot.x} ${pivot.y} L ${ax.toFixed(1)} ${ay.toFixed(1)} `
    + `A ${r} ${r} 0 0 ${sweep} ${bx.toFixed(1)} ${by.toFixed(1)} Z`);
}
// face↔path field (Direction lens) + attack↔loft field (Height lens).
// "Spisskant til spisskant": the curved outer arc passes through the arrows'
// ACTUAL TIPS — radius = the (now uniform) arrow tipLen for that lens, and the
// two endpoints sit at the tips computed along each arrow's LIVE visual angle.
// Since face=path and attack=loft, both endpoints share one radius → clean arc.
function drawCone(){
  buildWedge('dirCone', DIR_PIVOT, -90, 'face', 'path', ARROWS.face.tipLen);   // 235 — face/path tips
  buildWedge('htCone',  HT_PIVOT,    0, 'attack', 'loft', ARROWS.loft.tipLen); // 220 — attack/loft tips
}

// ── Range-underline geometry + fill helpers (shared by rail + flight grid) ──
// VISUAL change only: a value's position in its range is drawn as a thin cyan
// underline fill. The per-metric ranges + frac logic are reused unchanged.
// fraction 0..1 of where a value sits within [lo,hi]
function rangeFrac(val, lo, hi){
  const f = (val - lo) / (hi - lo);
  return Math.max(0, Math.min(1, f));
}
// signed (centre origin): magnitude as fraction of the symmetric half-range
function signedFrac(val, lo, hi){
  const half = (hi - lo) / 2;
  const f = Math.abs(val) / half;
  return Math.max(0, Math.min(1, f));
}
// underline geometry as {left,width} in PERCENT of the bar track.
// non-signed: fills from the left edge. signed: fills from the CENTRE,
// extending right for positive values and left for negative.
function barGeom(r, flight){
  const v = r.get(flight);
  if (r.signed){
    const half = signedFrac(v, r.lo, r.hi) * 50;   // 0..50% each side of centre
    return v >= 0 ? { left:50, width:half } : { left:50-half, width:half };
  }
  return { left:0, width:rangeFrac(v, r.lo, r.hi) * 100 };
}
// apply a {left,width} geometry to a .rng .fill element; animate unless reduce/static
function applyBarFill(fillEl, g, animate){
  if (!fillEl) return;
  fillEl.style.left = g.left + '%';
  if (animate && !reduce){
    fillEl.style.transition = '';
    fillEl.style.width = '0%';                       // reset to empty
    void fillEl.getBoundingClientRect();             // reflow
    requestAnimationFrame(()=>{ fillEl.style.width = g.width + '%'; });
  } else {
    fillEl.style.transition = 'none';
    fillEl.style.width = g.width + '%';
    void fillEl.getBoundingClientRect();
    fillEl.style.transition = '';
  }
}

const DVB = 'viewBox="0 0 200 80"';

function svgWrap(label, inner){
  return `<svg ${DVB} preserveAspectRatio="xMidYMid meet" role="img" aria-label="${label}">${inner}</svg>`;
}
function arrow(x1,y1,x2,y2,color,w=3){
  const ang = Math.atan2(y2-y1, x2-x1);
  const hx = x2 - Math.cos(ang)*7, hy = y2 - Math.sin(ang)*7;
  const px = Math.cos(ang+Math.PI/2)*3.6, py = Math.sin(ang+Math.PI/2)*3.6;
  return `<line x1="${x1}" y1="${y1}" x2="${hx}" y2="${hy}" stroke="${color}" stroke-width="${w}" stroke-linecap="round"/>`
    + `<polygon points="${x2},${y2} ${(hx-px).toFixed(1)},${(hy-py).toFixed(1)} ${(hx+px).toFixed(1)},${(hy+py).toFixed(1)}" fill="${color}"/>`;
}
function arcBetween(cx,cy,r,a1,a2,color,w=1.6){
  const p1x=cx+Math.cos(a1)*r, p1y=cy+Math.sin(a1)*r, p2x=cx+Math.cos(a2)*r, p2y=cy+Math.sin(a2)*r;
  const large = Math.abs(a2-a1) > Math.PI ? 1 : 0;
  return `<path d="M ${p1x.toFixed(1)} ${p1y.toFixed(1)} A ${r} ${r} 0 ${large} 1 ${p2x.toFixed(1)} ${p2y.toFixed(1)}" fill="none" stroke="${color}" stroke-width="${w}"/>`;
}

// register every param into cellEls under a 'bd_' namespace so these never
// collide with the rail keys (carry/spinAxis/apex…) or flight keys (f_*) that
// already live in cellEls with their own valEl/barFill. btn is patched in per
// trigger below. openPopover/fillPopover/closePopover work unchanged.

  cellEls['bd_'+key] = { btn: null, valEl: null, barFill: null, def: { ...def, isBreakdown:true } };
});

// The in-canvas launch arrows + their value chips are now PURELY VISUAL
// (decorative, aria-hidden, non-interactive). Their dynamic breakdown
// explanations are reached ONLY via the bottom-rail chips ("Start dir" /
// "Launch") and the flight-grid chips ("Launch Dir" / "Launch Ang"), wired
// below through redirectCell — which anchors bd_launchDir / bd_launchAng to
// whichever chip the user pressed.

// ── Route EVERY rail chip + flight-grid chip to its LIVE breakdown popover ──
// buildRail / buildFlightCells already added a click→togglePopover(ownKey).
// A capture-phase redirect pre-empts that and opens the breakdown instead.
// When the redirect fires we anchor the breakdown to the CLICKED chip so the
// popover positions next to whatever the user pressed (rail OR flight cell).
function redirectCell(cellKey, bdKey){
  const reg = cellEls[cellKey];
  if (!reg || !reg.btn) return;
  reg.btn.addEventListener('click', e=>{
    e.stopImmediatePropagation();   // pre-empt the original togglePopover(ownKey)
    cellEls[bdKey].btn = reg.btn;   // anchor to the chip that was clicked
    togglePopover(bdKey);
  }, true);
  // keyboard (Enter/Space) on a native <button> fires a click → handled above.
}
// rail chip key → 'bd_*' breakdown key
const RAIL_TO_BREAKDOWN = {
  faceToPath:'bd_faceToPath', carry:'bd_carry', start:'bd_launchDir', spinAxis:'bd_spinAxis',
  curve:'bd_curve', launch:'bd_launchAng', ballSpeed:'bd_ballSpeed', backspin:'bd_backspin',
  spinLoft:'bd_spinLoft', apex:'bd_apex', land:'bd_landAngle',
};
Object.entries(RAIL_TO_BREAKDOWN).forEach(([c,t])=> redirectCell(c, t));
// flight-grid chip key (f_*) → 'bd_*' breakdown key
const FLIGHT_TO_BREAKDOWN = {
  f_carry:'bd_carry', f_launchDir:'bd_launchDir', f_launchAngle:'bd_launchAng',
  f_curve:'bd_curve', f_ballSpeed:'bd_ballSpeed', f_backspin:'bd_backspin',
  f_spinLoft:'bd_spinLoft', f_smash:'bd_smash', f_apex:'bd_apex', f_landAngle:'bd_landAngle',
  f_spinAxis:'bd_spinAxis', f_shape:'bd_shape',
};
Object.entries(FLIGHT_TO_BREAKDOWN).forEach(([c,t])=> redirectCell(c, t));

function renderRail(flight){
  CELLS.forEach(c => {
    if (c.key === frozenKey) return;
    const r = c.value(flight);
    const reg = cellEls[c.key];
    const el = reg.valEl;
    let html = String(r.v);
    if (r.u) html += '<small>'+r.u+'</small>';
    el.innerHTML = html;
    reg.btn.setAttribute('aria-label', c.name+' '+r.v+', opens explanation');
  });
}

// STAGE 7 — three-section popover body: WHAT IT IS / HOW IT'S CREATED
// (mini SVG diagram) / WHAT AFFECTS IT (ranked driver chips). Content comes
// from the single shared PARAM_INFO map (no duplication between the rail and
// the flight overlay — both registries redirect into the SAME 'bd_*' keys).
// No formulas, no honesty/EST footers — calculations are noise per the brief.
function fillPopover(key){
  const c = cellEls[key].def;
  const flight = solveFlight(state);

  $('popHeadName').textContent = c.name;
  $('popHeadVal').textContent = c.headVal(flight);
  const planeEl = $('popHeadPlane');
  if (c.plane){ planeEl.hidden = false; planeEl.textContent = c.plane === 'V' ? 'Vertical' : 'Horizontal'; }
  else planeEl.hidden = true;

  // SECTION 1 — WHAT IT IS
  $('popDesc').textContent = c.desc;

  // SECTION 2 — HOW IT'S CREATED (mini SVG diagram, per-parameter)
  const dEl = $('popDiagram');
  dEl.innerHTML = c.diagram ? c.diagram() : '';

  // SECTION 3 — WHAT AFFECTS IT (ranked driver chips — informative, not buttons)
  const drWrap = $('popDrivers'); drWrap.innerHTML = '';
  (c.drivers || []).forEach((d, i) => {
    const row = document.createElement('div'); row.className = 'driver';
    const rank = document.createElement('span'); rank.className = 'dRank'; rank.textContent = String(i+1);
    const name = document.createElement('span'); name.className = 'dName'; name.textContent = d.label;
    const trend = document.createElement('span'); trend.className = 'dTrend ' + d.dir;
    trend.textContent = d.dir === 'up' ? '↑' : '↓';
    trend.setAttribute('aria-label', d.dir === 'up' ? 'increases it' : 'decreases it');
    row.append(rank, name, trend);
    drWrap.appendChild(row);
  });
}

// Position the popover near the clicked chip but ALWAYS fully inside the
// viewport. Prefer placing ABOVE the chip; if there isn't room, flip BELOW.
// In the chosen direction we cap the plate's height (--pop-max) to the space
// available so it never spills off-screen (internal scroll only as a last
// resort). Finally clamp left/top to the margins on every side and point the
// caret up or down accordingly.
function positionPopover(btn){
  pop.hidden=false; pop.style.removeProperty('--pop-max');
  pop.style.left='-9999px'; pop.style.top='-9999px';
  const cr = btn.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight, margin=8, gap=12;

  // space above vs below the chip (account for the gap + margin)
  const spaceAbove = cr.top - gap - margin;
  const spaceBelow = vh - cr.bottom - gap - margin;
  // place above unless there's clearly more room below
  const placeBelow = spaceBelow > spaceAbove;
  const avail = (placeBelow ? spaceBelow : spaceAbove);
  // cap plate height to the available space (minus the popover's 5px padding ×2
  // + the plate's own border); keep a sane floor so tiny gaps still readable.
  pop.style.setProperty('--pop-max', Math.max(120, avail-16)+'px');

  // measure with the height cap applied
  const pr = pop.getBoundingClientRect();

  // vertical placement, then clamp inside [margin, vh-margin]
  let top = placeBelow ? (cr.bottom + gap) : (cr.top - pr.height - gap);
  top = Math.max(margin, Math.min(top, vh - pr.height - margin));

  // horizontal: centre on the chip, clamp inside [margin, vw-margin]
  let left = cr.left + cr.width/2 - pr.width/2;
  left = Math.max(margin, Math.min(left, vw - pr.width - margin));

  pop.style.left=left+'px'; pop.style.top=top+'px';

  // caret points toward the chip from whichever edge faces it
  const caret=$('popCaret');
  let caretX = cr.left + cr.width/2 - left - 7;
  caretX = Math.max(14, Math.min(caretX, pr.width-28));
  caret.style.left=caretX+'px';
  if (placeBelow){
    // popover is below the chip → caret on the popover's TOP edge, pointing up.
    caret.style.top='-6px'; caret.style.bottom='auto';
    pop.classList.add('below');
  } else {
    caret.style.bottom='-6px'; caret.style.top='auto';
    pop.classList.remove('below');
  }
  pop.style.transformOrigin = placeBelow ? 'top center' : 'bottom center';
}

function openPopover(key){
  closePopover(false);
  saHaptics.impact('light');   // STAGE 4 — popover open (close: none)
  const btn = cellEls[key].btn;
  fillPopover(key); positionPopover(btn);
  popOpenKey=key; frozenKey=key;
  btn.setAttribute('aria-expanded','true');
  requestAnimationFrame(()=>pop.classList.add('open'));
  pop.setAttribute('tabindex','-1'); pop.focus({preventScroll:true});
  // capture phase so popover-Escape runs BEFORE the flight overlay's own
  // Escape handler — closes the popover only, never the whole overlay.
  document.addEventListener('keydown', onPopKey, true);
  setTimeout(()=>document.addEventListener('pointerdown', onOutside, true), 0);
}
function closePopover(restoreFocus){
  if (!popOpenKey) return;
  const key=popOpenKey, btn=cellEls[key].btn;
  btn.setAttribute('aria-expanded','false');
  pop.classList.remove('open');
  popOpenKey=null; frozenKey=null;
  renderRail(solveFlight(state));
  document.removeEventListener('keydown', onPopKey, true);
  document.removeEventListener('pointerdown', onOutside, true);
  const hide=()=>{ if(!popOpenKey) pop.hidden=true; };
  if (reduce) hide(); else setTimeout(hide,200);
  if (restoreFocus!==false) btn.focus();
}
function togglePopover(key){ if (popOpenKey===key) closePopover(); else openPopover(key); }
function onPopKey(e){
  if (e.key==='Escape'){
    e.preventDefault();
    // when a popover is open INSIDE the flight overlay, Escape must close only the
    // popover — stop it also reaching the overlay's own Escape handler (closeFlight).
    e.stopImmediatePropagation();
    closePopover();
  }
}
function onOutside(e){
  if (pop.contains(e.target)) return;
  if (popOpenKey && cellEls[popOpenKey].btn.contains(e.target)) return;
  closePopover(false);
}

// ════════════════════════════════════════════════════════════════
//  CHIP-FADE behaviour (ALWAYS ON)
//   Adjusting a param highlights its arrow, dims others to .55, and
//   shows a value chip that HOLDS 1500ms after release then FADES 260ms.
// ════════════════════════════════════════════════════════════════
let activeKey = null;
let activeLaunch = null;   // the launch chip currently shown (folded into the same flow)
let holdTimer = null;

// which derived launch chip belongs to the lens of an input arrow:
// Direction lens (face, path) → launchDir; Height lens (attack, loft) → launchAng.
const LAUNCH_FOR_KEY = { face:'launchDir', path:'launchDir', attack:'launchAng', loft:'launchAng' };

function setActive(key){
  activeKey = key;
  activeLaunch = LAUNCH_FOR_KEY[key] || null;
  clearTimeout(holdTimer);
  Object.keys(ARROWS).forEach(k=>{
    $(ARROWS[k].group).classList.toggle('dim', k!==key);
  });
  Object.keys(ARROWS).forEach(k=>{
    $('vchip_'+k).classList.toggle('show', k===key);
  });
  // launch chips fade in with their lens's arrows (only the active lens's chip)
  Object.keys(LAUNCH).forEach(k=>{
    $('vchip_'+k).classList.toggle('show', k===activeLaunch);
  });
  placedChipBoxes.dir = []; placedChipBoxes.ht = [];   // fresh chip-collision set
  placeChip(key);                                       // input chip first
  if (activeLaunch) placeChip(activeLaunch);            // launch chip dodges it
}
function releaseActive(){
  if (activeKey===null) return;
  if (reduce){
    clearChipState();   // reduced-motion: no hold/fade, snap to clean state
    return;
  }
  holdTimer = setTimeout(()=>{ clearChipState(); }, 1500); // HOLD 1500ms → CSS fades 260ms
}
function clearChipState(){
  activeKey = null;
  activeLaunch = null;
  Object.keys(ARROWS).forEach(k=>{
    $(ARROWS[k].group).classList.remove('dim');
    $('vchip_'+k).classList.remove('show');
  });
  Object.keys(LAUNCH).forEach(k=>{
    $('vchip_'+k).classList.remove('show');
  });
}

// ════════════════════════════════════════════════════════════════
//  RECOMPUTE  (every change → solveFlight → arrows + rail)
// ════════════════════════════════════════════════════════════════
function recomputeAngles(){ Object.keys(ARROWS).forEach(computeTarget); Object.keys(LAUNCH).forEach(computeTarget); }
// keep each lens SVG's aria-label in sync with the live data it depicts
function updateLensAria(){
  $('svgDir').setAttribute('aria-label',
    `Top-down direction view. Clubface aim ${fmtDeg(state.faceAngle)} and swing path ${fmtDeg(state.clubPath)} relative to the target line (negative is left, positive is right). A yellow launch arrow shows the start line, bending toward the spin side. A cyan marker shows the predicted landing position.`);
  $('svgHt').setAttribute('aria-label',
    `Side-on height view. Angle of attack ${fmtDeg(state.attackAngle)} and dynamic loft ${fmtLoftStr(state.dynamicLoft)} at impact (negative attack is descending). A yellow arrow shows the launch angle.`);
}

// ════════════════════════════════════════════════════════════════
//  MAIN-CAUSE GENERATOR + COACH-CUE LIBRARY
//   Ported verbatim (rule logic) from impact-focus-mock.html. Produces a
//   short "Main cause: …" line + a longer coaching cue, shared across the
//   Direction/Launch coach lines AND the flight overlay's fDelta area.
// ════════════════════════════════════════════════════════════════
const CUES = {
  faceOpen:   'Face open to path — starts right, curves further right.',
  faceClosed: 'Face closed to path — starts left, curves further left.',
  pathLeft:   'Path swings left (out-to-in) — start line pulls left.',
  pathRight:  'Path swings right (in-to-out) — start line pushes right.',
  attackDown: 'Steep downward attack — more spin loft, higher and shorter.',
  attackUp:   'Upward attack — less spin loft, flatter and hotter.',
  loftHigh:   'High dynamic loft — more effective loft at impact climbs the ball steeply.',
  loftLow:    'Low dynamic loft — less effective loft at impact keeps the ball flight low and driving.',
  spinLoftHigh: 'High spin loft drives a tall, soft landing shot.',
  spinLoftLow:  'Low spin loft drives a low, hot, running shot.',
};
function mainCause(f){
  const face = state.faceAngle, path = state.clubPath;
  const f2p = face - path;
  const startDir = f.startDirection;
  const spinLoft = f.spinLoft;
  if (Math.abs(f2p) >= 2){
    const curveDir = f2p > 0 ? 'right' : 'left';
    const rel = f2p > 0 ? 'open' : 'closed';
    return {
      cause: `Main cause: face ${rel} to path → curves ${curveDir}`,
      cue: f2p > 0 ? CUES.faceOpen : CUES.faceClosed,
    };
  }
  if (Math.abs(startDir) >= 2){
    const dir = startDir > 0 ? 'right' : 'left';
    return {
      cause: `Main cause: face and path aim ${dir} → straight push/pull`,
      cue: path > 0 ? CUES.pathRight : (path < 0 ? CUES.pathLeft : (startDir>0?CUES.faceOpen:CUES.faceClosed)),
    };
  }
  if (spinLoft >= 36){
    return { cause: 'Main cause: high spin loft → high, short flight', cue: CUES.spinLoftHigh };
  }
  if (spinLoft <= 24){
    return { cause: 'Main cause: low spin loft → low, hot flight', cue: CUES.spinLoftLow };
  }
  return { cause: 'Neutral delivery — small tweaks, big effects', cue: '' };
}
function secondaryCue(){
  // pick the most relevant single cue for attack/loft context (used to enrich Launch focus)
  if (state.attackAngle <= -6) return CUES.attackDown;
  if (state.attackAngle >= 4) return CUES.attackUp;
  if (state.dynamicLoft >= 40) return CUES.loftHigh;
  if (state.dynamicLoft <= 18) return CUES.loftLow;
  return '';
}
function updateCoachLines(f){
  const mc = mainCause(f);
  const sec = secondaryCue();
  const causeDir = $('causeDir'), cueDir = $('cueDir');
  if (causeDir) causeDir.textContent = mc.cause;
  if (cueDir) cueDir.textContent = mc.cue || sec;
  // flight-overlay coach cue (near the fDelta micro-label) — same content
  const flightCue = $('flightCoachCue');
  if (flightCue) flightCue.textContent = mc.cue || sec;
}

// ════════════════════════════════════════════════════════════════
//  STAGE 6 — LANDING PREDICTOR (direction lens, live)
//   A pulsing cyan orb shows WHERE the ball will finish (solveFlight().offline,
//   metres, + = right / − = left), mapped onto the direction lens's far zone.
//   Reuses the SAME solveFlight() output already computed for the rail/arrows
//   — no second solve. Updates every recompute(); the aria announcement is
//   debounced ~800ms after the last input so it only fires once the user settles.
// ════════════════════════════════════════════════════════════════
const PRED_Y = 52;              // far-zone screen-Y (near the TARGET marker, y=40)
const PRED_X0 = 200;             // centre-line screen-X (ball is at x=200)
const PRED_HALF_RANGE_M = 30;    // metres of offline mapped to the lens's usable half-width
const PRED_HALF_PX = 150;        // px half-width available either side of centre (soft-clamped)
const PRED_CURVE = false;        // ── curve hint (PRED_CURVE): OFF — the bent launch-dir arrow now carries shot-shape/spin; predictor dot keeps the offline reference ──
const PRED_REST_DELAY_MS = 1200; // ms after the LAST input before the predictor eases to its faint resting state
const PRED_BALL_Y = 330;         // lens ball-Y (arrows' pivot) — start of the curve hint
const PRED_CURVE_N = 24;         // curve-hint sample count (cheap polyline rebuild per render)
let predGSAP = null;             // GSAP pulse tween (built once, lazily)
let predLastIntLabel = null;     // last INTEGER metres shown, so the label only updates on whole-metre change
let predAnnounceTimer = null;    // debounce handle for the aria-live settle announcement
let predRestTimer = null;        // debounce handle for the attention fade-down (.rest)

// NOTE: predictorX() is no longer used by the dot/curve (see xOf()/rawLatPx()
// below) — the predictor is now drawn in the SAME exaggerated-angle (GAIN_DIR)
// space as the g_face/g_path/g_launchDir arrows, so the ball-flight schematic
// stays internally consistent with the yellow start-direction arrow. Kept
// here unused (no other callers found) in case a future caller needs the old
// true-metre linear mapping.
function predictorX(offlineM){
  // soft-edge: tanh keeps the dot INSIDE the lens always, tapering smoothly as
  // offline grows past the mapped range rather than hard-clipping at an edge.
  const frac = offlineM / PRED_HALF_RANGE_M;
  const t = Math.tanh(frac);
  return PRED_X0 + t * PRED_HALF_PX;
}

// ── angular schematic (matches g_face/g_path/g_launchDir's GAIN_DIR exaggeration) ──
// Dtot: vertical px from the ball (pivot of the direction arrows) up to the
// predictor's far-zone row — the "downrange" axis of this top-down schematic.
const PRED_DTOT = PRED_BALL_Y - PRED_Y;   // 278

// Raw (pre-soft-clamp) lateral px at downrange fraction t∈[0,1], built from the
// REAL start/finish angles exaggerated by the SAME GAIN_DIR as the arrows:
//   t=0 tangent slope = Dtot*tan(startVis) → initial screen heading = startVis,
//   i.e. the curve leaves the ball at EXACTLY the g_launchDir arrow's angle.
//   t=1 value = Dtot*tan(finishVis) → the finish (dot) position.
function rawLatPx(t, startVis, finishVis){
  const s = Math.tan(startVis), f = Math.tan(finishVis);
  return PRED_DTOT * (s * t + (f - s) * t * t);
}
// Soft-clamp (same tanh shape as the old predictorX) applied to a RAW px value
// — used for BOTH the curve samples and the dot, so the curve always ends
// exactly at the dot.
function xOf(rawPx){
  return PRED_X0 + PRED_HALF_PX * Math.tanh(rawPx / PRED_HALF_PX);
}
// Real (non-exaggerated) start/finish heading, in radians, from solveFlight().
function predictorAngles(flight){
  const startAngleRad  = flight.startDirection * Math.PI/180;
  const finishAngleRad = Math.atan2(flight.offline * YD2M, flight.carry * YD2M);
  return {
    startVis:  GAIN_DIR * startAngleRad,
    finishVis: GAIN_DIR * finishAngleRad,
  };
}

function setupPredictorPulse(){
  if (reduce || predGSAP) return;
  predGSAP = gsap.timeline({ repeat:-1, yoyo:true, paused:true });
  predGSAP.to(['#predDot','#predHalo'], {
    scale:1.12, duration:1.0, ease:'sine.inOut', transformOrigin:'center',
  }, 0);
  predGSAP.to('#predHalo', { opacity:.36, duration:1.0, ease:'sine.inOut' }, 0);
}

// ── curve hint (PRED_CURVE) ─────────────────────────────────────
// Thin polyline from the ball (200,330) to the predicted finish, drawn in the
// SAME exaggerated angular space as the g_face/g_path/g_launchDir arrows (see
// rawLatPx()/xOf() above): the curve's start tangent lands EXACTLY on the
// g_launchDir arrow's visual angle, and its end lands EXACTLY on the
// predictor dot (both go through the same xOf() soft-clamp). The LABEL
// (rendered separately in renderPredictor) stays in TRUE metres — only the
// on-screen POSITION is exaggerated.
function renderPredictorCurve(flight, offlineM){
  const curveG = $('predCurveG');
  if (!PRED_CURVE){ curveG.setAttribute('opacity', '0'); return; }
  const { startVis, finishVis } = predictorAngles(flight);
  let d = '';
  for (let i = 0; i <= PRED_CURVE_N; i++){
    const t = i / PRED_CURVE_N;
    const px = xOf(rawLatPx(t, startVis, finishVis));
    const py = PRED_BALL_Y + t * (PRED_Y - PRED_BALL_Y);
    d += (i === 0 ? 'M' : 'L') + px.toFixed(1) + ' ' + py.toFixed(1) + ' ';
  }
  $('predCurve').setAttribute('d', d);
  curveG.setAttribute('opacity', '1');
}
// ── /curve hint (PRED_CURVE) ────────────────────────────────────

// attention behaviour: full strength while inputs are moving, then ~1.2s after
// the last input the predictor (and curve hint) ease down to a faint resting
// state via the .rest class. Reduced-motion: static resting state, no fades.
function predAttentionKick(){
  const group = $('predGroup'), curveG = $('predCurveG');
  if (reduce){ group.classList.add('rest'); curveG.classList.add('rest'); return; }
  group.classList.remove('rest'); curveG.classList.remove('rest');
  clearTimeout(predRestTimer);
  predRestTimer = setTimeout(()=>{
    group.classList.add('rest'); curveG.classList.add('rest');
  }, PRED_REST_DELAY_MS);
}

function renderPredictor(flight){
  const offlineM = flight.offline * YD2M;
  // DOT position: exaggerated (GAIN_DIR) finish angle — same angular schematic
  // as the curve (renderPredictorCurve), so the curve always ends AT the dot.
  const { finishVis } = predictorAngles(flight);
  const rawFinishPx = rawLatPx(1, 0, finishVis);   // t=1 → only the finish term survives
  const x = xOf(rawFinishPx);
  const dot = $('predDot'), halo = $('predHalo'), edge = $('predEdge');
  const group = $('predGroup');
  dot.setAttribute('cx', x.toFixed(1)); dot.setAttribute('cy', PRED_Y);
  halo.setAttribute('cx', x.toFixed(1)); halo.setAttribute('cy', PRED_Y);
  edge.querySelector('circle').setAttribute('cx', x.toFixed(1));
  edge.querySelector('circle').setAttribute('cy', PRED_Y);
  // soft-edge indicator: a thin ring appears once the schematic value is pushed
  // past the lens's usable half-width (saturating the tanh soft-clamp), so an
  // extreme shot still reads as "off the edge" rather than silently capping.
  const beyond = Math.abs(rawFinishPx) > PRED_HALF_PX;
  edge.setAttribute('opacity', beyond ? '.8' : '0');
  // bare label (no box) just below the dot — throttled to whole-metre changes
  const rounded = Math.round(Math.abs(offlineM));
  const label = rounded < 1 ? 'On line' : `${rounded} m ${offlineM >= 0 ? 'R' : 'L'}`;
  const txt = $('predLabel');
  txt.setAttribute('x', x.toFixed(1)); txt.setAttribute('y', PRED_Y + 22);   // clears the enlarged dot/halo; matches the 20px label
  if (label !== predLastIntLabel){   // compare full label so a pure SIGN flip (41 R → 41 L) also refreshes
    predLastIntLabel = label;
    txt.textContent = label;
  }
  // ── curve hint (PRED_CURVE) ──
  renderPredictorCurve(flight, offlineM);
  // ── /curve hint (PRED_CURVE) ──
  group.classList.add('show');
  group.setAttribute('opacity', '1');
  predAttentionKick();
  if (reduce){
    gsap.set(['#predDot','#predHalo'], { scale:1 });
    gsap.set('#predHalo', { opacity:.2 });
  } else {
    setupPredictorPulse();
    if (predGSAP && predGSAP.paused()) predGSAP.play();
  }
  // debounced settle announcement (~800ms after the last input)
  clearTimeout(predAnnounceTimer);
  predAnnounceTimer = setTimeout(()=>{
    const live = $('predLive');
    const label = rounded < 1 ? 'on line' : `${rounded} metres ${offlineM >= 0 ? 'right' : 'left'}`;
    live.textContent = `Predicted finish ${label}`;
  }, 800);
}

// ── LAUNCH-DIR bend (replaces the old curve line) ───────────────
// The launch-dir arrow curves toward the spin side. Its group is already
// rotated to the START direction — exactly predictorAngles().startVis, since
// ROT.launchDir uses the same GAIN_DIR — so the bend is derived from the SAME
// geometry as the predictor dot: the tip offset is chosen so the shaft's end
// tangent aims at the finish heading (finishVis). This makes the bend
// carry-aware (FIX G: curve grows with carry², not just face-to-path) and
// keeps the yellow arrow + cyan dot telling one consistent story. For the
// quadratic M P0 Q C T with C straight above the pivot at half-length, the
// end tangent is (T−C), so tan(delta) = b / (LB_L/2)  →  b = (LB_L/2)·tan(delta).
const LB_L    = 198;   // shaft length pivot→tip (matches LAUNCH.launchDir.tipLen)
const LB_SOFT = 44;    // tanh soft-clamp on the tip offset (px) — same shape as xOf()
function renderLaunchBend(flight){
  const P = DIR_PIVOT;                       // {x:200, y:330}
  const tipY = P.y - LB_L;                   // 132
  const { startVis, finishVis } = predictorAngles(flight);
  // delta = finish heading relative to the (already-rotated) shaft, visual space.
  // Clamp before tan() so a pathological offline/start combo can't flip sign
  // past 90°; the tanh soft-cap below is what actually bounds the visual.
  let delta = finishVis - startVis;
  if (delta >  1.1) delta =  1.1; else if (delta < -1.1) delta = -1.1;
  const raw = (LB_L / 2) * Math.tan(delta);
  const b = LB_SOFT * Math.tanh(raw / LB_SOFT);
  const Cx = P.x, Cy = P.y - LB_L * 0.5;     // control straight above → leaves straight, curves late
  const Tx = P.x + b, Ty = tipY;
  const path = $('line_launchDir');
  if (path) path.setAttribute('d', `M${P.x},${P.y} Q${Cx},${Cy.toFixed(1)} ${Tx.toFixed(1)},${Ty}`);
  const head = $('head_launchDir');
  if (head){                                 // orient the head along the end tangent (T − C)
    const deg = Math.atan2(Tx - Cx, -(Ty - Cy)) * 180 / Math.PI;
    head.setAttribute('transform', `translate(${Tx.toFixed(1)},${Ty}) rotate(${deg.toFixed(2)})`);
  }
}

function recompute(){
  recomputeAngles();
  scheduleRender();
  updateLensAria();
  if (popOpenKey) fillPopover(popOpenKey);
  const flight = solveFlight(state);
  renderRail(flight);
  renderPredictor(flight);
  renderLaunchBend(flight);
  updateCoachLines(flight);
}

// ── sliders (rAF-throttled live update via bind()) ──────────────
let pending = false;
function applyLive(){
  if (pending) return; pending=true;
  requestAnimationFrame(()=>{ pending=false; recompute(); });
}
const fmtDeg = v => f1(v)+'°';
const fmtLoftStr = v => v.toFixed(1)+'°';
const fmtSpeed = v => Math.round(v)+' mph';

// STAGE 4 — haptics: whole-degree-crossing tick() per key while dragging a
// D-plane slider (face/path/attack/loft), gated by pointerdown/up selection
// session. Coalescing + rate-limiting live inside sa-haptics.js (tick()).
const HAPTIC_KEYS = { s_face:'face', s_path:'path', s_attack:'attack', s_loft:'loft' };
function wireSliderHaptics(el, hapticKey){
  let lastWhole = null;
  el.addEventListener('pointerdown', ()=>{ lastWhole = Math.round(+el.value); saHaptics.selectionStart(); });
  el.addEventListener('input', ()=>{
    const whole = Math.round(+el.value);
    if (lastWhole === null) lastWhole = whole;
    if (whole !== lastWhole){ lastWhole = whole; saHaptics.tick(hapticKey); }
  });
  const end = ()=> saHaptics.selectionEnd();
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
}

function bind(id, key, fmt, arrowKey){
  const el=$(id), out=$('v_'+id.slice(2));
  const sync=()=>{
    const txt = fmt(+el.value);
    if (out) out.textContent = txt;
  };
  el.addEventListener('input', ()=>{ state[key]=+el.value; sync();
    if (arrowKey) setActive(arrowKey);
    applyLive();
  });
  // release → chip-fade hold
  if (arrowKey){
    const rel = ()=> releaseActive();
    el.addEventListener('change', rel);
    el.addEventListener('pointerup', rel);
    el.addEventListener('blur', rel);
  }
  if (HAPTIC_KEYS[id]) wireSliderHaptics(el, HAPTIC_KEYS[id]);
  return sync;
}

const syncs = [
  bind('s_speed', 'clubSpeed',   fmtSpeed,    null),
  bind('s_face',  'faceAngle',   fmtDeg,      'face'),
  bind('s_path',  'clubPath',    fmtDeg,      'path'),
  bind('s_attack','attackAngle', fmtDeg,      'attack'),
  bind('s_loft',  'dynamicLoft', fmtLoftStr,  'loft'),
];

// proper aria-valuetext with label names (the slider is THE accessible control)
function decorateAria(){
  const map = { s_speed:['Club speed',fmtSpeed], s_face:['Face angle',fmtDeg],
    s_path:['Club path',fmtDeg], s_attack:['Attack angle',fmtDeg],
    s_loft:['Dynamic loft',fmtLoftStr] };
  Object.entries(map).forEach(([id,[nm,fmt]])=>{
    const el=$(id);
    const set=()=> el.setAttribute('aria-valuetext', nm+' '+fmt(+el.value));
    set(); el.addEventListener('input', set);
  });
}

// ════════════════════════════════════════════════════════════════
//  PREMIUM CUSTOM SLIDERS — centre-origin fill + tick + grow + value bubble
//   Pure presentation: wraps each target <input type=range> in a .rwrap (keeping
//   its id + every existing binding intact), paints the track fill live, and
//   floats a value bubble above the thumb while dragging. Keyboard, focus-visible
//   and aria are untouched (the native input still drives everything).
// ════════════════════════════════════════════════════════════════
const TRACK_BASE = 'rgba(255,255,255,.14)';
// id → { signed, fmt }. signed → fill from the CENTRE (0); else fill from the LEFT.
const PREMIUM = {
  s_face:   { signed:true,  fmt:fmtDeg },
  s_path:   { signed:true,  fmt:fmtDeg },
  s_attack: { signed:true,  fmt:fmtDeg },
  s_loft:   { signed:false, fmt:fmtLoftStr },
  // s_speed lives in the THIN top strip → its bubble would clip above; drop it below.
  s_speed:  { signed:false, fmt:fmtSpeed, below:true },
  fSpeedRange:{ signed:false, fmt:fmtSpeed },
};
function setupPremiumSliders(){
  Object.entries(PREMIUM).forEach(([id, cfg])=>{
    const el = $(id); if (!el) return;
    el.classList.add('premium-range');
    // wrap in .rwrap (preserves id + listeners; just moves the node)
    const wrap = document.createElement('div');
    wrap.className = 'rwrap' + (cfg.signed ? ' signed' : '') + (cfg.below ? ' bubble-below' : '');
    el.parentNode.insertBefore(wrap, el);
    wrap.appendChild(el);
    // value bubble
    const bubble = document.createElement('span');
    bubble.className = 'rbubble'; bubble.setAttribute('aria-hidden','true');
    wrap.appendChild(bubble);

    const frac = () => {
      const min=+el.min, max=+el.max;
      return (max===min) ? 0 : ( (+el.value - min) / (max - min) );
    };
    // paint the track fill (centre-origin for signed; left for the rest)
    const paint = () => {
      const t = Math.max(0, Math.min(1, frac())) * 100;
      let g;
      if (cfg.signed){
        const c = 50;
        if (t >= c){
          g = `linear-gradient(90deg, ${TRACK_BASE} 0 ${c}%, var(--rc) ${c}% ${t}%, ${TRACK_BASE} ${t}% 100%)`;
        } else {
          g = `linear-gradient(90deg, ${TRACK_BASE} 0 ${t}%, var(--rc) ${t}% ${c}%, ${TRACK_BASE} ${c}% 100%)`;
        }
      } else {
        g = `linear-gradient(90deg, var(--rc) 0 ${t}%, ${TRACK_BASE} ${t}% 100%)`;
      }
      el.style.setProperty('--rf', g);
    };
    // position + fill the bubble above the thumb (thumb centre tracks the track,
    // inset by half the thumb so the centre never overflows the ends).
    const THUMB = 20;
    const placeBubble = () => {
      const w = el.clientWidth || el.getBoundingClientRect().width || 1;
      const f = Math.max(0, Math.min(1, frac()));
      const x = THUMB/2 + f * (w - THUMB);   // thumb centre in px from the left
      bubble.style.left = x + 'px';
      bubble.textContent = cfg.fmt(+el.value);
    };
    const refresh = () => { paint(); placeBubble(); };
    refresh();

    // show the bubble on drag/keyboard; fade ~700ms after release
    let bubbleTimer = null;
    const showBubble = () => { clearTimeout(bubbleTimer); wrap.classList.add('bubble-show','dragging'); };
    const hideBubbleSoon = () => {
      wrap.classList.remove('dragging');
      clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(()=> wrap.classList.remove('bubble-show'), 700);
    };
    el.addEventListener('input', ()=>{ refresh(); showBubble(); });
    el.addEventListener('pointerdown', showBubble);
    el.addEventListener('pointerup', hideBubbleSoon);
    el.addEventListener('pointercancel', hideBubbleSoon);
    el.addEventListener('keydown', showBubble);
    el.addEventListener('keyup', hideBubbleSoon);
    el.addEventListener('blur', ()=>{ wrap.classList.remove('dragging','bubble-show'); });
    // keep geometry correct when the panel resizes (track width changes)
    window.addEventListener('resize', refresh);
    el._premiumRefresh = refresh;   // so programmatic value changes can re-sync
  });
}

// ════════════════════════════════════════════════════════════════
//  TWO-WAY ARROWS (ALWAYS ON) — pointer-drag an arrow to rotate it.
//
//  A11y approach (chosen): the docked sliders are THE accessible,
//  keyboard-operable controls (each <label>+input, with aria-valuetext).
//  The SVG arrows are aria-hidden POINTER ENHANCEMENTS that round-trip to
//  those sliders, so no separate keyboard handling on the arrows is needed
//  — screen-reader / keyboard users get the full instrument via the sliders.
// ════════════════════════════════════════════════════════════════
function setupArrowDrag(svgId){
  const svg = $(svgId);
  let dragKey = null;

  function svgPoint(evt){
    const r = svg.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;
    // include the viewBox ORIGIN: fitLenses() gives these lenses an offset,
    // non-400×360 viewBox, so pointer→SVG mapping must add vb.x/vb.y. (The
    // fitted aspect ratio also matches the element exactly, so this linear
    // map is now precise — the old "meet" letterboxing skewed it slightly.)
    const x = vb.x + (evt.clientX - r.left) / r.width * vb.width;
    const y = vb.y + (evt.clientY - r.top) / r.height * vb.height;
    return { x, y };
  }

  svg.addEventListener('pointerdown', e=>{
    const g = e.target.closest('.arrowG');
    if (!g) return;
    dragKey = g.dataset.key;
    svg.setPointerCapture?.(e.pointerId);
    setActive(dragKey);
    e.preventDefault();
    moveTo(e);
  });
  svg.addEventListener('pointermove', e=>{
    if (!dragKey) return;
    moveTo(e);
  });
  function endDrag(){
    if (!dragKey) return;
    dragKey=null;
    releaseActive();
  }
  svg.addEventListener('pointerup', endDrag);
  svg.addEventListener('pointercancel', endDrag);

  function moveTo(e){
    const a = ARROWS[dragKey];
    const p = svgPoint(e);
    const dx = p.x - a.pivot.x, dy = p.y - a.pivot.y;
    // angle of pointer relative to pivot
    const ptrDeg = Math.atan2(dy, dx) * 180/Math.PI;
    const baseDeg = a.lens==='dir' ? -90 : 0;
    let rotDeg = ptrDeg - baseDeg; // visual rotation deg
    // normalize to [-180,180]
    while (rotDeg>180) rotDeg-=360; while (rotDeg<-180) rotDeg+=360;
    // invert the render mapping to recover the parameter value.
    // Direction lens: visual rotation = +value·gain (positive = right).
    // Height lens: visual rotation = -value·gain (side view, up = negative SVG).
    let valDeg = a.lens === 'dir' ? rotDeg : -rotDeg;
    const sk = ARROW_STATE_KEY[dragKey];
    valDeg = valDeg / ARROW_GAIN[dragKey];
    // clamp to slider range
    const el = $('s_'+dragKey);
    const v = clamp(valDeg, +el.min, +el.max);
    state[sk] = v;
    el.value = v;
    // route through the slider's own input handler → label + aria + arrows + rail
    el.dispatchEvent(new Event('input'));
  }
}
setupArrowDrag('svgDir');
setupArrowDrag('svgHt');

// ════════════════════════════════════════════════════════════════
//  PLAY FLIGHT OVERLAY — oblique 3D driving-range (scene C, fixed)
//   Ported from impact-flight-mock.html. Effects baked ON (Trail +
//   Atmosphere + Ball 3D); NO camera-follow, NO scene/effect toggles.
//   Plays the CURRENT instrument state via solveFlight(state).

const flightScrim = $('flightScrim');

// ── Projection constants (viewBox 0 0 VB.w 540) ──
// VB.h is FIXED at 540 (horizon/ground/tee math is vertical and unchanged).
// VB.w is made DYNAMIC to the card's real aspect ratio so preserveAspectRatio
// "slice" becomes an EXACT fit (fills full width, crops nothing). TEE_X stays
// centred at VB.w/2 so the trajectory geometry is never distorted — the scene
// just gets WIDER, never stretched.
const VB = { w:960, h:540 };
// ── HORIZON aligned to the PHOTO's receding tree-line ──
// range-day.png (1376×768) maps into the #fBgImg box (y=-40, height=620,
// "slice"): native_y → svg_y ≈ -40 + native_y·0.808. The grass→tree transition
// sits at native_y ≈ 375–395, i.e. svg_y ≈ 263–279. yH=265 lands the 50–300 m
// grid lines + horizon on the photo's ground, not up in the sky (was 196).
const yH = 265;            // horizon screen-Y (on the photo tree-line)
// ── TEE baseline raised ABOVE the bottom chip band ──
// The chip frame (.fBottom) tops out at ≈ svg-y 380 (≈70% of the 540-tall
// viewBox). yBottom=356 keeps the tee + the lowest tracer/roll points clear of
// the chips with ~20px margin, so the trajectory never enters the chip rect.
const yBottom = 356;       // tee / launch baseline screen-Y (above the chip band)
const PE_A = 2.2;          // perspective recession density (denser near horizon)
const GROUND_K = 0.86;     // fraction of (yBottom..yH) reached at f=1 (lands BELOW horizon)
let TEE_X = 480;           // re-centred on resize to VB.w/2
const LAT_PX = 300;        // lateral half-width near the tee (grid + rails)
const TOP_MARGIN = 92;     // px reserved at top for the apex orb + label
const APEX_AT = 0.50;      // apex as a fraction of carry
// WIDER BOW: screen-space lateral budget for the side-curve. Raised from the
// mock's 150 to 290 so climb & descent visibly separate into a pretty arc while
// the tracer still ENDS exactly on the landing marker on the fairway.
const SIDE_PX_MAX = 290;

const pe = f => f * (1 + PE_A) / (1 + PE_A * f);
const groundY = f => yBottom - (yBottom - yH) * GROUND_K * pe(f);
const lateralScale = f => 1 - GROUND_K * pe(f) * 0.92;
const heightScale  = f => 1 - 0.22 * pe(f);

let fModel=null, trajLen=0, rollLen=0, apexScreen=null, landScreen=null, restScreen=null;

// ── FULL-BLEED SCENE SIZING ──────────────────────────────────────
// The card is now edge-to-edge (100vw × 100dvh), so its aspect ratio matches
// the device — up to ~19.5:9 on a wide phone. We keep the viewBox HEIGHT at
// 540 and set its WIDTH = 540·(cardW/cardH). With preserveAspectRatio "slice"
// and a MATCHED aspect ratio there is no cropping and no horizontal stretch.
// TEE_X re-centres to the new middle; the full-bleed background / ground /
// overlay rects are widened to span the new viewBox. Trajectory + apex + grid
// + L/R refs all project from TEE_X, so they stay geometrically correct.
const fSceneEl = $('fScene');
const fClipRect = document.querySelector('#fclip rect');
const fBgImgEl  = $('fBgImg');
const fDarkRect = fSceneEl.querySelector('rect[fill="#06121a"]');
let lastVBW = 960;
function resizeScene(){
  const card = $('flightCard');
  const cw = card.clientWidth  || window.innerWidth;
  const ch = card.clientHeight || window.innerHeight;
  // viewBox width that matches the card aspect at fixed height 540.
  // Clamp to a sane range so freak ratios never explode the scene.
  let vbw = VB.h * (cw / Math.max(1, ch));
  vbw = Math.max(720, Math.min(1600, vbw));
  vbw = Math.round(vbw);
  VB.w = vbw;
  TEE_X = vbw / 2;
  if (vbw === lastVBW) return;        // nothing to re-write
  lastVBW = vbw;
  fSceneEl.setAttribute('viewBox', `0 0 ${vbw} 540`);
  // span all full-bleed layers across the new width (generous margins both sides)
  fClipRect.setAttribute('width', vbw);
  fDarkRect && fDarkRect.setAttribute('width', vbw);
  $('fTealOverlay').setAttribute('width', vbw);
  // ground + haze rects: re-span with the same -200 left margin used originally
  const m = 200;
  $('fGroundRect').setAttribute('x', -m); $('fGroundRect').setAttribute('width', vbw + 2*m);
  $('fHazeBand').setAttribute('x', -m);   $('fHazeBand').setAttribute('width', vbw + 2*m);
  // background range photo: keep it covering the full viewBox (+40 bleed each side)
  fBgImgEl.setAttribute('x', -40); fBgImgEl.setAttribute('width', vbw + 80);

// ── seeded PRNG (deterministic fx: same params → identical burst) ──
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// FNV-1a over the 5 delivery params (0.1° / 0.1mph resolution) → uint32 seed
function hashParams(face, path, attack, loft, speed){
  let h = 2166136261 >>> 0;
  for (const v of [face, path, attack, loft, speed]){
    h ^= (Math.round(v * 10) + 32768) >>> 0;
    h = Math.imul(h, 16777619) >>> 0;
  }
  return h >>> 0;
}

// ── one solved shot → world-space model fields (pure) ──
function shotFromFlight(flight){
  const carryM   = Math.max(1, flight.carry * YD2M);
  const apexM    = Math.max(1, flight.apex  * YD2M);
  const offlineM = flight.offline * YD2M;
  const totalM   = Math.max(carryM + 1, flight.total * YD2M);
  const rollM    = totalM - carryM;
  return { carryM, apexM, offlineM, totalM, rollM, f:flight };
}

// Camera fit is computed over a LIST of shots (live + optional ghosts) so
// every rendered flight stays in frame. With no extras this is numerically
// identical to the old single-shot fit.
function computeModel(extraShots = []){
  const live  = shotFromFlight(solveFlight(state));
  const shots = [live, ...extraShots];
  const maxD   = 1.06 * Math.max(...shots.map(s => s.totalM));   // AUTO-FIT downrange headroom
  const maxLat = Math.max(4, ...shots.map(s => Math.abs(s.offlineM)));
  const sceneApexM = Math.max(...shots.map(s => s.apexM));       // scene vertical scale
  // AUTO-FIT vertical: the TALLEST shot's apex orb sits at/above TOP_MARGIN.
  const tallest = shots.reduce((a, b) => (b.apexM > a.apexM ? b : a), shots[0]);
  const fa  = (APEX_AT * tallest.carryM) / maxD;
  const APEX_PX = Math.max(60, (groundY(fa) - TOP_MARGIN) / heightScale(fa));
  fModel = { ...live, maxD, maxLat, sceneApexM, APEX_PX, fa };
  return fModel;
}

// World (D downrange m, H height m, X lateral m +right) -> screen.
function project(D, H, X){
  const f  = clamp(D / fModel.maxD, 0, 1);
  const gy = groundY(f);
  const ls = lateralScale(f);
  const sideFrac = X / fModel.maxLat;              // -1..1 of offline
  const sx = TEE_X + sideFrac * SIDE_PX_MAX * ls;
  const hs = heightScale(f);
  const lift = (H / fModel.sceneApexM) * fModel.APEX_PX * hs;
  return { x:sx, y:gy - lift, f, gy, ls };
}
// height (m) of a given SHOT at downrange dM — parameterized so ANY solved
// flight (live or ghost) can be sampled; defaults to the live fModel shot.
function heightAt(dM, shot = fModel){
  const carryM = shot.carryM;
  if (dM >= carryM) return 0;
  const d = dM / carryM;
  let h;
  if (d <= APEX_AT){ const u = d/APEX_AT; h = 1 - (1-u)*(1-u); }
  else { const u = (d-APEX_AT)/(1-APEX_AT); h = 1 - u*u; }
  return clamp(h,0,1) * shot.apexM;
}
function lateralAt(dM, shot = fModel){
  const dd = clamp(dM/shot.carryM, 0, 1);
  return shot.offlineM * (0.55 * dd + 0.45 * dd * dd);
}
// pure air-trajectory path builder: tee -> carry for ANY solved shot,
// projected through the current scene camera. Returns the SVG `d` string.
function buildAirPath(shot){
  const N = 96; let d = '';
  for (let i = 0; i <= N; i++){
    const dM = (i/N) * shot.carryM, p = project(dM, heightAt(dM, shot), lateralAt(dM, shot));
    d += (i===0?'M':'L') + p.x.toFixed(2) + ' ' + p.y.toFixed(2) + ' ';
  }
  return d;
}

// ════════════════════════════════════════════════════════════════
//  STAGE 3 — GHOST / REPLAY SYSTEM (the pedagogy)
//   In-memory shot history (MAX 3, no localStorage). A ghost is captured when
//   a flight is (re)built with params that DIFFER from the last-flown params:
//   the PREVIOUS shot (params + solved flight) becomes ghosts[0]. Replays
//   (same params) NEVER capture — they bump replayCount for stage-4 haptics.
// ════════════════════════════════════════════════════════════════
const GHOST_MAX = 3;
const GHOST_OPS  = [.50, .34, .22];       // newest → oldest ghost opacity (raised: .14 was invisible on the dark range)
const GHOST_DASH = ['none', '7 5', '2.5 4.5'];   // per-slot stroke-dasharray: A solid, B dashed, C dotted
const GHOST_LETTER = ['A', 'B', 'C'];
const ghosts = [];                        // {id, ts, params, flight, hidden?}
let ghostId = 0;
let ghostsVisible = true;                 // "Ghosts" pill state (default ON)
let fBaseline = null;                     // pinned baseline {params, flight} — lives OUTSIDE the FIFO, never evicted
let lastFlown = null;                     // {params, flight} of the last flown shot
let replayCount = 0;                      // replays of the CURRENT param-set

const PARAM_KEYS = ['faceAngle','clubPath','attackAngle','dynamicLoft','clubSpeed'];
function paramsSnapshot(){
  const p = {}; PARAM_KEYS.forEach(k => p[k] = state[k]); return p;
}
function sameParams(a, b){ return !!a && !!b && PARAM_KEYS.every(k => a[k] === b[k]); }

// Called ONCE per run (fPlay), BEFORE fBuild so a newly-captured ghost is part
// of the shared camera fit. Returns true for a NEW shot, false for a replay.
function noteFlight(){
  const params = paramsSnapshot();
  if (lastFlown && sameParams(lastFlown.params, params)){
    replayCount++;                        // replay: never captures a ghost
    return false;
  }
  // params changed → the PREVIOUS shot becomes a ghost (dedupe vs ghosts[0] AND
  // vs the pinned baseline, which is stored separately and must not double-capture)
  if (lastFlown && !(ghosts[0] && sameParams(ghosts[0].params, lastFlown.params))
               && !(fBaseline && sameParams(fBaseline.params, lastFlown.params))){
    ghosts.unshift({ id: ++ghostId, ts: Date.now(), params: lastFlown.params, flight: lastFlown.flight });
    if (ghosts.length > GHOST_MAX) ghosts.pop();   // cap 3 — drop oldest
  }
  lastFlown = { params, flight: solveFlight(state) };
  replayCount = 0;
  return true;
}

// ── "what changed" micro-label content: cause (param delta vs ghosts[0]) +
//    effect (total / curve delta vs ghosts[0].flight). NEVER colour alone:
//    improvements get ✓, worsenings get →, distance keeps an explicit sign.
const PARAM_META = {
  faceAngle:   { label:'Face',   color:'var(--c-face)',   fmt:v=>f1(v)+'°' },
  clubPath:    { label:'Path',   color:'var(--c-path)',   fmt:v=>f1(v)+'°' },
  attackAngle: { label:'Attack', color:'var(--c-attack)', fmt:v=>f1(v)+'°' },
  dynamicLoft: { label:'Loft',   color:'var(--c-loft)',   fmt:v=>v.toFixed(1)+'°' },
  clubSpeed:   { label:'Speed',  color:'var(--accent)',   fmt:v=>Math.round(v)+' mph' },
};
function deltaContent(){
  // Compare against the PINNED baseline when one is set, else the newest ghost.
  const g = fBaseline || ghosts[0];
  if (!g || !lastFlown) return null;
  const changed = PARAM_KEYS.filter(k => lastFlown.params[k] !== g.params[k]);
  let cause;
  if (!changed.length){
    cause = fBaseline ? 'Same delivery as pinned' : 'Same delivery as previous';
  } else if (changed.length <= 2){
    cause = changed.map(k => {
      const m = PARAM_META[k];
      return `<span class="pdot" style="background:${m.color}" aria-hidden="true"></span>`
           + `${m.label} ${m.fmt(g.params[k])} → ${m.fmt(lastFlown.params[k])}`;
    }).join('<span class="sep">·</span>');
  } else {
    cause = fBaseline ? 'Δ vs pin' : 'Δ vs previous';
  }
  // when comparing to the pin, prefix a ⊙ glyph + SR-only clause so the reference is unambiguous
  if (fBaseline) cause = '<span aria-hidden="true">⊙</span><span class="sr-only">vs pinned baseline </span>' + cause;
  const cf = lastFlown.flight, gf = g.flight;
  const dTot   = Math.round(cf.total*YD2M) - Math.round(gf.total*YD2M);
  const dCurve = Math.round(Math.abs(cf.curve*YD2M)) - Math.round(Math.abs(gf.curve*YD2M));
  const segs = [`<span class="neu">${dTot>=0?'+':'−'}${Math.abs(dTot)} m total</span>`];
  if (dCurve <= -1)     segs.push(`<span class="good">✓ ${Math.abs(dCurve)} m less curve</span>`);
  else if (dCurve >= 1) segs.push(`<span class="warn">→ ${dCurve} m more curve</span>`);
  return { cause, effect: segs.join('<span class="sep">·</span>') };
}

// ── ghost rendering — solid ghost-grey strokes in #fGhosts (below the live
//    tracer), each with a small landing dot + metre label on a dark plate.
//    Rebuilt on every fBuild so ghosts share the CURRENT camera fit.
function buildGhostLayer(){
  if (!FX.built || !FX.ghosts) return;
  const host = FX.ghosts;
  host.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';

  // small shared builder for a landing badge (dark plate + text) on a group
  const addBadge = (grp, land, lbl, fill) => {
    const w = lbl.length*5.6 + 10;
    const rect = document.createElementNS(ns,'rect');
    rect.setAttribute('x',(land.x+6).toFixed(1)); rect.setAttribute('y',(land.y+4).toFixed(1));
    rect.setAttribute('width', w.toFixed(0)); rect.setAttribute('height','14'); rect.setAttribute('rx','4');
    rect.setAttribute('fill','rgba(8,16,20,.78)'); rect.setAttribute('stroke', fill==='#E8F0FB' ? 'rgba(232,240,251,.35)' : 'rgba(159,178,200,.30)');
    grp.appendChild(rect);
    const t = document.createElementNS(ns,'text');
    t.setAttribute('x',(land.x+6+w/2).toFixed(1)); t.setAttribute('y',(land.y+14.5).toFixed(1));
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','9');
    t.setAttribute('font-weight','700'); t.setAttribute('font-family','inherit');
    t.setAttribute('fill', fill);
    t.textContent = lbl;
    grp.appendChild(t);
  };

  // BASELINE first (bottom of the stack) — white dashed, ⊙ badge, never evicted.
  if (fBaseline){
    const bs = shotFromFlight(fBaseline.flight);
    const grp = document.createElementNS(ns,'g');
    grp.setAttribute('class','ghostShot');
    grp.setAttribute('data-baseline','1');
    grp.setAttribute('opacity','.55'); grp.dataset.op = .55;
    const p = document.createElementNS(ns,'path');
    p.setAttribute('d', buildAirPath(bs));
    p.setAttribute('fill','none'); p.setAttribute('stroke','#E8F0FB');
    p.setAttribute('stroke-width','2.2'); p.setAttribute('stroke-linecap','round');
    p.setAttribute('stroke-dasharray','10 6');
    grp.appendChild(p);
    const land = project(bs.carryM, 0, lateralAt(bs.carryM, bs));
    const dot = document.createElementNS(ns,'circle');
    dot.setAttribute('cx', land.x.toFixed(1)); dot.setAttribute('cy', land.y.toFixed(1));
    dot.setAttribute('r','2.6'); dot.setAttribute('fill','#E8F0FB');
    grp.appendChild(dot);
    addBadge(grp, land, '⊙ ' + Math.round(bs.carryM) + ' m', '#E8F0FB');
    host.appendChild(grp);
  }

  for (let i = ghosts.length - 1; i >= 0; i--){          // oldest first → newest on top
    const gs = shotFromFlight(ghosts[i].flight);
    const grp = document.createElementNS(ns,'g');
    grp.setAttribute('class','ghostShot');
    grp.setAttribute('opacity', GHOST_OPS[i]);
    grp.dataset.op = GHOST_OPS[i];
    grp.dataset.gid = ghosts[i].id;
    if (ghosts[i].hidden) grp.style.display = 'none';
    const p = document.createElementNS(ns,'path');
    p.setAttribute('d', buildAirPath(gs));
    p.setAttribute('fill','none'); p.setAttribute('stroke','#9FB2C8');
    p.setAttribute('stroke-width','2'); p.setAttribute('stroke-linecap','round');
    if (GHOST_DASH[i] !== 'none') p.setAttribute('stroke-dasharray', GHOST_DASH[i]);
    grp.appendChild(p);
    const land = project(gs.carryM, 0, lateralAt(gs.carryM, gs));
    const dot = document.createElementNS(ns,'circle');
    dot.setAttribute('cx', land.x.toFixed(1)); dot.setAttribute('cy', land.y.toFixed(1));
    dot.setAttribute('r','2.6'); dot.setAttribute('fill','#9FB2C8');
    grp.appendChild(dot);
    // identity badge: slot letter + the FIRST changed param vs the live shot + carry
    const changed = lastFlown ? PARAM_KEYS.filter(k => ghosts[i].params[k] !== lastFlown.params[k]) : [];
    const pTxt = changed.length ? PARAM_META[changed[0]].label + ' ' + PARAM_META[changed[0]].fmt(ghosts[i].params[changed[0]]) : '';
    const lbl = GHOST_LETTER[i] + (pTxt ? ' · ' + pTxt : '') + ' · ' + Math.round(gs.carryM) + ' m';
    addBadge(grp, land, lbl, '#9FB2C8');
    host.appendChild(grp);
  }
  buildGhostLegend();
}

// ── GHOST LAB: legend column — pin button state + one chip per ghost.
//    Chips rebuilt on every fBuild; focus is restored by data-gid so a
//    keyboard user mid-legend never drops to <body>.
function setPinUI(){
  const btn = $('fPinBtn'); if (!btn) return;
  const on = !!fBaseline;
  btn.setAttribute('aria-pressed', String(on));
  const carry = on ? Math.round(shotFromFlight(fBaseline.flight).carryM) : null;
  $('fPinTxt').textContent = on ? carry + 'm' : 'Pin';
  // stable action-phrase name; aria-pressed alone carries the toggle state
  // (APG: don't flip BOTH name-verb and pressed — that double-signals SR users)
  btn.setAttribute('aria-label', on ? ('Baseline pinned, ' + carry + ' metres. Toggle baseline') : 'Pin current shot as baseline');
}
function buildGhostLegend(){
  const host = $('fGhostLegend'); if (!host) return;
  const ae = document.activeElement;
  const focusGid = (ae && ae.classList && ae.classList.contains('fChip-ghost')) ? ae.dataset.gid : null;
  const hadGhostFocus = !!focusGid;
  host.querySelectorAll('.fChip-ghost').forEach(n => n.remove());
  ghosts.forEach((g, i) => {
    const gs = shotFromFlight(g.flight);
    const changed = lastFlown ? PARAM_KEYS.filter(k => g.params[k] !== lastFlown.params[k]) : [];
    const pTxt = changed.length ? PARAM_META[changed[0]].label + ' ' + PARAM_META[changed[0]].fmt(g.params[changed[0]]) : '';
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'fChip fChip-ghost'; b.dataset.gid = g.id;
    b.setAttribute('aria-pressed', String(!g.hidden));
    // the changed-param is ONLY in the scene badge (decorative svg), so the
    // chip name is the sole accessible carrier of WHICH param differs (WCAG 1.1.1)
    b.setAttribute('aria-label', 'Ghost ' + GHOST_LETTER[i] + (pTxt ? ', ' + pTxt : '') + ', ' + Math.round(gs.carryM) + ' metres. Show or hide');
    const dash = GHOST_DASH[i] === 'none' ? '' : ' stroke-dasharray="' + GHOST_DASH[i] + '"';
    b.innerHTML = '<svg class="dashSwatch" width="18" height="6" aria-hidden="true">'
      + '<line x1="1" y1="3" x2="17" y2="3" stroke="#9FB2C8" stroke-width="2" stroke-linecap="round"' + dash + '/></svg>'
      + '<span class="cl">' + GHOST_LETTER[i] + '</span><span class="cd">' + Math.round(gs.carryM) + 'm</span>';
    host.appendChild(b);
  });
  setPinUI();
  // restore keyboard focus after the rebuild: the same ghost if it survives,
  // else the nearest remaining ghost chip, else the pin button — never <body>.
  if (hadGhostFocus){
    const again = host.querySelector('[data-gid="' + focusGid + '"]')
               || host.querySelector('.fChip-ghost')
               || $('fPinBtn');
    if (again) again.focus({ preventScroll:true });
  }
}

// ── GHOST LAB: one-time coach mark the first time a ghost exists (key
//    'sa_coach_flight_ghost'). Fired from revealData so it never covers the
//    flight itself; guarded so resize/speed re-renders can't stack bubbles.
let ghostCoach = null;
function maybeGhostCoach(){

  if (!SA || typeof SA.coachMarks !== 'function' || SA.seen('sa_coach_flight_ghost')) return;

    { storageKey: 'sa_coach_flight_ghost', onDone(){ ghostCoach = null; } });
}

// CHANGE 1 — reveal the bottom frame (chips) only after the ball lands
function hideData(){ hideDeltaLabel();
  gsap.set(fLandAngMark,{opacity:0});   // land-angle plate resets with the rest of the data beat
  if(reduce) return; fBottomEl.classList.add('is-hidden'); fBottomEl.setAttribute('aria-hidden','true');
  // hold all flight underlines empty so they animate from 0 on the next reveal
  FCELLS.forEach(c=>{ if(!c.ring) return; const reg=cellEls['f_'+c.key]; if(!reg||!reg.barFill) return;
    reg.barFill.style.transition='none';
    reg.barFill.style.width='0%';
    void reg.barFill.getBoundingClientRect(); reg.barFill.style.transition=''; });
}
function revealData(immediate){ fBottomEl.classList.remove('is-hidden'); fBottomEl.removeAttribute('aria-hidden');
  // flight underlines fill in along with the values; static/reduced-motion snaps to final
  fillFlightRings(!reduce);

  gsap.set(fLandAngMark,{opacity:1});
  // STAGE 3 — the "what changed" micro-label follows +150ms after the reveal
  // (immediate + static under reduced-motion / static renders)
