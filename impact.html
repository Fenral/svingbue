}

function drawRails(){
  const steps=24; let dl='', dr='';
  for (let i=0;i<=steps;i++){
    const f=i/steps, gy=groundY(f), ls=lateralScale(f), half=LAT_PX*ls*1.3;
    dl += (i===0?'M':'L')+(TEE_X-half).toFixed(1)+' '+gy.toFixed(1)+' ';
    dr += (i===0?'M':'L')+(TEE_X+half).toFixed(1)+' '+gy.toFixed(1)+' ';
  }
  fRailL.setAttribute('d',dl); fRailR.setAttribute('d',dr);
}
function buildGrid(){
  fGrid.innerHTML=''; const ns='http://www.w3.org/2000/svg';
  for (const m of [50,100,150,200,250,300]){
    if (m > fModel.maxD) continue;
    const f=m/fModel.maxD, gy=groundY(f), ls=lateralScale(f), halfW=LAT_PX*ls*1.3;
    const line=document.createElementNS(ns,'line');
    line.setAttribute('x1',(TEE_X-halfW).toFixed(1)); line.setAttribute('y1',gy.toFixed(1));
    line.setAttribute('x2',(TEE_X+halfW).toFixed(1)); line.setAttribute('y2',gy.toFixed(1));
    line.setAttribute('stroke','rgba(230,240,250,1)');
    line.setAttribute('stroke-width',(0.6+ls*0.9).toFixed(2));
    line.setAttribute('opacity',(0.10+ls*0.22).toFixed(2));
    fGrid.appendChild(line);
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',(TEE_X+halfW+6).toFixed(1)); t.setAttribute('y',(gy-2).toFixed(1));
    t.setAttribute('fill','rgba(230,240,250,1)'); t.setAttribute('font-size',(7+ls*5).toFixed(1));
    t.setAttribute('font-weight','600'); t.setAttribute('opacity',(0.25+ls*0.4).toFixed(2));
    t.setAttribute('font-family','inherit'); t.textContent=m;
    fGrid.appendChild(t);
  }
}

// CHANGE 2 — pick up to 3 round lateral steps scaled to the shot's offline reach
function niceLatSteps(maxLat){
  const cap = Math.max(10, maxLat * 1.15);     // a little headroom past the landing offset
  const base = cap <= 30 ? 10 : cap <= 75 ? 25 : cap <= 150 ? 50 : 100;
  const out = [];
  for (let m = base; m <= cap && out.length < 3; m += base) out.push(m);
  if (!out.length) out.push(base);
  return out;
}
// faint vertical L/R reference lines + distance labels in the landing band
function buildLateralRefs(){
  fLatRef.innerHTML=''; const ns='http://www.w3.org/2000/svg';
  const steps = niceLatSteps(fModel.maxLat);
  // sample a short downrange band near the landing point so the refs read at the
  // correct perspective (same camera via project()).
  const dNear = 0.45 * fModel.carryM, dFar = fModel.carryM;
  for (const m of steps){
    for (const sign of [-1, 1]){
      const x = sign * m;
      const a = project(dNear, 0, x), b = project(dFar, 0, x);
      const line = document.createElementNS(ns,'line');
      line.setAttribute('x1',a.x.toFixed(1)); line.setAttribute('y1',a.y.toFixed(1));
      line.setAttribute('x2',b.x.toFixed(1)); line.setAttribute('y2',b.y.toFixed(1));
      line.setAttribute('stroke-width','1'); line.setAttribute('stroke-dasharray','4 7');
      line.setAttribute('opacity','0.18');
      fLatRef.appendChild(line);
      const t = document.createElementNS(ns,'text');
      t.setAttribute('x',(b.x + sign*5).toFixed(1)); t.setAttribute('y',(b.y - 3).toFixed(1));
      t.setAttribute('text-anchor', sign<0 ? 'end' : 'start');
      t.setAttribute('font-size','9'); t.setAttribute('opacity','0.4');
      t.textContent = m + (sign<0 ? ' L' : ' R');
      fLatRef.appendChild(t);
    }
  }
}

function fBuild(){
  resizeScene();        // FULL-BLEED: match viewBox aspect to the card before projecting
  // STAGE 3 — shared camera: fit covers the live shot AND every ghost AND the
  // pinned baseline, so all paths are comparable in ONE camera (never fit only
  // VISIBLE paths — a hidden ghost must still hold the frame so toggling it
  // doesn't make every other path jump).
  const extraShots = ghosts.map(g => shotFromFlight(g.flight));
  if (fBaseline) extraShots.push(shotFromFlight(fBaseline.flight));
  computeModel(extraShots);
  // re-centre the tee marker to TEE_X (dynamic on resize) and the raised baseline
  fTeeShadow.setAttribute('cx', TEE_X); fTeeShadow.setAttribute('cy', yBottom);
  fTeeRing.setAttribute('cx', TEE_X);   fTeeRing.setAttribute('cy', yBottom);
  // air phase: tee -> carry (pure builder, reusable for any solved shot)
  const dAir = buildAirPath(fModel);
  fTracer.setAttribute('d',dAir); fTracerCore.setAttribute('d',dAir); fTrail.setAttribute('d',dAir);
  // roll phase: carry -> total along fairway w/ small decaying bounce
  const M=40; let dRoll=''; const bounceH=fModel.apexM*0.05;
  for (let i=0;i<=M;i++){
    const t=i/M, dM=fModel.carryM+t*fModel.rollM;
    let H=0; if (t<0.45){ const bt=t/0.45; H=bounceH*Math.sin(bt*Math.PI)*(1-bt); }
    const p=project(dM,H,lateralAt(fModel.carryM));
    dRoll += (i===0?'M':'L')+p.x.toFixed(2)+' '+p.y.toFixed(2)+' ';
  }
  fRoll.setAttribute('d',dRoll);
  // centre + rails
  const c0=project(0,0,0), c1=project(fModel.maxD,0,0);
  fCentre.setAttribute('d',`M${c0.x.toFixed(1)} ${c0.y.toFixed(1)} L${c1.x.toFixed(1)} ${c1.y.toFixed(1)}`);
  drawRails();
  // landing / rest screen positions
  landScreen=project(fModel.carryM, 0, lateralAt(fModel.carryM));
  restScreen=project(fModel.totalM, 0, lateralAt(fModel.carryM));
  // APEX MARKER — anchored to the tracer's ACTUAL highest drawn point.
  // Scan getPointAtLength across the freshly-built air path and pick the sample
  // with the minimum screen-Y (the visual top of the bow). This puts the marker
  // exactly on the crest for ANY offline/curve, not on a separate projection.
  trajLen=fTracer.getTotalLength();
  let apexPt={ x:TEE_X, y:yH }, minY=Infinity;
  const SCAN=600;   // fine scan so the marker lands within ~1px of the true crest
  for (let i=0;i<=SCAN;i++){
    const pt=fTracer.getPointAtLength((i/SCAN)*trajLen);
    if (pt.y < minY){ minY=pt.y; apexPt=pt; }
  }
  apexScreen={ x:apexPt.x, y:apexPt.y };
  // Position via gsap.set x/y (NOT setAttribute transform): the apex pop animates
  // `scale`, and gsap composes scale around its OWN x/y. Setting the translate
  // through gsap keeps the marker locked to the crest while it scales in — a raw
  // transform attribute would be clobbered by gsap's matrix on the scale tween.
  gsap.set(fApexMark, { x:apexScreen.x, y:apexScreen.y, xPercent:0, yPercent:0, transformOrigin:'center' });
  fApexTxt.textContent=`Apex ${Math.round(fModel.apexM)} m`;
  fLandMark.setAttribute('transform',`translate(${landScreen.x.toFixed(1)},${landScreen.y.toFixed(1)})`);
  fLandTxt.textContent=`${Math.round(fModel.carryM)} m`;
  // CHANGE 2 — offline side badge ("NN m R" / "NN m L"; right = positive)
  const offAbs = Math.round(Math.abs(fModel.offlineM));
  if (offAbs >= 1){
    fOfflineTxt.textContent = `${offAbs} m ${fModel.offlineM >= 0 ? 'R' : 'L'}`;
    fOffline.setAttribute('opacity','1');
  } else {
    fOfflineTxt.textContent = 'On line';
    fOffline.setAttribute('opacity','1');
  }
  // land-angle plate — "↘ NN°" from the solved landing angle (rounded integer)
  fLandAngTxt.textContent = `↘ ${Math.round(fModel.f.landingAngle)}°`;
  // left HERO stack offline ("NN m R/L") — mirrors the SVG badge
  $('fHeroOffNum').textContent = offAbs;
  $('fHeroOffSide').textContent = fModel.offlineM >= 0 ? 'R' : 'L';
  trajLen=fTracer.getTotalLength(); rollLen=fRoll.getTotalLength();
  buildGrid(); buildLateralRefs(); buildGhostLayer(); updateData();
}

// carry counter — textContent written ONLY when the rounded integer changes

function setCarry(v){

  const off = fModel ? fModel.offlineM : 0;

  const offTxt = offAbs >= 1 ? `, ${offAbs} meters ${off >= 0 ? 'right' : 'left'} of centre` : ', on line';
  $('fCarryLive').textContent = `${Math.round(v)} meters total${offTxt}${shape ? ' — ' + shape : ''}`;

// animate every flight-grid underline 0→target (called at the after-the-shot reveal).
// animate=false → snap to final fill immediately (reduced-motion / ?play / static).
function fillFlightRings(animate){
  FCELLS.forEach(c=>{
    if (!c.ring) return;
    const reg = cellEls['f_'+c.key]; if (!reg || !reg.barFill) return;
    const g = (reg.barTarget != null) ? reg.barTarget : { left:0, width:0 };
    applyBarFill(reg.barFill, g, animate);
  });
}

function renderStatic(){
  if (fTL){ fTL.kill(); fTL = null; }   // terminal static state: no fx tweens may land later
  resetChoreo();                        // stage 2: pills back to 1, camera dip cleared
  fBuild();
  hideFlightFX();                       // single guard: comet/flash/sparks/burst leave no residue
  fTracer.style.strokeDasharray='none'; fTracer.style.strokeDashoffset='0';
  fTracerCore.style.strokeDasharray='none'; fTracerCore.style.strokeDashoffset='0';
  fTrail.style.strokeDasharray='none'; fTrail.style.strokeDashoffset='0'; fTrail.style.opacity='0.12';
  fRoll.style.strokeDasharray='none'; fRoll.style.strokeDashoffset='0';
  gsap.set(fRoll,{opacity:.7});
  gsap.set(fApexMark,{opacity:1, scale:1, transformOrigin:'center'});
  gsap.set(fLandMark,{opacity:1});
  // persistent, subtle splash ring at the landing point (no pulse)
  gsap.set(fSplash,{attr:{rx:13,ry:4.5}, opacity:.42});
  setCarry(fModel.carryM); announceCarry(fModel.carryM);
  revealData(true);   // ?play / reduced-motion: data panel + micro-label immediately, no motion
}

// outward unit directions of the 3 muzzle-kick lines (matches their geometry)
const KICK_DIRS = [{x:0,y:-1},{x:-0.62,y:-0.79},{x:0.62,y:-0.79}];

// ════════════════════════════════════════════════════════════════
//  STAGE 2 — HIT BEAT-SHEET constants (named beats; durations unchanged)
//    T0 (launch) sits AFTER an optional ghost pre-roll: ghosts fade in over
//    300ms (staggered 60ms) at T0−0.3, i.e. BEFORE the muzzle flash.
// ════════════════════════════════════════════════════════════════
const AIR  = 1.55*2.6;      // air phase duration (≈ existing airDur)
const ROLL = 0.7*2.6;       // roll phase duration (≈ existing roll duration)
const GHOST_PRE = 0.3;      // ghost fade-in pre-roll before T0
const RECEDE_OP = 0.35;     // overlay pills recede to this during the shot
const overlayPills = () => ['flightReplay','flightClose','fGhostPill','fGhostClear','fGhostLegend'].map($);

// clear any stage-2 choreography residue (killed timeline / static render):
// pills back to full opacity, camera-dip transform + transition cleared.
function resetChoreo(){
  gsap.set(overlayPills(), { opacity:1 });
  const card = $('flightCard');
  gsap.set(card, { clearProps:'transform' });
  card.style.transition = '';
}

function fPlay(){
  // MONETIZATION — gate a genuinely NEW shot once the free-shot limit is hit.
  // Replays of the identical param-set (drag/replay button with no change)
  // stay free, exactly like ghost-capture's own new-vs-replay accounting below.
  const wouldBeNew = !(lastFlown && sameParams(lastFlown.params, paramsSnapshot()));
  if (wouldBeNew && saShots.shouldGate()){ openPaywall('impact'); return; }
  if (fTL) fTL.kill();
  resetChoreo();
  // STAGE 3 — capture/replay accounting BEFORE the camera fit, so a freshly
  // captured ghost is part of this run's shared camera. Replays never capture.
  const isNewRun = noteFlight();
  if (isNewRun){ saShots.recordShot(); refreshNudge(); }
  fBuild();
  // STAGE 4 — haptics beat classification for THIS run, decided once up front:
  //   • notify('success') is gated on the TRUE first play only (replayCount === 0).
  //   • launch/landing intensity stays full through the first replay (the 2nd
  //     overall run) and is demoted from replays ≥2 of the SAME param set (the
  //     3rd+ overall run) — heavy/medium → light/none.
  //   Reduced-motion users still get button-press haptics but no flight-beat
  //   haptics (renderStatic() below runs no beat sheet, so nothing fires there).
  const isFirstPlay = replayCount === 0;
  const isDemoted = replayCount >= 2;
  const launchStyle = isDemoted ? 'light' : 'heavy';
  const landingStyle = isDemoted ? null : 'medium';
  const shapeStraight = fModel.f && fModel.f.shape === 'Straight';
  const onLine = Math.abs(fModel.offlineM) <= 3;
  const landingSuccess = isFirstPlay && shapeStraight && onLine;
  if (reduce){ renderStatic(); return; }
  ensureFX();

  // reset reveal
  fTracer.style.strokeDasharray=trajLen; fTracer.style.strokeDashoffset=trajLen;
  fTracerCore.style.strokeDasharray=trajLen; fTracerCore.style.strokeDashoffset=trajLen;
  // persistent under-glow arc: full path, hidden during flight (the comet
  // carries the in-flight glow), faded in once the ball lands.
  fTrail.style.strokeDasharray='none'; fTrail.style.strokeDashoffset='0'; fTrail.style.opacity='0';
  fRoll.style.strokeDasharray=rollLen; fRoll.style.strokeDashoffset=rollLen;
  gsap.set(fApexMark,{opacity:0, scale:.6, transformOrigin:'center'});
  gsap.set(fLandMark,{opacity:0});
  gsap.set(fSplash,{attr:{rx:2,ry:1}, opacity:0});
  hideData();   // CHANGE 1 — keep the data panel hidden until the ball lands
  lastCarryInt = -1; setCarry(0); $('fCarryLive').textContent='';

  // ── COMET SETUP — 3 dash segments share the tracer's exact path `d`.
  //    dashoffset_i = SEG_i − L puts each segment's END on the reveal tip.
  const dAir = fTracer.getAttribute('d');
  const SEGS = [[FX.cometGlow,90],[FX.cometMid,48],[FX.cometHot,20]];
  SEGS.forEach(([el,seg])=>{
    el.setAttribute('d', dAir);
    el.style.strokeDasharray = seg + ' ' + trajLen;
    el.style.strokeDashoffset = seg;             // fully behind the tee → invisible
  });
  gsap.set(FX.cometGlow,{opacity:.10}); gsap.set(FX.cometMid,{opacity:.35}); gsap.set(FX.cometHot,{opacity:.95});
  const pt0 = fTracer.getPointAtLength(0);
  FX.cometHead.setAttribute('transform', `translate(${pt0.x.toFixed(2)} ${pt0.y.toFixed(2)})`);
  gsap.set(FX.cometHead,{opacity:1});

  // reset pooled fx from any interrupted previous run
  gsap.set([FX.flash, FX.fx, FX.sparksG],{opacity:0});
  gsap.set([...FX.grass, ...FX.dust, ...FX.sparks, FX.dustPuff],{opacity:0});

  // deterministic per-shot randomness: same 5 params → identical burst
  const rng = mulberry32(hashParams(state.faceAngle, state.clubPath, state.attackAngle, state.dynamicLoft, state.clubSpeed));

  // STAGE 2 BEAT SHEET — durations are the named module constants AIR / ROLL.
  // T0 (launch) sits after an optional ghost pre-roll so ghosts fade in at
  // T0−0.3, BEFORE the muzzle flash. Replays keep the same T0 (ghost count is
  // unchanged on replay) so same params → identical run.
  const T0 = (ghosts.length || fBaseline) ? GHOST_PRE : 0;
  const trajL = trajLen;                          // cached for the per-frame math
  fTL = gsap.timeline();

  // ── STAGE 3: ghost fade-in at T0−0.3 (staggered 60ms). Replays do NOT
  //    re-fade — ghosts simply persist at their resting opacity.
  const ghostEls = FX.ghosts ? Array.from(FX.ghosts.children) : [];
  if (ghostEls.length){
    if (isNewRun){
      fTL.fromTo(ghostEls, {opacity:0},
        {opacity:(i,el)=>+el.dataset.op, duration:.3, stagger:.06, ease:'power1.out'}, 0);
    } else {
      fTL.set(ghostEls, {opacity:(i,el)=>+el.dataset.op}, 0);
    }
  }

  // ── STAGE 2.1: controls recede — overlay pills dim to .35 over 120ms at the
  //    start of the run, restored at the data-reveal beat (T0+AIR+ROLL).
  fTL.to(overlayPills(), {opacity:RECEDE_OP, duration:.12, ease:'power1.out', overwrite:'auto'}, 0);
  fTL.to(overlayPills(), {opacity:1, duration:.25, ease:'power1.out'}, T0+AIR+ROLL);

  // The eased progress drives the tracer + comet reveal. Per-frame budget:
  // 5 dashoffsets (tracer, core, 3 comet layers) + ONE getPointAtLength +
  // ONE head transform. The carry counter writes only on integer change.
  const air = { p:0 };
  fTL.to(air, {
    p:1, duration:AIR, ease:'power1.out',
    onUpdate(){
      const p = air.p;
      const L = trajL * p;
      const off = trajL - L;
      fTracer.style.strokeDashoffset=off;
      fTracerCore.style.strokeDashoffset=off;
      FX.cometGlow.style.strokeDashoffset = 90 - L;
      FX.cometMid.style.strokeDashoffset  = 48 - L;
      FX.cometHot.style.strokeDashoffset  = 20 - L;
      const pt = fTracer.getPointAtLength(L);
      FX.cometHead.setAttribute('transform', `translate(${pt.x.toFixed(2)} ${pt.y.toFixed(2)})`);
      setCarry(p * fModel.carryM);
    }
  }, T0);

  // ── LAUNCH MUZZLE-FLASH at the tee (T0), kicks rotated to startDirection ──
  // (the flash GROUP turns on inside the timeline at T0, so nothing shows
  //  during the ghost pre-roll — the children's fromTo states stay hidden)
  // STAGE 4 — launch beat haptic: heavy on first play (the ONLY heavy in the
  // app), demoted to light on replays of the same param set.
  fTL.call(()=> saHaptics.impact(launchStyle), null, T0);
  fTL.set(FX.flash,{x:TEE_X, y:yBottom, opacity:1}, T0);
  FX.flashKick.setAttribute('transform', `rotate(${fModel.f.startDirection.toFixed(1)})`);
  fTL.fromTo(FX.flashDisc, {scale:.3, opacity:.95, transformOrigin:'center'},
    {scale:1.5, opacity:0, duration:.24, ease:'expo.out'}, T0);
  fTL.fromTo(FX.flashRing, {attr:{rx:4, ry:1.6}, opacity:.85},
    {attr:{rx:30, ry:10.5}, opacity:0, duration:.32, ease:'expo.out'}, T0);
  FX.kicks.forEach((k,i)=>{
    const d = KICK_DIRS[i];
    fTL.fromTo(k, {x:0, y:0, opacity:1},
      {x:d.x*11, y:d.y*11, opacity:0, duration:.3, ease:'expo.out'}, T0);
  });

  // apex pop near peak (Atmosphere glow) — halo pulse KEPT
  fTL.to(fApexMark, { opacity:1, scale:1, duration:.3, ease:'back.out(2)' }, T0+AIR*APEX_AT);
  fTL.to('#fApexHalo', { attr:{r:22}, duration:.9, yoyo:true, repeat:1, ease:'sine.inOut' }, T0+AIR*APEX_AT+.1);

  // ── APEX SPARKLE — 5 pooled spark lines fanned around the crest ──
  gsap.set(FX.sparksG,{x:apexScreen.x, y:apexScreen.y});
  fTL.set(FX.sparksG,{opacity:1}, T0+AIR*APEX_AT);
  const SPARK_D = [13,16,10,14,12];               // fly 10–16px outward
  FX.sparks.forEach((s,i)=>{
    const a = (-150 + i*30) * Math.PI/180;
    fTL.fromTo(s, {x:0, y:0, opacity:1},
      {x:Math.cos(a)*SPARK_D[i], y:Math.sin(a)*SPARK_D[i], opacity:0, duration:.42, ease:'power2.out'},
      T0+AIR*APEX_AT + i*0.03);
  });

  // landing: marker appears + a quiet splash ring grows ONCE and STAYS (no pulse)
  fTL.add(()=>{
    gsap.set(fLandMark,{opacity:1});
    gsap.fromTo(fSplash,{attr:{rx:2,ry:1},opacity:.7},{attr:{rx:13,ry:4.5},opacity:.42,duration:.55,ease:'power2.out'});
    // STAGE 4 — landing beat haptic: medium on first play (none on replays);
    // notify('success') ONLY on first play of a Straight, |offline|<=3m shot.
    if (landingStyle) saHaptics.impact(landingStyle);
    if (landingSuccess) saHaptics.notify('success');
  }, T0+AIR);

  // ── STAGE 2.2: camera dip at the landing beat — .flightCard translateY
  //    2px down-up over 140ms, CSS-transform only. The card's own transform
  //    transition is suspended for the dip and restored (clearProps) after.
  //    Reduced-motion never reaches here (fPlay bails to renderStatic).
  const card = $('flightCard');
  fTL.add(()=>{ card.style.transition='none'; }, T0+AIR);
  fTL.to(card, {y:2, duration:.07, ease:'power2.out'}, T0+AIR);
  fTL.to(card, {y:0, duration:.07, ease:'power2.out',
    onComplete(){ gsap.set(card,{clearProps:'transform'}); card.style.transition=''; }}, T0+AIR+.07);

  // comet hands off at touchdown; the persistent tracer/core arc remains
  fTL.to([FX.cometGlow, FX.cometMid, FX.cometHot, FX.cometHead], {opacity:0, duration:.3, ease:'power1.out'}, T0+AIR);
  // soft under-glow arc settles in beneath the finished tracer
  fTL.to(fTrail, { opacity:0.12, duration:0.6, ease:'power1.out' }, T0+AIR);

  // ── LANDING BURST — seeded velocity cone away from the incoming tracer,
  //    scaled by landing angle (steeper = taller/tighter). Transform-only
  //    tweens, built INTO fTL so a replay with the same params is identical.
  const pEnd = fTracer.getPointAtLength(trajL);
  const pIn  = fTracer.getPointAtLength(Math.max(0, trajL - 8));
  const inX = (pEnd.x - pIn.x), inY = (pEnd.y - pIn.y);
  const inLen = Math.hypot(inX, inY) || 1;
  const outAng = Math.atan2(-Math.abs(inY/inLen), inX/inLen);   // bounce: mirrored above ground
  const landNorm = clamp((fModel.f.landingAngle - 35) / 27, 0, 1);
  const coneHalf  = 0.9 - 0.55*landNorm;          // steeper = tighter cone
  const distScale = 0.75 + 0.55*landNorm;         // steeper = taller
  const LX = landScreen.x, LY = landScreen.y;
  fTL.set(FX.fx,{opacity:1}, T0+AIR);
  [...FX.grass, ...FX.dust].forEach((el,i)=>{
    const isDust = i >= FX.grass.length;
    const a = outAng + (rng()*2 - 1)*coneHalf;
    const dist = (12 + rng()*24) * distScale * (isDust ? 0.7 : 1);
    const dur = 0.5 + rng()*0.3;                  // 0.5–0.8s
    const dx = Math.cos(a)*dist, dy = Math.sin(a)*dist;   // dy<0 = up
    const upT = dur*0.45;
    fTL.set(el,{x:LX, y:LY, opacity:isDust ? .5 : .9}, T0+AIR);
    fTL.to(el,{x:LX+dx, duration:dur, ease:'power1.out'}, T0+AIR);
    fTL.to(el,{y:LY+dy, duration:upT, ease:'power2.out'}, T0+AIR);
    fTL.to(el,{y:LY+dy*0.15+3, duration:dur-upT, ease:'power1.in'}, T0+AIR+upT);   // fake gravity
    fTL.to(el,{opacity:0, duration:dur*0.5, ease:'power1.in'}, T0+AIR+dur*0.5);
  });
  // squashed dust-puff under the (kept) splash ring
  FX.dustPuff.setAttribute('cx', LX.toFixed(1)); FX.dustPuff.setAttribute('cy', LY.toFixed(1));
  fTL.fromTo(FX.dustPuff, {attr:{rx:4, ry:1.6}, opacity:.5},
    {attr:{rx:22, ry:7}, opacity:0, duration:.6, ease:'power2.out'}, T0+AIR);

  // ROLL PHASE — the roll path reveals along the fairway (no ball orb).
  // Reveal order (stage 2.3): landing burst → splash → roll counts up →
  // revealData → micro-label (+150ms inside revealData).
  const roll = { t:0 };
  fTL.to(fRoll, { strokeDashoffset:0, duration:ROLL, ease:'power2.out' }, T0+AIR);
  fTL.to(roll, {
    t:1, duration:ROLL, ease:'power2.out',
    onUpdate(){
      const t = roll.t;
      const dM=fModel.carryM+t*fModel.rollM;
      setCarry(dM);
    },
    onComplete(){ setCarry(fModel.totalM); announceCarry(fModel.totalM); revealData(); }
  }, T0+AIR);
}

// ════════════════════════════════════════════════════════════════
//  POOLED FX LAYERS — created ONCE at overlay open, all hidden.
//   #fGhosts  : empty group below the tracer layers (future ghost flights)
//   #fFlash   : launch muzzle-flash (gradient disc + expanding ring + 3 kick lines)
//   #fFX      : landing burst pool (8 grass flecks + 6 dust dots + dust puff)
//   #fSparks  : apex sparkle pool (5 short lines fanned around the crest)
// ════════════════════════════════════════════════════════════════
const FX = { built:false };
function ensureFX(){
  if (FX.built) return; FX.built = true;
  // gradient defs for the flash disc + comet-head halo (inert until used)
  fSceneEl.querySelector('defs').insertAdjacentHTML('beforeend',
    '<radialGradient id="fflashGrad" cx="50%" cy="50%" r="50%">'
    + '<stop offset="0" stop-color="#ffffff" stop-opacity=".95"/>'
    + '<stop offset=".35" stop-color="#7FF0E6" stop-opacity=".55"/>'
    + '<stop offset="1" stop-color="#22E3D6" stop-opacity="0"/>'
    + '</radialGradient>'
    + '<radialGradient id="fheadGrad" cx="50%" cy="50%" r="50%">'
    + '<stop offset="0" stop-color="#eafffb" stop-opacity=".9"/>'
    + '<stop offset="1" stop-color="#22E3D6" stop-opacity="0"/>'
    + '</radialGradient>');
  // ghost-flight group BELOW the tracer layers
  fTrail.insertAdjacentHTML('beforebegin', '<g id="fGhosts"></g>');
  // ── COMET — 3 dash-segment strokes riding the tracer path + hot head ──
  fTracerCore.insertAdjacentHTML('afterend',
    '<path id="fCometGlow" fill="none" stroke="#22E3D6" stroke-width="10" stroke-linecap="round" opacity="0"/>'
    + '<path id="fCometMid" fill="none" stroke="#7FF0E6" stroke-width="5" stroke-linecap="round" opacity="0"/>'
    + '<path id="fCometHot" fill="none" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" opacity="0"/>'
    + '<g id="fCometHead" opacity="0"><circle r="9" fill="url(#fheadGrad)"/><circle r="2.4" fill="#fff"/></g>');
  // ── AMBIENT — 6 slow-drifting 1px dust motes in the lower scene ──
  let motes = '<g id="fMotes" opacity="0">';
  for (let i = 0; i < 6; i++){
    const mx = (0.10 + i * 0.16) * VB.w;
    const my = 300 + ((i * 37) % 110);
    motes += `<circle cx="${mx.toFixed(0)}" cy="${my}" r=".5" fill="#bfeae4" opacity="${(0.12 + (i % 3) * 0.04).toFixed(2)}"/>`;
  }
  motes += '</g>';
  $('fTee').insertAdjacentHTML('beforebegin', motes);
  // flash + particle pools ABOVE the scene, below the teal grade overlay
  // (fixed particle geometries; per-shot MOTION is seeded, not the pool)
  const grassCols = ['#2e4a33','#35543a','#24402b','#3d5c40'];
  let fx = '<g id="fFlash" opacity="0">'
    + '<circle id="fFlashDisc" r="26" fill="url(#fflashGrad)"/>'
    + '<ellipse id="fFlashRing" rx="4" ry="1.6" fill="none" stroke="#7FF0E6" stroke-width="1.6"/>'
    + '<g id="fFlashKick">'
    + '<line x1="0" y1="-9" x2="0" y2="-22" stroke="#eafffb" stroke-width="1.7" stroke-linecap="round"/>'
    + '<line x1="-7" y1="-7" x2="-15" y2="-17" stroke="#22E3D6" stroke-width="1.4" stroke-linecap="round"/>'
    + '<line x1="7" y1="-7" x2="15" y2="-17" stroke="#22E3D6" stroke-width="1.4" stroke-linecap="round"/>'
    + '</g></g>';
  fx += '<g id="fFX" opacity="0">';
  for (let i = 0; i < 8; i++){                       // grass flecks: 2–5px lines
    const len = 2 + (i % 4) * 1.0;                   // 2 / 3 / 4 / 5 px
    const a = (i / 8) * Math.PI * 2 + 0.4;
    fx += `<line class="fxGrass" x1="0" y1="0" x2="${(Math.cos(a)*len).toFixed(2)}" y2="${(Math.sin(a)*len).toFixed(2)}"`
        + ` stroke="${grassCols[i % 4]}" stroke-width="1.3" stroke-linecap="round" opacity="0"/>`;
  }
  for (let i = 0; i < 6; i++){                       // dust dots: 1.5–2.5px
    fx += `<circle class="fxDust" r="${(0.75 + (i % 3) * 0.25).toFixed(2)}" fill="#bfeae4" opacity="0"/>`;
  }
  fx += '<ellipse id="fDustPuff" rx="4" ry="1.6" fill="#bfeae4" opacity="0"/></g>';
  fx += '<g id="fSparks" opacity="0">';
  const sparkCols = ['#eafffb','#22E3D6','#eafffb','#22E3D6','#eafffb'];
  for (let i = 0; i < 5; i++){                       // fan −150°..−30° around the crest
    const a = (-150 + i * 30) * Math.PI / 180;
    fx += `<line class="fxSpark" x1="${(Math.cos(a)*6).toFixed(2)}" y1="${(Math.sin(a)*6).toFixed(2)}"`
        + ` x2="${(Math.cos(a)*11).toFixed(2)}" y2="${(Math.sin(a)*11).toFixed(2)}"`
        + ` stroke="${sparkCols[i]}" stroke-width="1.4" stroke-linecap="round" opacity="0"/>`;
  }
  fx += '</g>';
  $('fTealOverlay').insertAdjacentHTML('beforebegin', fx);
  FX.flash = $('fFlash'); FX.flashDisc = $('fFlashDisc'); FX.flashRing = $('fFlashRing'); FX.flashKick = $('fFlashKick');
  FX.kicks = Array.from(FX.flashKick.children);
  FX.fx = $('fFX');
  FX.grass = Array.from(FX.fx.querySelectorAll('.fxGrass'));
  FX.dust = Array.from(FX.fx.querySelectorAll('.fxDust'));
  FX.dustPuff = $('fDustPuff');
  FX.sparksG = $('fSparks'); FX.sparks = Array.from(FX.sparksG.querySelectorAll('.fxSpark'));
  FX.ghosts = $('fGhosts');
  FX.cometGlow = $('fCometGlow'); FX.cometMid = $('fCometMid'); FX.cometHot = $('fCometHot');
  FX.cometHead = $('fCometHead');
  FX.motesG = $('fMotes'); FX.motes = Array.from(FX.motesG.children);
}

// single reduced-motion / static-scene guard: no fx residue, ever.
function hideFlightFX(){
  if (!FX.built) return;
  gsap.set([FX.cometGlow, FX.cometMid, FX.cometHot, FX.cometHead, FX.flash, FX.fx, FX.sparksG], { opacity:0 });
}

// ── AMBIENT LOOP — haze breathing (6s sine yoyo) + drifting motes ──
//    Runs only while the overlay is open AND the tab is visible; never
//    under prefers-reduced-motion. No feTurbulence anywhere.
let ambient = null;
function startAmbient(){
  if (reduce) return;
  ensureFX();
  if (!ambient){
    ambient = gsap.timeline({ paused:true });
    ambient.set(FX.motesG, { opacity:1 }, 0);
    ambient.fromTo('#fHazeBand', { opacity:.18 }, { opacity:.26, duration:3, ease:'sine.inOut', yoyo:true, repeat:-1 }, 0);
    FX.motes.forEach((m, i) => {
      ambient.to(m, { x:'+=' + (8 + (i % 3) * 6), y:'-=' + (4 + (i % 2) * 5),
        duration:8 + i * 1.3, ease:'sine.inOut', yoyo:true, repeat:-1 }, i * 0.7);
    });
  }
  ambient.play();
}
function stopAmbient(){ if (ambient) ambient.pause(); }
document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopAmbient();
  else if (flightScrim.classList.contains('open') && !reduce) startAmbient();
});

function openFlight(){
  saHaptics.impact('medium');   // STAGE 4 — #playFlight press
  lastFocus = document.activeElement;
  ensureFX();
  startAmbient();               // no-op under prefers-reduced-motion
  // sync the in-overlay club-speed bar to the current instrument state
  $('fSpeedRange').value = state.clubSpeed;
  $('fSpeedV').textContent = Math.round(state.clubSpeed);
  $('fSpeedRange')._premiumRefresh && $('fSpeedRange')._premiumRefresh();
  // Make the base instrument (top strip + both lenses) inert while the
  // overlay is open — without this, Tab could escape flightCard into the two
  // full lenses behind the scrim with no visible focus ring (dual-lens made
  // this worse: twice the stray tab stops of the old single-lens layout).
  // NOTE: target these two elements specifically, NOT `.app` — #flightScrim
  // itself is a CHILD of .app (confirmed by measuring the live DOM), so
  // inert-ing `.app` would inert the overlay it's supposed to protect.
  const topstripEl = document.querySelector('.topstrip');
  const stageEl = document.getElementById('stage');
  if (topstripEl) topstripEl.inert = true;
  if (stageEl) stageEl.inert = true;
  flightScrim.classList.add('open');
  document.addEventListener('keydown', onFlightKey);
  $('flightClose').focus({preventScroll:true});
  // FOCUS-MODES: remember which base-instrument focus was showing so closing
  // the overlay returns to it, and mark the Flight segment pressed while open.
  preFlightFocus = focus;
  setSegPressed('flight');
  // fPlay handles reduced-motion itself (→ renderStatic) and runs the stage-3
  // capture/replay accounting on EVERY run.
  fPlay();
}
function closeFlight(){
  flightScrim.classList.remove('open');
  const topstripEl = document.querySelector('.topstrip');
  const stageEl = document.getElementById('stage');
  if (topstripEl) topstripEl.inert = false;
  if (stageEl) stageEl.inert = false;
  if (fTL) fTL.kill();
  resetChoreo();        // stage 2: no dim pills / stuck camera dip on reopen
  hideDeltaLabel();
  if (ghostCoach){ try { ghostCoach.close(); } catch(e){} ghostCoach = null; }
  stopAmbient();
  document.removeEventListener('keydown', onFlightKey);
  if (lastFocus && lastFocus.isConnected && lastFocus.focus) lastFocus.focus();
  // FOCUS-MODES: return the segmented control + stage to whichever focus was
  // active before Flight was opened (default Direction if none recorded).
  setFocus(preFlightFocus || 'direction', { skipFlightOpen:true, immediate:true });
}
function onFlightKey(e){ if (e.key==='Escape'){ e.preventDefault(); closeFlight(); } }
$('playFlight').addEventListener('click', openFlight);
$('flightClose').addEventListener('click', closeFlight);

// ════════════════════════════════════════════════════════════════
//  FOCUS-MODES — segmented control [Direction | Launch | Flight]
//   One instrument, 70/30 focus weighting per the approved mock. Selecting
//   "Flight" opens the EXISTING Play-flight overlay unchanged (openFlight());
//   closing it restores whichever focus was active beforehand (see closeFlight
//   above). Direction/Launch swap which lens is the 68%-wide hero vs the
//   compact live mini-panel. Persisted in-memory only (default Direction).
// ════════════════════════════════════════════════════════════════
let focus = 'direction';
let preFlightFocus = 'direction';
const focusPanels = { direction: $('panelDir'), launch: $('panelLaunch'), flight: $('panelFlight') };
// DUAL-LENS: the segmented [Direction|Launch|Flight] control is gone; these
// stay defined (guarded) only so any residual setSegPressed call is a no-op.
const segBtns = { direction: $('segDir'), launch: $('segLaunch'), flight: $('segFlight') };
function setSegPressed(key){
  Object.entries(segBtns).forEach(([k, btn]) => { if (btn) btn.setAttribute('aria-pressed', k === key ? 'true' : 'false'); });
}
function setFocus(next, opts){
  opts = opts || {};
  if (next === 'flight' && !opts.skipFlightOpen){
    // Flight is an overlay, not a laid-out panel — selecting it opens the
    // existing Play-flight overlay exactly as the Play-flight button does.
    openFlight();
    return;
  }
  focus = next;
  // DUAL-LENS: Direction + Launch instrument lenses are ALWAYS both active
  // (side by side); the Flight panel is vestigial and stays hidden. This makes
  // the opposite lens's arrows always visible (Sivert's redesign).
  if (focusPanels.direction) focusPanels.direction.classList.add('active');
  if (focusPanels.launch)    focusPanels.launch.classList.add('active');
  if (focusPanels.flight)    focusPanels.flight.classList.remove('active');
  // both lenses may have gone from 0×0 (hidden) to laid out — re-fit viewBoxes.
  requestAnimationFrame(fitLenses);
}
$('segFlightPlay') && $('segFlightPlay').addEventListener('click', openFlight);

// test hook object built here, attached to window.__impact.focus at the
// bottom of this script (merged into the single window.__impact assignment
// so neither hook clobbers the other).
const __impactFocusHook = {
  current: () => (flightScrim.classList.contains('open') ? 'flight-overlay-open' : focus),
  set: (m) => { if (m === 'flight') openFlight(); else setFocus(m); },
};
// Re-fit the full-bleed scene to the new aspect on resize / orientation change
// while the overlay is open (rebuild static so the trajectory stays on-range).
let fResizeRaf = 0;
window.addEventListener('resize', ()=>{
  if (!flightScrim.classList.contains('open')) return;
  cancelAnimationFrame(fResizeRaf);
  fResizeRaf = requestAnimationFrame(()=>{ renderStatic(); });
});
// Replay routes through fPlay so the stage-3 accounting runs (same params →
// replayCount++, NEVER a ghost capture; fPlay handles reduced-motion itself).
$('flightReplay').addEventListener('click', ()=>{ fPlay(); });
flightScrim.addEventListener('click', e=>{ if (e.target===flightScrim) closeFlight(); });

// ── STAGE 3: ghost UI — "Ghosts" toggle pill + clear-history control ──
const fGhostPillEl = $('fGhostPill'), fGhostClearEl = $('fGhostClear');
fGhostPillEl.addEventListener('click', ()=>{
  ghostsVisible = !ghostsVisible;
  fGhostPillEl.setAttribute('aria-pressed', String(ghostsVisible));
  if (FX.ghosts) FX.ghosts.style.display = ghostsVisible ? '' : 'none';
  saHaptics.selectionChanged();   // STAGE 4 — ghost pill toggle
});
fGhostClearEl.addEventListener('click', ()=>{
  ghosts.length = 0;
  fBaseline = null; buildGhostLegend();   // GHOST LAB: clear also drops the pin + its chips (buildGhostLegend → setPinUI)
  if (FX.ghosts) FX.ghosts.innerHTML = '';
  hideDeltaLabel(); fDeltaEl.hidden = true;
  // refit the shared camera when idle (never mid-flight); focus stays on the button
  if (flightScrim.classList.contains('open') && (!fTL || !fTL.isActive())) renderStatic();
});

// ── GHOST LAB: pin toggle + per-ghost show/hide (delegated — chips are rebuilt) ──
$('fPinBtn').addEventListener('click', ()=>{
  fBaseline = fBaseline ? null : (lastFlown ? { params: lastFlown.params, flight: lastFlown.flight } : null);
  setPinUI();
  saHaptics.selectionChanged();
  // re-render statically so the baseline path appears/disappears + the Δ-label re-anchors
  if (flightScrim.classList.contains('open') && (!fTL || !fTL.isActive())) renderStatic();
});
$('fGhostLegend').addEventListener('click', (e)=>{
  const btn = e.target.closest('.fChip-ghost'); if (!btn) return;
  const g = ghosts.find(x => String(x.id) === btn.dataset.gid); if (!g) return;
  g.hidden = !g.hidden;
  btn.setAttribute('aria-pressed', String(!g.hidden));
  const grp = FX.ghosts && FX.ghosts.querySelector('[data-gid="' + g.id + '"]');
  if (grp) grp.style.display = g.hidden ? 'none' : '';
  saHaptics.selectionChanged();
});

// ── CLUB-SPEED bar inside the flight overlay (left column) ──
// Changing it updates clubSpeed (other D-plane params stay from instrument
// state), keeps the top-strip slider in sync, and REDRAWS THE TRAJECTORY
// STATICALLY (live) — it does NOT re-run the launch→land animation. That lets
// you step/drag freely to the speed you want; the explicit Replay button (or
// reduced-motion) is the only thing that animates. (Bug fix: the ± steppers
// used to replay the ~4s shot on every click — "you could only change one mph
// before it re-visualised and interrupted you".)
const fSpeedRange = $('fSpeedRange'), fSpeedV = $('fSpeedV');
function applyFlightSpeed(v){
  v = clamp(Math.round(v), +fSpeedRange.min, +fSpeedRange.max);
  state.clubSpeed = v;
  fSpeedRange.value = v;
  fSpeedV.textContent = v;
  fSpeedRange._premiumRefresh && fSpeedRange._premiumRefresh();   // re-sync the premium fill/bubble
  // keep the live dual-lens instrument's club-speed slider + label in sync
  const main = $('s_speed');
  if (main && +main.value !== v){ main.value = v; main.dispatchEvent(new Event('input')); }
  // live static redraw of the new trajectory (no animation) while overlay is open
  if (flightScrim.classList.contains('open')) renderStatic();
}
fSpeedRange.addEventListener('input', ()=>{ applyFlightSpeed(+fSpeedRange.value); });
fSpeedRange.addEventListener('change', ()=>{ applyFlightSpeed(+fSpeedRange.value); });
$('fSpeedDown').addEventListener('click', ()=>{ applyFlightSpeed(+fSpeedRange.value - 1); });
$('fSpeedUp').addEventListener('click', ()=>{ applyFlightSpeed(+fSpeedRange.value + 1); });
// STAGE 4 — haptics: flight club-speed control follows the same slider
// protocol (pointerdown→selectionStart, whole-mph crossings→tick, pointerup→
// selectionEnd); the ± steppers each fire one selectionChanged per press.
wireSliderHaptics(fSpeedRange, 'fSpeed');
$('fSpeedDown').addEventListener('click', ()=> saHaptics.selectionChanged());
$('fSpeedUp').addEventListener('click', ()=> saHaptics.selectionChanged());

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
(function init(){
  $('s_speed').value=state.clubSpeed; $('s_face').value=state.faceAngle;
  $('s_path').value=state.clubPath; $('s_attack').value=state.attackAngle; $('s_loft').value=state.dynamicLoft;
  syncs.forEach(s=>s());
  decorateAria();
  setupPremiumSliders();   // premium track fill + tick + thumb + value bubble
  recomputeAngles();
  // initialise visAngle to target so first paint is correct (no flyout)
  Object.keys(ARROWS).forEach(k=>{ visAngle[k]=targetAngle[k]; applyArrowTransform(k); });
  // same for the display-only launch indicators + place their persistent chips
  Object.keys(LAUNCH).forEach(k=>{ visAngle[k]=targetAngle[k]; applyArrowTransform(k); placeChip(k); });
  drawCone();
  // Full first-paint render: recompute() covers rail + predictor AND the
  // pieces the old init missed (renderLaunchBend, updateCoachLines) — without
  // it the bent launch-dir arrow stayed straight and the coach line showed
  // "Main cause: —" until the first slider touch (Fable audit finding #2).
  recompute();
  // …but cancel the predictor's debounced settle ANNOUNCEMENT that recompute
  // scheduled: announcing "Predicted finish on line" ~800ms after load — with
  // no user action, right while the first-run coach dialog is being read —
  // is noise. Interaction-driven announcements are untouched (a11y delta #3).
  clearTimeout(predAnnounceTimer);
  setArrowAffordance();

  // ?play=1 — the Geometry "Ball flight →" deep-link auto-opens the overlay once.
  const params = new URLSearchParams(location.search);
  if (params.get('play') === '1'){
    requestAnimationFrame(()=> openFlight());
  }
})();

// ════════════════════════════════════════════════════════════════
//  PHASE D — first-run coach marks (built on sa-firstrun.js / window.SA)
//    • Spotlight walkthrough of the four key controls on the live
//      instrument. Runs once on first load; "?" replays on demand.
//    • Never runs while the Play-flight modal is open; if the modal
//      opens mid-walkthrough we skip/dismiss it so it stays on the
//      base instrument only.
//    • GATING (landscape-forced app): the walkthrough must never appear
//      until (a) the phone is actually in landscape AND (b) the lens
//      layout has rendered (fitLenses() has successfully sized a lens —
//      see lensesFitted above). Otherwise it can pop over the portrait
//      rotate-hint, or over an unrendered/zero-size layout. Mid-sequence
//      portrait rotation pauses/hides the active step (the rotate-hint
//      takes back over) and resumes the same step once landscape +
//      scene-ready are true again.
// ════════════════════════════════════════════════════════════════
(function setupCoachMarks(){
  const SA = window.SA;
  if (!SA || typeof SA.coachMarks !== 'function') return;  // foundation missing → no-op

  const COACH_KEY = 'sa_coach_impact';
  const STEPS = [
    { selector: '#stage',
      title: 'Both lenses at once',
      body: 'Direction (left) shows face & path from above; Launch (right) shows attack & loft from the side.' },
    { selector: '#lensDir .minidock',
      title: 'Shape the shot',
      body: 'Adjust Face & Path here to aim the clubface and swing direction — they set how the ball starts and curves.' },
    { selector: '#lensHt .minidock',
      title: 'Launch & spin',
      body: 'Set Attack & Dyn loft here to change how high the ball launches and how much it spins.' },
    { selector: '#s_speed',
      title: 'Set your club speed',
      body: 'Drag the club-speed slider — it drives ball speed and carry distance.' },
    { selector: '#playFlight',
      title: 'See the ball fly',
      body: 'Press Play flight to watch the shot launch, climb to apex and land downrange.' }
  ];
  const COACH_SETTLE_MS = 600;

  let activeCoach = null;
  let coachIdx = 0;          // resume position across pause/resume cycles
  let coachArmed = false;    // true once an auto/manual run has been requested
  let coachSettleTimer = null;

  function flightOpen(){
    const scrim = $('flightScrim');
    return !!(scrim && scrim.classList.contains('open'));
  }
  function isLandscape(){
    try { if (matchMedia('(orientation: landscape)').matches) return true; } catch(e){}
    return innerWidth > innerHeight;
  }
  function readyForCoach(){
    return isLandscape() && lensesFitted;
  }

  function startCoachAt(startIndex){
    if (activeCoach || flightOpen()) return;             // base instrument only
    const steps = STEPS.slice(startIndex);
    if (!steps.length) return;
    // DUAL-LENS: both instrument lenses are always laid out, so every STEPS
    // selector is present. setFocus is a no-op guard that just ensures both
    // panels are active before the walkthrough spotlights them.
    if (typeof setFocus === 'function') setFocus('direction');
    activeCoach = SA.coachMarks(steps, {
      storageKey: COACH_KEY,
      onStep(i){ coachIdx = startIndex + i; },   // track live position for resume-after-portrait
      onDone(){
        activeCoach = null; coachArmed = false; coachIdx = 0;
        // the tour's own close/focus-return can land on a spotlighted node
        // that then re-hides (e.g. a mini-panel), dropping focus to <body>.
        // Land somewhere always-present and useful instead.
        const speed = $('s_speed');
        if (speed) speed.focus({ preventScroll:true });
      }
    });
  }

  function hideCoachForPortrait(){
    if (activeCoach){
      try { activeCoach.close(); } catch(e){}
      activeCoach = null;
    }
    if (coachSettleTimer){ clearTimeout(coachSettleTimer); coachSettleTimer = null; }
  }

  function tryShowCoach(){
    if (!coachArmed || activeCoach || flightOpen()) return;
    if (!readyForCoach()) return;
    if (coachSettleTimer) return;
    coachSettleTimer = setTimeout(() => {
      coachSettleTimer = null;
      if (!coachArmed || activeCoach || flightOpen() || !readyForCoach()) return;
      startCoachAt(coachIdx);
    }, COACH_SETTLE_MS);
  }

  function run(){
    coachIdx = 0;
    coachArmed = true;
    if (readyForCoach() && !flightOpen()) {
      // manual "?" replay while already in landscape+ready: no need to wait
      // for the settle delay, the layout is already settled.
      startCoachAt(0);
    } else {
      tryShowCoach();
    }
  }

  // If the Play-flight modal opens while the walkthrough is up, dismiss it
  // so coach marks never sit on top of the modal.
  const scrim = $('flightScrim');
  if (scrim){
    const mo = new MutationObserver(()=>{
      if (activeCoach && flightOpen()){
        try { activeCoach.close(); } catch(e){}
        activeCoach = null;
      }
    });
    mo.observe(scrim, { attributes: true, attributeFilter: ['class'] });
  }

  // "?" replay affordance — always re-runs the walkthrough.
  const helpBtn = $('helpBtn');
  if (helpBtn) helpBtn.addEventListener('click', run);

  // First run: only on the base instrument (not when ?play=1 auto-opens flight).
  const autoPlay = new URLSearchParams(location.search).get('play') === '1';
  if (!autoPlay && !SA.seen(COACH_KEY)){
    coachIdx = 0;
    coachArmed = true;
    tryShowCoach();
  }

  // Listen for orientation flips + resizes + the lens-layout ready signal so
  // the gate re-evaluates the moment both landscape and scene-ready are true.
  addEventListener('orientationchange', () => {
    if (!isLandscape()) hideCoachForPortrait(); else tryShowCoach();
  });
  addEventListener('resize', () => {
    if (!isLandscape()) hideCoachForPortrait(); else tryShowCoach();
  });
  try {
    matchMedia('(orientation: landscape)').addEventListener('change', (e) => {
      if (!e.matches) hideCoachForPortrait(); else tryShowCoach();
    });
  } catch(e){}
  // lensesFitted can lag behind the orientation flip (fitLenses() runs on
  // resize + a post-paint rAF) — poll briefly so tryShowCoach() fires as
  // soon as the layout actually settles.
  (function pollSceneReady(){
    if (lensesFitted) { tryShowCoach(); return; }
    setTimeout(pollSceneReady, 80);
  })();

  // tiny dev hook for headless verification (module scope isn't on window)
  window.__coachDebug = {
    isLandscape, readyForCoach,
    sceneReady: () => lensesFitted,
    get idx() { return coachIdx; },
    get armed() { return coachArmed; },
    get active() { return !!activeCoach; },
  };
})();

// tiny dev hook for headless verification
window.__impact = { state, solve:()=>solveFlight(state), visAngle, targetAngle,
  get activeKey(){return activeKey;}, get fTL(){return fTL;}, get ambient(){return ambient;},
  get ghosts(){return ghosts;}, get baseline(){return fBaseline;}, get replayCount(){return replayCount;}, get lastFlown(){return lastFlown;},
  haptics: saHaptics,
  focus: __impactFocusHook };   // STAGE 4 — test hook (+ FOCUS-MODES hook)
</script>
</body>
</html>
