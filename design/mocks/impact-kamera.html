<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#090611">
  <title>Flightglass · Impact portrait reference</title>
  <style>
    @font-face{font-family:Inter;src:url('../../vendor/fonts/Inter-Regular.woff2') format('woff2');font-weight:400;font-display:swap}
    @font-face{font-family:Inter;src:url('../../vendor/fonts/Inter-SemiBold.woff2') format('woff2');font-weight:600;font-display:swap}
    @font-face{font-family:Inter;src:url('../../vendor/fonts/Inter-Bold.woff2') format('woff2');font-weight:700;font-display:swap}
    @font-face{font-family:'Space Grotesk';src:url('../../vendor/fonts/SpaceGrotesk-SemiBold.woff2') format('woff2');font-weight:600;font-display:swap}
    @font-face{font-family:'Space Grotesk';src:url('../../vendor/fonts/SpaceGrotesk-Bold.woff2') format('woff2');font-weight:700;font-display:swap}
    @font-face{font-family:'IBM Plex Mono';src:url('../../vendor/fonts/IBMPlexMono-Medium.woff2') format('woff2');font-weight:500;font-display:swap}

    :root{
      color-scheme:dark;
      --void:#06040b;
      --surface:#110d1c;
      --plate:rgba(12,9,19,.82);
      --plate-solid:#0d0a15;
      --ink:#f5f2ff;
      --muted:#aaa1be;
      --muted-2:#746c88;
      --line:rgba(245,242,255,.14);
      --line-strong:rgba(245,242,255,.26);
      --accent:#ff8a4d;
      --accent-soft:rgba(255,138,77,.17);
      --secondary:#9d8bff;
      --secondary-soft:rgba(157,139,255,.15);
      --gold:#d9b36a;
      --green:#77d8a1;
      --font-ui:Inter,system-ui,sans-serif;
      --font-display:'Space Grotesk',Inter,sans-serif;
      --font-mono:'IBM Plex Mono',ui-monospace,monospace;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      display:grid;place-items:center;overflow:hidden;
      background:#020204;
      color:var(--ink);font-family:var(--font-ui);
      -webkit-font-smoothing:antialiased;
    }
    button,input{font:inherit}
    button{color:inherit}

    .device{
      position:relative;isolation:isolate;
      width:min(430px,100vw);height:min(932px,100dvh);
      overflow:hidden;background:var(--void);
      display:flex;flex-direction:column;
      border:1px solid rgba(255,255,255,.09);
      box-shadow:0 24px 80px rgba(0,0,0,.68);
    }

    .appbar{
      position:relative;flex:0 0 58px;display:flex;
      align-items:center;padding:env(safe-area-inset-top) 10px 0;
      background:rgba(8,5,13,.9);border-bottom:1px solid var(--line);z-index:10;
    }
    .iconbtn{
      width:44px;height:44px;border:0;background:transparent;border-radius:12px;
      display:grid;place-items:center;cursor:pointer;color:var(--muted);
    }
    .iconbtn:hover{background:rgba(255,255,255,.06);color:var(--ink)}
    .appbar>.iconbtn:last-child{margin-left:auto}
    .iconbtn:focus-visible,.lens button:focus-visible,.parameter:focus-visible,.pin:focus-visible{
      outline:2px solid var(--ink);outline-offset:2px;
    }
    .app-title{position:absolute;left:50%;transform:translateX(-50%);text-align:center;line-height:1.05;pointer-events:none}
    .app-title strong{display:block;font:600 15px/1 var(--font-display);letter-spacing:.01em}
    .app-title span{display:block;margin-top:5px;color:var(--muted-2);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase}

    .stage{position:relative;flex:1 1 auto;min-height:0;overflow:hidden;background:#080610}
    .range-photo,.scene-shade,.grid,.trajectory{position:absolute;inset:0;width:100%;height:100%}
    .range-photo{
      object-fit:cover;object-position:50% 52%;filter:saturate(.8) contrast(1.08) brightness(.62);
      transform:scale(1.02);transition:opacity .35s ease,filter .35s ease;
    }
    .scene-shade{
      background:
        linear-gradient(180deg,rgba(5,3,10,.82) 0%,rgba(5,3,10,.2) 24%,rgba(5,3,10,.08) 58%,rgba(5,3,10,.82) 100%),
        radial-gradient(ellipse at 50% 48%,rgba(90,71,150,.06),rgba(5,3,10,.42) 76%);
      z-index:1;
    }
    .grid{z-index:2;opacity:.72}
    .grid line,.grid path{vector-effect:non-scaling-stroke}
    .trajectory{z-index:3;overflow:visible}
    .trajectory path,.trajectory line,.trajectory circle{vector-effect:non-scaling-stroke}
    .trace-glow{fill:none;stroke:var(--accent);stroke-width:13;opacity:.18;filter:blur(8px)}
    .trace-core{fill:none;stroke:var(--accent);stroke-width:3.2;stroke-linecap:round;filter:drop-shadow(0 0 5px rgba(255,138,77,.72))}
    .trace-head{fill:#fff8f1;stroke:var(--accent);stroke-width:3;filter:drop-shadow(0 0 9px rgba(255,138,77,.96))}
    .landing-ring{fill:rgba(255,138,77,.13);stroke:var(--accent);stroke-width:2;filter:drop-shadow(0 0 7px rgba(255,138,77,.72))}
    .landing-dot{fill:#fff8f1;stroke:var(--accent);stroke-width:2}
    .ghost{fill:none;stroke:rgba(245,242,255,.36);stroke-width:1.4;stroke-dasharray:4 8}

    .hud{position:absolute;inset:0;z-index:5;pointer-events:none}
    .result{position:absolute;top:17px;left:18px;text-shadow:0 2px 14px rgba(0,0,0,.55)}
    .result .value{font:700 48px/.9 var(--font-display);letter-spacing:-.04em}
    .result .unit{font:600 16px/1 var(--font-display);color:var(--muted);margin-left:4px}
    .result .label{margin-top:9px;font-size:10px;font-weight:700;letter-spacing:.24em;color:var(--muted);text-transform:uppercase}
    .result .offline{margin-top:12px;font:700 18px/1 var(--font-display);color:var(--accent)}
    .result .offline small{font:600 10px/1 var(--font-ui);color:var(--muted);letter-spacing:.08em}

    .pin{
      position:absolute;right:14px;top:15px;z-index:7;pointer-events:auto;
      min-width:56px;height:36px;padding:0 13px;border-radius:999px;cursor:pointer;
      border:1px solid rgba(217,179,106,.42);background:rgba(10,8,16,.68);
      color:var(--gold);font-size:11px;font-weight:700;backdrop-filter:blur(12px);
    }
    .pin[aria-pressed="true"]{background:rgba(217,179,106,.18);border-color:var(--gold)}
    .pin::after,.lens button::after,.parameter::after{content:'';position:absolute;inset:-5px 0}
    .nudge::after{content:'';position:absolute;inset:-7px}

    .cause-tag{
      position:absolute;z-index:6;left:50%;top:56%;transform:translate(-50%,-50%);
      padding:7px 10px;border:1px solid rgba(255,138,77,.4);border-radius:7px;
      background:rgba(8,6,13,.78);color:#ffd6bf;font:500 10px/1 var(--font-mono);
      white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.32);pointer-events:none;
    }
    .cause-tag::after{content:'';position:absolute;top:100%;left:50%;width:1px;height:27px;background:linear-gradient(var(--accent),transparent);opacity:.7}

    .lens{
      position:absolute;z-index:8;left:50%;bottom:17px;transform:translateX(-50%);
      display:flex;align-items:center;padding:3px;border:1px solid var(--line);
      background:rgba(8,6,13,.76);backdrop-filter:blur(14px);border-radius:12px;
      box-shadow:0 10px 36px rgba(0,0,0,.34);
    }
    .lens button{
      appearance:none;border:0;background:transparent;color:var(--muted);cursor:pointer;
      position:relative;min-width:66px;height:36px;border-radius:9px;font-size:10px;font-weight:700;letter-spacing:.12em;
    }
    .lens button[aria-pressed="true"]{background:var(--secondary-soft);color:var(--ink)}
    .lens button[data-view="flight"][aria-pressed="true"]{background:var(--accent-soft);color:#ffd4bd}

    .dock{
      position:relative;z-index:12;flex:0 0 164px;padding:13px 16px max(12px,env(safe-area-inset-bottom));
      background:rgba(11,8,17,.97);border-top:1px solid rgba(255,138,77,.38);
      box-shadow:0 -16px 42px rgba(0,0,0,.35);
    }
    .dock::before{content:'';position:absolute;top:-1px;left:16px;width:108px;height:1px;background:var(--accent);box-shadow:0 0 12px rgba(255,138,77,.45)}
    .active-row{display:grid;grid-template-columns:1fr auto;align-items:end;gap:12px}
    .eyebrow{font-size:10px;font-weight:700;letter-spacing:.16em;color:var(--secondary);text-transform:uppercase}
    .active-name{margin-top:5px;font:600 17px/1.1 var(--font-display)}
    .active-value{font:500 20px/1 var(--font-mono);color:var(--accent);font-variant-numeric:tabular-nums}
    .range-row{display:grid;grid-template-columns:30px 1fr 30px;align-items:center;gap:7px;margin-top:12px}
    .nudge{
      position:relative;
      width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.04);
      color:var(--muted);cursor:pointer;font-size:16px;line-height:1;
    }
    .nudge:active{background:rgba(255,255,255,.1)}
    input[type="range"]{appearance:none;width:100%;height:30px;background:transparent;cursor:ew-resize}
    input[type="range"]::-webkit-slider-runnable-track{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--accent) var(--fill,60%),rgba(255,255,255,.18) var(--fill,60%))}
    input[type="range"]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;margin-top:-8.5px;background:var(--ink);border:3px solid var(--accent);box-shadow:0 0 0 4px rgba(255,138,77,.13),0 4px 10px rgba(0,0,0,.45)}
    input[type="range"]::-moz-range-track{height:3px;background:rgba(255,255,255,.18)}
    input[type="range"]::-moz-range-progress{height:3px;background:var(--accent)}
    input[type="range"]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--ink);border:3px solid var(--accent)}
    input[type="range"]:focus-visible{outline:2px solid var(--ink);outline-offset:4px;border-radius:4px}
    .parameters{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(0,1fr);gap:8px;width:100%;margin-top:10px;padding-bottom:1px}
    .parameter{
      position:relative;
      min-width:0;width:100%;height:36px;padding:0 5px;border-radius:9px;border:1px solid var(--line);white-space:nowrap;
      background:rgba(255,255,255,.025);color:var(--muted);font-size:10px;font-weight:700;cursor:pointer;
    }
    .parameter[aria-pressed="true"]{border-color:rgba(157,139,255,.5);background:var(--secondary-soft);color:var(--ink)}
    .home-indicator{position:absolute;width:116px;height:4px;border-radius:2px;bottom:5px;left:50%;transform:translateX(-50%);background:rgba(245,242,255,.34)}

    .stage[data-scene="top"] .range-photo{opacity:.2;filter:saturate(.25) brightness(.35)}
    .stage[data-scene="side"] .range-photo{opacity:.38;filter:saturate(.5) brightness(.42)}
    [contenteditable="true"]:focus{outline:1px dashed rgba(245,242,255,.45);outline-offset:2px}

    @media (min-width:768px){
      body{background:radial-gradient(circle at 50% 44%,#1b142c 0,#08060d 36%,#020204 74%)}
      .device{border-radius:34px}
    }
    @media (max-width:375px), (max-height:820px){
      .appbar{flex-basis:52px}.dock{flex-basis:148px;padding-top:10px}
      .result{top:13px;left:15px}.result .value{font-size:42px}
      .lens{bottom:10px}.cause-tag{top:54%}
      .parameters{gap:6px;margin-top:8px}.parameter{height:34px;padding:0 4px}
      .range-row{margin-top:9px}
    }
    @media (min-width:1024px){.device{outline:1px solid rgba(255,255,255,.07);outline-offset:10px}}
    @media (min-width:1440px){.device{transform:scale(1);transform-origin:center}}
    @media (prefers-color-scheme:light){body{background:#e9e6ef}}
    @media (prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;transition:none!important;animation:none!important}}
  </style>
</head>
<body>
  <div class="device">
    <header class="appbar">
      <button class="iconbtn" type="button" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M12.5 4.5 7 10l5.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="app-title"><strong>Impact</strong><span>Live range</span></div>
      <button class="iconbtn" id="more" type="button" aria-label="More options">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><circle cx="4" cy="10" r="1.35"/><circle cx="10" cy="10" r="1.35"/><circle cx="16" cy="10" r="1.35"/></svg>
      </button>
    </header>

    <main class="stage" id="stage" data-scene="flight">
      <img class="range-photo" src="../../assets/range-night-3d-11.png" alt="" aria-hidden="true">
      <div class="scene-shade" aria-hidden="true"></div>

      <svg class="grid" viewBox="0 0 430 690" preserveAspectRatio="none" aria-hidden="true">
        <g id="flightGrid" fill="none" stroke="rgba(196,184,255,.15)" stroke-width="1">
          <path d="M18 642 215 468 412 642"/>
          <path d="M72 642 215 468 358 642"/><path d="M128 642 215 468 302 642"/><path d="M183 642 215 468 247 642"/>
          <path d="M34 620H396"/><path d="M61 586H369"/><path d="M92 552H338"/><path d="M127 520H303"/><path d="M164 493H266"/><path d="M198 476H232"/>
        </g>
        <g id="topGrid" opacity="0" fill="none" stroke="rgba(196,184,255,.15)" stroke-width="1">
          <path d="M215 650V90"/><path d="M143 650V90"/><path d="M287 650V90"/><path d="M71 650V90"/><path d="M359 650V90"/>
          <path d="M38 590H392"/><path d="M38 490H392"/><path d="M38 390H392"/><path d="M38 290H392"/><path d="M38 190H392"/><path d="M38 90H392"/>
        </g>
        <g id="sideGrid" opacity="0" fill="none" stroke="rgba(196,184,255,.15)" stroke-width="1">
          <path d="M34 592H400"/><path d="M34 492H400"/><path d="M34 392H400"/><path d="M34 292H400"/><path d="M94 160V620"/><path d="M194 160V620"/><path d="M294 160V620"/><path d="M394 160V620"/>
        </g>
      </svg>

      <svg class="trajectory" viewBox="0 0 430 690" preserveAspectRatio="none" role="img" aria-label="A simulated shot carrying 207 metres and finishing 24 metres right of target">
        <path id="ghost" class="ghost" d="M215 620 C218 420 207 285 215 493"/>
        <path id="traceGlow" class="trace-glow" d="M215 620 C222 404 260 254 298 493"/>
        <path id="trace" class="trace-core" d="M215 620 C222 404 260 254 298 493"/>
        <circle id="traceHead" class="trace-head" cx="253" cy="326" r="5"/>
        <ellipse id="landingRing" class="landing-ring" cx="298" cy="493" rx="11" ry="4"/>
        <circle id="landingDot" class="landing-dot" cx="298" cy="493" r="3"/>
        <circle cx="215" cy="620" r="4" fill="#f5f2ff" opacity=".8"/>
      </svg>

      <section class="hud" aria-label="Shot results">
        <div class="result">
          <div><span class="value" id="carry">207</span><span class="unit">m</span></div>
          <div class="label">Carry</div>
          <div class="offline"><span id="offline">24</span> m <span id="offlineSide">R</span> <small id="delta">· 19 m less curve</small></div>
        </div>
        <button class="pin" id="pin" type="button" aria-pressed="false">○ Pin</button>
        <div class="cause-tag" id="causeTag">Launch direction +1.6°</div>
      </section>

      <nav class="lens" aria-label="Shot perspective">
        <button type="button" data-view="flight" aria-pressed="true">FLIGHT</button>
        <button type="button" data-view="top" aria-pressed="false">TOP</button>
        <button type="button" data-view="side" aria-pressed="false">SIDE</button>
      </nav>
    </main>

    <section class="dock" aria-labelledby="activeInput">
      <div class="active-row">
        <div>
          <div class="eyebrow">Active input · changes live</div>
          <div class="active-name" id="activeInput">Face angle</div>
        </div>
        <output class="active-value" id="activeValue" for="control">+1.6°</output>
      </div>
      <div class="range-row">
        <button class="nudge" id="minus" type="button" aria-label="Decrease face angle">−</button>
        <input id="control" type="range" min="-4" max="4" step="0.1" value="1.6" aria-label="Face angle" style="--fill:70%">
        <button class="nudge" id="plus" type="button" aria-label="Increase face angle">+</button>
      </div>
      <div class="parameters" role="group" aria-label="Choose active input">
        <button class="parameter" type="button" data-param="face" aria-pressed="true">Face</button>
        <button class="parameter" type="button" data-param="path" aria-pressed="false">Path</button>
        <button class="parameter" type="button" data-param="dynloft" aria-pressed="false">Dyn. loft</button>
        <button class="parameter" type="button" data-param="attack" aria-pressed="false">Attack</button>
        <button class="parameter" type="button" data-param="speed" aria-pressed="false">Speed</button>
      </div>
      <div class="home-indicator" aria-hidden="true"></div>
    </section>
  </div>

  <script type="module">

    const stage = document.querySelector('#stage');
    const control = document.querySelector('#control');
    const activeInput = document.querySelector('#activeInput');
    const activeValue = document.querySelector('#activeValue');
    const parameterStrip = document.querySelector('.parameters');
    const causeTag = document.querySelector('#causeTag');
    const trace = document.querySelector('#trace');
    const traceGlow = document.querySelector('#traceGlow');
    const traceHead = document.querySelector('#traceHead');
    const landingRing = document.querySelector('#landingRing');
    const landingDot = document.querySelector('#landingDot');
    const ghost = document.querySelector('#ghost');
    const carry = document.querySelector('#carry');
    const offline = document.querySelector('#offline');
    const offlineSide = document.querySelector('#offlineSide');
    const delta = document.querySelector('#delta');
    let view = 'flight';
    let param = 'face';
    let speed = 130;

    const configs = {
      face:{name:'Face angle',min:-4,max:4,step:.1,value:1.6,unit:'°',tag:'Launch direction',lead:'Start direction moves.',rest:'The shot updates live.'},
      path:{name:'Club path',min:-8,max:8,step:.1,value:2.4,unit:'°',tag:'Club path',lead:'Curve changes.',rest:'Face stays fixed.'},
      dynloft:{name:'Dynamic loft',min:14,max:34,step:.5,value:22,unit:'°',tag:'Dynamic loft',lead:'Flight window changes.',rest:'Apex stays visible.'},
      attack:{name:'Attack angle',min:-8,max:6,step:.1,value:-3.2,unit:'°',tag:'Attack angle',lead:'Launch changes.',rest:'Dynamic loft stays fixed.'},
      speed:{name:'Club speed',min:70,max:135,step:1,value:130,unit:' mph',tag:'Club speed',lead:'Carry stretches.',rest:'Shared across all views.'}
    };

    const allowedByView = {
      flight:['face','path','dynloft','attack','speed'],
      top:['face','path','speed'],
      side:['dynloft','attack','speed']
    };

    function formatValue(n,unit){
      const decimals = unit === ' mph' ? 0 : 1;
      const sign = unit === ' mph' ? '' : n > 0 ? '+' : '';
      return `${sign}${Number(n).toFixed(decimals)}${unit}`;
    }

    function cubicPoint(p0,p1,p2,p3,t){
      const mt=1-t;
      return {
        x:mt**3*p0.x+3*mt**2*t*p1.x+3*mt*t**2*p2.x+t**3*p3.x,
        y:mt**3*p0.y+3*mt**2*t*p1.y+3*mt*t**2*p2.y+t**3*p3.y
      };
    }

    function shape(){
      const lateral = configs.face.value*12 + configs.path.value*2;
      const loftLift = (configs.dynloft.value-22)*5;
      const attackLift = (configs.attack.value+3.2)*2.2;
      const speedDepth = speed-130;
      let d, ghostD, start, c1, c2, end, ball;
      if(view === 'top'){
        start={x:215,y:630};
        end={x:Math.max(78,Math.min(352,215+lateral*3.45)),y:Math.max(100,Math.min(208,112-speedDepth*1.6))};
        c1={x:215,y:500};c2={x:205+lateral*1.3,y:290};
        d=`M${start.x} ${start.y} C${c1.x} ${c1.y} ${c2.x} ${c2.y} ${end.x} ${end.y}`;
        ghostD=`M215 630 C215 500 215 290 215 ${end.y}`;
        ball=cubicPoint(start,c1,c2,end,.72);
        landingRing.setAttribute('rx','6');landingRing.setAttribute('ry','6');
      }else if(view === 'side'){
        const apex=318-loftLift-attackLift;
        start={x:48,y:592};end={x:Math.max(300,Math.min(398,390+speedDepth*2.8)),y:592};
        c1={x:132,y:apex-126};c2={x:end.x-94,y:apex-105};
        d=`M${start.x} ${start.y} C${c1.x} ${c1.y} ${c2.x} ${c2.y} ${end.x} ${end.y}`;
        ghostD=`M48 592 C132 192 ${end.x-94} 213 ${end.x} 592`;
        ball=cubicPoint(start,c1,c2,end,.58);
        landingRing.setAttribute('rx','9');landingRing.setAttribute('ry','3.5');
      }else{
        start={x:215,y:620};end={x:Math.max(95,Math.min(345,215+lateral*3.45)),y:Math.max(477,Math.min(518,493-speedDepth*.62))};
        c1={x:218+lateral*.12,y:410};c2={x:235+lateral*1.9,y:254-loftLift-attackLift};
        d=`M${start.x} ${start.y} C${c1.x} ${c1.y} ${c2.x} ${c2.y} ${end.x} ${end.y}`;
        ghostD=`M215 620 C218 410 210 254 215 ${end.y}`;
        ball=cubicPoint(start,c1,c2,end,.56);
        landingRing.setAttribute('rx','11');landingRing.setAttribute('ry','4');
      }
      trace.setAttribute('d',d);traceGlow.setAttribute('d',d);
      traceHead.setAttribute('cx',ball.x);traceHead.setAttribute('cy',ball.y);
      landingRing.setAttribute('cx',end.x);landingRing.setAttribute('cy',end.y);
      landingDot.setAttribute('cx',end.x);landingDot.setAttribute('cy',end.y);
      ghost.setAttribute('d',ghostD);
    }

    function update(){
      const c = configs[param];
      const n = Number(control.value);
      c.value=n;
      if(param==='speed') speed=n;
      const fill = ((n-c.min)/(c.max-c.min))*100;
      control.style.setProperty('--fill',`${fill}%`);
      activeValue.textContent=formatValue(n,c.unit);
      causeTag.textContent=`${c.tag} ${formatValue(n,c.unit)}`;
      const signedSide=configs.face.value*12+configs.path.value*2;
      const side=Math.max(0,Math.round(Math.abs(signedSide)));
      offline.textContent=side;offlineSide.textContent=signedSide<0?'L':'R';
      delta.textContent=`· ${Math.max(0,43-side)} m less curve`;
      carry.textContent=Math.round(207+(speed-130)*1.45);
      shape();
    }

    function renderParameterButtons(){
      const allowed=allowedByView[view];
      document.querySelectorAll('.parameter').forEach(button=>{
        button.hidden=!allowed.includes(button.dataset.param);
        button.setAttribute('aria-pressed',String(button.dataset.param===param));
      });
      parameterStrip.scrollLeft=0;
      requestAnimationFrame(()=>{parameterStrip.scrollLeft=0});
    }

    function selectParam(next){
      param=next;const c=configs[param];
      renderParameterButtons();
      activeInput.textContent=c.name;control.min=c.min;control.max=c.max;control.step=c.step;control.value=c.value;
      control.setAttribute('aria-label',c.name);update();
    }

    document.querySelectorAll('.lens button').forEach(button=>button.addEventListener('click',()=>{
      view=button.dataset.view;stage.dataset.scene=view;
      document.querySelectorAll('.lens button').forEach(b=>b.setAttribute('aria-pressed',String(b===button)));
      document.querySelector('#flightGrid').style.opacity=view==='flight'?'1':'0';
      document.querySelector('#topGrid').style.opacity=view==='top'?'1':'0';
      document.querySelector('#sideGrid').style.opacity=view==='side'?'1':'0';
      const next=param==='speed'||allowedByView[view].includes(param)?param:allowedByView[view][0];
      selectParam(next);
    }));

    document.querySelectorAll('.parameter').forEach(button=>button.addEventListener('click',()=>selectParam(button.dataset.param)));

    control.addEventListener('input',update);
    document.querySelector('#minus').addEventListener('click',()=>{control.stepDown();update()});
    document.querySelector('#plus').addEventListener('click',()=>{control.stepUp();update()});

    document.querySelector('#pin').addEventListener('click',event=>{
      const pressed=event.currentTarget.getAttribute('aria-pressed')==='true';
      event.currentTarget.setAttribute('aria-pressed',String(!pressed));
      event.currentTarget.textContent=!pressed?'● Pinned':'○ Pin';
      ghost.style.opacity=!pressed?'1':'.18';
    });
    selectParam('face');
  </script>
</body>
</html>
