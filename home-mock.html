<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07060C">
<meta name="robots" content="noindex">
<title>StrikeArc</title>

<!-- favicon: arc-mark (violet strokes) + ember ball — the P3 lockup exception -->
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2052%2052'%20fill='none'%3E%3Cpath%20d='M11%2045%20C%2016%2026,%2024%2018,%2035%2015%20M21%2039%20L%2030%2024%20L%2043%2045'%20stroke='%239D8BFF'%20stroke-width='4.2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3Ccircle%20cx='37'%20cy='15'%20r='5.2'%20fill='%23FF8A4D'/%3E%3C/svg%3E">

<!-- preload the backdrop so nothing flashes white during decode -->
<link rel="preload" as="image" href="./assets/range-night-3d-33.png">

<!-- shared P3 tokens + shell contract -->
<link rel="stylesheet" href="./sa-p3.css">

<!-- COLD-ENTRY GATE (pre-paint, synchronous): decide whether the Comet Broadcast
     plays this load. Sets html.obs-cold so the constellation starts hidden with
     NO flash. Skips (→ static rest) when reduced-motion OR already played this
     session OR an explicit ?rm/?nocold. sessionStorage is the once-per-session gate. -->
<script>
(function(){
  try{
    var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    var q = location.search;
    var forcedStatic = /[?&](rm|nocold)=1/.test(q);
    var forcedCold   = /[?&]cold=1/.test(q);          // review helper: force replay
    if (forcedCold){ try{ sessionStorage.removeItem('sa.home.broadcast'); }catch(e){} }
    var played = false; try{ played = sessionStorage.getItem('sa.home.broadcast')==='1'; }catch(e){}
    if (!reduce && !forcedStatic && (!played || forcedCold)){
      document.documentElement.classList.add('obs-cold');
    }
  }catch(e){}
})();
</script>

<style>
  /* ══ THE OBSERVATORY BROADCAST — front surface (showcase-spec §3 + §1) ══════
     "your golf as a constellation over the range." The calibrated range-33 world
     + night grade stay as the LOWER third; ABOVE the horizon the sky becomes the
     interface — a seeded procedural starfield with five module-stars. One canvas
     (starfield + comet), no continuous rAF at rest (breathing = CSS). ═════════ */

  /* ── FRAUNCES (showcase surfaces ONLY — scoped @font-face, NOT in sa-p3.css).
     Single variable file (121KB < 300KB → §4 uses the variable, not 2 statics).
     All four registered axes present: opsz · wght · SOFT · WONK. ──────────── */
  @font-face{
    font-family:'Fraunces';
    font-style:normal;
    font-weight:100 900;                 /* variable weight range */
    font-display:swap;
    src:url('./vendor/fonts/Fraunces-Variable.woff2') format('woff2');
  }

  /* cross-document View Transitions (MPA). Reduced-motion + no-support fall back
     to instant swaps (guarded in sa-p3.css and by feature detection). */
  @view-transition{ navigation:auto; }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  html{background:var(--bg);}
  body{
    min-height:100dvh;
    background:var(--scene-bg);          /* deep-violet sky, visible during decode */
    color:var(--ink);
    overflow:hidden;
    font-family:var(--font-ui);          /* SYS-01 ui role (Inter) */
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ── Fraunces roles (identity layer, spec §1) ─────────────────────────────
     display = Fraunces: soft-display plaques ~600, WONK on for the wordmark. */
  .obs-plaque{
    font-family:'Fraunces',Georgia,'Times New Roman',serif;
    font-variation-settings:'opsz' 34,'wght' 560,'SOFT' 48,'WONK' 0;
    font-weight:560;letter-spacing:.006em;
  }
  .obs-eyebrow-serif{
    font-family:'Fraunces',Georgia,serif;
    font-variation-settings:'opsz' 20,'wght' 480,'SOFT' 60,'WONK' 0;
    font-weight:480;font-style:normal;letter-spacing:.03em;
  }

  /* ══ SKY — ONE canvas: seeded starfield (static) + comet (transient) ═══════ */
  .obs-sky{
    position:fixed;inset:0;width:100%;height:100%;z-index:0;
    pointer-events:none;display:block;
    /* idle parallax translate (≤6px) rides on these vars — compositor only */
    transform:translate3d(var(--par-x,0),var(--par-y,0),0);
    transition:transform .5s var(--ease);
  }

  /* ══ SCENE STACK (the NIGHT GRADE recipe — constants reused verbatim) ══════
     Confined to the lower third so the horizon sits low and the sky opens up.  */
  .obs-scene{
    position:fixed;left:0;right:0;bottom:0;z-index:1;
    height:46%;min-height:190px;overflow:hidden;pointer-events:none;
    /* Pass-1 (Fable): feather the sky→range seam — the photo's own dark-blue
       sky met the starfield in a hard band. 34px mask blends the two worlds. */
    -webkit-mask-image:linear-gradient(180deg, transparent 0, #000 34px);
    mask-image:linear-gradient(180deg, transparent 0, #000 34px);
  }
  .obs-scene__img{                          /* backdrop, cover(slice) @ .78 */
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:50% 46%;opacity:.78;
    /* floodlight-wake seat: entry dims then powers on (Stage B toggles .is-lit) */
  }
  .obs-scene__dark{position:absolute;inset:0;background:#07060C;opacity:.16;}       /* 3 */
  .obs-scene__grade{position:absolute;inset:0;                                      /* 4 */
    background:linear-gradient(180deg,
      rgba(20,14,36,.42) 0%,
      rgba(20,14,36,.10) 42%,
      rgba(157,139,255,.10) 62%,
      rgba(20,14,36,.38) 100%);}
  .obs-scene__scrim{position:absolute;left:0;right:0;bottom:0;height:120px;         /* 5 */
    background:linear-gradient(0deg, rgba(7,6,12,.90), transparent 62%);}
  /* horizon feather — hides the hard top edge of the banded photo into the sky */
  .obs-scene__feather{position:absolute;left:0;right:0;top:0;height:88px;
    background:linear-gradient(180deg, rgba(7,6,12,.92) 0%, rgba(10,7,20,.34) 55%, transparent 100%);}

  /* floodlight-wake overlay (cold entry only). Sits over the scene, fades out. */
  .obs-wake{position:fixed;inset:0;z-index:2;pointer-events:none;background:#050409;opacity:0;}

  /* ══ CONSTELLATION LINES — static hairlines (shimmer NEVER) ════════════════ */
  .obs-lines{position:fixed;inset:0;z-index:3;pointer-events:none;width:100%;height:100%;}
  .obs-lines line{stroke:rgba(215,222,255,.20);stroke-width:1;stroke-linecap:round;}
  .obs-lines line.is-brass{stroke:rgba(227,196,104,.30);}   /* brass major joint tick */

  /* ══ MODULE-STARS ═════════════════════════════════════════════════════════ */
  .obs-stars{position:fixed;inset:0;z-index:4;}
  .obs-star{
    position:absolute;
    /* ── LANDSCAPE SAFE-AREAS (spec §0.4 non-negotiable · research guardrail 16).
       The five module-stars are the PRIMARY nav, so — like every other chrome
       element (wordmark/help/lower-third) — their position must be inset-aware.
       In the landscape-locked orientation the Dynamic Island / notch lands on a
       short (left|right) edge; clamp each star's centre into a safe band so that
       neither the centre nor its ≥44px halo can enter any inset region.
       env()→custom-prop indirection keeps the guardrail testable (override the
       --sa-* props to emulate a notch). At 0 insets the clamp min (= halo) is
       smaller than every star's %, so it is a NO-OP and the render is unchanged. */
    --sa-l:env(safe-area-inset-left);
    --sa-r:env(safe-area-inset-right);
    --sa-t:env(safe-area-inset-top);
    --sa-b:env(safe-area-inset-bottom);
    --sa-hx:28px;                 /* horizontal halo: academy ring 23px radius + margin */
    --sa-hy:48px;                 /* vertical halo: covers the point sitting high in the box
                                     PLUS the academy XP ring's top edge (46px, radius 23,
                                     centred ~9px below box-top). Still < the smallest star's
                                     sy (56.25px @375) → a no-op at 0 insets. */
    left:clamp(calc(var(--sa-l) + var(--sa-hx)), var(--sx,50%), calc(100% - var(--sa-r) - var(--sa-hx)));
    top: clamp(calc(var(--sa-t) + var(--sa-hy)), var(--sy,50%), calc(100% - var(--sa-b) - var(--sa-hy)));
    transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:5px;
    min-width:44px;padding:8px 12px 9px;                 /* ≥44px hit + generous halo */
    text-decoration:none;color:var(--ink);
    -webkit-tap-highlight-color:transparent;
    border-radius:14px;cursor:pointer;
    transition:transform .18s var(--ease);
  }
  .obs-star:active{transform:translate(-50%,-50%) scale(.97);}
  /* the star point (soft light) */
  .obs-star__point{
    position:relative;width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%, #EEF0FF 0%, #C7CBF2 42%, rgba(157,139,255,.0) 72%);
    box-shadow:0 0 8px 1px rgba(157,139,255,.42);
    /* breathe: opacity 0.85↔1, desync per-star (CSS var --bd sets the period) */
    animation:obsBreathe var(--bd,8s) var(--ease) infinite;
  }
  @keyframes obsBreathe{0%,100%{opacity:.85;}50%{opacity:1;}}
  .obs-star__glow{                                   /* wider faint halo behind point */
    position:absolute;width:34px;height:34px;left:50%;top:9px;transform:translate(-50%,-50%);
    border-radius:50%;background:radial-gradient(circle,rgba(157,139,255,.18),rgba(157,139,255,0) 70%);
    pointer-events:none;
  }
  .obs-star__label{
    font-size:12.5px;line-height:1;color:var(--ink);white-space:nowrap;
    text-shadow:0 1px 10px rgba(0,0,0,.8),0 0 2px rgba(0,0,0,.9);
  }
  .obs-star__stat{
    font-family:var(--font-mono);font-variant-numeric:tabular-nums;
    font-size:11px;font-weight:500;line-height:1;color:var(--muted);letter-spacing:0;
    white-space:nowrap;text-shadow:0 1px 8px rgba(0,0,0,.85);
  }
  .obs-star__stat .v{color:var(--ink);font-weight:600;}
  .obs-star__stat .l{color:var(--muted-2);margin-left:3px;}
  .obs-star__micro{                                 /* START HERE / CONTINUE */
    /* Pass-1 (Fable): 8.5px broke the 10px type floor; ember prefix made the
       promoted star a 3-ember cluster (point+prefix+value). Prefix is CHROME,
       not live data — violet secondary, 10px, tighter tracking. */
    font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--secondary);line-height:1;text-shadow:0 1px 8px rgba(0,0,0,.85);
    margin-bottom:-1px;
  }
  .obs-star__micro:empty{display:none;}

  /* promoted (resume / first-run hero) — the ONE promoted stat wears ember */
  .obs-star.is-promoted .obs-star__point{
    background:radial-gradient(circle at 50% 50%, #FFE7D4 0%, #FF8A4D 46%, rgba(255,138,77,0) 74%);
    box-shadow:0 0 10px 2px rgba(255,138,77,.5);
  }
  .obs-star.is-promoted .obs-star__stat .v{color:var(--accent);}

  /* focus — brass reticle around the star, over the codified double ring */
  .obs-star:focus-visible{
    outline:none;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.85), inset 0 0 0 3px var(--ink);
  }
  .obs-star:focus-visible .obs-reticle{opacity:1;}
  .obs-reticle{
    position:absolute;left:50%;top:9px;transform:translate(-50%,-50%);
    width:40px;height:40px;opacity:0;transition:opacity .12s var(--ease);pointer-events:none;
  }
  .obs-reticle path{stroke:var(--launch);stroke-width:1.4;fill:none;stroke-linecap:round;}

  /* ── ACADEMY pole-star XP ring (graduated ring; celebrate = reward-only) ─── */
  .obs-star--academy .obs-ring{
    position:absolute;left:50%;top:9px;transform:translate(-50%,-50%);
    width:46px;height:46px;pointer-events:none;overflow:visible;
  }
  .obs-ring .track{stroke:rgba(215,222,255,.16);stroke-width:2;fill:none;}
  /* Pass-1 (Fable): XP progress = gold app-wide (Academy unified reward hue);
     magenta celebrate is for celebration MOMENTS, not resting progress. */
  .obs-ring .prog{stroke:var(--warn);stroke-width:2.4;fill:none;stroke-linecap:round;
    filter:drop-shadow(0 0 3px rgba(255,92,225,.45));}
  .obs-ring .tick{stroke:var(--launch);stroke-width:1.2;opacity:.55;}     /* brass major ticks */

  /* ══ TEE + EMBER BALL — the only hot element at rest ═══════════════════════ */
  .obs-tee{position:fixed;left:50%;top:83%;transform:translate(-50%,-50%);z-index:4;
    pointer-events:none;width:60px;height:60px;}
  .obs-tee__peg{position:absolute;left:50%;top:calc(50% + 7px);transform:translateX(-50%);
    width:1.5px;height:9px;background:linear-gradient(180deg,rgba(215,222,255,.5),rgba(215,222,255,0));border-radius:1px;}
  .obs-ball{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:12px;height:12px;border-radius:50%;
    background:radial-gradient(circle at 38% 34%, #FFF3E8 0%, #FF9A5E 46%, #FF7A3A 100%);
    box-shadow:0 0 12px 3px rgba(255,138,77,.5), 0 0 3px 1px rgba(255,138,77,.8);
    animation:obsBallBreathe 4.2s var(--ease) infinite;
  }
  @keyframes obsBallBreathe{0%,100%{opacity:.9;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.06);}}
  .obs-tee.is-flying .obs-ball{opacity:0;animation:none;}   /* canvas takes over during flight */

  /* ══ HEADER — wordmark top-left (Fraunces, WONK on), help top-right ════════ */
  header.obs-header{position:fixed;top:0;left:0;right:0;z-index:12;height:60px;pointer-events:none;}
  .obs-wordmark{
    position:absolute;left:max(16px, env(safe-area-inset-left));
    top:max(12px, env(safe-area-inset-top));
    display:inline-flex;align-items:center;gap:9px;pointer-events:none;
    filter:drop-shadow(0 2px 16px rgba(0,0,0,.7));
    view-transition-name:sa-logo;
  }
  .obs-wordmark .mark{width:23px;height:23px;flex:0 0 auto;display:block;}
  .obs-wordmark .mark .arc{stroke:var(--secondary);}
  .obs-wordmark .mark .ball{fill:var(--accent);}
  .obs-wordmark .wm{
    font-family:'Fraunces',Georgia,serif;
    font-variation-settings:'opsz' 88,'wght' 600,'SOFT' 0,'WONK' 1;   /* the one WONKY moment */
    font-size:21px;font-weight:600;line-height:1;letter-spacing:.004em;
  }
  .obs-wordmark .wm .s{color:var(--ink);}
  .obs-wordmark .wm .a{color:var(--accent);}

  .obs-help{
    position:fixed;top:max(6px, calc(env(safe-area-inset-top) - 6px));
    right:max(8px, env(safe-area-inset-right));z-index:13;
    width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;
    background:none;border:0;color:var(--muted);cursor:pointer;
    -webkit-tap-highlight-color:transparent;pointer-events:auto;
    filter:drop-shadow(0 1px 8px rgba(0,0,0,.6));}
  .obs-help svg{width:22px;height:22px;display:block;}
  .obs-help:hover{color:var(--ink);}
  .obs-help:focus-visible{outline:none;border-radius:12px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.85), inset 0 0 0 3px var(--ink);}

  /* ══ LOWER-THIRD — the broadcast caption (types on cold entry, then holds) ══ */
  .obs-lowerthird{
    position:fixed;z-index:11;
    left:max(16px, env(safe-area-inset-left));
    bottom:max(14px, env(safe-area-inset-bottom));
    max-width:min(74vw,420px);
    padding:8px 13px 9px;
    background:var(--plate);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-left:2px solid var(--accent-line);
    border-radius:12px;
    box-shadow:0 6px 22px -12px rgba(0,0,0,.8);
  }
  .obs-lt__eyebrow{
    display:block;font-size:11px;color:var(--muted);margin-bottom:3px;line-height:1;
  }
  .obs-lt__line{
    font-family:var(--font-mono);font-variant-numeric:tabular-nums;
    font-size:12.5px;font-weight:500;line-height:1.25;color:var(--muted);letter-spacing:0;
    white-space:nowrap;overflow:hidden;
  }
  .obs-lt__line .k{color:var(--muted-2);}                 /* LAST SHOT · label */
  .obs-lt__line .v{color:var(--ink);font-weight:600;}     /* numbers (cold ink, not ember) */
  .obs-lt__line .sep{color:var(--muted-2);margin:0 2px;}
  .obs-lt__cta{color:var(--accent);}                      /* try it → (first-run only) */

  /* visually-hidden live region */
  .obs-sr{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0 0 0 0);white-space:nowrap;border:0;}

  /* ── COLD-ENTRY pre-state (set on <html> pre-paint by the head gate, so there is
       no flash). The choreography (Stage B) reveals each layer on its own beat.
       Default (no-JS / warm / reduced-motion) = everything shown & static. ──── */
  html.obs-cold .obs-star,
  html.obs-cold .obs-lines{opacity:0;}
  html.obs-cold .obs-lowerthird{opacity:0;transform:translateY(6px);}
  html.obs-cold .obs-tee{opacity:0;}
  html.obs-cold .obs-sky{opacity:0;}
  html.obs-cold .obs-scene{opacity:.34;filter:brightness(.5) saturate(.85);}

  /* reveal the constellation (stars + lines) with a gentle per-star stagger */
  html.obs-cold.obs-show .obs-lines{opacity:1;transition:opacity .7s var(--ease);}
  html.obs-cold.obs-show .obs-star{opacity:1;transition:opacity .6s var(--ease);}
  html.obs-cold.obs-show .obs-stars .obs-star:nth-child(1){transition-delay:.00s;}
  html.obs-cold.obs-show .obs-stars .obs-star:nth-child(2){transition-delay:.07s;}
  html.obs-cold.obs-show .obs-stars .obs-star:nth-child(3){transition-delay:.14s;}
  html.obs-cold.obs-show .obs-stars .obs-star:nth-child(4){transition-delay:.21s;}
  html.obs-cold.obs-show .obs-stars .obs-star:nth-child(5){transition-delay:.28s;}
  /* floodlight wake: the range powers on over ~0.9s */
  html.obs-cold.obs-wake-on .obs-scene{opacity:1;filter:none;transition:opacity .9s var(--ease),filter:.9s var(--ease);}
  html.obs-cold.obs-wake-on .obs-sky{opacity:1;transition:opacity .7s var(--ease);}
  /* the tee ball settles in after the comet lands */
  html.obs-cold.obs-ball-in .obs-tee{opacity:1;transition:opacity .5s var(--ease);}
  /* lower-third types on (revealed by JS at its beat) */
  html.obs-cold.obs-lt-in .obs-lowerthird{opacity:1;transform:none;transition:opacity .34s var(--ease),transform .34s var(--ease);}

  /* reduced-motion: everything present at full value, no breathing/parallax/wake */
  @media (prefers-reduced-motion: reduce){
    .obs-star__point,.obs-ball{animation:none!important;}
    .obs-sky{transition:none!important;transform:none!important;}
    html.obs-cold .obs-star,
    html.obs-cold .obs-lines,
    html.obs-cold .obs-lowerthird,
    html.obs-cold .obs-tee,
    html.obs-cold .obs-sky{opacity:1!important;transform:none!important;}
    html.obs-cold .obs-scene{opacity:1!important;filter:none!important;}
  }

  /* very small / portrait safety (landscape-locked app, but never break) */
  @media (max-width:560px){
    .obs-scene{height:40%;}
    .obs-star__label{font-size:12px;}
  }
</style>
</head>
<body>

<!-- ══ MAIN LANDMARK (a11y M2) — the constellation interface + its live caption
     live inside <main>. The banner <header> is kept a sibling AFTER </main> so it
     retains its banner role (a <header> nested in <main> would NOT be a banner),
     and so keyboard tab order (5 stars → help) is byte-identical to before. ═══ -->
<main class="obs-main">

<!-- ══ SKY — one canvas: seeded starfield + comet ══════════════════════════ -->
<canvas class="obs-sky" id="sky" aria-hidden="true"></canvas>

<!-- ══ SCENE — the calibrated range-33 lower third (night grade verbatim) ═══ -->
<div class="obs-scene" aria-hidden="true">
  <img class="obs-scene__img" id="sceneImg" src="./assets/range-night-3d-33.png" alt="" decoding="async" fetchpriority="high">
  <div class="obs-scene__dark"></div>
  <div class="obs-scene__grade"></div>
  <div class="obs-scene__feather"></div>
  <div class="obs-scene__scrim"></div>
</div>
<div class="obs-wake" id="wake" aria-hidden="true"></div>

<!-- ══ CONSTELLATION LINES (static hairlines, injected on layout) ═══════════ -->
<svg class="obs-lines" id="lines" aria-hidden="true" preserveAspectRatio="none"></svg>

<!-- ══ MODULE-STARS (real <a>, pedagogy order: strike→flight→why→outcome→academy) -->
<nav class="obs-stars" id="stars" aria-label="StrikeArc destinations">
  <a class="obs-star obs-star--strike" id="star-strike" href="./geometry-window-mock.html" style="--sx:15%;--sy:34%;--bd:8.4s">
    <span class="obs-star__point"><span class="obs-star__glow"></span></span>
    <svg class="obs-reticle" viewBox="0 0 40 40" aria-hidden="true"><path d="M20 3 V10 M20 30 V37 M3 20 H10 M30 20 H37 M20 20 m-11 0 a11 11 0 1 0 22 0 a11 11 0 1 0 -22 0"/></svg>
    <span class="obs-star__micro" id="micro-strike"></span>
    <span class="obs-plaque obs-star__label">Strike Window</span>
    <span class="obs-star__stat" id="stat-strike">Model your strike</span>
  </a>
  <a class="obs-star obs-star--flight" id="star-flight" href="./impact-viz-mock.html" style="--sx:29%;--sy:47%;--bd:7.2s">
    <span class="obs-star__point"><span class="obs-star__glow"></span></span>
    <svg class="obs-reticle" viewBox="0 0 40 40" aria-hidden="true"><path d="M20 3 V10 M20 30 V37 M3 20 H10 M30 20 H37 M20 20 m-11 0 a11 11 0 1 0 22 0 a11 11 0 1 0 -22 0"/></svg>
    <span class="obs-star__micro" id="micro-flight"></span>
    <span class="obs-plaque obs-star__label">Ball Flight</span>
    <span class="obs-star__stat" id="stat-flight">See the shot →</span>
  </a>
  <a class="obs-star obs-star--why" id="star-why" href="./diagnose-mock.html" style="--sx:47%;--sy:15%;--bd:9.0s">
    <span class="obs-star__point"><span class="obs-star__glow"></span></span>
    <svg class="obs-reticle" viewBox="0 0 40 40" aria-hidden="true"><path d="M20 3 V10 M20 30 V37 M3 20 H10 M30 20 H37 M20 20 m-11 0 a11 11 0 1 0 22 0 a11 11 0 1 0 -22 0"/></svg>

    <svg class="obs-reticle" viewBox="0 0 40 40" aria-hidden="true"><path d="M20 3 V10 M20 30 V37 M3 20 H10 M30 20 H37 M20 20 m-11 0 a11 11 0 1 0 22 0 a11 11 0 1 0 -22 0"/></svg>
    <span class="obs-star__micro" id="micro-outcome"></span>

<!-- ══ HEADER — banner landmark. Kept OUTSIDE <main> (a <header> descendant of
     <main> is not a banner) and placed AFTER it so the focusable order stays
     exactly 5 stars → help. Wordmark + help are position:fixed, so relocating the
     block in the DOM does not move them (still top-left / top-right). ═════════ -->
<header class="obs-header">
  <h1 class="obs-wordmark" aria-label="StrikeArc">
    <svg class="mark" viewBox="0 0 52 52" fill="none" aria-hidden="true">
      <path class="arc" d="M11 45 C 16 26, 24 18, 35 15 M21 39 L 30 24 L 43 45"
            stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle class="ball" cx="37" cy="15" r="5.2"/>
    </svg>
    <span class="wm" aria-hidden="true"><span class="s">Strike</span><span class="a">Arc</span></span>
  </h1>
  <a class="obs-help" href="academy.html" aria-label="Help — open the Academy">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="9.2" stroke="currentColor" stroke-width="1.6"/>
      <path d="M9.4 9.3 A2.7 2.7 0 1 1 12.4 12.4 V13.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <circle cx="12" cy="17" r="1.05" fill="currentColor"/>
    </svg>
  </a>
</header>

<script type="module">
  import { solveFlight, trajectorySamples } from './impact-flight.js';
  import haptics from './sa-haptics.js';

  const $ = (id) => document.getElementById(id);
  const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
  const Y2M = 0.9144;                                   // yards → metres
  const reduce = (() => { try { return matchMedia('(prefers-reduced-motion: reduce)').matches || /[?&]rm=1/.test(location.search); } catch(e){ return false; } })();
  window.__obsRafActive = false;                        // verification hook (must be false at rest)

  /* ── storage helpers (mirror home-mock's sa.stat.* contract + staleness) ─── */
  const readJSON = (k) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : null; } catch(e){ return null; } };
  const writeJSON = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} };
  const readStr  = (k) => { try { return localStorage.getItem(k); } catch(e){ return null; } };
  const writeStr = (k,v) => { try { localStorage.setItem(k,v); } catch(e){} };
  const del      = (k) => { try { localStorage.removeItem(k); } catch(e){} };
  const NOW = Date.now();
  const STALE = 30 * 864e5;                             // 30 days (home-mock rule)
  const fresh = (s) => s && typeof s.ts === 'number' && (NOW - s.ts) < STALE;
  const minus = (n) => (n < 0 ? '−' : (n > 0 ? '+' : '')) + Math.abs(n).toFixed(1);  // U+2212

  /* ── Academy level derivation (MUST mirror academy.html levelInfo) ───────── */
  const LEVELS = [
    { lvl:1, xp:0,    title:'Apprentice' },
    { lvl:2, xp:150,  title:'Student' },
    { lvl:3, xp:350,  title:'Analyst' },
    { lvl:4, xp:650,  title:'Technician' },
    { lvl:5, xp:1000, title:'Engineer' },
    { lvl:6, xp:1500, title:'Master' },
  ];
  function levelInfo(xp){
    let idx = 0;
    for (let i = 0; i < LEVELS.length; i++) if (xp >= LEVELS[i].xp) idx = i;
    let lvl = LEVELS[idx].lvl, title = LEVELS[idx].title, curXp = LEVELS[idx].xp, nextXp;
    if (idx < LEVELS.length - 1) nextXp = LEVELS[idx + 1].xp;
    else { const extra = Math.floor((xp - 1500) / 600); lvl = 6 + extra; curXp = 1500 + extra * 600; nextXp = curXp + 600; title = 'Master'; }
    const span = nextXp - curXp, into = xp - curXp;
    return { lvl, title, curXp, nextXp, pct: span > 0 ? into / span : 1 };
  }

  /* ── canonical shots — ALWAYS solved honestly through solveFlight ─────────── */
  const DEMO_SHOT = { clubPath:1, faceAngle:-0.5, attackAngle:-3, dynamicLoft:30, clubSpeed:84, club:'7iron' };  // THE HOUSE DRAW
  const SEED_SHOT = { clubPath:-1, faceAngle:2, attackAngle:-3.5, dynamicLoft:29, clubSpeed:86, club:'7iron' };  // ?seed returning fade
  const SEED_GEO  = { band:'Flush', attack:-3.5 };
  const SEED_XP   = 2300;                                // → Academy LVL 7 (Master)

  /* ── ?seed / ?reset — self-seed plausible stats for review ────────────────── */
  const params = new URLSearchParams(location.search);
  const KEYS = ['sa.stat.flight','sa.stat.geometry','sa.stat.outcome','sa.stat.shot',
                'strikearc.academy.v1','sa.home.last','sa.home.seenLevel'];
  function clearAll(){ KEYS.forEach(del); try{ sessionStorage.removeItem('sa.home.broadcast'); }catch(e){} }
  function seedReturning(){
    const f = solveFlight(SEED_SHOT);
    const totalM = Math.round(f.total*Y2M), carryM = Math.round(f.carry*Y2M);
    const offAbs = Math.round(Math.abs(f.offline*Y2M)), side = f.offline>0?'R':(f.offline<0?'L':'');
    writeJSON('sa.stat.shot',    {ts:NOW, ...SEED_SHOT});
    writeJSON('sa.stat.flight',  {ts:NOW, total:totalM, offlineM:offAbs, offlineSide:side});
    writeJSON('sa.stat.outcome', {ts:NOW, carry:carryM, shape:f.shape});
    writeJSON('sa.stat.geometry',{ts:NOW, band:SEED_GEO.band, attack:SEED_GEO.attack});
    writeJSON('strikearc.academy.v1', {xp:SEED_XP});
    writeStr('sa.home.last','flight');
    try{ sessionStorage.removeItem('sa.home.broadcast'); }catch(e){}
  }
  if (params.has('seed')){ const v = params.get('seed'); (v==='0'||v==='reset') ? clearAll() : seedReturning(); }
  if (params.has('reset')) clearAll();

  /* ── read state (§2.4 contract — same reads as the original home-mock) ────── */
  const flightStat = readJSON('sa.stat.flight');
  const geoStat    = readJSON('sa.stat.geometry');
  const outStat    = readJSON('sa.stat.outcome');
  const shotStat   = readJSON('sa.stat.shot');
  const acaStore   = readJSON('strikearc.academy.v1');
  const acaXp      = acaStore && typeof acaStore.xp === 'number' ? acaStore.xp : 0;
  const li         = levelInfo(acaXp);

  const hasFlight = fresh(flightStat), hasGeo = fresh(geoStat), hasOut = fresh(outStat);
  const firstRun  = !(hasFlight || hasGeo || hasOut || acaXp > 0);

  let last = readStr('sa.home.last');
  if (!['flight','geometry','outcome','academy','strike','why'].includes(last)) last = 'flight';
  // map legacy 'geometry' resume key → the strike-window star
  const lastStar = last === 'geometry' ? 'strike' : (last === 'strike' ? 'strike' : last);

  /* ── resolve THE shot — one solved flight drives the comet + the readouts ─── */
  // Honest inverse fit when only the summary is stored (real-app case); when
  // sa.stat.shot exists (seed / a future writer) it is authoritative.
  function reconstructShot(fs, os, gs){
    const totalYd = clamp((fs.total||150)/Y2M, 40, 320);
    const carryYd = totalYd/1.03;
    const bs = Math.pow(carryYd/0.232, 1/1.389);
    const dynamicLoft = 30;
    const attackAngle = gs && isFinite(+gs.attack) ? +gs.attack : -3;
    const spinLoft = dynamicLoft - attackAngle;
    const smashEff = clamp(1.46 - 0.004*spinLoft, 1.15, 1.42);
    const clubSpeed = bs/smashEff;
    const offYd = ((fs.offlineM||0)/Y2M) * (fs.offlineSide==='L' ? -1 : fs.offlineSide==='R' ? 1 : 0);
    const shape = (os && os.shape) || '';
    const bendRight = /fade|slice/i.test(shape) ? 1 : /draw|hook/i.test(shape) ? -1 : Math.sign(offYd)||1;
    const faceAngle = clamp((offYd/Math.max(carryYd,1))*30, -6, 6) + bendRight*1.4;
    const clubPath  = faceAngle - bendRight*2.4;
    return { clubPath, faceAngle, attackAngle, dynamicLoft, clubSpeed, club:'7iron' };
  }

  let flight, isDemo = false;
  if (fresh(shotStat))      flight = solveFlight(shotStat);
  else if (hasFlight)       flight = solveFlight(reconstructShot(flightStat, outStat, geoStat));
  else { flight = solveFlight(DEMO_SHOT); isDemo = true; }

  const totalM  = Math.round((hasFlight ? Number(flightStat.total) : flight.total*Y2M));
  const carryM  = Math.round(flight.carry*Y2M);
  const shape   = (hasOut && outStat.shape) ? outStat.shape : flight.shape;
  // derived strike-flush % (presentation-layer, deterministic from the solve; ESTIMATE)
  const flushPct = Math.round(clamp(96 - Math.abs(flight.attackAngle+3)*3 - Math.abs(flight.faceToPath)*5 - Math.abs(flight.spinLoft-32)*1.5, 45, 98));
  function deriveBand(p){ return p>=88?'Pure':p>=78?'Flush':p>=64?'Thin':'Fat'; }
  const band = (hasGeo && geoStat.band) ? geoStat.band : deriveBand(flushPct);
  const bandUC = String(band).toUpperCase();

  /* ══ FILL STAR STATS ═══════════════════════════════════════════════════════ */
  function setStat(id, html){ $(id).innerHTML = html; }

  // Strike Window
  if (hasGeo){
    setStat('stat-strike', `<span class="v">${flushPct}%</span><span class="l">${bandUC}</span>`);
    $('star-strike').setAttribute('aria-label', `Strike Window — ${band} strike, ${minus(Number(geoStat.attack)||0)} degrees attack.`);
  } else {
    $('star-strike').setAttribute('aria-label', 'Strike Window — model your strike.');
  }
  // Ball Flight
  if (hasFlight){
    const off = Math.round(Number(flightStat.offlineM)||0), side = flightStat.offlineSide||'';
    setStat('stat-flight', `<span class="v">${totalM}</span><span class="l">m</span>`);
    $('star-flight').setAttribute('aria-label', `Ball flight — last shot ${totalM} metres, ${off} metres ${side==='R'?'right':side==='L'?'left':'on line'}.`);
  } else {
    $('star-flight').setAttribute('aria-label', 'Ball flight — see the shot. Start here.');
  }
  // Why? / Diagnose (no stored numeric — teach line)
  $('star-why').setAttribute('aria-label', 'Why? — diagnose the miss. See what caused the shot.');
  // Outcome
  if (hasOut){
    const carry = Math.round(Number(outStat.carry)||0);
    if (outStat.shape){
      setStat('stat-outcome', `<span class="v">${carry}</span><span class="l">m · ${outStat.shape}</span>`);
      $('star-outcome').setAttribute('aria-label', `Outcome — ${outStat.shape}, ${carry} metres.`);
    } else {
      setStat('stat-outcome', `<span class="v">${carry}</span><span class="l">m carry</span>`);
      $('star-outcome').setAttribute('aria-label', `Outcome — ${carry} metres carry.`);
    }
  } else {
    $('star-outcome').setAttribute('aria-label', 'Outcome — read the launch.');
  }

  /* ── ACADEMY pole-star: XP ring + LVL numeral ─────────────────────────────── */
  (function fillAcademy(){
    // build brass major ticks around the ring (graduated scale, etched)
    const ticks = $('acaTicks'); const cx=23, cy=23, rO=21.5, rI=19.5;
    let tg='';
    for (let i=0;i<12;i++){ const a=(i/12)*Math.PI*2 - Math.PI/2;
      tg += `<line class="tick" x1="${(cx+Math.cos(a)*rI).toFixed(2)}" y1="${(cy+Math.sin(a)*rI).toFixed(2)}" x2="${(cx+Math.cos(a)*rO).toFixed(2)}" y2="${(cy+Math.sin(a)*rO).toFixed(2)}"/>`; }
    ticks.innerHTML = tg;
    if (acaXp > 0){
      // progress arc from top, clockwise, pct of the way round
      const pct = clamp(li.pct, 0, 1), r=19, cX=23, cY=23;
      const a0 = -Math.PI/2, a1 = a0 + pct*Math.PI*2;
      const large = pct > 0.5 ? 1 : 0;
      const x0=cX+Math.cos(a0)*r, y0=cY+Math.sin(a0)*r, x1=cX+Math.cos(a1)*r, y1=cY+Math.sin(a1)*r;
      $('acaProg').setAttribute('d', pct>=0.999
        ? `M ${x0} ${y0-0.001} A ${r} ${r} 0 1 1 ${(x0-0.01).toFixed(3)} ${y0} `
        : `M ${x0.toFixed(3)} ${y0.toFixed(3)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(3)} ${y1.toFixed(3)}`);
      setStat('stat-academy', `<span class="v sa-xp" style="color:var(--reward-gold)">LVL ${li.lvl}</span><span class="l">${li.title}</span>`);
      $('star-academy').setAttribute('aria-label', `Academy — ${acaXp} XP, level ${li.lvl}, ${li.title}.`);
    } else {
      $('acaProg').setAttribute('d','');
      $('star-academy').setAttribute('aria-label', 'Academy — learn the physics, level 1.');
    }
  })();

  /* ── promotion: first-run hero (Ball Flight) OR resume (sa.home.last) ─────── */
  const starIdOf = { flight:'star-flight', strike:'star-strike', outcome:'star-outcome', academy:'star-academy', why:'star-why' };
  const microOf  = { flight:'micro-flight', strike:'micro-strike', outcome:'micro-outcome', academy:'micro-academy', why:'micro-why' };
  const promotedKey = firstRun ? 'flight' : lastStar;
  (function promote(){
    const el = $(starIdOf[promotedKey] || 'star-flight');
    el.classList.add('is-promoted');
    const micro = $(microOf[promotedKey] || 'micro-flight');
    micro.textContent = firstRun ? 'Start here' : 'Continue';
    if (!firstRun){
      const a = el; const lbl = a.getAttribute('aria-label') || '';
      a.setAttribute('aria-label', lbl.replace(/\.?$/, '.') + ' Continue where you left off.');
    }
  })();

  /* ── level-up badge pop (compare stored level vs sa.home.seenLevel) ───────── */
  const seenLevel = parseInt(readStr('sa.home.seenLevel') || '0', 10) || 0;
  if (!firstRun && acaXp > 0 && li.lvl > seenLevel){
    if (!reduce){
      const ring = $('acaRing');
      ring.animate([{ transform:'translate(-50%,-50%) scale(1)' }, { transform:'translate(-50%,-50%) scale(1.16)' }, { transform:'translate(-50%,-50%) scale(1)' }],
                   { duration:520, easing:'cubic-bezier(.2,.8,.2,1)' });
    }
    try { haptics.notify('success'); } catch(e){}
  }
  writeStr('sa.home.seenLevel', String(li.lvl));

  /* ══ LAYOUT — measure star point centres, draw constellation lines ════════ */
  const STAR_ORDER = ['star-strike','star-flight','star-why','star-outcome','star-academy']; // pedagogy
  let pts = {};                                        // id -> {x,y} viewport px (point centre)
  const teeEl = $('tee'), ballEl = $('ball');
  let teePt = { x:0, y:0 };

  function measure(){
    STAR_ORDER.forEach(id => {
      const pEl = $(id).querySelector('.obs-star__point');
      const r = pEl.getBoundingClientRect();
      pts[id] = { x: r.left + r.width/2, y: r.top + r.height/2 };
    });
    const tr = ballEl.getBoundingClientRect();
    teePt = { x: tr.left + tr.width/2, y: tr.top + tr.height/2 };
  }
  function drawLines(){
    const svg = $('lines');
    svg.setAttribute('viewBox', `0 0 ${innerWidth} ${innerHeight}`);
    let g='';
    for (let i=0;i<STAR_ORDER.length-1;i++){
      const a=pts[STAR_ORDER[i]], b=pts[STAR_ORDER[i+1]];
      g += `<line x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}"/>`;
    }
    svg.innerHTML = g;
  }
  function layout(){ measure(); drawLines(); }

  /* ══ STARFIELD — seeded, procedural, drawn ONCE (no rAF at rest) ═══════════ */
  const sky = $('sky'); const sctx = sky.getContext('2d');
  const DPR = Math.min(2, window.devicePixelRatio || 1);
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  let stars = [];
  function buildStars(){
    const rnd = mulberry32(0x5A17F1E);                // fixed seed → identical field every load
    stars = [];
    const horizonY = innerHeight * 0.56;
    const N = Math.round(innerWidth*innerHeight / 5200);   // density ~ area; DPR-crisp
    for (let i=0;i<N;i++){
      const x = rnd()*innerWidth;
      const y = rnd()*horizonY;                       // sky only (above horizon)
      const depth = rnd();                            // 0 far … 1 near
      const r = 0.35 + depth*0.95;
      const a = 0.14 + depth*0.5 * (1 - y/horizonY*0.35);
      stars.push({ x, y, r, a, hueBrass: rnd() < 0.05 }); // a few faint brass majors
    }
  }
  function sizeCanvas(){
    sky.width = Math.round(innerWidth*DPR); sky.height = Math.round(innerHeight*DPR);
    sky.style.width = innerWidth+'px'; sky.style.height = innerHeight+'px';
    sctx.setTransform(DPR,0,0,DPR,0,0);
  }
  function drawStarfield(){
    sctx.clearRect(0,0,innerWidth,innerHeight);
    for (const s of stars){
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      sctx.fillStyle = s.hueBrass ? `rgba(227,196,104,${(s.a*0.9).toFixed(3)})` : `rgba(225,230,255,${s.a.toFixed(3)})`;
      sctx.fill();
    }
  }
  function renderSky(){ drawStarfield(); }             // static compositor of the field

  /* ══ LOWER-THIRD content (typed on cold entry, static otherwise) ═══════════ */
  const sideOf = flight.offline>0?'R':(flight.offline<0?'L':'');
  const ltEyebrow = $('ltEyebrow'), ltLine = $('ltLine');
  // full markup of the caption line
  const ltHTML = isDemo
    ? `<span class="k">The House Draw</span><span class="sep">·</span><span class="obs-lt__cta">try it →</span>`
    : `<span class="k">Last shot</span><span class="sep">·</span><span class="v">${totalM} m</span><span class="sep">·</span><span class="v">${shape}</span><span class="sep">·</span><span class="v">${bandUC} ${flushPct}%</span>`;
  const ltPlain = isDemo
    ? 'The House Draw · try it'
    : `Last shot · ${totalM} metres · ${shape} · ${band}, ${flushPct}% flush`;

  /* ══ ENTRY — THE COMET BROADCAST (§3.2) ═══════════════════════════════════
     Cold entry (motion allowed, once per session): the range wakes (floodlight
     beat ~0.9s) → your actual last shot (real solveFlight solve → sky arc)
     crosses the constellation as an ember comet with a decaying trail, landing
     on the Ball Flight star (the story owner) → that star flares → a lower-third
     types itself. Total ≤2.6s, any input skips, sessionStorage once-gate.        */
  const htmlEl = document.documentElement;
  const isCold = htmlEl.classList.contains('obs-cold');   // decided pre-paint by the head gate
  // Pass-2 (Fable): the comet lands on the PROMOTED star, so the flare and the
  // promotion never split the viewer's attention (spec §3.2's "story owner" =
  // the star the session actually resumes; Ball Flight remains the first-run default).
  const COMET_TARGET = starIdOf[promotedKey] || 'star-flight';
  const samples = trajectorySamples(flight, 64);          // the REAL trajectory shape
  const sideSign = flight.offline >= 0 ? 1 : -1;

  function trajAt(u){
    u = clamp(u,0,1); const f = u*(samples.length-1), i = Math.floor(f), t = f-i;
    const a = samples[i], b = samples[Math.min(i+1, samples.length-1)];
    return { h: a.h+(b.h-a.h)*t, x: a.x+(b.x-a.x)*t };
  }
  function cometPoint(u){
    const start = teePt, end = pts[COMET_TARGET];
    const sm = trajAt(u);
    const baseX = start.x + (end.x - start.x)*u;
    const baseY = start.y + (end.y - start.y)*u;
    const lift = sm.h * (innerHeight * 0.52);             // arc peaks high, crossing the constellation
    const lateral = sm.x * (innerWidth * 0.05) * sideSign;
    return { x: baseX + lateral, y: baseY - lift };
  }

  let rafId = 0, finalized = false, trail = [], cometT0 = 0;
  function drawComet(){
    drawStarfield();                                      // one canvas: field redrawn under the comet
    sctx.save();
    sctx.globalCompositeOperation = 'lighter';            // additive ember
    for (let i=0;i<trail.length;i++){
      const p = trail[i], a = i/Math.max(1,trail.length-1);
      const rad = 0.8 + a*3.0, alpha = a*a*0.5;
      sctx.beginPath(); sctx.arc(p.x, p.y, rad, 0, Math.PI*2);
      sctx.fillStyle = `rgba(255,138,77,${alpha.toFixed(3)})`; sctx.fill();
    }
    const head = trail[trail.length-1];
    if (head){
      const g = sctx.createRadialGradient(head.x,head.y,0, head.x,head.y,15);
      g.addColorStop(0,'rgba(255,243,232,.95)'); g.addColorStop(.34,'rgba(255,154,94,.65)'); g.addColorStop(1,'rgba(255,138,77,0)');
      sctx.fillStyle = g; sctx.beginPath(); sctx.arc(head.x,head.y,15,0,Math.PI*2); sctx.fill();
      sctx.fillStyle = 'rgba(255,243,232,1)'; sctx.beginPath(); sctx.arc(head.x,head.y,1.7,0,Math.PI*2); sctx.fill();
    }
    sctx.restore();
  }
  function cometFrame(now){
    if (finalized) return;
    if (!cometT0) cometT0 = now;
    const dur = 1300, u = clamp((now - cometT0)/dur, 0, 1);
    trail.push(cometPoint(u)); if (trail.length > 26) trail.shift();
    drawComet();
    if (u < 1) rafId = requestAnimationFrame(cometFrame);
    else { window.__obsRafActive = false; startFlare(); }
  }
  function startComet(){ window.__obsRafActive = true; cometT0 = 0; trail = []; rafId = requestAnimationFrame(cometFrame); }

  function startFlare(){
    const at = pts[COMET_TARGET];
    const pt = $(COMET_TARGET).querySelector('.obs-star__point');
    if (!reduce) pt.animate(
      [{ boxShadow:'0 0 10px 2px rgba(255,138,77,.5)' },
       { boxShadow:'0 0 26px 9px rgba(255,243,232,.9)' },
       { boxShadow:'0 0 10px 2px rgba(255,138,77,.5)' }],
      { duration:420, easing:'cubic-bezier(.2,.8,.2,1)' });
    let f0 = 0; window.__obsRafActive = true;
    (function fr(now){
      if (finalized) return;
      if (!f0) f0 = now; const p = clamp((now-f0)/300, 0, 1);
      drawStarfield();
      sctx.save(); sctx.globalCompositeOperation='lighter';
      const r = 6 + p*46, a = (1-p)*0.6;
      const g = sctx.createRadialGradient(at.x,at.y,0, at.x,at.y,r);
      g.addColorStop(0,`rgba(255,243,232,${(a*0.9).toFixed(3)})`);
      g.addColorStop(.5,`rgba(255,138,77,${(a*0.5).toFixed(3)})`);
      g.addColorStop(1,'rgba(255,138,77,0)');
      sctx.fillStyle=g; sctx.beginPath(); sctx.arc(at.x,at.y,r,0,Math.PI*2); sctx.fill(); sctx.restore();
      if (p < 1) requestAnimationFrame(fr);
      else { window.__obsRafActive = false; drawStarfield(); }
    })(performance.now());
  }

  function typeLowerThird(){
    ltLine.innerHTML = ltHTML;
    htmlEl.classList.add('obs-lt-in');                    // reveal the plate
    if (reduce){ ltLine.style.clipPath='none'; return; }
    const chars = ltLine.textContent.length;
    ltLine.style.clipPath = 'inset(0 100% 0 0)';
    const anim = ltLine.animate(
      [{ clipPath:'inset(0 100% 0 0)' }, { clipPath:'inset(0 0 0 0)' }],
      { duration:Math.min(520,140+chars*15), easing:`steps(${Math.max(6,Math.min(chars,30))})`, fill:'forwards' });
    anim.onfinish = () => { ltLine.style.clipPath = 'none'; };
  }

  function renderRestState(){                             // warm / reduced-motion path
    ltLine.innerHTML = ltHTML; ltLine.style.clipPath='none';
    $('live').textContent = ltPlain;
  }

  function finalizeCold(){                                // clean end-state (natural OR skip)
    if (finalized) return; finalized = true;
    cancelAnimationFrame(rafId); window.__obsRafActive = false;
    drawStarfield();                                      // clear the comet, static field
    ltLine.innerHTML = ltHTML; ltLine.style.clipPath = 'none';
    $('live').textContent = ltPlain;
    teeEl.classList.remove('is-flying');
    htmlEl.classList.remove('obs-cold');                  // drop the gate → everything at rest value
    teardownSkip();
  }
  function onSkip(){ finalizeCold(); }
  function onVis(){ if (document.hidden) finalizeCold(); }
  const SKIP_EVENTS = ['pointerdown','keydown','touchstart','wheel'];
  function setupSkip(){ SKIP_EVENTS.forEach(t => window.addEventListener(t, onSkip, { passive:true })); document.addEventListener('visibilitychange', onVis); }
  function teardownSkip(){ SKIP_EVENTS.forEach(t => window.removeEventListener(t, onSkip)); document.removeEventListener('visibilitychange', onVis); }

  function runCold(){
    try { sessionStorage.setItem('sa.home.broadcast','1'); } catch(e){}   // once-per-session gate
    setupSkip();
    htmlEl.classList.add('obs-wake-on');                  // t0  floodlight wake + sky fade-in
    teeEl.classList.add('is-flying');                     // the tee ball becomes the comet head
    /* Pass-2 (Fable): tightened 2.52s → 2.18s — the wake breathes less before
       the comet, the settle follows the type-on sooner. Same beats, more snap. */
    setTimeout(() => { if (finalized) return; htmlEl.classList.add('obs-show'); }, 120);     // constellation reveal
    setTimeout(() => { if (finalized) return; startComet(); }, 560);                          // comet launches
    setTimeout(() => { if (finalized) return; htmlEl.classList.add('obs-ball-in'); teeEl.classList.remove('is-flying'); typeLowerThird(); }, 1900);
    setTimeout(() => { if (finalized) return; finalizeCold(); }, 2180);                        // settle ≤2.6s
  }

  /* ══ INTERACTION (§3.3) — tap a star: the ember ball lifts from the tee and
     travels the constellation to it (420ms, gravitational ease, comet-tail),
     then the star swallows to navigate (shared-element VT). Double-activation
     guarded; mid-flight taps retarget honestly. Reduced-motion = plain nav.  ═ */
  const stars$ = [...document.querySelectorAll('.obs-star')];
  let flying = false, flyTarget = null, flyHref = '', flyStart = null, flyT0 = 0, flyRAF = 0, flyTrail = [], lastPos = null, arrived = false;

  function ballArc(u, target){
    const start = flyStart || teePt, end = pts[target];
    const lift = Math.sin(Math.PI*u) * Math.min(130, (start.y - end.y)*0.45 + 44);
    return { x: start.x + (end.x-start.x)*u, y: start.y + (end.y-start.y)*u - lift };
  }
  function drawFlyBall(){
    drawStarfield();
    sctx.save(); sctx.globalCompositeOperation = 'lighter';
    for (let i=0;i<flyTrail.length;i++){
      const p = flyTrail[i], a = i/Math.max(1,flyTrail.length-1);
      sctx.beginPath(); sctx.arc(p.x, p.y, 0.8 + a*3.2, 0, Math.PI*2);
      sctx.fillStyle = `rgba(255,138,77,${(a*a*0.55).toFixed(3)})`; sctx.fill();
    }
    const h = flyTrail[flyTrail.length-1];
    if (h){
      const g = sctx.createRadialGradient(h.x,h.y,0, h.x,h.y,13);
      g.addColorStop(0,'rgba(255,243,232,.98)'); g.addColorStop(.4,'rgba(255,154,94,.6)'); g.addColorStop(1,'rgba(255,138,77,0)');
      sctx.fillStyle = g; sctx.beginPath(); sctx.arc(h.x,h.y,13,0,Math.PI*2); sctx.fill();
      sctx.fillStyle = '#FFF3E8'; sctx.beginPath(); sctx.arc(h.x,h.y,3,0,Math.PI*2); sctx.fill();
    }
    sctx.restore();
  }
  function flyFrame(now){
    if (!flyT0) flyT0 = now;
    const p = clamp((now-flyT0)/420, 0, 1), u = 1 - Math.pow(1-p, 3);   // gravitational ease-out
    lastPos = ballArc(u, flyTarget);
    flyTrail.push(lastPos); if (flyTrail.length > 18) flyTrail.shift();
    drawFlyBall();
    if (p < 1) flyRAF = requestAnimationFrame(flyFrame);
    else arriveAndNav();
  }
  function arriveAndNav(){
    if (arrived) return; arrived = true; window.__obsRafActive = false;
    const star = $(flyTarget), href = flyHref;
    try { star.style.viewTransitionName = 'sa-stage'; } catch(e){}
    try { star.querySelector('.obs-star__point').animate(
      [{ transform:'scale(1)', opacity:1 }, { transform:'scale(2.6)', opacity:.15 }],
      { duration:170, easing:'ease-in', fill:'forwards' }); } catch(e){}
    setTimeout(() => { location.href = href; }, 110);
  }
  function startFly(id, href){
    try {
      if (flying){                               // mid-flight retarget (honest)
        if (id === flyTarget) return;            // double-activation guard
        flyStart = lastPos ? { x:lastPos.x, y:lastPos.y } : teePt;
        flyTarget = id; flyHref = href; flyT0 = 0; flyTrail = [];
        return;
      }
      flying = true; arrived = false; flyTarget = id; flyHref = href; flyStart = teePt; flyT0 = 0; flyTrail = [];
      teeEl.classList.add('is-flying'); window.__obsRafActive = true;
      flyRAF = requestAnimationFrame(flyFrame);
    } catch(e){ location.href = href; }          // never strand the user
  }
  stars$.forEach(a => {
    a.addEventListener('pointerdown', () => { try { haptics.impact('light'); } catch(e){} });
    a.addEventListener('click', (e) => {
      try { haptics.impact('medium'); } catch(e){}
      if (reduce) return;                        // plain nav (VT disabled under reduced-motion)
      e.preventDefault();
      startFly(a.id, a.getAttribute('href'));
    });
  });

  /* ── idle parallax ≤6px on the starfield ONLY (pointer fallback; no sensor
     permission ever requested; touch has no idle hover so it degrades to nil) ─ */
  if (!reduce){
    let parQueued = false;
    addEventListener('pointermove', (e) => {
      if (e.pointerType && e.pointerType !== 'mouse') return;
      const nx = e.clientX/innerWidth - 0.5, ny = e.clientY/innerHeight - 0.5;
      if (parQueued) return; parQueued = true;
      requestAnimationFrame(() => {
        sky.style.setProperty('--par-x', (-nx*6).toFixed(2)+'px');
        sky.style.setProperty('--par-y', (-ny*6).toFixed(2)+'px');
        parQueued = false;
      });
    }, { passive:true });
  }

  /* ══ BOOT ══════════════════════════════════════════════════════════════════ */
  function boot(){
    sizeCanvas(); buildStars(); renderSky();
    layout();
    if (isCold){
      ltLine.innerHTML = ltHTML;                          // content ready (hidden by obs-cold)
      // let the hidden cold state paint once, THEN run the reveal beats (no flash)
      requestAnimationFrame(() => requestAnimationFrame(runCold));
    } else {
      renderRestState();
    }
  }
  boot();

  // relayout on resize / orientation (rebuild seeded field to new area)
  let rAFResize = 0;
  addEventListener('resize', () => {
    cancelAnimationFrame(rAFResize);
    rAFResize = requestAnimationFrame(() => { sizeCanvas(); buildStars(); renderSky(); layout(); });
  });
</script>
</body>
</html>
