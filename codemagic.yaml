# Codemagic iOS workflow for StrikeArc — NATIVE (svingbue) build.
#
# Wraps the static web app (index/geometry/impact + geo3d/vendor/assets)
# in a Capacitor 7 iOS shell, landscape-locked, and ships it to TestFlight
# on the EXISTING StrikeArc app record (ASC Apple ID 6768449250, bundle
# no.strikearc.app, team PL9G26C26C). This build supersedes the React/Vite
# strikearc-3.0 build on TestFlight — chosen by Sivert 2026-07-03.
#
# Signing/publish machinery mirrors the proven strikearc-3.0 pipeline
# (same app record, same ryddy-asc-key), adapted for the static-web +
# landscape + CocoaPods (Capacitor 7 → .xcworkspace) shape of svingbue.
#
# Setup status:
#   1. ASC API key integration `ryddy-asc-key` (Key JQVPW4D944) — ✅ reused.
#   2. GitHub repo Fenral/svingbue connected as iOS app — ✅ done.
#   3. App record no.strikearc.app (Apple ID 6768449250) — ✅ already exists.
#   → No manual Apple steps remain. Push to main (or run manually) to build.

definitions:
  bundle_id: &bundle_id no.strikearc.app
  team_id: &team_id PL9G26C26C

workflows:
  ios-testflight:
    name: StrikeArc — iOS TestFlight (native)
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      # Reuses the existing team-level App Store Connect API key
      # `ryddy-asc-key` (Key ID JQVPW4D944) — same key that already signs +
      # publishes strikearc, strikearc-3.0, wool-app and ryddy for team
      # PL9G26C26C. Codemagic injects key/issuer/key-id for both signing
      # and the TestFlight publish step; no secrets live in this file.
      app_store_connect: ryddy-asc-key

    environment:
      vars:
        BUNDLE_ID: *bundle_id
        APP_STORE_APPLE_ID: 6768449250   # existing StrikeArc ASC app id
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true

    scripts:
      - name: Install npm dependencies
        script: |
          npm ci

      - name: Assemble www/ from web source (denylist mocks/tooling)
        script: |
          npm run copy-web

      # ios/ is never committed (Windows dev machine can't generate it —
      # needs Xcode/CocoaPods), so every CI run creates it fresh here.
      - name: Add the iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync web assets + plugins into the iOS project
        script: |
          npx cap sync ios

      - name: Patch Info.plist for landscape-only + display name
        script: |
          # Must run AFTER cap sync (cap add/sync own Info.plist). Idempotent.
          node scripts/ios-landscape.mjs

      - name: Inject Info.plist export-compliance answer
        script: |
          # Auto-answer Apple's "Missing Compliance" question. StrikeArc only
          # uses HTTPS via system APIs + Web Audio, which are exempt per
          # 740.17(b)(1) of the US Export Administration Regulations. ios/ is
          # gitignore'd + regenerated each run, so the injection lives here.
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"
          echo "✓ ITSAppUsesNonExemptEncryption=false injected."

      - name: Generate app icons/splash from resources/
        script: |
          # resources/icon.png (1024²) + resources/splash.png (2732²) are the
          # sources — capacitor-assets fans them out to every iOS size after
          # the platform exists.
          npx capacitor-assets generate --ios --iconBackgroundColor "#0A0E12"

      - name: CocoaPods install
        script: |
          # Capacitor 7 iOS uses CocoaPods; the build targets the WORKSPACE.
          # cap sync already runs pod install, but do it explicitly for safety.
          cd ios/App && pod install

      - name: Set marketing version from package.json
        script: |
          cd ios/App
          VERSION=$(node -p "require('../../package.json').version")
          echo "Setting marketing version to $VERSION"
          agvtool new-marketing-version "$VERSION"

      - name: Set build number (one above latest TestFlight build)
        script: |
          # This Codemagic app's build counter is independent of strikearc-3.0's,
          # so a fixed offset can't guarantee we beat the existing highest
          # CFBundleVersion on no.strikearc.app. Query ASC for the latest and
          # add 1 — bulletproof regardless of which pipeline built last.
          set +e
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null)
          set -e
          if ! printf '%s' "$LATEST" | grep -Eq '^[0-9]+$'; then
            echo "Could not read latest build number (got '$LATEST') — falling back to 0."
            LATEST=0
          fi
          NEXT=$((LATEST + 1))
          echo "Latest TestFlight build: $LATEST → setting CFBundleVersion=$NEXT"
          cd ios/App
          agvtool new-version -all "$NEXT"

      - name: Initialize keychain
        script: |
          keychain initialize

      - name: Generate certificate private key
        script: |
          set -ex
          openssl genrsa -out /tmp/cert_private_key.pem 2048

      - name: Revoke old Distribution certs (cert-quota maintenance)
        script: |
          set +e
          # Apple's quota is 2 active Distribution certs per team. Codemagic
          # generates a NEW private key each build → existing certs have no
          # matching local key → unusable → quota fills up. Auto-revoke so
          # `fetch-signing-files --create` always has headroom. Safe: App
          # Store IPAs stay valid post-revoke (cert only signs new IPAs).
          for CERT_TYPE in DISTRIBUTION IOS_DISTRIBUTION; do
            echo "==== Listing $CERT_TYPE certs ===="
            JSON=$(app-store-connect certificates list --type "$CERT_TYPE" --json 2>/dev/null || echo "[]")
            CERT_IDS=$(echo "$JSON" | jq -r '.[]? | .id // empty' 2>/dev/null || true)
            if [ -z "$CERT_IDS" ]; then
              echo "No $CERT_TYPE certs to revoke."
              continue
            fi
            for CERT_ID in $CERT_IDS; do
              echo "Revoking $CERT_TYPE cert: $CERT_ID"
              app-store-connect certificates delete "$CERT_ID" --ignore-not-found || true
            done
          done
          set -e

      - name: Fetch signing files (create cert + profile)
        script: |
          set -ex
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --certificate-key=@file:/tmp/cert_private_key.pem \
            --type IOS_APP_STORE \
            --create \
            --verbose

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Use profiles in Xcode project
        script: |
          xcode-project use-profiles

      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM.zip

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Add a beta group name here once one exists in App Store Connect:
        # beta_groups:
        #   - "Internal Testers"
        expire_build_submitted_for_review: false
