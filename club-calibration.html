<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>club7.glb calibration (dev only)</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0d10; color: #e8eaed; font: 13px/1.4 ui-monospace, Consolas, monospace; overflow: hidden; }
  #app { position: fixed; inset: 0; }
  .panel { position: fixed; z-index: 10; background: rgba(12,15,19,.82); border: 1px solid #2a2f36; border-radius: 8px; padding: 10px 12px; backdrop-filter: blur(4px); }
  #hud { top: 12px; left: 12px; max-width: 380px; white-space: pre; }
  #controls { bottom: 12px; left: 12px; right: 12px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  #controls label { display: flex; gap: 8px; align-items: center; }
  input[type=range] { width: 260px; }
  button { background: #1b2129; color: #e8eaed; border: 1px solid #2a2f36; border-radius: 6px; padding: 4px 10px; font: inherit; cursor: pointer; }
  button:hover { border-color: #4a5563; }
  #lieVal { min-width: 52px; display: inline-block; text-align: right; }
  .ok { color: #7ee2a8; } .bad { color: #ff8b8b; }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud" class="panel">loading club7.glb…</div>
<div id="controls" class="panel">
  <label>blade lie test (rot around hosel Z)
    <input id="lie" type="range" min="-10" max="10" step="0.1" value="0">
    <span id="lieVal">0.0°</span>
  </label>
  <button data-view="face">view face (+Z)</button>
  <button data-view="back">view back (−Z)</button>
  <button data-view="toe">view toe (+X)</button>
  <button data-view="iso">iso</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

const errors = [];
window.addEventListener('error', (e) => errors.push(String(e.message)));
window.addEventListener('unhandledrejection', (e) => errors.push(String(e.reason)));

const app = document.getElementById('app');
const hud = document.getElementById('hud');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0d10);
scene.environment = new THREE.PMREMGenerator(renderer)
  .fromScene(new RoomEnvironment(renderer), 0.04).texture;

const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.01, 50);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.45, 0);

const VIEWS = {
  face: [0.15, 0.45, 1.6],   // camera on +Z side, looking at the face
  back: [-0.15, 0.45, -1.6],
  toe:  [1.6, 0.45, 0.15],   // camera on +X side (toe)
  iso:  [1.1, 0.9, 1.3],
};
function setView(name) { camera.position.set(...VIEWS[name]); controls.update(); }
setView('iso');
for (const b of document.querySelectorAll('button[data-view]'))
  b.addEventListener('click', () => setView(b.dataset.view));

/* lights (env map carries most of the metal response) */
scene.add(new THREE.HemisphereLight(0xdfe6ee, 0x1a1d22, 0.5));
const key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(1.5, 2.5, 2.0);
scene.add(key);

/* 1 m ruler grid: 2x2 m, 10 cm cells, bold metre lines */
scene.add(new THREE.GridHelper(2, 20, 0x3d4652, 0x232a33));
const metreGrid = new THREE.GridHelper(2, 2, 0x5a6b80, 0x5a6b80);
metreGrid.position.y = 0.0005;
scene.add(metreGrid);
scene.add(new THREE.AxesHelper(1)); // X red, Y green, Z blue

/* vertical 1 m ruler along +Y with 10 cm ticks */
{
  const pts = [new THREE.Vector3(-0.25, 0, 0), new THREE.Vector3(-0.25, 1, 0)];
  for (let i = 0; i <= 10; i++)
    pts.push(new THREE.Vector3(-0.25, i / 10, 0), new THREE.Vector3(-0.25 + (i % 5 ? 0.015 : 0.03), i / 10, 0));
  scene.add(new THREE.LineSegments(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x8fa3b8 })));
}

/* text label sprites */
function label(text, pos, color = '#e8eaed') {
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const g = c.getContext('2d');
  g.font = 'bold 34px ui-monospace, monospace';
  g.fillStyle = color; g.textBaseline = 'middle';
  g.fillText(text, 8, 32);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(c), transparent: true, depthTest: false,
  }));
  sp.scale.set(0.32, 0.08, 1);
  sp.position.copy(pos);
  scene.add(sp);
}
label('+X toe', new THREE.Vector3(1.05, 0.03, 0), '#ff6b6b');
label('+Y shaft', new THREE.Vector3(0.02, 1.06, 0), '#7ee2a8');
label('+Z face', new THREE.Vector3(0, 0.03, 1.08), '#7db3ff');
label('1 m', new THREE.Vector3(-0.36, 1.0, 0), '#8fa3b8');
label('origin = sweet spot', new THREE.Vector3(0.05, -0.05, 0), '#c9a86a');

/* origin marker at the sweet spot */
const originDot = new THREE.Mesh(
  new THREE.SphereGeometry(0.006, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xc9a86a, depthTest: false }));
originDot.renderOrder = 2;
scene.add(originDot);

/* runtime materials (assigned in code — GLB carries no materials) */
const MATERIALS = {
  blade:   new THREE.MeshStandardMaterial({ color: 0xc2c7cf, metalness: 1.0, roughness: 0.30 }),
  shaft:   new THREE.MeshStandardMaterial({ color: 0x2a2d31, metalness: 0.9, roughness: 0.35 }),
  ferrule: new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 0.2, roughness: 0.15 }),
  grip:    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.0, roughness: 0.90 }),
};

const state = { blade: null, ready: false };
window.__calib = { errors, state, THREE, setLie: null, measure: null };

const loader = new GLTFLoader();
loader.setMeshoptDecoder(MeshoptDecoder);
loader.load('assets/club7.glb', (gltf) => {
  const club = gltf.scene;
  club.traverse((o) => {
    if (o.isMesh && MATERIALS[o.name]) o.material = MATERIALS[o.name];
  });
  scene.add(club);
  state.blade = club.getObjectByName('blade');
  state.shaftGroup = club.getObjectByName('shaftGroup');

  const measure = () => {
    state.blade.updateWorldMatrix(true, true);
    const all = new THREE.Box3().setFromObject(club);
    const shaftGrp = new THREE.Box3().setFromObject(state.shaftGroup);
    const bladeBox = new THREE.Box3().setFromObject(state.blade);
    // grip end (top of shaftGroup) -> lowest blade point, plus pure Y height
    return {
      bbox: { min: all.min.toArray(), max: all.max.toArray() },
      bladeBox: { min: bladeBox.min.toArray(), max: bladeBox.max.toArray() },
      gripEndY: shaftGrp.max.y,
      lengthY: shaftGrp.max.y - all.min.y,
      bladeNodePos: state.blade.position.toArray(),
      bladeRotZdeg: THREE.MathUtils.radToDeg(state.blade.rotation.z),
    };
  };
  window.__calib.measure = measure;

  const m = measure();
  const f = (v, d = 3) => (Array.isArray(v) ? `[${v.map((x) => x.toFixed(d)).join(', ')}]` : v.toFixed(d));
  const lenOK = Math.abs(m.lengthY - 0.953) < 0.05; // ruler check ~0.95 m (lie tilt lowers the toe slightly)
  hud.innerHTML =
`club7.glb  <span class="${lenOK ? 'ok' : 'bad'}">length(Y, grip end→lowest) ${f(m.lengthY)} m</span>
grip end Y      : ${f(m.gripEndY)} m
world bbox min  : ${f(m.bbox.min)}
world bbox max  : ${f(m.bbox.max)}
blade bbox min  : ${f(m.bladeBox.min)}
blade bbox max  : ${f(m.bladeBox.max)}
blade node (hosel pivot): ${f(m.bladeNodePos)}
nodes: blade + shaftGroup(shaft, ferrule, grip)
materials: runtime-assigned (none in GLB)`;
  state.ready = true;
}, undefined, (err) => {
  errors.push('GLTF load failed: ' + err);
  hud.innerHTML = '<span class="bad">GLTF load failed — see console</span>';
});

/* lie slider: rotate the blade node around its local Z (= hosel pivot) */
const lie = document.getElementById('lie');
const lieVal = document.getElementById('lieVal');
function setLie(deg) {
  lie.value = deg;
  lieVal.textContent = `${(+deg).toFixed(1)}°`;
  if (state.blade) state.blade.rotation.z = THREE.MathUtils.degToRad(+deg);
}
lie.addEventListener('input', () => setLie(lie.value));
window.__calib.setLie = setLie;

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

renderer.setAnimationLoop(() => { controls.update(); renderer.render(scene, camera); });
</script>
</body>
</html>
